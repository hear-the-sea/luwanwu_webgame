map $uri $static_expires {
    ~^/static/.+\.[0-9a-f]{12}\..+$ 365d;
    default 1h;
}

map $uri $static_cache_control {
    ~^/static/.+\.[0-9a-f]{12}\..+$ "public, max-age=31536000, immutable";
    default "public, max-age=3600";
}

upstream web_upstream {
    server web:8000;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 20m;
    gzip on;
    gzip_min_length 1024;
    gzip_comp_level 5;
    gzip_vary on;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/json
        application/xml
        application/xml+rss
        image/svg+xml;

    location /health/ {
        proxy_pass http://web_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Request-ID $request_id;
        # Never trust client-supplied X-Forwarded-Proto.
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /static/ {
        alias /staticfiles/;
        expires $static_expires;
        add_header Cache-Control $static_cache_control always;
        access_log off;
    }

    location /media/ {
        alias /media/;
        expires 1d;
        add_header Cache-Control "public";
    }

    location /ws/ {
        proxy_pass http://web_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Request-ID $request_id;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600;
    }

    location / {
        proxy_pass http://web_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Request-ID $request_id;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }
}
