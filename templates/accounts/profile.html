{% extends "base.html" %}

{% block title %}账号资料{% endblock %}

{% block content %}
<section class="tw-auth-card">
    <h2>账号资料</h2>
    <ul class="list-none p-0 m-0 space-y-2">
        <li class="flex"><span class="text-text-secondary w-24">用户名：</span><span class="font-bold">{{ request.user.username }}</span></li>
        <li class="flex"><span class="text-text-secondary w-24">邮箱：</span><span>{{ request.user.email|default:"未填写" }}</span></li>
        <li class="flex"><span class="text-text-secondary w-24">头衔：</span><span>{{ request.user.title|default:"未设定" }}</span></li>
        <li class="flex"><span class="text-text-secondary w-24">加入时间：</span><span>{{ request.user.date_joined|date:"Y-m-d H:i" }}</span></li>
    </ul>
</section>
{% endblock %}
