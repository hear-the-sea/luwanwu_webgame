[tool.black]
line-length = 120
target-version = ['py312']
include = '\.pyi?$'
extend-exclude = '''
/(
  # directories
  \.eggs
  | \.git
  | \.hg
  | \.mypy_cache
  | \.tox
  | \.venv
  | build
  | dist
  | migrations
)/
'''

[tool.isort]
profile = "black"
line_length = 120
skip_glob = ["*/migrations/*"]

[tool.flake8]
max-line-length = 120
extend-ignore = ["E203", "W503"]
exclude = [
    ".git",
    "__pycache__",
    "*/migrations/*",
    ".venv",
    "venv",
]

[tool.mypy]
python_version = "3.12"
# mypy governance: shrink ignore_errors list over time.
# New modules must pass full type checking.
#
# Start enforcing mypy in CI with a pragmatic baseline:
# - Keep missing-imports ignored (Django ecosystem is dynamic)
# - Disable warn_return_any initially to avoid turning implicit Any
#   into a hard error everywhere.
# We can tighten this progressively once CI is green.
warn_return_any = false
warn_unused_configs = true
# disallow_untyped_defs target default: true (enforce for new modules via overrides below)
disallow_untyped_defs = false
ignore_missing_imports = true
no_implicit_optional = false
disable_error_code = ["import-untyped"]
plugins = ["mypy_django_plugin.main"]

# Keep `mypy .` usable for developers by skipping non-production code.
# CI and `make lint` type-check only the core packages explicitly.
exclude = "(^|/)(migrations|\\.venv|scripts|battle_debugger|tests|docs|node_modules)/"

[tool.django-stubs]
django_settings_module = "config.settings"
files = [
    "accounts",
    "battle",
    "common",
    "config",
    "core",
    "gameplay",
    "guests",
    "guilds",
    "tasks",
    "trade",
    "websocket",
]
exclude = "(^|/)(migrations|\\.venv|scripts|battle_debugger|tests|docs)/"

# Modules with real type errors — keep suppressed until fixed.
# Governance goal: shrink this list each sprint.
# 新增核心模块禁止进入 ignore_errors 名单
[[tool.mypy.overrides]]
module = [
    "*.views",
    "*.views.*",
    "*.management.commands.*",
    "*.admin",
    "*.admin.*",
    "battle_debugger.*",
    "gameplay.migrations.*",
    "gameplay.models.*",
    "guests.templatetags.*",
]
ignore_errors = true

# First narrow carve-out from the broad views ignore list.
# Keep this module on real checks to start shrinking the suppression area.
[[tool.mypy.overrides]]
module = [
    "core.views.health",
    "gameplay.views.core",
    "gameplay.views.inventory",
    "gameplay.views.jail",
    "gameplay.views.map",
    "gameplay.views.messages",
    "gameplay.views.missions",
    "gameplay.views.production",
    "gameplay.views.production_helpers",
    "gameplay.views.production_page_context",
    "gameplay.views.recruitment",
    "gameplay.views.technology",
    "gameplay.views.work",
    "trade.views",
    "guests.views.recruit",
    "guests.views.recruit_responses",
    "guests.views.recruit_runtime",
]
ignore_errors = false
disallow_untyped_defs = true

# Strict type checking: all functions must have full annotations.
# Add modules here as they reach full annotation coverage.
# Goal: grow this list until disallow_untyped_defs = true can be set globally.
[[tool.mypy.overrides]]
module = [
    "accounts.utils",
    "battle.simulation_core",
    "common.utils.celery",
    "core.middleware.*",
    "core.utils.cache_lock",
    "core.utils.degradation",
    "core.utils.task_monitoring",
    "core.utils.yaml_loader",
    "core.utils.yaml_schema",
    "gameplay.services.arena.core",
    "gameplay.services.arena.rules",
    "gameplay.services.online_presence_backend",
    "gameplay.services.buildings.*",
    "gameplay.services.buildings.forge",
    "gameplay.services.buildings.ranch",
    "gameplay.services.buildings.smithy",
    "gameplay.services.buildings.stable",
    "gameplay.services.inventory.guest_growth_helpers",
    "gameplay.services.inventory.guest_reset_helpers",
    "gameplay.services.missions_impl.finalization_helpers",
    "gameplay.services.missions_impl.launch_post_actions",
    "gameplay.services.raid.combat.refresh_flow",
    "gameplay.services.raid.*",
    "gameplay.services.recruitment.*",
    "gameplay.services.resources",
    "gameplay.services.runtime_configs",
    "gameplay.services.technology",
    "gameplay.services.technology_catalog",
    "gameplay.services.technology_helpers",
    "gameplay.services.technology_refresh_state",
    "gameplay.services.technology_rules",
    "gameplay.services.technology_runtime",
    "guests.services.*",
    "guilds.constants",
    "trade.selectors",
    "trade.services.bank_service",
]
disallow_untyped_defs = true
