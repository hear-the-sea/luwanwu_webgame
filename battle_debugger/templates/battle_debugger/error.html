{% extends "base.html" %}

{% block title %}错误 - 战斗调试器{% endblock %}

{% block extra_head %}
<style>
/* 错误页面样式 */
.debugger-container {
    padding: 1.5rem;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 60vh;
}

.error-card {
    background: var(--bg-panel);
    border: 2px solid #8B2500;
    border-radius: 10px;
    overflow: hidden;
    max-width: 500px;
    width: 100%;
    box-shadow: 0 8px 24px rgba(139, 37, 0, 0.2);
}

.error-card-header {
    background: linear-gradient(135deg, #8B2500, #6B1D00);
    color: #FFF8E7;
    padding: 1rem 1.2rem;
    font-weight: 700;
    font-size: 1.1rem;
    display: flex;
    align-items: center;
    gap: 0.5rem;
}

.error-card-body {
    padding: 1.5rem;
}

.error-message {
    color: var(--text-primary);
    font-size: 1rem;
    line-height: 1.6;
    margin-bottom: 1.5rem;
    padding: 1rem;
    background: #fff5f5;
    border-radius: 6px;
    border-left: 4px solid #8B2500;
}

/* 操作按钮 */
.action-buttons {
    display: flex;
    gap: 0.8rem;
    flex-wrap: wrap;
}

.btn-primary {
    background: linear-gradient(180deg, #8B4513 0%, #6B3410 100%);
    border: 2px solid #5A2E0D;
    color: #FFF8E7;
    padding: 0.6rem 1.2rem;
    border-radius: 6px;
    font-weight: 700;
    font-size: 0.95rem;
    cursor: pointer;
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
    transition: all 0.2s;
}

.btn-primary:hover {
    background: linear-gradient(180deg, #7A3B10 0%, #5A2E0D 100%);
}

.btn-secondary {
    background: var(--bg-hover);
    border: 2px solid var(--border-primary);
    color: var(--text-secondary);
    padding: 0.6rem 1.2rem;
    border-radius: 6px;
    font-weight: 600;
    font-size: 0.95rem;
    cursor: pointer;
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
    transition: all 0.2s;
}

.btn-secondary:hover {
    background: var(--bg-panel);
    color: var(--text-primary);
}
</style>
{% endblock %}

{% block content %}
<div class="debugger-container">
    <div class="error-card">
        <div class="error-card-header">
            <span>⚠️</span> 发生错误
        </div>
        <div class="error-card-body">
            <div class="error-message">
                {{ error }}
            </div>
            <div class="action-buttons">
                <a href="{% url 'battle_debugger:index' %}" class="btn-primary">
                    🏠 返回首页
                </a>
                <a href="javascript:history.back()" class="btn-secondary">
                    ← 返回上页
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
