services:
  redis:
    image: redis:7-alpine
    command:
      - sh
      - -c
      - |
        if [ -n "$$REDIS_PASSWORD" ]; then
          exec redis-server --appendonly yes --requirepass "$$REDIS_PASSWORD";
        fi
        exec redis-server --appendonly yes;
    volumes:
      - redis_data:/data
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"
    restart: unless-stopped

  db:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: webgame
      MYSQL_USER: webgame
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?set MYSQL_PASSWORD in .env.docker}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?set MYSQL_ROOT_PASSWORD in .env.docker}
    volumes:
      - db_data:/var/lib/mysql
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"
    restart: unless-stopped

  web:
    image: ${WEBGAME_IMAGE:-webgame:v1}
    pull_policy: never
    env_file: .env.docker
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    command:
      [
        "bash",
        "/app/docker/entrypoint.sh",
        "daphne",
        "-b",
        "0.0.0.0",
        "-p",
        "8000",
        "config.asgi:application",
      ]
    volumes:
      - ./runtime/media:/app/media
      - ./runtime/staticfiles:/app/staticfiles
    depends_on:
      - db
      - redis
    expose:
      - "8000"
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"
    restart: unless-stopped

  worker:
    image: ${WEBGAME_IMAGE:-webgame:v1}
    pull_policy: never
    env_file: .env.docker
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    command:
      [
        "bash",
        "/app/docker/entrypoint.sh",
        "celery",
        "-A",
        "config",
        "worker",
        "-l",
        "info",
        "-Q",
        "${CELERY_DEFAULT_QUEUE:-default}",
        "--concurrency",
        "${CELERY_DEFAULT_CONCURRENCY:-2}",
        "--prefetch-multiplier",
        "${CELERY_PREFETCH_MULTIPLIER:-1}",
        "--max-tasks-per-child",
        "${CELERY_MAX_TASKS_PER_CHILD:-500}",
      ]
    volumes:
      - ./runtime/media:/app/media
    depends_on:
      - db
      - redis
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"
    restart: unless-stopped

  worker_battle:
    image: ${WEBGAME_IMAGE:-webgame:v1}
    pull_policy: never
    env_file: .env.docker
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    command:
      [
        "bash",
        "/app/docker/entrypoint.sh",
        "celery",
        "-A",
        "config",
        "worker",
        "-l",
        "info",
        "-Q",
        "${CELERY_BATTLE_QUEUE:-battle}",
        "--concurrency",
        "${CELERY_BATTLE_CONCURRENCY:-4}",
        "--prefetch-multiplier",
        "${CELERY_PREFETCH_MULTIPLIER:-1}",
        "--max-tasks-per-child",
        "${CELERY_MAX_TASKS_PER_CHILD:-500}",
      ]
    volumes:
      - ./runtime/media:/app/media
    depends_on:
      - db
      - redis
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"
    restart: unless-stopped

  worker_timer:
    image: ${WEBGAME_IMAGE:-webgame:v1}
    pull_policy: never
    env_file: .env.docker
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    command:
      [
        "bash",
        "/app/docker/entrypoint.sh",
        "celery",
        "-A",
        "config",
        "worker",
        "-l",
        "info",
        "-Q",
        "${CELERY_TIMER_QUEUE:-timer}",
        "--concurrency",
        "${CELERY_TIMER_CONCURRENCY:-2}",
        "--prefetch-multiplier",
        "${CELERY_PREFETCH_MULTIPLIER:-1}",
        "--max-tasks-per-child",
        "${CELERY_MAX_TASKS_PER_CHILD:-500}",
      ]
    volumes:
      - ./runtime/media:/app/media
    depends_on:
      - db
      - redis
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"
    restart: unless-stopped

  beat:
    image: ${WEBGAME_IMAGE:-webgame:v1}
    pull_policy: never
    env_file: .env.docker
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    command:
      - bash
      - /app/docker/entrypoint.sh
      - celery
      - -A
      - config
      - beat
      - -l
      - info
      - --schedule
      - /var/run/celerybeat-schedule
    volumes:
      - ./runtime/celerybeat:/var/run
    depends_on:
      - db
      - redis
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./runtime/staticfiles:/staticfiles:ro
      - ./runtime/media:/media:ro
    depends_on:
      - web
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"
    restart: unless-stopped

volumes:
  db_data:
  redis_data:
