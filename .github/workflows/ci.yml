name: CI

on:
  push:
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.lock.txt ]; then
            pip install -r requirements.lock.txt
          fi
          # Ensure dev tools (mypy/black/pre-commit) are available.
          pip install -r requirements-dev.txt

      - name: Lint (flake8)
        run: |
          python -m flake8 --jobs=1 accounts battle gameplay guests guilds trade core websocket config tests

      - name: Type check (mypy)
        continue-on-error: true
        run: |
          python -m mypy .

      - name: Tests (pytest)
        env:
          DJANGO_DEBUG: "0"
          DJANGO_ALLOWED_HOSTS: "localhost,127.0.0.1"
          DJANGO_SECRET_KEY: "ci-only-not-a-real-secret-key-change-me-1234567890"
        run: |
          python manage.py check --deploy
          python -m pytest -q
