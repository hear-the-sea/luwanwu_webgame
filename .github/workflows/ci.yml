name: CI

on:
  push:
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.lock.txt ]; then
            pip install -r requirements.lock.txt
          fi
          pip install -r requirements-dev.txt
          # Type-checking deps (keep them small/stable for CI).
          pip install "mypy>=1.8" "django-stubs>=5.0" "django-stubs-ext>=5.0" "types-PyYAML"

      - name: Lint (flake8)
        run: |
          python -m flake8 --jobs=1 accounts battle gameplay guests guilds trade core websocket config tests

      - name: Type check (mypy)
        run: |
          python -m mypy accounts battle common config core gameplay guests guilds tasks trade websocket

      - name: Unit Tests (pytest + coverage)
        env:
          DJANGO_DEBUG: "0"
          DJANGO_ALLOWED_HOSTS: "localhost,127.0.0.1"
          DJANGO_SECRET_KEY: "ci-only-not-a-real-secret-key-change-me-1234567890"
        run: |
          python manage.py check --deploy
          python -m coverage run -m pytest -q -m "not integration"
          # Coverage target: incrementally raise from 60% → 65% → 70% → 75%
          python -m coverage report --fail-under=75
          python -m coverage xml -o coverage-unit.xml

      - name: Upload Unit Coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-unit
          path: coverage-unit.xml

  # ── 集成测试门禁 ──────────────────────────────────────────────────────────
  # 以下类型的 PR 改动必须通过本 job 才能合并（hermetic 单元测试无法覆盖真实语义）：
  #
  #   - core/utils/cache_lock.py          → 分布式锁行为（locmem 是进程内锁）
  #   - gameplay/services/arena/**        → 并发状态机（依赖 select_for_update 行锁）
  #   - gameplay/models/arena.py          → DB 约束变更（MySQL 约束在 SQLite 下部分不生效）
  #   - common/utils/celery.py            → 任务调度（broker 行为需真实 Redis）
  #   - 任何含 select_for_update() 的路径  → SQLite 下 select_for_update 是 no-op
  #   - 任何含分布式锁（cache_lock）的路径  → 跨进程互斥需真实 Redis
  #
  # 本地等价命令：DJANGO_TEST_USE_ENV_SERVICES=1 make test-integration
  # ─────────────────────────────────────────────────────────────────────────
  integration-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_DATABASE: webgame_test
          MYSQL_USER: webgame
          MYSQL_PASSWORD: webgame
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.lock.txt ]; then
            pip install -r requirements.lock.txt
          fi
          pip install -r requirements-dev.txt

      - name: Wait for MySQL and Redis
        run: |
          for i in {1..30}; do
            nc -z 127.0.0.1 3306 && nc -z 127.0.0.1 6379 && break
            sleep 2
          done

      - name: Integration Tests (MySQL + Redis)
        env:
          DJANGO_DEBUG: "0"
          DJANGO_ALLOWED_HOSTS: "localhost,127.0.0.1"
          DJANGO_SECRET_KEY: "ci-only-not-a-real-secret-key-change-me-1234567890"
          DJANGO_TEST_USE_ENV_SERVICES: "1"
          DJANGO_DB_ENGINE: "django.db.backends.mysql"
          DJANGO_DB_NAME: "webgame_test"
          DJANGO_DB_USER: "webgame"
          DJANGO_DB_PASSWORD: "webgame"
          DJANGO_DB_HOST: "127.0.0.1"
          DJANGO_DB_PORT: "3306"
          REDIS_URL: "redis://127.0.0.1:6379"
          REDIS_BROKER_URL: "redis://127.0.0.1:6379/0"
          REDIS_RESULT_URL: "redis://127.0.0.1:6379/0"
          REDIS_CHANNEL_URL: "redis://127.0.0.1:6379/1"
          REDIS_CACHE_URL: "redis://127.0.0.1:6379/2"
        run: |
          python manage.py migrate --noinput
          python manage.py check --deploy
          python -m coverage run -m pytest -m integration -q
          python -m coverage report -m
          python -m coverage xml -o coverage-integration.xml

      - name: Upload Integration Coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-integration
          path: coverage-integration.xml
