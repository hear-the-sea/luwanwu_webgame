name: CI

on:
  push:
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.lock.txt ]; then
            pip install -r requirements.lock.txt
          fi
          # Type-checking deps (keep them small/stable for CI).
          pip install "mypy>=1.8" "django-stubs>=5.0" "django-stubs-ext>=5.0" "types-PyYAML"

      - name: Lint (flake8)
        run: |
          python -m flake8 --jobs=1 accounts battle gameplay guests guilds trade core websocket config tests

      - name: Type check (mypy)
        run: |
          python -m mypy accounts battle common config core gameplay guests guilds tasks trade websocket

      - name: Tests (pytest + coverage)
        env:
          DJANGO_DEBUG: "0"
          DJANGO_ALLOWED_HOSTS: "localhost,127.0.0.1"
          DJANGO_SECRET_KEY: "ci-only-not-a-real-secret-key-change-me-1234567890"
        run: |
          python manage.py check --deploy
          python -m coverage run -m pytest -q
          python -m coverage report --fail-under=60

  integration-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_DATABASE: webgame_test
          MYSQL_USER: webgame
          MYSQL_PASSWORD: webgame
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.lock.txt ]; then
            pip install -r requirements.lock.txt
          fi

      - name: Wait for MySQL and Redis
        run: |
          for i in {1..30}; do
            nc -z 127.0.0.1 3306 && nc -z 127.0.0.1 6379 && break
            sleep 2
          done

      - name: Integration Tests (MySQL + Redis)
        env:
          DJANGO_DEBUG: "0"
          DJANGO_ALLOWED_HOSTS: "localhost,127.0.0.1"
          DJANGO_SECRET_KEY: "ci-only-not-a-real-secret-key-change-me-1234567890"
          DJANGO_TEST_USE_ENV_SERVICES: "1"
          DJANGO_DB_ENGINE: "django.db.backends.mysql"
          DJANGO_DB_NAME: "webgame_test"
          DJANGO_DB_USER: "webgame"
          DJANGO_DB_PASSWORD: "webgame"
          DJANGO_DB_HOST: "127.0.0.1"
          DJANGO_DB_PORT: "3306"
          REDIS_URL: "redis://127.0.0.1:6379"
          REDIS_BROKER_URL: "redis://127.0.0.1:6379/0"
          REDIS_RESULT_URL: "redis://127.0.0.1:6379/0"
          REDIS_CHANNEL_URL: "redis://127.0.0.1:6379/1"
          REDIS_CACHE_URL: "redis://127.0.0.1:6379/2"
        run: |
          python manage.py migrate --noinput
          python -m pytest -m integration -q
