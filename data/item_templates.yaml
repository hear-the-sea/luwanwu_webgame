# 物品模板配置
# image 字段（可选）：指定物品图片相对路径，相对于 data/images/items/ 目录
#
# 物品分类说明：
# - 资源类：grain(粮食)、tong(铜)、xi(锡)、tie(铁)、gold_bar(金条)、zitanmu(紫檀木)等
# - 畜牧类：ji(鸡)、ya(鸭)、e(鹅)、zhu(猪)、niu(牛)
# - 药品类：止血散、金创药、白芨丸、白草丹、丁香丹、天香玉露丸、补血丹
# - 经验道具：经验桃子、经验果
# - 功能道具：放大镜、庄园命名卡、免战牌
# - 技能书：龙吟破阵秘术等
# - 装备-头盔：斗笠、布帽、牛皮帽、铁叶盔、鱼鳞顶、白虹盔
# - 装备-护甲：蓑衣、布袍、生皮甲、厚丝袍、鲨皮甲
# - 装备-鞋子：草鞋、布鞋、羊皮靴、钢片靴、燕羽靴
# - 装备-武器(剑)：竹杖、短剑、长剑、青芒剑、断马剑
# - 装备-武器(刀)：短刀、大砍刀、铜长刀、精铁刀
# - 装备-武器(枪)：长枪、豹尾枪、虎头矛、盘蛇枪
# - 装备-武器(弓)：长弓、反曲弓、铁胎弓、神臂弓
# - 装备-武器(鞭)：长鞭、牛皮鞭、棘刺鞭、九龙钢鞭、冥蛇节鞭
# - 装备-饰品：茱萸叶
# - 装备-器械：饕餮鼎
# - 装备-坐骑：枣红马、黄膘马、大宛马
#
# 稀有度说明：black(白色/普通) < green(绿色/优秀) < blue(蓝色/稀有) < purple(紫色/史诗)

items:

