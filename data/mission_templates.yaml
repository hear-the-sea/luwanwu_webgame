  - key: taozi_fenban
    name: 我的桃子分你一半
    description: |
      终南山为道教发祥地之一。据传，周康王时，函谷关关令尹喜，在山中结草为楼，每日登草楼观星望气。一日圣人老子经过此关，尹喜忙把老子请到楼观，执弟子礼，请其讲经著书。老子为尹喜讲授《道德经》五千言后飘然而去。传说今日楼观台的说经台就是当年老子讲经之处。道教产生后，尊老子为道祖，尹喜为文始真人，奉《道德经》为根本经典。于是终南山上的楼观成了"天下道林张本之地"。

      日后在山上修行的道士们在山下种了一片桃林，一方面种桃树可以修身养性、锻炼身体，这桃树还是道士们除妖降魔的利器桃木剑的主要材料，而且这道家圣地的桃林结的桃子也不普通，是三年开花三年结果的"仙桃"，吃了它不仅功力倍增，而且练起功来更是事半功倍，因此这山下的桃林对于道士们来说十分的重要。

      而另一方面众多孤魂野鬼也盯上了这片桃林，由于它是道士们制造桃木剑材料的主要来源，如果能占据它，那道士们就没有办法对付他们了，于是大批的妖魔鬼怪一同聚集到了这片桃林，道士们知道这样下去的结果是不堪设想的，妖魔鬼怪会给人间带来极大的灾难，于是他们进行了多次尝试想驱散妖怪们，但由于寡不敌众均败下阵来，就在这紧要关头他们向各大庄主发去了求援信，希望能借助强大庄主的力量来平定这场灾难，当然作为回报他们将赠与你15个经验桃子以示感谢。
    battle_type: task1

    enemy_guests:
      - key: base_black_civil
        label: 孤魂野鬼

    drop_table:
      experience_peach: 15

    daily_limit: 3

  - key: simian_chuge
    name: 四面楚歌
    difficulty: advanced
    description: |
      楚汉相争时期，项羽、刘邦于荥阳、成皋相持两年多。项羽因腹背受敌，少食无助，被迫与刘邦订立和，以鸿沟为界，东归楚、西属汉。次年，刘邦、韩信、刘贾、彭越、英布等各路汉军约计40万人与10万楚军于垓下展开决战。汉军以韩信率军居中，将军孔熙为左翼、陈贺为右翼，刘邦率部跟进，将军周勃断后。韩信挥军进攻失利，引兵后退，命左、右翼军继续攻击。楚军迎战不利，韩信再挥军反击。楚军大败，退入壁垒坚守，被汉军重重包围。楚军屡战不胜，兵疲食尽。

      张良又命围困项羽的各营兵士吹奏楚乐，楚兵闻之，顿时涌起思乡之情，军心涣散，项羽也疑心汉军已进楚地，遂与美人虞姬对饮帐中，奋然起舞，悲歌慷慨，歌数阙，美人和之，慷慨悲凉，脍炙人口。项王涕泪行行，左右皆泣，莫能仰视。未几，虞姬自杀。项羽跨上乌骓协着姬首，率兵800突围而去，至乌江仅剩下26人，形势危急，您是否发兵相助，以求逆天？
    battle_type: task1

    enemy_guests:
      - hist_qinhan_0022
      - hist_qinhan_0138
      - hist_qinhan_0146

    enemy_troops:
