# 注意事项
# ============================================================
# 1. 修改此文件后，需要运行命令重新加载：
#    python manage.py load_mission_templates
#
# 2. 门客模板的 key 必须在数据库中存在（GuestTemplate）
#
# 3. 兵种的 key 必须在 troop_templates.yaml 中定义
#
# 4. 物品的 key 必须在 item_templates.yaml 中定义
#
# 5. 科技等级配置仅影响敌方，不会影响玩家
#
# 6. 门客等级和属性加成配置仅影响敌方门客，不会影响玩家门客
#
# 7. 掉落概率为 0.0-1.0 之间的小数，1.0 表示必定掉落
