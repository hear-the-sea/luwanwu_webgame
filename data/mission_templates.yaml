  - key: tianpeng_dijiao_2
    name: 天蓬元帅的地窖（第二层）
    description: |
      天蓬元帅猪八戒在完成了跟随唐僧西天取经的重任后，混得了一个肥的流油的美差——净坛使者。不说人前人后，吃不完的山珍海味，更有深谙拍马溜须功夫的小妖小仙送上各种宝物，让天蓬元帅高兴之余也苦恼不已，净坛使者那小小地界根本无处可以存放东西。这时候天蓬元帅想起了N年前被搁置的他用来存放食物的高老庄地窖。

      找到灵感的天蓬元帅喜滋滋的驾着他的装宝大车回到高老庄，却发现地窖内一片狼藉，他最喜欢的菠萝被抢劫了一大半。天蓬元帅怒从心头起，恶向胆边生。呔，哪方小贼，竟然胆敢洗劫本使者的粮仓！

      这时，一绝色美貌狐仙扭着腰肢冲着天蓬元帅狂抛媚眼，八戒哥您消消气，气坏了身子可不好涅，对付这等小贼，奴家愿献上妙计。八戒哥一见美人便七荤八素，当下将满车宝物及地窖的后期开发工程交给了小狐仙。

      小狐仙的目的其实是那满车宝物，可怜八戒有了美女就没了大脑，至此以后那车宝贝和地窖都归了小狐仙所有。小狐仙一时间没有地方存放宝贝，于是将地窖开发成好几层，并在各处委派了法力高强的妖仙好友把守。

      消息不胫而走，各庄园主在尝过了菠萝的甜头后，将眼光伸向了小狐仙的藏宝库，小狐仙等着接招吧……
    battle_type: task1

