  - key: manzu_ruqin
    name: 蛮族入侵
    difficulty: advanced
    description: |
      北方的蛮族首领大胡子单于对中原广阔的土地已经虎视眈眈了许久，终于时机成熟他带领着他那强大的军队踏上了侵略中原的征程，眼看一场腥风血雨的浩劫即将席卷而来，可中原的各大庄主还浑然不知，这时蛮族军队中的一个打杂的坐不住了，他名叫蒲巴乙，这位小伙子长得十分帅气，因为父亲是胡人母亲是汉人的关系，所以他没有蛮族人粗陋的习俗，但他也并非自愿投军的。

      话说那日他为了参加"村有好男儿"的比赛正在山坡上练歌，刚唱了一句就被人一棍子打晕了，醒来后他发现他和村里的许多壮丁已经被抓到军营里了，他们被强征入伍，随军出征在军队中干杂活。当他想到中原即将生灵涂炭，就再也坐不住了，他想去通知中原的庄主们让他们对即将到来的战争做好准备，于是他偷了匹马乘着夜色逃出了军营，向着中原狂奔而去。
    battle_type: task1
    is_defense: true

    enemy_guests:
      - key: base_gray_military
        label: 单于

    enemy_troops:
      qiang_wang: 1000

    drop_table:
      silver: 50000
      work_chest_small: 1  # TODO: 替换为幸运宝箱
      equip_xiaoweikaijia: 0.1
      pubayi_guest_card: 0.1

    daily_limit: 3

  - key: zhuiji_manzu
    name: 追击蛮族
    description: |
      在蛮族入侵时，小伙子蒲巴乙为拯救中原的人们，使他们避免成为蛮族铁蹄下的冤魂，他偷偷溜出军营骑着马向着中原狂奔而去，经过七天七夜的日夜兼程，最后连马都累死在了半路上，终于他赶在蛮族军队到来之前向庄主们发出了蛮族准备入侵的讯息，各地的庄主得到了讯息之后，立即停止了互相征战，准备联手抗击蛮族，他们准备了周密的计划准备给大胡子单于来个"瓮中捉鳖"。

      很快蛮族的军队开始了攻城略地，一路上都十分顺利，其间只遭到了庄主们象征性的抵抗，这种轻而易举就取得胜利的状况开始让蛮族的军队放松了戒心，大胡子单于也开始幻想着在关内放牧的情景，然而他们不知道他们正一步步走进庄主们给他们布下的天罗地网。

      终于一天夜里领主们趁着夜色对蛮族军营发动了偷袭，毫无提防的蛮族士兵还没反应过来就已经被打得溃不成军，纷纷丢盔弃甲，落荒而逃。大胡子单于更是丢盔弃甲，落荒而逃，现在是抉择的时候了，到底是穷寇莫追，还是追击蛮族让他们再也不敢踏入中原半步呢？一切都由你决定！
    battle_type: task1

    enemy_guests:
      - key: base_gray_military
        label: 单于

    enemy_troops:
      qiang_wang: 1000

    drop_table:
      silver: 30000

    daily_limit: 3

