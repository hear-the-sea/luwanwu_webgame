# ============================================================
# 任务模板配置文件
# ============================================================
# 本文件用于配置游戏中的任务（副本），包括敌方阵容、难度、掉落奖励等
#
# 配置字段说明：
# ============================================================

# missions: 任务列表
#   每个任务包含以下字段：
#
# 【基础信息】
#   - key: 任务唯一标识符（必填，字符串）
#   - name: 任务显示名称（必填，字符串）
#   - description: 任务描述文本（可选，字符串）
#   - battle_type: 战斗类型（可选，默认"task"）
#   - is_defense: 防守任务（可选，默认false，敌方来袭）
#   - daily_limit: 每日挑战次数限制（可选，默认3次，整数）
#   - base_travel_time: 往返基础耗时，单位：秒（可选，默认1200秒=20分钟，整数）
#
# 【敌方阵容配置】
#   - enemy_guests: 敌方门客列表（可选，支持两种格式）
#       * 格式1（字符串）：直接填入门客模板key（向后兼容）
#         示例：
#           enemy_guests:
#             - special_hero_dugu_qiubai
#             - special_hero_dongfang_bubai
#
#       * 格式2（对象）：可为每个门客单独配置技能
#         示例：
#           enemy_guests:
#             - key: special_hero_sao_di_seng
#               skills:               # 单独配置此门客的技能
#                 - dragon_roar
#             - key: special_hero_dugu_qiubai
#               skills:
#                 - stratagem_burst
#             - special_hero_dongfang_bubai  # 不配置skills则使用模板默认技能
#
#       * 最多3个门客（由 MAX_SQUAD 常量决定）
#       * 不填则无敌方门客
#       * 技能优先级：单独配置 > enemy_technology.guest_skills > 模板初始技能
#
#   - enemy_troops: 敌方护院（小兵）配置（可选，字典）
#       * 格式：{兵种key: 数量}
#       * 可用兵种：dao_ke, dao_jie, dao_sheng (刀系)
#                   qiang_bing, qiang_jiang, qiang_shuai (枪系)
#                   jian_shi, jian_hao, jian_sheng (剑系)
#                   quan_tu, quan_shi, quan_zong (拳系)
#                   gong_shou, archer, gong_sheng (弓系)
#       * 示例：dao_ke: 500 表示 500 个刀客
#
# 【敌方强度配置】
#   - enemy_technology: 敌方科技和加成配置（可选，字典）
#       * 该配置仅影响敌方，不影响玩家
#
#       【护院（小兵）科技配置】
#       - level: 统一科技等级（0-10，整数）
#           * 0级：无科技加成
#           * 每级：+10% 攻防血敏 + 特殊效果
#           * 10级：+100% 攻防血敏 + 满级特殊效果
#           * 特殊效果包括：
#             - 刀系：双倍打击几率（狂狼必杀）
#             - 枪系：反击几率（反戈一击）
#             - 剑系：伤害反弹（护身剑罡）、先攻伤害（驭剑之术）
#             - 拳系：远程防御（万宗归流）、战斗回血（五气朝元）
#             - 弓系：额外先攻伤害（凤舞九天）、近战加成（短刃杀法）
#
#       - levels: 精细化科技配置（可选，字典）
#           * 格式：{科技key: 等级}
#           * 用于单独调整某些科技的等级
#           * 会覆盖 level 的统一配置
#           * 示例：dao_attack: 8  # 刀系攻击科技8级
#
#       【门客强度配置】
#       - guest_level: 敌方门客等级（1-100，整数，可选，默认50）
#           * 仅影响敌方门客，不影响玩家门客
#           * 等级影响门客的基础属性和生命值
#           * 门客带兵上限 = 基础值 + 等级门槛加成 + 装备/套装加成
#           * 推荐配置：
#             - 新手任务：20-40级
#             - 日常任务：40-60级
#             - 主线任务：60-75级
#             - 精英任务：75-90级
#             - 噩梦副本：90-100级
#
#       - guest_bonus: 敌方门客属性加成（0.0-1.0，浮点数，可选）
#           * 仅影响敌方门客，不影响玩家门客
#           * 表示百分比加成，如 0.3 = +30%
#           * 应用于：攻击、防御、生命（100%）、敏捷（50%）
#           * 推荐配置：
#             - 简单任务：0.0 - 0.1 (无加成或+10%)
#             - 普通任务：0.1 - 0.2 (+10% - +20%)
#             - 困难任务：0.2 - 0.4 (+20% - +40%)
#             - 噩梦副本：0.5 - 1.0 (+50% - +100%)
#
#       - guest_skills: 敌方门客临时技能（字符串数组，可选）
#           * ⚠️ 重要：会覆盖门客模板中定义的初始技能
#           * 为所有敌方门客统一赋予指定技能
#           * 可用于：
#             - 为没有技能的门客临时赋予技能
#             - 统一所有BOSS的技能配置
#             - 创造特殊的战斗玩法
#           * 示例：
#             guest_skills:
#               - dragon_roar      # 龙吟破阵（对3个敌人造成伤害）
#               - stratagem_burst  # 奇策突袭（对1个敌人造成伤害并眩晕）
#           * 可用技能列表（定义在 guest_skills.yaml）：
#             - dragon_roar: 龙吟破阵 - 威力260, 对3个敌人
#             - stratagem_burst: 奇策突袭 - 威力220, 对1个敌人, 可眩晕
#           * 注意：如果不配置此字段，门客将使用模板中的初始技能
#
# 【掉落奖励配置】
#   - drop_table: 固定掉落或概率掉落（可选，字典）
#       * 格式：{物品key: 数量/概率/配置}
#       * 数量为整数：表示固定掉落
#         示例：silver: 10000  # 固定掉落 10000 银两
#       * 数量为小数（0.0-1.0）：表示概率掉落
#         示例：book_dragon_roar: 0.5  # 50%概率掉落技能书
#         示例：equip_tiejian: 0.1  # 10%概率掉落铁剑
#       * 字典格式：{chance: 概率, count: 数量} 支持概率+数量组合
#         示例：experience_pineapple: {chance: 0.3, count: 5}
#       * 可用物品类型：
#         - 资源：silver (银两)
#         - 道具：experience_peach (经验桃), buxuedan (补血丹), fangdajing (放大镜)
#         - 技能书：book_dragon_roar (龙吟), book_phoenix_dance (凤舞) 等
#         - 装备：equip_caomao (草帽), equip_buyi (布衣), equip_tiejian (铁剑) 等
#
# ============================================================
# 配置示例
# ============================================================

missions:
  # ========================================
  # 门客任务：华山论贱
  # ========================================
  - key: huashan_lunjian
    name: 华山论贱
    description: |
      中原大地，经过无数年的风吹雨打，各大贱派均元气大伤，数百年的休养调整使各大贱客高手知耻后勇，不断创新各种贱术秘籍，停办经年的贱客比武大赛将顺应民意在华山之巅重新开启，各路英雄贱客可在此大展身手，争当新一届人见人爱、花见花开的贱客之王，在此和谐社会留下自己奋斗的印记。
    battle_type: task1
    guest_only: true

    enemy_guests:
      - key: base_gray_military
        label: 贱王之王
      - key: base_gray_military
        label: 顶级贱精
      - key: base_gray_military
        label: 顶级贱精
      - key: base_black_civil
        label: 观众甲

    drop_table:
      silver: 3000

    daily_limit: 3


  # ========================================
  # 测试任务：临时技能覆盖测试
  # ========================================
  - key: test_temporary_skills
    name: 临时技能测试
    description: 测试任务中的临时技能覆盖功能，所有BOSS使用统一技能。
    battle_type: task

    # 敌方门客：2个高手
    enemy_guests:
      - special_hero_dugu_qiubai      # 独孤求败（原有技能）
      - base_black_civil              # 黑阶学士（无技能）

    # 敌方护院：少量刀客
    enemy_troops:
      dao_ke: 300

    # 敌方强度配置（包含临时技能）
    enemy_technology:
      level: 3               # 3级科技
      guest_level: 50        # 50级门客
      guest_bonus: 0.1       # +10%属性加成
      # 临时技能：为所有敌方门客统一赋予以下技能（会覆盖原有技能）
      guest_skills:
        - dragon_roar        # 龙吟破阵
        - stratagem_burst    # 奇策突袭

    # 掉落奖励
    drop_table:
      silver: 5000           # 5000 银两
      experience_peach: 5    # 5 个经验桃

    base_travel_time: 300    # 5 分钟
    daily_limit: 10          # 每日 10 次


  # ========================================
  # 防守任务：瓦岗寨的逆袭
  # ========================================
  - key: wagangzhai_nixi
    name: 瓦岗寨的逆袭
    difficulty: intermediate
    description: |
      在上一次广大庄园主联手扫荡瓦岗寨时，正值瓦岗五虎出门执行任务，翟让和程咬金输的并不服气，为了证明瓦岗寨的实力，翟让率领瓦岗五虎"秦叔宝"、"单雄信"、"王伯当"、"罗成"、"程咬金"携山寨喽啰兵600人亲自上各庄园寻衅……这一次的战场变成了您的庄园，请加强防御设施，让您的门客和护院准备好迎接战斗洗礼。
    battle_type: task1
    is_defense: true

    enemy_guests:
      - key: hero_zhai_rang
        skills:
          - tangseng_sermon
      - key: hero_qin_shubao
        skills:
          - brahma_true_fire
      - hero_dan_xiongxin
      - hero_wang_bodang
      - hero_luo_cheng
      - hero_cheng_yaojin

    enemy_technology:
      level: 3               # 3级科技
      guest_level: 50        # 50级门客
      guest_bonus: 0.1       # +10%属性加成

    enemy_troops:
      arrow_god: 200
      quan_sheng: 200
      qiang_wang: 200

    drop_table:
      silver: 40000
      book_ice_curse: 0.2
      experience_pineapple:
        chance: 0.3
        count: 5
      equip_feiyunzui: 0.1

    base_travel_time: 20
    daily_limit: 3


  # ========================================
  # 任务系统指南导入
  # ========================================
  - key: jingyanggang
    name: 景阳冈
    description: |
      景阳冈上有只吊睛白额大虫伤害人命，官府多次派猎户擒捉未果，往客商人只能在巳午未三个时辰结伴过冈，其馀时分，及单身客人，不能过冈，恐被伤害性命。
    battle_type: task1
    guest_only: true

    enemy_guests:
      - key: base_black_military
        label: 猛虎

    drop_table:
      silver: 2000

    daily_limit: 3

  - key: wulongshan
    name: 乌龙山
    description: |
      湘黔边界的乌龙山鲜少人迹，这里盘聚着一帮强盗将那里作为他们的大本营。他们借这乱世之际四处行凶，烧杀凌掠无恶不作，种种罪行令人发指。由于此帮强盗行迹过于放肆导致朝野上下为之震动，朝廷号召各方能人尽快歼灭这帮流寇。
    battle_type: task1

    enemy_guests:
      - key: base_black_military
        label: 钻山豹
      - key: base_black_military
        label: 座山雕

    enemy_troops:
      qiang_ke: 200

    drop_table:
      silver: 10000

    daily_limit: 3

  - key: wagangzhai
    name: 瓦岗寨
    description: |
      瓦岗寨原来的寨主翟让被程咬金击败后让出寨主之位，程咬金自号"大魔国混世魔王"，并带领瓦岗军四处出门踢馆打劫，引得各地庄园主怨声在道，大家决定联手打击瓦岗寨，维护和保障各庄园的和平与稳定。
    battle_type: task1

    enemy_guests:
      - hero_cheng_yaojin
      - hero_zhai_rang

    enemy_troops:
      jian_xia: 400

    drop_table:
      silver: 20000

    daily_limit: 3

  - key: fugui_shanzhuang
    name: 富贵山庄
    description: |
      富贵山庄，其美甲天下、其富可敌国，庄主张富贵更是好客之人，但凡江湖有难，他都不遗余力伸出援助之手，解人燃眉。故被人予以"雪中炭"之美名。江湖多有时运不济、怀才不遇的落魄之士，若想求得张庄主帮助，必先证明自己才识。在接受庄主考验后，若能得到庄主赏识，则日后必荣禄相授。
    battle_type: task1
    guest_only: true

    enemy_guests:
      - key: base_gray_military
        label: 武师教头

    drop_table:
      silver: 30000
      experience_peach: 6

    daily_limit: 3

  - key: shizipo_heidian
    name: 十字坡黑店
    description: |
      孙二娘和张青在十字坡开酒店，常用蒙汗药蒙翻过往行人。他们将行人杀死后，大块好肉当作黄牛肉卖，零碎小肉，做馅包馒头。江湖有传言说："大树十字坡，客人谁敢那里过？肥的切做馒头馅，瘦的却丢去填河。"
    battle_type: task1

    enemy_guests:
      - key: base_black_military
        label: 孙二娘
      - key: base_black_military
        label: 张青

    enemy_troops:
      quan_wang: 300
      divine_archer: 300
      dao_ba: 100

    drop_table:
      silver: 30000

    daily_limit: 3

  - key: shanhaiguan
    name: 山海关
    difficulty: intermediate
    description: |
      山海关所在的河西走廊是华北通向东北的咽喉地带，是一座及其重要的军事重镇，主要防御外族势力的入侵。吴三桂作为镇守山海关的大将，居然意图勾结外族势力，入侵中原。
    battle_type: task1

    enemy_guests:
      - hist_mingqing_0230
      - hist_mingqing_0054

    enemy_troops:
      jian_sheng: 500
      quan_wang: 500
      qiang_ba: 500

    drop_table:
      silver: 40000

    daily_limit: 3

  - key: shiren_daochang
    name: 十人道场
    description: |
      十人道场是春秋世界初级试炼之地，由恶人谷十大恶人驻守。只要能击败十大恶人，通过试炼，就能极速提升门客的等级和能力。
    battle_type: task1

    enemy_guests:
      - hero_du_sha
      - hero_li_dazui
      - hero_hahaer
      - hero_tu_jiaojiao
      - hero_yin_jiuyou
      - key: base_black_civil
        label: 萧咪咪
      - key: base_black_civil
        label: 轩辕三光
      - key: base_black_military
        label: 铁战
      - hero_bai_kaixin
      - key: base_black_military
        label: 罗氏兄弟

    drop_table:
      silver: 20000
      experience_peach: 9

    daily_limit: 3

  - key: jiguanshou_chuxian
    name: 机关兽初现
    description: |
      乔家村以制做灵活轻巧、栩栩如生的「机械猫」闻名于天下。「机械猫」又称之为「钟离猫」，相传是墨家子弟孙钟离路过此地时，时逢村中鼠患肆虐，为清除鼠患取当地木材仿猫型制成。经历代乔家村民不断改良，「机械猫」以生具灵性、精巧无比，并作用于生活各用途中。某日乔家村第一铁匠乔大牛家中被盗，八只刚制成的「机械猫」见房门未锁，逃离乔家村。随后，逃离的八只「机械猫」开始在乔家村附近肆虐作恶，搞得乔家村民苦不堪言。
    battle_type: task1

    enemy_guests:
      - key: base_black_military
        label: 改装机械猫
      - key: base_black_military
        label: 改装机械猫
      - key: base_black_military
        label: 改装机械猫
      - key: base_black_military
        label: 改装机械猫
      - key: base_black_military
        label: 改装机械猫
      - key: base_black_military
        label: 改装机械猫
      - key: base_black_military
        label: 改装机械猫
      - key: base_black_military
        label: 改装机械猫

    drop_table:
      equip_jixiemao: 1

    daily_limit: 3

  - key: biwu_zhaoqin
    name: 比武招亲
    description: |
      苏州首富杜万年之女杜莞尔芳龄二八，登门求亲者络绎不绝，门庭若市。杜老爷既不想得罪朝廷中人，也不愿把女儿嫁给草莽之士，于是想出一招比武招亲。奇就奇在这代杜千金比武的，不是人，而是一只战斗熊。此熊周身每个关节都可活动，内部充满各种机关，战斗力强。比武当天无人能出其右，最终竟由穷小子管无介出马搏得头筹。原来小姐早已芳心暗许，只因那固执的父亲介意门第之见。管无介经众人帮助，得到铸熊大师珍藏图纸，命中熊身要害，一击即中。杜老爷在众人面前也不能食言而肥，只得将女儿许配给比赛冠军。管无介如愿以偿，开心抱得美人归。
    battle_type: task1
    guest_only: true

    enemy_guests:
      - key: base_gray_military
        label: 机关熊

    drop_table:
      silver: 20000

    daily_limit: 3

  - key: tianpeng_dijiao_1
    name: 天蓬元帅的地窖（第一层）
    description: |
      天蓬元帅何许人也，我想不必多加介绍，他的大名你我也都如雷贯耳了。天蓬元帅耳大招风，腰缠"万贯"，气宇方刚，心宽体胖。当然，他最出名的还是吃，不仅会吃，吃遍天下美食，还私藏了许多琼浆玉液、佳肴珍馐。每次天庭大请宾筵，我们的大元帅都是不仅吃得饱饱的，还要兜着走。拿了这么多食物，一时半会儿也消灭不了，那到底放在哪里才算妥当安全呢？天蓬元帅还真是聪明，他想到他在高老庄的老相好，还有他那个老丈人，也是很喜欢这个勤奋的女婿的，他们特地留出一块上好的、超大平方米、黄金地段、冬暖夏凉的地窖给猪女婿保存食物。要说天神也有打瞌睡的时候，天蓬元帅乘天门打开之际，每次都私自下凡，偷渡美食于此地窖中。经年累月，地窖倒也藏了不少宝贝。
    battle_type: task1

    enemy_guests:
      - key: base_black_military
