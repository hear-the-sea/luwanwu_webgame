  - key: dongtian_fudi
    name: 洞天福地
    description: |
      传说"洞天福地"位于西部大雪山之巅，当年丘真人携唯一弟子在此闭关修炼，洞内集日月精华，物华天宝俊彩星驰。百年后一场雪崩覆盖了洞口，珍贵的道家秘籍、炼丹点金之术也遭雪掩埋，就此不流于世。多年后各大门派竞相寻找此地，企图寻找求仙捷径。然而"洞天福地"内机关重重、关卡奥妙也是众所皆知，至今闯入禁区者无人生还。要想寻找财富，除了勇气，还需傲人的智慧和体魄才行。
