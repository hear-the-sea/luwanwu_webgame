  - key: jiguan_chuniao
    name: 机关雏鸟
    description: |
      话说江家堡被仇家围攻，四面受敌，堡内粮草只能维持3天生计，突围的任务迫在眉睫。堡主曾派壮丁驾快马送信求救，可惜都遭遇埋伏。管家之子江犁墨献上自制的木结构机关雏鸟。其鸟可避弓矢，自动飞达目的地。江家堡靠此木鸟最终送出求救信号，得盟友支援解困。后来此鸟被奉为堡内"幸运鸟"，经改造后功能更强大，已成为江家堡著名的机关武器之一。
