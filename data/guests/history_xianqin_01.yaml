heroes:
  orange:
  - key: hist_xianqin_0001
    name: 嬴政
    default_gender: male
    archetype: military
    flavor: （前259年—前210年）六王毕，四海一。他以雷霆之势横扫六合，吞并八荒，终结五百年乱世纷争。北筑长城以拒匈奴，南开灵渠以通百越；书同文、车同轨、统一度量衡，奠定华夏大一统之基。焚书坑儒虽遭后世诟病，然其开创之功，实为千古一帝。始皇既没，大秦二世而亡，然其建立的帝国框架，延续两千余年。功过是非，任后人评说，唯那横扫六合的霸气，至今仍令人心驰神往。
    growth_range:
    - 8
    - 12
    attribute_weights:
      force: 42
      intellect: 18
      defense: 24
      agility: 16
  - key: hist_xianqin_0002
    name: 姬昌
    default_gender: male
    archetype: civil
    flavor: （约前1152年—约前1056年）积德累仁，奠基王业。他是周朝的奠基者，被后世尊为周文王。羑里被囚七年，推演《周易》六十四卦，化卜筮之术为哲学之道。他礼贤下士，渭水访贤得姜尚，文韬武略汇于一朝。三分天下有其二，却仍以臣事殷，其隐忍与大略，为后世帝王楷模。虽未亲见灭商，然武王伐纣之师，实为文王积蓄。《诗经》赞曰"文王在上，于昭于天"，其德如日月经天，照耀华夏三千年。
    growth_range:
    - 8
    - 12
    attribute_weights:
      force: 12
      intellect: 52
      defense: 22
      agility: 14
  - key: hist_xianqin_0003
    name: 姬发
    default_gender: male
    archetype: military
    flavor: （?—约前1043年）牧野一战，开创周朝八百年基业。他是周武王，继承文王遗志，率诸侯联军伐纣，以正义之师克不义之君。牧野誓师，殷纣倒戈，一战定乾坤。灭商之后，分封诸侯，奠定周朝八百年基业。他以武功显赫，却以仁德治世，开创了中国历史上最长的王朝。周公辅政、成康之治，皆发端于武王之德。其功业之伟，足以与秦皇汉武并肩，而其仁德之厚，更胜一筹。
    growth_range:
    - 8
    - 12
    attribute_weights:
      force: 44
      intellect: 14
      defense: 26
      agility: 16
  - key: hist_xianqin_0004
    name: 姒禹
    default_gender: male
    archetype: civil
    flavor: （约前2123年—约前2025年）三过家门而不入，治水定九州。他是上古圣王，夏朝的开创者。其父鲧治水九年，堵而不疏，功败垂成被殛于羽山。禹承父志，改堵为疏，十三年栉风沐雨，终平水患，划九州、铸九鼎，建立华夏第一个世袭王朝。他的治水精神，成为中华民族不屈不挠的象征；他创立的夏朝，开启了华夏文明的国家时代。《尚书》赞曰"茫茫禹迹，画为九州"，其功盖天地，德配日月。
    growth_range:
    - 8
    - 12
    attribute_weights:
      force: 16
      intellect: 48
      defense: 22
      agility: 14
  - key: hist_xianqin_0005
    name: 子履
    default_gender: male
    archetype: civil
    flavor: （?—约前1588年）顺天应人，代夏立商。他是商朝开国之君，又称成汤、商汤。夏桀无道，民怨沸腾，他以七十里之薄国而有天下之志。网开三面彰显仁德，鸣条之战一举灭夏。他任用伊尹为相，以宽仁治国，商朝由此兴盛六百年。汤之革命，是以有道伐无道的典范，"顺天应人"的思想由此确立。他沐雨祷旱、以身为牺的故事，更显其爱民如子之心。成汤之德，与尧舜禹并称，是华夏圣王的典范。
    growth_range:
    - 8
    - 12
    attribute_weights:
      force: 14
      intellect: 50
      defense: 22
      agility: 14
  purple:
  - key: hist_xianqin_0006
    name: 孔丘
    default_gender: male
    archetype: civil
    flavor: （前551年—前479年）万世师表，至圣先师。他生于礼崩乐坏之世，却以一己之力重塑华夏精神脊梁。周游列国十四载，虽累累若丧家之犬，却从未放弃仁义之道。删诗书、定礼乐、序周易、作春秋，有教无类三千弟子，七十二贤才遍布天下。他的思想如日月经天，照耀东方两千余年，不仅塑造了华夏文明的精神内核，更深刻影响了整个东亚文化圈。儒学大道，至今不衰。
    growth_range:
    - 7
    - 10
    attribute_weights:
      force: 8
      intellect: 62
      defense: 18
      agility: 12
  - key: hist_xianqin_0007
    name: 李耳
    default_gender: male
    archetype: civil
    flavor: （约前571年—约前471年）紫气东来，道法自然。他骑青牛出函谷关，留五千言《道德经》而西去，从此不知所踪。这位周室守藏之吏，以无为之道参透天地玄机，以柔弱之姿揭示至强之理。上善若水，大音希声，大象无形——其言玄之又玄，却是众妙之门。道家思想与儒学分庭抗礼，共同构建华夏哲学之根基。两千年来，无数修道之士寻觅其踪迹，欲得长生大道，而老子之名，已入仙班。
    growth_range:
    - 7
    - 10
    attribute_weights:
      force: 6
      intellect: 64
      defense: 18
      agility: 12
  - key: hist_xianqin_0008
    name: 孙武
    default_gender: male
    archetype: military
    flavor: （约前545年—约前470年）知己知彼，百战不殆。这位来自齐国的兵法大师，以一部《孙子兵法》震古烁今。吴宫教战斩美姬，以示军法无情；西破强楚五战五捷，威震诸侯。其兵法十三篇，言简意赅却包罗万象，从战略到战术，从庙算到实战，无所不备。上兵伐谋，不战而屈人之兵——这等境界，后世将帅穷尽毕生难以企及。此书东传日本、西入欧美，成为世界军事理论之圣典。兵家鼻祖，实至名归。
    growth_range:
    - 7
    - 10
    attribute_weights:
      force: 38
      intellect: 28
      defense: 20
      agility: 14
  - key: hist_xianqin_0009
    name: 孟轲
    default_gender: male
    archetype: civil
    flavor: （约前372年—前289年）亚圣之名，当之无愧。他继承孔子之道，发扬光大，提出性善论，倡民为贵、社稷次之、君为轻。其浩然正气，养于胸中，至大至刚，塞于天地之间。其母三迁择邻、断机教子的故事，至今传颂。他敢于直面诸侯，言辞犀利，针砭时弊，虽不见用于当世，却影响后世两千年。孟子之道，与孔子并称孔孟之道，是儒家思想的重要组成部分，塑造了华夏民族的精神品格与道德追求。
    growth_range:
    - 7
    - 10
    attribute_weights:
      force: 8
      intellect: 60
      defense: 20
      agility: 12
  - key: hist_xianqin_0010
    name: 庄周
    default_gender: male
    archetype: civil
    flavor: （约前369年—前286年）逍遥游世，齐物论道。他梦为蝴蝶，不知蝴蝶为我，还是我为蝴蝶；他濠梁之上观鱼之乐，与惠子辩论那亘古难解的哲学命题。他笑谈骷髅、拒绝相位，宁曳尾于涂中，也不愿困于庙堂之上。其文汪洋恣肆，想象瑰丽，是哲学也是文学，是思想也是艺术。鲲鹏展翅九万里，抟扶摇而上青天——这等境界，唯庄子能书。道家思想至庄周而臻于化境，其逍遥精神，千古传诵。
    growth_range:
    - 7
    - 10
    attribute_weights:
      force: 6
      intellect: 62
      defense: 18
      agility: 14
  - key: hist_xianqin_0011
    name: 墨翟
    default_gender: male
    archetype: civil
    flavor: （约前479年—前381年）兼爱非攻，摩顶放踵。他出身工匠，却创立了与儒家分庭抗礼的墨家学派。其门徒纪律严明，赴汤蹈火在所不辞，堪称先秦第一"侠义"组织。他精通工艺机关，守城之术冠绝天下；止楚攻宋一事，更显其言行合一的侠者风范。墨家思想虽在秦后式微，但其兼爱、非攻、尚贤、节用的理念，与现代价值观多有暗合。这位两千年前的侠者，至今仍令人敬仰。
    growth_range:
    - 7
    - 10
    attribute_weights:
      force: 18
      intellect: 50
      defense: 20
      agility: 12
  - key: hist_xianqin_0012
    name: 荀况
    default_gender: male
    archetype: civil
    flavor: （约前313年—前238年）性恶论者，礼法大师。他是儒家的集大成者，却教出了韩非、李斯这两位法家巨擘。其学问博大精深，既传承孔孟之道，又广采诸子之长，开创了儒法合流的先河。他主张人性本恶，需以礼法教化；隆礼重法，则天下可治。荀子之学，既有儒家的温情脉脉，又有法家的严峻冷峭，是百家争鸣时代的最后一位大师。他的思想，深刻影响了此后两千年的中国政治制度。
    growth_range:
    - 7
    - 10
    attribute_weights:
      force: 10
      intellect: 58
      defense: 20
      agility: 12
  - key: hist_xianqin_0013
    name: 商鞅
    default_gender: male
    archetype: civil
    flavor: （约前395年—前338年）变法图强，虽死国强。他本是卫国公孙，却在秦国实现了惊天伟业。徙木立信、刑其师傅，以铁腕手段推行变法，将积贫积弱的秦国改造成虎狼之师。废井田、开阡陌、奖军功、行县制——这一系列改革，奠定了秦国统一天下的根基。他虽被车裂而死，但变法之策未废，秦国终成霸业。商君之法，严峻冷酷，却有效无比，为后世法家奉为圭臬。功过是非，任人评说，唯变法图强之志，令人钦佩。
    growth_range:
    - 7
    - 10
    attribute_weights:
      force: 14
      intellect: 54
      defense: 20
      agility: 12
  - key: hist_xianqin_0014
    name: 韩非
    default_gender: male
    archetype: civil
    flavor: （约前280年—前233年）法家集大成者，《韩非子》作者。他生为韩国公子，却不见用于本国；身有口吃之疾，却以文章名震天下。其书被秦王嬴政击节叹赏，不惜发兵攻韩以得此人。法、术、势三者并用，是为帝王之学。然而这位法家巨擘，终被同门李斯所害，饮鸩而亡，未能亲见秦并六国。孤愤、说难之篇，尽显其心中郁结；而其学说，却成为秦汉帝国的统治根基，影响后世两千年。
    growth_range:
    - 7
    - 10
    attribute_weights:
      force: 8
      intellect: 60
      defense: 20
      agility: 12
  - key: hist_xianqin_0015
    name: 管夷吾
    default_gender: male
    archetype: civil
    flavor: （约前723年—前645年）春秋第一相，九合诸侯功臣。他本是公子纠的谋士，与齐桓公有一箭之仇，却被鲍叔牙力荐，化敌为友，共创霸业。尊王攘夷、一匡天下，使齐国成为春秋首霸。其治国之术，涵盖政治、经济、军事、外交诸方面，堪称百家之学的先驱。管鲍之交，更是千古佳话，知己难求，莫若鲍叔牙。管仲之才，孔子亦赞之；管仲之法，后世争相效仿。这位布衣卿相，实乃华夏政治家的典范。
    growth_range:
    - 7
    - 10
    attribute_weights:
      force: 12
      intellect: 56
      defense: 20
      agility: 12
  - key: hist_xianqin_0016
    name: 姬旦
    default_gender: male
    archetype: civil
    flavor: （?—约前1032年）制礼作乐，辅政安邦。他是武王之弟，成王之叔，却一心辅佐幼主，绝无篡位之念。一沐三捉发，一饭三吐哺，恐失天下贤才，此等赤诚，千古难觅。他平定三监之乱，东征殷商余孽；制定周礼，奠定华夏礼乐文明之根基。孔子毕生向往周公之治，"吾不复梦见周公"之叹，道尽儒家对周公的景仰。周公之德，是为后世臣子楷模；周公之制，影响华夏三千年。
    growth_range:
    - 7
    - 10
    attribute_weights:
      force: 14
      intellect: 54
      defense: 20
      agility: 12
  - key: hist_xianqin_0017
    name: 屈原
    default_gender: male
    archetype: civil
    flavor: （约前340年—前278年）行吟泽畔，怀沙自沉。他是楚国贵族，却因谗言被流放；他忧国忧民，却只能在汨罗江畔独自彷徨。《离骚》一篇，开创楚辞一体，香草美人的寄托，浪漫瑰丽的想象，成为中国文学史上的不朽丰碑。举世皆浊我独清，众人皆醉我独醒——这等高洁，这等孤傲，唯屈子能当。五月五日他怀沙投江，后世以龙舟竞渡、粽子祭祀来纪念这位伟大的爱国诗人。楚辞之祖，诗人之宗。
    growth_range:
    - 7
    - 10
    attribute_weights:
      force: 8
      intellect: 60
      defense: 18
      agility: 14
  - key: hist_xianqin_0018
    name: 姜小白
    default_gender: male
    archetype: military
    flavor: （?—前643年）春秋首霸，尊王攘夷。他是齐桓公，以管仲为相，九合诸侯、一匡天下。北伐山戎救燕、南阻楚国北进，以霸主之姿维护周室尊严。葵丘之盟，诸侯宾服，齐国威震四方。然晚年昏聩，宠信佞臣，竖刁、易牙、开方之流祸乱朝政。病死宫中，诸子争立，尸体停于床上六十七日无人收殓，蛆虫爬出门外。一代霸主，晚景凄凉，令人唏嘘。然其尊王攘夷之功，开春秋霸业之先河，功不可没。
    growth_range:
    - 7
    - 10
    attribute_weights:
      force: 38
      intellect: 22
      defense: 24
      agility: 16
  - key: hist_xianqin_0019
    name: 姬重耳
    default_gender: male
    archetype: military
    flavor: （前697年—前628年）流亡十九年，复国成霸业。他是晋文公，年少遭难，辗转八国十九年，尝尽人间冷暖。城濮之战大破楚军，践土之盟成为霸主。退避三舍的典故，正是他报恩守信的明证。他任用狐偃、赵衰等贤臣，使晋国称霸中原百年。其人生经历跌宕起伏，从流亡公子到一代霸主，堪称励志典范。晋文之霸，不在武功，在于德政；不在兵强，在于人和。
    growth_range:
    - 7
    - 10
    attribute_weights:
      force: 36
      intellect: 22
      defense: 24
      agility: 18
  - key: hist_xianqin_0020
    name: 芈旅
    default_gender: male
    archetype: military
    flavor: （?—前591年）问鼎中原，三年不鸣。他是楚庄王，继位之初三年不理朝政，群臣惶恐。有人问曰："南方有鸟，三年不鸣，鸣将惊人；三年不飞，飞将冲天。"果然，他一朝奋起，诛杀奸佞，任用孙叔敖等贤臣，楚国大治。邲之战大败晋军，饮马黄河，问鼎周室。"鼎之轻重，未可问也"——周室虽衰，天命未改，庄王识时务而退。其雄才大略，不减齐桓晋文，春秋五霸之一，实至名归。
    growth_range:
    - 7
    - 10
    attribute_weights:
      force: 40
      intellect: 20
      defense: 24
      agility: 16
  - key: hist_xianqin_0021
    name: 嬴任好
    default_gender: male
    archetype: military
    flavor: （前682年—前621年）秦穆公霸西戎，奠秦国根基。他重用百里奚、蹇叔等人才，称霸西戎，拓地千里。他三置晋君，虽崤之战惨败，仍矢志东出。其胸襟博大，能容人过、用人长。他死后以贤臣陪葬，虽受后世诟病，却也可见其对人才的珍视。秦国从西陲小国到战国强秦，秦穆公奠定了关键基础。西戎霸主，秦之雄主，穆公当之无愧。
    growth_range:
    - 7
    - 10
    attribute_weights:
      force: 38
      intellect: 20
      defense: 26
      agility: 16
  - key: hist_xianqin_0022
    name: 姬寤生
    default_gender: male
    archetype: military
    flavor: （前757年—前701年）春秋小霸，敢射天子。他是郑庄公，以弱胜强，击败诸侯联军；假命伐宋，令诸侯侧目。繻葛之战中，郑军射伤周桓王肩膀，王室威严扫地。他处理叔段之乱，"不及黄泉，无相见也"，后掘地见母，成就黄泉见母的佳话。他的称霸，虽不如齐桓晋文之盛，却开启了诸侯争霸的时代。春秋首位真正意义上的霸主，郑庄公实为先驱。
    growth_range:
    - 7
    - 10
    attribute_weights:
      force: 38
      intellect: 20
      defense: 24
      agility: 18
  - key: hist_xianqin_0023
    name: 曾参
    default_gender: male
    archetype: civil
    flavor: （前505年—前435年）宗圣曾子，孝道之宗。他以孝著称，"曾子杀猪"教子诚信的故事流传千古。他著《大学》，将修身齐家治国平天下的理念系统阐述。他传承孔子之道，开创儒家道统传承。"吾日三省吾身"的自省精神，至今仍是修身的圭臬。曾子之学，传子思，子思传孟子，形成儒家正统传承。宗圣之名，当之无愧。
    growth_range:
    - 7
    - 10
    attribute_weights:
      force: 8
      intellect: 58
      defense: 22
      agility: 12
  - key: hist_xianqin_0026
    name: 仲由
