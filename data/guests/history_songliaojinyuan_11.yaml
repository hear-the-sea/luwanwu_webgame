heroes:
  blue:
  - key: hist_songliaojinyuan_0502
    name: 喻皓
    default_gender: male
    archetype: civil
    flavor: （生卒年不详）喻皓，其人处世谨严，行事有节，常于看似琐碎处守住政令的筋骨。逢灾荒、迁徙或兵后重建，他多采用分层处置，先保秩序，再图长效。其人善守底线而不失通权，使地方社会在压力下仍保有修复能力。
    growth_range:
    - 6
    - 9
    attribute_weights:
      force: 14
      intellect: 54
      defense: 21
      agility: 11
  - key: hist_songliaojinyuan_0576
    name: 滕宗谅
    default_gender: male
    archetype: military
    flavor: （生卒年不详）滕宗谅，其战场存在感不靠夸耀，而靠一次次关键节点的有效处置。在攻守转换节点，他善于抓住半日之机，常以小调度换来大战线稳定，其经历说明，名将之难不在一时勇力，而在长期维系军心与秩序。
    growth_range:
    - 6
    - 9
    attribute_weights:
      force: 42
      intellect: 13
      defense: 26
      agility: 19
  - key: hist_songliaojinyuan_0552
    name: 焦赞
    default_gender: male
    archetype: military
    flavor: （生卒年不详）焦赞，在宏大战争叙事里，他或许不总居于中心，却常决定战线是否崩断，其用兵兼具刚猛与审慎：可攻则进，不可久战则迅速收束战线；这种可持续的军事治理能力，正是他区别于一般猛将的核心标识。
    growth_range:
    - 6
    - 9
    attribute_weights:
      force: 47
      intellect: 16
      defense: 23
      agility: 14
  green:
  - key: hist_songliaojinyuan_0496
    name: 巢谷
    default_gender: male
    archetype: civil
    flavor: （生卒年不详）巢谷，其履历像一卷平实公牍，少有惊艳章句，却处处见功夫。其公牍风格简严明白，减少了政令误读，也提升了执行确定性。其人并不追逐锋芒，反以耐烦与细密见长，故在长期治理里更显珍贵。
    growth_range:
    - 3
    - 7
    attribute_weights:
      force: 13
      intellect: 56
      defense: 17
      agility: 14
  - key: hist_songliaojinyuan_0497
    name: 孔延龄
    default_gender: male
    archetype: civil
    flavor: （生卒年不详）孔延龄，其人处世谨严，行事有节，常于看似琐碎处守住政令的筋骨。逢灾荒、迁徙或兵后重建，他多采用分层处置，先保秩序，再图长效。其人善守底线而不失通权，使地方社会在压力下仍保有修复能力。
