  - key: hist_songliaojinyuan_0498
    name: 孔端立
    default_gender: male
    archetype: civil
    flavor: （生卒年不详）孔端立，面对礼法与现实的碰撞，他更愿意从细部着手，缓慢却有效地修补秩序。其所长在于把士人论辩转译为执行清单，使理念能够穿过层层官僚结构到达民间，其人不避难题，也不迷信猛药，往往靠持续修补积小胜为大安。
    growth_range:
    - 3
    - 7
    attribute_weights:
      force: 11
      intellect: 55
      defense: 16
      agility: 18
  - key: hist_songliaojinyuan_0499
    name: 孔若愚
    default_gender: male
    archetype: civil
    flavor: （生卒年不详）孔若愚，其生平枝节未必齐备，但从零散记载中仍可辨出一条清晰的治事线索。其治务思路讲“缓急有序”，不以短期政绩透支地方承受力。这种克制与务实，让他成为理学名义与行政实践之间少见的连接点。
    growth_range:
    - 3
    - 7
    attribute_weights:
      force: 11
      intellect: 57
      defense: 18
      agility: 14
