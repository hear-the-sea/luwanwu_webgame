  - key: hist_xianqin_0255
    name: 赵盾
    default_gender: male
    archetype: civil
    flavor: （?—前601年）晋国执政，功过参半。他是晋国历史上最有权势的大臣之一，执政二十余年，权倾朝野。他起用贤才、改革内政，使晋国保持了霸主地位。然而他独揽朝政，引起晋灵公的忌恨。灵公荒淫无道，以弹弓射人取乐，赵盾多次劝谏无效，反遭灵公派人刺杀。他被迫出逃，在他离开都城尚未出境时，其族人赵穿刺杀了灵公。史官董狐秉笔直书："赵盾弑其君。"赵盾辩解说他已出逃，董狐答："子为正卿，亡不越竟，反不讨贼，非子而谁？"这段"董狐直笔"的公案，成为千古争议的话题。
    growth_range:
    - 5
    - 9
    attribute_weights:
      force: 14
      intellect: 52
      defense: 20
      agility: 14
  - key: hist_xianqin_0269
    name: 芈八子
    default_gender: female
    archetype: civil
    flavor: （?—前265年）宣太后，铁腕女主。她是楚国公主，嫁给秦惠文王为妃，生下秦昭襄王。惠文王死后，她以太后身份临朝称制三十六年，成为战国时期最有权势的女性。她知人善任，用弟弟魏冉掌军政、用白起为主将，秦国在她的统治下不断扩张，蚕食六国。她外交手腕高超，曾与义渠王私通数年，生下两子，最后设计诱杀义渠王于甘泉宫，吞并义渠国。她晚年恋上面首魏丑夫，临终欲令其殉葬，被大臣庸芮以"地下无知觉"巧言劝止。她的一生，是权力与欲望的传奇。
    growth_range:
    - 6
    - 9
    attribute_weights:
      force: 10
      intellect: 56
      defense: 18
      agility: 16
  - key: hist_xianqin_0271
    name: 嫪毐
    default_gender: male
    archetype: military
    flavor: （?—前238年）秦国巨奸，假宦真乱。他是战国末期最声名狼藉的人物之一。吕不韦为摆脱与赵太后的纠缠，将嫪毐假冒宦官送入宫中侍奉太后。嫪毐与赵太后私通多年，竟生下两个儿子，封侯拜爵，权势熏天。秦始皇二十二岁亲政前夕，嫪毐发动叛乱欲夺权，兵败被擒。秦始皇大怒，将其车裂示众，夷灭三族，两个私生子也被装入麻袋摔死。嫪毐之乱是秦始皇亲政前最大的政治风波，也暴露了秦宫内部的腐败与混乱。他的名字成为乱臣贼子、祸国殃民的代名词。
    growth_range:
    - 6
    - 9
    attribute_weights:
      force: 38
      intellect: 14
      defense: 24
      agility: 24
  - key: hist_xianqin_0272
    name: 赵太后
    default_gender: female
    archetype: civil
    flavor: （?—前228年）秦始皇生母，丑闻缠身。她原名赵姬，本是邯郸富商之女，先为吕不韦姬妾，后被献给在赵国为质的秦公子异人（后来的秦庄襄王）。庄襄王早逝后，她成为太后。她与吕不韦旧情难断，又与嫪毐私通生子，丑闻震惊朝野。嫪毐之乱后，秦始皇一度将她幽禁，后在群臣劝谏下才恢复母子关系。她的放荡行为给年少的秦始皇留下深重的心理阴影，有人认为秦始皇不立皇后、焚书坑儒的极端性格与此有关。她的一生，是秦宫最大的丑闻。
    growth_range:
    - 6
    - 9
    attribute_weights:
      force: 8
      intellect: 52
      defense: 20
      agility: 20
  - key: hist_xianqin_0281
    name: 胡亥
    default_gender: male
    archetype: military
    flavor: （前230年—前207年）秦二世，亡国之君。他是秦始皇的幼子，在赵高的操纵下登上帝位。他即位后沉迷于声色犬马，将朝政大权尽数交给赵高。赵高指鹿为马，铲除异己，他竟然毫无察觉。当陈胜吴广起义的消息传来，他说"鼠窃狗盗，不足忧也"；当项羽攻破函谷关，他仍在宫中饮酒作乐。最终赵高逼他自杀，秦朝名存实亡。他是典型的昏君亡国之君：既无才能又无远见，既无担当又无主见，只知享乐不问政事，终于葬送了父皇的千秋基业。
    growth_range:
    - 6
    - 9
    attribute_weights:
      force: 32
      intellect: 18
      defense: 26
      agility: 24
  - key: hist_xianqin_0253
    name: 张孟谈
    default_gender: male
    archetype: civil
    flavor: （生卒年不详）赵襄子谋士，反间灭智。他是三家分晋的关键人物。智伯联合韩、魏攻赵，水灌晋阳，城中"悬釜而炊，易子而食"，赵氏危在旦夕。他献计赵襄子：智伯骄横，韩、魏是被迫从征，其实心怀不满。他秘密出城，说服韩、魏两家反水，约定共同反杀智伯。那一夜，韩、魏掘开河堤反灌智伯军营，赵军乘势杀出，智伯大败身死，智氏灭族。此战之后，晋国实际上已被赵、韩、魏三家瓜分，三家分晋成为定局。张孟谈以三寸不烂之舌，改写了历史的走向。
    growth_range:
    - 6
    - 9
    attribute_weights:
      force: 10
      intellect: 56
      defense: 18
      agility: 16
  - key: hist_xianqin_0254
    name: 屠岸贾
    default_gender: male
    archetype: military
    flavor: （生卒年不详）晋国奸臣，赵氏仇敌。他是晋灵公的宠臣，为人阴险狠毒，与正直的赵盾势不两立。晋灵公被赵穿弑杀后，他对赵氏怀恨在心，伺机报复。晋景公时期，他诬告赵氏有谋反之心，带兵围杀赵氏全族，满门老幼三百余口尽被屠戮。唯有赵氏孤儿赵武在程婴、公孙杵臼的舍命保护下幸免于难。十五年后，赵武在韩厥的支持下复仇，屠岸贾被灭族。他的故事因元杂剧《赵氏孤儿》而广为流传，成为中国古代奸臣的典型代表。他的阴狠与程婴的忠义形成鲜明对照，善恶到头终有报。
    growth_range:
    - 6
    - 9
    attribute_weights:
      force: 36
      intellect: 20
      defense: 24
      agility: 20
  - key: hist_xianqin_0257
    name: 姬夷皋
    default_gender: male
    archetype: military
    flavor: （?—前607年）荒淫暴君，咎由自取。他是晋国国君，以荒淫残暴著称于世。他在高台上以弹弓射人，看人躲避取乐；厨师做熊掌不合口味，他竟将其杀死，让宫女用筐抬尸而过朝堂。大臣赵盾屡次进谏，他不仅不听，反而派刺客鉏麑去行刺赵盾。鉏麑见赵盾清晨穿戴整齐准备上朝，感其忠正，不忍下手，撞树而死。灵公又设宴埋伏甲士欲杀赵盾，被赵盾的护卫提弥明舍命救出。他最终被赵穿刺杀于桃园，成为春秋时期昏君暴政的典型。他的故事警示后人：失德丧道，必遭天谴。
    growth_range:
    - 6
    - 9
    attribute_weights:
      force: 34
      intellect: 18
      defense: 26
      agility: 22
  - key: hist_xianqin_0258
    name: 姬周
    default_gender: male
    archetype: military
    flavor: （前586年—前558年）晋国复兴之主，中兴明君。他是晋国历史上最英明的君主之一。他即位时年仅十四岁，却展现出超越年龄的成熟与智慧。他任用贤才，整顿内政：起用魏绛推行和戎政策，使晋国北境安定；任用士会、韩厥等能臣，使朝政清明。在他治下，晋国八年之间九合诸侯，再次成为天下霸主。他为政宽仁，不滥杀戮，善于纳谏，赏罚分明。可惜天不假年，他仅在位十五年便英年早逝，年仅二十九岁。若他能长寿，晋国或许不会走向六卿专政、三家分晋的道路。
    growth_range:
    - 6
    - 9
    attribute_weights:
      force: 36
      intellect: 22
      defense: 24
      agility: 18
  - key: hist_xianqin_0263
    name: 嬴荡
    default_gender: male
    archetype: military
    flavor: （前329年—前307年）举鼎而亡，壮志未酬。他是秦惠文王之子嬴荡，以勇武好力著称。他即位后励精图治，拓展疆土，攻取韩国宜阳，打开了秦国东进中原的门户。他雄心勃勃，欲窥周室以示天下。在周室太庙中，他见到象征天下九州的九鼎，一时兴起，与力士比试举鼎。他勉强举起龙文赤鼎，却因气力耗尽而失手，被鼎压断胫骨，当夜气绝身亡，年仅二十三岁。他英年早逝，无子即位，引发了秦国内部的激烈权力斗争。他的死是秦国历史上最戏剧性的意外之一。
    growth_range:
    - 6
    - 9
    attribute_weights:
      force: 44
      intellect: 14
      defense: 24
      agility: 18
  - key: hist_xianqin_0264
    name: 甘龙
    default_gender: male
    archetype: civil
    flavor: （生卒年不详）秦国老臣，守旧派代表。他是秦孝公时期的老臣，代表秦国世族保守势力。当商鞅入秦提出变法主张时，他与之展开了激烈的辩论。他主张"法古无过，循礼无邪"——遵循古法不会有错，依照旧礼不会有害。商鞅则反驳："治世不一道，便国不法古。"辩论以商鞅完胜告终，秦孝公坚定了变法决心。甘龙虽然辩论失败，但他代表了一种思想立场：每一次变革，必然伴随着守旧势力的反对。改革者需要的不仅是好的方案，更需要推动变革的魄力与时机。
    growth_range:
    - 6
    - 9
    attribute_weights:
      force: 10
      intellect: 54
      defense: 22
      agility: 14
  - key: hist_xianqin_0273
    name: 成蟜
    default_gender: male
    archetype: military
    flavor: （?—前239年）秦始皇异母弟，叛国降赵。他是秦庄襄王之子，秦始皇的异母弟弟。秦始皇八年，他奉命率军攻打赵国，却在军中突然叛变，投降了敌国赵国。关于他叛变的原因，史书记载不详，有人认为与嫪毐之乱、宫廷内斗有关。他投赵后不久便死去，死因成谜。他的叛变说明：即便是如日中天的秦国，内部也并非铁板一块。秦始皇统一天下之前，首先要扫除的是内部的隐患——嫪毐之乱、成蟜叛变，都是这一时期的动荡缩影。
    growth_range:
    - 6
    - 9
    attribute_weights:
      force: 38
      intellect: 14
      defense: 26
      agility: 22
  - key: hist_xianqin_0285
    name: 周市
    default_gender: male
    archetype: military
    flavor: （?—前208年）魏国贵族，复国元勋。他是战国魏国贵族的后裔，在大泽乡起义后趁势而起。他率军攻取魏地，拥立魏咎为魏王，恢复魏国社稷。他本人被封为魏相，实际执掌魏国军政大权。然而复国不久，秦将章邯便率军来攻。魏国兵力单薄，难以抵挡秦军精锐。他在与秦军的战斗中失败身亡，魏国再度覆灭。他代表了六国贵族借反秦浪潮复国的努力，虽然最终失败，却说明秦朝的暴政已使六国遗民怀念故国。
    growth_range:
    - 6
    - 9
    attribute_weights:
      force: 38
      intellect: 18
      defense: 26
      agility: 18
  - key: hist_xianqin_0286
    name: 魏咎
    default_gender: male
    archetype: military
    flavor: （?—前208年）战国魏室后裔，复国短命。他是战国魏国王室的后裔，被周市拥立为魏王，恢复了魏国社稷。然而国祚极为短暂，秦将章邯率军攻来，魏军节节败退。临淄（魏都临济）被围，他坚守孤城，向各路义军求援。田儋率齐军来救，却在战斗中阵亡。城破之际，他不愿受辱，自焚而死。他虽为亡国之后，却有宁死不屈的骨气。他的死说明：六国复国的努力虽然波澜壮阔，却在秦军的强大攻势下难以为继。
    growth_range:
    - 6
    - 9
    attribute_weights:
      force: 36
      intellect: 18
      defense: 26
      agility: 20
  green:
  - key: hist_xianqin_0250
    name: 颠颉
    default_gender: male
    archetype: military
    flavor: （?—前636年）晋国功臣，焚山误事。他是追随重耳流亡十九年的功臣之一。晋文公复国后，介之推携母隐居绵山不肯出仕，文公派人寻访不得。颠颉献计放火烧山，以为介之推孝顺必会背母而出。不料大火烧了三天三夜，介之推与母亲抱木而死，誓不下山。晋文公悲痛万分，下令当年此日禁火寒食以示哀悼，这就是寒食节的由来。颠颉因出此馊主意导致忠臣惨死，被晋文公处死以谢天下。他的故事警示后人：好心办坏事，同样要承担后果；出谋划策须慎之又慎。
    growth_range:
    - 3
    - 7
    attribute_weights:
      force: 38
      intellect: 14
      defense: 26
      agility: 22
  - key: hist_xianqin_0251
    name: 董安于
    default_gender: male
    archetype: civil
    flavor: （?—前496年）赵氏家臣，晋阳城主。他是赵简子最信任的家臣，为赵氏家族立下不朽功勋。他主持修筑了晋阳城，这座城池后来成为赵氏的根据地和最后防线。他设计的晋阳城防坚固，城墙以铜铸造，储备充足，易守难攻。赵简子与范氏、中行氏争斗时，就是依靠晋阳城坚守三年才得以翻盘。后来智伯联合韩、魏攻赵，水灌晋阳，赵氏也是凭借晋阳的坚固才熬到反击时机。董安于的远见卓识，为赵氏的崛起奠定了基础，也间接影响了三家分晋的历史走向。
    growth_range:
    - 4
    - 7
    attribute_weights:
      force: 10
      intellect: 56
      defense: 20
      agility: 14
  - key: hist_xianqin_0252
    name: 尹铎
    default_gender: male
    archetype: military
    flavor: （生卒年不详）赵氏家臣，守土有功。他受赵简子之命守卫晋阳城，在赵氏与范氏、中行氏的斗争中发挥了关键作用。他治理晋阳，减轻赋税，爱惜民力，使晋阳百姓归心于赵。当大战来临时，晋阳军民同仇敌忾，誓死守城。正是他平日的善政，换来了危难时刻的众志成城。赵简子评价他：若有急难，晋阳可恃。事实证明，晋阳确实成为赵氏最可靠的后盾。尹铎的故事说明：得民心者得天下，平日的善政是危难时最坚固的城墙。
    growth_range:
    - 4
    - 7
    attribute_weights:
      force: 38
      intellect: 18
      defense: 26
      agility: 18
  - key: hist_xianqin_0256
    name: 赵穿
    default_gender: male
    archetype: military
    flavor: （生卒年不详）弑杀灵公，救族于难。他是赵盾的族人，性格刚烈果断。晋灵公多次谋害赵盾，甚至派刺客鉏麑行刺，赵盾逃出都城。赵穿见灵公暴虐无道、赵氏危在旦夕，遂在桃园设伏，刺杀了晋灵公。他迎回赵盾执政，立晋成公为君。他的弑君行为虽然大逆不道，却保全了赵氏家族免遭灭族之祸。然而"赵盾弑君"的帽子还是扣在了赵盾头上。他的故事展示了春秋时代卿族政治的残酷：在生存与道义之间，有时不得不做出艰难的抉择。他是赵氏危难时刻挺身而出的救星。
    growth_range:
    - 4
    - 7
    attribute_weights:
      force: 42
      intellect: 12
      defense: 26
      agility: 20
  - key: hist_xianqin_0259
    name: 鸠摩
    default_gender: male
    archetype: military
    flavor: （生卒年不详）齐国力士，勇力过人。他是战国时期齐国著名的力士，以蛮力著称，据说能徒手与猛虎搏斗。他与秦国的孟贲、乌获等人齐名，都是那个时代最有名的大力士。然而与白起、王翦那样运筹帷幄的名将相比，这些力士虽然勇武过人，却难以在战场上发挥决定性作用。战国时代已经是大规模军团作战的年代，个人勇武的作用日益有限。他的存在提醒我们：真正的强大不仅在于蛮力，更在于智慧与谋略。匹夫之勇，不足以定天下。
    growth_range:
    - 3
    - 7
    attribute_weights:
      force: 48
      intellect: 8
      defense: 26
      agility: 18
  - key: hist_xianqin_0260
    name: 孟贲
    default_gender: male
    archetype: military
    flavor: （?—前307年）秦国力士，有勇无谋。他是战国时期著名的大力士，力能生拔牛角，勇冠三军。秦武王好勇，广招天下力士，孟贲因此得宠，与乌获、任鄙等人并列于朝。秦武王入周室太庙，见大鼎而欲举之，与孟贲比试力气。武王勉强举起大鼎，却因气力不继，被鼎压断胫骨，不久身亡。孟贲作为侍从左右的力士，不但未能阻止这场悲剧，反而被认为有教唆之嫌。秦昭襄王即位后，将他处死。空有蛮力而无远见，他的结局说明：勇而无谋，终致祸身。
    growth_range:
    - 3
    - 7
    attribute_weights:
      force: 48
      intellect: 8
      defense: 26
      agility: 18
  - key: hist_xianqin_0261
    name: 任鄙
    default_gender: male
    archetype: military
