  - key: hist_qinhan_0145
    name: 苏武
    archetype: military
    flavor: '（前140年—前60年）西汉使者与大臣，字子卿，因出使匈奴被扣留十九年而成为“持节不屈”的象征。史载匈奴以威逼利诱与流放相逼，苏武守节不降，其坚持并非武勇的胜利，而是一场漫长的心理与制度对抗：使者代表的是国家信用，一旦轻易屈服，后续外交便失去底线。苏武能活下来并归国，也与汉匈关系的阶段性变化有关，说明个人命运常被大国关系的潮汐推着走。苏武的故事之所以长久流传，正在于它把“忠”从口号写成了日常消耗：在孤绝处守住一个姿态，比在战场上冲锋更难，也更寂寞。'
    growth_range:
