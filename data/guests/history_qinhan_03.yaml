  - key: hist_qinhan_0147
    name: 解忧公主
    archetype: military
    flavor: '（前120年—前49年）西汉和亲公主，史载细君公主去世后，她续嫁乌孙，历事多位昆莫，在乌孙生活甚久。解忧公主的关键价值不在“远嫁”这一身份，而在她如何在异域长期参与政治：既要在乌孙内斗与部族分化中自保，又要为汉廷维系盟约与情报，使夹击匈奴等战略安排具备可持续性。她的行动证明和亲并非只有被动牺牲，也可能成为一条长期外交渠道——前提是当事人具备足够的判断力、威望与耐心。解忧公主晚年归汉受礼遇，反映汉廷对这种“在边地替国家耗尽半生”的贡献有所承认。写解忧公主，实际上是在写西汉边政最艰难的一种工作：把盟友关系熬成制度惯性。'
    growth_range:
    - 5
    - 9
    attribute_weights:
      force: 48
      intellect: 14
      defense: 26
      agility: 12
  - key: hist_qinhan_0148
    name: 赵破奴
    archetype: military
    flavor: '（生年不详—前91年）西汉将领，活动多在西北边疆。史载其早年辗转匈奴，后归汉从军，随霍去病出征并在西域作战中屡立战功，曾攻破楼兰、车师等地而声名大振。赵破奴的经历更像边疆将领的“高风险轨迹”：功劳来自远征与突袭，风险也来自远征与突袭——一旦兵败被俘、逃归，名声就会被怀疑与猜忌撕开裂口。更致命的是武帝晚年的政治恐惧，巫蛊之祸牵连甚广，赵破奴最终亦遭波及。赵破奴把一个事实写得很清楚：边将的生死并不只在战场，朝廷的疑惧与案件风向同样能决定一个名将之家是否瞬间覆灭。'
    growth_range:
    - 5
