  - key: hist_qinhan_0141
    name: 樊哙
    archetype: military
    flavor: '（前242年—前189年）西汉开国元勋，大将军，舞阳侯。出身狗屠，娶吕后之妹吕媭，与刘邦关系极亲密。他在鸿门宴上持盾闯帐，怒斥项羽，勇救刘邦，展现了非凡的胆识与忠诚。随刘邦征战多年，勇猛无敌，率先登城陷阵。晚年刘邦病重时，曾疑其欲杀赵王如意，命陈平去斩他，幸得陈平保护。刘邦死后，吕后释之。他是汉初最勇猛的战将之一。'
    growth_range:
