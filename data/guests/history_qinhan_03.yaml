# 历史人物门客 - 秦汉时期（第03批：蓝色前49人）

heroes:
  blue:
  - key: hist_qinhan_0100
    name: 丙吉
    archetype: civil
    flavor: '（生年不详—前55年）宽厚长者，救主之功。在巫蛊之祸的腥风血雨中，他冒死保护了尚在襁褓中的皇曾孙（汉宣帝）。宣帝即位后，他绝口不提旧恩，直到宫女上书真相大白。任丞相时，他见人斗殴不问，见牛喘气却停车询问，留下了“丙吉问牛”的典故，体现了宰相抓大放小、关注民生根本的政治智慧。丙吉的可贵还在于分寸感：他不把救主之事变成讨赏资本，也不以苛细察问制造恐惧；在宣帝朝政治逐步回到秩序之际，这种温厚与谨慎反而能让官僚体系更稳定地运转。'
    growth_range:
    - 5
    - 9
    attribute_weights:
      force: 16
      intellect: 46
      defense: 22
      agility: 16
  - key: hist_qinhan_0101
    name: 东方朔
    archetype: civil
    flavor: '（前154年—前93年）西汉武帝朝著名的“滑稽”人物，善以诙谐之辞进谏，见于《汉书》相关记载。他并非只会逗乐：在君主好大喜功、宫廷气氛紧张的时代，直言往往招祸，东方朔用戏谑与机锋把锋芒包起来，让劝谏能被听见也能被消化。后世把他演绎成神仙、偷桃者，多是文学化的再造；而历史中的东方朔更像一位精通人情与权力心理的朝臣，懂得在“近侍”位置上既保持存在感，又不把自己推到刀口上。他的价值在于呈现汉代政治的另一种沟通方式：除了严肃公文，还存在借笑语转圜的进谏与对话。'
    growth_range:
    - 5
    - 9
    attribute_weights:
      force: 16
      intellect: 46
      defense: 22
      agility: 16
  - key: hist_qinhan_0102
    name: 于定国
    archetype: civil
    flavor: '（生年不详—前40年）西汉丞相，字曼倩，史称善断狱而务求宽平。其父于公以明察冤狱闻名，于定国承其家学，既懂律令条文，也懂人情曲直；在廷尉等职上，他重视审慎与程序，强调“可疑则缓”，使案件处理尽量回到证据与法度之内。史载当时有“民自以不冤”的称誉，未必意味着天下无案难断，却说明百姓对司法的信任感提升。于定国的可贵处，正在于把冷硬的刑名变成可被接受的治理工具：不靠滥刑立威，而靠公正让人服法。'
    growth_range:
    - 5
    - 9
    attribute_weights:
      force: 16
      intellect: 46
      defense: 22
      agility: 16
  - key: hist_qinhan_0103
    name: 京房
    archetype: civil
    flavor: '（前77年—前37年）西汉象数易学人物，纳甲筮法常与其名相连。他把《易》学与阴阳五行等体系结合，试图用一套可推演的结构解释灾异与人事，反映西汉后期“以天人解释政治”的思维习惯。史载京房又涉及音律制度等讨论，显示当时学术并不严格分科，象数、律历与政治论证常互相借力。京房更具戏剧性的部分在于他敢以灾异讽谏权臣石显，最终遭祸身死；这说明象数之学并非只供娱乐，很多时候直接参与权力斗争。京房留下的，不只是术数方法，更是一种“把天象当作政治语言”的时代样本。'
    growth_range:
    - 5
    - 9
    attribute_weights:
      force: 16
      intellect: 46
      defense: 22
      agility: 16
  - key: hist_qinhan_0104
    name: 卓文君
    archetype: civil
    flavor: '（生卒年不详）西汉临邛富家之女，与司马相如的故事在史籍与后世文学中反复被书写。夜奔、当垆卖酒等情节之所以动人，不仅因为爱情，更因为它把城市商贾、才士名声与礼法压力放在同一张舞台上：她既要面对家族与乡里的目光，也要在现实生计中为自己的选择负责。至于《白头吟》等作品与细节，后世传抄与演绎成分很重，但“以词章表达自尊”的形象却格外鲜明。卓文君并非单纯的风流谈资，她更像汉代社会里少见的主动者，敢用行动把人生从既定轨道上拽出来。'
    growth_range:
    - 5
    - 9
    attribute_weights:
      force: 16
      intellect: 46
      defense: 22
      agility: 16
  - key: hist_qinhan_0105
    name: 卫子夫
    archetype: civil
    flavor: '（生年不详—前91年）西汉皇后，由歌伎入宫而后母仪天下，其身世转折与汉武帝的用人、后宫格局紧密相连。卫氏因她而显贵，卫青、霍去病等军功人物的崛起又反过来强化了卫氏在朝中的分量，使“后宫—外戚—军功”三条线彼此缠绕。武帝晚年巫蛊之祸爆发，宫廷与继承问题被推到极端，史载卫子夫在风波中被逼自尽，卫氏家族亦由盛转衰。她的命运并不只是个人悲欢，更像一幅结构图：后妃的荣宠可以迅速抬升家族，也可能在政治恐惧与告密机制启动时，把家族一起拖入深渊。'
    growth_range:
    - 5
    - 9
    attribute_weights:
      force: 16
      intellect: 46
      defense: 22
      agility: 16
  - key: hist_qinhan_0106
    name: 召信臣
    archetype: civil
    flavor: '（生卒年不详）西汉循吏，字翁卿，九江人。任南阳太守时，他在南阳兴修水利，建造水排（水力鼓风机的前身）和水门，开垦良田数万顷，使南阳成为沃土。他禁止婚丧嫁娶的铺张浪费，提倡节俭。百姓感念其恩德，尊称其为“召父”，与后来的杜诗并称“前有召父，后有杜母”。召信臣的治理之所以被记住，正在于他把“利民”做成可持续的结构：一头抓水利与生产，一头抓风俗与成本，让地方既能增产也能少耗；这种把工程与教化并行的做法，比单纯严刑更能在日常里积累民心。'
    growth_range:
    - 5
    - 9
    attribute_weights:
      force: 16
      intellect: 46
      defense: 22
      agility: 16
  - key: hist_qinhan_0107
    name: 司马相如
    archetype: civil
    flavor: '（约前179年—前118年）西汉辞赋名家，常被视作“大赋”传统的代表。《子虚赋》《上林赋》以铺陈宏阔著称，表面写苑囿游猎，内里却在描摹帝国的资源、秩序与想象边界：它们既是文学，也是政治修辞。关于他与卓文君的传闻，更显示名士声望如何与城市社会、家族利益纠缠在一起。史载他曾参与朝廷事务与奉使活动，说明才华并非只能停在宴饮唱和，还可能被纳入国家治理的需要。司马相如的复杂处正在这里：一方面他塑造了汉代华丽文风，另一方面他也让人看见文学如何成为帝国自我表述的一部分。'
    growth_range:
    - 5
    - 9
    attribute_weights:
      force: 16
      intellect: 46
      defense: 22
      agility: 16
  - key: hist_qinhan_0108
    name: 尉缭
    archetype: civil
    flavor: '（生卒年不详）传统记载中为秦代军政重臣与兵书作者，名与《尉缭子》相连。书中谈用兵，不只讲阵法攻守，更强调军政组织、赏罚纪律与民力动员，这与秦国“以法为绳”的政治气质相呼应。关于他与秦始皇的往来、对人心险刻的判断，史传色彩浓厚，未必尽可坐实，但也提供了一种观察角度：在高度集权的体制里，谋臣既能借势推动统一，也随时可能因揣度失当而自危。尉缭的形象因此介于理论家与政坛实务者之间，把秦统一背后那种对制度与人性的冷静计算摆在明处：武力之外，还要算组织、纪律与动员。'
    growth_range:
    - 5
    - 9
    attribute_weights:
      force: 16
      intellect: 46
      defense: 22
      agility: 16
  - key: hist_qinhan_0109
    name: 文翁
    archetype: civil
    flavor: '（生卒年不详）西汉循吏，庐江人。任蜀郡守时，见蜀地偏僻，民风未开，便在成都兴办学校（石室），招收子弟入学，并选拔优秀者送往长安学习。他的举措极大地改变了蜀地的文化风气，使蜀地由“蛮夷”变为“文雅”之邦，比齐鲁还要昌盛。史称“文翁化蜀”。文翁的难处在于“见效很慢”：办学要钱，要师资，要让地方家族相信读书值得投入，还要让学成者有出路。他做的其实是一套长期机制——先把课堂立住，再把人才送入中央视野，最后让地方形成自我复制的士风与行政能力；这种耐心，正是地方治理里最稀缺的部分。'
    growth_range:
    - 5
    - 9
    attribute_weights:
      force: 16
      intellect: 46
      defense: 22
      agility: 16
  - key: hist_qinhan_0110
    name: 晁错
    archetype: civil
    flavor: '（前200年—前154年）西汉文、景时期的重要政务官员，主张削弱诸侯王权、加强中央控制，相关事迹见于《史记》《汉书》。晁错的主张触动地方藩国利益，在七国之乱前后成为矛盾的集中点；史载景帝为安抚诸侯与平息局势而诛晁错，使其成为政治妥协的牺牲者。与其把晁错写成单纯“冤或不冤”，更值得注意的是他所处的制度转折：汉初分封体系既是屏藩，也是隐患，中央要强化统治，就必须在削藩、用兵与安抚之间做极难的取舍。晁错的悲剧，正折射这种取舍背后的代价与冷酷。'
    growth_range:
    - 5
    - 9
    attribute_weights:
      force: 16
      intellect: 46
      defense: 22
      agility: 16
  - key: hist_qinhan_0111
    name: 杜诗
    archetype: civil
    flavor: '（生年不详—38年）造福桑梓，水排发明者。任南阳太守时，他发明（或改进并推广）水力鼓风机“水排”，用于冶铁，显著提高冶炼效率，是东汉技术史的重要一笔。他不仅关心器用之利，更能以政务安民：兴修水利、平反冤狱、整饬吏治，百姓歌颂他“前有召父，后有杜母”。杜诗的事迹说明两汉地方治理并非只靠严刑峻法，也可凭实干与技术革新改善民生。'
    growth_range:
    - 5
    - 9
    attribute_weights:
      force: 16
      intellect: 46
      defense: 22
      agility: 16
  - key: hist_qinhan_0112
    name: 淳于意
    archetype: civil
    flavor: '（生于前205年，卒年不详）西汉名医，号仓公，缇萦之父，相关记载见于《史记》。淳于意之所以被后世记住，不仅因医术，更因他留下的诊治记录：通过脉象、病因、用药与转归的叙述，早期医学在经验里逐步形成可复述的“病例”思维。史载他后因事获罪将受刑，其女缇萦上书陈述肉刑之惨，愿以身赎父，触动汉文帝改革刑制。淳于意的故事因此把医学、法律与亲情连在一起：一位医生的专业记录，竟与一场制度性改良的契机发生交汇，也让“救人”不止发生在病榻之旁。'
    growth_range:
    - 5
    - 9
    attribute_weights:
      force: 16
      intellect: 46
      defense: 22
      agility: 16
  - key: hist_qinhan_0113
    name: 甘英
    archetype: civil
    flavor: '（生卒年不详）东汉使者，受班超派遣，曾尝试西行至“大秦”等更远地区，其行迹主要见于《后汉书》西域相关记载。史载他抵达临海之地后未能渡海而返，具体缘由在不同叙述中各有侧重，但这趟旅程的重要性并不取决于“是否真的到达罗马”，而在于它把汉人对中亚、西亚的认知推进到更具体的地理与交通层面：哪些路线可行、哪些势力控制关口、贸易与外交如何互相牵制。甘英的经历提示，汉代对外经营并非只有战与和，还有大量风险极高的探路与信息采集；使者的脚程与见闻，常常就是帝国决策的起点。'
    growth_range:
    - 5
    - 9
    attribute_weights:
      force: 16
      intellect: 46
      defense: 22
      agility: 16
  - key: hist_qinhan_0114
    name: 窦漪房
    archetype: civil
    flavor: '（生年不详—前135年）西汉窦太后，文帝皇后、景帝之母，从贫寒出身进入帝王家庭，最终以太后身份长期影响朝政。史书多写她好黄老、主无为，其影响并不只是“思想偏好”，更是一种政策取向：重视节用、轻徭与缓刑，让社会在战乱与变局之后尽快恢复元气。武帝初年她仍在世，宫廷中便出现不同政治路线的拉扯；这类拉扯并非谁对谁错，而是不同代际对国家任务的理解差异。窦漪房的权势来自母后位置，也来自她能把个人立场转化为可执行的政治影响力。通过她，可以更具体地理解文景政治背后的支点：不仅有皇帝勤俭，也有太后在权力结构中的长期支撑。'
    growth_range:
    - 5
    - 9
    attribute_weights:
      force: 16
      intellect: 46
      defense: 22
      agility: 16
  - key: hist_qinhan_0115
    name: 袁安
    archetype: civil
    flavor: '（生年不详—92年）东汉名臣，汝南袁氏早期的重要人物。关于“卧雪”之类逸闻，更多体现后世对清操的塑造，但袁安在史书中的核心形象确实偏向刚正与持守：他在朝廷中与外戚势力的张力相伴，敢于在权力中心表达不同意见，也因此更易遭遇排挤与风险。袁安的价值，不在于某一条传奇细节，而在于他展示东汉政治的一种生存方式——以名节为护身符，以制度与公义为论据，与强势集团周旋。汝南袁氏日后声名显赫，早期积累的“清议与名望”便与袁安这样的前辈有关；他让家族名声从个人操守延伸为一种可被继承的政治资本。'
    growth_range:
    - 5
    - 9
    attribute_weights:
      force: 16
      intellect: 46
      defense: 22
      agility: 16
  - key: hist_qinhan_0116
    name: 许平君
    archetype: civil
    flavor: '（前90年—前71年）西汉宣帝皇后。宣帝流落民间时，她与之相濡以沫；宣帝即位后，在霍光等权力结构的压力下仍立她为后，“故剑”故事遂成为政治与情感交织的象征。许平君登后并不意味着安全，反而使她站到权力争夺的靶心：皇后之位牵动外戚格局与继承安排，既关乎个人，也关乎家族与辅政集团的利益。史载许平君后遭毒杀，矛头指向霍氏势力，这一结局揭示西汉后期宫廷斗争的冷酷——后位是资源，也是风险，一旦触及权力核心，命运可能在一夜之间被改写。写许平君，不只是写深情，更是在写皇权如何在情理与安全之间做选择，而选择背后往往需要付出血的代价。'
    growth_range:
    - 5
    - 9
    attribute_weights:
      force: 16
      intellect: 46
      defense: 22
      agility: 16
  - key: hist_qinhan_0117
    name: 许慎
    archetype: civil
    flavor: '（58年—147年）东汉经学家、文字学家，字叔重，以《说文解字》奠定汉字学传统的关键基础。许慎的工作并非单纯“编字典”，而是一种制度化的知识整理：他用部首分类、字形分析与训诂解释，把散落在经传、碑刻与日用书写里的文字材料重新编排，使“读经”与“治礼”有了更稳的文字依据。书中对字源、义项的推演未必尽合现代语言学，但它在当时起到统一解释框架的作用，让学术讨论不至于各说各话。许慎的意义，正在于把文字从工具抬升为可研究、可传承的对象；对两汉学术而言，这种“把基础打牢”的工作往往比一时名声更耐久。'
    growth_range:
    - 5
    - 9
    attribute_weights:
      force: 16
      intellect: 46
      defense: 22
      agility: 16
  - key: hist_qinhan_0118
    name: 贾谊
    archetype: civil
    flavor: '（前200年—前168年）西汉前期杰出的政论家与辞赋家，少年成名，相关事迹见于《史记》《汉书》。他提出的《治安策》等议论直指汉初制度隐患，如诸侯王势力、边防与民生根基，文字锋利而视野宏阔。贾谊仕途却并不顺遂，屡遭迁谪，使他的作品呈现强烈的“理想与现实对撞”：既有国家治理的冷静分析，也有身世沉浮带来的抑郁与自伤。后来《吊屈原赋》等写法，正把政治失意与文化自况叠在一起。贾谊之所以动人，不仅因“怀才不遇”，更因他把一个新王朝必须回答的问题写得过早、过直，以至于时代尚未准备好完全接纳。'
    growth_range:
    - 5
    - 9
    attribute_weights:
      force: 16
      intellect: 46
      defense: 22
      agility: 16
  - key: hist_qinhan_0119
    name: 赵合德
    archetype: civil
    flavor: '（生年不详—前7年）汉成帝昭仪，赵飞燕之妹，体态丰腴，极受宠爱，甚至令成帝死于其怀中，史称“温柔乡”。她与姐姐联手专宠后宫，残害皇嗣，手段狠辣。成帝暴毙后，她被追究责任，自杀身亡。她是“红颜祸水”的典型代表，其故事警示后人沉迷声色的危害。她的美丽与狠毒并存，是汉宫秘史中不可或缺的一页，给西汉王朝的衰落埋下了伏笔。'
    growth_range:
    - 5
    - 9
    attribute_weights:
      force: 16
      intellect: 46
      defense: 22
      agility: 16
  - key: hist_qinhan_0120
    name: 赵飞燕
    archetype: civil
    flavor: '（前45年—前1年）西汉成帝宠妃，后立为皇后，以善舞与身姿轻盈著称。她从卑微出身进入权力中心，最能体现后宫并非“美色故事”的舞台，而是帝国继承与人事网络的枢纽：宠爱集中会改变宫廷资源分配，也会引发对皇嗣、外戚与政局走向的持续焦虑。史书与后世往往把成帝无嗣归咎于赵氏姊妹，叙述中不乏道德化与传闻成分，真实原因牵涉体质、制度与政治环境，难以用单一罪名解释。成帝死后赵飞燕失去依靠，被废而自尽（或被迫自尽），其结局再次提示：后宫权力高度依附皇帝个人，一旦中心消失，曾经的荣耀会迅速翻转成清算。'
    growth_range:
    - 5
    - 9
    attribute_weights:
      force: 16
      intellect: 46
      defense: 22
      agility: 16
  - key: hist_qinhan_0121
    name: 邓禹
    archetype: civil
    flavor: '（2年—58年）东汉开国功臣，云台二十八将首功之一。刘秀尚未显达时邓禹便追随其左右，既能出谋划策，也能统兵办事；更重要的是，他在建立新政权的过程中善于举荐与安置人才，使“打天下”能够转化为“治天下”。史书多称邓禹功高而能自守，不以权势逼主，这在开国功臣普遍难以拿捏的环境中尤显可贵。邓禹的价值不只是战场成绩，而是他把自己的存在变成“可被信任的支点”：既让皇帝放心，也让官僚体系能运转下去。写邓禹，最能看出东汉开国的难处并非只在征讨，而在如何避免功臣集团内耗、如何让胜利之后的权力重新回到制度之中。'
    growth_range:
    - 5
    - 9
    attribute_weights:
      force: 16
      intellect: 46
      defense: 22
      agility: 16
  - key: hist_qinhan_0122
    name: 郦食其
    archetype: civil
    flavor: '（前268年—前203年）楚汉之际著名说客，人称“高阳酒徒”，晚年投奔刘邦，以辩说与谋划见长。史载他曾为汉军筹粮、说降诸城，使人看到楚汉战争并非只有刀兵，口舌与情报同样能改变局势。但说客的危险也在于“信息不对称”：你用话语换来城门，战场的另一支军队却可能用兵刃立刻改写约定。郦食其说齐而后遇害的结局，恰说明乱世合作极易被时机与误判撕裂。郦食其并非单纯的“能言善辩”，他更像楚汉政治博弈中的风险职业代表——靠信誉吃饭，却常死于信誉无法被同步传递。'
    growth_range:
    - 5
    - 9
    attribute_weights:
      force: 16
      intellect: 46
      defense: 22
      agility: 16
  - key: hist_qinhan_0123
    name: 陆贾
    archetype: civil
    flavor: '（约前240年—前170年）马上得之，安可马上治之。他两次出使南越，仅凭言语便说服赵佗归附，兵不血刃平定南方。他著《新语》十二篇，向刘邦阐述治国之道，促使刘邦从武力征服转向文治教化。他的“能说服”，并不是凭几句漂亮话，而是抓住南越最在意的利益与安全，再用礼制名分把它们接到汉廷秩序里：既给对方体面，也给中央台阶。《新语》像是一份写给新王朝的现实备忘录——战争可以夺取天下，但要让天下可久，必须把人心、官制与教化一件件落到具体做法上。'
    growth_range:
    - 5
    - 9
    attribute_weights:
      force: 16
      intellect: 46
      defense: 22
      agility: 16
  - key: hist_qinhan_0124
    name: 陈平
    archetype: civil
    flavor: '（生年不详—前178年）西汉开国功臣，著名谋士。他早年家贫，好读书。初事魏王咎，后从项羽，终归刘邦。他以足智多谋著称，六出奇计：离间项羽范增、解白登之围、甚至在吕后时期也能保全自己。他曾建议刘邦伪游云梦擒韩信，又建议贿赂匈奴阏氏以解围。汉文帝时任丞相，与周勃合谋平定诸吕之乱，迎立文帝。他虽私德有亏（盗嫂受金传闻），但大节不亏，善于谋国谋身。'
    growth_range:
    - 5
    - 9
    attribute_weights:
      force: 16
      intellect: 46
      defense: 22
      agility: 16
  - key: hist_qinhan_0125
    name: 魏相
    archetype: civil
    flavor: '（生年不详—前59年）中兴名相，刚正严毅。他从基层做起，深知民间疾苦。宣帝即位初，他敢于抑制权倾朝野的霍光家族。任丞相后，他整顿吏治，精通汉易，主张阴阳调和，反对穷兵黩武。他与丙吉的配合，造就了宣帝中兴的盛世，是西汉后期难得的治世能臣。魏相的政治能力更像一种“统筹”：既要面对边患与军费，也要处理官吏风气与财政来源，知道强兵不能以伤民为代价。他的刚正因此不只是对外强硬，也包括对内约束权势、让政策能在郡县层面真正执行下去；把这些维度合在一起，才能看出他何以称得上“中兴名相”。'
    growth_range:
    - 5
    - 9
    attribute_weights:
      force: 16
      intellect: 46
      defense: 22
      agility: 16
  - key: hist_qinhan_0126
    name: 黄霸
    archetype: civil
    flavor: '（前130年—前51年）西汉循吏代表人物之一，以善治郡县、能安民心著称。史书写他治颍川，多强调不专恃严刑，而重在教化与吏治整饬：让基层官吏知道该做什么、百姓知道什么可依靠，秩序便能在日常里慢慢长出来。黄霸后来位至公卿，也因此更容易暴露循吏的另一面难题——地方治理靠的是细密耐心，到了中央则要面对派系、人事与财政的更大牵连，名声难免起伏。把黄霸放回两汉官僚体系里看，他像一块试金石：既证明“守法而宽”可以有效，也提醒人们治理并非靠口号，而靠能在细处落地的能力。'
    growth_range:
    - 5
    - 9
    attribute_weights:
      force: 16
      intellect: 46
      defense: 22
      agility: 16
  - key: hist_qinhan_0127
    name: 傅介子
    archetype: military
    flavor: '（生年不详—前65年）西汉刺客式使者，以果断手段在西域立威。楼兰、龟兹等国反复无常、杀害汉使，傅介子主动请缨，以使节身份深入其境，史载其曾诱杀楼兰王，并改立新王，使局面迅速改观。傅介子的传奇并非“单枪匹马平西域”，而是汉廷在边地资源有限时的一种高风险解法：用少数随从与精准行动换取震慑效果，再借名分与盟约推动后续治理。他的故事把外交与暴力的边界模糊得很清楚——在西域这种多方博弈的场域，礼仪往往是外衣，真正决定安全的仍是对威慑与承诺的把握。'
    growth_range:
    - 5
    - 9
    attribute_weights:
      force: 48
      intellect: 14
      defense: 26
      agility: 12
  - key: hist_qinhan_0128
    name: 冯异
    archetype: military
    flavor: '（生年不详—34年）东汉开国名将，号“大树将军”，以谦退不伐著称。史载诸将争功时他独坐树下少言，但在战事关键处却能扛住局面：平定关中、击破赤眉、收复长安皆属大功。冯异的难处不在打一仗，而在“打完仗怎么办”——战后要安抚百姓、恢复赋役、稳定郡县，稍有失措就会让新政权的控制力重新松动。冯异的克制与不争功，恰好减少了开国军中最常见的裂痕，让统一与重建可以接续进行。他的早逝之所以令人惋惜，正因为这种既能打仗又能收拾残局的将领，在战后更稀缺。'
    growth_range:
    - 5
    - 9
    attribute_weights:
      force: 48
      intellect: 14
      defense: 26
      agility: 12
  - key: hist_qinhan_0129
    name: 冯辽
    archetype: military
    flavor: '（生卒年不详）西汉著名女外交家，人称“冯夫人”。她是解忧公主的侍女，随同出嫁乌孙。史载其知书达理，善于辞令，常持汉节作为公主使者往来西域诸国，在复杂的盟友关系与部族纷争中传递汉廷意志。乌孙内乱时，她能以言辞与威望稳定局势，说明外交并不只发生在男性将领与使臣之间，后宫随从也可能成为关键的政治行动者。冯辽的意义不在“传奇身份”，而在于把西域外交的真实形态摊开：要懂礼仪，要懂人情，更要懂如何在危险环境里把信息与承诺送到正确的人手里。她的故事为汉代女性留下少见的公共舞台，也把帝国边政的细部照得更清楚。'
    growth_range:
    - 5
    - 9
    attribute_weights:
      force: 48
      intellect: 14
      defense: 26
      agility: 12
  - key: hist_qinhan_0130
    name: 吴汉
    archetype: military
    flavor: '（生年不详—44年）东汉开国名将，位至大司马，以勇猛与执行力著称。史书对吴汉的评价并不单色：他攻城略地、功勋卓著，同时也留下手段严酷的争议记载。吴汉的形象折射统一战争的一个现实面——在反复割据与叛乱的环境中，统治者往往更偏好“能迅速结束战事的人”，而这种效率常伴随高烈度的暴力与惩罚。吴汉临终仍谈军事，建议“慎无赦”，说明他把秩序建立理解为威慑与纪律优先。吴汉很难只用“忠”或“酷”概括；他更像一把在战乱中被反复使用的刀，锋利有效，也带着不可忽视的代价。'
    growth_range:
    - 5
    - 9
    attribute_weights:
      force: 48
      intellect: 14
      defense: 26
      agility: 12
  - key: hist_qinhan_0131
    name: 周亚夫
    archetype: military
    flavor: '（前199年—前143年）西汉名将，丞相，绛侯周勃之子。他治军严整，驻军细柳时，汉文帝亲临慰劳，亦不得入营，被誉为“真将军”。汉景帝时，吴楚七国之乱爆发，他率军平叛，坚壁清野，断敌粮道，仅三月便平定叛乱，维护了西汉统一。后任丞相，因性格耿直，不阿附权贵，且反对废栗太子，逐渐失宠。最终因其子私买御用甲盾被诬谋反，绝食吐血而死。他是西汉军事统帅的巅峰代表。'
    growth_range:
    - 5
    - 9
    attribute_weights:
      force: 48
      intellect: 14
      defense: 26
      agility: 12
  - key: hist_qinhan_0132
    name: 呼韩邪
    archetype: military
    flavor: '（生年不详—前31年）匈奴单于。匈奴内乱、诸部并起之际，呼韩邪在竞争中受挫，转而采纳归附汉朝的策略，亲至长安朝见汉宣帝，成为汉匈关系史上的重要转折。呼韩邪的选择并非单纯“向强者低头”，更像草原政治的一种自救：借汉廷的承认与支持稳住内部，同时以和好争取喘息空间。昭君出塞的叙事多被后世诗化，但它确实象征双方关系从长期对抗转向阶段性稳定。呼韩邪的意义在于证明，边疆格局并不总由战场决定，有时也由一位统治者对“成本与生存”的重新计算决定；而这种计算一旦改变，数十年的边境气氛也会随之改变。'
    growth_range:
    - 5
    - 9
    attribute_weights:
      force: 48
      intellect: 14
      defense: 26
      agility: 12
  - key: hist_qinhan_0133
    name: 夏侯婴
    archetype: military
    flavor: '（生年不详—前172年）汉初功臣，汝阴侯，官至太仆。他是刘邦同乡与近侍，早年以御者身份随军，乱世中靠的是“离君主最近的忠诚与执行”。彭城战败突围时，史载刘邦几欲弃儿女以求脱身，夏侯婴三次抱起，才使惠帝与鲁元公主得以保全，这段故事让楚汉战争的残酷与人性的摇摆显得格外真实。夏侯婴的价值不只在一时救急，更在他能在开国后继续立足：从战时随从转为制度内重臣，靠的正是分寸感——对人有情，对事有度，把近侍的忠诚磨成可以长期使用的资历，而不是短暂的邀功资本。'
    growth_range:
    - 5
    - 9
    attribute_weights:
      force: 48
      intellect: 14
      defense: 26
      agility: 12
  - key: hist_qinhan_0134
    name: 季布
    archetype: military
    flavor: '（生卒年不详）一诺千金，楚地游侠。他曾是项羽麾下猛将，多次围困刘邦。项羽败亡后，他虽遭通缉，却因信义著称而被朱家冒死相救。归汉后，他直言进谏，劝阻吕后出兵匈奴，避免了国家的灾难。“得黄金百斤，不如得季布一诺”，他的名字成了诚信的代名词。季布的“信”，并非只是江湖义气的漂亮标签：在汉初秩序尚未完全制度化时，个人声誉就是可流通的信用，能让人愿意冒险相助，也能让权力中心相信你可托以重事。他从被通缉到被任用的转折，折射出新王朝的现实选择——既要清算旧主，又不得不吸纳真正有能力的人。'
    growth_range:
    - 5
    - 9
    attribute_weights:
      force: 48
      intellect: 14
      defense: 26
      agility: 12
  - key: hist_qinhan_0135
    name: 岑彭
    archetype: military
    flavor: '（生年不详—35年）东汉开国将领，擅长水陆协同作战。史载其原出王莽部下，归汉后在征南战线上发挥重要作用，率水军沿江推进，攻取要地，直逼巴蜀。岑彭的胜利并非只靠勇气，而在于他能把船只、粮运、渡口与地方豪强关系串成一套可执行的行动：水战的关键往往不是杀伤，而是能否持续供给与控制通道。其后遭刺客暗杀，恰好暴露攻坚阶段的脆弱——再强的军队也可能被一次渗透击穿。岑彭之死让战局与人心同时受挫，说明在统一战争里，指挥官不仅是军事资源，也是政治信心的一部分。'
    growth_range:
    - 5
    - 9
    attribute_weights:
      force: 48
      intellect: 14
      defense: 26
      agility: 12
  - key: hist_qinhan_0136
    name: 崔寔
    archetype: military
    flavor: '（生年不详—170年）东汉学者与地方官，名与《四民月令》相连。该书以月份为序记录农事、家政与生产节奏，是研究东汉社会生活与庄园经营的重要材料，也反映“经世致用”并非口号，而是把生计管理写成可执行清单。崔寔的形象因此很特别：他不是只在经义里谈仁政的人，而是把民生、赋役与生产组织当作治理核心的人。至于其仕宦经历与边郡事务，史料所记不一，但可以确定的是，他的写作把地方治理最具体、最琐碎的部分保存了下来。《四民月令》把国家运转的底盘写得很清楚：田亩的节奏、赋役的安排、家户的生产，离开这些基层秩序，再多政令也落不下来。'
    growth_range:
    - 5
    - 9
    attribute_weights:
      force: 48
      intellect: 14
      defense: 26
      agility: 12
  - key: hist_qinhan_0137
    name: 张纲
    archetype: military
    flavor: '（108年—143年）埋轮破柱，少年胆气。作为张良后裔，他继承了祖先的智慧与勇气。面对大将军梁冀的淫威，其他御史皆去行贿，唯他将车轮埋于洛阳都亭，誓言“豺狼当道，安问狐狸”，上书弹劾梁冀。后任广陵太守，单车入贼营，以诚意感化张婴义军，兵不血刃平定叛乱。英年早逝，百姓为之立祠。张纲最醒目的不是口号，而是愿意把风险落在自己身上：埋轮是公开对抗强权的姿态，单车入营则是把叛乱当作“人心与秩序”的问题来处理。他的结局也提醒人们，在权臣当道的时代，清议与锋芒往往需要付出难以预料的代价。'
    growth_range:
    - 5
    - 9
    attribute_weights:
      force: 48
      intellect: 14
      defense: 26
      agility: 12
  - key: hist_qinhan_0138
    name: 彭越
    archetype: military
    flavor: '（生年不详—前196年）游击战始祖，梁王。他在巨野泽捕鱼起家，秦末大乱时聚众起义。在楚汉战争中，他在楚军后方开展游击战，断绝粮道，“往来苦楚”，令项羽疲于奔命。他与韩信、英布并称汉初三大名将。然而功高震主，被吕后骗入洛阳，剁成肉酱分赐诸侯。他的死，是汉初功臣悲剧的顶点。彭越的成名不只是勇猛，更来自对水泽地形与人群网络的熟悉：能隐蔽、能机动、能就地取给，才能把游击打成长期消耗。可天下既定后，这种自成体系的军功反而最易引发猜忌；他被诛并非战场失败，而是功臣与皇权之间结构性紧张的一次血腥结算。'
    growth_range:
    - 5
    - 9
    attribute_weights:
      force: 48
      intellect: 14
      defense: 26
      agility: 12
  - key: hist_qinhan_0139
    name: 李陵
    archetype: military
    flavor: '（生年不详—前74年）西汉将领，李广之孙，其北征匈奴一役常被视为“孤军困境”的极端样本。史载他以少数步卒深入敌境，鏖战多日而矢尽粮绝，最终投降；这既是战场判断的结局，也是后方支援与战略预期落空的结果。更沉重的代价发生在战场之外：武帝盛怒，牵连家族，李陵自此难以回归；司马迁为其辨解而遭极刑，使李陵的名字同时牵动“忠与降”“功与罪”的长久争论。李陵的悲剧不应只被写成个人气节的道德题，更应被放回两汉边战的现实：情报不明、补给断裂、朝廷压力与舆论期待，会把将领推到几乎没有完美选项的位置。'
    growth_range:
