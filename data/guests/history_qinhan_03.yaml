  - key: hist_qinhan_0146
    name: 英布
    archetype: military
    flavor: '（生年不详—前196年）汉初名将，九江王，因受黥刑又称黥布。英布出身刑徒而能跻身诸侯，说明秦末汉初社会秩序崩裂后，军功成为最直接的上升通道；但同一条通道也把人推入极不稳定的权力竞争。英布早随项羽，后被随何说降归汉，成为牵制项羽的重要力量。汉朝建立后，功臣相继被诛的风声与现实让他心生恐惧，最终起兵反叛而败亡。英布的结局揭示开国之后的另一种残酷：皇权要稳，必须收束武人的独立性；而武人若不愿被收束，就只能选择冒险。在他身上，功臣身份的变质格外直接——战时被倚重，战后被疑惧，恐惧与野心互相催逼，最后把人推到一条几乎没有退路的路上。'
    growth_range:
