  - key: hist_qinhan_0143
    name: 老上
    archetype: military
    flavor: '（生年不详—前161年）匈奴单于，名稽粥，冒顿单于之子。史载其继位后任用中行说等人，政策更趋强硬，对汉朝劫掠与施压频繁，使汉初边境长期处于紧张状态。其时期匈奴对西方诸部的冲击加深，月氏西迁等事件也常被系于这一阶段（史载与后世叙述并存）。老上的统治之所以重要，不只在几次胜负，而在他把匈奴的军事优势与政治动员结合得更紧：对外以战利品维系部众，对内以威望压服贵族，从而把草原联盟推向更具侵略性的方向。对汉廷而言，老上代表“必须先忍耐、先积蓄”的对手——和亲、边防与财赋政策的调整，都在这种压力下被迫加速。'
    growth_range:
