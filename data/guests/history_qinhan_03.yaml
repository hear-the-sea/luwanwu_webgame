  - key: hist_qinhan_0142
    name: 班勇
    archetype: military
    flavor: '（生年不详—卒于127年以后）东汉名将，班超幼子，字宜僚。他继承父业，再次出使西域。曾任西域长史，率五百人击破匈奴呼衍王，平定车师，重新打通中断的西域三道。他撰写的《西域记》为后世了解西域提供了重要线索。史载他曾因行期等事受责下狱，这也让他的功业带着一种“边务现实”的阴影：西域经营看似是远方的传奇，实际却要在极少兵力、漫长补给与多方势力夹缝中反复试错。班勇的价值，正在于他把这些碎片经验整理成可供朝廷决策的知识，让边疆不再只是传闻，而是能被讨论、能被治理的具体空间。'
    growth_range:
    - 5
