  - key: hist_qinhan_0144
    name: 耿弇
    archetype: military
    flavor: '（3年—58年）东汉名将，以机动与谋略见长。史载他在平定齐地的战事中善用“围点打援”等思路，利用敌我心理与地形节奏各个击破，使局面迅速逆转。耿弇的可贵处不在一次神勇，而在他能把军事行动与政治整合连起来：齐地富庶、人心复杂，打下来只是第一步，如何接管郡县、安置降附、稳定财赋才是长期收益。耿弇的战例之所以常被提起，正因为它把“用兵”从单纯决战扩展到组织能力与治理预案——胜利不仅要赢，还要能被长期维持。'
    growth_range:
