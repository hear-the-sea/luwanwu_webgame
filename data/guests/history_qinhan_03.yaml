  - key: hist_qinhan_0140
    name: 来歙
    archetype: military
    flavor: '（生年不详—35年）持节出使，以身殉国。他不仅是武将，更是杰出的外交家和战略家。他奇袭略阳，斩杀隗嚣守将，震动陇右。在征讨公孙述时，同样遭刺客暗算。临终前他拔出匕首，坚持写完最后的奏章，安排后事，然后壮烈牺牲。他的忠勇刚烈，感天动地。来歙的经历把“行军”与“持节”两种角色叠在一起：陇右地形险远、势力盘根，他既要打赢关键节点，也要处理归附、联络与安抚等事务。其死于刺杀说明两汉战争并非只有阵前对决，谋刺与情报同样常见；而他临终仍书奏章的细节（史载）也更像一种职业伦理——把国家事务摆在个人生死之前。'
    growth_range:
