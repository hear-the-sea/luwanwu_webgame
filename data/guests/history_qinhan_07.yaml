  - key: hist_qinhan_0315
    name: 萧望之
    default_gender: male
    archetype: civil
    flavor: （生年不详—前47年）西汉大臣与儒者。以守正敢言著称，政治生涯多有起伏，终因党争与权力斗争而死。萧望之并非只会讲“道理”的儒官：他在朝廷里要面对的，是皇帝、近臣、外戚与台阁之间的实际权力分配。坚持原则在理想上光亮，在现实中却常意味着得罪人、失去缓冲空间。史载其最终走向悲剧，正说明西汉后期的政治风气已不再容纳太多“不识时务”的刚直——士大夫一旦把名节当成唯一依靠，也可能被更擅长权术的人轻易逼到绝路。萧望之的结局把“儒者入仕”的代价呈现得很尖锐：越想守住规则，越容易被派系与风向一点点耗尽，最后连自保的余地都被挤掉。
    growth_range:
