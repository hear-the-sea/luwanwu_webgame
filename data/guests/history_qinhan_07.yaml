  - key: hist_qinhan_0302
    name: 伏生
    default_gender: male
    archetype: civil
    flavor: （生年不详—前168年）西汉学者。相传秦火之后他保存并口授《尚书》，成为汉初经学复兴的重要源头之一；相关细节带有传说色彩，但其文化史意义极强。伏生的故事让人看到经典传承的脆弱：书简可能被焚毁，制度可能崩坏，真正能把文本续下去的，往往是一位老学者的记忆与坚持。史载汉初征求经书时，伏生因年老只能口授，弟子或官员记录整理，这种“口传—抄录”的过程也提醒我们：所谓经典并非从天而降，它在每一次战乱后都要重新被找回、被确认、被解释。伏生因此不仅是一个人名，更像汉代学术重建的起点符号。
    growth_range:
    - 6
    - 9
    attribute_weights:
      force: 14
      intellect: 48
      defense: 22
      agility: 16
  - key: hist_qinhan_0316
    name: 匡衡
    default_gender: male
    archetype: civil
    flavor: （前97年—前37年）西汉经学家与大臣，后世多以“凿壁借光”记其贫而好学。匡衡的故事之所以耐读，是因为它不止有励志的一面：他确曾以经术获得政治声望并进入权力中心，但进入之后，学术道德并不能自动解决政治问题，反而会被利益结构、土地财赋与派系竞争反复考验。史书对匡衡既有称许也有责难，恰说明士人仕途的两难——靠经术立身，就必须在现实政治中保持一致性；一旦行为被认为背离清名，反噬也会更猛烈。匡衡因此像一面镜子：照见经学如何成就人，也照见清名如何束缚人。
    growth_range:
    - 6
    - 9
    attribute_weights:
      force: 14
      intellect: 48
      defense: 22
      agility: 16
  - key: hist_qinhan_0318
    name: 陈汤
    default_gender: male
    archetype: military
    flavor: （生年不详—前13年）西汉将领，事迹多与西域用兵相连，史书对其远征功业与后续争议皆有记载。陈汤的行动常被视为“远域用兵”的典型：兵力有限、路途漫长，必须联合地方势力、抓住时机，以快速打击来换取震慑效果。但这种做法天然高风险：用兵越远，越容易出现越权、争功与朝廷问责；功劳与罪责常在同一张账上结算。陈汤之所以值得写，正在于他把西汉后期边政的现实摊开给人看——帝国想要维护通道与威望，就不得不把军队投到更远的地方；而把军队投出去的官员，也必须同时承担“军事成功”与“政治手续”两套标准的审视。
    growth_range:
    - 6
    - 9
    attribute_weights:
      force: 46
      intellect: 14
      defense: 28
      agility: 12
  - key: hist_qinhan_0319
    name: 甘延寿
    default_gender: male
    archetype: military
    flavor: （生年不详—前13年）西汉将领。史载其与陈汤同在西域用兵，合力平定强敌，对维护通道安全与汉廷威望有重要作用。甘延寿这类边将的难处在于“距离”：远域用兵路途漫长，信息传递迟缓，补给与援军都不可靠，前线往往必须在没有明确授权的情况下自行判断。因而同一件事可能在边地被视为当机立断，在长安却被视为越权冒进，功劳与问责常同时到来。甘延寿的经历最能体现西汉后期经略西域的现实逻辑：帝国想把影响力伸到更远处，就必须接受更高的不确定性；而承担这种不确定性的，往往就是这些在边地做决定的人。
    growth_range:
    - 6
    - 9
    attribute_weights:
      force: 46
      intellect: 14
      defense: 28
      agility: 12
  - key: hist_qinhan_0329
    name: 刘縯
    default_gender: male
    archetype: military
    flavor: （生年不详—23年）新莽末年起兵的汉室宗亲，刘秀之兄。史载其早有大志，聚众起事并在关键战役中发挥作用，后因更始政权内部猜忌而被杀。刘縯的悲剧把起义联盟的内在不稳定写得极清楚：共同敌人强大时，联盟可以靠共同目标维系；一旦局势转向、权力开始分配，内部矛盾便会迅速上升，功劳反而可能变成威胁。刘縯既是军事动员者，也是政治竞争者，他的存在会让领导层不安；而在缺乏稳定机制的政权里，“不安”往往会被直接处理成清算。刘縯之死说明，光武中兴之前的混乱并非只有外敌，还有同阵营之间围绕合法性与控制权的残酷争夺。
    growth_range:
    - 6
    - 9
    attribute_weights:
      force: 46
      intellect: 14
      defense: 28
      agility: 12
  - key: hist_qinhan_0345
    name: 邓绥
    default_gender: female
    archetype: civil
    flavor: （81年—121年）东汉皇太后，和帝崩后临朝摄政，是东汉中期少见的强势女性统治者之一。史书记其任用能臣、减轻赋役、整饬吏治，使政治一度趋于稳定，这些举措体现她对“可持续治理”的理解：幼主在位时最怕的不是没有新政，而是秩序失控、财赋崩坏与官吏腐败同时发作。邓绥的难处也在于外戚身份带来的结构风险——太后掌权能提供权力中心与行政连续性，也会引发朝臣对家族坐大的长期担忧。邓绥的政治评价之所以相对正面，很大程度在于她能把个人与家族的利益压在制度需要之下，至少在一段时间里让东汉不至于被宫廷派系彻底撕碎。
    growth_range:
