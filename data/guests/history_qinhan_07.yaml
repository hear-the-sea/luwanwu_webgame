  - key: hist_qinhan_0331
    name: 樊崇
    default_gender: male
    archetype: military
    flavor: （生卒年不详）赤眉军领袖之一。新莽末年天下大乱，赤眉起自齐地，能在短时间内聚集大量流民与地方武装，并一度入关震动天下。樊崇的困难并不只在打仗，而在“如何成为政权”：流民军的组织依靠临时结盟与战利品分配，面对长期治理所需的税赋、官吏、粮运与秩序维护时，往往缺乏经验与稳定机制。赤眉最终败亡，说明动乱中“能起”的力量未必能“能久”。樊崇的经历让人看到，新莽末年的竞争不仅是军事较量，也是治理能力的筛选；没有制度与财赋支撑的胜利，很容易在进城之后迅速耗尽。
    growth_range:
    - 6
    - 9
    attribute_weights:
      force: 46
      intellect: 14
      defense: 28
      agility: 12
  - key: hist_qinhan_0344
    name: 明德马皇后
    default_gender: female
    archetype: civil
    flavor: （40年—79年）东汉皇后，汉明帝刘庄之后，史书多称其节俭仁慈、能约束外戚。对一位皇后而言，真正的政治作用往往不在公开发号施令，而在她能否让后宫权力“不过界”：节制赏赐、约束亲族、劝谏慎刑，这些看似柔性的行为，能显著降低外戚坐大与宫廷冲突的概率。明德马皇后在后世评价很高，也反映士大夫理想中的“内廷治理”——用道德权威替代权力争夺，让皇室成为秩序而不是风险源。她的形象提醒读者，后宫并非只能制造政治成本；在制度尚不完善的时代，能守住边界的皇后本身就是一种稳定机制。
    growth_range:
    - 6
    - 9
    attribute_weights:
      force: 14
      intellect: 48
      defense: 22
      agility: 16
  - key: hist_qinhan_0308
    name: 郭解
    default_gender: male
    archetype: military
    flavor: （生年不详—前114年）西汉游侠代表人物，相关记载见于《史记》。史载其以交游广、行侠任气闻名，能在地方社会里调解纠纷、庇护弱者，也因此不断触碰国家法度与官府权威。郭解之所以引人注目，是因为他站在“非正式秩序”的核心：当官府办事迟缓或不公时，游侠的声望可以替人出头；可一旦这种声望大到足以动员人心，国家就必然视其为潜在威胁。郭解的结局（史载被诛）让人看到两汉国家对游侠态度的底线：可以容忍民间义气的存在，但不允许它形成与官僚体系并行的裁判权。
    growth_range:
