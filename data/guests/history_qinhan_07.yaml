  - key: hist_qinhan_0332
    name: 寇恂
    default_gender: male
    archetype: civil
    flavor: （生年不详—36年）东汉开国名臣，兼具将略与吏治能力。光武中兴的难处不在“打赢一仗”，而在于战后如何让郡县重新运转：赋税、徭役、治安、粮运都要有人收拾。寇恂的名声便建立在这种“把地方盘活”的工作上——既能在军事压力下守住要害，又能安抚百姓、整饬吏治，使前线与后方互相支撑。史书记他，多把笔墨落在守边、理政与处置人心上；从他的经历可见，东汉的统一并非只靠战功，更靠一批能把秩序落到细处的官员。
    growth_range:
    - 6
    - 9
    attribute_weights:
      force: 14
      intellect: 48
      defense: 22
      agility: 16
  - key: hist_qinhan_0333
    name: 贾复
    default_gender: male
    archetype: military
    flavor: （生年不详—55年）东汉开国将领。随刘秀征战，屡立战功，后受封。贾复的价值在于他代表光武统一战争中的“主力将领层”：统一不是一蹴而就的决战，而是多线作战、反复攻守与长期整合。对这样的将领而言，战功不仅体现在冲锋，还体现在能否守住新占地区、安抚民众、稳定军心，让战线不断向前而不在后方塌陷。贾复等人的存在提醒我们，开国战争的胜利靠的是系统协作：前线能打，后方能供，地方能接管；任何一环断裂，战果就会迅速被抵消。
    growth_range:
    - 6
    - 9
    attribute_weights:
      force: 46
      intellect: 14
      defense: 28
      agility: 12
  - key: hist_qinhan_0337
    name: 祭遵
    default_gender: male
    archetype: military
    flavor: （生年不详—44年）东汉将领，以敢断与守纪闻名，事迹见于光武统一战争与战后整饬。对开国政权而言，最难的不只是击败敌人，还要让新占地区愿意服从——这往往靠的是军纪：不许扰民、不许自取、不许把胜利变成劫掠。祭遵在史书里的形象，恰好偏向这种“用纪律换秩序”的将领：话不多，手很硬，能把乱军治成可用之兵，也能把地方从恐惧里拉回到日常。祭遵早卒，使他更像一段短促但有效的工具——在国家最需要“把规矩立起来”的时候，他把规矩立得很快，也很狠。
    growth_range:
    - 6
    - 9
    attribute_weights:
      force: 46
      intellect: 14
      defense: 28
      agility: 12
  - key: hist_qinhan_0343
    name: 阴丽华
    default_gender: female
    archetype: civil
    flavor: （5年—64年）东汉皇后，光武帝刘秀正后。史书多称其温厚克制，这种“贤德”并非空泛赞语，而是具体政治能力：在开国初年功臣势大、后宫人事复杂的格局里，皇后若过度介入，容易引发外戚坐大或后宫争权；阴丽华的稳重与节制，反而让皇权更易集中，也让新王朝的宫廷秩序更少震荡。她与光武的关系又带有强烈象征意味：从战乱到中兴，婚姻既是私人情感，也是政治承诺。阴丽华的故事提醒我们，后宫并非只能制造危机，也可能通过“少作为”来降低风险；在东汉初年，这种节制本身就是一种治理贡献。
    growth_range:
    - 6
    - 9
    attribute_weights:
      force: 14
      intellect: 48
      defense: 22
      agility: 16
  - key: hist_qinhan_0347
    name: 耿恭
    default_gender: male
    archetype: military
    flavor: （生卒年不详）东汉将领。以守边坚忍著称，史载其在西域或边地孤城固守，历经艰险仍不屈。耿恭的故事常被后世赞为忠勇与坚韧的象征：在补给断绝、援军难至的极端环境下仍能维持军心与秩序。耿恭的难处不在“敢不敢打”，而在“能不能撑”：边城守御需要粮草、器械、盟友与信息，一旦这些链条断裂，英雄叙事就会变成生存算术。耿恭能够被记住，正因为他把守边的长期消耗与心理极限写得足够真实，让人看到东汉经略西域并非只有凯歌，也有无数在孤城里熬出来的日子。
    growth_range:
    - 6
    - 9
    attribute_weights:
      force: 46
      intellect: 14
      defense: 28
      agility: 12
  - key: hist_qinhan_0348
    name: 杨震
    default_gender: male
    archetype: civil
    flavor: （59年—124年）东汉名臣，以清廉自守与敢于直言著称。“天知、地知、你知、我知”的拒贿故事之所以流传，并不只因道德教化好用，更因为它点破官场腐败的心理机制：贪赃往往靠“无人知”来麻痹自我，而杨震用一句话把这种麻痹戳穿。杨震的仕宦经历也显示东汉士大夫对名节的高度重视——清名既是个人操守，也是政治资本；但清名一旦进入权力场，就意味着更容易成为众矢之的，需要更强的自律与分寸。杨震并非只在讲“清官故事”，他代表的是一种把内心尺度当作官场边界的政治伦理：不靠炫耀的严厉，而靠对自己不放松的约束。
    growth_range:
    - 6
    - 9
    attribute_weights:
      force: 14
      intellect: 48
      defense: 22
      agility: 16
  - key: hist_qinhan_0301
    name: 孔安国
    default_gender: male
    archetype: civil
    flavor: （生年不详—前91年）西汉经学家，孔子后裔，名常与古文经学传统相连。秦火之后典籍散佚、文本异同并存，经学家的工作不仅是“背诵经典”，更要在残缺与歧文之间建立可传授的版本与解释体系；孔安国被视为这一重建过程中的重要承接者之一。对两汉政治而言，经学并非纯学术：经典解释会进入官学、进入选官，也会进入国家礼制的论证。孔安国所代表的，正是这种把文本、师承与制度连接起来的学术角色。后世对他及其传承的评价多有分歧，但他在汉代学术史上的位置相当清晰——在“经典如何重新成为国家语言”这件事上，他属于不能绕开的节点。
    growth_range:
    - 6
    - 9
    attribute_weights:
      force: 14
      intellect: 48
      defense: 22
      agility: 16
  - key: hist_qinhan_0311
    name: 上官桀
    default_gender: male
    archetype: civil
    flavor: （生年不详—前80年）西汉昭帝时期的外戚与权力人物。武帝去世后，幼主在位需要托孤辅政，权力由此集中到少数重臣与亲近宫廷者手中；上官桀能进入这一格局，说明他既有亲缘与人脉，也能在政治运作中占位。史载其后与霍光等辅政势力发生尖锐冲突并最终败亡，正揭示托孤制度的天然张力：权力越集中，越容易形成“只能有一个中心”的零和竞争。上官桀的结局让人看到，外戚并非必然是“反派”，但在幼主政治里，一旦被视为威胁，清算往往来得极快且彻底。
    growth_range:
