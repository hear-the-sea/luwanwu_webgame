  - key: hist_qinhan_0322
    name: 石显
    default_gender: male
    archetype: civil
    flavor: （生年不详—前33年）西汉元帝时期的宦官权力人物，史书多以负面笔墨书写其结党与操控人事。石显值得关注的地方，不只是个人品行，而是他所代表的权力通道：当皇帝决断不足、外朝派系互相牵制时，近侍掌握出入奏章与传达诏命的环节，就可能把“服务”变成“控制”，把私党变成制度阴影。石显现象说明宦官权力并不必然从“叛乱”开始，而常从日常的文书与人事运作开始累积，直到朝臣发现很多决定已经绕开公卿系统。理解石显，也就更能理解西汉后期政治为何会疲软：不是某一人突然夺权，而是权力在缝隙里长期外流，最终形成难以纠正的结构。
    growth_range:
    - 6
    - 9
    attribute_weights:
      force: 14
      intellect: 48
      defense: 22
      agility: 16
  - key: hist_qinhan_0328
    name: 刘玄
    default_gender: male
    archetype: civil
