    flavor: （1671年—1741年）字天牧，号半农，清代著名的经学家，惠栋之父，吴派学术的重要奠基人。他在学术上确立了严谨的“吴派”家法，极力强调对汉儒训诂的绝对尊重与精准继承。惠士奇学识极其渊博，在官场中亦能保持高洁的清流本色，曾任翰林院侍读学士，晚年致力于地方文教事业的振兴。他的一生是关于“家学传承与文化坚守”的动人叙事。他那种追求学术纯粹性、不为任何世俗风潮所动的定力，展现了中华精英阶层对儒家经典最深沉的祭献与守望。这种致力于从历史的文献废墟中找回文明尊严的行为，是中国知识分子最本质的文化自尊。他的一生证明了理性的力量可以穿越时光的尘埃，在寂静的书斋中开出最绚烂的真理之花。
