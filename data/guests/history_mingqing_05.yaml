  - key: hist_mingqing_0158
    name: 陈廷敬
    default_gender: male
    archetype: civil
    flavor: （1638年—1712年）字子端，号说岩，康熙皇帝的老师、理政大师。他官至文渊阁大学士，主持编纂了《康熙字典》等宏篇巨制，对汉文字的规范与传承立下汗马功劳。陈廷敬在官场中以清廉正直、老成持重与谨小慎微著称，在多次主持反腐调查与税制改革中展现了卓越的行政才干。他的一生致力于维持官场风气的纯正，深受皇帝绝对信赖，被评价为“宽大、正直、清廉”。陈廷敬这种“慎独”的为官之道与深厚的学术修养，使其成为了清代士大夫阶层公认的人格典范。他那种能够在极其复杂的政治博弈中保持清白操守并实现政治生命长久稳定的特质，展现了封建官僚生存的最高智慧，其名声在历史上极其显赫。
    growth_range:
    - 4
    - 7
    attribute_weights:
      force: 12
      intellect: 58
      defense: 18
      agility: 12
  - key: hist_mingqing_0159
    name: 佟国维
    default_gender: male
    archetype: civil
    flavor: （生年不详—1719年）佟佳氏，康熙朝重臣，外戚首领。他不仅在平定三藩等军事行动中统筹有方，更在朝廷的人事布局与官员考核中占据核心地位。佟国维为人老谋深算，在储位斗争中通过微妙的政治权衡来保护家族的长远利益。他的一生体现了清初外戚力量在皇权运作中的深度参与。他在维护皇权合法性与平衡朝廷不同派系利益上展现了极高的政治技巧，其家族的兴衰史是研究清初政治格局演变的重要窗口。佟国维那种不仅追求家族权力的持久且追求国家体制平稳运行的风格，使其成为了康熙皇帝手中一个极其好用的行政与政治砝码，其家族在当时被誉为“佟半朝”，显赫一时，对清中叶的政局产生了重要影响。
    growth_range:
    - 4
    - 7
    attribute_weights:
      force: 12
      intellect: 58
      defense: 18
      agility: 12
  - key: hist_mingqing_0160
    name: 尹继善
    default_gender: male
    archetype: civil
    flavor: （1695年—1771年）章佳氏，字元长，号望山，清代名臣，历事康雍乾三朝。他曾多次担任两江、云贵、川陕总督，以行政干练、处事圆融与爱民如子著称。尹继善性格宽厚，极擅长协调满汉官员关系，其行政管理高度注重民生安定与经济恢复。他在学术与诗歌上亦有极高造诣，被乾隆帝赞誉为“完人”。他的一生是盛世体制下官僚典范的完美体现，展现了地方高级行政官员在维护庞大帝国日常运转中的关键作用。他那种温润如玉的人格魅力与卓越的行政才干，使其成为了清中叶最受人尊敬的一代名臣。他那种将儒家的雅致生活与繁忙的政府工作高度统一的姿态，代表了盛世巅峰时期文官阶层的一种精神理想。
    growth_range:
    - 4
    - 7
    attribute_weights:
      force: 12
      intellect: 58
      defense: 18
      agility: 12
  - key: hist_mingqing_0161
    name: 陈宏谋
    default_gender: male
    archetype: civil
    flavor: （1696年—1771年）字汝咨，号榕门，清代名臣、行政管理专家。他先后在全国十余个省份担任高级职务，历任总督，以“实心任事、不尚虚文”闻名于世。陈宏谋极其重视教育普及与风俗改良，在各地兴办书院、推广农业技术，并在防灾救荒、治理黄河上有卓越建树。他编纂的《五种遗规》成为了清代影响极其深远的社会教化教材。陈宏谋主张“经世致用”，反对官场中蔓延的虚浮风气。他那种务实、清廉且具高度责任感的为官之道，使其成为了地方官员中少有的具有思想广度与深度的实干家。他那种深入一线调研、忧以天下的作风，展现了清代士大夫的道德追求，其治绩造福了数省百姓，被后世推崇为学术诚信与行政能力的最高结合。
    growth_range:
