  - key: hist_mingqing_0207
    name: 沈彤
    default_gender: male
    archetype: civil
    flavor: （1688年—1752年）字圆仲，号果堂，清代著名的经学家、礼学家。他在对中国古代礼仪制度的科学复原与系统解释上具有极其崇高的学术地位，其著作《礼仪匡缪》等被后世视为该领域的权威标准。沈彤治学极其精密、言必有据，主张“凡礼制必有出处与实物佐证”。他在学术上不随波逐流，敢于在繁杂的文献中提出独立的逻辑见解。沈彤的一生在极其清贫、寂寞的环境下坚持高强度的科研工作，展现了对真理不懈追求的人格力量。他那种跨学科的知识结构与对古代社会运行机制的深刻洞察，使其成为了乾嘉学术界的一位学术巨匠。他不仅复原了文字背后的制度原貌，更守护了民族在动荡局势下的一份文化自尊，其学术贡献深受后世推崇。
