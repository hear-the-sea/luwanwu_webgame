    - 7
    attribute_weights:
      force: 12
      intellect: 58
      defense: 18
      agility: 12
  - key: hist_mingqing_0162
    name: 刘统勋
    default_gender: male
    archetype: civil
    flavor: （1698年—1773年）字延清，号尔钝，乾隆朝著名重臣，以极度的清廉和对工作的绝对投入著称于史册。他多次在治理河道与大赈灾行动中展现出非凡的现场调度才干，被皇帝视为“真宰相”。他在整饬吏治、稽查官场亏空与修订法律方面功勋卓著。刘统勋的一生是清代“老臣谋国”风格的典范，他那种为国家鞠躬尽瘁、死而后已的精神，为乾隆盛世的行政质量提供了坚实的人格保障。他那种敢于犯颜直谏、不畏强权的道德勇气，使其成为了乾隆皇帝最敬畏也最倚重的文臣领袖。他那种致力于利用科学规律造福百姓的治水思想，体现了中华文明中极其务实且具人文情怀的行政基因，是中国古代官僚体系中一颗璀璨的明星。
    growth_range:
    - 4
    - 7
    attribute_weights:
      force: 12
      intellect: 58
      defense: 18
      agility: 12
  - key: hist_mingqing_0163
    name: 阿桂
    default_gender: male
    archetype: military
    flavor: （1717年—1797年）章佳氏，字广庭，号阿斋，乾隆朝最杰出的将领与政治家。他历任伊犁将军、两江总督、首席军机大臣等职，是平定准噶尔部、大小金川叛乱的首席功臣。阿桂为人公允清廉、文武全才，是乾隆中叶以后大清帝国最可靠的军事与政治支柱。他在多次重大战役中展现了卓越的战略筹划与前线指挥艺术，尤其擅长处理极其复杂的民族事务。在朝政中，他不依附权臣和珅，始终保持了正直节操，深受乾隆帝敬重。阿桂的一生是中国传统将领中“功勋盖世”的巅峰代表，其政治风范被后世奉为武臣楷模。他那种在盛世背后默默守护国土安全与社会秩序的责任感，使其成为了清朝中后期武臣群体的精神领袖，位列紫光阁五十功臣之首。
    growth_range:
    - 4
    - 7
    attribute_weights:
      force: 42
      intellect: 18
      defense: 24
      agility: 16
  - key: hist_mingqing_0164
    name: 刘墉
    default_gender: male
    archetype: civil
    flavor: （1720年—1805年）字崇如，号石庵，清代著名的政治家、书法家，被誉为一代名臣。他为人正直、清廉自守，在多次地方任职中严惩贪墨，极其关注民生疾苦，深受百姓拥戴。刘墉在政治上以稳健务实著称，多次参与处理国家重大司法案件。而在艺术造诣上，他以墨气浑厚、体丰骨劲的书法被誉为“浓墨宰相”，位列“清代四大书法家”之首。虽然民间传说中的“刘罗锅”形象多有艺术夸张，但他那不畏权贵的操守与深厚的文化底置，确实代表了清中叶士大夫阶层的理想追求。他的一生是传统文人“守正”力量的缩影，其稳健的人格魅力在充满了权力倾轧的官场中如同一股清流，为那个时代的法律尊严保留了一份最后的心理底线。
    growth_range:
