      agility: 12
  - key: hist_mingqing_0165
    name: 傅恒
    default_gender: male
    archetype: military
    flavor: （1720年—1770年）富察氏，字春和，乾隆皇帝的内弟，清代名将。他自幼入宫，深受乾隆信赖，官至内阁首席大学士、领侍卫内大臣。傅恒在军事上极具干才，曾主持平定大、小金川叛乱，并在亲征准噶尔过程中总揽全军后勤。最令其名震天下的是他主动请缨征讨缅甸，在瘴气横行的边境战场上虽身染重病仍坚持统筹全局，回京后不久即去世。傅恒为人谦和、不恃宠而骄，是满洲勋贵中最具典范意义的人物。他的一生体现了盛世巅峰时期满洲贵族积极进取、以天下为己任的精神，是乾隆朝文治武功的重要执行者。他那种集顶级权贵身份与忘我工作热情于一身的特征，代表了清代满洲官员素质的极高水平，死后配享太庙。
    growth_range:
    - 4
    - 7
    attribute_weights:
      force: 42
      intellect: 18
      defense: 24
      agility: 16
  - key: hist_mingqing_0166
    name: 王杰
    default_gender: male
    archetype: civil
    flavor: （1725年—1805年）字伟人，号惺园，清代著名名臣，乾隆朝首位陕籍汉人状元。他为人刚正不阿、清廉如水，在和珅权势最盛的时期，王杰是朝堂上少数敢于公开斥责其贪腐行径、维护朝廷纲纪的骨干官员之一。他曾多次担任军机大臣，在涉及国家安危的重大决策中表现出极高的原则性与道德勇气。王杰不仅在政治上展现了士大夫宁折不弯的气节，在书法与文学上亦有深厚功底。他的一生体现了清代知识分子在极端复杂的权力旋涡中努力保持独立品格的艰辛与伟大，是嘉庆朝整饬吏治的重要精神支柱。他那种“宁鸣而死、不默而生”的精神，通过自身的道德力量开辟出了一方正义的领地，深受皇帝倚重与士林敬仰。
    growth_range:
