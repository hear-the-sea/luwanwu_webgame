  - key: hist_mingqing_0167
    name: 毕沅
    default_gender: male
    archetype: civil
    flavor: （1730年—1797年）字纕蘅，号秋帆，清代著名的史学家、官员。他在乾隆二十五年高中状元，其主编的《续资治通鉴》系统整理了宋、辽、金、元各朝历史，填补了中国编年体通史编纂的空白，学术眼光极其敏锐且宏阔。毕沅不仅是杰出的学术领袖，在担任地方督抚（如湖广总督、山东巡抚）期间亦政绩斐然，尤其在文化保存、古籍搜集与书院建设方面投入了巨大心力。毕沅的一生是清代“学优则仕”传统的优秀体现，他善于通过行政权力推动大规模的学术研究实践，极大地丰富了中华文化的学术宝库。他那种将宏大学术抱负与务实行政管理相结合的风格，使其成为了盛世中一位真正的全能型重臣，其学问与治绩均得到了历史的一致高度公认。
    growth_range:
    - 4
    - 7
    attribute_weights:
      force: 12
      intellect: 58
      defense: 18
      agility: 12
  - key: hist_mingqing_0168
    name: 王昶
    default_gender: male
    archetype: civil
    flavor: （1724年—1806年）字德甫，号述庵，清代著名的考据家、金石学家。他在金石学研究上造诣极深，历经数十年广泛搜集整理了海量的碑刻资料，所著《金石萃编》一百六十卷是该领域的划时代里程碑。王昶在担任高级官员（如刑部右侍郎）期间，为人谦和、办事缜密，特别是在处理复杂的司法大案中表现出高度的专业性与公正意识。他在文学上也主张清新自然的风格。王昶的一生致力于通过对古代文物的考证来复原历史的真实面貌，他那种追求极致精密、言必有据的钻研精神，是乾嘉盛世学术繁荣的重要见证。他在外交与民族事务场合表现出的缜密逻辑，展现了清代士大夫的多方位才华，他对于民族文化根脉的梳理具有极其深远的学术意义。
    growth_range:
    - 4
    - 7
    attribute_weights:
      force: 12
      intellect: 58
      defense: 18
      agility: 12
  - key: hist_mingqing_0169
    name: 孙星衍
    default_gender: male
    archetype: civil
    flavor: （1753年—1818年）字渊如，号五松老人，清代著名的学者、目录学家、藏书家。他在版本学与校勘学上具有崇高地位，一生搜集并精修了大量濒临失传的古代孤本秘籍。他在学术上主张实事求是，对经史、小学、地理均有精深研究，主持修纂了《平津馆丛书》等重要典籍。他在官场中亦能保持清流本色，为人耿直敢言，致力于地方文教事业的振兴。孙星衍通过极其辛勤的搜罗与科学的整理，为后世保留了大量的文化火种。他那种致力于文化保存的自觉担当，展现了清代士大夫对中华文明薪火相传的深沉责任感。他在主持书院期间培养了大量优秀人才，是中国古典教育体制下的成功范本，其学问与人品均被士林传为佳话，影响力跨越时代。
    growth_range:
    - 4
    - 7
    attribute_weights:
      force: 12
      intellect: 58
      defense: 18
      agility: 12
  - key: hist_mingqing_0170
    name: 汪中
    default_gender: male
    archetype: civil
    flavor: （1744年—1794年）字容甫，清代著名学者、骈文大师，扬州学派的代表人物。他自幼家贫，性格狂傲自负、不屑流俗，但在骈文创作与经史考证上有惊人天赋，其文章辞藻瑰丽、气骨嶙峋，被推为“当代第一”。汪中对诸子百家均有极其深刻的研究，学问具有极强的批判性与独立见解。他在穷困潦倒的生活中依然坚持学术探索，敢于公开挑战当时的权贵与学术定见。汪中的一生虽然仕途坎坷、郁郁不得志，但他那卓越的才情与不屈的独立思想，使其成为了乾嘉学术巅峰时期一个极其独特的文化符号。他那种追求真知、不计个人得失的纯粹精神，深受后世学子的推崇。他是扬州文化中极具叛逆色彩与创造力的大师，其影响力在死后愈发彰显。
    growth_range:
    - 4
    - 7
    attribute_weights:
      force: 12
      intellect: 58
      defense: 18
      agility: 12
  - key: hist_mingqing_0171
    name: 焦循
    default_gender: male
    archetype: civil
    flavor: （1763年—1820年）字理堂，号里堂，清代著名的哲学家、数学家、戏曲理论家与经学家。他在学术研究中展现了极具开创性的数学思维，曾尝试将代数模型引入《易经》研究中，这一创新在中国学术史上具有独特的跨学科意义。焦循学问广博，对历算、声韵、地理及戏曲均有极其深刻的造诣，其《雕菰楼集》等著作体现了极高的学术价值。他一生淡泊名利，隐居扬州潜心钻研，被誉为“一代通才”。他那种追求知识极致的科学探索精神，是清中叶中国学术向自然科学延伸的精彩瞬间。焦循不仅是杰出的学者，更是一位充满理性光辉的实干家，其学术成果至今依然是指引相关领域研究的重要灯塔，展现了中华文明深处的科学基因。
    growth_range:
    - 4
    - 7
    attribute_weights:
      force: 12
      intellect: 58
      defense: 18
      agility: 12
  - key: hist_mingqing_0172
    name: 戴震
    default_gender: male
    archetype: civil
    flavor: （1724年—1777年）字东原，号慎修，乾嘉学派的理论领袖，清代最伟大的哲学家与考据学家之一。他以大无畏的精神公然挑战传统理学的“存天理、灭人欲”说教，在《孟子字义疏证》中提出了“理存于欲”的进步观点，深刻揭示了理学教条对基本人性的长期压抑与摧残。戴震在考据学、音韵学与历算学上亦造诣惊人，其治学之严谨被誉为“乾嘉第一”。他在整理《永乐大典》与修纂《四库全书》中发挥了不可替代的核心作用。戴震的一生是追求极致真理与科学实证的化身，他那带有现代曙光的哲学思考，预示了传统文化向近代化转型的巨大可能，其学术精神对后世产生了极其深远的影响，被梁启超誉为“前清第一学术泰斗”。
    growth_range:
    - 4
    - 7
    attribute_weights:
      force: 12
      intellect: 58
      defense: 18
      agility: 12
  - key: hist_mingqing_0173
    name: 段玉裁
    default_gender: male
    archetype: civil
    flavor: （1735年—1815年）字若膺，号懋堂，清代伟大的语言学家、文字学家与考据大家。他作为戴震的杰出弟子，历时三十载呕心沥血写成的《说文解字注》，是中国古代文字学研究的巅峰之作，使得汉字演变的客观规律得到了系统且精密的梳理。段玉裁在学术上主张不苟且、不盲从，强调通过详尽的排比与逻辑推演发现文字背后的历史真相。他在退休后依然保持极高强度的科研钻研，直至生命最后一刻。他那种“板凳甘坐十年冷”的坚韧精神，为中国传统语言学的现代化转型奠定了最坚实的基石。段玉裁不仅复原了汉字的本义，更通过文字的考古学构建了我们认知上古文明的权威阶梯，其成果至今仍被奉为该领域的“圣经”。
    growth_range:
    - 4
    - 7
    attribute_weights:
      force: 12
      intellect: 58
      defense: 18
      agility: 12
  - key: hist_mingqing_0174
    name: 王念孙
    default_gender: male
