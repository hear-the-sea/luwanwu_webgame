  - key: hist_sljnbc_0277
    name: 胡奋
    archetype: military
    flavor: '（？—288年）西晋将领，安定临泾人，车骑将军胡遵之子。他随钟会参与伐蜀之战，立有功勋。他善于作战，又通晓文史，文武双全。他的女儿被选为晋武帝司马炎的贵嫔，胡氏家族因此更加显贵。然而他深知物极必反的道理，常常告诫子孙要谦逊自守，不可恃宠而骄。他预言晋武帝去世后天下必有大乱，劝诫家人早做准备、收敛锋芒。'
