  - key: hist_sljnbc_0296
    name: 潘璋
    archetype: military
    flavor: '（？—234年）东吴将领，勇猛善战。东郡发干人，家贫无产却有雄心壮志。他少年时投奔孙权，以勇武见用，孙权常资助他酒食。他作战骁勇，善于督战，麾下士卒慑于其威皆不敢后退。吕蒙白衣渡江时他是前锋之一，袭取荆州后关羽突围奔走麦城，他率军追击堵截。其部下司马马忠在临沮擒获关羽父子，后关羽被杀，这一历史事件与潘璋部曲密切相关。'
