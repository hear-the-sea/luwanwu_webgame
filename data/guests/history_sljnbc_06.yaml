  - key: hist_sljnbc_0267
    name: 向朗
    archetype: civil
    flavor: '（167年—247年）蜀汉大臣，襄阳宜城人，字巨达。他早年师从司马徽，与徐庶、庞统等人交好。他初仕刘表，后归刘备，历任多职。诸葛亮第一次北伐时马谡失街亭，马谡畏罪潜逃，向朗知情不报，诸葛亮将其免官。此后他闭门不出，潜心学问，广收典籍，家中藏书为蜀中之冠。他开门授徒，教育后学，培养了大批人才。'
    growth_range:
    - 3
    - 6
    attribute_weights:
      force: 20
      intellect: 40
      defense: 20
      agility: 20
  - key: hist_sljnbc_0268
    name: 郤正
    archetype: civil
    flavor: '（？—278年）蜀汉大臣，河南偃师人，字令先。他少年丧父，家贫好学，博览群书，尤精文学。他在蜀汉担任秘书令，掌管典籍文书。景耀六年（263年）蜀汉灭亡，他随刘禅迁往洛阳。司马昭设宴招待刘禅，故意演奏蜀地音乐试探其心意，刘禅旁若无人谈笑自若。郤正教刘禅说"先人坟墓远在蜀地，无日不思"，以表达思念故土之情。'
    growth_range:
    - 3
    - 6
    attribute_weights:
      force: 8
      intellect: 64
      defense: 18
      agility: 10
  - key: hist_sljnbc_0269
    name: 刘巴
    archetype: civil
    flavor: '（？—222年）蜀汉大臣，零陵烝阳人，字子初。他出身名门，才华横溢，少年时便有盛名。他初不愿归附刘备，辗转于曹操、刘璋之间。后不得已归蜀，刘备知其才干而重用之。刘备入蜀之初国库空虚，他建议铸造"直百钱"，以一当百，并开放官市贸易，数月间府库充实，解决了财政危机。他为人清高孤傲，曾拒绝与张飞同榻而眠，张飞深以为耻。'
    growth_range:
    - 3
    - 6
    attribute_weights:
      force: 20
      intellect: 40
      defense: 20
      agility: 20
  - key: hist_sljnbc_0270
    name: 李恢
    archetype: civil
    flavor: '（？—231年）蜀汉将领，建宁俞元人，字德昂。他原是建宁郡督邮，刘备入蜀时他前往投奔。他奉命劝说马超归降刘备，凭借其出色的外交能力成功完成使命。邓方去世后他接任庲降都督，镇守南中。建兴三年（225年）诸葛亮南征平定雍闿、孟获等人的叛乱时，他率军从建宁出发配合作战，功勋卓著。'
    growth_range:
