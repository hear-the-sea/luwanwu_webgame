  - key: hist_sljnbc_0278
    name: 句扶
    archetype: military
    flavor: '（？—？）蜀汉将领，巴西汉昌人，字孝兴。他是蜀汉后期著名的将领，在军中以勇武著称。他多次参与诸葛亮、姜维的北伐战役，作战勇猛，屡立功勋。他与镇北将军王平齐名，时人将二人并称"前有王句"，以赞美其军事才能，这是极高的评价。他被封为宕渠侯，官至左将军，是蜀汉中后期军队的重要支柱。'
