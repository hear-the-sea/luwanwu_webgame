  - key: hist_sljnbc_0291
    name: 王濬
    archetype: military
    flavor: '（206年—286年2月）西晋将领，弘农湖县人，字士治。他博学多才，性格果断。任益州刺史期间，他奉命在蜀中建造大型战船，史称"舟楫之盛，自古未有"。太康元年（280年）晋武帝发动灭吴之战，他率水师顺江而下，沿途攻克西陵、夏口、武昌等重镇，势如破竹。三月他的舰队抵达建业，吴主孙皓出降，东吴灭亡，三国归晋。'
