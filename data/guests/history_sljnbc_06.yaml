  - key: hist_sljnbc_0288
    name: 张裕
    archetype: civil
    flavor: '（？—？）蜀汉官员，蜀郡成都人。他精通天文术数和相面之术，在蜀中颇有名气。刘备入蜀后征辟他为从事。他生性狂放不羁，因刘备面颊无须，曾当众嘲讽说"诸毛绑涿县，诸诸无所有"，借谐音讥刺刘备，刘备心中不悦但未发作。后来他私下对人预言天象，称"岁在庚子，天下当易代，刘氏祚尽矣"，此言传入刘备耳中。'
