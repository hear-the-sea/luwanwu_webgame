  - key: hist_sljnbc_0282
    name: 李球
    archetype: military
    flavor: '（？—263年）蜀汉将领，建宁俞元人，庲降都督李恢之侄。他继承家族忠义传统，在蜀汉军中任职。景耀六年（263年）魏将邓艾偷渡阴平直逼成都，卫将军诸葛瞻率军在绵竹迎战。李球随军出征，参与了这场蜀汉存亡之战。邓艾派人送信劝降，诸葛瞻怒斩来使。两军激战，蜀军大败，诸葛瞻父子战死。'
