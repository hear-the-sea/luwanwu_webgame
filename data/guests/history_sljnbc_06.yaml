  - key: hist_sljnbc_0297
    name: 孙皓
    archetype: civil
    flavor: '（242年—284年）东吴末帝，暴虐亡国。字元宗，孙权之孙，废太子孙和之子。他即位之初励精图治，颇有明君气象，朝野期望甚高。然而不久他便露出暴虐本性，大肆杀戮宗室重臣，酷刑滥用，宫中常闻惨叫之声。他迷信巫术，穷奢极欲，大修宫殿，耗尽民力。他喜欢让群臣饮酒，醉后令侍从相互揭发过失，有言辄诛，朝臣人人自危。'
    growth_range:
