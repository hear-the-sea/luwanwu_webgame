    attribute_weights:
      force: 12
      intellect: 56
      defense: 22
      agility: 10
  - key: hist_sljnbc_0271
    name: 樊建
    archetype: civil
    flavor: '（？—？）蜀汉大臣，义阳人，字长元。他在蜀汉后期官至尚书令，与董厥一同主持朝政。当时宦官黄皓专权，朝纲败坏，他与董厥尽力维持局面，却无力扭转颓势。景耀六年（263年）蜀汉灭亡后，他随刘禅迁往洛阳。入晋后他被任命为给事中，参与朝廷机要事务。他在晋朝为官期间始终保持清正廉洁的作风，不因身份转变而改变操守。'
    growth_range:
    - 3
    - 6
    attribute_weights:
      force: 20
      intellect: 40
      defense: 20
      agility: 20
  - key: hist_sljnbc_0272
    name: 董厥
    archetype: civil
    flavor: '（？—？）蜀汉大臣，义阳人，字龚袭。他早年追随诸葛亮，任丞相府令史，掌管文书档案。诸葛亮对他颇为赏识，称赞其"义理深长，心地良善"，是难得的良士。诸葛亮去世后他历任要职，官至辅国大将军、尚书令，与樊建共同主持蜀汉朝政。当时宦官黄皓弄权，朝廷上下乌烟瘴气，他虽尽心竭力维持局面，却难以扭转大势。'
    growth_range:
