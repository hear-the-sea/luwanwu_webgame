  - key: hist_sljnbc_0294
    name: 来敏
    archetype: civil
    flavor: '（？—？）蜀中鸿儒，博学狂放。义阳新野人，汉末大儒来歙之后。他精通《说文解字》，对文字学有精深研究，被时人尊为"蜀铎"，意为蜀地学问的领袖。他随刘璋入蜀，后归附刘备，因其才学而受到重用。他为人性情狂放不羁，言语间常有惊人之语，不拘礼法，有时甚至口出狂言。刘备和诸葛亮虽然知道他性格怪异，却因其才学非凡而容忍他。'
