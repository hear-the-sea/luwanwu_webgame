  - key: hist_sljnbc_0279
    name: 刘璋
    archetype: civil
    flavor: '（？—220年）东汉末年益州牧，江夏竟陵人，字季玉，刘焉幼子。他继承父亲刘焉之位统治益州，在位期间政务宽和，百姓得以休养。建安十六年（211年）他惧怕汉中张鲁的威胁，听从张松建议迎刘备入川。刘备入蜀后反客为主，围攻成都。建安十九年（214年）他开城投降，益州遂归刘备所有。'
