  - key: hist_sljnbc_0280
    name: 张温
    archetype: civil
    flavor: '（193年—230年）东吴大臣，吴郡吴县人，字惠恕。他少有才名，文采风流，深受孙权器重，年纪轻轻便位列重臣。黄武三年（224年）他奉命出使蜀汉，与诸葛亮、秦宓等人往来酬唱，表现出色，为东吴赢得了声誉。然而他才高气盛，名望日隆，引起孙权猜忌。恰逢选曹郎暨艳因严苛选官触犯权贵而获罪自杀，张温曾举荐暨艳，遂被牵连。'
