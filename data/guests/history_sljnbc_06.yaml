  - key: hist_sljnbc_0284
    name: 尹默
    archetype: civil
    flavor: '（？—？）蜀汉学者，梓潼涪县人，字思潜。他少年时游学荆州，师从司马徽、宋忠等名儒，精通经学，尤其擅长《左氏春秋》。刘备定益州后征辟他为劝学从事，后升任太子仆，负责教授太子刘禅。他治学严谨，注重经典的章句训诂，培养了众多弟子。他的经学水平在蜀中首屈一指，对蜀汉的文化教育事业贡献良多。'
