      agility: 22
  - key: hist_sljnbc_0274
    name: 薛综
    archetype: civil
    flavor: '（？—243年）东吴大臣，沛郡竹邑人。他博学多才，善于辞令，尤其精于辞赋创作，在东吴文坛颇有声望。孙权曾派他出使蜀汉，他应对得体，不卑不亢，维护了东吴的尊严。他多次上书讽谏孙权，言辞恳切而不失分寸。他长期在交州任职，参与平定士燮之后交州的治理工作，对稳定岭南局势有所贡献。'
    growth_range:
