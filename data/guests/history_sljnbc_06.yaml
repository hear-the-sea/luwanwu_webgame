  - key: hist_sljnbc_0289
    name: 宗预
    archetype: civil
    flavor: '（？—264年）蜀汉大臣，南阳安众人，字德艳。他早年随张飞入蜀，后历任参军、右中郎将等职。建兴末年他奉命出使东吴，孙权问他为何蜀汉在白帝城增兵，他直言相答"臣以为东益巴丘之戍，西增白帝之守，皆事势宜然"，不卑不亢，孙权深为敬重。他为人刚直抗言，敢于批评当朝权贵。姜维北伐时他曾直言劝谏，与姜维意见相左。'
