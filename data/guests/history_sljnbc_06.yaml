  - key: hist_sljnbc_0287
    name: 周群
    archetype: civil
    flavor: '（？—？）蜀汉官员，巴西阆中人。其父周舒精通图谶学，他继承家学，善于观测天象、推算吉凶。刘备入蜀后征辟他为从事。建安十九年（214年）庞统攻打雒城前，他观察天象后警告此行不利，庞统不听，果然在雒城中箭身亡。此后他又多次预言军事行动的吉凶得失，多有应验。刘备对他的术数既有所采纳，又不完全依赖。'
