  - key: hist_sljnbc_0281
    name: 李势
    archetype: civil
    flavor: '（？—361年）成汉末代皇帝，巴氐族人，李寿之子。他继位后荒淫无度，不理朝政，宠信奸佞，诛杀忠良，成汉政局日益腐败。他纵情声色，大兴土木，耗尽国力，百姓怨声载道。永和三年（347年）东晋权臣桓温率军伐蜀，成汉军队一触即溃。他先是负隅顽抗，后见大势已去便出城投降。桓温将他押送建康，东晋朝廷封他为归义侯。'
