  - key: hist_sljnbc_0273
    name: 孙桓
    archetype: military
    flavor: '（198年—223年）东吴宗室将领，吴郡富春人，孙河之子。他年少时便以武勇著称，深得孙权器重。夷陵之战时他担任前锋，在猇亭一带抵御刘备大军。刘备军初期攻势猛烈，孙桓一度被围困于夷道城，处境危急。后陆逊火烧连营，刘备大败，孙桓趁势反击追杀，斩获甚众。刘备败逃时感叹道"吾昔过京下时，孙桓还是个小孩子，如今竟将我逼迫至此"。'
    growth_range:
