  - key: hist_sljnbc_0298
    name: 大乔
    archetype: civil
    flavor: '（？—？）江东二乔之姐，孙策之妻。庐江皖县人，与妹妹小乔并称"江东二乔"，国色天香名动江南。孙策攻破皖城后，将二乔姐妹纳入府中，孙策娶大乔为妻，周瑜娶小乔为妻，一时传为佳话。然而好景不长，仅仅两年后孙策便遇刺身亡，年仅二十六岁，而大乔当时也不过二十岁左右。她年纪轻轻便守寡，此后的人生史书再无记载，只知她育有一子孙绍。'
    growth_range:
    - 3
    - 6
    attribute_weights:
      force: 12
      intellect: 58
      defense: 18
      agility: 12
  - key: hist_sljnbc_0299
    name: 陈登
    archetype: military
    flavor: '（163年—201年）字元龙，湖海豪气。下邳淮浦人，出身名门。他少有才名，博览群书，尤精农事水利。他出任广陵太守时政绩卓著，发展农业、兴修水利，使百姓安居乐业，深得民心。吕布占据徐州时，他表面依附实则暗通曹操，为曹操击败吕布立下大功。孙策挥军北上欲夺广陵，他以弱兵据守，设伏诱敌，大败孙策军队，斩杀数千人，孙策大怒却无可奈何。'
    growth_range:
