  - key: hist_sljnbc_0286
    name: 杜微
    archetype: civil
    flavor: '（？—？）蜀汉儒者，梓潼涪县人。他年轻时曾任益州从事，刘璋时期便有才名。刘备入蜀后他隐居不仕，自称患病。建兴年间，诸葛亮多次征辟，他皆推辞不就。后经王连再三恳请，方才出山。诸葛亮对他礼遇有加，特派车驾迎接。他晚年耳聋，诸葛亮每与他议事便以书信笔谈。他被任命为谏议大夫，虽不能听闻政事，诸葛亮仍敬重其学识德望，常咨询意见。'
