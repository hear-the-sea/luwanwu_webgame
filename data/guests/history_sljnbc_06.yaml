  - key: hist_sljnbc_0292
    name: 吕凯
    archetype: civil
    flavor: '（？—225年）蜀汉官吏，永昌不韦人，字季平。他世居永昌，深得当地百姓信任。建兴三年（225年）南中诸郡叛乱，益州郡雍闿起兵反蜀，遣使招降永昌。他与府丞王伉拒绝叛军招降，闭境死守，使永昌郡始终保持对蜀汉的忠诚。诸葛亮南征平定叛乱后，表奏他的功绩，封他为云南太守。不久他在任上被叛夷所杀。'
