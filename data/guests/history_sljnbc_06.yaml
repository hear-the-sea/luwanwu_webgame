  - key: hist_sljnbc_0290
    name: 张遵
    archetype: military
    flavor: '（？—263年）蜀汉将领，涿郡人，张飞之孙，张苞之子。他继承祖父张飞的勇武之风，在蜀汉后期军中任职。景耀六年（263年）魏将邓艾偷渡阴平，直逼成都。卫将军诸葛瞻率军迎战，张遵随军出征。两军在绵竹关激战，诸葛瞻拒绝邓艾的招降，率军出战。激战中蜀军大败，诸葛瞻、诸葛尚父子战死，张遵亦力战殉国。'
