  - key: hist_sljnbc_0300
    name: 步骘
    archetype: civil
    flavor: '（？—247年）宽弘长者，平定交州。临淮淮阴人，与诸葛瑾、严畯齐名，并称"东吴三友"。他年轻时家贫却志向远大，以才学闻名。他追随孙权后历任要职，以宽厚仁慈、处事稳重著称。他最大的功绩是平定交州。交州刺史士燮死后其子士徽据城自立不服东吴，他奉命率军南下。他先礼后兵，遣使晓谕利害，士徽不听，他便挥军进攻。'
    growth_range:
    - 3
