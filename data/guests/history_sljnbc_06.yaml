  - key: hist_sljnbc_0285
    name: 许靖
    archetype: civil
    flavor: '（？—222年）蜀汉大臣，汝南平舆人，字文休。他早年与从弟许劭共同主持"月旦评"，品评天下人物，名动一时。后避乱辗转各地，最终入蜀依附刘璋。刘备围攻成都时他曾欲越城投降，刘璋未予追究。刘备入主成都后，法正曾言其浮华无实，刘备却认为可借其名望安定人心，仍加以重用。刘备称帝时他任司徒，位列三公。'
