  - key: hist_sljnbc_0283
    name: 李撰
    archetype: civil
    flavor: '（？—？）蜀汉学者，梓潼涪县人，字钦仲，李仁之子。他家学渊源，自幼博览群书，精通五经，尤其擅长《周易》。他为《古文易》作注解，阐发义理，对《易经》的研究有独到见解。他虽然没有担任显赫官职，却以学问著称于蜀中，是当时著名的经学大师。他的学术著作对蜀中经学的传承发展贡献良多，培养了众多弟子。'
