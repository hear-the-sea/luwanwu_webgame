  - key: hist_sljnbc_0293
    name: 张松
    archetype: civil
    flavor: '（？—212年）益州别驾，蜀郡成都人，字子乔。他身材矮小、相貌丑陋，但才华过人，尤以过目不忘著称。曹操平定荆州后，刘璋派他出使曹营。他因受曹操冷遇而心怀怨恨，归来后劝说刘璋迎接刘备入川。他暗中与法正、孟达联络，为刘备绘制益州地图并提供军事情报。刘备入川后与刘璋反目，他的兄长张肃告发其通敌之事，刘璋遂将其处死。'
