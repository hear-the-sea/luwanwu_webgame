  - key: hist_sljnbc_0275
    name: 张星彩
    archetype: civil
    flavor: '（？—？）蜀汉敬哀皇后，涿郡人，车骑将军张飞长女。建兴元年（223年），刘禅继位后立她为皇后。她为人温婉贤淑，主持后宫井井有条，深得刘禅敬重。她与刘禅成婚时，张飞已去世两年，这桩婚姻既是刘备生前的安排，也是巩固刘张两家关系的政治联姻。她在世时后宫安宁，无争宠之事。建兴十五年（237年）她去世，谥号敬哀皇后。'
    growth_range:
    - 3
    - 6
    attribute_weights:
      force: 20
      intellect: 40
      defense: 20
      agility: 20
  - key: hist_sljnbc_0276
    name: 祝融夫人
    archetype: military
    flavor: '（生卒不详）三国题材中的文学与传说人物，常被设定为南蛮王孟获之妻。她的形象主要见于《三国演义》等文学作品和民间传说，正史中并无记载。小说中描写她是火神祝融氏的后裔，精通武艺，善使飞刀，能连发五刀百发百中，还擅长丈八长标。诸葛亮南征孟获时她屡次出战，曾生擒蜀将马忠、张翼等人。'
