# 历史人物门客 - 三国两晋南北朝（第06批，每批50名）

heroes:
  green:
  - key: hist_sljnbc_0251
    name: 孟获
    archetype: military
    flavor: '（？—？）七擒七纵，南中归心。南中蛮族首领，在当地各部落中威望极高。建兴三年南中诸郡叛乱，他被推为首领与蜀汉对抗。诸葛亮亲率大军南征，采纳马谡"攻心为上"的策略，决心收服其心而非仅取其地。诸葛亮七次设计擒获孟获，每次都给予优待并释放，问他服不服。孟获前六次皆不服，声称"来时不知虚实，今知矣，再战必胜"。'
    growth_range:
    - 3
    - 6
    attribute_weights:
      force: 40
      intellect: 15
      defense: 23
      agility: 22
  - key: hist_sljnbc_0252
    name: 刘禅
    archetype: civil
    flavor: '（207年—271年）乐不思蜀，亡国之君。涿郡涿县人，刘备之子，蜀汉第二任也是末代皇帝，在位四十一年。长坂坡之战时他尚在襁褓，由赵云怀抱杀出重围得以保全。他在诸葛亮辅佐下度过前半生，诸葛亮事无巨细皆亲力亲为，他只需无为而治。诸葛亮去世后他逐渐重用宦官黄皓，朝政日非。魏将邓艾偷渡阴平直逼成都，他在谯周劝说下不战而降，蜀汉灭亡。'
    growth_range:
    - 3
    - 7
    attribute_weights:
      force: 20
      intellect: 40
      defense: 20
      agility: 20
  - key: hist_sljnbc_0253
    name: 糜竺
    archetype: civil
    flavor: '（？—220年）雍容敦雅，蜀汉元老。东海朐县人，世代经商，家资巨万。黄巾之乱时他散尽家财资助刘备，又将亲妹嫁与刘备为夫人，自此追随刘备二十余年不离不弃。他虽不习武艺，却有商人特有的精明干练和雍容气度。吕布偷袭徐州时，他护送刘备家眷辗转逃难；刘备入蜀后，他官至安汉将军，地位在诸葛亮之上，深受尊崇。'
    growth_range:
    - 3
    - 6
    attribute_weights:
      force: 20
      intellect: 40
      defense: 20
      agility: 20
  - key: hist_sljnbc_0254
    name: 简雍
    archetype: civil
    flavor: '（？—？）蜀汉大臣，涿郡涿县人，与刘备同乡。他少年时便与刘备交好，此后随刘备颠沛流离，辗转于各方势力之间，始终不离不弃。他为人滑稽诙谐，不拘礼法，言谈之间常有妙语，能够缓解紧张气氛。刘备入蜀围攻成都时，他奉命单骑入城劝说刘璋投降。凭借其出色的口才和外交能力，他成功说服刘璋开城出降，使刘备兵不血刃取得益州。'
    growth_range:
    - 3
    - 6
    attribute_weights:
      force: 12
      intellect: 56
      defense: 22
      agility: 10
  - key: hist_sljnbc_0255
    name: 孙乾
    archetype: civil
    flavor: '（？—？）蜀汉大臣，北海人，字公祐。他是刘备早期最重要的谋士和外交使者之一。刘备依附袁绍时，他奉命与袁绍周旋；刘备投奔刘表时，他又负责联络沟通。无论面对何方势力，他皆能应对得体，从容不迫，以其雍容的风度和精辟的辞令赢得对方敬重。他为刘备在诸侯纷争的乱世中寻找立足之地发挥了重要作用。'
    growth_range:
    - 3
    - 6
    attribute_weights:
      force: 12
      intellect: 56
      defense: 22
      agility: 10
  - key: hist_sljnbc_0256
    name: 伊籍
    archetype: civil
    flavor: '（？—？）蜀汉大臣，山阳人，字机伯。他初仕刘表，与刘备交好。刘表去世后，他追随刘备入蜀。他机智敏捷，擅长辞令，多次出使东吴。有一次孙权故意在他拜见时问"事无道之君乃劳乎"，意在嘲讽刘备。他立即应声答道"一拜一起，未足为劳"，以机智的回答化解了尴尬并维护了蜀汉尊严。他还精通法律典章，与诸葛亮、法正、刘巴、李严共同制定了《蜀科》。'
    growth_range:
    - 3
    - 6
    attribute_weights:
      force: 14
      intellect: 54
      defense: 24
      agility: 8
  - key: hist_sljnbc_0257
    name: 秦宓
    archetype: civil
    flavor: '（？—226年）蜀汉大臣，广汉绵竹人，字子敕。他博学多才，精通经学，尤其擅长《易经》。刘备东征伐吴时，他上书劝谏，认为天时不利不宜出兵，刘备不听，将他下狱。后来夷陵之败验证了他的判断。东吴使者张温出使蜀汉，自恃才高，欲以辩论压倒蜀中名士。秦宓与之辩论天地之理，张温词穷理屈，大为叹服。'
    growth_range:
    - 3
    - 6
    attribute_weights:
      force: 12
      intellect: 56
      defense: 22
      agility: 10
  - key: hist_sljnbc_0258
    name: 邓芝
    archetype: civil
    flavor: '（178年—251年）刚正不阿，重修吴盟。义阳新野人，汉光武帝刘秀的后裔。他早年入蜀避乱，刘备入蜀后他历任县令，政绩卓著。刘备驾崩后蜀吴关系紧张，他奉诸葛亮之命出使东吴。面对孙权的犹豫和威胁，他从容不迫，晓以利害，言辞恳切却不卑不亢。孙权问他若吴蜀联军灭魏后天下当如何处置，他坦然答曰"各安其分"，以坦诚赢得了孙权的敬重。'
    growth_range:
    - 3
    - 7
    attribute_weights:
      force: 12
      intellect: 56
      defense: 22
      agility: 10
  - key: hist_sljnbc_0259
    name: 霍峻
    archetype: military
    flavor: '（178年—217年）孤城坚守，葭萌奇功。南郡枝江人，早年率部曲投奔刘备，随刘备入蜀。刘备进攻刘璋时，令霍峻镇守葭萌关，扼守蜀中咽喉要道。刘璋部将扶禁、向存率万余人来攻，欲从后方截断刘备退路。霍峻手下仅有数百人，却毫无惧色，坚守孤城长达一年。敌军久攻不下，士气渐衰，霍峻趁机选锐出击，阵斩向存，大破敌军。'
    growth_range:
    - 3
    - 6
    attribute_weights:
      force: 34
      intellect: 12
      defense: 40
      agility: 14
  - key: hist_sljnbc_0260
    name: 孙尚香
    archetype: military
    flavor: '（？—？）东汉末年至三国时期女性人物，吴郡富春人，孙权之妹，刘备之妻。史书记载她名不详，"孙尚香"之名出自戏曲小说。她性格刚烈尚武，有其父兄之风，左右侍婢百余人皆执刀侍立。赤壁之战后为巩固孙刘联盟，孙权将她嫁给刘备。刘备每次入内寝都心怀畏惧，诸葛亮也认为"主公在公安，北畏曹操之强，东惮孙权之逼，近则惧孙夫人生变于肘腋之下"。'
    growth_range:
    - 3
    - 6
    attribute_weights:
      force: 40
      intellect: 15
      defense: 23
      agility: 22
  - key: hist_sljnbc_0261
    name: 邓忠
    archetype: military
    flavor: '（？—264年）曹魏将领，邓艾之子。他自幼随父征战，耳濡目染之下精通军事。段谷之战中他与姜维交锋，表现出色。景耀六年（263年）魏灭蜀之战，他随父偷渡阴平。绵竹之战中诸葛瞻拒降出战，他与师纂奋勇杀敌，为魏军取胜立下功勋。灭蜀后钟会诬告邓艾谋反，他与父亲一同被收押，押解途中被卫瓘派人杀害，死于非命。'
    growth_range:
    - 3
    - 7
    attribute_weights:
      force: 40
      intellect: 15
      defense: 23
      agility: 22
  - key: hist_sljnbc_0262
    name: 陈震
    archetype: civil
    flavor: '（？—235年）蜀汉大臣，南阳人，字孝起。他早年追随刘备，入蜀后历任要职。建兴七年（229年）孙权称帝，他奉诸葛亮之命出使东吴祝贺，与孙权商定孙刘两国的边界划分及灭魏后的领土归属，确立了两国的同盟关系。他为人老成持重，办事稳妥可靠。诸葛亮临终前在给蒋琬的信中特意提到他，称赞其"忠纯之性，老而益笃"。'
    growth_range:
    - 3
    - 7
    attribute_weights:
      force: 12
      intellect: 56
      defense: 22
      agility: 10
  - key: hist_sljnbc_0263
    name: 马忠
    archetype: military
    flavor: '（？—249年）蜀汉将领，巴西阆中人，字德信。他早年追随刘备，在永安担任护卫，刘备临终时曾向诸葛亮推荐他。诸葛亮南征后他接任庲降都督，镇守南中二十余年。他治理南中恩威并施，对归顺者优待安抚，对叛乱者坚决镇压，深得各族百姓拥护。在他治理下南中地区安定繁荣，成为蜀汉稳定的兵源和物资供应地，源源不断向前线输送兵员和物资。'
    growth_range:
    - 3
    - 6
    attribute_weights:
      force: 40
      intellect: 15
      defense: 23
      agility: 22
  - key: hist_sljnbc_0264
    name: 邓方
    archetype: military
    flavor: '（？—221年）蜀汉将领，南郡人，字孔山。刘备入蜀后设立庲降都督一职专门管理南中地区，邓方被任命为首任庲降都督，驻扎在南昌县。他为人轻财好施，慷慨大方，对待部下宽厚仁慈，深得南中各族百姓拥护。他在任期间采取恩威并施的政策，使南中地区保持了相对安定的局面。他治理有方，为后来蜀汉继续经营南中奠定了良好基础。'
    growth_range:
    - 3
    - 6
    attribute_weights:
      force: 40
      intellect: 15
      defense: 23
      agility: 22
  - key: hist_sljnbc_0265
    name: 张南
    archetype: military
    flavor: '（？—222年）蜀汉将领，字文进。他追随刘备多年，屡立战功。章武元年（221年）刘备发动夷陵之战讨伐东吴，张南随军出征，担任前锋重任。初期蜀军攻势凌厉，连战连捷，张南奋勇杀敌，多有斩获。然而陆逊坚守不战，待蜀军疲惫后发动火攻，蜀军大败。张南所部被吴军重重包围，他率部下死战突围，终因寡不敌众，力战殉国。'
    growth_range:
    - 3
    - 7
    attribute_weights:
      force: 40
      intellect: 15
      defense: 23
      agility: 22
  - key: hist_sljnbc_0266
    name: 冯习
    archetype: military
    flavor: '（？—222年）蜀汉将领，南郡人，字休元。章武元年（221年）刘备东征伐吴，冯习被任命为大督，负责指挥前线作战。蜀军初期进展顺利，攻占了夷陵等地。然而陆逊采取避其锐气的策略，坚壁不战，待蜀军疲惫后寻机反击。当陆逊发动火攻时，蜀军营寨连绵数百里，一时大乱，冯习无法有效指挥各部协同作战。'
    growth_range:
