  - key: hist_sljnbc_0295
    name: 孙坚
    archetype: military
    flavor: '（155年—191年）江东猛虎，孙氏奠基人。吴郡富春人，据说是孙武后裔。他少年时便以勇武闻名，曾单枪匹马追击海盗，斩首而还。黄巾之乱时他募兵讨贼，屡建功勋；讨伐董卓时他担任先锋，威震诸侯，是联军中唯一击败董卓军的将领。他在洛阳废墟的井中得到传国玉玺，引发了后来无数纷争。'
