      agility: 14
  - key: hist_suitang_0015_liyuan
    name: 李渊
    archetype: military
    flavor: （566年-635年）唐朝开国皇帝，隋末动乱中据太原起兵，入关定都长安，完成从地方势力到新王朝的转换。其治国更多依赖宗室与旧部，重在稳住局面、承接隋制并安抚关中。玄武门之变后退居太上皇，开国功业被太宗贞观光芒遮蔽，但没有李渊的起兵与定鼎，盛唐亦无从谈起；他擅长在乱局里抓住窗口，却未能驾驭家族内部的权力竞争。
