      defense: 24
      agility: 12
  - key: hist_suitang_0017_lilongji
    name: 李隆基
    archetype: civil
    flavor: （685年-762年）唐玄宗，前期任用姚崇、宋璟等整饬吏治与财政，开创"开元"盛世气象。其晚年政治判断失衡，重用李林甫、杨国忠，边镇节度使势力坐大，安史之乱爆发后仓皇西奔，盛世转入大乱。玄宗并非简单昏君：他既能建立高效官僚运转，也在享乐与权力结构变化中失去制衡能力。一生宛如分水岭，前半是高峰，后半是裂痕。
    growth_range:
    - 7
    - 10
    attribute_weights:
      force: 20
      intellect: 44
      defense: 24
      agility: 12
  - key: hist_suitang_0018_hanyu
    name: 韩愈
    archetype: civil
    flavor: （768年-824年）唐代文人与官员，古文运动的旗手之一，主张以质朴有力的散文重振儒家论述。其文锋锐，敢批佛骨迎奉，遂被贬潮州，却在地方仍能兴学济民。韩愈的影响不仅在作品，更在"文以载道"的姿态：他把文章当作公共议论的工具，推动中唐思想与文学的转向。其后学者从欧阳修到苏轼皆受其启发，韩愈由此成为连接唐宋文脉的重要节点。
    growth_range:
    - 7
    - 10
    attribute_weights:
      force: 12
      intellect: 54
      defense: 22
      agility: 12
  - key: hist_suitang_0019_huineng
    name: 慧能
    archetype: civil
    flavor: （638年-713年）禅宗重要人物，后世尊为六祖，与"顿悟"思想联系最紧密。其生平在史传与宗门传说中层层叠加，细节未必尽可考，但其思想影响确实深远：强调心性觉悟与日用修行，推动禅宗从经院式阐释转向更贴近生活的实践。与神秀等人之争被后世构造成"南北宗"叙事，既有宗门竞争，也有思想分化。慧能的意义不在神异故事，而在于他为中国佛教提供更简化、可传播的修行语言，使禅宗成为影响中国文化气质的重要力量。
    growth_range:
    - 7
    - 10
    attribute_weights:
      force: 10
      intellect: 56
      defense: 20
      agility: 14
  - key: hist_suitang_0020_yaochong
    name: 姚崇
    archetype: civil
    flavor: （651年-721年）开元初年宰相，务实而敢于兴革。其关注吏治与选任，强调整顿积弊、提高行政效率，与宋璟并称"姚宋"，共同塑造玄宗前期的清明风气。姚崇不以空谈取名，而以具体措施应对财政、军政与地方管理的难题；史书亦记其处事强硬，容易得罪人。正因敢动旧习，他才能在盛世起步阶段压住官场松散，把"盛世"从口号变成可运行的治理状态。
    growth_range:
    - 7
