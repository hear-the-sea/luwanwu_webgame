  - key: hist_suitang_0023_zhangxu
    name: 张旭
    archetype: civil
    flavor: （675年-约750年）唐代书法家，狂草代表，号称"草圣"。其书风奔放，线条如骤雨旋风，往往以一气呵成见精神，不拘成法却自成法度。史载其性情放达，好酒善舞剑，艺术灵感常来自生活的极端状态；这类传闻或有夸张，但其作品确把草书推向更强调速度与气势的境界。张旭最令人震撼的，正是这种突破：让书法不只是一种规范书写，而成为情绪与力量的直接呈现。
    growth_range:
