    attribute_weights:
      force: 38
      intellect: 28
      defense: 26
      agility: 8
  - key: hist_suitang_0008_xuanzang
    name: 玄奘
    archetype: civil
    flavor: （602年-664年）唐代僧人，俗名陈祎，以求法之志远行天竺。其西行历时多年，往返万里，携回大量佛典梵本与见闻资料，归国后主持译经，推动法相学说体系化。其行记《大唐西域记》兼具地理、民族与宗教信息，为研究中亚与印度古史的重要文献。玄奘并非神话人物，而是以严谨学问与惊人毅力完成一场学术远征，其"求真"精神亦因此被后世反复引用。
    growth_range:
