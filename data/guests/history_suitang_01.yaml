      agility: 10
  - key: hist_suitang_0022_zhangjiuling
    name: 张九龄
    archetype: civil
    flavor: （678年-740年）开元名相兼诗人，出身岭南而入主中枢，是唐代用人广度的象征之一。其在朝重视选贤与风纪，性情端方，敢于指出边镇用人隐患，反对以逢迎取宠。被罢相后，言路日窄，后世常将其视为盛世转折处的标志人物。诗名如"海上生明月"清朗悠远，与其政治品格相映。张九龄的价值在于把原则感带进权力核心，虽难改写大势，却留下可循尺度。
    growth_range:
