  - key: hist_suitang_0010_weizheng
    name: 魏征
    archetype: civil
    flavor: （580年-643年）唐代谏臣，以直言敢谏著称。早年曾依附太子李建成，玄武门后仍被太宗重用，体现贞观初年用人不拘旧怨的政治风格。其奏疏多切中制度与人事之病，如《谏太宗十思疏》强调居安思危、节制欲望。太宗所谓"以人为镜，可以明得失"与其相互成就：明君愿听逆耳，贤臣敢言是非。魏征的意义不在于每一条建议都被采纳，而在于把"可受批评"变成朝廷自我校正的习惯。
    growth_range:
