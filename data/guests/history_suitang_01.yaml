  - key: hist_suitang_0016_duruhui
    name: 杜如晦
    archetype: civil
    flavor: （585年-630年）贞观宰辅，与房玄龄并称，后世以"房谋杜断"形容其善决断、能在关键时刻拍板。其早从秦王府幕僚起步，玄武门后入相，处理政务利落，重效率而不喜冗文。惜英年早逝，太宗为之恸惜并优礼追赠。杜如晦的贡献不在宏大理论，而在把复杂局面迅速落到可执行的决策上，是贞观政治得以运转的"决断之刃"；其早逝也使贞观少了一只断事的手。
