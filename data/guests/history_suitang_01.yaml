  - key: hist_suitang_0012_yanzhenqing
    name: 颜真卿
    archetype: civil
    flavor: （709年-784年）唐代书法家与官员，楷书雄健端正，后世称"颜体"，与柳公权并列为取法典范。安史之乱中其守城起兵，秉持忠义，写下《祭侄文稿》以记家国之痛，文字与书法同具震撼。晚年奉命出使叛镇，终遭害而殉国。颜真卿的历史形象并不依赖传说：一方面是艺术上的规范与气骨，另一方面是乱世中坚持原则的官员人格，两者相互印证，遂成千古重名。
