      agility: 12
  - key: hist_suitang_0013_chairong
    name: 柴荣
    archetype: military
    flavor: （921年-959年）后周世宗，五代少见的强势改革者。其在位时间不长，却能整顿军纪、裁抑冗费、改善财政与兵制，使后周一度呈现"由乱入治"的气象。对外多次用兵，试图打开北方战略空间并削弱割据势力，为统一奠基。史书称其勤于政务，敢用人才而不惮触动既得利益。其早逝使大业未竟，后世常以"若假以岁月"感叹其潜力；而其改革遗产亦为宋初整合天下提供了现实基础。
