    attribute_weights:
      force: 38
      intellect: 20
      defense: 28
      agility: 14
  - key: hist_suitang_0023_liji
    name: 李勣
    archetype: military
    flavor: （594年-669年）原名徐世勣，后赐姓李。其从瓦岗起家，转入唐军后屡立战功，参与平定东突厥、经营西北并征讨辽东等重大行动，是唐代持续数十年的战略骨干。除用兵外，他亦善于在太宗、高宗两朝之间保持政治安全，既能领兵远征，也能处理边镇与朝廷关系。李勣的厉害不在传奇一役，而在长期稳定的军事执行力，像一根贯穿初唐的脊梁。
    growth_range:
