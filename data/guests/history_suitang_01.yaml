    attribute_weights:
      force: 14
      intellect: 50
      defense: 24
      agility: 12
  - key: hist_suitang_0021_songjing
    name: 宋璟
    archetype: civil
    flavor: （663年-737年）唐代名相，以清正峻切著称。其为相时直面权贵与弊政，强调法度与节俭，屡以坚决态度纠正朝廷风气，因此常与姚崇并称。宋璟的特点是不愿讨好：敢说难听话，也敢在制度与人事上做"刹车"，使开元政治更有底线。其刚直亦意味着不善周旋，仕途起落不免；但正因为难以折腰，他才更像盛世里的一块硬石，提醒权力保持自律。
    growth_range:
