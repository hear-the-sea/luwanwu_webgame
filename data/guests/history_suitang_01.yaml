      defense: 26
      agility: 10
  - key: hist_suitang_0014_sunsimiao
    name: 孙思邈
    archetype: civil
    flavor: （541年-682年）隋唐之际医家，后世尊为"药王"。其生平多与隐居行医相连，年寿传说甚多而难尽考，但其医术与著述影响确凿。其所编《备急千金要方》《千金翼方》汇集方药、针灸、养生与急救经验，重视临床可行与病因辨析；又提出"大医精诚"，以医德为先，强调对生命的敬畏。孙思邈的价值不在传奇寿数，而在于把医疗经验整理成体系，并以伦理约束医者之心。
