    attribute_weights:
      force: 16
      intellect: 48
      defense: 20
      agility: 16
  - key: hist_suitang_0022_zhuwen
    name: 朱温
    archetype: military
    flavor: （852年-912年）唐末军阀，起自黄巢军后转而归唐，凭藩镇兵权步步上位。其挟持唐廷、清除异己并最终取代唐朝建立后梁，标志五代乱世的开端。史书多记其用权残酷、猜忌深重，手段不择，却也能在瓦解的制度上搭起新的军政架构。晚年内斗激烈，终被子所弑。朱温并非乱世偶然，而是藩镇体系走到尽头时最尖锐的产物；他留下的不是统一，而是一套以武力更迭的规则。
    growth_range:
    - 7
