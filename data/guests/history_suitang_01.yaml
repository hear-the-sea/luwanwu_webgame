# 历史人物门客 - 隋唐五代（第01批：橙色2人 + 紫色48人）

heroes:
  orange:
  - key: hist_suitang_0001_lishimin
    name: 李世民
    archetype: military
    flavor: （598年-649年）唐代第二位皇帝，亲历隋末群雄并以武功定鼎。玄武门之变后登基，能收揽旧怨、广开言路，重用房玄龄、杜如晦、魏征等，以制度整饬与轻徭薄赋推动"贞观之治"。对外击破东突厥、经营西域，奠定大唐盛世根基；但夺嫡流血亦成为其政治才能背后的阴影，功业与手段并存。其治世之名由此确立，也因权力起点而更显复杂。
    growth_range:
    - 10
    - 14
    attribute_weights:
      force: 42
      intellect: 24
      defense: 22
      agility: 12
  - key: hist_suitang_0002_yangjian
    name: 杨坚
    archetype: military
    flavor: （541年-604年）隋文帝，凭北周外戚与重臣身份受禅建隋，继而灭陈一统。其在位整顿吏治、修律令、务节俭，推动均田与赋役制度运行，形成"开皇之治"。科举取士在其朝逐步制度化，弱化门阀世族垄断。晚年围绕太子更易与宫廷权力生变，隋室由盛转衰的伏线亦在此埋下；其身后死因与宫闱传闻多有争议。其治下的统一与集权既是盛世起步，也是隐患积累。
    growth_range:
    - 10
    - 14
    attribute_weights:
      force: 38
      intellect: 28
      defense: 22
      agility: 12
  purple:
  - key: hist_suitang_0003_wuzhao
    name: 武曌
    archetype: civil
    flavor: （624年-705年）唐高宗后、武周皇帝，亦是中国历史上唯一自立称帝的女性。她由才人入宫，凭政治手腕掌控中枢，690年改国号周。其治下扩大科举取士、重用能臣以整饬吏治，同时倚重酷吏与严刑以压制反对，朝局锋利而高效。她既能用狄仁杰等人稳住国本，也以强势改写宗室与外戚格局；无字碑不言褒贬，正合其功过并陈的身后名。
    growth_range:
    - 8
    - 11
    attribute_weights:
      force: 12
      intellect: 54
      defense: 22
      agility: 12
  - key: hist_suitang_0004_libai
    name: 李白
    archetype: civil
    flavor: （701年-762年）唐代诗人，才情纵逸，善以夸张想象写山河与人生。早岁漫游四方，入长安受荐又不得久留，诗名却因此传播天下。安史之乱后卷入永王事件而遭流放，途中遇赦，漂泊更深。他既能写"长风破浪"的豪气，也能写"举杯邀明月"的孤清；仕途屡挫，却以语言的光芒把盛唐的自信与不羁留在诗史。他把个人性情写成时代气象，后世以此辨认盛唐。
    growth_range:
    - 7
    - 10
    attribute_weights:
      force: 15
      intellect: 52
      defense: 18
      agility: 15
  - key: hist_suitang_0005_dufu
    name: 杜甫
    archetype: civil
    flavor: （712年-770年）唐代诗人，身逢由盛转衰的大时代。安史之乱前后辗转流离，入仕短暂却目睹民生凋敝，于诗中记录饥馑、征役与家国裂痕，故被称为"诗史"。他不以奇崛取胜，而以沉郁顿挫的节制与同情心穿透现实；既写宫阙与典礼，也写茅屋、饥寒与战火。个人困顿与国家忧思交织，使其诗成为理解唐代社会的长期坐标。他用一生把悲悯写成史料，也写成诗的良知。
    growth_range:
    - 7
    - 10
    attribute_weights:
      force: 12
      intellect: 54
      defense: 20
      agility: 14
  - key: hist_suitang_0006_lijing
    name: 李靖
    archetype: military
    flavor: （571年-649年）唐初名将与兵法家，历经开国征战而成一代统帅。其军事生涯以平定割据、经营边防见长，破东突厥、征吐谷浑等战事使唐朝北疆大定。史传称其用兵谨严，善于审势与统筹后勤，不以勇武逞一时。晚年居功自守，得以善终；《李卫公问对》被后世奉为谈兵要籍，既留下战功，也留下方法。后世评其能将能相，正是初唐军事与政治融合的写照。
    growth_range:
    - 8
    - 11
    attribute_weights:
      force: 40
      intellect: 26
      defense: 24
      agility: 10
  - key: hist_suitang_0007_guoziyi
    name: 郭子仪
    archetype: military
    flavor: （697年-781年）中唐名将，安史之乱中屡任主帅，参与收复长安、洛阳并稳定关中局势。其功高而能自抑，善于与朝廷、藩镇、宦官等多方周旋，故得以历事多朝而名望不坠。史书称其治军宽简而能得众心，乱后仍以威望镇抚边镇。后世敬其"功成而不逼主"的分寸，也因此把他视作乱世功臣少见的全身之例；在功名与猜忌之间仍能存身，亦见其政治分寸。
    growth_range:
