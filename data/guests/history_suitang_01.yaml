      agility: 14
  - key: hist_suitang_0011_direnjie
    name: 狄仁杰
    archetype: civil
    flavor: （630年-700年）武周时期重臣，历任地方与中枢要职，以持重与识人著称。其在武则天朝多次入相，既能处理疑狱，又能以大局为先缓和朝廷震荡。史载其屡以言谏与举荐稳住政局，亦力保李唐宗室血脉，为后来的复唐创造条件。后世小说与公案常借其形象铺陈断案传奇，但真实的狄仁杰更像一位善于在权力高压下保持法度与尺度的政治人物，功在"稳住局面"。
