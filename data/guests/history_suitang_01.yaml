    attribute_weights:
      force: 10
      intellect: 58
      defense: 18
      agility: 14
  - key: hist_suitang_0009_fangxuanling
    name: 房玄龄
    archetype: civil
    flavor: （579年-648年）贞观名相，长于谋划与统筹，后世以"房谋杜断"概括其与杜如晦分工。其辅佐唐太宗处理政务、整饬制度，重视选任与奏议，使贞观政治更趋成型。史书称其为相谨慎，不喜矜伐，善于在激烈的开国功臣集团中维持秩序与效率。除政务外，他亦参与修史等文治工程。其功不在一役一战，而在把新王朝的运转方式落实到日常细节。
    growth_range:
    - 7
    - 10
    attribute_weights:
      force: 14
