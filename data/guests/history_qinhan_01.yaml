    flavor: （前179年—前104年）西汉儒学代表人物之一，以天人感应、大一统等论述影响后世极深。后世常用"罢黜百家、推崇儒术"概括武帝时期的思想转向，但具体落实远比一句口号复杂；董仲舒的作用更像提供了一套能与皇权、礼制和官僚秩序相接的解释框架，让"经术"可以被国家使用、被政策引用。与此同时，他并非全然迎合权力，其学说里也包含对君主的约束想象，借"天"与"礼"来规训政治。
