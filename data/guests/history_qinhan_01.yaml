heroes:
  orange:
  - key: hist_qinhan_0001
    name: 刘邦
    default_gender: male
    archetype: civil
    flavor: （前256年—前195年）汉高祖，大汉帝国的开创者。他出身沛县平民，任亭长，性情通达，善结人心。秦末大乱，他起兵自称沛公，先入关中灭秦，推行"约法三章"，以宽简收拢民意。楚汉相争中，刘邦在彭城等战役屡遭重挫，却能迅速整合残部、稳住关中与粮道，并以联盟、分化与用人弥补自身战术短板：萧何守内、张良谋划、韩信统军，各司其职。最终垓下合围项羽，建立汉朝。登基后，他着手收束异姓王，确立皇权安全边界，开出一个"开国—整合—守成"的范式。
    growth_range:
    - 8
    - 13
    attribute_weights:
      force: 18
      intellect: 44
      defense: 22
      agility: 16
  - key: hist_qinhan_0002
    name: 刘彻
    default_gender: male
    archetype: military
    flavor: （前156年—前87年）汉武帝，西汉第七位皇帝，千古一帝。他十六岁即位，雄才大略，在位五十四年。对内，他颁布推恩令，巧妙削弱诸侯势力；罢黜百家，独尊儒术，确立儒家思想的正统地位；建立察举制，选拔人才；改革币制，推行盐铁官营，加强中央集权。对外，他派张骞出使西域，开辟丝绸之路；任用卫青、霍去病大破匈奴，封狼居胥，将被动和亲转变为主动出击，极大地拓展了汉朝版图，奠定了中国版图的基础。晚年虽有穷兵黩武之失，但他下轮台罪己诏，及时调整政策。
    growth_range:
    - 8
    - 14
    attribute_weights:
      force: 36
      intellect: 22
      defense: 24
      agility: 18
  - key: hist_qinhan_0003
    name: 刘秀
    default_gender: male
    archetype: military
    flavor: （前5年—57年）汉光武帝，东汉开国皇帝，杰出的政治家、军事家。他是汉高祖九世孙，新莽末年天下大乱，遂与兄刘縯等在南阳起兵响应复汉。昆阳之战中，义军以少胜多，击溃王莽主力，为天下形势逆转奠定基础。其后他在河北经营，根据地渐成；与更始政权分道后即位称帝，历年征讨，先后平定赤眉、铜马等割据与流民武装，完成统一。在位崇尚节俭、务农桑，减轻赋役，整饬吏治，收敛武功而以休养生息为务，史称"光武中兴"。
    growth_range:
    - 8
    - 13
    attribute_weights:
      force: 40
      intellect: 18
      defense: 26
      agility: 16
  purple:
  - key: hist_qinhan_0005
    name: 吕雉
    default_gender: female
    archetype: civil
    flavor: （前241年—前180年）汉高祖刘邦皇后，吕后。她是刘邦患难之妻，性格刚毅。刘邦死后，她临朝称制十五年，是中国历史上第一位掌握实权的女性统治者。她诛杀韩信、彭越，大封吕氏。她手段狠辣，将戚夫人做成"人彘"。然而在治国上，她延续"与民休息"政策，废除挟书律，使汉初社会安定发展。功过是非，后人评说各异。
    growth_range:
    - 8
    - 10
    attribute_weights:
      force: 14
      intellect: 52
      defense: 22
      agility: 12
  - key: hist_qinhan_0006
    name: 张良
    default_gender: male
    archetype: civil
    flavor: （约前250年—前186年）谋圣，汉初三杰之一。韩国贵族之后，博浪沙刺秦始皇未遂，后遇黄石公授《太公兵法》。他足智多谋，辅佐刘邦，在鸿门宴上巧计救主。楚汉战争中，他提出不立六国后裔、联合彭越英布、重用韩信等关键战略。下邑之谋、借箸代筹，他的计策屡屡挽救汉军于危难。刘邦评价他"运筹帷幄之中，决胜千里之外"。汉朝建立后，他功成身退，托病隐居，不贪权位，得以善终。
    growth_range:
    - 8
    - 11
    attribute_weights:
      force: 10
      intellect: 60
      defense: 18
      agility: 12
  - key: hist_qinhan_0007
    name: 张衡
    default_gender: male
    archetype: civil
    flavor: （78年—139年）东汉科学家、文学家、政治家。南阳人，才华横溢，学贯古今。在天文学上，他制作浑天仪并著《灵宪》，阐述浑天思想，对日月星辰运行有系统论述；亦能较为合理地解释月食等天象。史载他制"候风地动仪"，以示地震来向，成为古代器械史上的重要记述。在数学与文学方面，他亦有圆周率近似、辞赋名篇《二京赋》《归田赋》等成就。
    growth_range:
    - 8
    - 10
    attribute_weights:
      force: 8
      intellect: 62
      defense: 18
      agility: 12
  - key: hist_qinhan_0008
    name: 扬雄
    default_gender: male
    archetype: civil
    flavor: （前53年—18年）西汉学者、文学家，字子云。他少好学，不为章句，口吃不能剧谈，而好深沉之思。早年作《甘泉》、《河东》等赋，虽模仿司马相如，但已有自家风骨。中年后转向哲学，仿《周易》作《太玄》，仿《论语》作《法言》，主张"文章小道，壮夫不为"。王莽篡汉时，他因曾作《剧秦美新》而被后世诟病，曾因牵连案件欲跳楼自杀（未遂）。他是汉代学术转型期的关键人物。
    growth_range:
    - 7
    - 10
    attribute_weights:
      force: 8
      intellect: 60
      defense: 20
      agility: 12
  - key: hist_qinhan_0009
    name: 李斯
    default_gender: male
    archetype: civil
    flavor: （生年不详—前208年）秦朝丞相，杰出的政治家、文学家。他师从荀子，入秦后被秦始皇重用。他主张废分封、立郡县，建议焚书坑儒，统一文字、货币、度量衡，为秦朝建立中央集权制度立下了汗马功劳。他的《谏逐客书》是千古名篇，其小篆书法也堪称一绝。秦始皇死后，他为保权位，屈从赵高，矫诏杀扶苏，立胡亥。最终被赵高陷害，腰斩于咸阳市，夷三族。
    growth_range:
    - 8
    - 10
    attribute_weights:
      force: 10
      intellect: 58
      defense: 20
      agility: 12
  - key: hist_qinhan_0010
    name: 王昭君
    default_gender: female
    archetype: civil
    flavor: （约前54年—约前19年）中国古代四大美女之一，落雁之姿。南郡人。元帝时入宫为家人子。竟宁元年，匈奴呼韩邪单于入朝求亲，她自请出塞和亲。她劝导单于休兵养民，维护了汉匈长达半个世纪的和平。她死后葬于大黑河畔，墓草常青，称"青冢"。昭君出塞的故事千古流传，常被视作民族关系史上的象征性片段。
    growth_range:
    - 7
    - 10
    attribute_weights:
      force: 8
      intellect: 54
      defense: 18
      agility: 20
  - key: hist_qinhan_0011
    name: 王莽
    default_gender: male
    archetype: civil
    flavor: （前45年—23年）新朝建立者，字巨君。初为大司马，以恭俭博取名声，被尊为"周公再世"。掌权后，毒死汉平帝，篡汉自立，改国号为新。他推行一系列复古改革（王莽改制），如王田、私属、五均六筦等，但脱离实际，导致社会矛盾激化，天下大乱。绿林赤眉起义爆发，昆阳之战主力被歼，最终被攻入长安的义军所杀。他是中国历史上著名的篡权者和理想主义改革家。
    growth_range:
    - 8
    - 10
    attribute_weights:
      force: 14
      intellect: 52
      defense: 22
      agility: 12
  - key: hist_qinhan_0012
    name: 蔡伦
    default_gender: male
    archetype: civil
    flavor: （约61年—121年）东汉宦官与工艺改良者，史载其在宫廷体系内主持、推动造纸技术改进，所成"蔡侯纸"使纸张更轻便可用，逐步取代丝帛与简牍，改变了书写与知识流通的成本结构。技术从经验走向可复制的产品，往往先要被资源与制度托起来。蔡伦晚年卷入宫廷权力风波而自尽（史载），也提示宦官在近侍体系中的高风险——离权力越近，越容易被风向裹挟。蔡伦的功绩在文明史上极大，但他的命运仍逃不开宫廷政治的冷酷。
    growth_range:
    - 8
    - 10
    attribute_weights:
      force: 8
      intellect: 60
      defense: 20
      agility: 12
  - key: hist_qinhan_0013
    name: 冒顿
    default_gender: male
    archetype: military
    flavor: （生年不详—前174年）匈奴杰出的政治家、军事家，匈奴帝国的缔造者。他早年为质于月氏，后盗马逃回。为了夺取政权，他制造响箭（鸣镝），训练骑射，下令"鸣镝所射而不射者，斩"。他率部弑父自立，统一草原各部，向东击败东胡，向西击走月氏，向南吞并楼烦等，建立了庞大的匈奴帝国。白登之围中，他将汉高祖刘邦困住七日，迫使汉朝开启和亲政策。
    growth_range:
    - 8
    - 10
    attribute_weights:
      force: 44
      intellect: 14
      defense: 26
      agility: 16
  - key: hist_qinhan_0014
    name: 卫青
    default_gender: male
    archetype: military
    flavor: （生年不详—前106年）西汉大司马大将军，长平侯。私生子出身，初为平阳公主骑奴，因姐姐卫子夫受宠而显贵。他首次出征奇袭龙城，揭开汉匈战争反败为胜的序幕。此后七战七捷，收复河套，大破右贤王。漠北之战中，他统率大军穿越大漠，大破匈奴单于主力，追至赵信城，焚其积聚而还。他用兵灵活，不拘古法，善于以战养战。位极人臣后，他依然谦虚谨慎，不结党营私，敬重士大夫，深受部下爱戴。
    growth_range:
    - 8
    - 10
    attribute_weights:
      force: 44
      intellect: 14
      defense: 26
      agility: 16
  - key: hist_qinhan_0015
    name: 司马迁
    default_gender: male
    archetype: civil
    flavor: （约前145年—约前86年）西汉史学家、文学家，被尊为"史圣"。他生于龙门，承袭父职任太史令。因替李陵败降之事辩护，触怒武帝，受腐刑之辱。他忍辱负重，发愤著书，历时十余年，终于完成《史记》。全书一百三十篇，五十二万余字，记载了从黄帝到汉武帝太初年间三千年的历史。他首创纪传体通史体裁，不仅如实记录历史，更在字里行间寄托了"究天人之际，通古今之变，成一家之言"的宏大理想。
    growth_range:
    - 8
    - 11
    attribute_weights:
      force: 8
      intellect: 62
      defense: 18
      agility: 12
  - key: hist_qinhan_0016
    name: 檀石槐
    default_gender: male
    archetype: military
    flavor: （137年—181年）东汉时期鲜卑族杰出的首领。他勇健有智谋，被推举为大人。他在弹汗山建立王庭，统一了鲜卑各部，并在原来的匈奴故地上建立起强大的鲜卑部落联盟。他把鲜卑分为东、中、西三部，各置大人统领。他多次率军南下攻打东汉边境，拒绝汉朝的和亲与封王。汉朝多次派兵征讨，皆大败而归。他是继冒顿单于之后，北方草原上最强大的霸主。
    growth_range:
    - 8
    - 10
    attribute_weights:
      force: 44
      intellect: 14
      defense: 26
      agility: 16
  - key: hist_qinhan_0017
    name: 班超
    default_gender: male
    archetype: military
    flavor: （32年—102年）投笔从戎，定远侯。他不甘于抄书的平庸，立志效法傅介子。率三十六人出使西域，以"不入虎穴，焉得虎子"的胆识斩杀匈奴使者，震慑鄯善。史载其在西域经营多年，以纵横之术协调诸国，恢复交通与汉廷影响。班超的成就不只来自胆略，也来自对局势的精细判断：一面要和匈奴势力周旋，一面要处理各国反复与盟约成本。晚年他屡求归国，言辞动人，恰说明"功在边地"的人也最清楚边地的消耗与孤绝。
    growth_range:
    - 8
    - 10
    attribute_weights:
      force: 42
      intellect: 16
      defense: 24
      agility: 18
  - key: hist_qinhan_0018
    name: 萧何
    default_gender: male
    archetype: civil
    flavor: （前257年—前193年）汉初三杰之首，开国丞相。他早年任沛县主吏，随刘邦起义。入咸阳时，诸将争夺金银，唯他收取秦宫图书律令，掌握了天下户口险要。楚汉战争期间，他留守关中，安抚百姓，输送粮草，确保汉军"给馈饷，不绝粮道"。刘邦称帝后，论功行赏，萧何第一。他制定《九章律》，奠定汉朝法制基础。晚年为避祸不得不自污名节。他慧眼识韩信，推荐其为大将军。去世前推荐曹参继任，留下"萧规曹随"的佳话。
    growth_range:
    - 8
    - 11
    attribute_weights:
      force: 12
      intellect: 56
      defense: 20
      agility: 12
  - key: hist_qinhan_0019
    name: 蒙恬
    default_gender: male
    archetype: military
    flavor: （生年不详—前210年）秦朝著名将领，出身将门，深受秦始皇倚任。史载他北击匈奴、经营河套，并主持修筑长城与边塞防御体系；这类工程并非"筑墙"二字能概括，还牵涉屯戍、转输、徭役与边地秩序的长期组织。后世关于蒙恬与"毛笔"相关的说法流传很广，但多属传说层面的附会，宜与史实区分。秦始皇死后，沙丘政变改写继承，赵高矫诏逼蒙恬自尽（史载），使他成为秦帝国高层失序的牺牲者之一。
    growth_range:
    - 8
    - 10
    attribute_weights:
      force: 44
      intellect: 14
      defense: 26
      agility: 16
  - key: hist_qinhan_0020
    name: 霍光
    default_gender: male
    archetype: civil
    flavor: （生年不详—前68年）西汉权臣，麒麟阁十一功臣之首。他是霍去病异母弟，受汉武帝临终托孤，辅佐汉昭帝。昭帝英年早逝后，霍光先迎立昌邑王刘贺，又以其不称任而废黜，随后拥立宣帝刘询，权势一时无两。霍光长期掌握中枢，使"托孤政治"变成可运转的制度安排：既要维持朝局稳定，又要在皇权回收时把自己放在可被接受的位置。史书称其执政时期轻徭薄赋、与民休息，常与"昭宣中兴"并论，但霍氏在霍光死后遭清算，也提醒人们权臣的功业与家族命运并不同步。
    growth_range:
    - 8
    - 10
    attribute_weights:
      force: 14
      intellect: 52
      defense: 22
      agility: 12
  - key: hist_qinhan_0021
    name: 霍去病
    default_gender: male
    archetype: military
    flavor: （前140年—前117年）西汉大司马骠骑将军，冠军侯。他是卫青的外甥，少年英武，十七岁随军出征，率八百轻骑深入敌后数百里，斩获两千余人，勇冠全军。十九岁指挥河西之战，歼灭和招降匈奴十万之众，俘获祭天金人，直取祁连山。二十一岁漠北决战，他率军北进两千余里，大破左贤王，封狼居胥，登临翰海，视匈奴如无物。他不仅战功赫赫，更留下了"匈奴未灭，何以家为"的豪言。
    growth_range:
    - 8
    - 11
    attribute_weights:
      force: 48
      intellect: 10
      defense: 24
      agility: 18
  - key: hist_qinhan_0022
    name: 韩信
    default_gender: male
    archetype: military
    flavor: （约前231年—前196年）兵仙，汉初三杰之一。他早年受胯下之辱，后投奔项羽不被重用，转投刘邦。萧何月下追韩信，力荐其为大将军。他制定"还定三秦"之策，明修栈道，暗度陈仓。东进灭魏、破代、下赵、降燕、伐齐，潍水之战全歼龙且二十万楚军。垓下之战，他统帅六十万大军围歼项羽。他的军事指挥艺术达到巅峰，背水一战、拔帜易帜、四面楚歌等战例皆为兵家经典。功成后被封楚王，后贬淮阴侯，终因吕后猜忌，被诱杀于长乐宫钟室。
    growth_range:
    - 8
    - 11
    attribute_weights:
      force: 46
      intellect: 16
      defense: 22
      agility: 16
  - key: hist_qinhan_0023
    name: 项羽
    default_gender: male
    archetype: military
    flavor: （前232年—前202年）西楚霸王，力拔山兮气盖世。他是楚国名将项燕之孙，目生重瞳，力能扛鼎。巨鹿之战，他破釜沉舟，九战九捷，以少胜多歼灭秦军主力，威震诸侯。入关后主持鸿门宴，分封天下十八路诸侯。然而他政治上缺乏远见，刚愎自用，不仅放走刘邦，更在楚汉战争中屡失良机。彭城之战虽以三万精骑大破刘邦五十六万联军，却最终在垓下之战中陷入十面埋伏。四面楚歌声中，他与虞姬诀别，不肯过江东，自刎于乌江。
    growth_range:
    - 8
    - 10
    attribute_weights:
      force: 52
      intellect: 8
      defense: 24
      agility: 16
  - key: hist_qinhan_0026
    name: 叔孙通
    default_gender: male
    archetype: civil
