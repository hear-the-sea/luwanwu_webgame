    flavor: （生年不详—92年）东汉外戚与名将。凭外戚身份崛起，后在北方军事行动中建立声望，势力极盛，终因权势过大而被迫自尽。窦宪的典型性在于"功与祸同源"：外戚身份让他更容易掌握资源与军权，军事胜利又进一步放大威望，使他看起来几乎不可撼动；但对皇权而言，这种不可撼动本身就是最大危险。史书所记的清算过程提醒人们，东汉政治对外戚的容忍有明确上限。
