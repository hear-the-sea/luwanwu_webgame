  - key: hist_mingqing_0216
    name: 朱彝尊
    default_gender: male
    archetype: civil
    flavor: （1629年—1709年）字锡鬯，号竹垞，清初伟大的文学家、史学家与藏书家，“浙西词派”的创始人。他博通经史，尤精于诗词与考据，在学术界享有极高地位。朱彝尊曾参与修纂《明史》，并主持编纂了宏篇巨制《词综》，正式确立了清词的审美法度。他在艺术上主张“清空婉约”，其诗作格调高雅、神韵自然，完美实践了儒家的中庸美学。他在官场职期间为人正直，特别是在提携后辈才子（如资助查慎行等）方面表现出广阔的胸襟。他的一生是在书斋、官场与山水间游刃有余的典型。他那种将深厚的文化底蕴融入日常生活的姿态，使其成为了那一时代最具魅力的文化偶像，其学术成果为清代文化的繁荣奠定了坚实的基础。
    growth_range:
    - 6
    - 9
    attribute_weights:
      force: 12
      intellect: 58
      defense: 18
      agility: 12
  - key: hist_mingqing_0234
    name: 李定国
    default_gender: male
    archetype: military
    flavor: （1621年—1662年）字宁宇，号鸿远，南明最杰出的民族英雄、统帅与军事家。他在大明江山极度危亡之际，以非凡的勇气与军事天才，在桂林、衡阳两场规模宏大的战役中连斩清朝两位亲王（尼堪、孔有德），威震天下，使清廷一度产生退避关外的战术动摇。李定国为人清廉自律、爱民如子，他的一生都在致力于维护大明的最后一抹余晖与民族的尊严。他在极度压抑、资源匮乏的环境下依然能保持昂扬的斗志与高超的阵地战术。当得知永历帝被杀的噩耗后，他在极度悲愤中嘱托部下“宁死荒外，勿降也”，随即呕血而逝。李定国的一生是华夏英雄气概的极致体现，他那种关注民族大义远高于个人安危的境界，使其成为了中华民族历史上最受后世尊敬的统帅。
    growth_range:
    - 6
    - 9
    attribute_weights:
      force: 42
      intellect: 18
      defense: 24
      agility: 16
  - key: hist_mingqing_0237
    name: 秦良玉
    default_gender: female
    archetype: military
    flavor: （1574年—1648年）字贞素，明末杰出的女性军事家、统帅。她出身将门，率领骁勇善战的“白杆兵”镇守四川石砫，在平定播州之乱、抗击满洲入侵及平定奢安之乱中立下赫赫战功。秦良玉是历史上唯一一位载入正史将相列传的女性将领，官至都督佥事、充总兵官。她为人刚毅果敢、治军极其严明，深受朝廷器重与地方百姓爱戴。他在明亡后依然坚守四川山地，拒绝向大西军和清军投降，直至去世。秦良玉的一生体现了中国女性在民族危机时刻爆发出的非凡胆略与不屈节操。她那种不计个人荣辱、以残弱之躯守护一方安宁的精神，使其成为了中华民族历史上最具传奇色彩的英雄符号，其功勋与德操永垂青史。
    growth_range:
    - 6
    - 9
    attribute_weights:
      force: 42
      intellect: 18
      defense: 24
      agility: 16
  - key: hist_mingqing_0239
    name: 赵翼
    default_gender: male
    archetype: civil
    flavor: （1727年—1814年）字云崧，号瓯北，清代著名的文学家、史学家与考据大家。他提出的“江山代有才人出，各领风骚数百年”名句传诵千古。他在史学研究上具有神般的洞察力，所著《廿二史札记》以考据严谨、见解独到著称，被誉为清代史学三大名著之一。赵翼不仅精通经史，在诗歌理论上亦有极其深刻的造诣，主张文学应随时代变革而不断创新，反对盲目拟古。他在官场中亦能保持清流本色，为人耿直敢言。赵翼通过极其辛勤的文献搜罗与实地调研，为后世留下了大量的文化种子。他那种致力于文化保存与历史反思的自觉担当，展现了清代士大夫的责任感，他在主持书院期间培养了大量杰出人才，是古典教育体制下的成功范本。
    growth_range:
    - 6
    - 9
    attribute_weights:
      force: 12
      intellect: 58
      defense: 18
      agility: 12
  - key: hist_mingqing_0240
    name: 袁枚
    default_gender: male
    archetype: civil
    flavor: （1716年—1797年）字子才，号简斋，清代著名的文学家、评论家与美食家，“性灵说”的领军人物。他主张文学应“独抒性灵，不拘格套”，提倡清新自由、充满灵动的创作风格，猛烈冲击了当时僵化的模拟之风。袁枚在诗文创作上展现了极高的天赋，其笔记小说《子不语》深刻观察世态人情，文字风趣且寓意深远。他在晚年辞官归隐江宁随园，过着极其风雅、自由且极具生活情趣的生活，撰写了著名的《随园食单》。袁枚的一生体现了盛世体制下文人追求个性解放与精神独立的巨大努力。他在文化传承与人才培养（尤其是招收女弟子）方面的开明举措，为清朝中叶的文化繁荣注入了鲜活的生命力，其声望跨越海内外。
    growth_range:
    - 6
    - 9
    attribute_weights:
      force: 12
      intellect: 58
      defense: 18
      agility: 12
  - key: hist_mingqing_0251
    name: 王世贞
    default_gender: male
    archetype: civil
    flavor: （1526年—1590年）字元美，号凤洲，明代文坛盟主，文学流派“后七子”的首席领袖。他才华横溢、博古通今，一生著作等身，在文学创作、史学评论、艺术鉴赏及典章考证上均具有神般的洞察力。王世贞官至刑部尚书，以学术博洽与行政精明干练著称。他在文学上主张“文必秦汉、诗必盛唐”，深刻影响并主宰了明代中后期的主流审美风气。他的一生致力于中华文化的系统性重构与传承，通过其显赫的政治与学术地位，奖掖并提拔了大量优秀的基层才子。王世贞那种将儒家的现实行政责任与个人的才情世界高度统一的姿态，使其成为了那一时代最具魅力的文化偶像。他在史学著作《弇州山人四部稿》中展现的历史公正感，是对文化尊严的有力捍卫。
    growth_range:
    - 6
    - 9
    attribute_weights:
      force: 12
      intellect: 58
      defense: 18
      agility: 12
  - key: hist_mingqing_0256
    name: 李东阳
    default_gender: male
    archetype: civil
    flavor: （1447年—1516年）字宾之，号西涯，明代著名的政治家、大臣、文学家，茶陵派文学的首席领袖。他官至内阁首辅、大学士，历事英、宪、孝、武四朝，以处事圆融、为人厚道与极其深沉的政治智慧著称于史。他在内阁任职长达数十年，在极其险峻的政治博弈与权宦乱政的局势中，通过巧妙的周旋与政治智慧化解了多次重大的宫廷危机，保护了大批正直官员。李东阳在诗歌创作上具有极高造诣，主张文学应追求一种平淡天真、含蓄深厚的艺术风格。他的一生致力于文化的重构与经典传统的传承，奖掖了大量优秀才子。李东阳那种将儒家的现实政治责任与个人的文化修养高度统一的姿态，使其成为了那一时代最具感召力的文化与政治双重领袖。
    growth_range:
    - 6
    - 9
    attribute_weights:
      force: 12
      intellect: 58
      defense: 18
      agility: 12
  - key: hist_mingqing_0230
    name: 祖大寿
    default_gender: male
    archetype: military
    flavor: （生年不详—1656年）辽东名将，明末清初著名的军事将领。他在辽东边防前线征战数十年，曾是关宁铁骑的核心统帅之一，在宁远大捷、宁锦大战中立下显赫战功，威震满洲。面对清军长期且极其残酷的重兵围困（如大凌河之战），祖大寿在弹尽粮绝、甚至出现人相食的绝境下，为了保全家小与旧部性命，曾两次降清。他为人沉稳老练、深谙城防建筑与野战攻守之道，其在投降后的长期隐忍与对汉族官兵的暗中维护，深刻反映了在那场天崩地裂的历史巨变中，高级将领所面临的极端复杂且痛苦的生存困境。他的一生是明清易代惨烈历史的一个缩影，其军事干才深受皇太极高度重视，其命运抉择也成为了研究那一时代民族与权力关系的典型样本。
    growth_range:
    - 6
    - 9
    attribute_weights:
      force: 42
      intellect: 18
      defense: 24
      agility: 16
  green:
  - key: hist_mingqing_0208
    name: 姚际恒
    default_gender: male
    archetype: civil
    flavor: （1647年—1715年）字立方，号九我，清初著名的学者、古籍辨伪学家。他以惊人的勇气与怀疑精神，敢于挑战流传千年的传统教条，撰写了不朽名著《古今伪书考》，对大量充斥在所谓“经典”中的伪作进行了尖锐且科学的批判。姚际恒治学极其严谨、逻辑缜密，主张学问必须建立在怀疑、考证与实证的坚实基础之上。他在处理极其复杂的古籍冲突时，展现了令人叹服的辩证力量。虽然他的一生在社会的边缘与学术的寂寞中度过，但他那追求真理的一致性态度，使其成为了中国文化史上著名的科学叛逆者。他那种不仅关注文本表象且关注逻辑真实性的前瞻性视野，使其成为了清初思想界中最具现代色彩的人物之一，其勇气至今依然闪耀。
    growth_range:
    - 4
    - 7
    attribute_weights:
      force: 12
      intellect: 58
      defense: 18
      agility: 12
  - key: hist_mingqing_0209
    name: 赵秉忠
    default_gender: male
    archetype: civil
    flavor: （1573年—1626年）字季卿，号圣海，明代著名的官员。他在万历二十六年高中状元，其留存至今的状元卷（中国现存唯一的状元卷真迹）详细论述了“第一等治国方略”，主张政府应广开言路、关心民疾，并提出了“实心先立，则实政行”的深刻政治见解，展现了极其深厚的人文关怀与卓越的政治见识。赵秉忠在官场中亦能保持正直节操，为人耿直敢言，官至礼部尚书。他在担任地方高级官员期间，特别是在解决复杂的赋税不均与土地纠纷方面表现出卓越干才。赵秉忠的一生是中国传统全才型知识分子的典型，他在政治理念上追求社会公平与行政透明，其思想在当时具有极强的前瞻性。他的这种不仅修身且致力于改良体制的努力，展现了精英阶层高尚的责任感。
    growth_range:
    - 4
    - 7
    attribute_weights:
      force: 12
      intellect: 58
      defense: 18
      agility: 12
  - key: hist_mingqing_0210
    name: 骆腾凤
    default_gender: male
    archetype: civil
    flavor: （1771年—1842年）字鸣周，号等峰，清代著名的测量学家、数学家。他在清朝中叶主持及参与的大型地理测绘与水利勘测项目中，率先使用了极其先进的球面三角学计算方法与经纬仪观测技术，显著提高了地图与工程设计的精确度。骆腾凤不仅在理论上功力深厚，更是一位具备极强野外作业能力的实干家。他在极其艰苦的边疆环境与黄河工地中，亲自带队进行实地勘测，为帝国的疆域管理与河防安全提供了最可靠的数据保障。骆腾凤的一生体现了清代学者在应用科学领域的非凡才干与奉献精神。他那种将严密的数学逻辑转化为民生福祉与国家安全的实践，具有极其强烈的现实意义。他的成果不仅巩固了版图数据，更为当时的国防建设提供了科学支持。
    growth_range:
    - 4
    - 7
    attribute_weights:
      force: 12
      intellect: 58
      defense: 18
      agility: 12
  - key: hist_mingqing_0211
    name: 刘纶
    default_gender: male
    archetype: civil
    flavor: （1711年—1773年）字如得，号春涵，乾隆朝著名的重臣，以行政干练、学识渊博与博古通今著称。他在军机处与内阁任职多年，参与了乾隆盛世多项重大国策的起草与审定。刘纶为人谦和、办事缜密，特别是在处理边疆复杂民族事务与高级人才选拔中表现出高度专业性与原则性。他在文学与史学研究上亦有显赫成就，被誉为“词林翘楚”。他的一生是盛世体制下高级官僚的缩影。他那种将深厚的儒家学术修养有机融入日常行政管理的风格，极大地提升了政府的办事效率与决策质量。他在维护行政体系平稳运行与民族文化保存方面的默默贡献，为乾隆盛世的长期繁荣积累了厚重的政治资本，其处事之缜密深受皇帝信任。
    growth_range:
    - 4
    - 7
    attribute_weights:
      force: 12
      intellect: 58
      defense: 18
      agility: 12
  - key: hist_mingqing_0212
    name: 裘曰修
    default_gender: male
    archetype: civil
    flavor: （1712年—1773年）字漫士，号叔度，乾隆朝著名的官员、治水专家。他一生致力于国家水利建设，先后主持治理了永定河、黄河、淮河等重要水系，其治水思想强调“顺应自然、因势利导、蓄泄兼筹”。裘曰修不仅工程技术精湛，且为人清廉正直，在面对权臣压力时依然坚持科学的工程标准，绝不苟且。他的一生是真正将学术写在华夏大地上的杰出典范。他在防灾救荒与基层水利行政管理中表现出的卓越干才，造福了数省千万百姓。他那种不计名利、一心为民的赤诚，展现了清代士大夫阶层中极其稀缺的担当精神。他不仅大幅提升了工程效率，更在理论上为后世水利研究留下了宝贵的文字遗产，其治绩深受地方百姓的长久感怀。
    growth_range:
    - 4
    - 7
    attribute_weights:
      force: 12
      intellect: 58
      defense: 18
      agility: 12
  - key: hist_mingqing_0213
    name: 董邦达
    default_gender: male
    archetype: civil
    flavor: （1699年—1769年）字孚存，号东山，清代著名的官员、画家。他在政治上官至礼部尚书，办事精明干练。在艺术上则精于山水，其画风深受董其昌影响，意境幽远、笔墨清劲且不失庄重。董邦达曾受命参与编纂多部宫廷画册，其作品代表了乾隆朝文人画在官方审美体系中的最高水平。他在处理复杂的行政事务与外交礼仪中展现了极高的组织才干。他的一生体现了清代高级官员在学术、行政与艺术领域的多重成功平衡。他那种将中国传统艺术的美学素养引入国家文化建设的风格，极大地提升了政府的文化软实力。他在人才选拔与文化政策制定方面发挥了核心作用，其学问与治绩均得到了历史的高度认可，其温润如玉的人格魅力亦深受同僚称道。
    growth_range:
    - 4
    - 7
    attribute_weights:
      force: 12
      intellect: 58
      defense: 18
      agility: 12
  - key: hist_mingqing_0214
    name: 钱维城
    default_gender: male
    archetype: civil
    flavor: （1720年—1772年）字宗磐，号稼轩，乾隆十年状元，清代著名的重臣与画家。他在绘画上造诣极其深厚，尤精于山水，画风沉着厚重、气韵生动、格调高雅，深受乾隆皇帝的推崇与器重。钱维城官至刑部侍郎，在任期间用法严明、行政极其干练。他在处理极其复杂的司法案件与律例编纂中，展现了惊人的逻辑力量与对真相的执着追求。他的一生是传统文人“学优则仕、仕优则艺”的完美典范。他那种在名利旋涡中依然能够保持艺术傲骨与专业精神的姿态，使其成为了那一时代士子竞相效法的榜样。他在文化传承与经典整理方面的贡献，为清代学术的延续提供了重要的人格支持，其工作风格以“缜密”著称于史。
    growth_range:
