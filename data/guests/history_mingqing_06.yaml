      agility: 12
  - key: hist_mingqing_0215
    name: 李钟伦
    default_gender: male
    archetype: civil
    flavor: （1663年—1706年）字顺古，清初著名的学者、理学家。他在学术上坚定主张经世致用，极力反对空谈性理，强调一切学问均应有益于社会生产与民生改良。李钟伦为人正直、处事严明，在地方任职期间致力于整饬吏治、改良落后风俗与兴办书院。他的一生体现了清初儒生在面临社会巨大变革时刻，努力寻求学术突破与社会责任结合的巨大勇气。他那种追求真理、不计个人前程的胆略，使其成为了那一时代思想界的一位重要重镇。他在极其艰苦的基层环境下依然能保持作为高级知识分子的从容与尊严。其学说对后来的实证学派产生了直接的启发，他那种不仅关注文本本身且关注社会本质的视野，使其成为了那一时代最具前瞻性的人物之一。
    growth_range:
    - 4
    - 7
    attribute_weights:
      force: 12
      intellect: 58
