  - key: hist_mingqing_0257
    name: 陆深
    default_gender: male
    archetype: civil
    flavor: （1477年—1544年）字子渊，号俨山，明代著名的史学家、官员。他在考据学与古代典章制度的研究上具有极高地位，尤其在对古代礼制、官制与行政区划的复原上展现了卓越的才干。陆深治学极其严谨，主张“学问必建立在确凿证据之上”，曾主持并参与修纂了多部国家级史籍与地方通志，为后世研究明代前期的政治体制与社会运行留下了详实的一手资料。他在官场中为人正直、行政干练，致力于整饬吏治与地方教育的普及。他的一生体现了明代精英知识分子通过极其扎实的实证研究来维护民族文化尊严并服务于现实社会的努力。他那种跨学科的知识结构与对真理不懈追求的精神，使其成为了那一时代学术界的一位重镇，其学术成果至今仍深受推崇。
