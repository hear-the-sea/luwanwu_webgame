    flavor: '（约932年-986年）杨家将始祖，人称"杨无敌"。他原是北汉将领，归宋后成为抗辽前锋。他屡败辽军，令敌人闻风丧胆。陈家谷之战，他孤军奋战，最终被俘绝食而死，忠烈传家，成为杨家将故事的源头。'
