    flavor: '（953年-1009年）萧太后，辽朝最杰出的女政治家。她摄政二十七年，使辽朝达到鼎盛。她亲率大军南下，与宋朝签订澶渊之盟，确立了宋辽百年和平。她任用贤能，整顿吏治，是中国历史上最杰出的女主之一。杨家将故事中，她是令人敬畏的对手。'
