  - key: hist_songliaojinyuan_0078
    name: 李清照
    archetype: civil
    flavor: '（1084年-1155年）千古第一才女，婉约词宗。她早年与赵明诚琴瑟和鸣，"争渡争渡，惊起一滩鸥鹭"何等欢快。国破家亡后，"寻寻觅觅，冷冷清清，凄凄惨惨戚戚"道尽人间愁苦。她的词，是宋词婉约一派的最高峰，是女性文学的永恒丰碑。'
