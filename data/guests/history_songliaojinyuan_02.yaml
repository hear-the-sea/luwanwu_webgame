    flavor: '（1091年-1155年）南宋权相，千古罪人。他主持绍兴和议，以"莫须有"之罪杀害岳飞。他专权十九年，打压主战派，推行投降路线。他跪在岳飞墓前的铁像，承受着后人的唾骂。他虽是反面人物，却是了解南宋历史绑不开的关键人物。'
