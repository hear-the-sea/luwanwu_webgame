    flavor: '（?-1148年）金兀术，金朝最著名的将领。他率军南下，制造了靖康之变，俘虏徽钦二帝。他与岳飞多次交锋，黄天荡被韩世忠围困。他是宋人的噩梦，也是金朝的柱石。他的名字与南宋的屈辱紧紧相连。'
