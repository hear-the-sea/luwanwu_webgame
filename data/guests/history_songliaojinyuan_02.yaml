    flavor: '（1190年-1244年）契丹贵族，蒙古帝国的汉化推动者。他辅佐铁木真、窝阔台两代大汗，力主以文治国。他保护了无数汉地百姓免遭屠杀，推行税制改革，建立官僚体系。他是草原帝国向中华帝国转型的关键人物。'
