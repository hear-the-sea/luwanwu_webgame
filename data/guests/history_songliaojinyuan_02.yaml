    archetype: military
    flavor: '（1094年-1143年）辽朝宗室，西辽的开创者。他在辽朝灭亡后率残部西迁，在中亚建立西辽，延续契丹国祚九十年。他击败塞尔柱突厥，威震西域，被称为"中亚的亚历山大"。他证明了契丹人的骄傲与韧性，在异域书写了民族复兴的传奇。'
