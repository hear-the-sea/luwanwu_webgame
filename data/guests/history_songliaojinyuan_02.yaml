    name: 富弼
    archetype: civil
    flavor: '（1004年-1083年）北宋名相，三朝元老。他与范仲淹共同主持庆历新政，是北宋政坛的中流砥柱。他出使辽国，据理力争，维护了国家尊严。他为官清廉，政声卓著，是北宋名相的典范。'
