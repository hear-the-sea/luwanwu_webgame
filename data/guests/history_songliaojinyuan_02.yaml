    archetype: military
    flavor: '（1107年-1187年）宋高宗，南宋开国皇帝。他在靖康之变后南渡，建立南宋政权，延续宋祚一百五十年。他偏安江南，杀害岳飞，为后人所诟病。但他在乱世中保存了汉族政权，为中华文化的延续作出了贡献。功过是非，至今仍有争议。'
