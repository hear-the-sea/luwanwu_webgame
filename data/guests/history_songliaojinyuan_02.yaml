    archetype: civil
    flavor: '（1125年-1210年）位卑未敢忘忧国，事定犹须待阖棺。他一生写诗九千余首，是中国最高产的诗人之一。他渴望北伐收复中原，却壮志难酬，只能把满腔悲愤化作诗篇。死去元知万事空，但悲不见九州同——临终遗言，道尽了他一生的遗憾与执念。'
