    archetype: civil
    flavor: '（1086年-1127年）北宋太学生领袖，伏阙力谏的烈士。国势危急，他率诸生上书请诛误国权奸、拒辱求和，言辞如剑。风雷一呼终成悲歌，却把士人气节留给后世。'
