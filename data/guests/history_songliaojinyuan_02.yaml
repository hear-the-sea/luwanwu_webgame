heroes:
  blue:
  - key: hist_songliaojinyuan_0036
    name: 包拯
    default_gender: male
    archetype: civil
    flavor: （999年-1062年）铁面无私辨忠奸，龙图阁里青天在。他是开封府的传奇，是清官的代名词。他不畏权贵，弹劾外戚张尧佐；他明察秋毫，断案如神。他的故事被编成戏曲，成为家喻户晓的"包青天"。他用一生证明：公正与正义，是为官者永恒的追求。
    growth_range:
    - 6
    - 9
    attribute_weights:
      force: 12
      intellect: 58
      defense: 18
      agility: 12
  - key: hist_songliaojinyuan_0037
    name: 范仲淹
    default_gender: male
    archetype: civil
    flavor: （989年-1052年）先天下之忧而忧，后天下之乐而乐。他是北宋最杰出的政治家、文学家、军事家。庆历新政虽然短命，却开启了改革的先声。他镇守西北，令西夏不敢南望。一篇《岳阳楼记》，道尽了士大夫的家国情怀与人生境界。他是文武全才，更是士人楷模。
    growth_range:
    - 6
    - 9
    attribute_weights:
      force: 12
      intellect: 58
      defense: 18
      agility: 12
  - key: hist_songliaojinyuan_0038
    name: 司马光
    default_gender: male
    archetype: civil
    flavor: （1019年-1086年）二十年磨一剑，终成《资治通鉴》。他是北宋最伟大的史学家，用一部三百余万字的史书警醒后世君王。他与王安石政见不同，新旧党争贯穿其政治生涯。他砸缸救友的故事千古流传，展现了他从小就具有的果敢与智慧。他以史为鉴，为后世留下了宝贵的政治遗产。
    growth_range:
    - 6
    - 9
    attribute_weights:
      force: 12
      intellect: 58
      defense: 18
      agility: 12
  - key: hist_songliaojinyuan_0039
    name: 欧阳修
    default_gender: male
    archetype: civil
    flavor: （1007年-1072年）六一居士，北宋文坛的盟主。他倡导古文运动，提携苏轼、曾巩等后辈，影响了一代文风。《醉翁亭记》醉翁之意不在酒，《秋声赋》写尽人生萧瑟。他是唐宋八大家之一，更是北宋文化繁荣的推动者。他主持编纂《新唐书》《新五代史》，为后世留下珍贵史料。
    growth_range:
    - 6
    - 9
    attribute_weights:
      force: 12
      intellect: 58
      defense: 18
      agility: 12
  - key: hist_songliaojinyuan_0040
    name: 辛弃疾
    default_gender: male
    archetype: civil
    flavor: （1140年-1207年）醉里挑灯看剑，梦回吹角连营。他是词中之龙，豪放派的又一座高峰。他年少时带领五十骑闯入金营，生擒叛将，何等英雄！可惜南渡之后，壮志难酬，只能把满腔热血化作六百余首词章。众里寻他千百度，蓦然回首，那人却在灯火阑珊处。他是词人，更是失意的英雄。
    growth_range:
    - 6
    - 9
    attribute_weights:
      force: 12
      intellect: 58
      defense: 18
      agility: 12
  - key: hist_songliaojinyuan_0041
    name: 狄青
    default_gender: male
    archetype: military
    flavor: （1008年-1057年）面涅将军，北宋最传奇的武将。他出身行伍，脸上刺有囚犯印记，却凭借战功一路升至枢密使。他平定侬智高之乱，夜袭昆仑关，威震南疆。他打破了北宋重文轻武的传统，证明武将同样可以出将入相。可惜功高震主，最终郁郁而终。
    growth_range:
    - 6
    - 9
    attribute_weights:
      force: 42
      intellect: 18
      defense: 24
      agility: 16
  - key: hist_songliaojinyuan_0042
    name: 寇准
    default_gender: male
    archetype: civil
    flavor: （961年-1023年）北宋第一硬骨头，澶渊之盟的缔造者。辽军南侵，朝廷惶恐，唯有他力主亲征，最终促成宋真宗御驾北上。澶渊城下，他运筹帷幄，与辽国达成百年和约。他刚正不阿，直言敢谏，三起三落而本色不改。他用行动证明：大臣的风骨，可以撑起一个王朝的脊梁。
    growth_range:
    - 6
    - 9
    attribute_weights:
      force: 12
      intellect: 58
      defense: 18
      agility: 12
  - key: hist_songliaojinyuan_0043
    name: 赵光义
    default_gender: male
    archetype: military
    flavor: （939年-997年）宋太宗，北宋第二位皇帝。他在"烛影斧声"之谜中登基，却用二十二年的统治完成了兄长未竟的统一大业。他灭北汉，攻幽州，虽有高梁河之败，却奠定了北宋的基本版图。他重文轻武，扩大科举，确立了宋朝的文治传统。
    growth_range:
    - 6
    - 9
    attribute_weights:
      force: 42
      intellect: 18
      defense: 24
      agility: 16
  - key: hist_songliaojinyuan_0044
    name: 赵祯
    default_gender: male
    archetype: civil
    flavor: （1010年-1063年）宋仁宗，北宋在位最长的皇帝。他在位四十二年，创造了"仁宗盛治"。他宽厚仁慈，与士大夫共治天下，培养了包拯、范仲淹、欧阳修等一代名臣。他死后，就连辽国皇帝也为之落泪。他是中国历史上最符合"仁"字的皇帝。
    growth_range:
    - 6
    - 9
    attribute_weights:
      force: 12
      intellect: 58
      defense: 18
      agility: 12
  - key: hist_songliaojinyuan_0045
    name: 曾巩
    default_gender: male
    archetype: civil
    flavor: （1019年-1083年）唐宋八大家之一，南丰先生。他的散文平实质朴，不事雕琢，却自有一种沉稳大气。他是欧阳修的得意门生，与王安石同年登科。他一生著述颇丰，文风朴实无华，被誉为"醇儒"。其文章醇正典雅，成为宋代散文典范之一。
    growth_range:
    - 6
    - 9
    attribute_weights:
      force: 12
      intellect: 58
      defense: 18
      agility: 12
  - key: hist_songliaojinyuan_0046
    name: 柳永
    default_gender: male
    archetype: civil
    flavor: （约984年-约1053年）凡有井水处，皆能歌柳词。他是北宋最受欢迎的词人，却仕途坎坷，自称"奉旨填词柳三变"。他的词婉约缠绵，深入市井，开创了慢词创作的新天地。杨柳岸晓风残月，道尽了他一生的漂泊与柔情。
    growth_range:
    - 6
    - 9
    attribute_weights:
      force: 12
      intellect: 58
      defense: 18
      agility: 12
  - key: hist_songliaojinyuan_0047
    name: 黄庭坚
    default_gender: male
    archetype: civil
    flavor: （1045年-1105年）苏门四学士之一，江西诗派开创者。他与苏轼并称"苏黄"，书法与苏轼、米芾、蔡襄并称"宋四家"。他的诗追求瘦硬奇崛，自成一派。他的书法更是独树一帜，影响深远。其诗书并重，开宋代文人风骨之新境。
    growth_range:
    - 6
    - 9
    attribute_weights:
      force: 12
      intellect: 58
      defense: 18
      agility: 12
  - key: hist_songliaojinyuan_0048
    name: 富弼
    default_gender: male
    archetype: civil
    flavor: （1004年-1083年）北宋名相，三朝元老。他与范仲淹共同主持庆历新政，是北宋政坛的中流砥柱。他出使辽国，据理力争，维护了国家尊严。他为官清廉，政声卓著，是北宋名相的典范。其稳健持重，为朝廷提供了长期稳定的支撑。
    growth_range:
    - 6
    - 9
    attribute_weights:
      force: 12
      intellect: 58
      defense: 18
      agility: 12
  - key: hist_songliaojinyuan_0049
    name: 韩琦
    default_gender: male
    archetype: civil
    flavor: （1008年-1075年）北宋名将名相，与范仲淹齐名。他镇守西北多年，使西夏不敢东犯，军民称"韩范"。他后来入朝为相，历仕三朝，是北宋政坛的定海神针。其军政兼擅，堪称北宋治边之柱石。其名望深重，能安定朝野人心。
    growth_range:
    - 6
    - 9
    attribute_weights:
      force: 12
      intellect: 58
      defense: 18
      agility: 12
  - key: hist_songliaojinyuan_0050
    name: 赵普
    default_gender: male
    archetype: civil
    flavor: （922年-992年）宋初名相，辅佐赵匡胤统一天下。他策划陈桥兵变，参与杯酒释兵权，是北宋开国的首席功臣。他自称"半部论语治天下"，虽有自夸之嫌，却也展现了治国理政的才能。其权衡功过仍受史家反复评议，影响深远。
    growth_range:
    - 6
    - 9
    attribute_weights:
      force: 12
      intellect: 58
      defense: 18
      agility: 12
  - key: hist_songliaojinyuan_0051
    name: 王旦
    default_gender: male
    archetype: civil
    flavor: （957年-1017年）北宋名相，与寇准并称。他宽厚谦和，善于用人，是宋真宗时期的贤相。他与寇准政见不同，却能相互尊重，共同维护朝廷稳定。其调和之功，使政局少有震荡，被视为良臣典范。其稳健作风为宋初政治留下良好范式。
    growth_range:
    - 6
    - 9
    attribute_weights:
      force: 12
      intellect: 58
      defense: 18
      agility: 12
  - key: hist_songliaojinyuan_0052
    name: 赵佶
    default_gender: male
    archetype: civil
    flavor: （1082年-1135年）宋徽宗，艺术家皇帝。他创制瘦金体，工笔花鸟独步天下，书画成就冠绝历代帝王。可惜他沉溺艺术，荒废政事，任用蔡京等奸臣，终致靖康之耻。他是杰出的艺术家，却是失败的皇帝。其文化成就与政治失误形成强烈反差，史论不绝。
    growth_range:
    - 6
    - 9
    attribute_weights:
      force: 12
      intellect: 58
      defense: 18
      agility: 12
  - key: hist_songliaojinyuan_0053
    name: 苏洵
    default_gender: male
    archetype: civil
    flavor: （1009年-1066年）唐宋八大家之一，苏轼、苏辙之父。他二十七岁才开始发奋读书，大器晚成。他的散文雄健有力，《六国论》借古讽今，警醒世人。他培养出两个杰出的儿子，一门三苏，传为佳话。其家学渊源深厚，成为宋代文坛盛事。
    growth_range:
    - 6
    - 9
    attribute_weights:
      force: 12
      intellect: 58
      defense: 18
      agility: 12
  - key: hist_songliaojinyuan_0054
    name: 苏辙
    default_gender: male
    archetype: civil
    flavor: （1039年-1112年）唐宋八大家之一，苏轼之弟。他文风沉稳，与兄长齐名。他为人谨慎，多次营救被贬的兄长。他晚年隐居颍川，潜心著述，以《栾城集》传世。其沉静文风与兄长豪放互为映照，成一代文名。其文章沉着内敛，深受后世推崇。
    growth_range:
    - 6
    - 9
    attribute_weights:
      force: 12
      intellect: 58
      defense: 18
      agility: 12
  - key: hist_songliaojinyuan_0055
    name: 米芾
    default_gender: male
    archetype: civil
    flavor: （1051年-1107年）北宋书画家，宋四家之一。他书法独树一帜，行书尤为精妙。他性格狂放不羁，以"颠"著称，拜石为兄。他的书画收藏也极为丰富，是著名的鉴赏家。其鉴藏与书法相辅相成，影响后世审美取向。
    growth_range:
    - 6
    - 9
    attribute_weights:
      force: 12
      intellect: 58
      defense: 18
      agility: 12
  - key: hist_songliaojinyuan_0056
    name: 蔡襄
    default_gender: male
    archetype: civil
    flavor: （1012年-1067年）北宋书法家，宋四家之一。他楷书端庄秀丽，行书流畅自然。他还主持修建了洛阳桥，是著名的水利工程师。他为官清廉，政绩卓著。其书风与政声并重，被后世誉为文臣楷模。其书法气度雍容，历代奉为典范。
    growth_range:
    - 6
    - 9
    attribute_weights:
      force: 12
      intellect: 58
      defense: 18
      agility: 12
  - key: hist_songliaojinyuan_0057
    name: 李纲
    default_gender: male
    archetype: civil
    flavor: （1083年-1140年）北宋末年名臣，开封保卫战的组织者。靖康之变前夕，他力主抗金，组织军民守城。他的抗战主张虽然未能挽救北宋，却激励了后人的抗金斗志。其坚持主战的姿态，成为国难之际的精神象征。其忠节与担当常被后世史家称赞。
    growth_range:
    - 6
    - 9
    attribute_weights:
      force: 12
      intellect: 58
      defense: 18
      agility: 12
  - key: hist_songliaojinyuan_0058
    name: 吕夷简
    default_gender: male
    archetype: civil
    flavor: （978年-1044年）北宋名相，三朝元老。他主政二十年，是宋仁宗时期的核心人物。他善于用人，但也因专权被范仲淹弹劾。其政治手腕强硬，功过并存，史论分歧甚多。其任相时期朝局稳固，亦有争议遗存。其施政风格被视为宋仁宗朝的典型样貌。
    growth_range:
    - 6
    - 9
    attribute_weights:
      force: 12
      intellect: 58
      defense: 18
      agility: 12
  - key: hist_songliaojinyuan_0059
    name: 杨业
    default_gender: male
    archetype: military
    flavor: （约932年-986年）杨家将始祖，人称"杨无敌"。他原是北汉将领，归宋后成为抗辽前锋。他屡败辽军，令敌人闻风丧胆。陈家谷之战，他孤军奋战，最终被俘绝食而死，忠烈传家，成为杨家将故事的源头。其忠勇形象被后世演绎为民族英雄的典范。
    growth_range:
    - 6
    - 9
    attribute_weights:
      force: 42
      intellect: 18
      defense: 24
      agility: 16
  - key: hist_songliaojinyuan_0060
    name: 杨延昭
    default_gender: male
    archetype: military
    flavor: （958年-1014年）杨六郎，杨业之子。他镇守三关二十余年，令辽人胆寒。他继承父志，守卫边疆，是杨家将第二代的杰出代表。他的事迹被后世演绎，成为忠义报国的象征。其守边之功，使宋辽边境长期相对安定。其忠勇事迹在民间故事中代代流传。
    growth_range:
    - 6
    - 9
    attribute_weights:
      force: 42
      intellect: 18
      defense: 24
      agility: 16
  - key: hist_songliaojinyuan_0061
    name: 种师道
    default_gender: male
    archetype: military
    flavor: （1051年-1126年）种家军领袖，抗金名将。他主张抗金，反对议和。开封保卫战中，他率军力战，最终忧愤而死。他是北宋末年少有的清醒之士。其主战立场与忠烈精神，为后世所传颂。其家国情怀成为将门精神的代表。
    growth_range:
    - 6
    - 9
    attribute_weights:
      force: 42
      intellect: 18
      defense: 24
      agility: 16
  - key: hist_songliaojinyuan_0062
    name: 种师中
    default_gender: male
    archetype: military
    flavor: （1059年-1126年）种师道之弟，种家军名将。他随兄抗金，屡立战功。靖康之变中，他战死沙场，忠勇殉国。其战功虽不尽载，却以殉国之名流传后世。其忠烈为种家军名声增添一笔。其家国之义被后人视为将门典范。
    growth_range:
    - 6
    - 9
    attribute_weights:
      force: 42
      intellect: 18
      defense: 24
      agility: 16
  - key: hist_songliaojinyuan_0063
    name: 折可适
    default_gender: male
    archetype: military
    flavor: （1060年-1126年）折克行之子，折家军名将。他继承家学，骁勇善战。他在宋夏战争中屡立战功，是折家军的杰出代表。其家族世代守边，军功累世，声名久著。其战绩为折家军稳固边防奠定基础。其功绩为边防体系持续运转提供保障。
    growth_range:
    - 6
    - 9
    attribute_weights:
      force: 42
      intellect: 18
      defense: 24
      agility: 16
  - key: hist_songliaojinyuan_0064
    name: 晏殊
    default_gender: male
    archetype: civil
    flavor: （991年-1055年）北宋宰相，婉约词的重要代表。无可奈何花落去，似曾相识燕归来——他的词雍容华贵，充满富贵气象。他主政时期，提携了范仲淹、欧阳修等后辈，对北宋文化繁荣功不可没。其词风与政声相映，成为宋代士大夫典范。
    growth_range:
    - 6
    - 9
    attribute_weights:
      force: 12
      intellect: 58
      defense: 18
      agility: 12
  - key: hist_songliaojinyuan_0065
    name: 秦观
    default_gender: male
    archetype: civil
    flavor: （1049年-1100年）苏门四学士，婉约派词人。两情若是久长时，又岂在朝朝暮暮——他的词凄婉动人，情深意切。他与苏轼亦师亦友，却命运多舛，一生坎坷。他的词作虽不多，却篇篇精品。其情感深度与词法精巧，后世推为婉约典范。
    growth_range:
    - 6
    - 9
    attribute_weights:
      force: 12
      intellect: 58
      defense: 18
      agility: 12
  - key: hist_songliaojinyuan_0066
    name: 晏几道
    default_gender: male
    archetype: civil
    flavor: （1038年-1110年）晏殊之子，小山词人。落花人独立，微雨燕双飞——他的词凄婉绝伦，情感真挚。他不似父亲那般富贵，一生潦倒，却写出了最动人的爱情词章。其词意清婉幽深，为宋词增添独特悲情色彩。其词风细腻婉转，深得后世词家推重。
    growth_range:
    - 6
    - 9
    attribute_weights:
      force: 12
      intellect: 58
      defense: 18
      agility: 12
  - key: hist_songliaojinyuan_0067
    name: 邵雍
