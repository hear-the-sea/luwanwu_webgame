    archetype: military
    flavor: '（1089年-1151年）中兴四将之首，黄天荡的英雄。他与金兀术对峙四十八天，以八千水军围困十万金兵。他的妻子梁红玉擂鼓助战，成为千古佳话。他忠心耿耿，岳飞被害时他怒斥秦桧："莫须有何以服天下？"他是南宋的擎天柱，是忠义的化身。'
