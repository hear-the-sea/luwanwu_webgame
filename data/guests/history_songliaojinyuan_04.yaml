    name: 潘美
    default_gender: male
    archetype: military
    flavor: （925年-991年）北宋开国名将，曾与杨业搭档抗辽。他战功赫赫，灭南汉、征南唐皆有大功。因陈家谷之战与杨业殉国，他被后世误解为奸臣，实则是一代名将。其功过争议在史书与民间传说中反复被讨论，形象复杂而立体。
