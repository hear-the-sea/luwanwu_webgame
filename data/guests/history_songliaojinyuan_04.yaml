  - key: hist_songliaojinyuan_0159
    name: 刘攽
    default_gender: male
    archetype: civil
    flavor: （1023年-1089年）北宋史学家，《资治通鉴》编修助手。他协助司马光编纂《资治通鉴》，贡献巨大。与同时代史臣相比，刘攽更重史料校核与叙事节制，这种取向也影响了后世读《通鉴》的理解路径。他在通史编纂中的“校雠功”也因此常被后人单独称述。
    growth_range:
