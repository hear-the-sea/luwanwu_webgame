    default_gender: male
    archetype: civil
    flavor: （1081年-1127年）北宋末大臣，靖康之变后被迫拥立伪楚。风雨飘摇间，他既是权力裹挟的傀儡，也是乱世政治的缩影。旋即被南渡朝廷处死，留下“亡国之际，谁能自全”的沉重叩问。作为北宋末大臣，靖康之变后被迫拥立伪楚，张邦昌的表达重心并不局限于个人情绪，往往还能映照宋辽金元之际的公共议题。
