    default_gender: male
    archetype: civil
    flavor: （约1034年-约1110年）北宋文学家。他的词作豪放，与苏轼词风相近。从张舜民的经历来看，文体取向、思想选择与社会处境始终彼此牵动，这也构成了其在同代人物中的独特轮廓。若仅依赖单一叙述容易失真，而张舜民的多源材料恰好可用于校正这种偏差。
