      defense: 18
      agility: 12
  - key: hist_songliaojinyuan_0160
    name: 刘恕
    default_gender: male
    archetype: civil
    flavor: （1032年-1078年）北宋史学家，《资治通鉴外纪》作者。他与司马光共同编修史书，是重要的史学家。关于刘恕的争议并未削弱其地位，反而让其成为理解当时文化分歧与价值碰撞的关键人物。对刘恕的持续讨论说明，其材料既具叙事价值，也具备方法论上的比较价值。
