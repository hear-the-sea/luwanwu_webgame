  - key: hist_songliaojinyuan_0166
    name: 吕本中
    default_gender: male
    archetype: civil
    flavor: （1084年-1145年）两宋之际诗人，《江西诗社宗派图》作者。他总结了江西诗派的发展，是重要的诗论家。他提出的诗学主张与编年式梳理，为理解江西诗派内部差异提供了清晰坐标，后世论诗常以其为参照。宋元以来不少诗话谈及宗派问题时，都会引用他的判断。
    growth_range:
