  - key: hist_songliaojinyuan_0161
    name: 王安国
    default_gender: male
    archetype: civil
    flavor: （1028年-1074年）北宋诗人，王安石之弟。他诗才出众，却与兄长政见不同。他既受荆公新学影响，又保持相对独立的诗学判断，这种“同门而异路”的面貌，使其在北宋文坛别具辨识度。因此，后世评其诗名时多强调“家学之内的分歧与创造”。
    growth_range:
    - 4
    - 7
    attribute_weights:
      force: 12
      intellect: 58
      defense: 18
      agility: 12
  - key: hist_songliaojinyuan_0162
    name: 王雱
    default_gender: male
    archetype: civil
    flavor: （1044年-1076年）王安石之子，新党骨干。他参与变法，编纂《三经新义》。他英年早逝，令父悲痛。王雱的人生轨迹显示，作品风格与时代压力会相互塑形，因此其文本总带着鲜明的历史温度。围绕王雱形成的不同解释路径，本身也推动了相关时期研究框架的细化。
