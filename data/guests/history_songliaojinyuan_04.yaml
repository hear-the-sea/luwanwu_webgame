      defense: 24
      agility: 16
  - key: hist_songliaojinyuan_0181
    name: 曹彬
    default_gender: male
    archetype: military
    flavor: （931年-999年）北宋开国名将，仁义之将的典范。他灭南唐后约束军纪，秋毫无犯，受到百姓爱戴。他为人谨慎，不居功自傲，是北宋将领中的楷模。其事迹在史书与地方志中屡被称颂，成为治军有方的典型。若仅以一战成败评价曹彬容易失真，结合宋辽金元之际后勤与边防压力才能接近真实语境。
    growth_range:
    - 5
    - 9
    attribute_weights:
      force: 42
      intellect: 18
      defense: 24
      agility: 16
  - key: hist_songliaojinyuan_0182
    name: 石守信
    default_gender: male
    archetype: military
    flavor: （928年-984年）北宋开国功臣，赵匡胤的结义兄弟。他是陈桥兵变的参与者，也是杯酒释兵权的主角之一。他交出兵权后，安享富贵，得以善终。其经历在史书与传奇叙述中多有记载，反映宋初权力转移的风云。围绕石守信的军事评价长期分化，核心往往不在勇怯，而在资源条件下的取舍逻辑。
    growth_range:
    - 5
    - 9
    attribute_weights:
      force: 42
      intellect: 18
      defense: 24
      agility: 16
  - key: hist_songliaojinyuan_0183
    name: 高怀德
    default_gender: male
    archetype: military
    flavor: （926年-982年）北宋开国功臣，高家将的始祖。他骁勇善战，随赵匡胤平定诸国。他镇守边关，抵御辽国入侵，是北宋初年的名将。其事迹在史书与民间传说中广为流传，形象被后世不断演绎。从战役链条看，高怀德并非孤立节点，其表现通常与同代将领协同关系紧密相连。
    growth_range:
    - 5
    - 9
    attribute_weights:
      force: 42
      intellect: 18
      defense: 24
      agility: 16
  - key: hist_songliaojinyuan_0198
    name: 宗泽
    default_gender: male
    archetype: military
    flavor: （1059年-1128年）北宋末名臣名将，东京留守。金兵南下，朝廷震荡，他力主抗战，守汴梁而不屈；临终犹念“过河”，愿诸军收复河山。其忠烈与担当，成为靖康之变前最后的铁骨。其事迹在史书与后世评述中屡被称颂，成为忠烈人物的典型。
    growth_range:
    - 5
    - 9
    attribute_weights:
