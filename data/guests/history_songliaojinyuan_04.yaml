      defense: 24
      agility: 16
  - key: hist_songliaojinyuan_0208
    name: 周邦彦
    default_gender: male
    archetype: civil
    flavor: （1056年-1121年）北宋末年词人，婉约派大师。他精通音律，词风华丽典雅。他创制了许多新词牌，对宋词发展贡献巨大。其作品在词史中地位崇高，后世词论常以其为宗。作为北宋末年词人，婉约派大师，周邦彦的表达重心并不局限于个人情绪，往往还能映照宋辽金元之际的公共议题。
    growth_range:
    - 5
    - 9
    attribute_weights:
      force: 12
      intellect: 58
      defense: 18
      agility: 12
