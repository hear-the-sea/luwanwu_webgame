    flavor: （1048年-约1127年）北宋词人。“我住长江头，君住长江尾”——他的《卜算子》千古传诵。除《卜算子》外，他在书信体与小令中的细腻笔触同样可观，既见北宋士人的日常情感，也保存了时代语感。正因这份真切语调，李之仪在宋词读者中一直拥有稳定知名度。
