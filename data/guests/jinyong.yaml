  - key: hero_zuo_lengchan
    name: 左冷禅
    archetype: military
    flavor: 嵩山派掌门，五岳剑派盟主。他野心勃勃，意欲吞并五岳剑派，称霸武林。他武功高强，城府极深，为了达到目的不择手段，收买黑道，暗杀异己，是真正的枭雄人物。然而，他的霸业最终败在了岳不群更深沉的阴谋之下，为他人作了嫁衣。左冷禅的一生都在算计，却最终算错了人心。他的失败，是霸道与阴谋的破产，也是武林权力斗争残酷性的缩影。出自金庸小说《笑傲江湖》
