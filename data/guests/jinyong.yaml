  - key: hero_ren_yingying
    name: 任盈盈
    archetype: civil
    flavor: 日月神教教主任我行之女，人称“圣姑”。她容貌极美，冰雪聪明，精通音律。虽然身处魔教，却出淤泥而不染，行事温婉大气，颇有隐士之风。她对令狐冲情深义重，多次舍命相救，更以宽广的胸怀包容了令狐冲对小师妹的眷恋。她用耐心和深情治愈了令狐冲内心的创伤，最终两人琴瑟和鸣，笑傲江湖。任盈盈是金庸笔下完美的理想伴侣形象，既有江湖儿女的豪情，又有大家闺秀的典雅。出自金庸小说《笑傲江湖》
