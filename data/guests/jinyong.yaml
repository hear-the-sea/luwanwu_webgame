  - key: hero_yang_dingtian
    name: 阳顶天
    archetype: military
    flavor: 明教第三十三代教主，武功盖世，雄才大略。在他统领下，明教声威大震，令六大门派忌惮不已。他修炼乾坤大挪移至第四层，却因撞破夫人与成昆的私情，走火入魔而死。他的暴毙导致明教四分五裂，陷入了长达几十年的内乱。阳顶天虽然出场时已是枯骨，但他的影响力贯穿全书。他是一个有着宏大抱负却死于家庭悲剧的英雄，他的遗书更是解开明教恩怨与张无忌命运的关键。出自金庸小说《倚天屠龙记》
