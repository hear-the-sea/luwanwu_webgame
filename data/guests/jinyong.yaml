  - key: hero_chen_yonghua
    name: 陈永华
    archetype: civil
    flavor: 也就是天地会总舵主陈近南，江湖人称“平生不识陈近南，便称英雄也枉然”。他文武双全，忠肝义胆，毕生致力于反清复明的大业。作为韦小宝的师父，他对这个顽劣的徒弟虽有利用，但也尽心教导。他效忠于延平郡王郑经，却屡遭猜忌与排挤，最终死于宵小之手，令人扼腕叹息。陈近南是传统儒家忠义精神的典范，他的悲剧在于愚忠，在于将一腔热血洒向了一个注定衰落的旧王朝。出自金庸小说《鹿鼎记》
