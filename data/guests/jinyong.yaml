  - key: hero_xiaolong_nv
    name: 小龙女
    archetype: military
    flavor: 古墓派传人，容貌绝世，清冷如仙。她自幼生活在古墓之中，不通世务，心如止水。与杨过的相遇，打开了她冰封的心扉。她对爱情忠贞不渝，为了杨过可以牺牲一切。在绝情谷底的十六年独居，她以玉蜂为伴，练气养生，容颜不老。小龙女的形象，是金庸笔下最纯洁、最不食人间烟火的女性代表。她与杨过的爱情，跨越了时间与生死的考验，成为了武侠世界中至死不渝的爱情典范。出自金庸小说《神雕侠侣》
