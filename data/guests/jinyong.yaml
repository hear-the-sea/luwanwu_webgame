  - key: hero_yue_buqun
    name: 岳不群
    archetype: military
    flavor: 华山派掌门，外号“君子剑”。外表谦虚文雅，满口仁义道德，实则心胸狭窄，阴险伪善。为了夺取武林盟主之位，他处心积虑，不惜利用女儿，陷害徒弟，甚至挥刀自宫修炼《辟邪剑谱》。他的伪装欺骗了整个武林，最终众叛亲离，身败名裂。岳不群是金庸笔下最成功的伪君子形象，深刻揭露了人性中对权力的贪婪与扭曲，是对所谓“名门正派”最辛辣的讽刺。出自金庸小说《笑傲江湖》
