  - key: hero_zhou_zhiruo
    name: 周芷若
    archetype: military
    flavor: 峨眉派掌门，初时秀若芝兰，温婉斯文，后因师命重托与情感受挫，逐渐变得心狠手辣。她为了完成灭绝师太的遗愿，不惜盗取屠龙刀倚天剑，嫁祸赵敏，甚至试图杀害张无忌。她在婚礼上被赵敏抢婚，深受打击，从此走上了一条复仇与争霸的不归路。周芷若的悲剧在于她背负了太沉重的责任，压抑了自己的本性。她虽然练成了九阴白骨爪，一度震慑群雄，但内心始终无法获得真正的安宁。她对张无忌的爱恨交织，是书中最为纠结的情感线之一。出自金庸小说《倚天屠龙记》
