  - key: hero_zhao_min
    name: 敏敏特穆尔
    archetype: civil
    flavor: 元朝邵敏郡主，名敏敏特穆尔（汉名赵敏），艳若玫瑰，智计无双。她虽为女儿身，却有男儿之志，统领群豪，意欲剿灭中原武林。在与张无忌的交锋中，她逐渐被对方的宽厚所打动，最终情根深种。为了爱情，她不惜背叛父兄，抛弃荣华富贵，甘愿随张无忌浪迹天涯。她的性格敢爱敢恨，行事果断，有着“虽千万人吾往矣”的勇气。她与周芷若的明争暗斗，是书中极其精彩的篇章。她最终赢得了张无忌的心，也赢得了属于自己的幸福。出自金庸小说《倚天屠龙记》
