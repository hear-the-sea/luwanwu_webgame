  - key: hero_jiumo_zhi
    name: 鸠摩智
    archetype: military
    flavor: 吐蕃国国师，大轮明王。他痴迷武学，过目不忘，精通少林七十二绝技（实为小无相功催动）。他为人高傲自负，为了换取六脉神剑谱，不惜挑战大理天龙寺。他的一生都在追求武功的极致，却因贪多嚼不烂而导致内息紊乱，走火入魔。最终在枯井底被段誉吸去一身内力，反而大彻大悟，终成一代高僧。鸠摩智的故事告诉我们，执念太深往往会误入歧途，放下屠刀方能立地成佛。出自金庸小说《天龙八部》
