    flavor: 逍遥派掌门无崖子的大弟子，外号“聪辩先生”。他才艺双绝，为了保护师父不受叛徒丁春秋的加害，不得不装聋作哑，忍辱负重多年。他摆下“珍珑棋局”，广邀天下英雄破解，只为替师父寻找一位传人。最终在虚竹破解棋局后，他完成了使命，却也在与丁春秋的对抗中力竭而亡。苏星河的一生是忠诚与牺牲的写照，他用自己的生命守护了逍遥派的传承，是一位可歌可泣的忠徒。出自金庸小说《天龙八部》
