# 金庸作品门客

heroes:
  blue:
  - key: hero_huang_rong
    name: 黄蓉
    archetype: civil
    flavor: 桃花岛主黄药师之女，聪明绝顶，古灵精怪。她不仅继承了父亲的智慧与才艺，更有着母亲的温柔与细腻。作为丐帮帮主，她智计百出，辅佐郭靖镇守襄阳，是郭靖背后最坚强的后盾。黄蓉的性格复杂多面，既有少女的娇俏任性，又有为人母后的护短与深沉。她在射雕三部曲中贯穿始终，从一个离家出走的叛逆少女，成长为受人敬仰的一代女侠。她与郭靖的爱情，是智慧与忠诚的完美结合，是江湖中最令人艳羡的神仙眷侣。出自金庸小说《射雕英雄传》
