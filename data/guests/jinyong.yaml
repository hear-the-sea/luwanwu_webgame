    flavor: 明教四大护教法王之一，金毛狮王。他文武全才，原本拥有幸福的家庭，却被师父成昆灭门。为了报仇，他到处滥杀无辜，引出成昆。他抢夺屠龙刀，流落冰火岛，在岛上双目失明，却与张翠山夫妇结下深厚情谊，并收张无忌为义子。谢逊的一生充满了暴戾与痛苦，但在张无忌的感化和佛法的熏陶下，他最终放下了仇恨，皈依佛门。他在少林寺地牢中听闻仇人成昆的阴谋，在大彻大悟后废去一身武功，成为了真正的智者。出自金庸小说《倚天屠龙记》
