    flavor: 姑苏慕容氏，人称“南慕容”，与乔峰并称“北乔峰”。他面如冠玉，文武双全，背负着复兴大燕国的家族重任。为了复国，他可以牺牲爱情、友情甚至尊严。他四处奔波，结交群豪，却总是功败垂成。在复国的执念下，他逐渐迷失了自我，变得不择手段。最终在连番打击下疯癫，只能在梦中做他的皇帝梦。慕容复是一个被命运和家族重担压垮的悲剧人物，他的才华与努力在错误的目标面前显得如此苍白无力。出自金庸小说《天龙八部》
