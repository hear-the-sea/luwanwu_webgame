  - key: hero_zhu_chuo
    name: 朱媺娖
    archetype: military
    flavor: 明朝长平公主，国破家亡后出家为尼，法号九难。她身负国仇家恨，曾试图行刺康熙，后收阿珂与韦小宝为徒。她一生孤苦，独臂行侠，在江湖中漂泊无依。从金枝玉叶到江湖侠尼，她见证了朝代的更迭与世态的炎凉。她对袁承志的深情只能埋藏心底，化作一声长叹。九难师太的形象凄美而坚韧，是乱世中女性悲剧命运的代表，也是旧时代的一抹残阳。出自金庸小说《鹿鼎记》
