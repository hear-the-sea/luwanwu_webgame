      agility: 16
  - key: hist_sljnbc_0071
    name: 杜预
    default_gender: male
    archetype: military
    flavor: （222年—285年）西晋名将，字元凯，京兆杜陵人。他博学多才，精通经史，著有《春秋左氏经传集解》，是现存最早的《左传》注本，影响深远。他同时精通军事、水利、历法、律令，时人称其有"杜武库"之誉，意谓才学如武库无所不备。咸宁五年（279年）他承继羊祜遗志，与王濬等人共同伐吴。
    growth_range:
    - 6
    - 9
    attribute_weights:
      force: 34
      intellect: 22
      defense: 26
      agility: 18
  - key: hist_sljnbc_0072
    name: 刘晔
    default_gender: male
    archetype: civil
    flavor: （？—234年）曹魏谋士，字子扬，淮南成德人，汉室宗亲。他年少时便有胆识，曾亲手斩杀欺凌其家的郑宝。曹操征伐庐江时他前来投奔，此后随军征战，屡献良谋。刘备入蜀立足未稳时他劝曹操乘势攻蜀，未被采纳；刘备伐吴大败时他又劝曹丕趁机伐吴，仍未被采纳。两次错失良机后果然如其所料，蜀吴均得以喘息。
