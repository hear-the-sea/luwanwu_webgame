      agility: 10
  - key: hist_sljnbc_0073
    name: 郝昭
    default_gender: male
    archetype: military
    flavor: （？—229年）陈仓铁壁，千古名将。为人雄壮，早在少年时入伍，屡立战功。诸葛亮二出祁山，以数万大军围攻陈仓，郝昭仅以千余人据守，筑双墙、防云梯、射火箭，坚守二十余日，令孔明无功而返。善于守城，冷静坚毅，是曹魏西线的一座不可逾越的丰碑。守陈仓一役成攻防典范，使关中屏障得以稳固。
