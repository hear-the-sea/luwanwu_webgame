    attribute_weights:
      force: 16
      intellect: 52
      defense: 20
      agility: 12
  - key: hist_sljnbc_0076
    name: 张华
    default_gender: male
    archetype: civil
    flavor: （232年—300年）西晋名臣，字茂先，范阳方城人。他出身寒微却博学多才，以著《鹪鹩赋》而知名于世。入仕后他力主伐吴，制定灭吴战略并监督执行，为西晋统一立下首功，因此封关内侯。他学识渊博，著《博物志》十卷，记载天下奇闻异事，是中国古代重要的博物学著作。他与荀勖、陆机等人编纂典籍，对保存先秦两汉文献贡献极大。
    growth_range:
    - 6
    - 9
    attribute_weights:
      force: 14
      intellect: 52
      defense: 22
      agility: 12
  - key: hist_sljnbc_0077
    name: 周处
    default_gender: male
    archetype: military
    flavor: （236年—297年）西晋名将，字子隐，吴郡阳羡人。少时凶强，被乡里与虎蛟并称“三害”；后斩蛟杀虎，痛改前非，求学陆机陆云，名声大振。入晋历任太守，清廉刚正，敢弹劾外戚权贵。齐万年叛乱中奉命出战，力战而死。其改过故事传为典范，后世以“周处除三害”喻自新。史称其治郡严明，所至盗息民安。
    growth_range:
    - 6
    - 9
    attribute_weights:
      force: 40
      intellect: 12
      defense: 30
      agility: 18
  - key: hist_sljnbc_0078
    name: 冯太后
    default_gender: female
    archetype: civil
    flavor: （441年—490年）文明太后，改革推手。北魏著名的女政治家，历经四朝，两度临朝听政。辅佐孝文帝推行汉化，颁布均田制、三长制，从根本上改变了鲜卑旧俗，促进了民族融合。她并以铁腕治国闻名，是北魏汉化改革的实际主导者。抑制贵族兼并、整饬官制，为迁都与深度汉化铺路。手段强硬亦多争议，但对民族融合影响深远。
    growth_range:
    - 6
    - 9
    attribute_weights:
      force: 12
      intellect: 56
      defense: 24
      agility: 8
  - key: hist_sljnbc_0079
    name: 沮授
    default_gender: male
    archetype: civil
    flavor: （？—200年）袁绍谋主，大星陨落。极具战略眼光，早年便提出“挟天子以令诸侯”的宏大战略，可惜不被采纳。官渡之战中，屡献良策，皆被袁绍无视。战败被擒后，誓死不降，欲盗马归赵，最终被杀。曹操叹曰：“孤早相得，天下不足虑。”其忠而不二，遗憾在主帅优柔失断。主张持久断粮之策，惜袁绍多疑迟断，终失良机。
    growth_range:
    - 7
    - 9
    attribute_weights:
      force: 12
      intellect: 58
      defense: 20
      agility: 10
  - key: hist_sljnbc_0080
    name: 田丰
    default_gender: male
    archetype: civil
    flavor: （？—200年）刚而犯上，身死狱中。袁绍谋士，为人刚直，多谋善断。曾劝袁绍趁曹操攻刘备时袭许都，未被采纳。官渡之战前力谏不可决战，触怒袁绍下狱。袁绍战败后，因羞见田丰反而将其赐死。其才智虽高，却因性格刚烈而未能尽展。直谏多中肯，却终以容不得谏言而殒。史家常以其为戒：主帅不能纳谏，败亡在所难免。
    growth_range:
    - 6
    - 9
    attribute_weights:
      force: 12
      intellect: 58
      defense: 20
      agility: 10
  - key: hist_sljnbc_0081
    name: 黄权
    default_gender: male
    archetype: civil
    flavor: （？—240年）忠义两全，无奈降魏。刘备伐吴时，被任命防备魏兵，因夷陵战败，归路被断，不得已率众降魏。面对曹丕的赏识，他不卑不亢，不背旧主。刘备得知后叹曰：“孤负黄权，权不负孤。”他在魏国深受敬重，历任高官，善始善终。入魏后仍不忘旧恩，常为蜀臣辩护，守节自持。其子留蜀亦得善待，更显其名望与人品。
    growth_range:
    - 6
    - 9
    attribute_weights:
      force: 14
      intellect: 54
      defense: 22
      agility: 10
  - key: hist_sljnbc_0082
    name: 鸠摩罗什
