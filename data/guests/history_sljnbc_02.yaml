  - key: hist_sljnbc_0057
    name: 羊祜
    default_gender: male
    archetype: civil
    flavor: （221年—278年12月27日）灭吴谋划者，仁者无敌。他出身名门，为人高洁。镇守荆州十年与陆抗对峙，以德服人而非穷兵黩武。他送药给陆抗、归还东吴猎物，令敌人亦敬佩其德行。他制定了灭吴的完整战略，修水利、积粮草、练士卒，为统一做好了万全准备。临终荐杜预继任，献灭吴之策，虽未亲见统一却是最大功臣。
    growth_range:
    - 6
    - 9
    attribute_weights:
      force: 14
      intellect: 54
      defense: 22
      agility: 10
  - key: hist_sljnbc_0058
    name: 陆抗
    default_gender: male
    archetype: military
    flavor: （226年—274年）陆逊之子，东吴最后的名将。他继承父业镇守荆州，与晋将羊祜隔江对峙。二人惺惺相惜，互致酒食、彼此推重，被誉为"君子之交"。他深知东吴国力衰微，多次上疏请求加强西陵防务，却不被采纳。西陵之战他以果断用兵平定步阐叛乱，展现了卓越军事才能。他苦撑东吴危局，多次击退晋军进攻。
    growth_range:
    - 6
    - 9
    attribute_weights:
      force: 38
      intellect: 18
      defense: 26
      agility: 18
  - key: hist_sljnbc_0059
    name: 黄忠
    default_gender: male
    archetype: military
    flavor: （？—220年）老当益壮，定军山上斩夏侯。他年近七旬仍能开三石硬弓，百步穿杨箭无虚发。长沙城下与关羽战成平手，定军山上阵斩夏侯渊威震天下。世人皆道廉颇老矣，却不知黄汉升越老越勇。他证明了英雄不问年龄，壮志不减当年，是蜀汉军中最励志的传奇。汉中之战官至后将军，沉稳老练堪为名将典范。
    growth_range:
    - 6
    - 9
    attribute_weights:
      force: 42
      intellect: 10
      defense: 20
      agility: 28
  - key: hist_sljnbc_0060
    name: 魏延
    default_gender: male
    archetype: military
    flavor: （？—234年）蜀汉猛将，镇守汉中十年。他深受刘备器重，被破格提拔为汉中太守，保蜀汉北门无虞。子午谷奇谋虽未被采纳，却显其军事胆略。诸葛亮死后与杨仪争权被杀，背负冤名千古。其实力绝对是蜀汉后期的顶梁柱。性格刚峻好立奇功，北伐前线屡建战绩，身后是非难定。后世多有翻案之论，称其功过应重评。
    growth_range:
    - 6
    - 9
    attribute_weights:
      force: 44
      intellect: 12
      defense: 24
      agility: 20
  - key: hist_sljnbc_0061
    name: 张郃
    default_gender: male
    archetype: military
    flavor: （？—231年）巧变名将，蜀军劲敌。他本是袁绍部将，官渡之战后归曹操。征张鲁、定汉中，屡立战功；夏侯渊阵亡后代掌军权，稳定了军心。他善于利用地形，用兵巧变，诸葛亮、刘备皆对其忌惮三分。街亭之战他大破马谡，扭转北伐局势，令蜀汉首次北伐功亏一篑。诸葛亮第四次北伐退兵时，他奉命追击，于木门道中伏身亡。
    growth_range:
    - 6
    - 9
    attribute_weights:
      force: 38
      intellect: 16
      defense: 28
      agility: 18
  - key: hist_sljnbc_0062
    name: 徐晃
    default_gender: male
    archetype: military
    flavor: （？—227年）周亚夫之风，樊城解围。他本是杨奉部将，归曹后以治军严整著称，令行禁止，赏罚分明。从征吕布、官渡奇袭乌巢、平定汉中，每战必先。樊城之战他亲率援军长驱直入，与关羽正面交锋，击破围城蜀军解了曹仁之围。曹操亲迎至阵前，盛赞其有周亚夫之风。他作战稳健，不求冒进但求必胜，是五子良将中最善于攻坚野战者。
    growth_range:
    - 6
    - 9
    attribute_weights:
      force: 38
      intellect: 14
      defense: 30
      agility: 18
  - key: hist_sljnbc_0063
    name: 甘宁
    default_gender: male
    archetype: military
    flavor: （？—215年后）锦帆贼出身，百骑劫营。他少年时聚众为盗，铃铛系身招摇过市，人称"锦帆贼"。归吴后屡立战功，百骑劫营夜袭曹军，斩敌无数全身而退，孙权大喜道"孟德有张辽，孤有兴霸，足相敌也"。他勇冠三军，性情豪爽却也暴躁嗜杀，曾射杀凌操与凌统结怨，后二人化敌为友。他是东吴第一斗将，虽出身草莽却忠勇无双，为江东基业立下汗马功劳。
    growth_range:
    - 6
    - 9
    attribute_weights:
      force: 40
      intellect: 10
      defense: 18
      agility: 32
  - key: hist_sljnbc_0064
    name: 太史慈
    default_gender: male
    archetype: military
    flavor: （166年—206年）神箭无双，义薄云天。他本是东莱黄县人，年少时便以信义著称。为救孔融单骑突围，神亭岭与孙策酣战，二人枪来戟往难分高下，各夺对方兵器。归吴后镇守南方，平定山越叛乱，威震敌胆。病逝时年仅四十一岁，临终大呼"丈夫生世当带三尺剑立不世之功，今所志未遂，奈何而死乎"，壮志未酬令人扼腕。
    growth_range:
    - 6
    - 9
    attribute_weights:
      force: 40
      intellect: 10
      defense: 20
      agility: 30
  - key: hist_sljnbc_0065
    name: 韦睿
    default_gender: male
    archetype: military
    flavor: （442年—520年）南朝梁名将，字怀文，京兆杜陵人，出身关中世族韦氏。他身材瘦小，体弱多病，上阵常乘坐白色素车督战，不亲自冲锋陷阵，却指挥若定，运筹帷幄。梁武帝天监四年（505年）北魏大举南侵，围攻钟离。他率军驰援，筑堤蓄淮水以灌魏营，待水势大涨后纵兵猛攻。魏军大溃，斩首十余万，俘虏无数，是南北朝时期南朝对北朝最大的一次胜利。
    growth_range:
    - 6
    - 9
    attribute_weights:
      force: 34
      intellect: 18
      defense: 30
      agility: 18
  - key: hist_sljnbc_0066
    name: 拓跋珪
    default_gender: male
    archetype: military
    flavor: （371年8月4日—409年11月6日）北魏开国，定鼎平城。他于乱世中复兴代国，参合陂大败后燕，建立北魏雄霸北方。迁都平城，改革官制，为北方统一奠定基础。虽晚年猜忌多疑，却不掩其开国雄主之功。他是五胡十六国中最终的胜利者，开启了北朝一百五十年的基业。整合鲜卑诸部并任用汉臣，制度由此渐成。
    growth_range:
    - 7
    - 9
    attribute_weights:
      force: 36
      intellect: 18
      defense: 28
      agility: 18
  - key: hist_sljnbc_0067
    name: 庞统
    default_gender: male
    archetype: civil
    flavor: （179年—214年）凤雏早逝，壮志未酬。他与诸葛亮齐名，时人称"卧龙凤雏"。入蜀之战献上中下三策，本可大展宏图，却在围攻雒城时中流矢身亡，年仅三十六岁。刘备为之痛哭流涕，追赐关内侯。那支流矢不仅夺去了一代谋士的性命，也改变了蜀汉的命运。若凤雏不陨，蜀汉格局或将大不相同。其才思敏捷、善出奇计，史称与孔明并重。
    growth_range:
    - 7
    - 9
    attribute_weights:
      force: 12
      intellect: 58
      defense: 18
      agility: 12
  - key: hist_sljnbc_0068
    name: 典韦
    default_gender: male
    archetype: military
    flavor: （？—197年）古之恶来，护主殉忠。他力大无穷，双戟重八十斤，逐虎过涧勇冠三军。宛城之变，他以身护主，独挡叛军于辕门，战至最后一息。即便双戟被盗，仍以腰刀杀敌十余人，死后怒目而立，敌不敢近。他是曹操身边最忠勇的护卫，也是三国最悲壮的英魂。其死令曹操痛失臂助，后世与许褚并称虎卫双雄。
    growth_range:
    - 7
    - 9
    attribute_weights:
      force: 52
      intellect: 6
      defense: 32
      agility: 10
  - key: hist_sljnbc_0069
    name: 许褚
    default_gender: male
    archetype: military
    flavor: （？—？）虎痴裸衣斗马超，威慑群雄护曹公。他力能拽牛倒行，勇名震于天下。潼关之战裸衣迎战马超，二人大战数百合难分高下。他数次救曹操于危难，是曹营第一护卫。沉默寡言的外表下，是对主公最质朴的忠诚。虎痴之名，实至名归。官至武卫将军，常随驾近侍，以身挡矢救主。性情质朴少言，却以一身勇力镇诸军。
    growth_range:
    - 7
    - 9
    attribute_weights:
      force: 50
      intellect: 6
      defense: 34
      agility: 10
  - key: hist_sljnbc_0070
    name: 夏侯惇
    default_gender: male
    archetype: military
    flavor: （？—220年6月13日）拔矢啖睛，独眼战神。他于吕布之战中被射伤左目，拔箭而食之，大呼"父精母血不可弃也"，复杀敌将。从曹操起兵始终追随，虽独眼而威不减，是曹氏宗族第一大将。他不以战功显名，却以忠勇传世，是曹操最信赖的兄弟。亦能理民屯田、镇抚郡县，兼具将相之才，谥忠侯。
    growth_range:
