      agility: 28
  - key: hist_sljnbc_0075
    name: 诸葛恪
    default_gender: male
    archetype: civil
    flavor: （203年—253年）东吴权臣，字元逊，琅琊阳都人，大将军诸葛瑾长子，蜀相诸葛亮之侄。他自幼聪慧过人，辩才无双，孙权常以他为谈笑之资。成年后他平定丹阳山越，将数万山民编入军户，军功卓著。孙权临终以太子孙亮托付于他，他由此独揽朝政，位极人臣。建兴元年（252年）他率军在东兴大破魏军，斩敌数万，声威大振。
    growth_range:
    - 6
