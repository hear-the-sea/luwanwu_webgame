      agility: 12
  - key: hist_sljnbc_0074
    name: 文俶
    default_gender: male
    archetype: military
    flavor: （238年—291年）西晋将领，字次骞，小名文鸯，谯郡人，曹魏名将文钦之子。他少年成名，正元二年（255年）随父起兵反司马师，年仅十八岁便单骑冲阵，七进七出于司马师军中，斩将搴旗，勇冠三军。司马师因惊惧旧疾复发，不久病死。后其父与诸葛诞失和被杀，他降于吴国，又随诸葛诞之乱归魏。
    growth_range:
