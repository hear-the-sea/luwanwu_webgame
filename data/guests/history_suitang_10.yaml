heroes:
  blue:
  - key: hist_suitang_0293
    name: 杜淹
    default_gender: male
    archetype: civil
    flavor: （生卒年不详）隋唐五代史料中的杜淹，所处年代风浪不息，而其人之长恰在于把急务办得不失分寸。处理边地与腹地差异时主张因地制宜，反对一刀切式的粗暴套用。最难得的并非“高论”，而是“把高论化为日常秩序”的手段。
    growth_range:
    - 5
    - 9
    attribute_weights:
      force: 11
      intellect: 57
      defense: 21
      agility: 11
  - key: hist_suitang_0286
    name: 崔仲方
    default_gender: male
    archetype: civil
    flavor: （生卒年不详）隋唐五代人物崔仲方，所处年代风浪不息，而其人之长恰在于把急务办得不失分寸。凡涉税粮、水利与转运，他更看重持续性，而非一任之内的表面繁荣。其履历虽少传奇色彩，却以稳定产出构成时代运转不可或缺的一环。
    growth_range:
    - 5
    - 9
    attribute_weights:
      force: 14
      intellect: 56
      defense: 21
      agility: 9
  - key: hist_suitang_0289
    name: 陈棱
    default_gender: male
    archetype: civil
    flavor: （生卒年不详）陈棱为隋唐五代人物陳稜，其人处世谨严，行事有节，常于看似琐碎处守住政令的筋骨。逢灾荒、迁徙或兵后重建，他多采用分层处置，先保秩序，再图长效。其人善守底线而不失通权，使地方社会在压力下仍保有修复能力。
    growth_range:
    - 5
    - 8
    attribute_weights:
      force: 13
      intellect: 50
      defense: 21
      agility: 16
  - key: hist_suitang_0291
    name: 杜正伦
    default_gender: male
    archetype: civil
    flavor: （生卒年不详）杜正伦为隋唐五代人物杜正倫，其名不以奇谈传世，而以一件件可核可查的政务结果被记住。其所长在于把士人论辩转译为执行清单，使理念能够穿过层层官僚结构到达民间。其人不避难题，也不迷信猛药，往往靠持续修补积小胜为大安。
    growth_range:
    - 5
    - 8
    attribute_weights:
      force: 17
      intellect: 52
      defense: 16
      agility: 15
  - key: hist_suitang_0292
    name: 戴胄
    default_gender: male
    archetype: civil
    flavor: （生卒年不详）隋唐五代人物戴胄，在公议场中的价值，不在声量大小，而在意见能否真正落地，他重视文教与吏治并举，既整顿文书系统，也强调胥吏责任边界；他更在意制度留下什么，而非个人留下什么，因此常有迟发而深远的影响。后世分析隋唐五代由盛及变的治理逻辑时，其行迹常被当作理解制度韧性的切入点。
    growth_range:
    - 5
    - 8
    attribute_weights:
      force: 14
      intellect: 53
      defense: 17
      agility: 16
