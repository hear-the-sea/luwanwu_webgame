  - key: hist_suitang_0059_lixiuming
    name: 李秀宁
    archetype: military
    flavor: （？-623年）李渊之女，史称平阳公主。隋末起兵之际，她在关中招集义军并协助攻取要地，"娘子军"由此成为开国记忆的一部分。正史对其军旅细节记载有限，但其确为唐初政治号召的重要象征：以宗室女性身份参与战争，提升起兵合法性并凝聚地方人心。她早逝却获厚葬，说明功绩当时已被认可；后世尊其为巾帼英雄，也是在纪念开国的艰难与代价。
