  - key: hist_suitang_0061_gaoxianzhi
    name: 高仙芝
    archetype: military
    flavor: （？-756年）唐代西域名将，出身边镇体系，长于远征与山地行军，曾深入帕米尔一带经营边地。怛罗斯之战失利后仍能维持一定的西域防务，但安史之乱初期因战局不利与朝廷猜忌，被以军法处斩，结局极为冤酷。关于怛罗斯战后"造纸术西传"的说法多见后世叙述，具体脉络仍有争论。高仙芝的经历更能说明盛唐边防的两难：远征靠将才，败退却常由将领担责。
