  - key: hist_suitang_0069_zhangxun
    name: 张巡
    archetype: military
    flavor: （708年-757年）安史乱中守将，与许远共守睢阳，坚拒叛军围攻，牵制其兵力与粮道，为唐廷赢得喘息。城中断粮后处境极端，史书对其守城方式记载残酷而复杂，但其"不降"与"死守"确实成为中唐抗乱的象征。睢阳终陷，他慷慨就义。张巡的评价常在忠烈与代价之间摇摆：他守住的不是一座城，而是朝廷在崩溃边缘的一线时间。
