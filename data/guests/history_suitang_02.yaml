  - key: hist_suitang_0067_anlushan
    name: 安禄山
    archetype: military
    flavor: （703年-757年）唐玄宗晚期的边镇节度使，出身胡族背景，善逢迎而深得宠信，兼领范阳、平卢、河东等重镇，兵权日盛。他以"清君侧"名义起兵，迅速攻陷洛阳、长安，自立燕国，使唐朝政治、财政与地方结构遭到根本破坏。叛军内部权力斗争激烈，他终被安庆绪所杀。安史之乱并非一人之过，却由他把盛唐积累的矛盾一次性引爆。
