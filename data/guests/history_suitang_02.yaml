    attribute_weights:
      force: 12
      intellect: 52
      defense: 20
      agility: 16
  - key: hist_suitang_0047_liuyuxi
    name: 刘禹锡
    archetype: civil
    flavor: （772年-842年）中唐诗人、政治人物，参与永贞革新失败后长期贬谪。逆境中他保持锐气，以诗文讥刺时政、抚慰自我，"沉舟侧畔千帆过"把挫折写成不屈的转身。刘禹锡的诗既有豪迈，也有清峻哲理，能把个人遭遇提升为对世事的判断。与白居易并称"刘白"，但他更偏锋利与简洁，像一把小刀在平静水面下割开暗流。晚年回京，仍不改风骨，证明被贬的也可以重新锻造语言与立场。
    growth_range:
    - 7
    - 10
    attribute_weights:
      force: 14
      intellect: 50
      defense: 22
      agility: 14
  - key: hist_suitang_0048_wentlingyun
    name: 温庭筠
    archetype: civil
    flavor: （约812年-约870年）晚唐诗人、词人，才思敏捷，文名甚盛却仕途屡挫。其词风绮丽细密，善写闺情与梦境，成为花间词传统的重要先声；诗作亦多工致华美。温庭筠性格不羁，常与科举官场格格不入，留下"才高而命薄"的形象。他的作品呈现晚唐另一面：政治日衰，都市与宫廷审美却更趋精巧，情感更趋隐秘。温庭筠把这种精致写到极致：字面如锦，背后却有时代颓靡与个人失意的暗影。
    growth_range:
    - 7
    - 10
    attribute_weights:
      force: 12
      intellect: 52
      defense: 20
      agility: 16
  - key: hist_suitang_0049_xuetao
    name: 薛涛
    archetype: civil
    flavor: （约768年-约831年）唐代女诗人，长期居蜀地，兼具才情与社交能力。她以诗名与当时名士唱和，作品多写离别、风物与个人境遇，清丽中见坚韧。薛涛还与"薛涛笺"相连，传为改良纸笺以便题诗往来，虽细节或有传说成分，却反映她在文化生活中的影响力。作为女性，她必须在礼法与现实之间寻找生存空间，她的诗正是在这种空间里开出的花：不高声争辩，却把自我感受写得明确。薛涛让唐代诗坛的女性声音更可见，也更可信。
    growth_range:
    - 7
    - 10
    attribute_weights:
      force: 10
      intellect: 54
      defense: 20
      agility: 16
  - key: hist_suitang_0050_yuxuanji
    name: 鱼玄机
    archetype: civil
    flavor: （约844年-871年）晚唐女诗人，兼有道教身份与都市传奇色彩。其诗多清丽婉转，善写孤独、爱情与自我意识，语言不事雕琢却有锋芒。鱼玄机的人生亦极具争议：史载其因杀婢获罪被处死，结局悲惨，后世对其故事不断改写渲染。无论如何，她呈现了晚唐都市文化中的女性处境：才华可以让人被看见，却也更容易被放大审判。鱼玄机的诗与其人生相互纠缠，读来既有美感，也有寒意——那是乱世里个人命运的不由自主。
