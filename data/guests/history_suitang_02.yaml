  - key: hist_suitang_0053_heruobi
    name: 贺若弼
    archetype: military
    flavor: （544年-607年）隋代名将，灭陈之役中为主帅之一，率军入建康立下决定性战功。其性格刚猛而自负，常以功臣自居，屡在朝中直言褒贬，既有军人豪气，也缺政治收敛。统一后官场转入制度运作，他却难适应宫廷忌讳，终以言获罪被诛。贺若弼的沉浮提醒：战场上的锋芒若不懂藏锋，在太平时期反成祸端；功名与口舌同样锋利，终反噬其身。
