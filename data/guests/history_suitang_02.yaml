  - key: hist_suitang_0063_menghaoran
    name: 孟浩然
    archetype: civil
    flavor: （689年-740年）唐代山水田园诗人，一生多在襄阳与江汉间游走，向往隐逸却也曾求仕。其诗语言清淡自然，善写晨昏、江湖、村落等日常景色，《春晓》几乎成为共同的童年记忆。孟浩然与王维交游相契，却气质更贴近人间烟火；屡试不第使其作品常带淡淡失落，却不怨毒，反以自持回到山水之间。他把盛唐的豪迈留给边塞，把盛唐的宁静留给草木与清风。
