  - key: hist_suitang_0056_qinqiong
    name: 秦琼
    archetype: military
    flavor: （571年-638年）唐初将领，早年事隋，隋末辗转瓦岗与诸军，终归唐以战功闻名。其不以奇谋取胜，却以冲锋陷阵与坚忍守阵受人信赖，在统一与平叛战争中多次出力。晚年多病，史载其体弱而仍奉命从征，显示开国功臣的消耗。民间把他塑造成门神之一，既是对其忠勇的赞誉，也折射乱世之后百姓对安定与守护的朴素愿望；传说虽非史笔，却说明其形象深入人心。
