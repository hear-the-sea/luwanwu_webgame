  - key: hist_suitang_0052_yangsu
    name: 杨素
    archetype: military
    flavor: （544年-606年）隋代权臣兼名将，参与灭陈、平叛与边防，军功显著；又善于经营朝局，位极人臣。其一面是统一事业的武功担当，一面是中枢权力的操盘者，家族势力随之膨胀。炀帝即位后仍倚重其资望，但其子杨玄感起兵反隋，使杨氏功名染上裂痕。杨素身上集合了隋代"以军功起、以权势盛"的典型轨迹，也折射权力家族化的隐患。
