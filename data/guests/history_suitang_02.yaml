  - key: hist_suitang_0058_lixiaogong
    name: 李孝恭
    archetype: military
    flavor: （591年-640年）唐宗室名将，开国时期长期镇抚南方。其率军平定萧铣、辅公祏等势力，使江汉与江南纳入唐廷版图，军事与行政并举。作为宗室，他既享血缘优势，也更需谨慎避免"宗王拥兵"的疑忌，因此治军与治地方多强调安抚与整饬。凌烟阁功臣中宗室并不多，他以实绩证明宗亲也能成为制度化军政的一部分，是唐初统一进程的重要执行者。
