  - key: hist_suitang_0055_yuchigong
    name: 尉迟恭
    archetype: military
    flavor: （585年-658年）唐初名将，出身行伍，辗转归附秦王，因勇烈与忠诚被重用。玄武门事变中他以武力护卫太宗立足，奠定功臣地位；其后参与征战与镇抚，战场上强悍，朝廷上却懂得收敛锋芒。晚年避开权力旋涡，闭门自守而得善终。后世将其与秦琼并奉为门神，不尽是史实，却说明民间对"护国护门"的武将形象有着长久需要。
