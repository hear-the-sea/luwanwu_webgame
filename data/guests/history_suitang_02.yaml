  - key: hist_suitang_0057_chengzhijie
    name: 程知节
    archetype: military
    flavor: （589年-665年）唐初将领，性情豪爽直率，历经隋末战乱而归入唐军。史书中的他并非只靠戏曲里的"三板斧"，而是能在多次战役中担任先锋与统兵任务的老将：敢冲阵，也能带兵守纪。其行事有时粗豪，却在功臣群体中进退有度，高龄善终尤为难得。程知节更像一位"能打也能活"的乱世幸存者，留下的是开国武人的粗砺与韧性。
