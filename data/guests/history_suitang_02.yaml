  - key: hist_suitang_0064_wangchangling
    name: 王昌龄
    archetype: civil
    flavor: （698年-756年）盛唐边塞诗名家，尤擅七绝，被称为"诗家夫子"。其《出塞》等名篇以简练句法写尽边关冷月与征人愁思，把宏大历史感压进短章里。王昌龄仕途起伏，曾为地方官，亦有贬谪经历；战乱岁月中遇害身亡的记载使其结局更添苍凉。他的诗不只是豪壮，更有对士卒命运的体恤：在"万里长征"背后，他看见的是人的疲惫与孤独。读王昌龄，能触到盛唐最锋利的铁与最柔软的心。
