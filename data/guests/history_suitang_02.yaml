  - key: hist_suitang_0065_gaoshi
    name: 高适
    archetype: civil
    flavor: （704年-765年）盛唐至中唐诗人，边塞题材代表之一，亦是少数真正走上高位的诗人官员。其诗沉雄朴实，不追华艳，擅写军旅生活的困苦与豪情，并能把个人身世与国家边事连为一体。高适曾随军幕府，后又入朝任官，经历安史乱局，对盛世崩塌有直接体感。与岑参的奇丽想象不同，高适更像冷风中的铁：句子不花，却有重量。其作品让人看到边塞不是浪漫舞台，而是现实与责任压来的地方。
