  blue:
  - key: hist_suitang_0051_gaojiong
    name: 高颎
    archetype: civil
    flavor: （541年-607年）隋开国重臣，参与确立法度与行政框架，辅佐文帝完成统一。其长于综理机务，推行节用、整饬官僚，使"开皇之治"得以落地。政治上主张以制度制衡权贵，却在太子更易与宫廷斗争中遭猜忌，被炀帝诛杀。高颎的结局说明：隋初治世并不稳固，功臣也可能在权力重组时被迅速抹去；其名声因直而显，也因直而折。
