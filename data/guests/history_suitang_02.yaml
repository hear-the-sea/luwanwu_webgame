  - key: hist_suitang_0060_xurengui
    name: 薛仁贵
    archetype: military
    flavor: （614年-683年）唐代名将，出身并不显赫而以战功起。史载其在东北与西北战事中屡有表现，善骑射、敢冲阵，成为军中可倚之将。民间"白袍将军""三箭定天山"等传说夸饰甚多，但也反映他确以勇武闻名。其仕途数起数落，既受赏识也遭疑忌，显示边将并不总能掌握命运。真实的薛仁贵是边防体系里的硬将，传说的薛仁贵则成了大众对英雄的投射。
