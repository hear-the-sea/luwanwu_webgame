  - key: hist_suitang_0066_censhen
    name: 岑参
    archetype: civil
    flavor: （约715年-约770年）唐代边塞诗人，曾两度赴安西、北庭等地幕府，亲历西域风雪与军旅奔波。其诗想象瑰丽，善用夸张比喻写极端景象，"梨花开"般的雪夜与大漠孤城在他笔下同时鲜活。岑参并非只写奇景，他也写离别、思乡与军中劳苦，使壮丽背后不失人情。与高适的沉雄相比，他更像一支快笔：色彩浓烈、节奏急促，带着盛唐对边疆世界的好奇与自信。
