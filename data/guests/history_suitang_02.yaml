  purple:
  - key: hist_suitang_0046_wangbo
    name: 王勃
    archetype: civil
    flavor: （650年-676年）初唐四杰之首，少年成名，文思敏捷。其《滕王阁序》以辞采与气势写尽江楼秋色，成为骈文典范。王勃仕途屡遭波折，曾因文事获罪而外放，后南下探父，归途中遇难身亡的说法较为流行。短短二十余年，他把初唐由六朝绮靡向盛唐雄健过渡的气象写进文字：既华丽又有骨力，既自信又带失意。王勃的早逝让人惋惜，也让他的名字永远停在"才气未尽"的高度。
    growth_range:
    - 7
