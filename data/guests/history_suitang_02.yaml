  - key: hist_suitang_0054_hqinhhu
    name: 韩擒虎
    archetype: military
    flavor: （538年-592年）隋代将领，南征灭陈时行动迅捷，率军先入建康并俘陈后主，成为统一江南的重要功臣。史传称其勇猛果决，善于把握战机，在渡江推进与合围作战中屡建奇功。其死后"为阎罗王"等说法属民间传说，反映百姓对其威名的再想象。抛开神怪色彩，韩擒虎的价值在于以快速突击终结一朝江山，展示隋军整合后的效率。
