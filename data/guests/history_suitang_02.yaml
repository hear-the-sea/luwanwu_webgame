  - key: hist_suitang_0062_chenziaang
    name: 陈子昂
    archetype: civil
    flavor: （659年-700年）初唐诗风革新者，主张复归汉魏风骨，反对一味绮靡。其《登幽州台歌》以"前不见古人"写尽历史苍凉，成为古典诗歌中最具哲思的名篇之一。陈子昂仕途亦有坎坷，性情刚直，屡因言行与权贵龃龉，晚年在地方纠纷中受挫而亡。陈子昂的价值不仅在名句，更在方向：他把诗从宫廷玩物拉回到"可以言志"的位置，为盛唐诗歌的雄健与广阔开辟道路。
