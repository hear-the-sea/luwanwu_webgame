  - key: hist_suitang_0068_liguangbi
    name: 李光弼
    archetype: military
    flavor: （708年-764年）安史之乱中唐军主将，与郭子仪并称中兴名将。其善守城与整军，屡在北方与河朔战场挫败叛军，稳定山西、河北局势，为收复两京与后续反攻争取时间。史载其治军严明而不乏权变，能在复杂的藩镇与宦官环境中勉力推进军务。乱后功高却多受猜忌，晚景郁郁。若只用一句话概括李光弼，就是"把乱局止住"：他更像一堵沉默的城墙，扛住风暴而不耀眼。
