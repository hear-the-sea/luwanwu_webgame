  - key: hist_sljnbc_0003
    name: 司马懿
    default_gender: male
    archetype: civil
    flavor: （179年—251年9月7日）曹魏重臣、军事统帅，西晋王朝的实际奠基人。他早年装病拒绝曹操征辟，后辅佐曹丕登基，深受信任。镇守西线时多次与蜀汉北伐军对峙，以持重著称，诸葛亮送来女装羞辱亦不动声色；亦曾东征平定辽东公孙渊。高平陵之变后夺取朝政大权，隐忍数十年一朝得势，奠定司马氏取魏建晋的基础。后世有言"司马公善忍"，其谋深沉如渊。
    growth_range:
    - 8
    - 10
    attribute_weights:
      force: 16
      intellect: 50
      defense: 22
      agility: 12
  - key: hist_sljnbc_0008
    name: 荀彧
    default_gender: male
    archetype: civil
    flavor: （163年—212年）王佐之才，汉室孤忠。他弃袁绍而投曹操，献策定兖州，坐镇后方运筹帷幄。官渡之战前后，他主掌军政机务与后方保障，多次进谏以定大计；然而当曹操欲进魏公时，他以死明志守护汉室最后的尊严。一个空食盒，道尽忠臣末路的悲凉。他是曹营第一谋主，也是最孤独的理想主义者。清望冠绝士林，号“荀令君”。
    growth_range:
    - 8
    - 10
    attribute_weights:
      force: 12
      intellect: 58
      defense: 18
      agility: 12
  - key: hist_sljnbc_0009
    name: 王猛
    default_gender: male
    archetype: civil
    flavor: （325年—375年）前秦名相，字景略，北海剧县人。他出身寒门，早年隐居华阴山读书。桓温北伐关中时曾邀其南下，他婉拒未从。后遇苻坚，一见如故，被比作诸葛亮遇刘备。苻坚即位后他任丞相，主持内政外交军事大权十八年。他整顿吏治，打击豪强，兴修水利，发展生产，使前秦迅速强盛。他亲自率军灭前燕，攻取洛阳，威震天下。
    growth_range:
    - 8
    - 10
    attribute_weights:
      force: 14
      intellect: 54
      defense: 20
      agility: 12
  - key: hist_sljnbc_0010
    name: 谢安
    default_gender: male
    archetype: civil
    flavor: （320年—385年10月12日）东山再起，淝水定倾。他隐居东山二十余载，一朝出山便挽狂澜于既倒。淝水之战，八万北府兵大破苻坚百万大军，他于棋局间接捷报，神色不改，只道"小儿辈大破贼"。那份从容淡定，是魏晋风度的极致。他以名士之姿担社稷之重，为东晋续命数十年。举贤任能，谢玄等名将皆出其门下。
    growth_range:
    - 8
    - 10
    attribute_weights:
      force: 14
      intellect: 52
      defense: 22
      agility: 12
  - key: hist_sljnbc_0011
    name: 张飞
    default_gender: male
    archetype: military
    flavor: （？—221年）燕人张翼德，万军辟易。他豹头环眼，声若雷霆，“当阳桥断喝”等事多见于《三国演义》。他粗中有细，义释严颜传为美谈；取西川立下汗马功劳。虽因暴而亡于小人之手，却无损其万夫莫敌之威名。蜀汉五虎，他与关羽并称"万人敌"。史载其于巴西之战破张郃，亦具将略。勇而能用兵，亦能敬士任人，号令严峻。
    growth_range:
    - 7
    - 10
    attribute_weights:
      force: 50
      intellect: 10
      defense: 26
      agility: 14
  - key: hist_sljnbc_0012
    name: 赵云
    default_gender: male
    archetype: military
    flavor: （？—229年）常山赵子龙，蜀汉名将。长坂坡救幼主事迹最著名，于曹营万军之中怀抱阿斗杀出重围，演义中渲染为"七进七出"。他一生追随刘备，入川之战、汉水之战皆立大功。为人清白有威、忠勇谨慎，从不居功自傲。刘备东征时曾力谏不可伐吴，惜未被采纳。诸葛亮北伐以其为疑兵，虽败于箕谷仍能全师而退。
    growth_range:
    - 8
    - 10
    attribute_weights:
      force: 40
      intellect: 16
      defense: 24
      agility: 20
  - key: hist_sljnbc_0013
    name: 吕布
    default_gender: male
    archetype: military
    flavor: （？—199年2月7日）人中吕布，马中赤兔。“辕门射戟”“虎牢关”等多为《三国演义》渲染，方天画戟亦属演义常见形象。其人骁勇善战，然反复无常，先杀丁原后刺董卓，终为曹操所擒。白门楼上英雄末路，枭雄一世却难逃"三姓家奴"之讥。麾下并州骑兵精悍，然无定策失人心。勇冠一时却缺治军治国之略，终成“勇而无谋”象征。
    growth_range:
    - 7
    - 10
    attribute_weights:
      force: 56
      intellect: 8
      defense: 22
      agility: 14
  - key: hist_sljnbc_0014
    name: 孙权
    default_gender: male
    archetype: military
    flavor: （182年—252年5月21日）生子当如孙仲谋。他承父兄基业，坐断东南战未休。赤壁联刘抗曹，火烧连营定三分；石亭诱敌深入，大破曹休震中原。他知人善任，周瑜、陆逊皆其所拔；他隐忍持重，在魏蜀夹缝中求得东吴五十年基业。紫髯碧眼，雄姿英发，纵横捭阖间尽显帝王手腕。晚年立嗣之争亦为其治下阴影。
    growth_range:
    - 8
    - 10
    attribute_weights:
      force: 34
      intellect: 22
      defense: 24
      agility: 20
  - key: hist_sljnbc_0015
    name: 周瑜
    default_gender: male
    archetype: military
    flavor: （175年—210年）雄姿英发，羽扇纶巾。他弱冠之年便统兵征战，赤壁一役一把火大破曹操大军，奠定三分天下之基。谈笑间樯橹灰飞烟灭，顾曲间尽显名士风流。世人误传"既生瑜何生亮"，殊不知他与诸葛亮惺惺相惜，皆是一时之杰。英年早逝，壮志未酬，一曲长河落日，道尽千古遗憾。并整编江东水师、经营荆州要地，为孙吴奠基。
    growth_range:
    - 8
    - 10
    attribute_weights:
      force: 35
      intellect: 24
      defense: 21
      agility: 20
  - key: hist_sljnbc_0016
    name: 王羲之
    default_gender: male
    archetype: civil
    flavor: （303年—361年）书圣之名，千古独步。他于兰亭曲水流觞，挥毫写就天下第一行书。那二十一个"之"字各具姿态，飘若浮云矫若惊龙。他不慕权贵，辞官归隐，以鹅换字传为美谈。笔走龙蛇间，将魏晋风骨凝于纸上；墨香流转处，开后世书法之宗。千载之下，《兰亭序》仍是无数书家心中的圣殿。与子王献之并称“二王”，影响千年。
    growth_range:
    - 7
    - 9
    attribute_weights:
      force: 8
      intellect: 60
      defense: 18
      agility: 14
  - key: hist_sljnbc_0017
    name: 陈庆之
    default_gender: male
    archetype: military
    flavor: （484年—539年）千军万马避白袍。他以书生之躯统七千白袍军，北伐四十七战，攻城三十二座，所向披靡。洛阳城下，以寡敌众破敌百万，创造了战争史上的不朽神话。他不是武夫，却让天下武人汗颜；他只是儒将，却书写了最壮烈的传奇。名师大将莫自牢，千军万马避白袍，梁朝一代战神，实至名归。军纪严整，史称所至秋毫无犯，名垂战史。
    growth_range:
    - 8
    - 10
    attribute_weights:
      force: 36
      intellect: 18
      defense: 20
      agility: 26
  - key: hist_sljnbc_0018
    name: 祖冲之
    default_gender: male
    archetype: civil
    flavor: （429年—500年）圆周率精确千年，历法天文惊世间。他将圆周率推算至小数点后七位，领先世界近千年；编制《大明历》精确推算岁差，是中国古代最杰出的数学家天文学家。他不仅是科学巨匠，更造出指南车、千里船等奇械。在那个群雄逐鹿的时代，他以学问开辟了另一片天地。其著《缀术》虽佚，影响却久远。
    growth_range:
    - 7
    - 10
    attribute_weights:
      force: 8
      intellect: 62
      defense: 18
      agility: 12
  - key: hist_sljnbc_0019
    name: 慕容恪
    default_gender: male
    archetype: military
    flavor: （？—367年）前燕战神，国之柱石。慕容皝第四子，虽为庶出，却才兼文武。连环马阵大破冉闵，擒杀武悼天王，威震中原。辅佐幼主慕容暐，公正廉明，虚怀若谷。谢安曾言：“即使桓温北伐，若是遇上慕容恪，恐怕也难有胜算。”他是十六国时期最完美的统帅之一。死后前燕失其柱石，国势转衰。
    growth_range:
    - 7
    - 10
    attribute_weights:
      force: 40
      intellect: 16
      defense: 26
      agility: 18
  - key: hist_sljnbc_0020
    name: 高长恭
    default_gender: male
    archetype: military
    flavor: （541年—573年）兰陵王，面具战神。北齐文襄帝高澄第四子，貌柔心壮。因容貌过于俊美，担心难以震慑敌军，每逢出阵便戴上凶恶面具。邙山之战率五百精骑突入北周重围，解金墉城之困，将士为其勇壮作《兰陵王入阵曲》传唱至今。他为人恭谨，身先士卒，深得军心。因功高震主被后主高纬猜忌，赐鸩酒而亡。
    growth_range:
    - 7
    - 10
    attribute_weights:
      force: 44
      intellect: 12
      defense: 22
      agility: 22
  - key: hist_sljnbc_0021
    name: 鲁肃
    default_gender: male
    archetype: civil
    flavor: （172年—217年）联刘抗曹的战略家，东吴霸业的规划师。出身富豪，为人豁达疏财，周瑜荐之于孙权。榻上策最早提出三分天下之略，比隆中对更早奠定东吴战略方向。赤壁之战前力排众议主战抗曹，亲赴荆州促成孙刘联盟，是东吴能够存续的关键推手。他为人方正大度，借荆州、单刀会皆显其格局。
    growth_range:
    - 7
    - 10
    attribute_weights:
      force: 14
      intellect: 54
      defense: 18
      agility: 14
  - key: hist_sljnbc_0022
    name: 陆逊
    default_gender: male
    archetype: military
    flavor: （183年—245年3月19日）书生拜大将，火攻定乾坤。他以白面书生之貌写信麻痹关羽，配合吕蒙奇袭荆州；夷陵之战隐忍不发，待刘备连营七百里疲惫之时，一把火烧尽蜀汉复仇大军。他是东吴后期的擎天柱石，文韬武略皆臻化境。石亭破曹休，镇守荆襄数十年，功业不在周瑜之下。晚年遭宫廷猜忌，忧愤而终。
    growth_range:
    - 8
    - 10
    attribute_weights:
      force: 36
      intellect: 22
      defense: 22
      agility: 20
  - key: hist_sljnbc_0023
    name: 孙策
    default_gender: male
    archetype: military
    flavor: （175年—200年5月5日）小霸王横扫江东，霸业初成身先死。他继承父志，以传国玉玺换得兵马，横扫六郡席卷江东。神亭岭单挑太史慈，豪气干云；临终托孤于周瑜张昭，远见卓识。若非遇刺英年早逝，或许三分天下将是另一番格局。他是乱世中最耀眼的流星，虽短暂却璀璨夺目。终遭许贡门客刺杀，江东基业转付孙权。
    growth_range:
    - 8
    - 10
    attribute_weights:
      force: 44
      intellect: 12
      defense: 20
      agility: 24
  - key: hist_sljnbc_0024
    name: 郭嘉
    default_gender: male
    archetype: civil
    flavor: （170年—207年）鬼才早逝，遗计定辽东。他料敌如神，十胜十败激励曹操；遗计安辽东，令二袁自相残杀。若非英年早逝，赤壁之败或可避免。曹操哭祭道"哀哉奉孝，痛哉奉孝"，足见其在曹营中无可替代的地位。他是乱世中最耀眼的谋士流星，虽短暂却光芒万丈。善断大势，奇谋屡中，堪称曹营第一智囊。
    growth_range:
    - 7
    - 10
    attribute_weights:
      force: 12
      intellect: 58
      defense: 18
      agility: 12
  - key: hist_sljnbc_0025
    name: 吕蒙
    default_gender: male
    archetype: military
    flavor: （178年—220年）士别三日，刮目相看。他从吴下阿蒙成长为东吴大都督，白衣渡江奇袭荆州，生擒关羽威震天下。读书破万卷的他，用实际行动证明：武将亦可运筹帷幄。可惜功成之后暴病而亡，为这段传奇添上了几分神秘色彩。他是东吴由武转文的典范，也是关羽陨落的关键人物。晚年荐陆逊继任，使吴战略得以延续。
    growth_range:
    - 7
    - 10
    attribute_weights:
      force: 38
      intellect: 20
      defense: 22
      agility: 20
  - key: hist_sljnbc_0026
    name: 贾诩
    default_gender: male
    archetype: civil
    flavor: （147年—223年8月11日）毒士之名，明哲保身。他献计李傕郭汜祸乱长安，为张绣谋划宛城之变；归曹后韬光养晦，却在关键时刻一言定立储之争。他算无遗策却从不争功，是乱世中活得最通透的谋士。世人道他毒，却不知他只是比所有人都更懂得生存之道。三易其主仍能全身而退，最懂乱世人心。
    growth_range:
    - 7
    - 10
    attribute_weights:
      force: 10
      intellect: 60
      defense: 18
      agility: 12
  - key: hist_sljnbc_0027
    name: 邓艾
    default_gender: male
    archetype: military
    flavor: （197年—264年2月）偷渡阴平，奇兵灭蜀。他结巴口吃，却是三国后期最杰出的军事家。率偏师翻越摩天岭，从阴平小道直插蜀汉腹地，逼降刘禅一战灭国。功高震主，却死于钟会谗言，父子俱亡于蜀中。他的结局证明：功成身退才是乱世生存的智慧。亦善治军屯田、筹粮于陇右，被诛后多有昭雪之论。
    growth_range:
    - 8
    - 10
    attribute_weights:
      force: 40
      intellect: 20
      defense: 24
      agility: 16
  - key: hist_sljnbc_0028
    name: 慕容垂
    default_gender: male
    archetype: military
    flavor: （326年—396年6月2日）战神归来，后燕开国。他本是前燕名将，少年成名，与慕容恪并称"北方双璧"。因受兄长排挤，亡国后投奔苻坚，却受其猜忌不得重用。淝水之战后趁乱复国建立后燕，年过六旬仍能亲征沙场，击败来犯之敌。一生历经数十战未尝一败，被誉为"十六国第一战神"。晚年讨伐北魏，闻参合陂惨败消息呕血而亡。
    growth_range:
    - 8
    - 10
    attribute_weights:
      force: 44
      intellect: 16
      defense: 24
      agility: 16
  - key: hist_sljnbc_0029
    name: 桓温
    default_gender: male
    archetype: military
    flavor: （312年—373年7月14日）北伐名将，权臣枭雄。他出身名门，因诛灭杀父仇人而成名。溯江灭成汉，三次北伐收复洛阳，威震天下。第三次北伐败于前燕慕容垂之手，枋头惨败损兵折将。晚年权势滔天，行废立之事，欲效曹操旧例，然因声望所累迟迟不敢逾越。临终叹曰"既不能流芳后世，不足复遗臭万载耶"，道尽枭雄心事。
    growth_range:
    - 7
    - 10
    attribute_weights:
      force: 42
      intellect: 18
      defense: 22
      agility: 18
  - key: hist_sljnbc_0030
    name: 谢玄
    default_gender: male
    archetype: military
    flavor: （343年—388年）北府兵魂，淝水先锋。他是谢安之侄，少有大志，善于识拔人才。受命组建北府兵，招募刘牢之等骁将，训练出东晋最精锐的军队。淝水之战为前锋主将，以八万北府兵大破前秦百万大军，风声鹤唳、草木皆兵皆出此役。战后名望甚隆，然朝廷猜忌不得重用，年仅四十六岁便郁郁而终。
    growth_range:
    - 8
    - 10
    attribute_weights:
      force: 40
      intellect: 18
      defense: 24
      agility: 18
  - key: hist_sljnbc_0031
    name: 宇文邕
    default_gender: male
    archetype: military
    flavor: （543年—578年）北周武帝，灭佛雄主。隐忍多年，一朝诛杀权臣宇文护，夺回朝政。厉行改革，整顿吏治，释放奴婢。发起灭佛运动，将寺院财富充作军资，极大地增强了国力。灭北齐统一北方，为后来隋唐大一统奠定了坚实基础。并以英明果决著称，可惜英年早逝。其军政制度为隋初所承继，影响深远。
    growth_range:
    - 8
    - 10
    attribute_weights:
      force: 40
      intellect: 18
      defense: 26
      agility: 16
  - key: hist_sljnbc_0032
    name: 斛律光
