# 特殊/隐藏BOSS门客

heroes:
  orange:
  - key: special_hero_sao_di_seng
    name: 扫地僧
    archetype: civil
    flavor: 少林寺扫地僧，身份平凡却藏大智慧，手持扫帚常年清理寺中尘垢，实则以心境扫除执念。内力浑厚到返璞归真，举手投足皆能化解争斗。因看破名利而隐于寺内，真正出手时才让江湖识得其境界。出自《天龙八部》。
    default_gender: male
    default_morality: 95
    recruitable: false
    skills:
    - dragon_roar
    custom_stats:
      force: 250
      intellect: 145
      defense: 195
      agility: 140
      luck: 110
      base_hp: 28000
    avatar: monkey_mistry.png
  - key: special_hero_dugu_qiubai
    name: 独孤求败
    archetype: military
    flavor: 独孤求败，剑道孤高，纵横一生未逢敌手，故以“求败”为名以警醒自身。其剑境由利而钝、由锋而拙，终至无剑胜有剑的极致。传说他行遍江湖不求名利，只求一场能逼出全力的对决。出自《神雕侠侣》。
    default_gender: male
    default_morality: 95
    recruitable: false
