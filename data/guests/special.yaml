      base_hp: 28000
    avatar: monkey_mistry.png
  - key: special_hero_dongfang_bubai
    name: 东方不败
    archetype: military
    flavor: 东方不败，权倾日月神教，武功凌绝江湖，身法快到如同鬼魅。为追求极致力量而行偏锋，却也因此心性复杂难测。她在权谋与情感之间摇摆，既能一剑破敌，也能一念成局，是江湖里最难以捉摸的传奇。出自《笑傲江湖》。
