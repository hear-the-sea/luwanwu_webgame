    agility: 16

- key: hist_suitang_0249_yuanjie
  name: 元结
  default_gender: male
  archetype: civil
  flavor: （719年-772年）唐代诗人、官员，安史乱前后亲历地方动荡，对民生困苦感受深切。其诗文常带纪实气息，敢写饥馑、流亡与官府失当，语调不求华丽而求有用，体现士人在乱世中的道义焦虑。元结也并非单纯的"批判者"，他在地方任事时尝试以实际措施抚循百姓，作品中既有愤怒也有无奈。与盛唐歌咏山河不同，元结把目光放在破碎的社会肌理上：诗成了记录与见证，写作成了对现实的一次不肯闭眼的回应。他的存在让唐诗史更完整，因为一个帝国的文学不只有盛世，也必须留下灾年的声音。
  growth_range: [4, 7]
  attribute_weights:
    force: 13
    intellect: 40
    defense: 18
    agility: 16

- key: hist_suitang_0250_liuchangqing
  name: 刘长卿
  default_gender: male
  archetype: civil
  flavor: （生卒年不详）唐代诗人，擅五言，后人称其为"五言长城"。刘长卿仕途坎坷，屡遭贬谪与漂泊，这使他的诗格外善写送别、羁旅与清寒之景：山城暮雨、江路孤舟常成其笔下固定背景，但每次落笔又能写出不同层次的孤独。与盛唐豪放不同，他的气质偏清峭，情感内敛而不枯槁，常在冷色调里含一丝温情。读刘长卿，会看到中唐士人如何在不确定的官场里保存自我——不是靠激烈对抗，而是靠把心事寄托于简洁的五言里，让漂泊成为可以书写的秩序。
  growth_range: [4, 7]
  attribute_weights:
    force: 12
    intellect: 39
    defense: 17
    agility: 16

- key: hist_suitang_0251_lulun
  name: 卢纶
  default_gender: male
  archetype: civil
  flavor: （739年-799年）唐代诗人，"大历十才子"之一，作品多写军旅、边塞与送别。卢纶并非只会写场面，他的边塞诗常有一种"见过兵事的人"的冷静：既能写出战阵的紧迫，也能写出军中生活的疲惫与漫长等待。大历时期政治与军事处在安史乱后重整阶段，士人往往在幕府与州县之间辗转，卢纶的诗正记录这种中间状态：不再是盛唐的昂扬远征，也未进入晚唐的全面崩坏，而是夹在修补与隐忧之间的现实。其语言清峻，结构紧凑，能用不多的字把情绪钉在场景里。
  growth_range: [4, 7]
  attribute_weights:
    force: 13
    intellect: 38
    defense: 17
    agility: 16

- key: hist_suitang_0252_sikongtu
  name: 司空图
  default_gender: male
  archetype: civil
  flavor: （837年-908年）晚唐诗人、文论家，《二十四诗品》影响巨大。司空图既做过官，也在动乱中退居山林，其人生横跨唐末剧变，使他对文学的理解带有浓厚的历史感：当现实不可靠，诗的价值就更像一种精神秩序。其《二十四诗品》以品评方式讨论诗境，偏重气韵与风格的层次，对后世审美语言贡献极大。司空图的独特处在于把写作经验上升为理论，却又不落成教条；他更像在乱世里总结"如何还能写出好诗"。因此，他不仅是晚唐诗坛的参与者，也是把唐诗审美系统化的一位关键解释者。
  growth_range: [4, 7]
  attribute_weights:
    force: 11
    intellect: 42
    defense: 16
    agility: 16

- key: hist_suitang_0253_sikongshu
  name: 司空曙
  default_gender: male
  archetype: civil
  flavor: （生卒年不详）唐代诗人，"大历十才子"之一，诗多写离别、旅愁与清景，格调婉转。司空曙擅长把情绪藏在景里：一两句写雨、写月、写江路，就能让人读出漂泊的冷意。他的作品常出现在中唐诗歌选本中，正因为它不张扬，却很耐读。关于其生平，史料不算丰富，但从诗可见其社交圈与当时文人群体紧密相连，送别诗尤多，映照大历时期官场流动频繁、幕府往来密集的现实。司空曙的独特之处，在于用一种近乎低声的语调把时代的疲惫说出来，让"含蓄"成为力量。
  growth_range: [4, 7]
  attribute_weights:
    force: 12
    intellect: 38
    defense: 16
    agility: 16

- key: hist_suitang_0254_simachengzhen
  name: 司马承祯
  default_gender: male
  archetype: civil
  flavor: （647年-735年）唐代道士，重视修炼与经义阐释，与盛唐宗教政策及士人风尚多有交集。司马承祯的著作强调内修与心性训练，在道教修持史上具有代表性，并因与皇帝、士大夫的互动而更具影响力。盛唐时期道教地位上升，宫廷对道教的利用与支持，使道士不仅在山林修炼，也进入都城讲授与参与礼仪。司马承祯呈现道教如何在国家与社会之间找到位置：既保持修行传统，又适应官方与文化圈的期待。理解他，也能看到盛唐宗教并非与政治隔绝，而是被纳入文化治理的一部分。
  growth_range: [4, 7]
  attribute_weights:
    force: 10
    intellect: 42
    defense: 16
    agility: 16

- key: hist_suitang_0255_wuyun
  name: 吴筠
  default_gender: male
  archetype: civil
  flavor: （生卒年不详）唐代道士兼文人，诗文与宗教活动在文献中多有踪迹。吴筠的形象常与"隐逸""清谈"并列，既符合盛唐士人对山林生活的想象，也反映道教人物在文学圈中的真实存在：他们既讲修炼，也写诗文，与文士往来唱和。由于传记材料有限，吴筠的具体事迹不宜过度细化，但其被持续引用，说明他在当时文化网络中确有影响。吴筠展示宗教与文学的交界处：道教并不只是仪式系统，也提供一套审美与人格理想，帮助士人表达对官场的疏离与对自我修养的追求。
  growth_range: [4, 7]
  attribute_weights:
    force: 9
    intellect: 40
    defense: 15
    agility: 16

- key: hist_suitang_0256_shandao
  name: 善导
  default_gender: male
  archetype: civil
  flavor: （613年-681年）唐代高僧，净土信仰的重要弘传者之一。善导强调称名念佛与往生信念，使净土修持更易为普通信众接受，推动佛教从精英讲学走向更广泛的民间实践。其著述与讲化在后世净土传统中影响极大，许多修持观念通过善导体系获得明确化。善导把宗教方法变得更"可执行"：不需要高深经论训练，也能参与修行，这与唐代城市化与社会流动加速的背景相契合。对历史理解而言，善导显示宗教传播的关键常在方法与组织，而不仅是哲学深度；越能适应大众生活节奏的信仰形态，越可能形成长期传统。
  growth_range: [4, 7]
  attribute_weights:
    force: 10
    intellect: 42
    defense: 15
    agility: 16

- key: hist_suitang_0257_shanwuwei
  name: 善无畏
  default_gender: male
  archetype: civil
  flavor: （637年-735年）唐代来华高僧（Śubhakarasiṃha），密教译师之一，与金刚智并列为唐代密教的重要奠基者。善无畏参与翻译密教经典、传授法门，使密教在唐代获得更清晰的文本与仪轨体系。关于其传记与神异事迹，史料中常带宗教化叙述，应避免把传奇等同于史实；但其作为译师与传播者的历史角色相对明确。善无畏说明译经事业如何改变宗教面貌：当新经典被翻译、仪轨被整理，宗教实践就能跨地域复制，形成更稳定的传统。通过善无畏，也能看到唐代的开放如何具体落在"翻译"这一实践上：它把外来知识变成可在本土运行的制度。
  growth_range: [4, 7]
  attribute_weights:
    force: 10
    intellect: 42
    defense: 16
    agility: 16

- key: hist_suitang_0258_yaohe
  name: 姚合
  default_gender: male
  archetype: civil
  flavor: （775年-855年）唐代诗人，以"苦吟"著称，刻意打磨句法，题材常取日常琐事与官场细节。姚合写诗不像盛唐那样追求壮阔，而更关注生活的纹理：一场小雨、一次值宿、一个县城的冷清，都能成为他反复推敲的对象。其诗的价值在于把"微小"写得有重量，让中唐以后诗风由宏大叙事转向个人经验的趋势更清晰。姚合也做过地方官，知道基层运作的辛苦，因此作品里既有清苦审美，也有对世事的无声体谅。读姚合，会发现诗并不总要冲向高处，它也可以在低处照亮人的困顿。
  growth_range: [4, 7]
  attribute_weights:
    force: 11
    intellect: 39
    defense: 17
    agility: 16

- key: hist_suitang_0259_kongyingda
  name: 孔颖达
  default_gender: male
  archetype: civil
  flavor: （574年-648年）唐初经学大师，主持编纂《五经正义》等国家学术工程。孔颖达的工作把经学解释制度化，使经典不再只是学派争论的场域，而成为国家教育与官僚训练的标准文本。其学术活动与政治密切相连：唐初需要用经学整合思想、稳定礼制与官学体系，因而对孔颖达等人的依赖极大。需要注意的是，"正义"文本并非唯一真理，而是某种官方折中与规范，其形成过程包含取舍与权威化。孔颖达把学术变成国家能力的一部分：通过统一解释，国家得以在教育与选官上建立共同语境。理解他，也能看到唐代文治为何能迅速成形。
  growth_range: [4, 7]
  attribute_weights:
    force: 10
    intellect: 46
    defense: 16
    agility: 16

- key: hist_suitang_0260_cuihu
  name: 崔护
  default_gender: male
  archetype: civil
  flavor: （生卒年不详）唐代诗人，名作《题都城南庄》以"人面不知何处去，桃花依旧笑春风"传诵至今。后世围绕此诗衍生出"人面桃花"的爱情传说，但传说与史实未必可完全对应，更可靠的是诗本身所呈现的时间残酷：景物如旧，人事全非。崔护生平资料较少，他的仕途与具体经历不甚明朗，这反而使他更像一个以作品进入历史的人。崔护的诗不靠铺陈，而凭一句转折就击中人心，显示唐诗成熟后对情绪控制的高度自觉。也正因这种克制，才让后世有足够空间不断把自己的遗憾投射进去。
  growth_range: [4, 7]
  attribute_weights:
    force: 11
    intellect: 38
    defense: 16
    agility: 16

- key: hist_suitang_0261_zhangyanyuan
  name: 张彦远
  default_gender: male
  archetype: civil
  flavor: （生卒年不详）唐代艺术史学者，著《历代名画记》，是中国绘画史与鉴赏理论的重要文献。张彦远以编年与品评方式整理前代画家、作品与风格，既保存大量失传资料，也建立了后世讨论绘画的语言框架。需要注意的是，他所引用的材料难免混杂传闻，但正因为失传太多，《历代名画记》反而成为理解早期画史的关键入口。张彦远把"画"提升为可写、可论、可传的知识体系：不仅记录名家，还讨论笔法、设色、气韵与收藏鉴定。通过他可以看到晚唐文化对整理与总结的强烈需求，这种需求也为宋代更成熟的艺术理论奠定基础。
  growth_range: [4, 7]
  attribute_weights:
    force: 10
    intellect: 44
    defense: 16
    agility: 16

- key: hist_suitang_0262_zhanghuaiguan
  name: 张怀瓘
  default_gender: male
  archetype: civil
  flavor: （生卒年不详）唐代书法评论家，著有书法品评与理论著述，保存了大量书家信息与风格判断。张怀瓘的写作把书法史从简单谱系推进到"品评体系"：不仅列名，也评其优劣与笔法特征，为后世鉴赏提供范式。需要提醒的是，品评难免带主观偏好，且受当时审美与政治文化影响，但其价值仍在于记录与分类：许多早期书家若无这类文献会更难被后人认识。张怀瓘让书法成为可讨论的公共知识：书法不再只是个人技艺，而是士大夫共同参与的审美秩序。通过他也能看到唐代文化如何把艺术与人格、学养、门第联系起来，形成一整套评价话语。
  growth_range: [4, 7]
  attribute_weights:
    force: 10
    intellect: 43
    defense: 15
    agility: 16

- key: hist_suitang_0263_zhangzao
  name: 张璪
  default_gender: male
  archetype: civil
  flavor: （生卒年不详）唐代画家与画论人物，常与山水墨法与绘画理论相联系。后世常引用"外师造化，中得心源"等观点来说明绘画应兼取自然观察与心性体悟，这些语句与张璪相关的传统影响甚大，但具体文字出处与流传链条也存在讨论。无论细节如何，张璪代表了唐代绘画观念的一次重要转向：从纯粹的技法与宫廷题材，逐步走向对"心源""气韵"的强调，为后来的文人画理论提供了前史。张璪让绘画不只是手艺，也成为可被思辨的学问；当艺术开始谈"心"，它就获得了更长远的生命力。
  growth_range: [4, 7]
  attribute_weights:
    force: 10
    intellect: 43
    defense: 15
    agility: 16

- key: hist_suitang_0264_zhangzhu
  name: 张祜
  default_gender: male
  archetype: civil
  flavor: （生卒年不详）唐代诗人，活跃于中晚唐之际，作品题材广，尤以七绝、宫词闻名。张祜善写都市生活与宫廷见闻，句子明快，画面感强，能把繁华与冷落并置出来，让读者在笑谈中读到隐隐的讽刺。他并不总是严肃的议论者，更多时候像一个敏锐的观察者：写歌伎、写楼台、写宴饮，也写背后的无奈与倾覆。关于其仕途起落，史料不够详尽，但从诗可见其与时代社会的贴近。张祜的重要性在于让唐诗不仅属于山水与边塞，也属于街市与人群，让"生活气"成为文学的一部分。
  growth_range: [4, 7]
  attribute_weights:
    force: 12
    intellect: 38
    defense: 17
    agility: 16

- key: hist_suitang_0265_zhangji
  name: 张继
  default_gender: male
  archetype: civil
  flavor: （生卒年不详）唐代诗人，关于其生平行迹史籍存留不多，但《枫桥夜泊》几乎成为唐诗意境的代名词。诗中以江枫、渔火、钟声构成夜泊的听觉与视觉层次，把羁旅的不安写得极其克制，读来却余味长久。后世对"寒山寺钟声"多有文学化想象，甚至衍生出不少传说，但不必执着细节是否尽可考，关键在于张继把一个普通旅夜写成可共享的情绪场景。也正因为传记空白，张继更像盛唐文化的一个"瞬间切片"：一个不一定显赫的诗人，凭一首诗就让一座城、一条河、一声钟进入集体记忆。
  growth_range: [4, 7]
  attribute_weights:
    force: 11
    intellect: 39
    defense: 16
    agility: 16

- key: hist_suitang_0266_huiguo
  name: 惠果
  default_gender: male
  archetype: civil
  flavor: （746年-805年）唐代密教高僧，东亚佛教交流史上的关键节点人物。惠果在长安传授密教法门，其传法谱系与日本僧人空海等相关，成为密教东传的重要环节之一。关于具体传授细节，后世叙述常有宗派化整理，应避免把仪轨故事当作全部史实；但总体而言，惠果确实体现唐代首都作为国际宗教交流中心的地位：来自南亚与中亚的译师传统在此汇聚，并向东亚各地扩散。惠果的意义不只在宗教史，也在文化史：密教与国家礼仪、宫廷需求、知识传播相连，说明唐代的国际化并非抽象概念，而是发生在寺院与课堂里的真实互动。
  growth_range: [4, 7]
