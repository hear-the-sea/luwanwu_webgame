  flavor: （742年-784年）唐代将领，后在德宗朝发动叛乱并一度据有长安，自立国号。其叛乱并非孤立事件，而是京师兵变、军饷矛盾与藩镇坐大共同作用的结果：当中央威望下降、军队难以控制，手握兵权者就可能把"讨赏"转为"夺权"。朱泚曾以宿将身份参与军政，熟悉朝廷运作，因此更懂得利用名义与仪式来为叛乱包装。最终在诸将围攻下败亡，显示其政权缺乏持续治理能力。朱泚的故事把中唐危机的核心问题写得很直白：谁控制军队，谁就可能控制皇帝。
