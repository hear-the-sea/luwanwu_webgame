  flavor: （896年-971年）五代十国文人，仕宦与文学活动多在蜀地展开，常与早期词学整理联系在一起。其词作多为绮丽婉转之风，反映十国宫廷与士大夫审美的偏好；同时，他也留下对文坛风气的记录与评价，使后世得以窥见五代文艺如何在战乱中延续。欧阳炯并不以宏大政治著称，反而更像区域政权中文人的代表：在相对安定的蜀地，文学成为身份与秩序的一部分。对词史而言，这类人物的重要性在于把词从民间曲子推向可被编纂、可被品评的文体，使"花间"传统逐渐成形。
