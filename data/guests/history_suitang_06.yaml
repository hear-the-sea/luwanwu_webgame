  default_gender: male
  archetype: civil
  flavor: （901年-926年）前蜀末主，承继的是已趋奢靡的宫廷体系与复杂的权臣结构。史书多记其荒纵误国，虽需警惕败亡叙事的夸饰，但前蜀在其时确实内政松弛、军备衰弱，对外缺乏有效应对。后唐大军入蜀时，蜀地防线迅速瓦解，王衍终至亡国被俘。王衍的悲剧不只在个人享乐，更在制度：当一个政权长期依赖地形天险与财富积累而缺少自我约束，统治者即便不昏庸也难以扭转惯性。王衍作为末主，承担了前蜀积弊的集中爆发点，也让后人看到"富庶之地"并不自动产生强国。
  growth_range: [4, 7]
  attribute_weights:
