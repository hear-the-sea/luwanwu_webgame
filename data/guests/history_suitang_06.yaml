- key: hist_suitang_0131_gaoconghui
  name: 高从诲
  default_gender: male
  archetype: civil
  flavor: （891年-948年）荆南君主，承继高季兴的"小国周旋"路线，以守成为主。高从诲面对的外部环境仍然凶险：中原政权更替频繁，邻近的楚、吴、南唐等势力此起彼伏，小国任何一次误判都可能招致灭国。因此他更强调谨慎外交、维持贸易通道与边界稳定，在强邻之间保持低姿态。史书常把荆南描述为"弹丸之地"，但正是这种规模迫使统治者把目标放在民生与安全上，而不是奢谈扩张。高从诲的统治虽难称宏业，却体现乱世里一种可贵的务实：让地方社会尽可能少受战火，保持秩序与生产，才有延续的可能。
