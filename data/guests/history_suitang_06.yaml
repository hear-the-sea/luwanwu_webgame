  flavor: （生卒年不详）五代词人，词作见于早期词集，风格婉约柔靡，多写闺情与离思。魏承班的作品往往通过器物、香气、衣饰等细节组织情绪，使"情"落在可触摸的生活物件上，呈现花间词擅长的感官化写法。其生平资料有限，反而说明这类词人常处于史书视野之外：他们可能并非显赫官员，却在地方政权与城市文化中扮演重要的创作者角色。魏承班的价值是保存一种"词的常态"：不追求大主题，而在小情绪里反复锤炼语言，让后世看到早期词体如何通过细节美学建立自己的魅力。
