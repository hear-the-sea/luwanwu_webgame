- key: hist_suitang_0140_hening
  name: 和凝
  default_gender: male
  archetype: civil
  flavor: （898年-955年）五代词人、官员，历事多朝，其词多见于花间词系统中。和凝的作品以柔婉绮丽见长，善写闺情与宴游，看似远离政治，却恰好反映五代士大夫的一种心理策略：在不稳定的权力结构中，审美与逸乐成为暂时的安全区。作为官员，他也经历过朝廷更迭的现实，这使"词的轻柔"与"人生的惊险"形成强烈反差。和凝也让人看到词体的社会功能：它不仅是私人抒情，也是一套宫廷与士人共同消费的语言，用来维持秩序感与身份感。在时代碎裂时，这种语言反而更容易流行。
  growth_range: [4, 7]
  attribute_weights:
    force: 11
    intellect: 39
    defense: 16
    agility: 17

- key: hist_suitang_0141_maowenxi
