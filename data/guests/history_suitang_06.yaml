- key: hist_suitang_0110_zhuyouzhen
  name: 朱友贞
  default_gender: male
  archetype: civil
  flavor: （888年-923年）后梁末帝（亦称朱瑱），承接的是一个外压强、内耗重的政权。后唐崛起后，梁唐长期对峙，战场胜负直接决定国运，朱友贞既要应付前线失利，也要处理国内军阀与朝臣之间的互不信任。史书常以"败亡者"的视角记其无力回天，但这无力并非纯粹个人能力问题：后梁的财政、兵源与正统声望都处在劣势，一旦核心将领失守，朝廷几乎没有翻盘空间。开封陷落时朱友贞自尽，成为五代王朝更替速度与残酷性的象征之一。
  growth_range: [4, 7]
  attribute_weights:
    force: 15
    intellect: 36
    defense: 19
    agility: 18

- key: hist_suitang_0111_wangyanzhang
  name: 王彦章
  default_gender: male
  archetype: military
  flavor: （? - 923年）后梁名将，以勇猛善战闻名，常被描绘为能冲阵破敌的"硬仗型"统帅。梁唐决战阶段，王彦章多在最吃紧的战线上周旋，试图用有限兵力堵住后唐的进攻势头，体现五代战事以机动与决断见长的特点。其个人武勇在史传中颇具传奇色彩，但他并非只靠血性：作为前线将领，他更重要的能力是组织部队、选择战场与争取时间。最终在政权整体劣势下兵败被俘，显示五代名将再强，也常被大局拖入无法挽回的终点。王彦章留下的是"尽力而败"的悲壮形象。
  growth_range: [4, 7]
  attribute_weights:
    force: 44
    intellect: 17
    defense: 23
    agility: 20

- key: hist_suitang_0112_guochongtao
  name: 郭崇韬
  default_gender: male
  archetype: civil
  flavor: （? - 926年）后唐重臣，李存勖时期的重要谋画者与中枢执行者，参与灭后梁并推进对外扩张。其在军政之间扮演"把计划变成行动"的角色，尤其在对前蜀的征伐与收编上影响甚大。郭崇韬的结局却极具五代特色：功高震主与宫廷疑忌交织，最终在政治风暴中被诛。史书对其评价多强调才略与专断并存，也提示当时中枢缺乏稳定的权力制衡机制：一旦皇帝与近侍、后妃形成新的信任圈，旧功臣就会迅速失去安全边界。郭崇韬的沉浮使人看到，五代的"能臣"往往既是推动者，也是被牺牲者。
  growth_range: [4, 7]
  attribute_weights:
    force: 18
    intellect: 41
    defense: 19
    agility: 16

- key: hist_suitang_0113_liconghou
  name: 李从厚
  default_gender: male
  archetype: civil
  flavor: （? - 934年）后唐皇帝（闵帝），在位时间极短，几乎未能形成自己的政治班底。其即位背景复杂：后唐内部将领、宗室与朝臣之间互相牵制，皇位继承更像一次妥协产物。李从厚试图通过人事调整与军镇安排巩固权力，却触动强将利益，引发迅速反叛，最终被迫出逃并很快遇害。李从厚的短命统治反映五代政权的核心难题：皇位并不自动带来军权，缺少对禁军与边镇的控制，任何改革都可能被视为威胁而招致兵变。他的失败不是一件偶然事故，而是结构性不稳的自然结果。
  growth_range: [4, 7]
  attribute_weights:
    force: 14
    intellect: 35
    defense: 18
    agility: 17

- key: hist_suitang_0114_licongke
  name: 李从珂
  default_gender: male
  archetype: military
  flavor: （? - 937年）后唐末帝，以兵变起家，在权力再分配的混乱中夺得皇位。其在位期间面对内政困敝与外部强敌的双重压力，尤其与沙陀集团内部关系微妙：既要依赖将领，又要防其反噬。石敬瑭起兵并引契丹援助后，后唐迅速陷入劣势，李从珂最终走向自焚殉国的悲剧结局。史书对其性格与决策多有评议，但从制度层面看，他代表的是五代"靠军功上位"的皇帝困境：缺乏长期合法性与财政基础，只能在不断的军事危机中求存。李从珂的终局，标志后唐这个短暂王朝的耗尽。
  growth_range: [4, 7]
  attribute_weights:
    force: 40
    intellect: 19
    defense: 22
    agility: 18

- key: hist_suitang_0115_shichonggui
  name: 石重贵
  default_gender: male
  archetype: civil
  flavor: （914年-974年）后晋皇帝（出帝），在位时与契丹（辽）关系急剧恶化。其前任石敬瑭借外援立国，留下屈辱性的外交结构，石重贵选择转向强硬，试图摆脱依附，却也因此引发辽的大规模军事打击。中原政权在财政、兵力与地理上都处于劣势，最终后晋灭亡，石重贵被俘北去。史书对其"抗辽"褒贬交错：有人肯定其不甘屈从，也有人指出其判断失衡。但无论评价如何，他的经历清晰呈现五代中原王朝的战略困境：幽云等地失控后，北方边界被打开，而外交选择往往被迫在屈辱与风险之间二选一。
  growth_range: [4, 7]
  attribute_weights:
    force: 16
    intellect: 37
    defense: 18
    agility: 17

- key: hist_suitang_0116_liuchengyou
  name: 刘承祐
  default_gender: male
  archetype: civil
  flavor: （934年-951年）后汉皇帝（隐帝），即位时年少，政权实际运转依赖将领与旧臣的平衡。后汉本为短命军阀政权，财政与军队控制都不稳，刘承祐试图摆脱权臣掣肘并清洗功臣，反而激化矛盾，引发郭威等军政集团的反叛，最终被杀。刘承祐的悲剧在于：他意识到"皇权不集中"的危险，却缺乏足以支撑集权的制度与资源，只能用急切的暴力方式解决问题。结果是皇权更早崩断。以他为切口，可以看到五代皇帝常处在权力中心却缺乏权力工具，继位即危机，危机又逼出更危险的举动。
  growth_range: [4, 7]
  attribute_weights:
    force: 13
    intellect: 36
    defense: 17
    agility: 18

- key: hist_suitang_0117_wangpu
  name: 王朴
  default_gender: male
  archetype: civil
  flavor: （? - 959年）后周重要谋臣，周世宗时期参与内政与军事规划，以务实与远见著称。史传常提其提出整饬财政、训练军队、经营北伐的策略，强调先治内而后图外，体现后周由乱转治的改革气象。王朴的特别之处在于把宏大战略落到可执行的步骤上：粮饷如何筹、军制如何整、道路关隘如何利用，都是他关注的细节。其早逝使很多设想未能由他亲自完成，但后周的军事进取与制度强化仍留下他参与的影子。后世称其"治世之才"，其实是赞他在乱世里仍能以理性规划取代短视掠夺。
  growth_range: [4, 7]
  attribute_weights:
    force: 17
    intellect: 43
    defense: 19
    agility: 16

- key: hist_suitang_0118_fanzhi
  name: 范质
  default_gender: male
  archetype: civil
  flavor: （911年-964年）后周至北宋重臣，经历五代末政权更替并在新秩序中继续任事。范质多以谨慎稳健的中枢官员形象出现：不以奇谋名世，却能在军政转折处保持政务连续，协助处理文书、财政与人事等系统性事务。五代末到宋初的关键主题是"军人政权如何转为官僚国家"，范质的价值就在于他代表了这种过渡中的文臣力量：既懂旧体系的运作，又能适应新朝的制度化要求。史书对其评价相对平实，反而说明他更像一个把国家机器维持住的人。在风暴年代，这种角色常被忽略，却决定政权能否活过下一次冲击。
  growth_range: [4, 7]
  attribute_weights:
    force: 14
    intellect: 40
    defense: 20
    agility: 17

- key: hist_suitang_0119_wangpu_chancellr
  name: 王溥
  default_gender: male
  archetype: civil
  flavor: （922年-982年）五代末至宋初大臣，亦以编纂典章著述闻名。其仕途横跨后周与北宋，在中枢参与机务，同时承担整理制度与记录政务的工作，后世所见"五代史料、会要类材料"常与其编纂活动相关。王溥的意义不在战功，而在"把混乱整理成可理解的文本"：五代政权更迭频繁，制度断裂严重，若没有人持续记录与汇编，很多细节将彻底散失。对新王朝而言，整理前朝经验也是治理的一部分。王溥正体现宋初以文治重建秩序的倾向：用文书、档案与制度知识把天下重新纳入可管理的框架。
  growth_range: [4, 7]
  attribute_weights:
    force: 13
    intellect: 42
    defense: 18
    agility: 16

- key: hist_suitang_0120_fuyanqing
  name: 符彦卿
  default_gender: male
  archetype: military
  flavor: （898年-975年）五代名将，历事后唐、后晋、后汉、后周乃至宋初，属于在长期动荡中仍能保持势力与声望的军人。其作战经历与镇守任务跨度大，显示当时将领必须在不同政权之间迅速调整立场与关系，以求保全部曲与家族。符彦卿的"长寿"本身就是一种能力：既能打仗，也懂政治边界，不轻易押注必输的一边。其家族在宋初仍有影响，使他常被当作五代军功家族向新王朝过渡的案例。读符彦卿，会看到五代名将不只是战场英雄，也是权力网络中的经营者。
  growth_range: [4, 7]
  attribute_weights:
    force: 43
    intellect: 20
    defense: 24
    agility: 19

- key: hist_suitang_0121_lichongjin
  name: 李重进
  default_gender: male
  archetype: military
  flavor: （? - 962年）五代末至宋初将领，身处从后周到北宋的权力重组关键期。宋初整合禁军与地方兵权时，旧将领的去留极为敏感，李重进最终走向反叛并败亡，成为"军权收归中央"过程中最典型的悲剧之一。对李重进的评价常夹杂立场：以新朝视角，他是叛臣；以个人视角，他则是被时代推入角落的武人。其事件的重要性在于揭示制度转型的代价：当国家从军阀格局走向高度集权，必须切断私人武力的延续，而被切断者往往以绝望抵抗回应。李重进的结局让"统一"这个词带上血的重量。
  growth_range: [4, 7]
  attribute_weights:
    force: 41
    intellect: 18
    defense: 22
    agility: 19

- key: hist_suitang_0122_hantong
  name: 韩通
  default_gender: male
  archetype: military
  flavor: （? - 960年）五代末将领，后周旧臣之一，处在陈桥兵变与北宋建立的转折点上。新旧政权交替时，军中猜疑最易爆发，韩通因与赵匡胤集团的紧张关系而遭遇迅速清算，其死亡常被写作"改朝换代的第一滴血"。韩通的故事不在于他做了多少决定性战役，而在于他体现权力交接的残酷逻辑：在缺少稳定继承机制的年代，新政权往往通过消灭潜在反对者来建立安全感。韩通的遭遇也提醒，五代末的统一并非和平交接，而是一次对军人政治惯性的强力终止；这种终止的方式，塑造了宋初对军权的高度警惕。
  growth_range: [4, 7]
  attribute_weights:
    force: 40
    intellect: 17
    defense: 23
    agility: 18

- key: hist_suitang_0123_zhoudewei
  name: 周德威
  default_gender: male
  archetype: military
  flavor: （? - 913年）沙陀集团将领，效力于李克用、李存勖父子，在后唐建国前的长期征战中立下战功。唐末至五代初的战争并非单一决战，而是连年拉锯、据点争夺与联盟变换，周德威作为一线统帅，承担的是稳定军心与执行战术的重任。史书称其勇而有谋，说明他并非只靠冲锋，也懂得在复杂地形与补给条件下安排攻守。周德威的重要性在于，他代表"建国之前的战争机器"：没有这些长期经营的将领与部曲，后唐不可能在强敌环伺中坐大。他的战功也折射沙陀军队在机动与纪律上的优势。
  growth_range: [4, 7]
  attribute_weights:
    force: 42
    intellect: 19
    defense: 23
    agility: 20

- key: hist_suitang_0124_licunxiao
  name: 李存孝
  default_gender: male
  archetype: military
  flavor: （? - 894年）唐末沙陀名将，武勇形象极为突出，既见于史传，也在后世演义中被进一步神化。较可信的史料显示，他为李克用麾下重要战将，战功卓著，却也因功高与猜忌、内部矛盾而最终获罪身死。李存孝之所以常被提起，并不只是"能打"，更因为他的命运特别符合乱世叙事：个人战力强到被时代需要，又强到让同伴害怕。后来的戏曲与小说把他塑造成近乎神话的猛将，读者若求史实应保持距离；但即便抛开演义，他仍是理解唐末军阀集团内部张力的关键人物。
  growth_range: [4, 7]
  attribute_weights:
    force: 46
    intellect: 15
    defense: 21
    agility: 22

- key: hist_suitang_0125_zhangquanyi
  name: 张全义
  default_gender: male
  archetype: civil
  flavor: （852年-926年）唐末五代军政人物，长期控制洛阳地区并多次在不同政权间调整归属。洛阳既是政治象征也是经济要地，守住它意味着握住粮道、人口与名义上的"天下中心"，张全义的地方经营因此具有代表性。史书多记其善于保境、修复城郭、安抚民众，在战乱中尽量维持生产与秩序，但这类"保境之功"往往伴随与强权的交易与妥协。张全义呈现五代地方势力的现实逻辑：不一定有称帝野心，却必须在强邻之间求生；所谓治绩，常建立在不断选择站队与控制暴力的能力之上。
  growth_range: [4, 7]
  attribute_weights:
    force: 16
    intellect: 38
    defense: 20
    agility: 17

- key: hist_suitang_0126_yangxingmi
  name: 杨行密
  default_gender: male
  archetype: military
  flavor: （852年-905年）唐末将领，江淮地区实力集团领袖，后被视为十国"吴"政权的奠基者。其崛起依托淮南的兵源与水陆交通优势，通过整合地方军镇、控制粮运与盐利，逐步形成独立于中央的稳定统治。杨行密并非一味扩张，他更擅长把地盘治理成可持续的基地：修城防、抚流民、用人兼收并蓄，使江淮在乱世中维持相对秩序。其势力为后续徐温、徐知诰（徐知诰后建南唐）接续奠定框架。理解杨行密，能看到十国割据并非纯粹分裂，也包含地方治理能力在中央崩坏后的一种替代性重建。
  growth_range: [4, 7]
  attribute_weights:
    force: 41
    intellect: 21
    defense: 24
    agility: 19

- key: hist_suitang_0127_yangwo
  name: 杨渥
  default_gender: male
  archetype: civil
  flavor: （? - 908年）吴国早期君主，继承杨行密的基业，却在内部权力斗争中迅速失势。史载杨渥即位后对将领与旧臣的控制不足，生活作风与赏罚失当的记述亦见于史书，使其更容易被部将与权臣所利用或抛弃。其最终被杀，显示十国政权的继承并不稳固：政权虽然有"王"的名号，但军队与权臣仍握有决定性力量。杨渥的短命并非单纯个人问题，更反映创业集团向世袭统治转换的困难——没有成熟官僚体系与明确继承规则，继位者往往成为各方争夺的棋子。他的遭遇为后来的徐温专权埋下伏笔。
  growth_range: [4, 7]
  attribute_weights:
    force: 15
    intellect: 34
    defense: 18
    agility: 16

- key: hist_suitang_0128_yangpu
  name: 杨溥
  default_gender: male
  archetype: civil
  flavor: （900年-938年）吴国后期君主，在位时实权多被徐温及其继承者掌控。杨溥名义上为国主，实际更多扮演政治合法性的载体：朝廷仪式需要他，册命与制度需要他，但重大军政决策由权臣主导。最终杨溥禅让给徐知诰（后改名李昪），吴亡而南唐兴，其个人命运因此成为"十国政权如何被权臣接管"的典型。杨溥的意义不在政绩，而在结构：他展示当军政资源集中在少数家族与禁军手中时，君主可以被空心化到几乎只剩名义。透过他，可以理解五代十国的政权形态常介于军阀与王朝之间。
  growth_range: [4, 7]
  attribute_weights:
    force: 12
    intellect: 36
    defense: 17
    agility: 16

- key: hist_suitang_0129_xuwen
  name: 徐温
  default_gender: male
  archetype: civil
  flavor: （862年-927年）吴国权臣，出身军伍，逐步掌握江淮核心军政大权。徐温善于控制关键军队与人事任命，在名义君主之上构建自己的权力网络，并通过收养、联姻与官职安排确保集团延续。其政治手腕的重要成果，是为后继者徐知诰接掌并最终建立南唐铺路：吴的制度与地盘被权臣平稳"接管"，而非被外敌直接摧毁。徐温的形象提醒人们，十国并非总靠战场决定归属，更多时候是内部权力重排的结果。理解徐温，能看到乱世里的"治理者"可能不是皇帝，而是掌握军权、财政与官僚任命的人。
