  flavor: （920年-958年）南汉君主（刘晟），在位时期南汉政治逐渐固化，宫廷与近侍势力增强，史书对其奢纵与刑政的批评也更多。需要谨慎的是，中原史官往往以"割据小朝"视角书写南汉，叙述中夹杂道德评判；但无论评价如何，刘晟时代确实面临外部压力与内部统治成本上升：北方政权逐步强大，南方诸国竞争激烈，财政要支撑军费与宫廷开支。刘晟的统治呈现十国后期常见问题：当创业精神消退，制度若不能自我约束，权力会转向对内压榨而非对外建设，最终削弱抵抗统一力量的能力。
