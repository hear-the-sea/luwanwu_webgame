- key: hist_suitang_0130_gaojixing
  name: 高季兴
  default_gender: male
  archetype: civil
  flavor: （858年-929年）荆南（南平）开国者，地盘不大却处于江汉交通要冲，夹在强国之间求生。高季兴的政治本领在于"识时务"：一方面利用地理位置获取贸易与税收，另一方面在后梁、后唐、后晋等势力之间保持灵活外交，避免被吞并。史书常以其小国自保的策略为例，说明五代十国并非只有大规模兼并，也有以城邑为核心的微型政权。高季兴在地方治理上重视城防与粮储，使荆南成为乱世中的相对安定地带之一。他的生涯展示小政权的生存学：不求统一天下，只求在巨浪间不被掀翻。
