  default_gender: male
  archetype: military
  flavor: （874年-934年）后蜀奠基者，原为后唐将领，镇守西川后逐渐坐大并最终称帝。孟知祥的路径典型地体现五代地方节度使的制度性机会：中央需要地方强人维持边区与财赋，于是赋予节度使高度自治；而一旦中央内乱，节度使便可凭军政资源转化为独立王权。孟知祥在蜀地经营重视军粮与地方官僚控制，使成都成为稳固基地，其称帝并非一时冲动，而是长期积累后的结果。后蜀虽然短暂，却延续了蜀地的政治与文化中心地位。理解孟知祥，有助于把"割据"视为制度后果，而非单纯道德失范。
