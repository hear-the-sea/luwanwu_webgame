  flavor: （生卒年不详）五代词人，作品多写情思与风物，常被归入花间词传统。顾敻的词善用轻柔语汇与浓密意象，把相思、离愁与春景写得绵密而回环，体现十国时期文艺审美对"细腻与华丽"的偏爱。关于其人生经历，后世所知不多，但这并不妨碍我们理解其作品的社会语境：在政治不确定、兵戈时起的年代，词提供一种可以反复唱和的情感格式，使人们暂时从现实压力中抽离。顾敻更像这一传统的稳定供给者：他未必以创新见长，却让一种成熟的表达方式持续流传，成为后人认识早期词风的重要标本。
  growth_range: [4, 7]
  attribute_weights:
