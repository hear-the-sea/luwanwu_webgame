  flavor: （761年-826年）唐代名将，活跃于宪宗时期平叛与边防事务。中唐削藩行动需要一批能在持久战中稳定推进的统帅，李光颜以善用兵、能与诸将协同而见称，参与多次关键战役与围剿，帮助中央逐步收回对地方的控制。其作战并非纯粹靠冒进，更重视军纪、补给与联合作战，使"胜利"不只停留在战场而能转化为地方重建。李光颜的形象体现中唐军政的现实：朝廷要恢复权威，既靠名臣筹划，也靠这类能把兵马真正用到刀刃上的将领。
