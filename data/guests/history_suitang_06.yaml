  flavor: （生卒年不详）五代词人，作品多收入早期词集，风格接近花间一脉。毛文锡的词常取宴乐、闺情与景物入笔，辞采华美，情绪集中在细微的感官体验之中。关于其具体生平与仕途，传世资料较少，因此更适宜从文本看他的时代位置：在十国割据的相对安定区域，词成为宫廷与士人社交的重要载体，毛文锡正是这种文化机制下的创作者之一。他的价值在于保留早期词体的典型写法，让后人得以比较词如何从"歌辞"逐步转为文人可以自觉经营的艺术。即便缺乏完整传记，作品本身仍能说明他属于那个精致而不安的时代。
  growth_range: [4, 7]
  attribute_weights:
