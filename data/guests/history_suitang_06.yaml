  flavor: （942年-980年）南汉末主，最终亡于北宋。其在位期间南汉内部弊政累积，宦官与近臣专权、宫廷奢侈等叙述在史书中屡见，虽应注意史官的价值判断，但政权整体衰弱、军政松弛则较难否认。宋军南下时，南汉在战略与组织上都难以对抗，最终覆亡，刘鋹被俘北去。刘鋹的故事常被当作十国"末世"样本：当统治者更沉迷宫廷生活而忽视军备与民生，政权会在统一力量到来时迅速崩解。更广的指向是：它展示区域政权的两难——既可在乱世中提供地方秩序，也可能在长期割据中形成自我消耗的结构。
