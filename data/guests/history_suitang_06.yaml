  flavor: （729年-785年）唐代将领，德宗朝动荡中一度掌握重兵。其早期在平乱中立功，却因朝廷猜忌、赏罚失当与军镇利益冲突逐步走向对立，最终反叛而败亡。李怀光的经历常被用来解释中唐"功臣变叛将"的逻辑：安史乱后中央依赖将领，却又害怕其坐大；将领需要朝廷信任与资源，却又常被政治疑虑逼到绝境。史书对其评价复杂，但其起落的结构性意味更强——当制度不能提供稳定的军政关系时，忠与叛往往只隔着一次失信与一次误判。
