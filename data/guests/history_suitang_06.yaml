- key: hist_suitang_0135_wangjian
  name: 王建
  default_gender: male
  archetype: military
  flavor: （847年-918年）前蜀开国君主，原为唐末将领，入蜀后逐步控制西川并建立政权。巴蜀地形险固、物产丰饶，是乱世中最适合形成割据王国的区域之一；王建善于利用这一优势，通过招抚、用人和军镇整合，把战乱中的地方势力纳入自己的统治框架。史书对前蜀多有"偏安"叙述，但王建的统治至少在一段时间内为蜀地提供相对稳定，使文化与经济得以延续。王建说明十国并非纯粹分裂，它也包含对地方秩序的重新组织：当中央崩塌，能在一地建立可运转政权的人，往往既是军人也是管理者。
