  flavor: （799年-872年）唐代河西、敦煌一带的地方领袖，归义军的核心人物。晚唐时吐蕃长期控制河西，中央鞭长莫及，张议潮以地方武装为依托起事收复敦煌等地，并主动向唐廷归附，成为"地方自救后再纳入王朝体系"的典型案例。其经营不仅是军事行动，更涉及安抚居民、恢复交通与重建官府秩序，使河西走廊在极端艰难的外部环境下重新与中原发生联系。张议潮让人看到，晚唐边防并非只有衰退叙事，也有地方社会在夹缝中主动重建的能量。
