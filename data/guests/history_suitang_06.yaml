  flavor: （889年-942年）南汉开国君主（原名刘岩，后改龑），在岭南建立割据政权。其立国基础来自海上贸易、珠江流域的经济与地方军政集团的整合，南汉因此呈现与中原不同的政治与文化面貌：更倚重海贸财力，也更面向南海诸国往来。刘龑在位时既要巩固内部官僚与军队，也要处理与邻国楚、闽以及中原诸朝的关系，策略上常以自保与积累为先。史书对南汉评价多有刻薄，但从区域史角度看，它承担了在中原失序时维持岭南秩序的一段历史。刘龑让十国格局的"南方世界"更清晰：岭南并非边角，而是自有贸易、财赋与政治逻辑的一块天地。
