  archetype: civil
  flavor: （901年-968年）五代词人、文献作者，除词作外，其笔记《北梦琐言》保存大量晚唐五代社会与人物逸事。孙光宪的写作兼具两面：一面是词的婉约与风物描摹，呈现十国时期的生活审美；另一面是笔记的记录欲，尽力把乱世中消散的细节留下。对研究者而言，他的价值不仅在艺术成就，也在史料意义：笔记难免杂糅传闻，但它提供了官方史书之外的视角，能补足很多地方社会的纹理。孙光宪常被视作连接"文学与历史记忆"的作者，正因为他同时在写情与写事，让后世在词的柔软之外，也摸到时代的粗砺。
  growth_range: [4, 7]
