      agility: 16
  - key: hist_mingqing_0071
    name: 胡宗宪
    default_gender: male
    archetype: civil
    flavor: （1512年—1565年）嘉靖朝兵部尚书，东南抗倭的名臣。他在倭寇猖獗之际，以非凡的战略眼光提拔了戚继光、俞大猷等一代名将，并编练新军。他更巧妙利用分化离间之计，成功诱捕倭寇首领王直、徐海，基本肃清了困扰东南沿海多年的倭患。胡宗宪虽因政治斗争依附严嵩而备受争议，但在民族大局上建立了不世之功。最终他因受党争牵连被捕入狱，在狱中愤而自杀，其悲剧结局反映了晚明政坛的险恶与残酷。他是一位极具战略眼光与外交手腕的统帅，其抗倭策略及对人才的任用，对明朝中后期的边防格局产生了极其深远的影响。
    growth_range:
