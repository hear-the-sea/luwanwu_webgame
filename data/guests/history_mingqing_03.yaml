      intellect: 18
      defense: 24
      agility: 16
  - key: hist_mingqing_0065
    name: 沐英
    default_gender: male
    archetype: military
    flavor: （1344年—1392年）黔宁王，朱元璋的养子。他在平定云南的过程中展现出非凡的战略眼光。云南平定后，他被委以重任，世代镇守边陲。沐英在云南推行屯田制度，兴修水利，促进了当地的民族融合与经济稳定。当他听闻马皇后及太子朱标去世的消息后，悲伤过度乃至呕血，足见其忠孝之心。沐氏家族此后镇守云南直到明亡，与大明江山共存亡近三百年，其功勋被誉为“明代第一家”。沐英的一生是对忠诚最完美的诠释，他不仅为大明稳固了西南疆域，更在蛮荒之地播撒了中原文明的火种，其德政至今仍被云南百姓感念。
    growth_range:
    - 4
    - 7
    attribute_weights:
      force: 42
      intellect: 18
      defense: 24
      agility: 16
  - key: hist_mingqing_0066
    name: 康茂才
    default_gender: male
    archetype: military
    flavor: （1313年—1370年）明初名将，龙湾之战的关键功臣。他早年曾在元朝任职，归顺朱元璋后表现出极高的智谋。在与陈友谅的大战中，他利用旧识施展反间计，诱导陈友谅深入重围，助朱元璋在龙湾一战定乾坤。康茂才不仅作战勇猛，且以清廉治军著称。他在北伐归途中因病逝世，朱元璋深感痛惜。他是明初少数能从敌阵倒戈后赢得皇帝绝对信赖的典范。康茂才那种在关键时刻弃暗投明的胆略与忠诚，使其成为了明初著名的智将。他的一生是时代变迁中个人命运抉择的典型，通过出众的谋略实现了人生价值的飞跃，功勋卓著。
    growth_range:
    - 4
    - 7
    attribute_weights:
      force: 42
      intellect: 18
      defense: 24
      agility: 16
  - key: hist_mingqing_0067
    name: 赵德胜
    default_gender: male
    archetype: military
    flavor: （1325年—1363年）朱元璋麾下的顶级猛将。他早年随朱元璋渡江，在攻克集庆、常州等战役中始终担任先锋，勇猛过人。最令其名震天下的是在南昌保卫战中，面对陈友谅百万大军的轮番猛攻，赵德胜率军坚守城门，亲自披甲上阵杀敌，直至牺牲于阵中。其坚韧的守志为朱元璋在鄱阳湖进行总攻赢得了极其宝贵的战略时间。赵德胜那敢于硬碰硬的战风格，代表了明军初创时期视死如归的战斗意志。他在绝境中表现出的那种不仅守城且能反击的韧性，是大明帝国诞生前夜最震撼人心的一抹血色辉煌，死后被追封为梁国公。
    growth_range:
    - 4
    - 7
    attribute_weights:
      force: 42
      intellect: 18
      defense: 24
      agility: 16
  - key: hist_mingqing_0068
    name: 华云龙
    default_gender: male
    archetype: military
    flavor: （生年不详—1374年）淮安侯，明初负责北方防务的核心将领。他随朱元璋起兵，曾多次在水战与攻坚战中展现出众才华。明朝建立后，他主要负责镇守元大都（北京）。在任期间，他妥善安置元朝遗民，修复城池，积极恢复社会生产，极大地稳固了明朝在北方的统治。华云龙为人精干，处事周密，深得朱元璋信赖。他在返京途中不幸病逝。他是明初少有的在行政与军事两界均能游刃有余的功臣，其治绩对北方局势的稳定起到了至关重要的作用。他在处理复杂的民族遗留问题上展现出的宽容与严明，为大明政权在北方的扎根打下了坚实基础。
    growth_range:
    - 4
    - 7
    attribute_weights:
      force: 42
      intellect: 18
      defense: 24
      agility: 16
  - key: hist_mingqing_0069
    name: 俞通海
    default_gender: male
    archetype: military
    flavor: （1330年—1367年）明初水师核心将领，巢湖水师的杰出代表。他出身水军世家，归附朱元璋后极大地增强了明军的远程投送与水战能力。在采石矶之战中，他亲率舰只猛冲敌阵，助明军夺取集庆。在著名的鄱阳湖大战中，俞通海指挥旗舰奋勇杀敌，并数次救朱元璋于危难之中。他最终因在战场上多次负伤而去世，年仅三十八岁。他是明朝海军的开创者之一，其精湛的指挥艺术奠定了明军早期在水面作战中的绝对优势。俞通海对水战艺术的钻研与无畏精神，是大明能够跨越长江夺取天下的关键因素，被后世尊称为“开国第一水将”。
    growth_range:
    - 4
    - 7
    attribute_weights:
      force: 42
      intellect: 18
      defense: 24
      agility: 16
  - key: hist_mingqing_0070
    name: 仇成
    default_gender: male
    archetype: military
    flavor: （1324年—1388年）皖国公，明初稳健派名将。他在朱元璋起兵之初便随其南征北战，参与了平定陈友谅、张士诚的关键战役。仇成为人谦逊稳重，在长期征战中多次承担侧翼包抄与防务掩护的重任。明朝建立后，他镇守辽东多年，修筑军事工事，稳固了东北防线。他功高不震主，深得朱元璋信任，病逝后配享太庙。他是大明江山初期稳固不可或缺的基石。仇成在防务建设上的卓越贡献，展现了他作为战略型将领的远见卓识与扎实作风。他的一生体现了那种不张扬却能负重致远的开国功臣品质，其持重深谋的性格在将领中独具力量。
    growth_range:
