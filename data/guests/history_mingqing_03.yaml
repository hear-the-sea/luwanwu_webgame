    - 7
    attribute_weights:
      force: 12
      intellect: 58
      defense: 18
      agility: 12
  - key: hist_mingqing_0072
    name: 谭纶
    default_gender: male
    archetype: civil
    flavor: （1520年—1577年）明代著名的军事家，与戚继光齐名，并称“谭戚”。他在东南抗倭战役中指挥若定，展现了卓越的战术才干。后北调蓟州，与戚继光密切协作，整饬北方防线，修筑长城堡垒，使北疆安宁多年。谭纶不仅文武兼备，且文章练达，是典型的士大夫统兵代表。他治军严明，深受将士爱戴，在军事理论上亦有显著建树。他的一生是明代中叶文人通过专业军事技能报效帝国的缩影。谭纶在军事训练与制度建设上的成就，使其成为了明朝防务体系的重要奠基人，他那种不仅能上马杀敌且能下马筹划全局的干才，代表了士大夫的高能量。
    growth_range:
    - 4
    - 7
    attribute_weights:
      force: 12
      intellect: 58
      defense: 18
      agility: 12
  - key: hist_mingqing_0073
    name: 麻贵
    default_gender: male
    archetype: military
    flavor: （1541年—1616年）明末辽东名将，在万历援朝战争中立下赫赫战功。他出身将门世家，其家族世代守卫大明西北与北方边境。他在平壤之役、蔚山之役中多次指挥大军大败日军精锐，展现了高超的野战指挥艺术。麻贵用兵勇猛且兼具谋略，是万历年间维护大明边境安全的重要军事支柱之一。他在朝廷政治与对外博弈的复杂局势中，始终保持了职业军人的纯粹忠诚，其家族威名震慑漠北与朝鲜半岛。麻贵的战斗精神与指挥艺术，代表了明代后期职业军人在应对国际化战场时的高水准表现，其在异国战场上建立的战略威慑力，确保了大明在东亚的政治格局。
    growth_range:
    - 4
    - 7
    attribute_weights:
      force: 42
      intellect: 18
      defense: 24
      agility: 16
  - key: hist_mingqing_0074
    name: 曹文诏
    default_gender: male
    archetype: military
    flavor: （生年不详—1635年）明末第一猛将。在明末乱世中，他每战必亲率精骑冲锋，其战法剽悍异常，令流寇闻风丧胆。他在剿灭各路农民军的战斗中百战成名，立下头功。曹文诏对朝廷绝对忠诚，在真宁被李自成等部重重包围的绝境下，他拒绝投降，率部浴血奋战至力竭，最终从容自刎殉国。他的死令崇祯帝深感痛惜，其勇武与忠烈成为了晚明衰世中最为耀眼的将星之一。曹文诏的一生是纯粹军人的悲歌，他在逐渐崩溃的政治体制下，依然凭借一腔热血拼杀出了属于军人的最后尊严。他那种极其擅长骑兵集团冲击的战术，是中国古代冷兵器战争史上的一次辉煌爆发。
    growth_range:
    - 4
    - 7
    attribute_weights:
      force: 42
      intellect: 18
      defense: 24
      agility: 16
  - key: hist_mingqing_0075
    name: 满桂
    default_gender: male
    archetype: military
    flavor: （生年不详—1330年）蒙古族名将，明末辽东战场的铁血汉子。他在宁远大捷、宁锦大战中作为防守骨干立下显赫战功，深得袁崇焕与孙承宗的器重。满桂为人豪爽质朴，作战奋不顾身，以勇猛著称于关外。在北京保卫战中，面对皇太极亲自率领的八旗主力，满桂率领残兵在德胜门下血战，在箭雨中壮烈牺牲，以身殉国。他以异族之躯为大明社稷献出生命，展现了跨越民族的崇高忠义精神，是辽东防线上的钢铁支柱。满桂那坚毅不屈的性格与壮烈的结局，赢得了京城百姓与后世的极大尊敬，他那种在复杂政局中坚持守土有责的单纯志向，尤为难能可贵。
    growth_range:
    - 4
    - 7
    attribute_weights:
      force: 42
      intellect: 18
      defense: 24
      agility: 16
  - key: hist_mingqing_0076
    name: 卢象升
    default_gender: male
    archetype: military
