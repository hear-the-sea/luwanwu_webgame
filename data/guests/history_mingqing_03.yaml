  - key: hist_mingqing_0060
    name: 傅友德
    default_gender: male
    archetype: military
    flavor: （生年不详—1394年）颖国公，以骁勇著称，曾立下“七战七捷”的辉煌战绩。他先后参与平定四川、征讨甘肃、远征云南，为大明开拓西南疆土数千里，可谓战功卓著。然而，这位为大明江山立下汗马功劳的宿将在晚年因受朱元璋猜忌，在御宴上被逼愤而自刎，其子亦未能幸免。傅友德在战场上冲锋陷阵、勇冠三军，是中国古代职业军人的杰出代表。他那种宁折不弯的性格，既成就了他的不世军功，也最终导向了他的悲剧命运，反映了明初“伴君如伴虎”的残酷政治现实。
    growth_range:
    - 4
    - 7
    attribute_weights:
      force: 42
      intellect: 18
      defense: 24
      agility: 16
  - key: hist_mingqing_0061
    name: 冯胜
    default_gender: male
    archetype: military
    flavor: （生年不详—1395年）宋国公，明朝开国名将。他在平定张士诚、陈友谅的过程中立下累累战功，多次担任征虏大将军北伐漠北，并在金山之战中成功降服北元名将纳哈出，基本肃清了辽东地区的残余势力。冯胜不仅长于统兵，亦在北方边防建设上贡献巨大。然而，随着明初皇权的极度扩张，他由于功高权重且与皇室联姻，最终亦未能逃脱朱元璋的猜忌而被赐死。冯胜的一生是在马背上建立功勋，却在深宫的疑虑中落幕，他的军事才干为大明疆域的稳固起到了至关重要的作用，但他的人生终局则是明初功臣悲剧的缩影。
    growth_range:
