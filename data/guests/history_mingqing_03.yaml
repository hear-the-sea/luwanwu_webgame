    - 7
    attribute_weights:
      force: 42
      intellect: 18
      defense: 24
      agility: 16
  - key: hist_mingqing_0059
    name: 汤和
    default_gender: male
    archetype: military
    flavor: （1326年—1395年）明朝开国名将，也是朱元璋儿时的伙伴。他在平定方国珍及征讨西蜀中立下赫赫战功，但他最受后世称道的是其极高的政治智慧。在朱元璋开始清算功臣、收回兵权的关键时期，汤和敏锐察觉到了帝王的猜忌，主动请求解甲归田。回乡后，他不仅为人低调，还主动负责东南沿海的倭寇防务，修筑了大量卫所。汤和是中国古代名将中难得能够“功成身退、善始善终”的典范，他的家族也因此得以世代荣显。他那种知进退、明损益的处世哲学，在充满杀机的明初政坛中展现了极其深厚的人格魅力与生存智慧。
    growth_range:
