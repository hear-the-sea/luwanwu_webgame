  - key: hist_mingqing_0058
    name: 蓝玉
    default_gender: male
    archetype: military
    flavor: （生年不详—1393年）明朝开国名将，常遇春之妻弟。他骁勇善战，于捕鱼儿海之战中亲率精骑深入漠北，俘虏北元皇帝次子及妃嫔公主百余人，几乎彻底摧毁了北元的指挥体系，立下不世之功。然而蓝玉晚年居功自傲，蓄养庄奴，侵占民田，甚至因关吏开门稍迟便毁关而入。最终引发了牵连一万五千余人的“蓝玉案”。他的一生是功臣权欲膨胀导致政治悲剧的典型范本。其勇力虽然冠绝一时，但由于缺乏政治远见与自律，在大明王朝权力的重构中成为了牺牲品。其命运的惨烈收场，为明初政治斗争划上了一个血腥且沉重的注脚。
    growth_range:
