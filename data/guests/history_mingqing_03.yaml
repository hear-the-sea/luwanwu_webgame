      agility: 16
  - key: hist_mingqing_0062
    name: 胡大海
    default_gender: male
    archetype: military
    flavor: （生年不详—1362年）明初名将，越国公。在朱元璋起兵之初便前来投效，作战极其勇猛且具有进攻性。胡大海虽然出身草莽且不识字，却非常敬重文人，曾先后向朱元璋推荐了宋濂、刘基等杰出人才，为大明政权的文化建设立下大功。他治军极严，严禁士卒扰民，深受所经之地百姓的爱戴。他在镇守金华时，因部下叛变意外遇害，令朱元璋深为痛惜。胡大海的一生充满了草莽英雄的热血与对知识分子的尊重，他在乱世中展现出的那种朴素的爱民情怀与求贤若渴的态度，使其成为了明朝开国将领中德才兼备、备受推崇的一位。
    growth_range:
    - 4
    - 7
    attribute_weights:
      force: 42
      intellect: 18
      defense: 24
      agility: 16
  - key: hist_mingqing_0063
    name: 廖永忠
    default_gender: male
    archetype: military
    flavor: （1323年—1375年）德庆侯，明初水师的重要统帅。他早年归附朱元璋，是经营海疆与内河水系的功勋人物。在著名的鄱阳湖大战中，他亲率战船突击陈友谅舰队，立下头功。明朝建立后，他参与了征讨两广、四川等地的战役，特别是在平定蜀地的战斗中，他率领水师顺江而下，势如破竹，被朱元璋称赞为“功勋第一”。他的一生见证了明初海军的快速崛起，是明朝早期海权的开拓者之一。尽管他晚年因“僭用龙凤纹饰”等罪名被赐死，但他对大明海权奠基的贡献在军事史上具有重要地位。
    growth_range:
    - 4
    - 7
    attribute_weights:
      force: 42
      intellect: 18
      defense: 24
      agility: 16
  - key: hist_mingqing_0064
    name: 李文忠
    default_gender: male
    archetype: military
    flavor: （1339年—1384年）岐阳王，朱元璋的外甥，明初著名的文武全才将领。他自幼随军征战，在北伐漠北、收复辽东的过程中表现卓越。李文忠不仅作战时亲率精骑冲锋，陷阵无畏，在镇守边疆时又能礼贤下士，治军严明，其儒雅的风范在明初武将集团中独树一帜。他生性耿直，曾多次就朱元璋的严苛统治提出谏言，虽一度引发皇帝不满，但终因其身份及赫赫战功得以善终。李文忠死后被追封为岐阳王，配享太庙。他那种将卓越的军事指挥艺术与深厚的文化底蕴完美结合的能力，使其成为了大明初期最受尊崇的守卫者之一。
    growth_range:
