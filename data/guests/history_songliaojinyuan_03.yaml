  - key: hist_songliaojinyuan_0133
    name: 曾布
    default_gender: male
    archetype: civil
    flavor: （1036年-1107年）北宋宰相，曾巩之弟。他参与变法，后与王安石分道扬镳。他晚年主政，试图调和新旧两党，未能成功。其调和之志难成，凸显宋代政治分裂之深。其调和未果折射宋代政局积弊。将曾布置于宋辽金元之际整体政局中审视，许多看似突兀的举措其实具有清晰的结构背景。
