    attribute_weights:
      force: 12
      intellect: 58
      defense: 18
      agility: 12
  - key: hist_songliaojinyuan_0120
    name: 林逋
    default_gender: male
    archetype: civil
    flavor: （967年-1028年）北宋隐逸诗人，"梅妻鹤子"的典故来源。他隐居西湖孤山二十年，以梅为妻，以鹤为子。"疏影横斜水清浅，暗香浮动月黄昏"是咏梅绝唱。其梅鹤情怀成为隐逸文化象征。其逸趣与清寂成为隐士典型。
    growth_range:
    - 4
    - 7
    attribute_weights:
      force: 12
      intellect: 58
      defense: 18
      agility: 12
  - key: hist_songliaojinyuan_0121
    name: 钱惟演
    default_gender: male
    archetype: civil
    flavor: （977年-1034年）北宋文学家，吴越王钱镠之孙。他是西昆体的重要作家，诗文华丽典雅。他仕途显达，却始终保持文人本色。其文采与家世相映，为西昆体重镇。其文风代表西昆体的成熟面貌。钱惟演留下的表达范式被后世反复激活，使其在文学传统中始终保持可见度。
    growth_range:
    - 4
    - 7
    attribute_weights:
      force: 12
      intellect: 58
      defense: 18
      agility: 12
  - key: hist_songliaojinyuan_0122
    name: 王曾
    default_gender: male
    archetype: civil
    flavor: （978年-1038年）北宋名相，连中三元的传奇人物。他科举考试中连中解元、会元、状元，是北宋唯一的"三元及第"。他为官清廉，深受百姓爱戴。其清廉政声与科举传奇并称。其名与科举神话并传后世。把王曾放入长时段视野中观察，可见其影响并非瞬时，而是逐步累积并被重释。
    growth_range:
