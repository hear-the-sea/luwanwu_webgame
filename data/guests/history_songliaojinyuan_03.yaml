    default_gender: male
    archetype: civil
    flavor: （1035年-1109年）北宋大臣，党争中的投机者。他先附新党，后投旧党，又归新党，是党争时代的政治变色龙。其反复无常被视为党争乱象的缩影。其行止为后世谈党争者所讥评。邢恕相关材料在后续研究中被持续援引，主要因为其兼具人物史细节与制度史参照价值。
