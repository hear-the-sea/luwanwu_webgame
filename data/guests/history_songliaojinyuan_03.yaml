    default_gender: male
    archetype: civil
    flavor: （1021年-1080年）北宋宰相，王安石的亲家。他虽与王安石为姻亲，却反对某些新法政策。他为人正直，不因私废公。其持论公正，为党争中的清流代表之一。吴充所处权力结构并不线性清晰，其关键选择通常受多方博弈共同塑造。观察吴充的决策轨迹，可见其在财政、人事与边防三重压力下不断调整治理重心。
