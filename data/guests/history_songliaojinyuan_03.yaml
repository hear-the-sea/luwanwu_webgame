  - key: hist_songliaojinyuan_0137
    name: 陈尧佐
    default_gender: male
    archetype: civil
    flavor: （963年-1044年）北宋名臣，陈省华之子。他兄弟三人皆为进士，号称"陈氏三状元"。他治水有方，政绩卓著。其家学与政绩并重，成为北宋士族典范。关于陈尧佐的争议长期存在，但这种争议本身也构成历史解释的重要资源。陈尧佐的行为逻辑常被放在宋辽金元之际制度环境中解读，由此可见个人选择与结构约束的双向牵引。
