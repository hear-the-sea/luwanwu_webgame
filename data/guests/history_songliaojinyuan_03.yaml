  - key: hist_songliaojinyuan_0129
    name: 吕惠卿
    default_gender: male
    archetype: civil
    flavor: （1032年-1111年）北宋新党重臣，王安石的得力助手。他协助推行新法，后与王安石反目。他才能出众，却因党争而毁誉参半。其才干与争议并存，成为党争时代的代表人物。其政争轨迹为后世反思改革得失。将吕惠卿置于宋辽金元之际整体政局中审视，许多看似突兀的举措其实具有清晰的结构背景。
