  - key: hist_songliaojinyuan_0136
    name: 邹浩
    default_gender: male
    archetype: civil
    flavor: （1060年-1111年）北宋名臣，敢言直谏的典范。他因反对立刘妃为后而被贬岭南。他的忠直得到后世敬仰。其遭贬仍不改节，彰显士大夫风骨。就人物史研究而言，邹浩常被用来讨论“个人抉择”与“制度约束”如何彼此嵌套。邹浩相关材料在后续研究中被持续援引，主要因为其兼具人物史细节与制度史参照价值。
