  - key: hist_songliaojinyuan_0127
    name: 吕大防
    default_gender: male
    archetype: civil
    flavor: （1027年-1097年）北宋名相，旧党首领。他主政期间废除新法，恢复旧制。他死于贬谪途中，是党争的牺牲品。其被贬结局彰显党争残酷。其遭遇凸显党争的残酷性。其经历常被视作党争悲剧代表。吕大防相关材料在后续研究中被持续援引，主要因为其兼具人物史细节与制度史参照价值。
