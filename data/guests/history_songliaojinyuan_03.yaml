  - key: hist_songliaojinyuan_0110
    name: 吕蒙正
    default_gender: male
    archetype: civil
    flavor: （944年-1011年）北宋名相，三次拜相。他从寒门子弟到宰相，是科举制度的典范。他宽厚大度，不记私仇。相传《破窑赋》为他所作，鼓励后人不要因一时困顿而灰心。其身世经历被视为科举励志的典型。其励志之名在民间广为流传。
