  - key: hist_songliaojinyuan_0126
    name: 刘挚
    default_gender: male
    archetype: civil
    flavor: （1030年-1098年）北宋名臣，旧党重臣。他反对新法，多次被贬。他为人刚直，不畏权贵，是旧党中的硬骨头。其刚直性格在党争中尤为突出。其气节为旧党所敬仰。其言行常为后世士人自励。若把刘挚放回同代关系网络中观察，其许多选择会呈现出更清晰的现实动因。
