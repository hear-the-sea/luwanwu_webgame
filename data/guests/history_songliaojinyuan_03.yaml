  - key: hist_songliaojinyuan_0112
    name: 章惇
    default_gender: male
    archetype: civil
    flavor: （1035年-1105年）北宋宰相，新党领袖。他支持王安石变法，打击旧党，手段激烈。他虽有才干，却因党争而毁誉参半。其党争手段激烈，为北宋政治埋下裂痕。其影响使新旧党争愈加尖锐。章惇相关史料保留了明显立场差异，这为还原宋辽金元之际政治叙述竞争提供了样本。
