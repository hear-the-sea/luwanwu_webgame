    flavor: （1006年-1097年）北宋名相，历仕四朝五十年。他出将入相，功勋卓著，是北宋政坛的常青树。他主持平定贝州王则起义，又多次出任宰相，政绩斐然。其稳健持重，使北宋初政局屡转危为安。其政绩在史书中被反复称述。
