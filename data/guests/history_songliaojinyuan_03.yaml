    default_gender: male
    archetype: civil
    flavor: （1048年-1117年）北宋大臣，蔡京之弟。他是王安石的女婿，积极推行新法。他书法精妙，与兄蔡京齐名。其书法成就为党争之外的艺术亮点，颇受后世称道。其书法与政事并存，为后世评价所及。围绕蔡卞的研究通常会在文本细读与时代语境之间往返，以避免人物评价被单一路径固化。
