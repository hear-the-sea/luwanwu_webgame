  - key: hist_songliaojinyuan_0130
    name: 蔡确
    default_gender: male
    archetype: civil
    flavor: （1037年-1093年）北宋宰相，新党首领。他继王安石之后推行新法，因车盖亭诗案被贬。他的遭遇是北宋党争激烈的缩影。其政治起落映照出新旧党争的激烈对立。其政治生涯常被视作党争的典型案例。后世对蔡确评价持续分化，往往源于短期秩序与长期成本在其政策中并未同步兑现。
