      agility: 12
  - key: hist_songliaojinyuan_0113
    name: 曾公亮
    default_gender: male
    archetype: civil
    flavor: （999年-1078年）北宋名相，《武经总要》主编。他主持编修了中国古代最重要的军事百科全书，记载了火药武器的配方。他历仕三朝，政绩卓著。其编纂成果为后世军事研究所重。其书亦见证宋代军器发展。曾公亮所面对的并非单纯兵力对抗，还包括补给、地理与盟友稳定性的复合压力。
    growth_range:
    - 4
    - 7
    attribute_weights:
      force: 12
      intellect: 58
      defense: 18
      agility: 12
  - key: hist_songliaojinyuan_0114
    name: 丁谓
    default_gender: male
    archetype: civil
    flavor: （966年-1037年）北宋权臣，营造宫殿的能臣。他用一条渠道同时解决运输、清淤、填地三个问题，展现了惊人的工程才能。然而他陷害寇准，被列为奸臣。其贪权与陷害亦为史家所痛斥。其行径成为权臣误国的注脚。
    growth_range:
    - 4
    - 7
    attribute_weights:
      force: 12
      intellect: 58
      defense: 18
      agility: 12
  - key: hist_songliaojinyuan_0115
    name: 范纯仁
    default_gender: male
    archetype: civil
    flavor: （1027年-1101年）范仲淹之子，北宋名臣。他继承父志，为官清廉，多次出任宰相。他临终遗言"布衣而葬"，展现了范氏家风。其清俭家风成为范氏后人楷模。其事迹体现范氏清廉传统。把范纯仁放进同代互动网络考察，更能看清其个人策略与公共秩序之间的相互作用。
    growth_range:
    - 4
    - 7
    attribute_weights:
      force: 12
      intellect: 58
      defense: 18
      agility: 12
  - key: hist_songliaojinyuan_0116
    name: 张耒
    default_gender: male
    archetype: civil
    flavor: （1054年-1114年）苏门四学士之一，诗人。他诗风平易近人，关注民生疾苦。他与黄庭坚、秦观、晏几道齐名，是北宋文坛的重要人物。其诗文平易含情，为北宋士人所喜。其关注民生之心尤为可贵。张耒的文本价值不仅在于文学性，也体现在其对宋辽金元之际观念迁移的细密记录。
    growth_range:
    - 4
    - 7
    attribute_weights:
      force: 12
      intellect: 58
      defense: 18
      agility: 12
  - key: hist_songliaojinyuan_0117
    name: 陈师道
    default_gender: male
    archetype: civil
    flavor: （1053年-1102年）北宋诗人，江西诗派代表。他诗风质朴刚健，与黄庭坚并称"黄陈"。他一生贫困，却坚守文人风骨，不为五斗米折腰。其坚守操守，体现寒士不屈之气。其精神成为寒士自励的榜样。陈师道既能支撑作品层面的精读，也能连接更宏观的历史议题，研究价值相当稳定。
    growth_range:
    - 4
    - 7
    attribute_weights:
      force: 12
      intellect: 58
      defense: 18
      agility: 12
  - key: hist_songliaojinyuan_0118
    name: 王禹偁
    default_gender: male
    archetype: civil
    flavor: （954年-1001年）北宋初期诗文大家。他倡导古文运动，是北宋文学革新的先驱。他为官刚直，多次因直言被贬。其倡导之风为北宋古文奠基。其文章风骨为士林所仰。王禹偁的文本价值不仅在于文学性，也体现在其对宋辽金元之际观念迁移的细密记录。
    growth_range:
    - 4
    - 7
    attribute_weights:
      force: 12
      intellect: 58
      defense: 18
      agility: 12
  - key: hist_songliaojinyuan_0119
    name: 宋祁
    default_gender: male
    archetype: civil
    flavor: （998年-1061年）北宋词人、史学家。"红杏枝头春意闹"一句为他赢得"红杏尚书"的雅号。他与欧阳修共同编修《新唐书》。其史学与词名并重，文名远播。其文名与史识相得益彰。从文献流传看，宋祁的作品在多个整理阶段都被反复引用，显示其解释弹性较强。
    growth_range:
    - 4
