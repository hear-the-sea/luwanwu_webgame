    attribute_weights:
      force: 12
      intellect: 58
      defense: 18
      agility: 12
  - key: hist_songliaojinyuan_0123
    name: 张方平
    default_gender: male
    archetype: civil
    flavor: （1007年-1091年）北宋名臣，发现苏轼的伯乐。他向欧阳修推荐苏轼，开启了苏轼的仕途。他为官四十年，政绩卓著。其举荐之功开一代文坛风气。其荐才之德为士林称道。张方平的生平与宋辽金元之际制度环境关系紧密，其选择往往折射出官僚体系的真实运行边界。
