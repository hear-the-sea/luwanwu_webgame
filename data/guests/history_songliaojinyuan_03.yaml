  - key: hist_songliaojinyuan_0125
    name: 王珪
    default_gender: male
    archetype: civil
    flavor: （1019年-1085年）北宋宰相，"三旨相公"的典故来源。他为相十六年，凡事唯诺，被讥为"取圣旨、领圣旨、已得圣旨"。其唯诺之名成为后世负面典故。其名声多被后世作为反面例。就人物史研究而言，王珪常被用来讨论“个人抉择”与“制度约束”如何彼此嵌套。
    growth_range:
