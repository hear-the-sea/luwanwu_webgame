      defense: 18
      agility: 12
  - key: hist_songliaojinyuan_0111
    name: 赵恒
    default_gender: male
    archetype: civil
    flavor: （968年-1022年）宋真宗，澶渊之盟的签订者。他在寇准的力劝下亲征澶州，最终与辽国达成和约。虽然每年需要缴纳岁币，却换来了百年和平。他崇尚道教，封禅泰山，政治上毁誉参半。其政策与礼制多有争议，后世评价分歧。
