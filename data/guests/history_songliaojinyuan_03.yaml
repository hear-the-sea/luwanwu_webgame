  - key: hist_songliaojinyuan_0128
    name: 范祖禹
    default_gender: male
    archetype: civil
    flavor: （1041年-1098年）北宋史学家，《资治通鉴》编修助手。他协助司马光编修《资治通鉴》，又独自完成《唐鉴》。他是北宋最杰出的史学家之一。其史识精审，为宋代史学奠定坚实基础。从接受史角度看，范祖禹的影响并非线性扩散，而是经由多轮筛选与重构后持续显现。
