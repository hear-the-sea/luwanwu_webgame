    name: 陈瓘
    default_gender: male
    archetype: civil
    flavor: （1057年-1124年）北宋名臣，著名的谏官。他不畏权贵，多次弹劾蔡京等奸臣。他刚正不阿，是北宋清流的代表。其直言敢谏，成为言官精神的象征。陈瓘的生平与宋辽金元之际制度环境关系紧密，其选择往往折射出官僚体系的真实运行边界。对陈瓘的再评价反复出现，也说明其经历在不同研究框架下都具有稳定的问题意识。
