  - key: hist_songliaojinyuan_0124
    name: 吕公着
    default_gender: male
    archetype: civil
    flavor: （1018年-1089年）北宋名相，旧党领袖。他反对王安石变法，主张渐进改革。他为人宽厚，深得朝野敬重。其温厚作风使旧党得以凝聚。其宽厚人格赢得广泛声望。其政声亦为后世史家反复讨论。吕公著的统治风格并非单点特征，而是由时代压力与个人偏好共同塑形。
