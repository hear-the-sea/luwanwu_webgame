  flavor: （? - 706年）唐代大臣，神龙政变参与者之一，政变后曾任要职。崔玄暐的经历同样体现复唐初期的政治高风险：外廷大臣合力完成一次"纠偏"，却难以掌控后续权力走向，宗室、外戚与新贵迅速重组联盟，功臣群体随即被边缘化。崔玄暐的政治结局在史书中常与"功臣受害"叙事并列，说明当时政治评价体系也在重新洗牌。他提供一个观察角度：在唐代早期，政变并非异常事件，而是权力结构不稳时的常用手段；而政变一旦成功，参与者并不会自动获得制度保障，反而可能因知情太多、功劳太大而更危险。
