- key: hist_suitang_0203_liguinian
  name: 李龟年
  default_gender: male
  archetype: civil
  flavor: （生卒年不详）唐代乐人，因杜甫诗句而成为盛唐音乐记忆中的象征人物。史料与文学记忆交织，使李龟年的形象带有"从繁华到流离"的强烈戏剧性：早年可能活跃于宫廷宴乐，乱世之后则被描述为流落民间。具体细节未必都可考，但他之所以被反复提起，正说明音乐在唐代并非边缘娱乐，而是政治与社交生活的核心仪式之一。李龟年让人更真切地感到文化断裂：一个乐人的命运被写进诗里，成为盛世不再的证据。借他也可以理解"音乐如何被历史记忆化"。
  growth_range: [4, 7]
  attribute_weights:
    force: 9
    intellect: 40
    defense: 14
    agility: 17

- key: hist_suitang_0204_xueji
  name: 薛稷
  default_gender: male
  archetype: civil
  flavor: （649年-713年）唐代书法家、官员，初唐书风演进的重要人物之一。薛稷善行楷，兼擅画鹤，风格端整而秀润，承继二王与欧虞等传统又自具骨力。其仕途经历跨武周至中宗、睿宗时期，政治环境多变，士大夫的书法往往既是艺术也是身份象征：写得好，意味着学养、门第与官场审美都被认可。薛稷的价值在于提供一种"文官书风"的范式：不以夸张奇险取胜，而以法度与雅致建立可信度。后世谈唐代书法谱系，薛稷常作为从初唐走向盛唐的关键环节被提到。
  growth_range: [4, 7]
  attribute_weights:
    force: 10
    intellect: 43
    defense: 16
    agility: 16

- key: hist_suitang_0205_lujianzhi
  name: 陆柬之
  default_gender: male
  archetype: civil
  flavor: （585年-638年）唐代书法家，初唐书坛承前启后的人物。陆柬之书风多取法二王，点画温润，结体端雅，强调法度中的灵动，适合用来观察初唐书法如何在"规范化"与"个人风格"之间取得平衡。关于其生平官职，史籍记述不算繁，但其在书史中的位置较稳：被视为能把晋人风韵转化为唐人秩序感的书家。陆柬之也说明，书法并非只靠天才爆发，更靠一代代人在笔法与结构上反复校准。初唐需要这种校准者，才能为后来的盛唐大家提供共同语言。
  growth_range: [4, 7]
  attribute_weights:
    force: 9
    intellect: 42
    defense: 15
    agility: 16

- key: hist_suitang_0206_liyong
  name: 李邕
  default_gender: male
  archetype: civil
  flavor: （678年-747年）唐代书法家、文士，行书名重一时，尤以碑刻书名传后。李邕笔势雄健，善以圆转带出力量，被后世视作盛唐"气象"在书法中的体现之一。其仕途亦颇有波折，最终因政治牵连而死，说明盛唐并非永远安全：文名越盛，越可能卷入权力斗争。李邕的价值在于把书法与公共空间连接起来：碑刻不仅是艺术，也是地方记忆与政治宣示的载体。通过李邕，可以理解盛唐书法如何从私人书写走向公共展示，成为一个时代的视觉权威。
  growth_range: [4, 7]
  attribute_weights:
