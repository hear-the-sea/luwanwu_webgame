- key: hist_suitang_0185_cuiyin
  name: 崔胤
  default_gender: male
  archetype: civil
  flavor: （? - 904年）唐代宰相，唐末大变局的关键人物之一。崔胤试图削弱宦官势力并重建外廷权威，因而与军阀朱温结盟，借外部武力清除宫廷集团；但这种"借兵除患"最终反而加速皇权崩解，使朱温更容易把持朝廷并走向篡唐。崔胤的形象极具悲剧性：他看到了宦官专权的问题，却选择了会让问题更糟的解决方案。史书对其褒贬激烈，正因为他的选择触及"政治手段的伦理边界"。理解崔胤，不应只把他当成好人或坏人，而应看到唐末政治的无解：当内部机制无法自我修复时，任何外力介入都可能把国家推向不可逆的终局。
