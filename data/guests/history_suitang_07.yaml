  flavor: （? - 721年）唐代宰相，参与中宗、睿宗到玄宗初年的政务运行。魏知古并非以激烈党争著称，史书更多记其在政务与谏议中的表现，体现盛唐前期官僚体系逐步稳定的过程：从频繁政变走向较为常态化的行政运作。魏知古本身就是一个"过渡期文官"样本：他既经历武周后遗绪，也进入开元前的整顿阶段，见证政治从宫廷内耗转向制度化治理的努力。其个人评价或许不如姚崇、宋璟鲜明，但这种中枢稳定型官员正是盛世能成形的必要条件。理解魏知古，可以看到盛唐并非突然降临，而是许多看似平淡的行政工作累积出来的结果。
