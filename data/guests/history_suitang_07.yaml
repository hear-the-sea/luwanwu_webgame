  flavor: （? - 706年）唐代大臣，神龙政变的重要参与者之一，与张柬之等人合力推翻武周末期的权力集团。政变成功后，功臣们很快又被新的宫廷势力排挤甚至清算，桓彦范亦未能善终，这一结局常被视为"政变功臣难保"的典型。桓彦范的意义不在于他掌握多少兵权，而在于他所处的政治结构：政变解决的是某一刻的权力配置，却无法自动建立稳定制度，功臣反而容易成为下一轮权力再分配的牺牲品。通过桓彦范，可以理解初唐到盛唐前宫廷政治的残酷：参与者往往必须以生命为筹码，而胜利也未必带来安全。
