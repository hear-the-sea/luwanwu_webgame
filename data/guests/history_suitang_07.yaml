  flavor: （生卒年不详）唐代画家，以宫廷人物与仕女题材著称，常被视为盛唐人物画传统的代表。后世所见《虢国夫人游春图》等名迹多带"传为"或"相传"性质，真实作者与成画时代存在讨论，但张萱之名已成为一种审美符号：描绘贵族生活的闲适、明丽与秩序。张萱的价值不止是画技，更在于"把生活画成范本"：他所代表的图像传统塑造了后世对盛唐气象的视觉想象。理解张萱，需要把作品当作文化记忆而非纯粹档案——它讲述的不一定是具体事件，却真实地反映了一个时代如何想象自己。
