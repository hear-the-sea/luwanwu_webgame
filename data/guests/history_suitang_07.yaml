# 隋唐五代历史人物（唐代军政人物补充剩余部分、唐代文化与学术补充）

green:
- key: hist_suitang_0164_wangshuwen
  name: 王叔文
  default_gender: male
  archetype: civil
  flavor: （753年-806年）唐代政治人物，永贞革新的核心之一。顺宗即位后短暂时期内，王叔文等人试图削弱宦官与藩镇影响、整顿财政与官吏体系，代表中唐改革派的一次集中行动。然而改革触动既得利益，且时间窗口极短，顺宗身体状况与宫廷权力格局决定了变法难以持续，王叔文很快被贬并遭清算。王叔文的价值在于使"改革为何失败"变得具体：不是理念不美，而是支持者不足、敌人强大、制度没有给改革足够缓冲。其人生带有强烈悲剧色彩，也成为后世谈论政治改革时常被引用的历史参照。
  growth_range: [4, 7]
  attribute_weights:
    force: 14
    intellect: 43
    defense: 17
    agility: 16

- key: hist_suitang_0165_wangpei
  name: 王伾
  default_gender: male
  archetype: civil
  flavor: （? - 806年）唐代政治人物，与王叔文并为永贞革新的重要推动者。王伾在改革中的位置往往被描述为"掌机务、推措施"的实干角色：将改革意图落到具体人事与政策上，因此也更早、更直接地遭遇反扑。永贞革新失败后，王伾被迅速贬谪并死于贬所，说明在中唐权力结构中，触碰宦官与旧势力等于触碰政治禁区。王伾的意义不在于留下多少政绩，而在于把改革的风险写在个人命运上：改革者不仅要提出方案，还要承担被系统排斥的后果。其故事提醒，政治变革从来不是单靠口号，而需要可持续的权力支持与社会基础。
  growth_range: [4, 7]
  attribute_weights:
    force: 13
    intellect: 41
    defense: 16
    agility: 15

- key: hist_suitang_0166_lixun
  name: 李训
  default_gender: male
  archetype: civil
  flavor: （? - 835年）唐代官员，甘露之变的关键策划者之一。甘露之变表面是一次宫廷行动，实则是皇帝与外廷试图夺回对神策军及宦官集团控制权的冒险。李训作为外廷骨干，试图以突袭方式清除宦官势力，却因计划泄露与力量不足导致惨败，朝臣大量被杀。李训的结局常被用来说明晚唐政治的危险：在武装力量掌握在宦官手中时，任何"恢复正常秩序"的尝试都可能以血腥收场。李训的意义不在个人智谋高低，而在于事件揭示的结构困局——当国家武力不听命于制度，政治就只能靠赌命。
  growth_range: [4, 7]
  attribute_weights:
    force: 15
    intellect: 40
    defense: 17
    agility: 16

- key: hist_suitang_0167_zhengzhu
  name: 郑注
  default_gender: male
  archetype: civil
  flavor: （? - 835年）唐代官员，与李训同为甘露之变的重要人物。郑注在政治上善于结交与谋划，能在宫廷与外廷之间游走，短期内获得皇帝信任并影响人事，但这种权力来源本身就极不稳固：依赖个人关系而非制度授权。甘露之变失败后，郑注迅速被清算，说明晚唐权力结构的残酷与脆弱——一旦失去皇帝与武装力量的保护，原本的"红人"会立刻变成替罪羊。郑注的故事也提醒，晚唐并非缺乏想做事的人，而是缺乏让做事变得安全的机制；于是政治变成高风险赌博，赌输了就连解释的机会都没有。
  growth_range: [4, 7]
  attribute_weights:
    force: 14
    intellect: 39
    defense: 16
    agility: 17

- key: hist_suitang_0168_lifuguo
  name: 李辅国
  default_gender: male
  archetype: civil
  flavor: （? - 762年）唐代宦官，安史乱后权势极盛，参与皇位继承与中枢决策。李辅国得势的基础在于掌握宫廷近侍与禁军系统，能直接影响皇帝安全与信息流动，因此在肃宗、代宗初年成为不可忽视的"第二权力中心"。史书多批评其专横与跋扈，但他之所以能扩权，也反映皇权在战乱后对宦官的依赖：用宦官制衡外廷与将领，结果却把军政钥匙交到宫内。李辅国最终被清除，说明宦官权力常缺乏稳定边界：皇帝一旦觉得其威胁自身，就会反向清算。其生涯为理解中唐宦官政治提供了最典型的起点样本。
  growth_range: [4, 7]
  attribute_weights:
    force: 16
    intellect: 38
    defense: 19
    agility: 17

- key: hist_suitang_0169_yuchaoen
  name: 鱼朝恩
  default_gender: male
  archetype: civil
  flavor: （? - 770年）唐代宦官，安史乱后参与军政并一度影响禁军体系。鱼朝恩在史书中常与"干预军务、与将领相争"相连，显示宦官并非只在宫中传旨，而是逐步插手军事指挥与奖惩，改变了军队的忠诚结构。其权势来源于近侍身份与对神策军等力量的控制，但这种权力同样不稳：一旦政治风向转变，宦官也可能迅速失势。鱼朝恩的轨迹说明，中唐之后宦官政治的关键不在个人品质，而在武力与信息的掌控方式。朝廷用宦官保皇权，却也因此制造更难解的权力纠葛，鱼朝恩只是这一机制早期的显眼产物。
  growth_range: [4, 7]
  attribute_weights:
    force: 17
    intellect: 37
    defense: 18
    agility: 16

- key: hist_suitang_0170_chengyuanzhen
  name: 程元振
  default_gender: male
  archetype: civil
  flavor: （? - 777年）唐代宦官，活跃于代宗朝，擅长利用宫廷与军政间的信息差扩大影响。程元振在史传中屡与排挤名将、操纵人事的叙述相连，体现宦官在乱后政治中逐渐成为"资源分配者"：谁能见到皇帝、谁能得到军粮与封赏，往往被宦官把持。这样的权力当然引发外廷不满，也激化君臣互信危机。程元振最终被贬黜，说明宦官集团内部与皇帝自身也存在安全边界，一旦影响过大或引起众怨，就可能被牺牲以平息局势。通过程元振，可以理解中唐宦官政治如何从辅助角色变为结构性变量。
  growth_range: [4, 7]
  attribute_weights:
    force: 15
    intellect: 38
    defense: 17
    agility: 16

- key: hist_suitang_0171_hanjian
  name: 韩建
  default_gender: male
  archetype: military
  flavor: （? - 912年）唐末军阀，长期控制关中一带，在唐昭宗流离过程中曾扮演"挟天子以令诸侯"式角色。关中是政治象征之地，谁掌握其兵力与粮道，谁就能影响皇帝去留与朝廷名义，韩建因此在唐末权力碎裂中占据重要位置。史书对其多写权谋与控制，但也可看作乱世地方强人求生的策略：中央已无力提供保护，反而成为可以利用的符号资源。韩建揭示唐末的终局机制：皇帝不再是权力中心，而是军阀竞争的筹码；在这种结构下，忠与叛的界线会被利益计算不断重画。
  growth_range: [4, 7]
  attribute_weights:
    force: 38
    intellect: 20
    defense: 22
    agility: 18

- key: hist_suitang_0172_wangxingyu
  name: 王行瑜
  default_gender: male
  archetype: military
  flavor: （? - 895年）唐末关中军阀之一，活跃于诸镇角力与宫廷政治交织的阶段。王行瑜能在短期内坐大，说明唐末军阀对政治的影响已超过文官体系：军事行动、兵变与威逼成为决定宰相去留甚至皇帝决策的手段。史书多记其骄横暴烈，并与逼迫朝廷、制造恐怖的事件相连，其最终也在群雄围攻与朝廷反制下败亡。王行瑜的故事体现乱世强人的共同命运：依赖武力上位，也容易被更大的武力终结。他作为一段"关中军阀化"的缩影，让人看到唐末中央权威如何在自己家门口被一步步挤空。
  growth_range: [4, 7]
  attribute_weights:
    force: 39
    intellect: 18
    defense: 21
    agility: 17

- key: hist_suitang_0173_zhumei
  name: 朱玫
  default_gender: male
  archetype: military
  flavor: （? - 887年）唐末将领，黄巢之乱后关中局势极乱时起兵干预皇位继承，拥立傀儡皇帝以争取名义合法性。朱玫的行动说明唐末政治已经发展到"立君如换印"的程度：军阀只要有兵，就能用皇帝名号来包装自己的军事与财政要求。其政变很快失败并被杀，原因不仅是个人能力不足，更在于没有稳固的联盟与持续供给。朱玫把名义与实权的分离暴露得很赤裸：皇帝成了可以被借用的符号，而真正决定局势的是军队与粮饷。唐末的每一次短命拥立，都在加速王朝合法性的耗尽，朱玫正是其中一次典型爆裂。
  growth_range: [4, 7]
  attribute_weights:
    force: 37
    intellect: 17
    defense: 20
    agility: 18

- key: hist_suitang_0174_zhengtian
  name: 郑畋
  default_gender: male
  archetype: civil
  flavor: （? - 887年）唐代大臣，晚唐应对黄巢之乱与地方叛乱时的重要人物之一。郑畋既参与朝廷决策，也承担动员与协调责任，主张组织军民抵抗、重建秩序，在混乱中试图维护中央权威。史书对其记载多与军事与人事相连，显示晚唐宰辅并非只在纸上谈兵，而要面对兵源、粮饷、将领忠诚等极现实问题。郑畋很能体现"危机官僚"的角色：在大乱面前，很多政策并非理想方案，而是不得不做的止血选择。即便结局未能挽回唐朝颓势，郑畋等人的努力仍反映晚唐并非无人作为，而是结构崩坏远超个人能力所能补救。
  growth_range: [4, 7]
  attribute_weights:
    force: 16
    intellect: 41
    defense: 19
    agility: 17

- key: hist_suitang_0175_tianshengong
  name: 田神功
  default_gender: male
  archetype: military
  flavor: （? - 784年）唐代将领，安史乱后及德宗时期军政动荡中屡被任用，属于依靠战功在乱世立足的武人。田神功的事迹多散见史传，常与平叛、镇守、护卫京畿等任务相关，显示中唐需要大量"能打且能守"的将领填补战后军队体系的空洞。对这类人物的评价往往两极：既被期待忠勤，又被警惕坐大。田神功的重要性在于呈现中唐军事结构的常态——长期小规模冲突与兵变不断，军队更多时间在维持秩序而非对外扩张。通过他，可以理解中唐所谓"治世"背后仍是高强度的军事化日常。
  growth_range: [4, 7]
  attribute_weights:
    force: 40
    intellect: 19
    defense: 23
    agility: 18

- key: hist_suitang_0176_libaoyu
  name: 李抱玉
  default_gender: male
  archetype: military
  flavor: （703年-784年）唐代名将，安史之乱前后及其后续重建阶段长期在军中任事。史书多称其忠勤谨慎，能在复杂局势下守住防线并维持军纪，属于中唐"稳定型将领"。李抱玉的作战与镇守经验，使其成为朝廷倚重的一员：在藩镇与叛乱交错时，朝廷需要既能打仗又不易反叛的统帅。其意义不在某一场著名战役，而在于其职业生涯本身象征一种稀缺品质——在乱后结构性不信任的时代，仍能保持与中央的合作关系，并把军功转化为秩序而不是新的割据。李抱玉这类人物让帝国多续了几年命。
  growth_range: [4, 7]
  attribute_weights:
    force: 41
    intellect: 20
    defense: 24
    agility: 19

- key: hist_suitang_0177_weigao
  name: 韦皋
  default_gender: male
  archetype: military
  flavor: （746年-805年）唐代重臣，长期镇守西川（蜀地）并经营西南边防。韦皋在地方治理上重视军政合一：既要对吐蕃等外部势力保持压力，也要在蜀地内部整顿吏治、修复财赋与交通，使西南成为朝廷相对可靠的战略后方。其任期长、影响深，说明他善于处理中央与地方的利益平衡，既不完全听命，也不轻易反叛。韦皋的价值在于展示中唐地方大员的另一种可能：不是藩镇割据者，而是把地方经营成"可供帝国使用"的基地。这样的地方治理能力，比一时战功更能决定国家的韧性。
  growth_range: [4, 7]
  attribute_weights:
    force: 42
    intellect: 22
    defense: 24
    agility: 18

- key: hist_suitang_0178_zhangyanshang
  name: 张延赏
  default_gender: male
  archetype: civil
  flavor: （? - 788年）唐代宰相，德宗朝重要大臣之一，参与处理中唐财政、藩镇与人事纷争。张延赏在史书中的评价并不一致：有人指其趋利自保、结交权势，也有人强调其能在乱局中办事。无论褒贬，他都处在德宗朝互信崩坏的政治环境里，宰相既要为皇帝承担责任，又要应对藩镇与将领的强硬姿态，稍有偏差就会引爆兵变或倒台。张延赏让人看到，德宗朝的困难并非只在战场，而在中枢决策常被猜疑包围，政策难以形成连续性。其生涯也影响后续人物张弘靖，使"家族在官场延续"成为观察中唐政治的一条线。
  growth_range: [4, 7]
  attribute_weights:
    force: 14
    intellect: 39
    defense: 18
    agility: 16

- key: hist_suitang_0179_zhanghongjing
  name: 张弘靖
  default_gender: male
  archetype: civil
  flavor: （760年-823年）唐代官员，曾任要职并掌握地方军政，最终因处置失当引发兵变而死。张弘靖的经历常被用来说明一个现实：在藩镇与军队权力极强的地区，文官式管理若缺乏对军心与利益的把握，很容易触发反噬。史书记其在幽州等地试图整顿旧习、约束军队，却未能建立有效控制，导致军中哗变。张弘靖的失败并不意味着"文臣无用"，而是显示中唐地方政治已经高度军事化，治理必须以军队结构为前提。通过张弘靖，能更清楚理解中唐制度的断裂：中央派遣的官员未必能真正代表中央，因为地方武力才是最后裁判。
  growth_range: [4, 7]
  attribute_weights:
    force: 15
    intellect: 38
    defense: 17
    agility: 16

- key: hist_suitang_0180_hanhong
  name: 韩弘
  default_gender: male
  archetype: military
  flavor: （? - 823年）唐代藩镇人物，长期掌握一方军政，亦在宪宗削藩与中枢策略中占据重要位置。韩弘往往被描述为"拥兵而能与朝廷合作"的节度使：在强藩并立的格局里，朝廷需要利用部分藩镇来牵制其他藩镇，于是形成"以藩制藩"的策略。韩弘能在这种策略中获益，说明他擅长把忠诚与利益绑定，通过贡献兵力、接受册封来换取更大的自主空间。韩弘让中唐政治的灰度更明显：不是所有节度使都公开叛乱，但每个节度使都在衡量成本与收益。他也让人看到帝国权威如何在妥协中延续，又如何在妥协中被慢慢掏空。
  growth_range: [4, 7]
  attribute_weights:
    force: 40
    intellect: 19
    defense: 23
    agility: 18

- key: hist_suitang_0181_duhuangshang
  name: 杜黄裳
  default_gender: male
  archetype: civil
  flavor: （? - 808年）唐代宰相，德宗、顺宗时期参与中枢政务。中唐的宰相往往要同时面对藩镇割据、财政吃紧与宦官势力上升等多重问题，杜黄裳的仕途正处在这些矛盾交汇的年代。史书对其记载较多集中在政务运作与人事进退，显示他更像一位处理复杂事务的中枢官僚，而非以惊人改革留名的政治家。杜黄裳说明，中唐政治并非只有少数明星人物，更多时候靠一批熟悉制度、能在风暴中维持运转的官员支撑。对一个处处漏风的国家而言，维持运转本身就是一种艰难功绩。
  growth_range: [4, 7]
  attribute_weights:
    force: 13
    intellect: 40
    defense: 18
    agility: 17

- key: hist_suitang_0182_peiji
  name: 裴垍
  default_gender: male
  archetype: civil
  flavor: （? - 811年）唐代宰相，宪宗时期参与政务，被认为与元和中兴的政策推进有关。裴垍在中枢的作用更多体现在制度化与执行层面：整饬官吏、推动财政与军政措施落地，并在削藩过程中协调朝廷内部意见。史书对其褒贬仍有差异，但总体反映他处在改革与反改革势力的拉扯之间，宰相需要在原则与现实之间不断折中。裴垍的价值是把"改革"从口号变成行政流程：没有这样的官僚执行者，元和削藩难以形成持续压力。透过裴垍，也能看到中唐文臣在强军与强宦官夹击下仍试图争取政策空间的努力。
  growth_range: [4, 7]
  attribute_weights:
    force: 14
    intellect: 41
    defense: 19
    agility: 16

- key: hist_suitang_0183_zhaozongru
  name: 赵宗儒
  default_gender: male
  archetype: civil
  flavor: （? - 880年）唐代宰相，晚唐危局加深时参与朝政。赵宗儒的时代特点是问题堆叠：地方叛乱频仍，财政枯竭，朝廷对军队与地方控制越来越弱，宰相很难通过常规行政手段扭转颓势。史书对其记载多与危机应对与人事安排相关，显示他更多在做"止血"而非"重建"。赵宗儒让人看到晚唐官僚体系的疲态：并非没有人任相，而是宰相能动用的工具越来越少，甚至连信息与军队都无法完整掌握。在这种结构下，宰相的成败常被时代吞没，留下的是一种越来越沉重的无力感。
