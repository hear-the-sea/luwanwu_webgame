  flavor: （? - 705年）武周末年宫廷宠幸人物，与张昌宗并称"二张"，在武则天晚年权力结构中极为显眼。张易之的得势并非只靠个人魅力，更在于他代表内廷集团对外廷与旧贵族的挑战：通过控制皇帝身边的入口，便可影响奏事、人事与赏罚。神龙政变时二张被诛，成为政变的直接目标，也象征权力重新转回宗室与外廷。张易之让人看到，宫廷政治中"亲近"本身就是权力资源；当制度无法限制近侍影响时，政治会被私密关系改写。二张的迅速覆亡也显示这种权力极不稳定，潮水一退就会被清算。
