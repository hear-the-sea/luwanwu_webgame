  flavor: （? - 689年）唐代将领，出身百济降将集团，在唐对朝鲜半岛事务与边防战争中立下军功。黑齿常之的经历体现唐代对外扩张与民族融合的一面：帝国不仅征服，也吸纳降将与部众，把他们纳入军队体系并给予官爵，让不同族群在军功与制度中重新定位。史书亦记其后遭猜忌与处置，说明"外来将领"在宫廷政治中常处在更脆弱位置：功劳并不总能抵消身份带来的不信任。黑齿常之提醒我们，唐代的边防与战争从来不是单一民族的行动，帝国的军队本身就是多元构成；而多元既带来力量，也带来政治敏感。
