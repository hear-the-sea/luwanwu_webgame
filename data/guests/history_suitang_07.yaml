  flavor: （625年-705年）唐代重臣，历经高宗、武周时期与复唐初年，仕途起落与政治风向关系极深。魏元忠以敢言与持重著称，曾在复杂的宫廷权力结构中坚持外廷立场，也因此屡遭排挤与贬谪。其经历常被用来观察士大夫在武周政治中的进退：既有人选择合作，也有人选择守分寸，而守分寸往往代价更高。魏元忠让人明白，所谓"忠直"并不是稳定收益，而是一种在权力高压下仍保持判断的能力。把他放在武周到复唐的转折处，更能看到个人命运如何被制度与派系撕扯，同时也看到士大夫群体维护政治伦理的艰难努力。
