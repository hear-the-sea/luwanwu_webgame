    intellect: 43
    defense: 17
    agility: 17

- key: hist_suitang_0207_liuzhiji
  name: 刘知几
  default_gender: male
  archetype: civil
  flavor: （661年-721年）唐代史学家，著《史通》，强调史学方法与史家责任。刘知几批评史书因袭与失实，主张以考证、论断与材料选择来提升史学质量，使"写史"从简单编年变成有自觉的方法论实践。其观点在后世多次被引用，说明中国史学传统并非只有材料堆积，也有对叙述伦理与知识标准的反思。刘知几把史家从"记录者"提升为"判断者"：史书不只是记事，更要解释与辨伪。理解刘知几，也能理解唐代文化如何重视典章与史学，把知识生产纳入国家治理与士大夫修养体系。
  growth_range: [4, 7]
