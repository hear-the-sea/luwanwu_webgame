  flavor: （生卒年不详）唐代画家，仕女画传统的重要代表之一。周昉笔下的贵族女性形象常被用来想象唐代宫廷审美：衣饰华贵、体态丰润、姿态从容，体现盛唐社会对富丽与闲雅的共同偏好。需要谨慎的是，传世名作多为后代摹本或托名之作，未必都能直接归于周昉，但"周昉式仕女"作为风格概念确实影响后世。周昉让绘画成为社会史的一种窗口：从人物造型与服饰细节里，人们可以读到阶层、礼仪与审美如何被视觉化地固化。
