  flavor: （? - 710年）唐代将领，武周末至中宗、睿宗时期在宫廷政变与权力更替中影响甚大。李多祚手握兵权，因此能在关键时刻左右局势，既参与政变行动，也在政治清算中成为重要力量。然而军权介入宫廷意味着高风险：一旦政治盟友变化，掌兵者也可能立刻从功臣变为威胁。李多祚最终被诛，正说明宫廷政治对武将的容纳度有限。他的沉浮揭示初唐权力结构中"兵权与皇权"的紧张关系：皇帝需要禁军，但禁军将领又可能成为新的权力中心；这种结构性矛盾也因此变得具体可感。
