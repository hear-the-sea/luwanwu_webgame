  flavor: （生卒年不详）唐代将领，安史之乱前后相关战事中屡见其名。安史之乱的作战环境极其混乱，前线将领往往需要在兵败、转战与守城之间快速切换，王思礼这类人物更多体现"乱世军人"的现实功能：在战略尚未明朗时顶住局面，维持军队基本组织不散。史书对其细节记载有限，因此不宜添加难以核实的传奇，但可以确认的是他处于重大历史转折的战场一侧。王思礼让安史叙事不只剩下少数名将：平叛的进程由无数中层将领与部曲支撑，他们承担的不是英雄叙事，而是长期消耗战里的苦役。理解这一点，才能更接近战争对国家与个人的真实影响。
