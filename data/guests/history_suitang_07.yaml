  flavor: （? - 706年）唐代大臣，参与神龙政变并在复唐初期任职。敬晖的政治角色体现外廷大臣试图纠正权力失衡的努力：武周末期内廷势力膨胀，外廷通过政变夺回主动权，但随即又陷入新的宗室与外戚权力博弈。敬晖在政变后的遭遇说明，政治斗争并非"推翻就结束"，而是会以新的形式继续，旧功臣在新的格局里未必占优势。史书对其评价多肯定其参与复唐，但也记录其最终被清算的命运。敬晖的意义是提醒人们：在缺乏稳定继承与权力制衡的环境中，个人功劳很难转化为长期政治资本。
