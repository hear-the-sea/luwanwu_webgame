      agility: 20
  - key: hist_sljnbc_0419
    name: 李雄
    default_gender: male
    archetype: military
    flavor: （274年—334年）成汉开国皇帝，巴氐族人，字仲俊。他父亲李特于西晋末年率流民起义，后战死沙场。他继承父志，继续与晋军作战。永兴元年（304年）他攻占成都，次年称成都王，建兴三年（306年）称帝，国号大成，后改称汉，史称成汉。他在位三十年，政治上宽仁爱民，减轻赋税，使百姓得以休养生息，益州一隅相对安定。
