  - key: hist_sljnbc_0410
    name: 胡质
    default_gender: male
    archetype: civil
    flavor: （？—250年）曹魏大臣，寿春人，字文德。他早年为郡吏，以才干闻名。他历任顿丘、东莞、荆州刺史等职，所到之处政绩卓著，深得百姓爱戴。他为官清廉，家无余财，生活俭朴。他镇守荆州多年，防备东吴，军政皆有建树。嘉平二年（250年）他病逝于任上，家中"无金银之蓄"。其子胡威继承父风，亦以清廉著称。
    growth_range:
