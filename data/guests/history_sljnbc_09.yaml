  - key: hist_sljnbc_0411
    name: 审配
    default_gender: male
    archetype: civil
    flavor: （？—204年）袁绍谋士，魏郡人，字正南。他为人刚直不阿，深受袁绍信任，主管军政机要。官渡之战前他与郭图、逢纪等共掌袁绍幕府事务。袁绍去世后他拥立袁尚，与袁谭争位。建安九年（204年）曹操围攻邺城，他率军死守数月，粮尽援绝仍不肯投降。城破后他被俘，曹操爱其才欲招降，他慨然拒绝。
