      agility: 22
  - key: hist_sljnbc_0421
    name: 王僧辩
    default_gender: male
    archetype: military
    flavor: （？—555年）南朝梁将领，太原祁县人，字君才。他早年追随梁武帝萧衍，后成为湘东王萧绎麾下大将。侯景之乱时他率军东下讨伐侯景，与陈霸先合兵攻破建康，斩杀侯景，平定叛乱。梁元帝萧绎即位后他官居高位，镇守建康。萧绎被西魏所杀后，他与陈霸先在拥立新君问题上产生分歧。他主张迎立北齐扶持的萧渊明为帝，以换取北齐支持；陈霸先坚决反对。
