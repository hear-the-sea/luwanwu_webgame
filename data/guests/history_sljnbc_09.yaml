  - key: hist_sljnbc_0401
    name: 姚兴
    default_gender: male
    archetype: civil
    flavor: （366年—416年）后秦第二任皇帝，南安赤亭羌族人，字子略，姚苌之子。他在位二十二年，是后秦国力最盛时期。他崇信佛教，遣使西域迎请高僧鸠摩罗什至长安，主持译经事业，译出《金刚经》《法华经》等大量经典，对中国佛教发展影响深远。他任用汉族士人参政，推行儒学教育，兴办学校。
