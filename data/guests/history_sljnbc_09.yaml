  - key: hist_sljnbc_0420
    name: 石虎
    default_gender: male
    archetype: military
    flavor: （295年—349年）后赵第三任皇帝，羯族人，石勒从子。他性情残暴，自幼嗜杀成性。石勒在世时他已是后赵重要将领，东征西讨战功赫赫。石勒去世后他杀死石勒太子石弘自立为帝。他在位期间大兴土木，修建宫殿无数，征发民夫数百万；他穷奢极欲，后宫嫔妃数万人；他嗜杀成性，动辄屠戮百姓和臣僚。
    growth_range:
