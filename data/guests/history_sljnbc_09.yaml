  - key: hist_sljnbc_0422
    name: 周文育
    default_gender: male
    archetype: military
    flavor: （509年—559年）南朝陈将领，义兴阳羡人，本姓项，字景德。他出身贫寒，幼年时被周姓人家收养，遂改姓周。他膂力过人，作战勇猛，深受陈霸先器重，是陈霸先起兵建国的核心将领之一。他随陈霸先讨伐侯景、平定王僧辩，每战必先，功勋卓著。陈朝建立后他官至镇南将军，镇守岭南。他曾平定萧勃叛乱，稳定了陈朝南方局势。
