  - key: hist_sljnbc_0415
    name: 向宠
    default_gender: male
    archetype: military
    flavor: （？—240年）蜀汉将领，襄阳宜城人，向朗之侄。他为人公正廉洁，治军严明，深得将士爱戴。刘备东征伐吴时他随军出征，夷陵之败中他所率的营伍完整撤退，受到刘备赏识。诸葛亮在《出师表》中特别推荐他，称其"性行淑均，晓畅军事"，认为他可以担当统领禁军的重任。建兴年间他任中领军，负责宿卫宫禁。
    growth_range:
