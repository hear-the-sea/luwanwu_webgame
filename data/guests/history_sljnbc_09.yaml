      agility: 20
  - key: hist_sljnbc_0418
    name: 慧远
    default_gender: male
    archetype: civil
    flavor: （334年—416年）东晋高僧，雁门楼烦人，俗姓贾。他少年博通儒道，后师从道安大师出家。太元六年（381年）他南下庐山，在东林寺创立白莲社，聚集僧俗一百二十三人共修念佛法门。他倡导净土信仰，教人专念阿弥陀佛以求往生西方极乐世界，被后世尊为净土宗初祖。他不仅精通佛理，亦通儒老之学，主张佛教与中国传统文化相融合。
