  - key: hist_sljnbc_0416
    name: 虞翻
    default_gender: male
    archetype: civil
    flavor: （164年—233年）东吴大臣，会稽余姚人，字仲翔。他博学多才，精通《周易》，著有《周易注》等多部著作，是当时著名的经学家。他早年仕于会稽太守王朗，后归东吴。他为人刚直不阿，屡次犯颜直谏，得罪孙权及众多权贵。他在宴会上因直言不讳触怒孙权，被流放交州长达十余年。在交州期间他不改本色，开馆授徒，传播经学，培养了大批弟子。
