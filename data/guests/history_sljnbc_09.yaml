  - key: hist_sljnbc_0414
    name: 赵累
    default_gender: male
    archetype: military
    flavor: （？—220年）忠诚副将，随关羽殉难。关羽帐下都督，荆州失陷后随关羽突围奔走麦城。在关羽最后的时刻，他始终不离不弃，与关羽一同被吕蒙军擒获。面对东吴的招降，他拒绝背叛旧主，与关羽父子一同被斩首。史书对他的记载极为简略，只知他官居都督，应是关羽麾下较为重要的将领之一。在荆州兵败如山倒、众将纷纷投降或逃散的情况下。
