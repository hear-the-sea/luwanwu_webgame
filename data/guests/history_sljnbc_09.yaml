      agility: 22
  - key: hist_sljnbc_0423
    name: 侯安都
    default_gender: male
    archetype: military
    flavor: （520年—563年）南朝陈将领，始兴曲江人，字成师。他早年随陈霸先起兵，是陈朝建国的核心功臣之一。他作战勇猛，屡立战功，曾平定王僧辩及其余党，又多次击退北齐入侵。陈武帝陈霸先去世后，他拥立陈文帝即位，功劳极大。然而他居功自傲，行为日益跋扈，在朝廷中专权用事，甚至在皇帝面前失礼。
