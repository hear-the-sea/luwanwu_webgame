  - key: hist_sljnbc_0412
    name: 郭图
    default_gender: male
    archetype: civil
    flavor: （？—205年）袁绍谋士，颍川人，字公则。他早年以才辩闻名，受袁绍重用。官渡之战中他力主速战，反对沮授持重之策。乌巢被袭时他建议分兵攻曹营而非救乌巢，致使袁绍决策失误。战后他诬陷张郃、高览有降曹之意，二人被迫投敌。袁绍去世后他辅佐袁谭，与审配拥立的袁尚争位，兄弟阋墙。他建议袁谭向曹操求援以对抗袁尚，使曹操坐收渔利。
