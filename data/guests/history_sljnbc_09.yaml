  - key: hist_sljnbc_0413
    name: 逢纪
    default_gender: male
    archetype: civil
    flavor: （？—202年）袁绍谋士，字元图。他早年追随袁绍，协助其夺取冀州，是袁绍起家的重要谋士。他为人果敢善断，在袁绍幕府中地位重要。他与审配、郭图等人共掌机要，但彼此之间多有矛盾。袁绍去世时他本与审配不和，却在关键时刻放下私怨，力挺审配主张拥立袁尚为继承人。袁谭对此极为不满，兄弟争位愈演愈烈。
