  - key: hist_sljnbc_0417
    name: 石崇
    default_gender: male
    archetype: civil
    flavor: （249年—300年）西晋富豪，渤海南皮人，字季伦。他是车骑将军石苞之子，早年任荆州刺史，靠劫掠往来商旅积累了巨额财富。他在洛阳城外河阳县修建金谷园，极尽奢华，常在此宴请宾客。他与外戚王恺斗富，以蜡烛当柴烧、以锦缎做步障五十里，穷奢极欲。晋武帝曾赐王恺珊瑚树，他用铁如意将其击碎，取出更大的珊瑚相赠。
