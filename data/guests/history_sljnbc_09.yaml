  - key: hist_sljnbc_0424
    name: 萧皇后
    default_gender: female
    archetype: civil
    flavor: （567年—648年）隋炀帝皇后，西梁明帝萧岿之女。她自幒聪慧，通晓诗书，十三岁嫁与杨广为妻。杨广登基后她被立为皇后，母仪天下。隋末天下大乱，宇文化及弑杀炀帝后她被掳往聊城。此后窦建德击败宇文化及，她又落入窦建德之手。突厥处罗可汗遣使迎接，她被送往突厥，在塞外生活十余年。
