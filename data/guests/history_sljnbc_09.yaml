    - 7
    attribute_weights:
      force: 8
      intellect: 64
      defense: 18
      agility: 10
  - key: hist_sljnbc_0402
    name: 范缜
    default_gender: male
    archetype: civil
    flavor: （约450年—515年）南朝齐梁时期思想家，南乡舞阴人，字子真。他出身贫寒，少孤家贫，但勤奋好学，博通经史。他在齐梁时期历任多职，官至中书郎、尚书左丞等。当时佛教盛行，梁武帝萧衍更是笃信佛法、大兴佛寺。他反对佛教的灵魂不灭说，著《神灭论》一文，提出"形存则神存，形谢则神灭"的观点，以锋利的笔触批驳佛教的因果报应和轮回转世之说。
    growth_range:
    - 3
    - 7
    attribute_weights:
      force: 8
      intellect: 64
      defense: 18
      agility: 10
  - key: hist_sljnbc_0403
    name: 江淹
    default_gender: male
    archetype: civil
    flavor: （444年—505年）南朝文学家，济阳考城人，字文通。他少年孤贫却勤奋好学，文才出众。他历仕宋、齐、梁三朝，官至金紫光禄大夫。他早年文采斐然，《恨赋》《别赋》皆为传世名篇，"黯然销魂者，唯别而已矣"成为千古名句。传说他曾梦中得五色笔，此后文思泉涌。晚年他又梦见郭璞索还五色笔，此后文才大减，再无佳作问世，"江郎才尽"典故由此而来。
    growth_range:
    - 3
    - 6
    attribute_weights:
      force: 8
      intellect: 64
      defense: 18
      agility: 10
  - key: hist_sljnbc_0404
    name: 陈叔宝
    default_gender: male
    archetype: civil
    flavor: （553年—604年）陈朝末代皇帝，吴兴长城人，名陈叔宝，字元秀。他自幼聪颖，精通诗文音律，在位期间却荒于政事、沉溺声色。他宠幸张丽华、孔贵嫔等后妃，与文臣江总等人整日饮宴赋诗，创作《玉树后庭花》《临春乐》等靡靡之音。祯明三年（589年）隋军渡江南下，他仍不问军务。建康城破时他与张丽华藏于景阳宫井中被俘，史称"胭脂井"。
    growth_range:
    - 3
    - 7
    attribute_weights:
      force: 8
      intellect: 64
      defense: 18
      agility: 10
  - key: hist_sljnbc_0405
    name: 徐陵
    default_gender: male
    archetype: civil
    flavor: （507年—583年）南朝文学家，东海郯县人，字孝穆。他自幼聪慧，八岁能文，被誉为神童。他历仕梁、陈两朝，官至尚书左仆射、中书监。他主持编纂《玉台新咏》，收录汉至梁代诗歌，是继《诗经》《楚辞》后的重要诗歌总集。他与庾信齐名，并称"徐庾"，二人同为宫体诗的代表人物。他的骈文华丽精工，对仗工整，辞藻典雅，被后世视为六朝骈文的典范。
    growth_range:
    - 3
    - 7
    attribute_weights:
      force: 8
      intellect: 64
      defense: 18
      agility: 10
  - key: hist_sljnbc_0406
    name: 宇文护
    default_gender: male
    archetype: military
    flavor: （513年—572年）北周权臣，代郡武川人，字萨保，宇文泰之侄。宇文泰去世后他拥立宇文觉建立北周，把持朝政十五年。他先后毒杀宇文觉、宇文毓两位皇帝，又立宇文邕为帝。在位期间他主导对北齐的多次战争，虽有胜负，总体维持了北周的国势。他为人猜忌多疑，诛杀异己无数。天和七年（572年）宇文邕隐忍多年后设计将他诛杀，当场击毙，并夷灭其族。
    growth_range:
    - 3
    - 7
    attribute_weights:
      force: 40
      intellect: 15
      defense: 23
      agility: 22
  - key: hist_sljnbc_0407
    name: 杨忠
    default_gender: male
    archetype: military
    flavor: （507年—568年）北周将领，弘农华阴人，隋文帝杨坚之父。他身长七尺八寸，美须髯，膂力过人。他早年追随独孤信征战，后归宇文泰麾下，屡立战功。他曾随军攻打南朝梁，攻取江陵等地；又北击突厥，大破敌军，威震塞北。他官至柱国大将军，封随国公。他为人宽厚，礼贤下士，在军中颇有威望。
    growth_range:
    - 3
    - 7
    attribute_weights:
      force: 40
      intellect: 15
