      agility: 22
  - key: hist_sljnbc_0408
    name: 高洋
    default_gender: male
    archetype: military
    flavor: （529年—559年）北齐开国皇帝，渤海蓨县人，字子进，高欢次子。他少年时貌似痴呆，实则深沉有谋。天保元年（550年）他废东魏孝静帝自立，建立北齐。在位初期他励精图治，北击柔然、库莫奚，西攻西魏，南侵南朝，疆域一度达到鼎盛。他整顿吏治，修订律令，颇有作为。然而后期他酗酒成性，行为癫狂，常于酒后杀人，滥杀朝臣宗室。
