  - key: hist_sljnbc_0409
    name: 吕虔
    default_gender: male
    archetype: military
    flavor: （？—？）曹魏将领，任城人，字子恪。他早年以胆略闻名，曹操任命他为泰山太守。泰山郡地处山区，盗贼横行，他到任后募集精锐，剿抚并用，数年间境内安定。他治郡十余年，政绩卓著，百姓感念其恩。他曾协助夏侯渊平定东莱叛乱，又参与讨伐利城唐咨等战役，屡建功勋。他有一柄名刀，相传佩之可至三公，他将刀赠与王祥，后王祥果然位列三公。
