    flavor: （前314年—前238年）春申君，战国四公子之一。他是楚国令尹，封春申君，开发吴地，今上海一带皆是其故地。他原是太子完的陪臣，秦国扣留太子，他巧施计谋，让太子乔装逃归，自己留秦为质，展现了非凡的忠义与胆略。太子完即位为考烈王后，他权倾楚国二十五年。他养士数千，好大喜功，曾合纵攻秦却无功而返。晚年他卷入王位之争的漩涡：门客李园将妹妹献给他，他又转献给无子的考烈王。王死后，他被李园伏杀于棘门，三族皆灭。养士千人，竟死于门客之手，春申君的结局充满讽刺。
