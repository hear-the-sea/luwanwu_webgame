heroes:
  blue:
  - key: hist_xianqin_0095
    name: 闵损
    default_gender: male
    archetype: civil
    flavor: （前536年—前487年）孝行感人，德行典范。他是孔门弟子，以德行著称。继母虐待，他不愿父亲休妻，曰"母在一子单，母去三子寒"。这份孝心感动继母，从此一家和睦。他的孝行被后世列为孝道楷模，成为儒门德行之首。
    growth_range:
    - 5
    - 9
    attribute_weights:
      force: 10
      intellect: 56
      defense: 20
      agility: 14
  - key: hist_xianqin_0096
    name: 冉雍
    default_gender: male
    archetype: civil
    flavor: （前522年—?）仲弓之德，可使南面。孔子评价他"雍也可使南面"，意思是可以做君主。他出身低微，却有君子之德。宽厚和平，不求名利，是儒家德行的典范。他处事稳重，能以德服人，最能体现孔门为政之道。其“宽而有制”的气度，正是孔子所推重的治世人格。
    growth_range:
    - 5
    - 9
    attribute_weights:
      force: 10
      intellect: 56
      defense: 20
      agility: 14
  - key: hist_xianqin_0097
    name: 冉耕
    default_gender: male
    archetype: civil
    flavor: （约前544年—约前480年）德行高洁，身患恶疾。他是孔门弟子，以德行见长。不幸身患恶疾，孔子执其手叹曰"亡之！命矣夫！"其德行之美，令夫子痛惜其命运之蹇。他病中仍守礼不失，彰显君子之坚。孔门记其德行，后世以其为仁者之表。
    growth_range:
    - 5
    - 9
    attribute_weights:
      force: 8
      intellect: 58
      defense: 20
      agility: 14
  - key: hist_xianqin_0098
    name: 原宪
    default_gender: male
    archetype: civil
    flavor: （约前515年—?）安贫乐道，甘于淡泊。他是孔子弟子，孔子死后隐居草泽，虽贫穷至极仍不改其志。子贡富贵来访，他"正冠"而出，展现士人风骨。安贫乐道的典范。其清节自守，使后世以"原宪"称清贫贤者。其事迹常被引为寒士守节之训。
    growth_range:
    - 5
    - 9
    attribute_weights:
      force: 8
      intellect: 58
      defense: 20
      agility: 14
  - key: hist_xianqin_0099
    name: 漆雕开
    default_gender: male
    archetype: civil
    flavor: （前540年—?）求道不仕，学而不厌。孔子让他出仕，他说"吾斯之未能信"，表示还未做好准备。这份谦虚与求道之心，得到孔子赞赏。漆雕开代表了儒家重学轻仕的一面。他以慎言慎行著称，宁可深学而不妄任官。此种谨慎使孔子尤为器重。
    growth_range:
    - 5
    - 9
    attribute_weights:
      force: 8
      intellect: 58
      defense: 20
      agility: 14
  - key: hist_xianqin_0100
    name: 公西赤
    default_gender: male
    archetype: civil
    flavor: （前509年—?）礼仪专家，外交之才。他精通礼仪，善于应对。孔子评价他"束带立于朝，可使与宾客言"。他是孔门中礼学的代表人物。他长于宾主之礼与辞令周旋，是孔门外交型人才的典范。在孔门弟子中以礼学最为周备。
    growth_range:
    - 5
    - 9
    attribute_weights:
      force: 10
      intellect: 56
      defense: 20
      agility: 14
  - key: hist_xianqin_0101
    name: 樊须
    default_gender: male
    archetype: civil
    flavor: （前515年—?）三问知仁，好农失雅。他三次问仁，孔子分别答以"爱人"、"居处恭"、"先难而后获"。他请学稼，被孔子批评为"小人"。但他的提问，引出了孔子关于仁的重要论述。他关注民生劳作，亦反映士人对治国实务的关切。
    growth_range:
    - 5
    - 9
    attribute_weights:
      force: 12
      intellect: 54
      defense: 20
      agility: 14
  - key: hist_xianqin_0102
    name: 澹台灭明
    default_gender: male
    archetype: civil
    flavor: （前512年—?）以貌取人，失之子羽。他貌丑而德高，孔子初时轻视，后叹曰"以貌取人，失之子羽"。他南游至吴，从学者三百人，声名远播。不可以貌取人，澹台灭明是最好的注脚。他以德行立身，终成一派之师。他开馆授徒，使吴地学风为之一振。
    growth_range:
    - 5
    - 9
    attribute_weights:
      force: 10
      intellect: 56
      defense: 20
      agility: 14
  - key: hist_xianqin_0103
    name: 庆忌
    default_gender: male
    archetype: military
    flavor: （?—前515年）吴国勇士，万夫莫敌。他是吴王僚之子，勇力过人，能"走追奔兽，手接飞鸟"。父死后流亡国外，图谋复仇，却被要离刺杀。庆忌之勇，冠绝吴国，可惜死于阴谋。他的忠勇与悲剧，成为吴国内乱的注脚。
    growth_range:
    - 5
    - 9
    attribute_weights:
      force: 48
      intellect: 10
      defense: 24
      agility: 18
  - key: hist_xianqin_0104
    name: 韩起
    default_gender: male
    archetype: civil
    flavor: （?—前514年）韩宣子，春秋名臣。他执政晋国二十年，"韩宣子之誉"成为贤相代名词。他在郑国看到《易象》与《鲁春秋》，叹"周礼尽在鲁矣"。韩氏始祖。他以稳健理政著称，奠定韩氏兴起之基。其声誉使韩氏在晋国稳固立足。
    growth_range:
    - 5
    - 9
    attribute_weights:
      force: 14
      intellect: 52
      defense: 20
      agility: 14
  - key: hist_xianqin_0105
    name: 魏舒
    default_gender: male
    archetype: military
    flavor: （?—前509年）魏献子，毁车为行。他在与狄人作战时，果断毁车为步卒，大破敌军。这一战术革新，开春秋步兵战之先。魏氏始祖之一。他善于因势制宜，其决断力为魏氏崛起奠基。毁车为行被后世视为兵法机变典例。其临机变阵之名，常见于兵书评注。
    growth_range:
    - 5
    - 9
    attribute_weights:
      force: 42
      intellect: 14
      defense: 26
      agility: 18
  - key: hist_xianqin_0106
    name: 钟子期
    default_gender: male
    archetype: civil
    flavor: （生卒年不详）知音难觅，伯牙绝弦。他是樵夫，却能听懂伯牙琴声中的高山流水。子期死后，伯牙摔琴绝弦，再不复弹。知音之交，钟子期与伯牙的故事成为千古绝唱。他的理解力与真诚，使“知音”成为文化象征。此义流传千古，成就交友最高标准。
    growth_range:
    - 5
    - 9
    attribute_weights:
      force: 8
      intellect: 58
      defense: 18
      agility: 16
  - key: hist_xianqin_0107
    name: 伯牙
    default_gender: male
    archetype: civil
    flavor: （生卒年不详）高山流水，觅知音。他是春秋时期著名琴师，琴艺高超。他与钟子期的知音之交，成为中国文化中最动人的友谊象征。子期死后，伯牙破琴绝弦，终身不复鼓琴。其重情重义，成为士人情谊的典范。后世文人反复吟咏其故事，感叹知音难得。
    growth_range:
    - 5
    - 9
    attribute_weights:
      force: 8
      intellect: 58
      defense: 18
      agility: 16
  - key: hist_xianqin_0108
    name: 史鱼
    default_gender: male
    archetype: civil
    flavor: （?—前502年）尸谏之臣，正直典范。他是卫国大夫，屡谏卫灵公不纳。临终嘱咐儿子不要正殓，以"尸谏"之礼促使灵公反省。孔子赞其"直哉史鱼"。正直之士的极致。他以身作谏，体现士人以死明志的决绝。其名与忠直并称，常为史家所表彰。
    growth_range:
    - 5
    - 9
    attribute_weights:
      force: 10
      intellect: 56
      defense: 22
      agility: 12
  - key: hist_xianqin_0109
    name: 蘧瑗
    default_gender: male
    archetype: civil
    flavor: （约前585年—约前484年）卫国君子，五十知非。他年五十而知四十九年之非，不断自省进步。孔子赞其为君子，多次称道其德行。"行年五十而知四十九年非"成为自省的代名词。他谨守礼义，居官清正，堪称卫国贤臣。
    growth_range:
    - 5
    - 9
    attribute_weights:
      force: 8
      intellect: 58
      defense: 22
      agility: 12
  - key: hist_xianqin_0110
    name: 郭偃
    default_gender: male
    archetype: civil
    flavor: （生卒年不详）晋国巫史，料事如神。他善于占卜预测，辅佐晋献公。他预言"献公之子，皆弗得立"，后来果然应验。他的预言能力，为后世津津乐道。他以巫史之职参与国政，体现了春秋占卜传统的权威。其事迹成为占卜应验的典型案例。
    growth_range:
    - 5
    - 9
    attribute_weights:
      force: 8
      intellect: 58
      defense: 20
      agility: 14
  - key: hist_xianqin_0111
    name: 卜偃
    default_gender: male
    archetype: civil
    flavor: （生卒年不详）晋国太卜，预言骊姬之乱。他多次预言晋国大事，皆应验如神。他警告献公骊姬必乱晋国，可惜不被采纳。春秋时期著名的占卜师。他的忠告被忽视，成为晋国祸乱的前兆。此事常被用以警戒君主勿忽谏言。其占验之准，使晋国卜筮声名大振。
    growth_range:
    - 5
    - 9
    attribute_weights:
      force: 8
      intellect: 58
      defense: 20
      agility: 14
  - key: hist_xianqin_0112
    name: 内史过
    default_gender: male
    archetype: civil
    flavor: （生卒年不详）周室史官，论神明。他论"神明依德"，认为国家兴衰在德不在神。这一理性思想，是先秦无神论的萌芽。内史过的思想，超越了时代。他以史官之口提出德治观，为后世政治理念奠基。其论断启发士人重德轻祀之思。
    growth_range:
    - 5
    - 9
    attribute_weights:
      force: 8
      intellect: 58
      defense: 20
      agility: 14
  - key: hist_xianqin_0113
    name: 辛甲
    default_gender: male
    archetype: civil
    flavor: （生卒年不详）商末周初史官，直言敢谏。他是殷商史官，见纣无道而入周。他直言进谏七十五次，成为忠臣直谏的典范。周文王重用他，使他得以发挥才能。他以敢言著称，体现了史官不畏权势的操守。其直谏精神为史官职责立下标杆。
    growth_range:
    - 5
    - 9
    attribute_weights:
      force: 10
      intellect: 56
      defense: 20
      agility: 14
  - key: hist_xianqin_0114
    name: 散宜生
    default_gender: male
    archetype: civil
    flavor: （生卒年不详）周初功臣，赎文王。文王被囚羑里，他与姜尚等人搜集美女奇物献于纣王，赎回文王。他是周室开国功臣，忠诚与智慧并重。他以权谋救主，又能辅政定国，堪称文王臂助。其处置权变而守义，为周初立国积德。
    growth_range:
    - 5
    - 9
    attribute_weights:
      force: 12
      intellect: 54
      defense: 20
      agility: 14
  - key: hist_xianqin_0115
    name: 闳夭
    default_gender: male
    archetype: civil
    flavor: （生卒年不详）周初功臣，辅佐文王。他与散宜生、太颠并列，是文王时期的重要谋士。他们共同辅佐文王，积德累仁，为武王伐纣奠定基础。他善于参谋国策，稳固周室内政与外交根基。其谋略虽少见记载，却为周兴起不可或缺。
    growth_range:
    - 5
    - 9
    attribute_weights:
      force: 12
      intellect: 54
      defense: 20
      agility: 14
  - key: hist_xianqin_0116
    name: 南宫适
    default_gender: male
    archetype: military
    flavor: （生卒年不详）周初功臣，辅佐武王。他参与武王伐纣，在牧野之战中立下战功。周朝建立后，他散财济贫，受到武王嘉奖。西周开国功臣之一。他能征善战且重义薄财，名声颇著。其仁义之举为军中所敬，民间亦传颂。其事迹成为周初功臣廉义的典型。
    growth_range:
    - 5
    - 9
    attribute_weights:
      force: 40
      intellect: 16
      defense: 26
      agility: 18
  - key: hist_xianqin_0117
    name: 华元
    default_gender: male
    archetype: military
    flavor: （?—前573年）宋国执政，羊斟败师。他为宋国执政，与楚国作战时，因车夫羊斟怀恨未分羊羹而驱车投敌，致使宋军大败。他被俘后逃归，后主持弭兵之会，促进和平。由战转和的经历，使他成为春秋外交的一位关键人物。
    growth_range:
    - 5
    - 9
    attribute_weights:
      force: 38
      intellect: 18
      defense: 26
      agility: 18
  - key: hist_xianqin_0118
    name: 向戌
    default_gender: male
    archetype: civil
    flavor: （生卒年不详）宋国执政，弭兵之会。他主持召开弭兵之会，使晋、楚两大国及其附庸达成和平协议。这是春秋时期规模最大的和平会议，向戌的外交努力，换来数十年相对和平。他以务实外交缓解争霸格局，功在当世。其务实手腕为后世和平外交所称道。
    growth_range:
    - 5
    - 9
    attribute_weights:
      force: 12
      intellect: 54
      defense: 20
      agility: 14
  - key: hist_xianqin_0119
    name: 子罕
    default_gender: male
    archetype: civil
    flavor: （生卒年不详）宋国贤臣，不贪为宝。有人献玉，他却说"我以不贪为宝，尔以玉为宝"，拒不接受。"不贪为宝"成为廉洁自律的代名词。子罕的品格，令人敬仰。他以清廉治政，成为春秋廉臣的象征。其拒贿之言被历代官箴反复引用。
    growth_range:
    - 5
    - 9
    attribute_weights:
      force: 10
      intellect: 56
      defense: 22
      agility: 12
  - key: hist_xianqin_0120
    name: 华父督
    default_gender: male
    archetype: military
    flavor: （?—前680年）宋国权臣，弑君乱国。他因贪恋孔父嘉之妻的美色，杀孔父嘉夺其妻，又弑杀宋殇公。虽为乱臣贼子，但其故事对后世有警示意义。他以私欲乱国，成为权臣专政的反面典型。史家常借其事提醒君主防范佞臣。
    growth_range:
    - 5
    - 9
    attribute_weights:
      force: 40
      intellect: 16
      defense: 26
      agility: 18
  - key: hist_xianqin_0121
    name: 孔父嘉
    default_gender: male
    archetype: military
    flavor: （?—前710年）宋国大司马，孔子先祖。他是孔子的六世祖，为人正直，死于华父督之乱。他的后代避难逃至鲁国，最终诞生了至圣孔子。他以忠直闻名，其家族迁徙为儒家史事的重要渊源。其家风正直，成为孔氏世代相传的精神底色。
    growth_range:
    - 5
    - 9
    attribute_weights:
      force: 40
      intellect: 16
      defense: 26
      agility: 18
  - key: hist_xianqin_0122
    name: 子目夷
    default_gender: male
    archetype: civil
    flavor: （?—前611年）宋襄公之兄，宋国贤人。他劝谏襄公不要拘泥于"君子不困人于厄"的仁义，可惜不被采纳。泓水之战宋军惨败，验证了他的预见。目夷的明智与无奈，令人唏嘘。他的识见体现了春秋时务实政治的一面。其劝谏常被视作理性治国的先声。
    growth_range:
    - 5
    - 9
    attribute_weights:
      force: 12
      intellect: 54
      defense: 20
      agility: 14
  - key: hist_xianqin_0123
    name: 骊姬
    default_gender: female
    archetype: civil
    flavor: （?—前651年）晋献公宠妃，祸乱晋国。她用计离间献公与诸子，迫害太子申生。申生自杀，重耳、夷吾出逃，晋国陷入内乱。她虽是祸首，却也折射出宫廷斗争的残酷。其阴谋导致国政动荡，成为史书中的反面形象。她的故事常与“红颜祸水”论相连。
    growth_range:
    - 5
    - 9
    attribute_weights:
      force: 8
      intellect: 56
      defense: 18
      agility: 18
  - key: hist_xianqin_0124
    name: 孟明视
    default_gender: male
    archetype: military
    flavor: （生卒年不详）秦国大将，三败复仇。他是百里奚之子，崤之战大败于晋。秦穆公不咎既往，让他继续领兵。他卧薪尝胆，终于击败晋军。"三败而不黜"的故事，展现明君用人的胸襟。他亦以坚忍回报信任，成为秦军重臣。其复仇之战成为秦军转盛的关键节点。
    growth_range:
    - 5
    - 9
    attribute_weights:
      force: 42
      intellect: 14
      defense: 26
      agility: 18
  - key: hist_xianqin_0125
    name: 百里丙
    default_gender: male
    archetype: military
    flavor: （生卒年不详）秦将，随孟明视伐晋。他与孟明视、西乞术并称，是崤之战的败将。在穆公的信任下，他们终于雪耻复仇。忠诚坚韧的将领。他虽屡败不馁，终以战功洗刷耻辱。其忍辱负重之举体现秦军将领的坚韧。此种坚持成为秦军战风的重要象征。
    growth_range:
    - 5
    - 9
    attribute_weights:
      force: 40
      intellect: 14
      defense: 28
      agility: 18
  - key: hist_xianqin_0126
    name: 百里术
    default_gender: male
    archetype: military
    flavor: （生卒年不详）秦将，崤之战败将。他与孟明视、白乙丙一同遭遇惨败，却获得穆公的宽恕。三将复仇成功，彰显了秦国君臣的坚韧与信任。他能从败局中重整军心，表现出将领的韧性与担当。其经历成为秦军励志与复兴的象征。
    growth_range:
    - 5
    - 9
    attribute_weights:
      force: 40
      intellect: 14
      defense: 28
      agility: 18
  - key: hist_xianqin_0127
    name: 先且居
