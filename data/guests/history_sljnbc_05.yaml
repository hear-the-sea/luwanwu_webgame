  - key: hist_sljnbc_0201
    name: 蔡阳
    default_gender: male
    archetype: military
    flavor: （？—201年）古城折戟，演义名将。正史记载他为曹操麾下将领，于汝南被刘备所杀，事迹甚简。然在《三国演义》中，他被塑造为关羽千里走单骑途中的重要对手。古城相会时，张飞误以为关羽降曹，兄弟反目。恰逢蔡阳率军追杀，关羽以斩杀蔡阳来证明自己的忠心，兄弟和好如初。这一情节虽属演义渲染，却使蔡阳成为"古城斩蔡阳"这一经典桥段的核心人物。
    growth_range:
    - 3
    - 6
    attribute_weights:
      force: 34
      intellect: 12
      defense: 40
      agility: 14
  - key: hist_sljnbc_0202
    name: 王双
    default_gender: male
    archetype: military
    flavor: （？—228年）流星锤将，演义猛士。正史中他为曹魏将领，在诸葛亮第二次北伐撤退时追击，被蜀军设伏斩杀，记载甚简。《三国演义》将其塑造为使一柄六十斤大刀、暗藏流星锤的猛将，有"万夫不当之勇"。他在陈仓之战中多次挫败蜀军，斩将夺旗，威风八面。诸葛亮退兵时他恃勇追击，中了埋伏，被魏延从背后一刀斩于马下。
    growth_range:
    - 3
    - 6
    attribute_weights:
      force: 40
      intellect: 15
      defense: 23
      agility: 22
  - key: hist_sljnbc_0203
    name: 费耀
    default_gender: male
    archetype: military
    flavor: （？—？）魏国将领，西线悍将。他长期驻守雍凉地区，是曹魏对抗蜀汉的重要将领之一。诸葛亮北伐期间，他多次与蜀军交锋，参与了西线防御的诸多战役。曹真率军伐蜀时，他随军出征，在险要地形与蜀军激战。一说他在战斗中阵亡，一说他因战事不利而自杀以谢罪。虽然正史对他的记载不多，但从他能参与重大军事行动来看，他必是曹魏西线军中的可靠将领。
    growth_range:
    - 3
    - 6
    attribute_weights:
      force: 40
      intellect: 15
      defense: 23
      agility: 22
  - key: hist_sljnbc_0204
    name: 戴陵
    default_gender: male
    archetype: military
    flavor: （？—？）魏国将领，屡败屡战。他是曹魏中后期活跃于西线战场的将领，多次参与抵御诸葛亮北伐的战役。他曾随张郃、司马懿等名将征战，在与蜀军的交锋中虽多有败绩，却从未退缩。每逢战事他都冲锋在前，即使失败也能收拾残兵、重整旗鼓。正史对他的个人事迹记载不多，但从他能频繁出现在重要战役中可见，他是一位经验丰富、意志坚韧的老将。
    growth_range:
    - 3
    - 7
    attribute_weights:
      force: 40
      intellect: 15
      defense: 23
      agility: 22
  - key: hist_sljnbc_0205
    name: 胡遵
    default_gender: male
    archetype: military
    flavor: （？—256年）魏国车骑，安定胡氏。安定临泾人，出身将门世家。他早年追随司马懿征战，参与平定辽东公孙渊的战役，立下战功。此后他长期驻守东线，多次率军征讨东吴，是曹魏对吴作战的重要将领。他作战勇猛，治军严整，深受司马氏器重，官至车骑将军。他的家族在魏晋时期显赫一时，儿子胡威以清廉著称，父子同为史传表彰。
    growth_range:
    - 3
    - 7
    attribute_weights:
      force: 44
      intellect: 8
      defense: 18
      agility: 30
  - key: hist_sljnbc_0206
    name: 柳隐
    default_gender: male
    archetype: military
    flavor: （约190年—269年）蜀汉老将，坚守黄金。蜀郡成都人，少年从军，历仕蜀汉数十年。他追随姜维多次北伐，屡立战功，是蜀汉后期最可靠的老将之一。魏灭蜀之战时，他奉命镇守黄金围要塞。钟会大军压境，他据险死守，任凭魏军百般攻打绝不动摇。直到成都陷落、刘禅下诏投降，他才痛哭流涕放下武器。
    growth_range:
    - 3
    - 7
    attribute_weights:
      force: 40
      intellect: 15
      defense: 23
      agility: 22
  - key: hist_sljnbc_0207
    name: 张绍
    default_gender: male
    archetype: civil
    flavor: （？—？）张飞次子，奉表投降。涿郡人，车骑将军张飞之子。与兄长张苞的勇武不同，他走的是文臣之路，官至侍中、尚书仆射，在蜀汉朝廷中位高权重。魏灭蜀时成都不战而降，刘禅命他与谯周、邓良等捧着玉玺和降表前往魏军大营，向邓艾请降。他亲手将父辈用鲜血换来的江山拱手让人，这一幕令人唏嘘。
