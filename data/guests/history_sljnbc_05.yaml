    - 6
    attribute_weights:
      force: 40
      intellect: 15
      defense: 23
      agility: 22
  - key: hist_sljnbc_0217
    name: 李虎
    default_gender: male
    archetype: military
    flavor: （？—551年）唐室先祖，八柱国之一。陇西成纪人，出身陇西李氏，是唐高祖李渊的祖父、唐太宗李世民的曾祖父。他追随宇文泰征战多年，是西魏府兵制的核心成员，被封为八柱国之一，位极人臣。他善于骑射，作战勇猛，多次参与平定叛乱和抵御东魏的战役。虽然他的功业在八柱国中并非最显赫，但他开创了李氏家族的荣耀根基。
    growth_range:
    - 3
    - 7
    attribute_weights:
      force: 40
      intellect: 15
      defense: 23
      agility: 22
  - key: hist_sljnbc_0218
    name: 贾充
    default_gender: male
    archetype: civil
    flavor: （217年—282年）弑君元凶，晋朝权臣。襄陵人，曹魏名臣贾逵之子。他自幼追随司马氏，是司马昭最亲信的心腹。高贵乡公曹髦率侍卫讨伐司马昭时，他正当阵指挥。众人畏惧天子威严不敢动手，他厉声喝道"司马公养汝等，正为今日，有何疑虑！"其部下成济遂一戟刺死曹髦。弑君之名从此与他紧紧相连。
    growth_range:
    - 3
    - 6
    attribute_weights:
      force: 20
      intellect: 40
      defense: 20
      agility: 20
  - key: hist_sljnbc_0219
    name: 文钦
    default_gender: male
    archetype: military
    flavor: （？—258年）淮南悍将，寿春枭雄。谯郡人，骁勇善战，以勇烈闻名于曹魏军中。他是曹爽亲信，高平陵之变后深感危机。司马师废黜曹芳时，他与毌丘俭在淮南起兵勤王，是为寿春三叛之二。兵败后他逃往东吴，东吴授予他官职兵权。诸葛诞起兵时他随吴军入援寿春，然而二人政见不合、猜忌日深。
    growth_range:
    - 3
    - 6
    attribute_weights:
      force: 40
      intellect: 15
      defense: 23
      agility: 22
  - key: hist_sljnbc_0220
    name: 钟毓
    default_gender: male
    archetype: civil
    flavor: （？—263年）曹魏重臣，钟会之兄。颍川长社人，书法名家钟繇之子。他自幼聪慧，十四岁便入朝为官，深受曹丕器重。有次魏文帝召见钟家兄弟，钟毓汗流浃背，钟会神色自若。问其故，钟毓答"战战惶惶，汗出如浆"，"汗流浃背"典故由此而来。他历仕三朝，官至青州刺史。钟会伐蜀成功后野心膨胀，钟毓敏锐察觉弟弟有反意，提醒司马昭加以防备。
    growth_range:
    - 3
    - 7
    attribute_weights:
      force: 8
      intellect: 64
      defense: 18
      agility: 10
  - key: hist_sljnbc_0221
    name: 卫觊
    default_gender: male
    archetype: civil
    flavor: （？—229年）博学儒臣，典章大家。河东安邑人，出身名门卫氏，是西晋名臣卫瓘之父。他博闻强记，精通古今典章制度，尤其擅长古文字学和礼制研究。曹操平定关中时，他受命安抚百姓，上书建议恢复盐铁官营、招抚流民屯田，政见卓越。他历仕曹操、曹丕、曹叡三朝，官至尚书。曹叡大兴土木修建宫殿时，他多次上疏谏阻，言辞恳切，虽未被完全采纳。
    growth_range:
    - 3
    - 6
    attribute_weights:
      force: 8
      intellect: 64
      defense: 18
      agility: 10
  - key: hist_sljnbc_0222
    name: 卢毓
    default_gender: male
    archetype: civil
    flavor: （183年—257年）卢植之子，选才宗师。涿郡涿县人，东汉名儒卢植之子。他年幼丧父，却能刻苦自励，博学多才，深得曹操赏识。他历仕曹魏三朝，官至司空，是朝廷重臣。他最大的贡献在于主持吏部选拔官员，制定了一套严格的考核标准。他反对单凭名声取士，提出"名不足以致才"的观点，强调实际能力和品德并重。
    growth_range:
    - 3
    - 6
    attribute_weights:
      force: 20
      intellect: 40
      defense: 20
      agility: 20
  - key: hist_sljnbc_0223
    name: 崔林
    default_gender: male
    archetype: civil
    flavor: （？—244年）大器晚成，清河名臣。清河东武城人，名臣崔琰的从弟。他年轻时不善言辞、不务交游，在家族中默默无闻，众人皆以为他资质平庸。唯有堂兄崔琰独具慧眼，断言他日后必成大器。果不其然，他进入仕途后勤勉尽责，政绩斐然。他历任多郡太守，所到之处百姓安居、政通人和。曹魏建国后他步步高升，最终官至司空，位列三公，是曹魏朝廷的元老重臣。
    growth_range:
    - 3
    - 6
    attribute_weights:
      force: 20
      intellect: 40
      defense: 20
      agility: 20
  - key: hist_sljnbc_0224
    name: 杜袭
    default_gender: male
    archetype: civil
    flavor: （？—？）坚守关中，安民良臣。颍川定陵人，少有才名。他追随曹操多年，以善于治理地方著称。他曾随夏侯渊镇守汉中，面对刘备大军压境的危急局势，他沉着应对，安抚恐慌的百姓有序撤离，避免了更大的损失。汉中虽失，百姓得保，曹操嘉其功而不责其过。此后他长期担任留府长史，负责关中军政后勤事务。
    growth_range:
    - 3
    - 6
    attribute_weights:
      force: 20
      intellect: 40
      defense: 20
      agility: 20
  - key: hist_sljnbc_0225
    name: 卫臻
    default_gender: male
    archetype: civil
    flavor: （？—？）清高名臣，淡泊明志。陈留襄邑人，其父卫兹是曹操起兵时的重要资助者，为曹操事业立下奠基之功。他继承父业入仕曹魏，凭借自身才干步步高升，官至司徒，位列三公。他为人清正廉洁，生性淡泊名利。朝廷多次加封他土地食邑，他皆辞让不受，认为已有之禄足以养家，不愿贪求过多。曹叡曾亲自赐他珍宝财物，他也婉言谢绝。
    growth_range:
    - 3
    - 6
    attribute_weights:
      force: 20
      intellect: 40
      defense: 20
      agility: 20
  - key: hist_sljnbc_0226
    name: 杜夔
