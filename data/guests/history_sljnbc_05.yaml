  - key: hist_sljnbc_0209
    name: 谯周
    default_gender: male
    archetype: civil
    flavor: （201年—270年）劝降刘禅，争议人物。巴西西充人，蜀中大儒，博学多才。他反对姜维连年北伐，著《仇国论》力陈穷兵黩武之害，主张休养生息。邓艾偷渡阴平、兵临成都时，他力排众议劝说刘禅投降，言辞恳切："若陛下降魏，魏必裂土封王；若战败被俘，恐无此待遇矣。"刘禅从之，蜀汉遂亡。
    growth_range:
    - 3
    - 6
    attribute_weights:
      force: 20
      intellect: 40
      defense: 20
      agility: 20
  - key: hist_sljnbc_0210
    name: 唐咨
    default_gender: male
    archetype: military
    flavor: （？—？）三易其主，浮沉乱世。利城人，原为曹魏将领。利城叛乱事败后，他不甘坐以待毙，率部浮海逃往东吴避难。孙权收留他并委以重任，他遂为东吴效力多年，多次参与对魏作战。诸葛诞于淮南起兵反司马氏时，东吴派他率军援助。寿春城破，他力战被俘，再次回到魏国。司马昭惜其才干，非但不杀，反而任命他为安远将军，此后他在魏晋仕途顺遂，官至高位。
    growth_range:
    - 3
    - 6
    attribute_weights:
      force: 34
      intellect: 12
      defense: 40
      agility: 14
  - key: hist_sljnbc_0211
    name: 暨艳
    default_gender: male
    archetype: civil
    flavor: （？—224年）东吴吏治改革者，吴郡人，性刚直有才名。任选曹郎后严核官吏，罢黜贪污庸懦，短期内整肃风气，触动江东豪族利益，群起攻讦。孙权权衡局势，以“用刑太重”罪之，迫其自尽。其人以清峻著称，毁誉参半，却也映照改革之难与世族之强。其政令峻急，虽整肃一时，亦使怨气积聚，终为时势所弃。
    growth_range:
    - 3
    - 6
    attribute_weights:
      force: 14
      intellect: 54
      defense: 24
      agility: 8
  - key: hist_sljnbc_0212
    name: 司马玮
    default_gender: male
    archetype: military
    flavor: （271年—291年）楚王，少年枭雄。晋武帝司马炎之子，封楚王，年少时便以果敢勇武著称。惠帝即位后，皇后贾南风欲铲除辅政大臣杨骏和汝南王司马亮，遂利用他的野心和武力。他奉密诏起兵，杀杨骏、司马亮，一时权倾朝野。然而贾南风只是把他当作刀子使，事成之后立刻翻脸，以"矫诏擅杀大臣"的罪名将其逮捕处死。
    growth_range:
    - 3
    - 7
    attribute_weights:
      force: 40
      intellect: 15
      defense: 23
      agility: 22
  - key: hist_sljnbc_0213
    name: 司马冏
    default_gender: male
    archetype: military
    flavor: （？—302年）齐王，功成身败。晋武帝侄孙，封齐王。赵王司马伦篡位称帝后，他联合成都王司马颖、河间王司马颙起兵讨伐，三王之兵势如破竹，司马伦兵败被杀。他以首倡之功入朝辅政，权倾天下。然而权力的滋味让他迅速堕落——他骄奢淫逸，大兴土木，任人唯亲，荒废政事，俨然又一个司马伦。
    growth_range:
    - 3
    - 7
    attribute_weights:
      force: 40
      intellect: 15
      defense: 23
      agility: 22
  - key: hist_sljnbc_0214
    name: 邢邵
    default_gender: male
    archetype: civil
    flavor: （496年—?）北朝文宗，才高气傲。河间鄚人，出身名门，自幼聪慧过人，过目不忘，日诵万言。他与魏收、温子昇并称"北地三才"，是北朝文坛的领袖人物。他文风典雅华丽，诗赋俱佳，深受时人推崇。他与魏收在文坛上既是对手也是知音，二人常互相品评作品、切磋文艺，留下许多佳话。他为人恃才傲物，不拘礼法，常有惊人之语。
    growth_range:
    - 3
    - 6
    attribute_weights:
      force: 8
      intellect: 64
      defense: 18
      agility: 10
  - key: hist_sljnbc_0215
    name: 魏收
    default_gender: male
    archetype: civil
    flavor: （507年—572年）秽史之名，才气纵横。钜鹿下曲阳人，出身世家大族。他博学多才，文笔华美，与邢邵、温子昇并称"北地三才"，是北齐文坛的翘楚。他奉诏撰写《魏书》，记录北魏一代历史。然而他公报私仇，对与自己有过节者多加贬损，对贿赂自己者则曲笔回护，致使此书褒贬失当、真假混杂，被后世史家诟病为"秽史"。
    growth_range:
    - 3
    - 6
    attribute_weights:
      force: 8
      intellect: 64
      defense: 18
      agility: 10
  - key: hist_sljnbc_0216
    name: 侯莫陈悦
    default_gender: male
    archetype: military
    flavor: （？—534年）杀害良将，众叛亲离。代郡人，鲜卑族，北魏末年将领。他原与贺拔岳同为关中军阀，二人共守西北边疆。然而他嫉妒贺拔岳才干声望，遂受权臣高欢密令，设宴诱杀贺拔岳于军营之中。此举令关中将士群情激愤，贺拔岳旧部推举宇文泰为新主帅，誓师复仇。宇文泰率军来攻，他众叛亲离，部下纷纷倒戈。
    growth_range:
