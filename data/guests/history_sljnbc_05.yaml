  - key: hist_sljnbc_0208
    name: 黄皓
    default_gender: male
    archetype: civil
    flavor: （？—？）蜀汉佞幸，亡国祸首。他是后主刘禅身边最宠信的宦官，善于察言观色、阿谀奉承，逐渐把持朝政、操弄权柄。他与姜维势同水火，多次在刘禅面前进谗言，企图削弱姜维兵权。姜维深感威胁，不得不远避沓中屯田以自保。魏军压境时，他听信巫师之言，隐瞒军情不报，致使朝廷错失防御良机。
    growth_range:
