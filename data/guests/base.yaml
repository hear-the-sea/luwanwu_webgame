# 基础门客模板

heroes:
  black:
  - key: base_black_civil
    name: 黑阶学士
    archetype: civil
    flavor: 默默无闻的寒门学子，家境清贫却勤学不辍，白日耕读，夜里挑灯抄书，只盼一朝金榜题名。性情谨慎内敛，善于观察人心与局势，在庄园里默默积累才学与人脉，甘于寂寞也不失清骨。
    default_gender: unknown
    default_morality: 60
  - key: base_black_military
    name: 黑阶武徒
    archetype: military
    flavor: 赶考途中暂居庄园的游侠，行走江湖多见不平事，剑术虽不张扬却出手稳准。为躲追兵与风雪而落脚此地，白天以护院为生，夜里仍记书卷志向，侠义与求名交织于心。
    default_gender: unknown
    default_morality: 45
  gray:
  - key: base_gray_civil
    name: 灰阶谋士
    archetype: civil
    flavor: 熟读兵书，擅长后勤调度，能将粮草、车马与人手安排得井井有条。为人谨慎稳重，善于计算损耗与行军节奏，遇事不慌，常以细致的筹划补足主帅的锋芒，是队伍里最可靠的内务骨干。
    default_gender: unknown
    default_morality: 65
  - key: base_gray_military
    name: 灰阶兵长
    archetype: military
    flavor: 身经百战的基层军官，起于伍长，历经多次前线血战，懂得以最小代价换取胜利。对士卒体恤有加，善于鼓舞士气，战阵中能稳住军心，退守时亦不忘保全伤兵，深得部下信服。
    default_gender: unknown
    default_morality: 50
  red:
  - key: base_red_military
    name: 占位
    archetype: military
    flavor: 身经百战的基层军官，久历沙场，熟悉各类阵势与敌军习性。做事干脆果断，不尚空谈，常以身先士卒树立威信。虽非名将，却是战线中最坚硬的一环，关键时刻能顶住最凶的冲击。
    default_gender: unknown
    default_morality: 50
