  - key: hero_luo_cheng
    name: 罗成
    archetype: military
    flavor: 银枪白马，骁勇善战，身法迅捷如风，冲阵时如银电贯空。年少英气逼人，却又心思谨慎，擅长以奇招克敌。其名号在沙场上令人闻风，亦有侠义之名流传江湖。出自《隋唐演义》。罗成之所以动人，不只在勇武，更在少年将领对荣誉与情义的执拗守护。
