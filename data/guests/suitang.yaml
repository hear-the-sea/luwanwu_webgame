# 隋唐演义门客

heroes:
  purple:
  - key: hero_qin_shubao
    name: 秦叔宝
    archetype: military
    flavor: 隋唐名将，勇冠三军，战场上敢为先锋，屡立奇功。其人忠义有节，重视军纪与士气，能令部下信服。传闻他守门护民、为民请命，既是猛将也是仁将，声望遍及军中与民间。出自《隋唐演义》。无论成败如何，秦叔宝所面对的战场条件都具有典型性，因此其经验常被后人用作比较案例。
