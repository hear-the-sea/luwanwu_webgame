heroes:
  orange:
  - key: hist_mingqing_0001
    name: 朱元璋
    default_gender: male
    archetype: military
    flavor: （1328年—1398年）大明开国皇帝，明太祖。他从一介布衣起家，在元末群雄割据的乱世中脱颖而出，凭借卓越的军事才能与政治远见，通过“高筑墙、广积粮、缓称王”的战略方针，先后消灭陈友谅、张士诚等强敌，最终定鼎天下，驱逐蒙元，恢复中华。执政期间，他以铁血手腕肃清贪官与功臣，创设卫所制度、废除丞相、确立六部，极大地加强了中央集权。他推行休养生息，兴修水利，奖励垦荒，开创了“洪武之治”。这位从社会最底层登顶权力巅峰的帝王，其奋斗史本身就是一部波澜壮阔的传奇，功过是非虽任后人评说，但其坚韧不拔的意志与重塑华夏秩序的宏伟业绩，足以震撼千古，奠定了大明近三百年的统治基业。
    growth_range:
    - 8
    - 12
    attribute_weights:
      force: 42
      intellect: 18
      defense: 24
      agility: 16
  - key: hist_mingqing_0002
    name: 朱棣
    default_gender: male
    archetype: military
    flavor: （1360年—1424年）明成祖，永乐大帝。他在“靖难之役”中夺取皇位，随后迁都北京，奠定了此后五百年中国的政治格局。在位期间，他是一位雄才大略、极具开拓精神的君主，曾五次亲征漠北，追击蒙古残余势力以巩固北疆；派遣郑和七下西洋，开展远洋外交与交流，宣扬大明威德于海外；主持编纂《永乐大典》，保存了海量的古代文化精华。他统治时期的明朝国力达到巅峰，疆域辽阔，万邦来朝，史称“永乐盛世”。朱棣以其强硬的意志与辉煌的文治武功，将大明帝国推向了世界强权的巅峰，虽然其夺位过程充满争议，但他对中华民族版图的巩固和文化的传承立下了不世之功。
    growth_range:
    - 8
    - 12
    attribute_weights:
      force: 42
      intellect: 18
      defense: 24
      agility: 16
  - key: hist_mingqing_0003
    name: 努尔哈赤
    default_gender: male
    archetype: military
    flavor: （1559年—1626年）清朝奠基者，满洲枭雄。以十三副遗甲起兵，创八旗制，萨尔浒一战奠定后金霸权。他采取“凭尔几路来，我只一路去”的策略大败明军主力。虽然他在宁远之战中受红夷大炮重创后去世，但他建立的军事与行政体制，为大清定鼎中原打下了最坚实的基础。努尔哈赤的一生是满洲民族崛起的缩影，他不仅是一位杰出的军事家，更是满洲文明的塑造者，其推动的满文创制与八旗社会结构，深刻影响了此后三百年的中国历史。其建立的八旗制度，更是清朝统治力量的核心保障。
    growth_range:
    - 8
    - 12
    attribute_weights:
      force: 42
      intellect: 18
      defense: 24
      agility: 16
  - key: hist_mingqing_0004
    name: 玄烨
    default_gender: male
    archetype: civil
    flavor: （1654年—1722年）康熙大帝，被誉为“千古一帝”。他八岁登基，十四岁便展现出非凡胆识智擒鳌拜，从此开启了亲政之路。此后数十年间，他平定三藩之乱、收复台湾、亲征噶尔丹、驱逐沙俄侵略者，文治武功冠绝清朝一代。他不仅是一位杰出的政治家，更博学多才，精通数学、天文、地理，主持编纂了《康熙字典》等宏篇巨制。他在位六十一年，是中国历史上在位时间最长的皇帝，开创了康乾盛世的辉煌基业，将中国古代封建统治推向了一个新的高度。他那种对文明传承的责任感与对疆域完整的守护，使其成为了中国历史上最具影响力和国际知名度的君主之一。
    growth_range:
    - 8
    - 12
    attribute_weights:
      force: 12
      intellect: 58
      defense: 18
      agility: 12
  purple:
  - key: hist_mingqing_0005
    name: 朱瞻基
    default_gender: male
    archetype: civil
    flavor: （1399年—1435年）明宣宗，明朝第五位皇帝，与父亲朱高炽共同开启了“仁宣之治”的黄金时代。他在位期间，重视吏治整顿，裁减冗员，严惩贪墨，使社会经济得到了充分的休养生息。朱瞻基不仅是卓越的政治家，更是杰出的艺术家，擅长绘画、诗词，其画作如《三鼠图》等意趣盎然，被誉为“帝王中的文艺天才”。他主持了郑和最后一次下西洋，并在边境防务上采取稳健收缩策略。虽然他开启了宦官入书堂学习的先例，在一定程度上埋下了中后期宦官干政的伏笔，但在其统治期内，大明帝国呈现出一派四海升平、国库充盈的盛世景观。
    growth_range:
    - 7
    - 10
    attribute_weights:
      force: 12
      intellect: 58
      defense: 18
      agility: 12
  - key: hist_mingqing_0006
    name: 朱佑樘
    default_gender: male
    archetype: civil
    flavor: （1470年—1505年）明孝宗，明朝第九位皇帝，弘治中兴的圣主。他身世坎坷，在宫廷斗争的阴影中奇迹生还。即位后，他笃行俭约，勤于朝政，斥退妖僧佞臣，提拔了一大批耿直清廉的名臣。他开创了“弘治中兴”，是明朝历史上唯一一个践行一夫一妻制的皇帝。孝宗性格宽厚仁慈，甚至对曾经迫害过自己的宦官也多有宽容。他在位期间，社会矛盾得以极大缓和，文化艺术持续繁荣，被历代史学家公认为明代最具仁德之心的明君，其治世之道至今仍受后世推崇，评价其“克勤克俭，励精图治，使民安居乐业”。
    growth_range:
    - 7
    - 10
    attribute_weights:
      force: 12
      intellect: 58
      defense: 18
      agility: 12
  - key: hist_mingqing_0007
    name: 朱厚熜
    default_gender: male
    archetype: civil
    flavor: （1507年—1567年）嘉靖皇帝，明朝第十一位皇帝，也是极具争议的“道士皇帝”。他通过“大礼议”事件成功压制了文官集团，展现出极强的政治手腕与控制欲。执政前期，他曾励精图治，推行多项改革，打击门阀特权；执政中后期则深居西苑，沉溺于斋醮修仙，长达二十余年不上朝，却依然能够通过内阁严嵩等大臣牢牢掌控朝纲，展现了惊人的帝王御下术。他的一生充满矛盾，既有“嘉靖中兴”的清明，也有倭患横行、海防废弛的乱象。嘉靖帝是封建皇权演化中的异数，其独特的统治风格与对权力的极致追求，对明朝中后期的历史走向产生了深远影响。
    growth_range:
    - 7
    - 10
    attribute_weights:
      force: 12
      intellect: 58
      defense: 18
      agility: 12
  - key: hist_mingqing_0008
    name: 朱翊钧
    default_gender: male
    archetype: civil
    flavor: （1563年—1620年）万历皇帝，明朝在位时间最长的君主。执政初期，他在首辅张居正的辅佐下推行“万历中兴”，国库充盈，边防巩固，大明国势一度回升。亲政后，他指挥了著名的“万历三大征”，巩固了疆域并保卫了属国朝鲜，展示了大明帝国最后的战略威慑力。然而，随着与文官集团在“国本之争”中的决裂，他开启了长达三十年的怠政时期，史称“万历怠政”。虽然他在宫中依然掌控全局，但由于行政效率低下、官场派系斗争、满洲力量兴起及财政枯竭，使大明开始走向不可挽回的衰落。史书评价“明之亡，实亡于万历”。
    growth_range:
    - 7
    - 10
    attribute_weights:
      force: 12
      intellect: 58
      defense: 18
      agility: 12
  - key: hist_mingqing_0009
    name: 朱由检
    default_gender: male
    archetype: military
    flavor: （1611年—1644年）崇祯皇帝，明朝的亡国之君。他十六岁即位，以雷霆万钧之势铲除阉党魏忠贤，试图重振纲纪。他一生勤政节俭，宵衣旰食，在位十七年从未懈怠，却面对着前朝积攒下来的千疮百孔：辽东战事糜烂、中原流寇横行、连年大旱饥荒。他性格多疑，频繁更换首辅，且错杀良将袁崇焕，导致边防形势进一步恶化。崇祯十七年，李自成大军压境，他在煤山自缢，留下了“朕凉德藐躬，上干天咎”的绝笔。他在崩坏局势中试图自救，有着守社稷、殉江山的决心，却终无回天之术，其勤勉与悲剧终局成为了中国历史上最令人感叹的篇章之一。
    growth_range:
    - 7
    - 10
    attribute_weights:
      force: 42
      intellect: 18
      defense: 24
      agility: 16
  - key: hist_mingqing_0010
    name: 姚广孝
    default_gender: male
    archetype: civil
    flavor: （1335年—1421年）法名道衍，被誉为“黑衣宰相”。他本为出家人，却精通兵法韬略与阴阳术数，是朱棣最为倚重的核心幕僚。在靖难之役中，他坐镇北京调控全局，多次在关键转折点为朱棣出谋划策，是朱棣夺取天下的第一功臣。夺位后，他不居功、不还俗，白昼入朝辅政，晚间回归僧寮，表现出超然物外的政治智慧。他主持迁都北京，并担任《永乐大典》和《明太祖实录》的最高负责人。姚广孝的一生充满了神秘色彩，是能将出世之学与入世之功完美结合的奇人，死后配享太庙，荣宠至极，其智慧与节操深受后世政治家与文人的敬仰。
    growth_range:
    - 7
    - 10
    attribute_weights:
      force: 12
      intellect: 58
      defense: 18
      agility: 12
  - key: hist_mingqing_0011
    name: 王守仁
    default_gender: male
    archetype: civil
    flavor: （1472年—1529年）阳明先生，中国历史上罕见的“真三不朽”圣人。他在贵州龙场悟道，创立了影响深远的“心学”体系，提出“致良知”与“知行合一”，打破了程朱理学的长期禁锢。王阳明不仅是伟大的哲学家，更是用兵如神的统帅。他平定宁王叛乱，仅用三十五天便生擒逆魁；剿灭南赣匪患时，其奇谋妙计令敌胆寒。他的一生践行了“此心光明”的最高境界。其学说远播日韩，成为明治维新等重大历史变革的思想源泉。他那种将内心修行与社会实践高度统一的人格力量，至今依然是无数人追求的精神标杆。
    growth_range:
    - 7
    - 10
    attribute_weights:
      force: 12
      intellect: 58
      defense: 18
      agility: 12
  - key: hist_mingqing_0012
    name: 刘基
    default_gender: male
    archetype: civil
    flavor: （1311年—1375年）字伯温，明朝开国第一功臣，被民间誉为“诸葛亮转世”。他博通经史，尤精天文兵法，在朱元璋起兵初期为其制定了“先陈后张”的战略方针，助其在鄱阳湖之战中火攻摧毁陈友谅的百万水军。他运筹帷幄之中，决胜千里之外，为明朝江山的建立立下汗马功劳。民间流传的《烧饼歌》将其形象神化为未卜先知的先知。正如俗语所言“三分天下诸葛亮，一统江山刘伯温”，这位浙东才子以超凡智慧成就了草莽英雄的帝业。他在政治上倡导严明法度，虽晚年深陷政治旋涡，但其智慧与功勋永远闪耀。
    growth_range:
    - 7
    - 10
    attribute_weights:
      force: 12
      intellect: 58
      defense: 18
      agility: 12
  - key: hist_mingqing_0013
    name: 张居正
    default_gender: male
    archetype: civil
    flavor: （1525年—1582年）万历朝首辅，明代最重要的政治家与改革家之一。他在大明王朝由盛转衰的关键时期毅然拜相，以雷霆万钧之势推行“一条鞭法”与“考成法”，铁腕整顿吏治，清丈全国田亩，使濒临崩溃的大明财政重新充盈，国库积银达千万两之巨。他在任十年间，边境安宁，赋役均平，史称“万历中兴”。张居正独揽大权，刚愎任事，虽然在身后遭遇了残酷的清算，但其改革成果为大明强行续命数十年。若无居正，明室之亡恐提早半个世纪。他的一生是关于权臣在孤注一掷中拯救帝国的壮丽悲歌，被后世尊为“救时宰相”。
    growth_range:
    - 7
    - 10
    attribute_weights:
      force: 12
      intellect: 58
      defense: 18
      agility: 12
  - key: hist_mingqing_0014
    name: 胤禛
    default_gender: male
    archetype: civil
    flavor: （1678年—1735年）雍正皇帝，以勤政与铁腕改革著称。他在位期间针对康熙晚年的积弊，推行摊丁入亩、火耗归公、改土归流等改革，从根本上减轻了贫民负担并充实了国库。他设立军机处以极度强化皇权，推行密折制度广开言路。雍正帝每日处理政务达十余小时，留下的朱批奏折字数竟逾千万，堪称历史上最劳模的皇帝。他在位仅十三年，却成功扭转了官场腐败的颓势，为乾隆时期的巅峰繁荣奠定了坚实基础，是清代由乱转治的关键。其性格冷峻严苛，但其政绩利在千秋，被评价为“得国最正，社稷之臣”。
    growth_range:
    - 7
    - 10
    attribute_weights:
      force: 12
      intellect: 58
      defense: 18
      agility: 12
  - key: hist_mingqing_0015
    name: 弘历
    default_gender: male
    archetype: civil
    flavor: （1711年—1799年）乾隆皇帝，清朝的盛世之君。他在位六十年，实际执掌帝国权力长达六十三年，将康乾盛世推向了最高峰。他自号“十全老人”，平定准噶尔、收复大小和卓，确立了清朝对西域的统治。文化上，他主持纂修了《四库全书》，汇集了中华古典文明的精髓。乾隆时期的中国，疆域辽阔，人口激增，国力与经济规模居世界前列。然而，他晚年宠信大贪官和珅，官场风气渐趋奢靡，闭关锁国政策也使中国逐渐落后于工业革命浪潮。乾隆一朝既是古典文明最灿烂的余晖，也埋下了晚清衰败的伏笔。
    growth_range:
    - 7
    - 10
    attribute_weights:
      force: 12
      intellect: 58
      defense: 18
      agility: 12
  - key: hist_mingqing_0016
    name: 福临
    default_gender: male
    archetype: civil
    flavor: （1638年—1661年）顺治皇帝，入关首帝。他在多尔衮死后亲政，极力缓和民族矛盾，重用汉臣，崇尚汉文化。顺治帝是一位情感细腻、富有人文情怀的君主，他在位期间致力于巩固清朝在中原的统治基础。然而，面对宫廷内部的权力斗争与皇后的离世，他逐渐产生厌世之心，致力于钻研佛学。顺治帝在位仅十八年，却为后来的康乾盛世奠定了初步的政治框架。关于其最后是因天花崩逝还是五台山出家的民间传说，更为这位年轻帝王增添了一抹神秘的悲剧色彩。他的一生是满洲统治者试图融入中原主流文化的艰难而动人的尝试。
    growth_range:
    - 7
    - 10
    attribute_weights:
      force: 12
      intellect: 58
      defense: 18
      agility: 12
  - key: hist_mingqing_0017
    name: 皇太极
    default_gender: male
    archetype: military
    flavor: （1592年—1643年）清太宗，清朝杰出的军事统帅与真正的开国总设计师。他改国号为“大清”，并通过一系列制度改革，大量任用汉臣与蒙臣，将原本松散的部落联盟改造为高度集权的帝国。皇太极不仅继承了父亲努尔哈赤的勇武，更展现出卓越的政治家胸怀与远见。他六次亲征漠南蒙古，征服朝鲜，并多次统兵绕过关宁锦防线突袭明朝关内，沉重打击了大明国力。他在沈阳病逝，虽未亲见清军定鼎北京，但其建立的政治体制与民族政策是清朝能够稳固统治中原近三百年的核心根基。他善于权谋，通过反间计除掉袁崇焕，展现了极深的政治城府。他那种深知中原文化重要性并果断吸纳整合的能力，使其成为满洲历史上最伟大的领袖之一。
    growth_range:
    - 7
    - 10
    attribute_weights:
      force: 42
      intellect: 18
      defense: 24
      agility: 16
  - key: hist_mingqing_0018
    name: 多尔衮
    default_gender: male
    archetype: military
    flavor: （1612年—1650年）清初著名的政治家、军事家，清军入关并定鼎中原的灵魂人物。在明清易代的历史关头，他果断联合吴三桂于山海关大败大顺军，随后亲率清军占领北京并统一北方。作为摄政王，多尔衮权势滔天，实际掌握着大清帝国的最高权力。他主持了“剃发易服”等严酷政策，虽然激起了汉人的广泛反抗，但在军事上他迅速横扫江南各省，确立了清朝在全国的统治地位。多尔衮的一生是力量与意志的极端体现，他以果断且往往冷酷的决策决定了十七世纪中国的版图走向。尽管他在死后一度遭到顺治帝的政治清算，但无可否认其作为大清江山第一功臣的显赫历史地位。他那种顶级军事才干与现实主义政治手腕的结合，使其成为了那个时代的风云人物。
    growth_range:
    - 7
    - 10
