    archetype: civil
    flavor: 名字虽怪，却是个长相甜美可爱、性格刁蛮任性的神秘少女。她是宫九的表妹，也是他最亲近的人，深知这位"太平王世子"的诸多秘密与弱点。在孤岛上的日子里，她对陆小凤软硬兼施，亦敌亦友，让人捉摸不透。她看似天真烂漫，实则心思细腻，城府极深。她不仅厨艺了得，武功也不容小觑。她是这场惊天阴谋中一抹让人看不透的亮色，也是宫九疯狂世界里唯一的"常人"。出自古龙小说《陆小凤系列》
