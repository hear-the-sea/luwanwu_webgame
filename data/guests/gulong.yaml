  - key: hero_zhuge_lei
    name: 诸葛雷
    archetype: military
    flavor: 江湖人称“急风剑”，金狮镖局的镖头。他以剑招狠辣迅捷威震河朔一带，此次负责护送武林至宝“金丝甲”。他为人色厉内荏，行事霸道，习惯了在江湖底层作威作福。然而，在风雪客栈中，他遭遇了初出茅庐的少年阿飞。面对阿飞那快如闪电的一剑，他自负的平生绝技竟毫无施展之地，连一招都未能递出便被那柄简陋的铁片贯穿咽喉。他的一生与性命，最终只沦为这残酷江湖中，见证“快剑”阿飞横空出世的第一块踏脚石，可悲又可叹。出自古龙小说《多情剑客无情剑》
