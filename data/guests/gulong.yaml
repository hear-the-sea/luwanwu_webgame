  - key: hero_long_xiaoyun
    name: 龙啸云
    archetype: civil
    flavor: 兴云庄庄主，李寻欢的结拜大哥。他相貌堂堂，更是江湖中出了名的好汉，表面上仁义道德、急公好义，实则是个心胸狭隘、自私自利的伪君子。当年他救了李寻欢一命，却利用李寻欢的重情重义，夺走了其挚爱林诗音。为了保住自己的名声和地位，他多年来一直生活在对李寻欢的愧疚与嫉妒交织的阴影中，最终不仅设计陷害李寻欢，甚至不惜勾结外敌。他的虚伪与算计最终让他众叛亲离，在儿子面前身败名裂，是一个典型的被嫉妒扭曲了灵魂的悲剧人物。出自古龙小说《多情剑客无情剑》
