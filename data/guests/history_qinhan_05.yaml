  - key: hist_qinhan_0200
    name: 司马欣
    default_gender: male
    archetype: military
    flavor: （生年不详—前204年）秦末将领。秦帝国崩解后，他与章邯、董翳等一度归楚，后又被项羽分封为塞王，终在楚汉战争推进中覆亡。司马欣常被写成“反复易主”的人，但更贴近现实的解释，是他所处的环境根本不允许“守一主而终”：军心要粮，粮道要地盘，地盘要名分，而名分在秦亡后反复改写。对这类旧秦将领来说，选择往往不是忠义辩论，而是补给与生存的算术；算错一步，就会被新秩序当作必须清理的旧账。
    growth_range:
