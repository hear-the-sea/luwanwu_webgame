    archetype: military
    flavor: （生年不详—前206年）秦末起义军将领，燕王。原为赵将，被武臣派去徇燕地，被燕人推举为王。项羽分封时仍为燕王，后为藏荼所杀。韩广的经历像一段被推着走的政治短剧：地方需要旗号，便拥他为王；更强的军阀需要地盘，便借分封与武力重新洗牌。他未必没有能力，只是在诸侯并起的赛局里缺乏足够的资源与支持者来守住王位。通过韩广，可以看到秦帝国瓦解后“地方独立”的惯性：权力先从中央滑落到地方，再在地方内部被更强者吞并，所谓王号往往只是权力重新分配时的一层薄壳。
