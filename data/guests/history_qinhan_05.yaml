    - 7
    attribute_weights:
      force: 46
      intellect: 14
      defense: 28
      agility: 12
  - key: hist_qinhan_0201
    name: 周苛
    default_gender: male
    archetype: military
    flavor: （生年不详—前204年）汉初将领，事迹多见于楚汉相持阶段的守城与军务。史书对周苛记载不繁，却能看出他更像“把前线撑住的人”：守城意味着挨打、断粮、处理士卒恐慌，也意味着要把粮运、军令与城中秩序拧成一股绳。周苛被俘遇害的结局，让他的名字停在一个残酷瞬间——战争最危险的岗位往往不是冲锋，而是把一座城、一条线拖到援军赶来之前。写周苛，就是把目光投向楚汉战争中被忽略的耐力与代价。
    growth_range:
    - 3
    - 7
    attribute_weights:
      force: 46
      intellect: 14
      defense: 28
      agility: 12
  - key: hist_qinhan_0202
    name: 董翳
    default_gender: male
    archetype: military
    flavor: （生年不详—前204年）秦末将领。秦亡后随局势转入项羽阵营，被分封为翟王，旋即在楚汉战争中被吞没。董翳的历史位置并不在于耀眼战功，而在于他替我们展示“封王”在乱世里究竟有多脆：名号来自强者的一纸分配，地盘却要靠军队、粮道与地方支持去兑现；而这些条件一旦被更强的对手切断，王号就会像薄冰一样碎掉。董翳的覆亡，说明项羽的分封体系既能快速安置功臣，也会制造一批无根的短命政权，最终把战场推向更猛烈的整合。
    growth_range:
    - 3
    - 7
    attribute_weights:
      force: 46
      intellect: 14
      defense: 28
      agility: 12
  - key: hist_qinhan_0203
    name: 项伯
    default_gender: male
    archetype: civil
    flavor: （生年不详—前192年）项羽宗族成员，鸿门宴时与张良旧交关系使他成为关键斡旋者。史书多写他“救刘邦”的一段，却更值得注意他所体现的楚汉人际结构：宗族是安全网，门客与旧交又是另一张网，两张网有时会互相抵牾。楚汉胜负未定时，项伯既要面对宗族立场，也要面对个人关系与自保判断；而战后归汉受封，则说明个人选择可以被新王朝吸收、转化为政治资源。项伯并不伟岸，也不纯粹，他的灰度正是乱世真实：人并非只在旗帜下行动，也在关系与恐惧里行动。
    growth_range:
    - 3
    - 7
    attribute_weights:
      force: 14
      intellect: 48
      defense: 22
      agility: 16
  - key: hist_qinhan_0204
    name: 项庄
    default_gender: male
    archetype: military
    flavor: （生卒年不详）项羽宗族成员，“项庄舞剑”让他几乎只剩一个政治场景。鸿门宴上舞剑并非单纯表演，而是一种把杀机嵌进礼仪的试探：若刺成，局势立刻翻盘；若刺不成，至少能逼对手露出护卫与同盟。项庄在这场戏里的尴尬，是他并非决策者，却要替决策者承担出手的风险；成则是主帅的功，败则容易成为“执行不力”的替罪羊。写项庄，不必把他神化成刺客，也不必把他贬成莽汉，他更像权力斗争里被推出去的手：刀锋属于他，动机却未必属于他。
    growth_range:
    - 3
    - 7
    attribute_weights:
      force: 46
      intellect: 14
      defense: 28
      agility: 12
  - key: hist_qinhan_0205
    name: 冯立
    default_gender: male
    archetype: civil
    flavor: （生卒年不详）西汉官员，常被认为出自冯奉世家族。与许多郡守、太守一样，他在史书中的篇幅并不多，却恰好能反映地方官的真实职责：治安、赋役、边防与民生往往缠成一团，既要对上承命，也要对下安众。关于冯立的具体政绩，史载多零散，不记宏大功业，而多落在“为政勤恳、能理郡县”这一类评价上。把他放进西汉晚期的政治环境里看，一个名门之后能否立住脚，靠的不只是门第，还要在粮食、徭役与基层吏治这些最容易惹怨的事务上做出平衡。
    growth_range:
    - 3
    - 7
    attribute_weights:
      force: 14
      intellect: 48
      defense: 22
      agility: 16
  - key: hist_qinhan_0206
    name: 刘德
    default_gender: male
    archetype: civil
    flavor: （生年不详—前130年）西汉河间献王，汉景帝之子，以好学与藏书著称。史载他广求古籍，收集秦火之后散佚的经典文献，并延揽学者讲习，留下“修学好古，实事求是”的名句。对刘德而言，藩王的价值不只在兵赋与封国，更在文化资源的聚拢与保存：当中央政治关注征伐与财政时，地方王国反而可能成为典籍流转的“缓冲带”。后世儒生推重河间献王，正因为他的选择让许多文本得以续命。把刘德放回西汉学术史看，他不是抽象的“爱书之王”，而是把个人兴趣转化为制度性文化成果的少数宗室之一。
    growth_range:
    - 3
    - 7
    attribute_weights:
      force: 14
      intellect: 48
      defense: 22
      agility: 16
  - key: hist_qinhan_0207
    name: 刘辟光
    default_gender: male
    archetype: civil
    flavor: （生年不详—前154年）西汉济南王，齐王刘肥之子。七国之乱中，齐地诸王起兵反抗削藩政策，刘辟光亦卷入其间，但济南国地小势弱，在诸侯阵营里难以形成主导力量。战事一开，中央军迅速推进，齐地内部的协同又并不牢固，弱藩往往最先承受冲击；史载济南国旋即覆亡，刘辟光被杀，封国被除。刘辟光的命运提示，七国之乱并非只有强藩与中央的对抗，也是一场对“分封体系承载力”的淘汰：强者赌一次，弱者往往没有赌桌，只能在大势里被碾碎。通过他，能更清楚地看到削藩与平乱对诸侯生态的重塑是如何发生的。
    growth_range:
    - 3
    - 7
    attribute_weights:
      force: 14
      intellect: 48
      defense: 22
      agility: 16
  - key: hist_qinhan_0208
    name: 吴芮
    default_gender: male
    archetype: civil
    flavor: （生年不详—前202年）秦汉之际地方势力人物，秦时为番阳令，秦末响应反秦并转而支持刘邦，后受封长沙王。吴芮的特殊性在于他所在的南方区域与中原政治并不同步：中央更替频繁，而地方更看重能否安抚人心、维持秩序与整合族群。史载吴芮在汉初异姓王中得以相对善终，长沙国亦能延续数世，说明他在“向中央表忠”与“在地方立足”之间找到了可持续的平衡。后世对其评价常带地域记忆色彩，但从历史机制看，吴芮更像汉初国家扩张的一个接口：通过承认地方领袖并纳入封国体系，帝国才能把南方渐渐接入统一的政治版图。
    growth_range:
    - 3
    - 7
    attribute_weights:
      force: 14
      intellect: 48
      defense: 22
      agility: 16
  - key: hist_qinhan_0209
    name: 咸宣
    default_gender: male
    archetype: civil
    flavor: （生卒年不详）西汉酷吏，河东人。以佐史起家，执法果断，无所顾忌。在镇压南越叛乱中负责军务。任左内史时，法令严苛，杀伐决断，使治安一度大治，但也因手段残忍而遭批评。后因小罪被杀。他的形象常被归入“酷吏”传统：在中央需要迅速整肃地方、压制豪强的阶段，这类官员能把命令变成恐惧与服从，但也最容易成为众怨的汇聚点。咸宣最终被处死，恰好照出酷吏政治的悖论——国家借其锋利行事，风向一转又往往先拿这把刀开刀。
    growth_range:
    - 3
    - 7
    attribute_weights:
      force: 14
      intellect: 48
      defense: 22
      agility: 16
  - key: hist_qinhan_0210
    name: 张欧
    default_gender: male
    archetype: civil
    flavor: （生卒年不详）西汉司法系统中的刑法官员，史传所记不多，却留下“能守法而不嗜杀”的印象。两汉断狱强调律令与程序，现实中又常受政治压力、豪强势力牵动；在这样的环境里，所谓仁厚并不等于纵容，而是能在法条允许的范围内尽量减少滥刑，避免把惩罚变成情绪与威慑的工具。张欧的价值恰在于提供一种对照：汉代并非只有酷吏的冷峻面貌，也存在愿意把法度当作边界而非武器的官员。通过他，可更具体地理解“法治”在帝国政治中的两层含义——既要可执行，也要可被承受。
    growth_range:
    - 3
    - 7
    attribute_weights:
      force: 14
      intellect: 48
      defense: 22
      agility: 16
  - key: hist_qinhan_0211
    name: 徐福
    default_gender: male
    archetype: civil
    flavor: （生卒年不详）秦代方士，见于求仙入海的传说体系。史载他以海外有仙山、可得不死药为说，受秦始皇遣发入海，终不复返；其后故事在民间不断增饰，衍生出“平原广泽”等去向说法，甚至与海外开拓、移民传播联系在一起。对徐福这类人物，较稳妥的读法是把他放回秦帝国的政治心理：统一后的统治者对寿命、神异与控制边界的执念，催生了方士的舞台，也暴露了权力对未知的焦虑。徐福在史与传之间游走，恰好提醒我们区分“史实可证”与“文化想象”，而两者都能折射时代气氛。
    growth_range:
    - 3
    - 7
    attribute_weights:
      force: 14
      intellect: 48
      defense: 22
      agility: 16
  - key: hist_qinhan_0212
    name: 李息
    default_gender: male
    archetype: civil
    flavor: （生卒年不详）西汉将领，史载其在景帝、武帝时期的军事行动中多有参与，但具体功绩不如卫青、霍去病那般被集中书写。也正因此，李息更适合作为“中坚将领”的样本：帝国长期对外用兵，需要大量不以奇功扬名、却能在边地驻防、行军转运与协同作战中稳住阵脚的人。许多战役的胜负并不只取决于名将的一击，更取决于这些将领能否把兵员、粮道与地方势力协调起来。关于李息的细节史载不一，宜谨慎分辨，但他的存在本身已说明两汉武功背后有一条被忽略的骨架——不耀眼却不可缺。理解李息，便能更贴近汉代军事机器如何在日复一日的消耗中维持运转。
    growth_range:
    - 3
    - 7
    attribute_weights:
      force: 14
      intellect: 48
      defense: 22
      agility: 16
  - key: hist_qinhan_0213
    name: 薄姬
    default_gender: female
    archetype: civil
    flavor: （生年不详—前155年）汉高祖嫔妃，汉文帝之母。史载她早年辗转于诸侯之间，后入汉宫，因不甚受宠反而在吕后掌权的风暴里得以保全。随子刘恒居代国的经历，使薄姬的形象更接近“隐忍而长久”：她不以权谋争宠，却能在边远封国中守住家族与子嗣的安全。刘恒即位后尊为皇太后，史书多写其性情宽厚，少干预政务，这种“退而不争”并非软弱，而是汉初后宫在血腥斗争之后形成的一种自保智慧。薄姬的故事提醒我们，宫廷里最强的生存策略有时不是显赫，而是把锋芒收起，把时间熬过去。
    growth_range:
    - 3
    - 7
    attribute_weights:
      force: 14
      intellect: 48
      defense: 22
      agility: 16
  - key: hist_qinhan_0214
    name: 贾逵
    default_gender: male
    archetype: civil
    flavor: （30年—101年）东汉经学家、天文学家，字景伯。他是贾谊的九世孙，身长八尺二寸，博通五经。汉章帝时，他作《左氏长义》献上，极力辩驳今文经学，推动了古文经学在东汉的发展，其学术成就与郑兴父子并称。他还精通天文历法，主张用黄道坐标测量日月运行，并提出了月行快慢与近地点有关的理论，这在当时是极具开创性的发现。
    growth_range:
    - 3
    - 7
    attribute_weights:
      force: 14
      intellect: 48
      defense: 22
      agility: 16
  - key: hist_qinhan_0215
    name: 郅支
    default_gender: male
    archetype: civil
    flavor: （生年不详—前36年）匈奴单于，呼韩邪之兄，西域史叙事中的强势对手。郅支与汉廷、乌孙等势力的冲突，体现草原政权内部竞争如何外溢到西域：为了争夺盟友与通道，他试图在西方建立据点，控制交通与属国，手段强硬，因而引发多方反感与联合。史载其最终被陈汤、甘延寿远征击败并诛杀，成为汉朝在西域影响力上升的重要节点。郅支的故事并非简单“蛮夷与中华”的对立，而是一场多方博弈：匈奴内部的分裂、汉廷的机会主义、属国的自保选择共同塑造了结局。通过郅支，可以更清楚地看到西域从来不是边缘，而是各方权力交汇的核心地带。
    growth_range:
    - 3
    - 7
    attribute_weights:
      force: 14
      intellect: 48
      defense: 22
      agility: 16
  - key: hist_qinhan_0216
    name: 钩弋夫人
    default_gender: female
    archetype: civil
    flavor: （生年不详—前88年）汉武帝晚年宠妃，赵婕妤。关于“握拳得玉钩”的来历多带传奇色彩，但她在史书中的关键意义并不在神异，而在继承政治：她生子刘弗陵，牵动武帝晚年的储位安排。武帝以吕后旧事为戒，担忧“子少母壮”导致外戚专权，遂出现赐死母亲以保幼主的残酷做法。钩弋夫人的命运因此成为后宫与国政硬碰硬的一个极端节点：个人得宠并不等于安全，甚至可能因“生在正确的时机”而更危险。她的故事把皇权继承的冷逻辑赤裸地摆在眼前——情感让位于结构，生命让位于防范。
    growth_range:
    - 3
    - 7
    attribute_weights:
      force: 14
      intellect: 48
      defense: 22
      agility: 16
  - key: hist_qinhan_0217
    name: 魏应
    default_gender: male
    archetype: civil
    flavor: （生卒年不详）东汉经学家，史载曾任侍中，学术取向与《诗》学相关。与郑玄等名家相比，魏应的材料较少，但这类“在朝讲经、在职论礼”的学者恰好说明东汉尊儒并非抽象口号：经典解释需要有人进入官僚体系，将章句与制度问题对接，礼乐、仪制、教育等事务都离不开经学框架。魏应的价值更多体现在这种连接作用——他既是学术共同体的一员，也是在宫廷中提供解释资源的技术官僚。史料简略并不意味着无足轻重，反而提醒我们：两汉文化建设靠的不只是少数巨擘，也靠一批能把经义转成可执行规范的人。
    growth_range:
    - 3
    - 7
    attribute_weights:
      force: 14
      intellect: 48
      defense: 22
      agility: 16
  - key: hist_qinhan_0218
    name: 龚遂
    default_gender: male
    archetype: civil
    flavor: （生年不详—前62年）西汉循吏，字少卿。任渤海太守时，当地饥荒多盗贼。他单车上任，宣布罢除捕盗吏，令盗贼卖剑买牛、卖刀买犊。他劝课农桑，教民耕种，不仅使盗贼平息，且家家富足，“吏民安富”。宣帝召见他，他请求允许自己“治乱绳，不可急”，坚持宽政。龚遂的做法很像“把刀从手上拿走”：先削弱以捕盗为生的吏治惯性，再把人重新拉回生产，让盗贼看到改业也能活下去。对饥荒后的社会而言，恢复信任比加重刑罚更难；而他能以缓政见效，说明循吏的力量往往来自耐心与对民生逻辑的把握。
    growth_range:
    - 3
    - 7
    attribute_weights:
      force: 14
      intellect: 48
      defense: 22
      agility: 16
  - key: hist_qinhan_0219
    name: 丁复
    default_gender: male
    archetype: military
    flavor: （生年不详—前184年）汉初名将，阳都侯。原为赵将，后归刘邦。随军攻打龙且、项羽，立下赫赫战功，在汉初功臣表中名次不低。丁复这类将领的特点，是“打过许多关键仗，却很少留下传奇故事”：史书对他们更多是功名簿式的记载，细节被更显赫者遮蔽。但正是这些中坚人物把一场场硬仗扛下来，才让刘邦集团得以从战场胜利走向制度建国。把丁复放回楚汉战争的军事实务中，他更像可靠的执行者与指挥官：能在混乱局势中保持队伍纪律、完成战术任务，而不是靠个人英雄色彩被记住。
    growth_range:
    - 3
    - 7
    attribute_weights:
      force: 46
      intellect: 14
      defense: 28
      agility: 12
  - key: hist_qinhan_0220
    name: 儿宽
    default_gender: male
    archetype: civil
