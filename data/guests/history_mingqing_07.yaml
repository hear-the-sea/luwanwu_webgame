    flavor: （1621年—1687年）字黄公，号赤方，明末清初著名的学者、诗人。他出身名门，博通经史，尤其在对古代典章制度的研究上具有极深造诣。明亡后他坚守节操，拒绝向新政权靠拢，隐居讲学多年。顾景星的诗歌风格雄浑、充满了对历史兴亡的沉重思考。他在学术上主张经世致用，反对空谈心性。他的一生致力于在民间播撒文化的种子，培养了大量具有民族气节的优秀人才。顾景星那种在名利旋涡中依然能够保持学术纯粹性与精神高度的姿态，使其成为了那一时代士子效法的榜样。他在整理古代文献方面的默默耕耘，为清初学术的延续提供了重要的支持，其人品与才情均得到了历史的一致公认。
