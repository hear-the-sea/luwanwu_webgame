  - key: hist_mingqing_0271
    name: 陆世仪
    default_gender: male
    archetype: civil
    flavor: （1611年—1672年）字道和，号桴亭，明末清初著名的哲学家、教育家。他主张“经世致用”，极其推崇实学，认为读书人应关注天文、地理、水利、兵法等现实技能。陆世仪在学术上坚持程朱理学的本原，同时融入了对社会改良的深刻思考。他在面临明清易代的历史巨变中，坚守节操，隐居江南致力于教育事业，创办了著名的书院，培养了大批具有民族气节与实干精神的学子。他的一生是儒家精神在危局中坚守的缩影。陆世仪那种追求理性的极致、不为世俗利诱所动的性格，展现了中华知识分子最高尚的学术人格。他那种不仅关注文本本身且深度关注社会本质与大众生计的视野，使其成为了那一时代最具感召力的文化领袖之一，其学说对后来的实证学派产生了直接的启发。
    growth_range:
    - 4
    - 7
    attribute_weights:
      force: 12
      intellect: 58
      defense: 18
      agility: 12
  - key: hist_mingqing_0272
    name: 臧琳
    default_gender: male
    archetype: civil
    flavor: （1653年—1733年）字玉琳，号在东，清初著名的经学家、考据学家。他在学术研究中以极其缜密、详尽著称，所著《经义杂记》被誉为乾嘉考据学的先声。臧琳博通经史，尤精于对古代典章制度的微观辨析，他主张学问必建立在确凿的原始文献之上，坚决反对主观臆断。他的一生在极其清贫的环境下坚持科研，展现了对真理不懈追求的精神。他那种跨学科的知识结构与对古代社会运行机制的深刻洞察，使其成为了清初学术界的一位重镇。他不仅复原了文字背后的制度细节，更守护了民族在动荡局势下的一份文化自尊。其学术成果深受后世推崇，是中国古典文化在清代繁荣的重要见证。他那种能够在寂静的书斋中发现历史大逻辑的能力，展现了人类理智在特定领域所能达到的极高水准。
    growth_range:
