  - key: hist_mingqing_0306
    name: 李因笃
    default_gender: male
    archetype: civil
    flavor: （1631年—1692年）字子德，号天生，清初著名的考据学家、音韵学家与诗人。他以博学多才著称，与顾炎武交谊极其深厚，是乾嘉汉学的早期先驱之一。他在音韵学研究上具有神般的洞察力，所著《汉学考》等书为后世理清了古汉语的发展脉络。李因笃治学极其严谨，主张“凡学必有证据，不可妄言”。他在官场中亦能始终保持高洁的清流本色，为人正直、处事圆融。他的一生是传统文人追求学术真理与民族大义完美结合的缩影。他那种不仅关注文本本身且深度关注文字所承载的古代运行机制的视野，使其成为了那一时代学术界的一位重镇。他在文字间构建的理性感，是对文化尊严的有力捍卫。
