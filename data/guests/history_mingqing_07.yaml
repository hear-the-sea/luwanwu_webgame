    - 7
    attribute_weights:
      force: 12
      intellect: 58
      defense: 18
      agility: 12
  - key: hist_mingqing_0266
    name: 惠周惕
    default_gender: male
    archetype: civil
    flavor: （1639年—1712年）字元龙，号研溪，清初著名的经学家，吴派学术的重要开创者。他出身于学术世家，治学以严谨缜密著称，对《易经》与《礼记》有极其深厚的研究。惠周惕在学术上主张回归汉儒传统，强调训诂与义理并重，为后来其子惠士奇、其孙惠栋所发扬光大的吴派学术奠定了坚实的理论家法基础。他在官场中亦能保持清流本色，曾任翰林院编修，致力于国家典籍的整理与地方教育的振兴。他的一生是关于学术传承与文化坚守的动人叙事，其温文尔雅的儒者风范深受士林尊敬。他那种追求学术纯粹性、不为任何世俗利禄所动的定力，展现了中华精英阶层对儒家经典最深沉的祭献与守望，其学问之深，至今仍是相关领域研究的重要标杆。
    growth_range:
    - 4
    - 7
    attribute_weights:
      force: 12
      intellect: 58
      defense: 18
      agility: 12
  - key: hist_mingqing_0267
    name: 阎若璩
    default_gender: male
    archetype: civil
    flavor: （1636年—1704年）字百诗，号潜丘，清初伟大的考据学家、史学家。他以极其严密的科学逻辑与文献排比，历时三十载撰写了震撼学术界的巨著《古文尚书疏证》，通过详实的考证彻底揭示了流传千年的“古文尚书”实为伪作，这一成果标志着清代考据学的正式成熟。阎若璩治学极其极其严谨，主张“凡学必有证据，无征不信”。他在极其清贫的环境下坚持科研，展现了对真相不懈追求的人格力量。他那种敢于挑战权威、追求理性的极致精神，使其成为了中国学术史上的一位里程碑式的人物。他的工作不仅提升了中国古代史学的科学性，也为后来的地理发现与国防建设提供了重要的实证参考，其名字代表了学术诚信与深度的最高结合。
    growth_range:
    - 4
    - 7
    attribute_weights:
      force: 12
      intellect: 58
      defense: 18
      agility: 12
  - key: hist_mingqing_0268
    name: 孙承恩
    default_gender: male
    archetype: civil
    flavor: （1481年—1561年）字贞甫，号毅斋，明代著名的重臣、文学家。他在政治上官至礼部尚书、太子太保，以行政精明干练、为人方正耿直著称。孙承恩在文学创作上造诣极深，尤其在对古代典章制度的诗化描写与历史评论上具有开创之功。他在朝中面对强权与权贵的威胁，始终保持了士大夫的高洁清高，不肯随波逐流。他的一生致力于文化的系统性重构与民族尊严的最后捍卫。孙承恩那种将儒家的现实行政责任与个人的深厚文化修养高度统一的姿态，使其成为了那一时代士大夫阶层的理想样本。他在处理极其复杂的基层行政纠纷与人才考核案件中，表现出的那种清高且不乏智慧的姿态，展现了精英阶层的人格高度。他在学术上对经典的严谨守护，为大明文化的延续提供了重要支持。
    growth_range:
    - 4
    - 7
    attribute_weights:
      force: 12
      intellect: 58
      defense: 18
      agility: 12
  - key: hist_mingqing_0269
    name: 严经
    default_gender: male
    archetype: civil
    flavor: （1789年—1859年）清代著名的学者，地理学家严如熤之侄。他在古代文献整理、版本校勘与地方志编纂方面展现了卓越才干。严经治学极其严谨，主张“凡学必有证据，不可妄言”。他曾受命协助修纂了多部省级通志与水利档案，为研究清代地理演变与民政管理留下了详实且可靠的一手资料。他在官场任职期间为人正直、处事公允，致力于地方吏治的整饬与教育事业的普及。他的一生体现了清代后期文人群体通过极其扎实的实证研究来维护民族文化尊严并直接服务于现实社会治理的努力。他那种跨学科的知识结构与对真理不懈追求的精神，使其成为了那一时代学术界的一位重镇。他不仅复原了文字背后的制度原貌，更守护了民族在动荡局势下的一份文化尊严。
    growth_range:
    - 4
    - 7
    attribute_weights:
      force: 12
      intellect: 58
      defense: 18
      agility: 12
  - key: hist_mingqing_0270
    name: 姚范
    default_gender: male
    archetype: civil
    flavor: （1702年—1771年）字南青，号姜埭，清代著名的文学家、考据学家。他在经学研究上具有极深造诣，主张学问应建立在确凿的实证基础之上，尤其在对古代礼制、官制与行政区划的复原上展现了卓越的才干。姚范治学极其严谨，辞章雅洁庄重，深受士林推崇。他曾受命主持修纂了多部地方志与文化丛书，为后世研究清代中期的社会治理与地理变迁留下了详实的一手资料。他的一生致力于华夏文化的传承与复原，展现了盛世文人群体一种平淡天真、守正不阿的人生态度。姚范这种追求学术真理与生活本质高度统一的风格，反映了人类灵魂在静谧时光中对真理的无尽追求。他在处理复杂的家族学术遗产与社会事务中表现出的那种清高且不乏智慧的姿态，展现了精英阶层高尚的人格高度。
