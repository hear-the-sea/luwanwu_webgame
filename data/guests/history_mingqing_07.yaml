  - key: hist_mingqing_0258
    name: 张九一
    default_gender: male
    archetype: civil
    flavor: （1533年—1598年）字少子，号肖甫，明代著名的文学家、官员。他在诗歌创作上具有极深造诣，尤其在描写北方边疆的雄奇风情、将士的英雄气节与底层百姓的疾苦方面展现了卓越才干。张九一治学极其严谨、辞章雅洁庄重，他主张文学创作应“独抒性灵，归于自然”，提倡清新且富有生命力的风格。他在担任地方长官期间，在人才选拔、荒政救济与文化政策制定方面发挥了核心作用。他的一生致力于文化的传承与复原。张九一这种追求艺术真实与行政效能高度统一的风格，反映了那一时代精英阶层一种平淡天真、忧国忧民的人生态度。他的一生在静谧中度过，其笔墨间的从容与淡定展现了人类灵魂在社会剧烈动荡之后回归生活本质的渴望，影响力跨越时代。
    growth_range:
    - 4
    - 7
    attribute_weights:
      force: 12
      intellect: 58
      defense: 18
      agility: 12
  - key: hist_mingqing_0259
    name: 李开先
    default_gender: male
    archetype: civil
    flavor: （1502年—1568年）字伯华，号中麓，明代著名的散曲家、官员。他在戏曲与文学创作上具有极强的现实主义精神与批判意识，其代表作传奇《宝剑记》等，极其敏锐且真实地记录了那一时代官场斗争的壮烈场面与英雄受辱的悲剧，极大地激发了民众的正义感与爱国情。李开先擅长通过鲜活的人物刻画与紧凑的戏剧冲突来吸引社会各阶层，其作品在当时具有极强的社会舆论影响力。他的一生在因直言罢官后坚持创作，通过文字表达对故国的深思、对忠良的祭奠与对邪恶势力的蔑视。李开先那种将戏剧作为社会剖析工具的勇气，使其脱离了传统才子的局限，具英雄气概。他在极其艰苦环境下依然能保持作为个体的从容与尊严，展现了极其高尚的灵魂境界。
    growth_range:
    - 4
    - 7
    attribute_weights:
      force: 12
      intellect: 58
      defense: 18
      agility: 12
  - key: hist_mingqing_0260
    name: 康海
    default_gender: male
    archetype: civil
    flavor: （1475年—1540年）字德涵，号对山，明代著名的官员、文学家，文学流派“前七子”的核心成员。他在政治上为人刚直不阿、守正不阿，由于卷入与宦官势力的残酷斗争而遭到削职打击。康海在文学创作上展现了极高的艺术天赋，其诗歌风格雄浑苍劲、充满了对英雄气节的歌颂与对社会积弊的辛辣讽辞。他在退休后隐居乡里，致力于民间艺术与地方戏曲的整理与推广，对于推动西北地区秦腔等戏曲的发展做出了巨大贡献。康海的一生是关于“才情、傲骨与正义”的动人叙事。他那种追求艺术真实、不畏权贵人言的巨大勇气，使其成为了那一时代最具挑战精神的文人之一。他的作品笔墨冷峻、寓意深远，展现了盛世表象之下最深刻的内心反思。
    growth_range:
    - 4
    - 7
    attribute_weights:
      force: 12
      intellect: 58
      defense: 18
      agility: 12
  - key: hist_mingqing_0261
    name: 王九思
    default_gender: male
    archetype: civil
    flavor: （1468年—1551年）字敬夫，号渼陂，明代著名的文学家、官员，“前七子”之一。他在学术造诣上与康海齐名，主张文学应紧随时代变革而推陈出新，反对盲目模拟。王九思在诗文创作上展现了极高的灵性与对艺术本质的追求，其作品风格质朴自然、充满了对大自然的真挚热爱与对田园生活的向往。他在遭受政治排挤罢官后归隐秦岭乡里，过着极其风雅、自由且淡泊名利的生活。王九思的一生体现了明代体制下有识之士追求个性解放、人格独立与精神独立的艰辛努力。他那种不仅追求行政效率且追求个人道德一致性的风格，使其成为了士大夫阶层的精神楷模。他在文化传承与地方人才培养方面的默默贡献，为明代学术的延续提供了重要的支持。
    growth_range:
    - 4
    - 7
    attribute_weights:
      force: 12
      intellect: 58
      defense: 18
      agility: 12
  - key: hist_mingqing_0262
    name: 曹振镛
    default_gender: male
    archetype: civil
    flavor: （1755年—1835年）字恩楷，号怿斋，清代著名的重臣，历事乾隆、嘉庆、道光三朝，官至武英殿大学士、首席军机大臣。他为人极其老成持重、清廉自守，在官场博弈中以“多磕头、少说话”的稳健生存哲学维护了朝政的长期稳定，深受嘉庆、道光两代皇帝的绝对信赖。曹振镛在人才选拔与整饬吏治方面展现了卓越的行政才干，特别是在处理繁重的国家财政稽核与重大司法文书时具有极高的效率。他的一生是中国传统官僚体系中“稳健派”风格的极致体现，他那种不仅关注程序正义且高度关注政局大局稳定的风格，使其成为了皇帝身边不可或缺的股肱之臣。他在文化典籍保存方面的默默贡献，为清代后期社会的平稳运行提供了重要的心理底线，其政治生命的长青是官场史上的一个奇观。
    growth_range:
    - 4
    - 7
    attribute_weights:
      force: 12
      intellect: 58
      defense: 18
      agility: 12
  - key: hist_mingqing_0263
    name: 戴衢亨
    default_gender: male
    archetype: civil
    flavor: （1755年—1811年）字荷之，号莲士，清代著名的重臣，乾隆四十三年状元。他在政治上官至体仁阁大学士、军机大臣，以行政极其干练、处事圆融且原则性强著称。戴衢亨在处理重大行政博弈与边防决策中展现了极其高超的政治平衡技巧，深得嘉庆皇帝的倚重。他在文学、史学研究与人才考核上亦有显著成就，被誉为“乾嘉盛世的儒臣典范”。他的一生是盛世巅峰时期精英阶层一种平稳、理性且具高度责任感的心态体现。他那种将深厚的儒家学术修养有机融入日常行政管理的风格，极大地提升了清政府的办事效率与决策质量。他在维护行政体系平稳运行与人才梯队培养方面的卓越贡献，为清朝的长期繁荣积累了厚重的政治资本，其温文尔雅的人格魅力深受朝野推崇。
    growth_range:
    - 4
    - 7
    attribute_weights:
      force: 12
      intellect: 58
      defense: 18
      agility: 12
  - key: hist_mingqing_0264
    name: 董诰
    default_gender: male
    archetype: civil
    flavor: （1740年—1818年）字晓伦，号蔗林，清代著名的官员、画家，重臣董邦达之子。他在政治上历任户部尚书、文华殿大学士等要职，在艺术上则精于山水花卉，其画风气韵典雅、气格清高，深受乾隆、嘉庆两代皇帝的器重。董诰曾长期主持修纂《四库全书》及参与多项重大官方文化工程，他在人才选拔、文化政策制定与艺术规范审定方面发挥了核心作用。他的一生体现了清代高级官员在学术钻研、行政管理与艺术创作领域的多重成功。他那种将中国传统艺术的美学素养引入国家治理与文化建设的风格，极大地提升了政府的文化软实力。他在维护行政体系平稳运行方面的默默贡献得到了历史的郑重记录，他那种“事无巨细、皆极缜密”的工作风格，使其成为了那一时代官僚阶层中的卓越典范。
    growth_range:
    - 4
    - 7
    attribute_weights:
      force: 12
      intellect: 58
      defense: 18
      agility: 12
  - key: hist_mingqing_0265
    name: 蒋因培
    default_gender: male
    archetype: civil
    flavor: （1768年—1838年）字次珊，号鹿潭，清代著名的学者、官员，名臣阮元之婿。他在经学考证、古代地理研究与版本目录学上展现了卓越的才干。蒋因培治学极其严谨，主张学问应建立在确凿的实证基础之上，对于纠正前人文献中的地理方位与年代误差做出了显著贡献。他在担任地方高级官员期间，致力于人才的选拔、书院的振兴与社会风气的改良，深受地方学子与百姓的拥戴。他的一生致力于文化的传承与华夏文明根脉的复原。蒋因培这种追求学术真理与行政效能高度统一的风格，反映了清代后期文人群体一种平淡天真、回归生活本质的人生态度。他在处理复杂的家族学术遗产与社会公共事务中表现出的从容不迫，展现了精英阶层的人格高度，其影响力跨越时代。
    growth_range:
