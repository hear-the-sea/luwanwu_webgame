    flavor: 蒲巴乙是一个希望参加“村有好男儿”比赛的胡人青年，他是一个混血儿（胡汉），长得十分帅气，在比赛前练歌时被抓到军营里强征入伍。随军出征中得知胡人要入侵中原后，不忍中原生灵涂炭，因此逃离军营，把胡人即将入侵的消息带到了中原。
