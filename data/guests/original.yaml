# 原创门客

heroes:
  green:
  - key: pubayi_green
    name: 蒲巴乙
    archetype: military
    flavor: 蒲巴乙是一个希望参加“村有好男儿”比赛的胡人青年，他是一个混血儿（胡汉），长得十分帅气，在比赛前练歌时被抓到军营里强征入伍。随军出征中得知胡人要入侵中原后，不忍中原生灵涂炭，因此逃离军营，把胡人即将入侵的消息带到了中原。他带着草原口音与中原习俗的双重烙印，既不被胡人完全接纳，也难被汉人信任，却仍愿以良知证明立场。
    default_gender: male
    default_morality: 60
    growth_range:
    - 3
    - 7
    recruitable: false
    avatar: pubayi.png
    attribute_weights:
      force: 45
      intellect: 15
      defense: 25
      agility: 15
  blue:
  - key: pubayi_blue
    name: 蒲巴乙
    archetype: civil
    flavor: 蒲巴乙是一个希望参加“村有好男儿”比赛的胡人青年，他是一个混血儿（胡汉），长得十分帅气，在比赛前练歌时被抓到军营里强征入伍。随军出征中得知胡人要入侵中原后，不忍中原生灵涂炭，因此逃离军营，把胡人即将入侵的消息带到了中原。他自此被两边追捕，只能以歌声与机敏谋生，却始终守着不让战火殃及无辜的初心。
