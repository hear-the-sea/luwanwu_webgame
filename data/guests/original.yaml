# 原创门客

heroes:
  green:
  - key: pubayi_green
    name: 蒲巴乙
    archetype: military
    flavor: 蒲巴乙是一个希望参加“村有好男儿”比赛的胡人青年，他是一个混血儿（胡汉），长得十分帅气，在比赛前练歌时被抓到军营里强征入伍。随军出征中得知胡人要入侵中原后，不忍中原生灵涂炭，因此逃离军营，把胡人即将入侵的消息带到了中原。他带着草原口音与中原习俗的双重烙印，既不被胡人完全接纳，也难被汉人信任，却仍愿以良知证明立场。
    default_gender: male
    default_morality: 60
    growth_range:
    - 3
    - 7
    recruitable: false
    avatar: pubayi.png
    attribute_weights:
      force: 45
      intellect: 15
      defense: 25
      agility: 15
  - key: orig_ma_wencai
    name: 马文才
    archetype: military
    flavor: 民间传说中的马文才，多被视作梁祝姻缘间那道难以跨过的门第高墙。他出身豪门士族，家势煊赫，少年便习惯了以家声与礼法衡量世间万事，于是婚姻在他眼中更像两姓相合、门楣相称，而非两心相许。传说中的他气盛而自矜，行事带着世家子弟的强硬与骄贵，最终在梁祝故事里成了富贵礼教的冷影，也成了那场凄美爱情最无言的反衬。
    default_gender: male
    default_morality: 35
    growth_range:
    - 4
    - 7
    recruitable: false
    attribute_weights:
      force: 40
      intellect: 10
      defense: 30
      agility: 20
