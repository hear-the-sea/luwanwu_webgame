  - key: hist_sljnbc_0166
    name: 王凌
    default_gender: male
    archetype: civil
    flavor: （172年—251年）寿春三叛第一人，忠义难酬。太原祁县人，王允之侄。他早年追随曹操，历任刺史太守，多有政绩。曹魏后期他任太尉，位列三公，为朝廷重臣。他目睹司马懿父子专权，心怀不满，与外甥令狐愚密谋拥立楚王曹彪为帝以对抗司马氏。事机泄露后司马懿亲率大军讨伐，他被迫投降。
