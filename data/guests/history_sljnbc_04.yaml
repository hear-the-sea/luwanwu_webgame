  - key: hist_sljnbc_0170
    name: 阚泽
    default_gender: male
    archetype: civil
    flavor: （？—243年）博览群书，诈降献书。会稽山阴人，家贫好学，常为人佣工抄书以换取读书机会，终成一代大儒。他学问渊博，尤精天文历法，博闻强记无所不通。赤壁之战中他替黄盖献诈降书给曹操，凭借其博学和胆识回答曹操质疑，使诈降计得以成功实施。他后任东吴太子太傅，教导孙登、孙和等太子，深受孙权敬重。
