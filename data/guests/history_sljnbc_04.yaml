    attribute_weights:
      force: 8
      intellect: 64
      defense: 18
      agility: 10
  - key: hist_sljnbc_0162
    name: 蒋济
    default_gender: male
    archetype: civil
    flavor: （？—249年）曹魏重臣，高平陵悔恨。楚国平阿人，早年追随曹操，多有功勋。合肥之战中他献计伪造援军书信，成功瓦解孙权军心使其撤退。此后他历任要职，参与朝廷机密事务，为曹魏重要的辅政大臣。高平陵之变中，他支持司马懿发动政变，并亲自劝说曹爽投降，许诺保其性命和富贵。然而曹爽投降后司马懿背信弃义将其灭族，蒋济深感惭愧，上疏请罪。
    growth_range:
