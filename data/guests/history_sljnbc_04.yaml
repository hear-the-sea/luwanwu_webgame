      agility: 20
  - key: hist_sljnbc_0163
    name: 曹纯
    default_gender: male
    archetype: military
    flavor: （170年—210年）虎豹骑统领，曹操心腹。沛国谯县人，曹仁之弟。他年少时便以才干闻名，追随曹操南征北战，屡立战功。他统领曹军最精锐的骑兵部队"虎豹骑"，这支劲旅由百战老兵组成，所向披靡。南皮之战生擒袁谭首级，长坂坡追击刘备获其辎重和两女，北征乌桓阵斩蹋顿单于，战功赫赫。
