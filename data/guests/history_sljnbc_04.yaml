  - key: hist_sljnbc_0174
    name: 独孤信
    default_gender: female
    archetype: military
    flavor: （502年—557年）三朝国亲，侧帽风流。云中人，鲜卑族，本名独孤如愿。他仪表俊美，风度翩翩，有"侧帽风流"之典故——据说他某日出行帽子被风吹歪，翌日京城少年竞相效仿侧戴帽子。他是西魏八柱国之一，战功赫赫。更令人称奇的是他的三个女儿：长女为北周明帝皇后，四女为隋文帝皇后独孤伽罗，七女为唐高祖李渊之母。
    growth_range:
