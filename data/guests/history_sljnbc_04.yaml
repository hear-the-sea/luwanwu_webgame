  - key: hist_sljnbc_0173
    name: 侯景
    default_gender: male
    archetype: military
    flavor: （503年—552年）跛足祸胎，宇宙大将军。朔方人，羯族出身，一目微斜、跛足但骑射精湛。他先仕北魏、后投东魏高欢，叛逃南梁后被萧衍收留。他趁梁朝内乱起兵叛变，攻陷建康城，囚禁梁武帝萧衍使其饿死台城。侯景之乱持续数年，江南繁华之地化为废墟，世家大族惨遭屠戮，六朝文化遭受毁灭性打击。
