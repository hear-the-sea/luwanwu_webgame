  - key: hist_sljnbc_0169
    name: 吴懿
    default_gender: female
    archetype: military
    flavor: （？—237年）国戚大将，镇守汉中。陈留人，其妹吴氏为刘备穆皇后。他原仕刘璋，刘备入川后归降。他随军征战，刘备称帝后受封关内侯。诸葛亮北伐期间他多次随军出征，屡立战功，官至车骑将军。诸葛亮去世后，他接替魏延镇守汉中，负责蜀汉北境防务。他为人沉稳持重，不求冒进但求稳妥，在汉中数年边境安宁。
    growth_range:
