  - key: hist_sljnbc_0172
    name: 曹景宗
    default_gender: male
    archetype: military
    flavor: （457年—508年）好勇斗狠，竞渡争先。新野人，将门之后。他自幼善骑射，胆气过人，少年时便随父征战沙场。他性情豪爽粗犷，嗜酒好赌，生活放纵。钟离之战中他与韦睿联手大破北魏百万大军，战后二人竞相争功，成为当时佳话。宴席之上他被限韵赋诗，即兴吟出"去来谋画策，努力向长安"，虽押韵局促却豪气干云。
