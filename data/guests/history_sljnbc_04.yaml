  - key: hist_sljnbc_0164
    name: 孙礼
    default_gender: male
    archetype: military
    flavor: （？—250年）刚毅果敢，魏国良将。涿郡容城人，为人刚正不阿、忠诚勇猛。年轻时曹操出行遇虎，他持戟相救不顾自身安危，深受赏识。他历任多郡太守，镇守北方边疆抵御鲜卑入侵，恩威并施，胡人畏服。在弘农等地治理地方颇有政声，深得民心。他为人正直敢言，敢于批评权贵，在芍陂争议中据理力争险些获罪。
