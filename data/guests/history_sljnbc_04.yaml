  - key: hist_sljnbc_0167
    name: 甄姬
    default_gender: female
    archetype: civil
    flavor: （183年—221年）洛神原型，乱世红颜。中山无极人，原为袁绍次子袁熙之妻。曹操攻破邺城时，曹丕闯入袁府见其姿貌绝伦，遂纳为夫人。她生育曹叡，贤德有才，深得曹操喜爱。曹丕称帝后册封她为皇后，然郭女王得宠，甄姬日渐失宠。她忧愤作《塘上行》抒发哀怨，触怒曹丕被赐死，死后"以发覆面、以糠塞口"下葬。
