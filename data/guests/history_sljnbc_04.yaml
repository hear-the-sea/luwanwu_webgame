  - key: hist_sljnbc_0175
    name: 李通
    default_gender: male
    archetype: military
    flavor: （168年—209年）江夏太守，勇冠三军。江夏平春人，少年时便以游侠闻名乡里。曹操征讨张绣时他为先锋，大破刘表援军，斩将夺旗勇冠三军。官渡之战前夕，刘表遣使招降，他斩杀来使以明心志，在曹操最困难的时候始终坚定支持。他镇守汝南多年，抵御刘备和孙权的进犯，屡立战功。赤壁之战后曹操败退，他率军接应，保护曹操安全撤退。
