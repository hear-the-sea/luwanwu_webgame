  - key: hist_sljnbc_0151
    name: 钟繇
    default_gender: male
    archetype: civil
    flavor: （151年—230年）楷书鼻祖，书法宗师。颍川长社人，出身名门。他早年追随曹操，镇守关中多年，安抚民众、稳定边防，政绩卓著。曹魏建国后官至太傅，是开国元勋。然而他更以书法名世，小楷书法独步当时，开创楷书先河。后世将他与王羲之并称"钟王"，尊为书法史上的双子星座。他的楷书端庄典雅，笔法精妙，影响深远。
    growth_range:
    - 4
    - 7
    attribute_weights:
      force: 8
      intellect: 64
      defense: 18
      agility: 10
  - key: hist_sljnbc_0152
    name: 满宠
    default_gender: male
    archetype: military
    flavor: （？—242年5月）合肥守护者，抗吴名将。山阳昌邑人，早年为郡吏，以执法严明著称。他追随曹操多年，平定诸多叛乱。曹魏建国后镇守合肥，统领扬州军事三十余年。孙权亲率十万大军来犯，他临危不惧，以数千守军坚守新城，击退来敌，创下以少胜多的战绩。他善于修筑防御工事，所建新城坚如磐石，令东吴望而生畏。
    growth_range:
    - 3
    - 6
    attribute_weights:
      force: 34
      intellect: 12
      defense: 40
      agility: 14
  - key: hist_sljnbc_0153
    name: 文聘
    default_gender: male
    archetype: military
    flavor: （？—？）镇守江夏，忠诚可靠。南阳宛县人，原为刘表麾下大将，深受器重。刘表死后刘琮降曹，文聘因主投降而惭愧，独自留守不去。曹操亲自召见，问其不来之由，他泣曰"不能全荆州，愧见明公"。曹操感其忠义，令其镇守江夏。他在江夏数十年，多次击退东吴孙权、关羽的进犯。有一次孙权亲率大军来攻，他镇定自若，以火攻破敌，孙权望城叹息而退。
    growth_range:
    - 3
