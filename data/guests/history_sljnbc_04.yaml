  - key: hist_sljnbc_0171
    name: 朱桓
    default_gender: male
    archetype: military
    flavor: （177年—238年）勇烈高傲，屡挫魏军。吴郡吴县人，少有奇才。他性情高傲，不愿屈居人下，但对待士卒却极为爱护，有疾病者亲往探视，士卒皆愿为其效死。濡须之战中他以少胜多，设伏击破曹仁大军，斩获万计，威震敌胆。他用兵果敢，常出奇制胜，是东吴著名的"疯狗"式战将——一旦开战便全力以赴，不顾一切。
