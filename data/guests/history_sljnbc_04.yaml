  - key: hist_sljnbc_0168
    name: 孔融
    default_gender: male
    archetype: civil
    flavor: （153年—208年）建安七子之首，名门之后。鲁国人，孔子二十世孙。他少时便以才思敏捷闻名，"小时了了，大未必佳"的典故源于他的机智应答。他任北海相时开仓赈济，兴办学校，深得民心。后归曹操帐下为官，名列建安七子之首，文采风流冠绝一时。然他性情刚直，屡犯曹操之忌，多次当面讥讽。
