    attribute_weights:
      force: 40
      intellect: 15
      defense: 23
      agility: 22
  - key: hist_sljnbc_0154
    name: 曹彰
    default_gender: male
    archetype: military
    flavor: （189年—223年）黄须儿，任城威王。沛国谯县人，曹操第三子，因黄色须发被曹操戏称"黄须儿"。他自幼好武不好文，善骑射击剑，膂力过人，能与猛兽搏斗。曹操曾问诸子志向，他朗声答曰"好为将，愿效卫青、霍去病之功"。曹操北征乌桓时他为先锋，亲率精骑深入敌境，大破乌桓叛军，斩首甚众，威震塞北。
    growth_range:
    - 3
    - 6
    attribute_weights:
      force: 44
      intellect: 8
      defense: 18
      agility: 30
  - key: hist_sljnbc_0155
    name: 曹植
    default_gender: male
    archetype: civil
    flavor: （192年—232年12月27日）才高八斗，七步成诗。沛国谯县人，曹操第四子。他天资聪颖，十岁便能诵诗书，下笔成章。曹操曾有意立其为嗣，然他恃才放旷、任性使酒，在与曹丕的夺嫡之争中落败。曹丕即位后对其百般猜忌，令其七步成诗否则处死，他应声吟出"煮豆燃豆萁，豆在釜中泣。本是同根生，相煎何太急"，令曹丕惭愧不已。
    growth_range:
    - 3
    - 6
    attribute_weights:
      force: 8
      intellect: 64
      defense: 18
      agility: 10
  - key: hist_sljnbc_0156
    name: 曹丕
    default_gender: male
    archetype: civil
    flavor: （187年—226年6月29日）魏文帝，篡汉开魏。沛国谯县人，曹操次子。他博学多才，善诗文骑射，在与曹植的夺嫡之争中凭借权谋胜出。曹操死后他继承魏王之位，旋即逼迫汉献帝禅让，建立曹魏政权，结束了汉朝四百年统治。在位期间他推行九品中正制，三次伐吴皆无功而返。他著《典论·论文》，开创中国文学批评之先河。
    growth_range:
    - 3
    - 7
    attribute_weights:
      force: 8
      intellect: 64
      defense: 18
      agility: 10
  - key: hist_sljnbc_0157
    name: 曹叡
    default_gender: male
    archetype: civil
    flavor: （204年—239年1月22日）魏明帝，守成之主。曹丕长子，母为甄姬。他沉毅果断，在位期间多次击退蜀汉诸葛亮、东吴孙权的进犯，识人善任，曹真、司马懿皆受其重用。他亲自主持军国大事，对外战争胜多败少，维持了曹魏的强盛国势。然他晚年大兴土木，修建洛阳宫殿，劳民伤财。临终托孤于曹爽、司马懿二人，本欲令其互相制衡，却因曹爽无能。
    growth_range:
    - 3
    - 6
    attribute_weights:
      force: 20
      intellect: 40
      defense: 20
      agility: 20
  - key: hist_sljnbc_0158
    name: 司马师
    default_gender: male
    archetype: military
    flavor: （208年—255年3月23日）司马懿长子，权倾朝野。河内温县人，少有威望。其父司马懿发动高平陵之变时，他统领三千死士奇袭曹爽，事成后掌控朝廷禁军。司马懿死后他继承父业，废黜魏帝曹芳另立曹髦，权倾朝野。毌丘俭、文钦起兵勤王时，他亲自领兵平叛，途中旧创发作，眼球迸出仍坚持指挥，最终击溃叛军。
    growth_range:
    - 3
    - 6
    attribute_weights:
      force: 40
      intellect: 15
      defense: 23
      agility: 22
  - key: hist_sljnbc_0159
    name: 司马昭
    default_gender: male
    archetype: military
    flavor: （211年—265年9月6日）曹魏权臣，司马懿次子。河内温县人，继承兄长司马师之权后主导曹魏朝政。他平定诸葛诞叛乱，派钟会、邓艾灭亡蜀汉，功业震主。魏帝曹髦愤其专权，亲率侍卫讨伐，于阊阖门前被司马昭手下成济弑杀。"司马昭之心路人皆知"的典故由此而来。他被封晋王，加九锡，受禅让之位已在眼前，却在称帝前夕病逝。
    growth_range:
    - 3
    - 7
    attribute_weights:
      force: 40
      intellect: 15
      defense: 23
      agility: 22
  - key: hist_sljnbc_0160
    name: 郭淮
    default_gender: male
    archetype: military
    flavor: （？—255年2月23日）曹魏西线支柱，抗蜀名将。太原阳曲人，出身名门世族。他追随曹操时便崭露头角，汉中之战后镇守雍凉三十余年，是曹魏西线最重要的统帅。诸葛亮北伐时他多次与之交锋，虽少有大胜却能稳定战线，使蜀军难以深入。诸葛亮死后他又与姜维周旋，屡挫其锋。他善于笼络羌胡、安抚边民，使雍凉边境得以安宁。
    growth_range:
    - 3
    - 6
    attribute_weights:
      force: 40
      intellect: 15
