      agility: 22
  - key: hist_sljnbc_0161
    name: 蔡琰
    default_gender: female
    archetype: civil
    flavor: （约177年—？）文姬归汉，才女传世。陈留圉县人，蔡邕之女。她自幼饱读诗书，精通音律，嫁河东卫仲道后不久便守寡。东汉末年天下大乱，她被南匈奴掳走塞外，嫁与左贤王为妻，生育二子，流落胡地十二年。曹操念及与蔡邕旧交，遣使以重金赎回。她忍痛别子归汉，嫁与董祀。《悲愤诗》《胡笳十八拍》道尽颠沛流离之苦、骨肉分离之痛，字字泣血。
    growth_range:
    - 3
