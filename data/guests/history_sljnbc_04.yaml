  - key: hist_sljnbc_0165
    name: 田豫
    default_gender: male
    archetype: military
    flavor: （171年—252年）镇守北疆，威震沙漠。渔阳雍奴人，早年曾追随刘备，刘备称其为"恨不与君共成大事"。后因母老归乡，辗转归附曹操。他长期镇守北方边疆，对付乌桓、鲜卑等游牧民族经验丰富。他恩威并施、分化瓦解，令胡人不敢南下劫掠，多次以少胜多击退入侵。他善于运用心理战，常令胡人畏惧而不敢轻进。
