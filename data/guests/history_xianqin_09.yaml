  - key: hist_xianqin_0425
    name: 蚩尤
    archetype: military
    flavor: '（生卒年不详）上古战神，九黎部落首领。他是炎黄时代最强大的部落领袖之一，据说铜头铁额、能呼风唤雨。他与黄帝争夺天下霸权，双方在涿鹿展开了惊天动地的大战。传说蚩尤作大雾困住黄帝军队，黄帝发明指南车破雾；蚩尤请来风伯雨师助阵，黄帝召唤女魃止雨。最终黄帝获胜，蚩尤战死。然而后世并未将他完全妖魔化，反而尊其为"战神"——秦始皇、汉高祖都曾祭祀蚩尤。他代表了与炎黄并立的另一支华夏先民，是中华文明多元起源的见证。'
