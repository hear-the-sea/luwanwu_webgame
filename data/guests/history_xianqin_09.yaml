  - key: hist_xianqin_0427
    name: 帝喾
    archetype: military
    flavor: '（生卒年不详）上古帝王，五帝之一。他是商周共同的祖先——后稷和契都是他的儿子，因此周人和商人都尊他为先祖。据《史记》记载，他"生而神灵，自言其名"，刚出生就会说话。他在位时"日月所照，风雨所至，莫不从服"，天下归心。他有四位著名的妃子：姜嫄生后稷（周之祖），简狄生契（商之祖），庆都生尧，常仪生挚。通过他的后代，华夏文明的几大支脉得以形成。他是联系五帝与三代的关键人物，也是商周两大王朝共同追溯的远祖。'
