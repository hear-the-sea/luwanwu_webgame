    flavor: '（生卒年不详）上古乐官，音律始祖。他是黄帝时期的乐官，传说奉黄帝之命创制音律。他来到昆仑山北麓的解谷，选取竹子，截成十二根长短不等的竹管，模拟凤凰的鸣叫声，定出了黄钟、大吕等十二律吕。这是中国古代音乐理论的起源，对后世音乐发展影响深远。他与夔并称为中国音乐的始祖。十二律吕不仅用于音乐，还与历法、度量衡相结合，形成了独特的华夏文化体系。他是华夏礼乐文明的重要奠基者。'
