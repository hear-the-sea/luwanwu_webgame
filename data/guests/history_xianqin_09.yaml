  - key: hist_xianqin_0434
    name: 伏羲
    archetype: civil
    flavor: '（生卒年不详）上古圣王，华夏人文始祖。传说他与女娲是兄妹或夫妻关系，共同创造并教化人类。他观天察地，创画八卦，开创了华夏易学文化的源头。他教人结网捕鱼、驯养牲畜，使人类从渔猎走向畜牧。他制定婚姻制度，规范人伦关系。八卦是中国古代最重要的哲学符号，后来发展为《易经》，影响华夏文明数千年。伏羲被尊为"人文始祖"，与女娲并列为华夏民族的精神图腾。天水、淮阳等地至今保存着伏羲庙，每年祭祀不断。'
