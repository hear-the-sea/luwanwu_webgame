  - key: hist_xianqin_0430
    name: 女英
    archetype: civil
    flavor: '（生卒年不详）尧帝之女，舜帝之妃。她与姐姐娥皇共事舜帝，姐妹情深，夫妻恩爱。舜帝死后，她随姐姐南下寻夫，泪染斑竹，投江而死，与姐姐一同化为湘水女神。她们的故事成为千古传颂的爱情典范。《九歌》中的《湘君》《湘夫人》即是颂扬她们的神话。她们象征着古代女性对爱情的忠贞和对丈夫的追随，虽是神话却寄托了人们对纯真爱情的向往。姐妹二人形影不离、生死相随，她们的故事也成为姐妹情深的象征。"江娥啼竹素女愁"，她的悲情千古流传。'
