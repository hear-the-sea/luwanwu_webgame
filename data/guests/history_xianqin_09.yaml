  - key: hist_xianqin_0444
    name: 岐伯
    archetype: civil
    flavor: '（生卒年不详）上古医官，医学始祖之一。他是黄帝时期的医官，与黄帝对话形成的《黄帝内经》是中医理论的奠基之作。《内经》以黄帝问、岐伯答的形式，系统阐述了阴阳五行、脏腑经络、病因病机、诊断治疗等中医基础理论。"岐黄之术"成为中医的代称，岐伯与黄帝并称"岐黄"。虽然《黄帝内经》成书于战国至汉代，但以岐伯为医学始祖的传统延续至今。他是中华医学精神的象征，代表了古人对生命奥秘的探索与智慧。'
