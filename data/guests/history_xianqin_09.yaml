  - key: hist_xianqin_0426
    name: 少昊
    archetype: military
    flavor: '（生卒年不详）上古帝王，东夷族群的始祖。他是五帝之一，以鸟为图腾，建立了以鸟命官的独特制度：凤鸟氏掌管历法，玄鸟氏掌管春分秋分，等等。他的部落居住在东方沿海地区，创造了灿烂的东夷文化。传说他在位时天下大治，鸟兽驯服。他是东方各部族共同尊奉的祖先，齐国、莒国等东方诸侯国都自称其后裔。他的鸟图腾崇拜与中原的龙图腾并行，共同构成华夏文化的丰富内涵。曲阜的少昊陵至今犹存，是中国古代帝王陵墓中最古老的之一。'
