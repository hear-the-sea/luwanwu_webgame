  - key: hist_xianqin_0424
    name: 仓颉
    archetype: civil
    flavor: '（生卒年不详）造字之圣，中国文字的传说创造者。相传他是黄帝的史官，观察鸟兽足迹和自然万象，受到启发而创造文字。他有"四目"的神异形象，象征着他比常人更能洞察事物的本质。传说他造字成功之日，天雨粟、鬼夜哭——上天降下谷子以示嘉奖，鬼怪哭泣因为从此无处藏匿。虽然文字的产生是一个漫长的集体创造过程，但仓颉作为文字发明者的象征地位已深入人心。他被尊为"字圣"，是华夏文明走向文字时代的精神象征。历代文人祭祀仓颉，感念文字传承文明的伟大功绩。'
