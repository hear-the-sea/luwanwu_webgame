  - key: hist_xianqin_0423
    name: 夔
    archetype: civil
    flavor: '（生卒年不详）上古乐官，舜帝时期的乐正。他掌管音乐教育，是华夏礼乐文明的重要奠基人。传说他创作了许多古老的乐曲，用音乐来感化民众、移风易俗。《尚书》记载，舜帝命他"典乐教胄子"，用音乐来教育贵族子弟。他说："击石拊石，百兽率舞。"形容他的音乐能使百兽都随之起舞。他的音乐理念强调"诗言志，歌永言，声依永，律和声"，奠定了中国古代音乐美学的基础。后世将他尊为"乐神"，与伶伦并称为中国音乐的始祖。'
