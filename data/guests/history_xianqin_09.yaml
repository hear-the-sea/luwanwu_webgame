    flavor: '（生卒年不详）上古神鸟，衔石填海。她原是炎帝的女儿，名女娃，在东海游玩时不幸溺亡。她死后化为精卫鸟，立誓要用石子填平大海，以免再有人遭受同样的不幸。她日复一日地从西山衔来木石，投入东海之中，虽然大海浩瀚无边、永远填不平，但她从未放弃。"精卫填海"的故事成为坚韧不拔、矢志不渝精神的象征。她是中国神话中最感人的形象之一，代表着弱小者对强大自然的不屈抗争，激励后人永不言弃。'
