  - key: hist_xianqin_0422
    name: 子契
    archetype: civil
    flavor: '（生卒年不详）商族始祖，教化之官。他是帝喾的儿子，传说他的母亲简狄吞食玄鸟（燕子）所产之卵而有孕，故有"天命玄鸟，降而生商"的神话。尧舜时期，他担任"司徒"之职，掌管教化民众，推行五伦之教：父子有亲、君臣有义、夫妇有别、长幼有序、朋友有信。他因功被封于商地，其后裔逐渐发展壮大，最终由商汤建立了商朝。他是商族的精神图腾，商人以玄鸟为族徽，正源于他的出生神话。他与后稷一样，是华夏文明初创时期的奠基者。'
