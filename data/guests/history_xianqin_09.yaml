  - key: hist_xianqin_0428
    name: 帝颛顼
    archetype: military
    flavor: '（生卒年不详）上古帝王，五帝之一。他是黄帝的孙子，少昊的侄子，因辅佐少昊有功，继承帝位。他最著名的事迹是"绝地天通"——在此之前，巫觋之术泛滥，人人都可与天神沟通，造成政令混乱。他命重、黎二人分掌天地之事，使天神与人间相隔绝，只有专门的祭司才能通天，从此祭祀权归于君主。这一改革确立了宗教权力的等级秩序，对后世影响深远。楚国尊奉他为始祖，"帝高阳之苗裔"是楚人的骄傲。他是华夏政治文明进步的重要推动者。'
