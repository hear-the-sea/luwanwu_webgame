    flavor: '（生卒年不详）旱神，涿鹿功臣。她是黄帝的女儿，传说生来火气极旺，能使周围干旱无雨。涿鹿之战时，蚩尤请来风伯雨师助阵，暴风骤雨使黄帝军队无法作战。黄帝请来女魃，她一出现便止住风雨，扭转了战局。然而战后她因消耗神力过大，无法再返回天界，只能留在人间。她所到之处皆成干旱之地，人们既感激她的功劳，又畏惧她带来的旱灾。她的故事体现了古人对自然力量的敬畏与想象。'
