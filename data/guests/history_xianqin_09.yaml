  - key: hist_xianqin_0443
    name: 隶首
    archetype: civil
    flavor: '（生卒年不详）上古算术家，数学始祖。他是黄帝时期的大臣，传说创造了算数和算筹。算筹是中国古代的计算工具，类似于后来的算盘。他还制定了度量衡的标准，使商业交易和工程建设有了统一的计量基础。他的发明对华夏文明的发展有重要意义：没有统一的度量衡，就没有统一的市场；没有算术，就没有复杂的社会管理。他是中国古代数学和计量学的先驱，虽然具体事迹不可考，但其象征意义不可忽视。'
