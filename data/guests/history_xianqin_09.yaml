  - key: hist_xianqin_0433
    name: 女娲
    archetype: civil
    flavor: '（生卒年不详）上古女神，华夏人类的始祖母。传说她用黄土捏人，创造了人类。后来共工撞断天柱，天穹破裂，洪水泛滥。她炼五色石补天，斩断鳌足撑起四方，使天地恢复秩序。她还创造了笙簧等乐器，教化人民。她与伏羲被尊为华夏民族的始祖，是中国神话中地位最崇高的女性神祇。"女娲补天"的故事象征着女性的伟大与坚韧，体现了母性的慈爱与担当。她是中华民族母性精神的化身，受到千年祭祀与崇拜。'
