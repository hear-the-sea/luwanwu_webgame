    flavor: '（生卒年不详）大禹之父，治水失败者。他是帝颛顼的后裔，黄帝的曾孙。尧帝时期洪水泛滥，他奉命治水，采用堵塞的方法——筑堤坝阻挡洪水。然而堵不如疏，九年下来，洪水未退反而更加泛滥。尧帝怒其无功，在羽山将他处死。他的儿子禹继承父志，改用疏导的方法，终于治服洪水，成为一代圣王。鲧的失败与禹的成功形成对照，说明方法的重要性：同样是治水，堵则败、疏则成。他虽是失败者，却是大禹成功的铺垫与对照。'
