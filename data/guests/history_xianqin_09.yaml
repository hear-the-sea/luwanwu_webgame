  - key: hist_xianqin_0445
    name: 风后
    archetype: civil
    flavor: '（生卒年不详）黄帝谋臣，指南车发明者。他是黄帝时期最重要的谋士之一，在涿鹿之战中发挥了关键作用。传说蚩尤作大雾，黄帝军队迷失方向，风后发明指南车，使军队能够辨别方向，最终击败蚩尤。他还协助黄帝制定军事阵法，相传"八阵图"的雏形就是他所创。他是黄帝文臣武将中最得力的助手之一，其智慧与谋略为黄帝统一天下立下了汗马功劳。他是中国古代发明创造精神的代表人物之一。'
