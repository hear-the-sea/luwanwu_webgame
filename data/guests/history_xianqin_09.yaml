  - key: hist_xianqin_0438
    name: 帝尧
    archetype: civil
    flavor: '（约前2377年—约前2259年）上古圣王，五帝之一。他名放勋，号陶唐氏，是中国古代圣王的典范。他在位时政治清明、百姓安居，史载"日出而作，日入而息，凿井而饮，耕田而食，帝力于我何有哉"。他以公心治天下，不传位给不肖之子丹朱，而是禅让给贤能的舜。"尧舜禅让"成为儒家推崇的政治理想，代表了"天下为公"的最高境界。他开创了四岳议政的会议制度，被视为民主政治的萌芽。他是中国古代政治理想的人格化象征。'
