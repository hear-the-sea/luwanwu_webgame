  - key: hist_xianqin_0431
    name: 祝融
    archetype: military
    flavor: '（生卒年不详）上古火神，南方之神。他是帝颛顼的后裔，以火官之职著称。传说他住在昆仑山的光明宫，专门管理人间的火种。他教人们如何保存火种、使用火，使人类的生活水平大大提高。他也是南方楚国的远祖，楚人自称"祝融之后"。后世将他神化为火神，道教尊其为"南方火德真君"。他的形象是红脸膛，骑着一只老虎。传说他曾与水神共工大战，共工怒触不周山，导致天倾西北。他是中国古代神话中最重要的神祇之一。'
