  - key: hist_xianqin_0429
    name: 娥皇
    archetype: civil
    flavor: '（生卒年不详）尧帝之女，舜帝之妻。她与妹妹女英一同嫁给舜帝，姐妹同侍一夫，相处和睦。舜帝巡狩南方，死于苍梧之野。娥皇女英闻讯赶往寻夫，一路泪洒斑竹——传说湘妃竹上的斑点就是她们的泪痕。姐妹二人最终投湘江而死，化为湘水之神"湘妃"。她们的故事是中国古代最动人的爱情悲剧之一，千百年来为文人墨客吟咏不绝。"湘妃竹"成为思念的象征，"苍梧"成为哀伤的代名词。她们的忠贞与深情，定义了中国传统女性美德的最高境界。'
