  - key: hist_xianqin_0447
    name: 应龙
    archetype: military
    flavor: '（生卒年不详）上古神兽，黄帝战神。传说他是有翼的神龙，在涿鹿之战中助黄帝攻杀蚩尤。蚩尤请来风伯雨师作法，应龙以其神力蓄水反击，与蚩尤军队展开激战。他还曾斩杀夸父。大禹治水时，应龙以尾画地，导引水流，助禹疏通河道。他是中国古代龙神话中最著名的形象之一，代表着神圣的战斗力量。后世将他奉为战神的化身，是古代军事祭祀的重要对象。他的形象融合了龙与鸟的特征，是华夏先民想象力的结晶。'
