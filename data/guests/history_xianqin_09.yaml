  - key: hist_xianqin_0432
    name: 共工
    archetype: military
    flavor: '（生卒年不详）上古水神，治水先驱。他是上古时代的部落首领，与祝融争帝失败后，怒撞不周山，导致"天柱折，地维绝"，天向西北倾斜，水向东南汇聚——这个神话解释了中国地势西高东低、江河东流的地理现象。作为水神，他曾尝试治理洪水，但采用堵塞的方法，效果不佳。后世对他的评价两极分化：有人认为他是与天帝抗争的悲剧英雄，有人认为他是祸乱天下的恶神。他的故事体现了古人对自然力量的敬畏与想象。'
