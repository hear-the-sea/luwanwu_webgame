  - key: hist_xianqin_0435
    name: 神农
    archetype: civil
    flavor: '（生卒年不详）上古圣王，农业与医药之神。他又称炎帝，与黄帝并称"炎黄"，是华夏民族的共同始祖。传说他遍尝百草，发明医药，曾一日遇七十毒，最后因尝断肠草而死。他发明耒耜，教民农耕，使人类从采集走向农业文明。他还开创集市贸易，促进社会发展。"神农尝百草"的故事体现了先民探索自然、造福人类的精神。他是中国传统医学的精神象征，被尊为"药王"。农业、医药、市场——神农的三大贡献奠定了华夏文明的基础。'
