  - key: hist_xianqin_0437
    name: 嫘祖
    archetype: civil
    flavor: '（生卒年不详）黄帝元妃，蚕丝之母。她是西陵氏之女，嫁给黄帝为正妃。传说她发现了蚕能吐丝，并发明了养蚕缫丝、织造丝绸的技术。丝绸成为中华文明最具特色的产品，后来通过丝绸之路传播到世界各地。她教化百姓，移风易俗，被誉为"人文女祖"。她还生下了玄嚣和昌意两个儿子，是夏商周三代帝王的祖先。后世尊她为"蚕神"或"先蚕"，历代皇后都要亲自祭祀她，以示对养蚕事业的重视。她是中华女性智慧与美德的化身。'
