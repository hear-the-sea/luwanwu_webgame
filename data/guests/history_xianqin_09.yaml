# 历史人物门客 - 先秦时期（第09批：绿色50人）

heroes:
  green:
  - key: hist_xianqin_0400
    name: 姬林
    archetype: military
    flavor: '（?—前697年）周桓王，王室威严尽失的君主。他是平王之孙，继位后试图恢复周室权威，与日益强大的郑国发生冲突。公元前707年，他亲率周军及陈、蔡、卫等国联军讨伐郑国，史称"繻葛之战"。双方交战，周军大败，桓王被郑将祝聃射中肩膀，仓皇撤退。天子竟被诸侯所伤，这是周室建立以来前所未有的耻辱。郑庄公派人慰问，桓王只能忍气吞声。此战之后，周天子再无力号令诸侯，王室沦为诸侯争霸的工具，徒有虚名。'
    growth_range:
    - 3
    - 7
    attribute_weights:
      force: 34
      intellect: 20
      defense: 26
      agility: 20
  - key: hist_xianqin_0401
    name: 虢公石父
    archetype: military
    flavor: '（?—前771年）周幽王时期的权臣。他是虢国国君，身居高位却不思社稷，反而谄媚幽王、助纣为虐。幽王欲废太子宜臼改立褒姒之子伯服，他积极附和，为这一违背宗法的决定推波助澜。他与幽王狼狈为奸，共同策划烽火戏诸侯的闹剧。当犬戎真正入侵时，他随幽王一同困于骊山，最终战死于乱军之中。他的死是咎由自取：作为重臣不能匡正君过，反而助长昏君胡闹，最终与昏君一同覆灭。奸臣误国，报应不爽。'
    growth_range:
    - 3
    - 7
    attribute_weights:
      force: 36
      intellect: 16
      defense: 28
      agility: 20
  - key: hist_xianqin_0402
    name: 姬友
    archetype: military
    flavor: '（?—前771年）郑国始祖，护周殉难的忠臣。他是周厉王之子，周宣王之弟，被封于郑地。他为人忠正，在朝中担任司徒，辅佐周室。见周幽王荒淫无道，他预感周室将有大难，便将家族东迁至虢、郐之间的新郑，为郑国日后的发展奠定基础。犬戎入侵时，他虽已年迈，仍忠心护主，随周幽王一同抵抗，最终战死于骊山之下。他以生命践行了对周室的忠诚。他的儿子郑武公继承遗志，在东周初年使郑国成为首霸。郑国的辉煌，始于他的深谋远虑。'
    growth_range:
    - 4
    - 7
    attribute_weights:
      force: 38
      intellect: 18
      defense: 26
      agility: 18
  - key: hist_xianqin_0403
    name: 姬掘突
    archetype: military
    flavor: '（?—前744年）郑国第二代君主，东周初年的风云人物。父亲郑桓公死于犬戎之乱后，他继承郑国，并在危难中显示出卓越的政治才能。他护送周平王东迁洛邑，因护驾之功获得周室信任，在朝中担任卿士，权倾一时。他趁乱吞并虢国、郐国等小国，将郑国扩张为中原强国。他东联齐鲁、西和晋国，为儿子郑庄公的称霸奠定了坚实基础。他是郑国由边陲小邦崛起为春秋强国的关键人物，其雄才大略丝毫不逊于后来的春秋霸主们。'
    growth_range:
    - 4
    - 7
    attribute_weights:
      force: 40
      intellect: 18
      defense: 24
      agility: 18
  - key: hist_xianqin_0404
    name: 子庄
    archetype: military
    flavor: '（生卒年不详）商朝第十一代王，开启迁都先河。商朝建立后，国都数次迁移，这一传统正是从他开始。他将都城从亳迁至嚣（今河南荥阳一带），这是商朝第一次大规模迁都。史书记载迁都原因是"洹水竭"——可能是黄河水患或环境变化导致旧都不宜居住。他的迁都开创了商朝"前八后五"十三次迁都的先例，反映了早期国家面对自然灾害的无奈。直到盘庚迁殷，商朝才结束了这种颠沛流离的状态。他的迁都虽是被动之举，却折射出华夏先民与自然抗争的历史。'
    growth_range:
    - 3
    - 7
    attribute_weights:
      force: 34
      intellect: 20
      defense: 26
      agility: 20
  - key: hist_xianqin_0405
    name: 子旬
    archetype: military
    flavor: '（?—约前1210年）商朝中期君主，迁都于殷的决策者。他是商朝第二十代王，面对王朝内部的腐化堕落和频繁的水旱灾害，他力排众议，将都城从奄迁至殷（今河南安阳）。迁都过程中，贵族们极力反对，他发表了著名的《盘庚》三篇演说，晓以利害，终于完成迁都。这是商朝最后一次迁都，此后直至灭亡，商都再未变动。因迁都于殷，商朝此后也称"殷商"或"殷"。殷墟考古发掘证实了他迁都的历史。他的决断力与改革精神，使商朝重获新生，延续了近三百年国祚。'
    growth_range:
    - 4
    - 7
    attribute_weights:
      force: 36
      intellect: 22
      defense: 24
      agility: 18
  - key: hist_xianqin_0406
    name: 子昭
    archetype: military
    flavor: '（约前1250年—约前1192年）商朝第二十三代王，商朝中兴之主。他在位五十九年，是商朝在位时间最长的君主。他任用出身卑微的傅说为相，打破贵族垄断政治的传统。他东征西讨，开疆拓土，使商朝疆域达到极盛。他的王后妇好是中国历史上有据可查的第一位女将军，多次率军出征，战功赫赫。殷墟出土的甲骨文大多出自他的时代，记录了祭祀、战争、农业等方方面面。武丁时代是商朝的黄金时代，也是中国青铜文明的巅峰时期。'
    growth_range:
    - 5
    - 7
    attribute_weights:
      force: 40
      intellect: 20
      defense: 24
      agility: 16
  - key: hist_xianqin_0407
    name: 子受
    archetype: military
    flavor: '（?—前1046年）商朝末代君主，后世称为商纣王。他本名受，天资聪颖，力大无穷，能倒曳九牛、手格猛兽。然而他骄奢淫逸，沉迷酒色，宠幸妲己，不理朝政。他设酒池肉林通宵达旦，创炮烙之刑残害忠良，比干剖心、梅伯醢杀，使殷商人心尽失。周武王率诸侯联军伐纣，牧野一战，商军阵前倒戈，纣王仓皇逃回朝歌，于鹿台自焚而死。商朝六百年基业毁于一旦。他虽有雄才却无仁德，是暴君亡国的千古典型。后世以"纣"为恶谥，永远钉在历史的耻辱柱上。'
    growth_range:
    - 4
    - 7
    attribute_weights:
      force: 44
      intellect: 14
      defense: 24
      agility: 18
  - key: hist_xianqin_0408
    name: 姒启
    archetype: military
    flavor: '（生卒年不详）夏朝第二代君主，开创世袭制的关键人物。他是大禹之子，打破了尧舜禹时代"禅让"的传统，以武力夺取政权，建立了中国历史上第一个世袭王朝。据说大禹原本欲禅让于贤臣伯益，但启势力强大，在众诸侯的支持下继承王位。有扈氏不服，起兵反抗，启在甘地与之大战，获胜后巩固了统治。从此"家天下"取代"公天下"，父死子继成为后世两千年的政治传统。他的夺位虽有争议，却开创了新的时代。夏朝由此正式建立，华夏文明进入国家时代。'
    growth_range:
    - 4
    - 7
    attribute_weights:
      force: 40
      intellect: 18
      defense: 24
      agility: 18
  - key: hist_xianqin_0409
    name: 姒相
    archetype: military
    flavor: '（生卒年不详）夏朝第五代君主，死于寒浞之手。他在位时期，夏朝遭遇了建国以来最大的危机。东夷势力的后羿趁夏朝内乱篡夺政权，相被迫逃亡同盟部落。后来后羿被其心腹寒浞所杀，寒浞又追杀相，最终在斟寻将其杀害。相死时，其妃子已有身孕，从墙洞逃出，后来生下遗腹子少康。他的死使夏朝中断了四十余年，直到少康复国才恢复夏祚。他的悲剧说明：即使是建国不久的王朝，若内部腐化，也难逃覆灭命运。他的遗腹子少康完成了复兴大业。'
    growth_range:
    - 3
    - 7
    attribute_weights:
      force: 34
      intellect: 18
      defense: 28
      agility: 20
  - key: hist_xianqin_0410
    name: 少康
    archetype: military
    flavor: '（生卒年不详）夏朝中兴之主，复国英雄。他是夏帝相的遗腹子，出生时夏朝已被寒浞篡夺。他在母亲的保护下长大，从小便立志复国。他先在有虞氏做厨师，后在有虞氏的支持下积蓄力量，训练武装。时机成熟后，他率众起兵，消灭寒浞及其二子浇、豷，光复夏朝，恢复祖业。他即位后励精图治，使夏朝重新强盛，史称"少康中兴"。这是中国历史上第一次"中兴"，此后中兴成为衰落王朝复兴的专用术语。他从遗腹孤儿到中兴之主的逆袭人生，成为后世无数励志故事的原型。'
    growth_range:
    - 5
    - 7
    attribute_weights:
      force: 40
      intellect: 20
      defense: 24
      agility: 16
  - key: hist_xianqin_0411
    name: 寒浞
    archetype: military
    flavor: '（生卒年不详）篡夺夏朝政权的野心家。他原是后羿的心腹，善于逢迎，逐渐取得后羿信任。后羿荒淫无道，沉迷田猎不理政事，寒浞趁机发动政变，杀死后羿，夺取权力。他又追杀夏帝相，将夏朝王室几乎灭绝。他篡政四十余年，传位于二子浇、豷。然而他的统治不得人心，夏朝遗民始终怀念故国。最终少康崛起，消灭寒浞父子，夏朝复国。他的故事说明：以阴谋篡位者，难以长久。他是中国历史上第一个有记载的篡位者，下场也成为后世篡臣的警示。'
    growth_range:
    - 3
    - 7
    attribute_weights:
      force: 38
      intellect: 18
      defense: 24
      agility: 20
  - key: hist_xianqin_0412
    name: 后羿
    archetype: military
    flavor: '（生卒年不详）夏朝时期传奇人物，射日神话的原型。他是东夷部落有穷氏的首领，善射，箭术冠绝天下。神话传说中，他射落九日、为民除害，是英雄的象征。然而历史上的后羿却是个复杂人物：他趁夏朝内乱，驱逐夏帝太康，掌控朝政，后又废立夏君，实际控制夏朝。他沉迷于田猎，不理政事，最终被心腹寒浞所杀，身死族灭。他既是神话中的英雄，也是历史上的篡臣；既有射日的壮举，也有玩物丧志的悲剧。这种矛盾的形象，使他成为上古时期最具争议的人物之一。'
    growth_range:
    - 4
    - 7
    attribute_weights:
      force: 48
      intellect: 10
      defense: 24
      agility: 18
  - key: hist_xianqin_0413
    name: 嫦娥
    archetype: civil
    flavor: '（生卒年不详）后羿之妻，奔月传说的主角。传说后羿从西王母处求得不死之药，嫦娥趁后羿外出时偷食仙药，身体变轻，飘然升天，飞入月宫。从此她独居广寒宫，与玉兔相伴，永世孤寂。嫦娥奔月的故事寄托了古人对月亮的遐想，也隐含着对永生与孤独的思考：长生不老固然令人向往，但失去亲人朋友、独居寒宫，又有何乐趣？这个神话故事在中国家喻户晓，中秋节的习俗也与之相关。嫦娥的形象从最初的窃药者，逐渐演变为美丽孤寂的月中仙子，成为中国文化中最著名的女性神话形象之一。'
    growth_range:
    - 4
    - 7
    attribute_weights:
      force: 8
      intellect: 52
      defense: 22
      agility: 18
  - key: hist_xianqin_0414
    name: 姒杼
    archetype: military
    flavor: '（生卒年不详）夏朝第七代君主，少康之子。他继承父亲少康的中兴事业，继续巩固夏朝的统治。在他的治理下，夏朝国力日盛，逐渐恢复到鼎盛时期的水平。他多次出兵讨伐东夷诸部落，扩大夏朝疆域，使东方各族臣服。据说他还发明了甲和矛，改进了兵器装备，增强了夏军的战斗力。他的统治是夏朝中兴的延续，使夏朝在经历了后羿、寒浞篡政的动乱后，重新确立了在中原的霸主地位。他是少康之后夏朝最有作为的君主之一。'
    growth_range:
    - 4
    - 7
    attribute_weights:
      force: 40
      intellect: 16
      defense: 26
      agility: 18
  - key: hist_xianqin_0415
    name: 姒桀
    archetype: military
    flavor: '（?—约前1600年）夏朝末代君主，亡国之君的代名词。他力大无穷，能手搏猛兽，本是一代雄主的料。然而他骄奢淫逸，宠幸妹喜，大兴土木，修建倾宫、瑶台，耗尽民力。他残暴无道，杀害直谏的忠臣关龙逢，使天下离心。诸侯纷纷叛离，商汤趁势而起。鸣条之战，夏军大败，桀仓皇出逃，死于南巢。夏朝自大禹建国，传十七王，至此灭亡，国祚约四百七十年。"桀纣"并称，成为暴君的代名词。他的故事警示后人：再强大的君主，若失去民心，也难逃灭亡。'
    growth_range:
    - 3
    - 7
    attribute_weights:
      force: 44
      intellect: 12
      defense: 26
      agility: 18
  - key: hist_xianqin_0416
    name: 妹喜
    archetype: civil
    flavor: '（生卒年不详）夏桀宠妃，"红颜祸水"的最早原型。她是有施氏之女，因部族战败被献给夏桀。她容貌绝美，深得桀宠。传说她喜欢听撕裂丝绸的声音，夏桀便命人日夜撕绸取乐，挥霍无度。她还喜欢看人在酒池中淹溺挣扎，桀便以此为戏。为博她欢心，桀大兴土木、穷奢极欲，使夏朝国力耗尽、民怨沸腾。商汤灭夏后，她与桀一同被放逐，死于南巢。她是中国历史上第一个被归咎为亡国祸水的女性，与妲己、褒姒并称"夏商周三大妖姬"。'
    growth_range:
    - 3
    - 7
    attribute_weights:
      force: 8
      intellect: 50
      defense: 22
      agility: 20
  - key: hist_xianqin_0417
    name: 关龙逢
    archetype: civil
    flavor: '（生卒年不详）夏朝忠臣，中国历史上最早的谏臣之一。他官居大夫，见夏桀荒淫无道、残害百姓，多次冒死进谏，痛陈利害。他手持黄图玉版进谏说："天命之谓性，修道之谓教。"劝夏桀以德治国。夏桀大怒，将他囚禁，后处以极刑。他死前仍不忘劝谏，堪称忠烈。他的死使夏朝失去了最后的直谏之臣，此后再无人敢言，夏朝迅速走向灭亡。他是中国古代忠谏精神的开创者，后世比干、魏征等谏臣皆以他为楷模。"文死谏，武死战"的传统，始于关龙逢。'
    growth_range:
    - 4
    - 7
    attribute_weights:
      force: 10
      intellect: 56
      defense: 20
      agility: 14
  - key: hist_xianqin_0418
    name: 伯益
    archetype: civil
    flavor: '（生卒年不详）上古贤臣，本应继承大禹之位。他是东夷部落的首领，曾协助大禹治水，功勋卓著。大禹晚年欲效仿尧舜，将帝位禅让给他。然而大禹之子启势力强大，获得众诸侯的支持，伯益最终未能继位。关于他的结局，史书记载不一：有说他主动让位于启、隐居山林，有说他与启争位失败被杀。无论如何，他的故事标志着禅让制的终结和世袭制的开始。他代表了上古"公天下"理想的终结，此后"家天下"成为主流。他还被尊为嬴姓始祖，秦国、赵国皆自称其后裔。'
    growth_range:
    - 4
    - 7
    attribute_weights:
      force: 12
      intellect: 54
