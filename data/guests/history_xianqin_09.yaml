  - key: hist_xianqin_0436
    name: 轩辕
    archetype: military
    flavor: '（生卒年不详）上古圣王，华夏人文初祖。他就是黄帝，因居于轩辕之丘而得名。他统一中原各部落，在涿鹿之战中击败蚩尤，在阪泉之战中战胜炎帝，成为天下共主。他时代的发明创造极其丰富：嫘祖养蚕织丝、仓颉造字、伶伦制乐律、大挠作甲子历、隶首发明算数。他被尊为"人文初祖"，中华民族自称"炎黄子孙"即源于此。河南新郑的黄帝故里、陕西黄陵的黄帝陵至今香火鼎盛，每年清明都有盛大祭祀活动。他是中华民族精神统一的最高象征。'
