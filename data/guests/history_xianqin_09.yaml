    flavor: '（生卒年不详）上古史官，甲子历法创始人。他是黄帝时期的大臣，传说奉命创制历法。他观察日月星辰的运行规律，以甲乙丙丁等十天干和子丑寅卯等十二地支相配，创制了六十甲子的纪年纪日法。这套干支纪年法沿用至今，成为中华传统文化的重要组成部分。每年的农历、生肖都与干支有关。他的发明使华夏先民能够准确记录时间、安排农事，对农业文明的发展有重要意义。他是中国古代天文历法的先驱之一。'
