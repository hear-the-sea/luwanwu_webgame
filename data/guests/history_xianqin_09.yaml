  - key: hist_xianqin_0446
    name: 力牧
    archetype: military
    flavor: '（生卒年不详）黄帝战将，涿鹿功臣。他是黄帝时期的著名将领，在涿鹿之战中担任先锋大将，与蚩尤的军队进行了殊死搏斗。传说他力大无穷、勇猛善战，是黄帝麾下最骁勇的战将。在那场决定华夏民族命运的大战中，他冲锋陷阵、斩将夺旗，为最终的胜利立下了赫赫战功。他与风后一文一武，共同辅佐黄帝完成统一大业。他是中国古代武将精神的早期代表，象征着勇敢与忠诚。'
