  - key: hist_xianqin_0439
    name: 帝舜
    archetype: civil
    flavor: '（约前2277年—约前2178年）上古圣王，五帝之一。他名重华，出身卑微，父亲瞽叟和继母弟弟多次加害于他，他却以德报怨，孝行感天动地。尧帝闻其贤名，将两个女儿娥皇、女英嫁给他，又经过多年考察，最终禅让帝位。他任用禹治水、皋陶掌法、后稷管农业、契主教化，使天下大治。他巡狩天下，死于苍梧之野，葬于九嶷山。"二十四孝"之首即是舜的故事。他以孝悌著称，以禅让传贤，是儒家理想人格的最高典范。'
