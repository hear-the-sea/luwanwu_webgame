      agility: 14
  - key: hist_xianqin_0419
    name: 皋陶
    archetype: civil
    flavor: '（生卒年不详）上古贤臣，中国古代法律的奠基者。他是舜帝时期的"大理"，即司法官，掌管刑狱。他制定了中国最早的刑法，建立了明德慎罚的司法原则。他提出"天叙有典，敕我五典五敦哉"的理念，强调刑罚应当公正合理。他在审判中据说使用一种名为"獬豸"的神兽来辨别是非，獬豸会用角顶撞有罪之人。他还辅助大禹治水，功绩显著。大禹曾欲禅位于他，可惜他先于大禹去世。他是中国古代法治思想的先驱，被后世尊为"狱神"。'
    growth_range:
    - 5
    - 7
    attribute_weights:
      force: 10
      intellect: 58
      defense: 18
      agility: 14
  - key: hist_xianqin_0420
    name: 伯夷
    archetype: civil
    flavor: '（指大禹时期的伯夷，生卒年不详）上古贤臣，舜帝时期的秩宗。他掌管祭祀礼仪，是礼乐文化的守护者。注意：此伯夷与商周之际首阳山饿死的伯夷是不同时代的人，仅是同名而已。他是舜帝朝廷中的重臣，与皋陶、后稷、契等人共同辅佐舜帝，使天下大治。他的后裔据说建立了北方的一些部族。由于年代久远，关于他的记载较少，但他作为上古圣贤之一的地位是确定的。他代表了上古时期礼乐文化的传承，是华夏文明初创时期的重要人物。'
    growth_range:
    - 4
    - 7
    attribute_weights:
      force: 10
      intellect: 54
      defense: 22
      agility: 14
  - key: hist_xianqin_0421
    name: 姬弃
    archetype: civil
    flavor: '（生卒年不详）周族始祖，农业之神。他名弃，是帝喾的儿子。传说他出生时被母亲姜嫄弃于野外，牛羊不践踏他，鸟用羽翼覆盖他，因此得名"弃"。他自幼喜爱农事，善于种植五谷。尧舜时期，他担任"后稷"之职，教民稼穑、播种百谷，使农业生产大发展。他被尊为农神，周族以他为始祖，建立了祭祀他的社稷之礼。"社稷"一词本意即为土神与谷神，后引申为国家的代称。他开创的农业文明是华夏文明的根基，他的故事象征着从游牧采集向定居农耕的文明转型。'
