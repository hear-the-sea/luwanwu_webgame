  - key: hist_sljnbc_0150
    name: 王朗
    default_gender: male
    archetype: civil
    flavor: （？—228年11月）曹魏重臣，经学大家。东海郯县人，少时即以通晓经典闻名。他初任会稽太守，后被孙策击败归降。曹操迎献帝后征其入朝，历任谏议大夫、魏郡太守等职，曹魏建国后官至司徒，位列三公。他学问渊博，尤精《周易》，著述甚丰。演义中他随军北伐被诸葛亮阵前痛骂致死，实为虚构之笔，却让他成为千古笑柄。
