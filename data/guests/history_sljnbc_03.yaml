  - key: hist_sljnbc_0146
    name: 曹洪
    default_gender: male
    archetype: military
    flavor: （？—232年）数次救主，忠勇可嘉。沛国谯县人，曹操从弟。他自曹操起兵便追随左右，是最早的创业功臣。荥阳之战曹操战败失马，曹洪将自己的坐骑让给曹操，说出那句"天下可无洪，不可无公"的名言，舍命护主。此后随曹操南征北战，屡立功勋。然他生性贪财吝啬，积财巨万。曹丕即位后因旧怨欲杀之，幸得卞太后求情方免一死。
