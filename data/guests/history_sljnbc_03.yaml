  - key: hist_sljnbc_0142
    name: 徐庶
    default_gender: male
    archetype: civil
    flavor: （？—？）走马荐诸葛，身在曹营心在汉。颍川人，本名徐福，少年时为人报仇后更名。他与诸葛亮、庞统交好，是刘备早期最重要的谋士。新野之战他出谋划策大败曹军，使刘备初尝胜果。然而曹操得知其母在许都，遂伪造书信骗其来降。他临别时向刘备举荐诸葛亮，"卧龙、凤雏得一可安天下"的名言由此传开，改变了三国历史的走向。
