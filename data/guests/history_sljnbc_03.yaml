  - key: hist_sljnbc_0114
    name: 张昭
    default_gender: male
    archetype: civil
    flavor: （156年—236年）东吴重臣，字子布，彭城人。他博学多才，少年时便以文章闻名。他与张纮并称"二张"，早年避乱江东，被孙策延揽为幕僚。孙策临终托孤于他，嘱咐孙权"内事不决问张昭"。他此后尽心辅佐孙权，整顿内政，选拔人才，为东吴政权的稳固立下汗马功劳。然而赤壁之战前他主张投降曹操，认为以江东之力难以抵挡，被周瑜、鲁肃等主战派驳回。
