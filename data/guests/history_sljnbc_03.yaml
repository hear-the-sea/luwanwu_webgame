      agility: 22
  - key: hist_sljnbc_0147
    name: 曹休
    default_gender: male
    archetype: military
    flavor: （？—228年9月）曹氏千里驹，石亭折翼。沛国谯县人，曹操族子。年少时父亲早亡，携母渡江避难。曹操起兵后归附，曹操视如己出，称其为"吾家千里驹"。他作战勇猛，随军征讨张鲁、刘备屡立战功。曹魏建国后镇守东线，统领扬州诸军事，多次与东吴交锋。然石亭之战中他轻信周鲂诈降之计，率军深入遭陆逊伏击，大败亏输，损兵折将。
    growth_range:
    - 6
    - 9
    attribute_weights:
      force: 40
      intellect: 15
      defense: 23
      agility: 22
  - key: hist_sljnbc_0149
    name: 华歆
    default_gender: male
    archetype: civil
    flavor: （157年—232年1月30日）曹魏重臣，三朝元老。平原高唐人，早年与管宁同窗，因性情不合而割席断交，"管宁割席"典故由此而来。他历仕孙策、孙权，后归曹操。曹魏建国后历任尚书令、司徒，位极人臣。他亲手将汉献帝从皇位上拉下，逼其禅位于曹丕，因此遭后世非议，被视为"不忠之臣"。
