  - key: hist_sljnbc_0111
    name: 韩当
    default_gender: male
    archetype: military
    flavor: （？—226年）东吴名将，字义公，辽西令支人。他弓马娴熟，膂力过人，早年追随孙坚讨伐黄巾，此后历仕孙家三代，是江东元老中资历最深者之一。他作战骁勇，每战必身先士卒，随孙坚破董卓、随孙策平江东、随孙权战赤壁，无役不从。他虽功勋卓著，却因出身边地、不善言辞而多年未得显达，始终位居诸将之下。
