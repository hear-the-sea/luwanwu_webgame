  - key: hist_sljnbc_0104
    name: 荀攸
    default_gender: male
    archetype: civil
    flavor: （157年—214年）曹魏谋士，字公达，颍川颍阴人，荀彧之侄。他少年时便有奇谋，曾因图谋刺杀董卓事败被捕，在狱中从容自若，董卓死后获释。曹操迎天子都许后他前来投奔，被任为军师。此后十二年间他随曹操南征北战，献计无数。官渡之战他献计分兵袭击颜良，助关羽斩颜良于万军之中；又献火烧乌巢之策，一举摧毁袁绍军粮，奠定官渡之胜。
