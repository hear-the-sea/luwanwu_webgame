    attribute_weights:
      force: 38
      intellect: 10
      defense: 30
      agility: 22
  - key: hist_sljnbc_0140
    name: 马腾
    default_gender: male
    archetype: military
    flavor: （？—212年）西凉军阀，忠义传家。扶风茂陵人，据称为伏波将军马援之后。他与韩遂并霸西凉三十余年，羌胡畏服，号称"神威天将军"之父。董卓乱政时他曾起兵勤王，参与衣带诏密谋讨曹未果。后应曹操之召入朝为卫尉，实为质子。其子马超在凉州起兵反曹，马腾一家二百余口因此被曹操诛杀于邺城。
    growth_range:
    - 6
    - 9
    attribute_weights:
      force: 42
      intellect: 10
      defense: 24
      agility: 24
  - key: hist_sljnbc_0141
    name: 韩遂
    default_gender: male
    archetype: military
    flavor: （？—215年）西凉老狐狸，乱世求存。金城人，早年与边章起兵反汉，后为凉州割据势力之首。他与马腾时敌时友，合纵连横数十年，是西北边陲最长寿的军阀。潼关之战中曹操用离间计使其与马超反目成仇，两人阵前割袍断义。此后势力日衰，最终被部下杀害，首级献于曹操。他一生反复无常，却总能在刀光剑影中求得生存，是乱世中审时度势的老狐狸。
    growth_range:
    - 6
    - 9
    attribute_weights:
      force: 40
      intellect: 10
      defense: 26
      agility: 24
  - key: hist_sljnbc_0143
    name: 王平
    default_gender: male
    archetype: military
    flavor: （？—248年）街亭之战的清醒者，汉中守护者。巴西宕渠人，原为曹魏汉中守将，归降刘备后追随诸葛亮北伐。街亭之战中他是唯一规劝马谡勿弃水上山的人，马谡不听导致大败，唯王平所部安然撤退。诸葛亮赏其稳重，此后愈加倚重。他虽不识字，却能口述军令，治军严整。后镇守汉中多年，兴势之战以三万之众击退曹爽十万大军，创下以少胜多的佳话。
    growth_range:
    - 6
    - 9
    attribute_weights:
      force: 38
      intellect: 12
      defense: 30
      agility: 20
  - key: hist_sljnbc_0144
    name: 马岱
    default_gender: male
    archetype: military
    flavor: （？—？）马超从弟，斩魏延者。扶风茂陵人，自幼追随马超征战。马超兵败潼关后随其入蜀归降刘备，此后默默无闻辅佐蜀汉数十年。诸葛亮北伐期间随军出征，屡立功勋。诸葛亮临终前密授锦囊，令其伺机斩杀魏延。魏延之乱时，马岱依计行事，于乱军中将其斩杀，完成了丞相遗命。此举虽令他背上"杀害良将"的骂名，实则是执行军令、维护蜀汉稳定的必要之举。
    growth_range:
    - 6
    - 9
    attribute_weights:
      force: 40
      intellect: 10
      defense: 24
      agility: 26
  - key: hist_sljnbc_0145
    name: 张翼
    default_gender: male
    archetype: military
    flavor: （？—264年）亢礼姜维，蜀汉后劲。犍为武阳人，出身名门世族。他性情刚直，敢于直言进谏。姜维主持北伐时，他多次提出异议，认为连年征战劳民伤财、得不偿失，在朝堂上与姜维激烈争论。然而一旦战事开始，他却全力以赴，绝不因私废公。魏灭蜀之战时他随姜维守剑阁，力阻钟会大军。蜀汉灭亡后随姜维归降，参与钟会谋反。
    growth_range:
