    flavor: （？—255年）才兼文武，寿春三叛第二人。河东闻喜人，出身名门。他曾远征高句丽，深入朝鲜半岛千余里，刻石纪功于丸都山上，此石碑至今留存，是中国古代对外征伐的重要史证。他镇守淮南多年，军政皆有建树。司马师废黜曹芳后，他愤而起兵勤王，与文钦联合对抗司马氏。可惜寡不敌众，兵败后逃亡被杀，家族惨遭灭门。他颇有文采，诗赋皆工，是文武兼备的将领。他的反叛虽败，却为曹魏宗室赢得了尊严，是三叛中最有军事才能者。
