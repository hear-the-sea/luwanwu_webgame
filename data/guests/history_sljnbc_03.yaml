  - key: hist_sljnbc_0105
    name: 程昱
    default_gender: male
    archetype: civil
    flavor: （141年—220年）曹魏元老，字仲德，东郡东阿人。他身高八尺三寸，美须髯，有勇有谋。黄巾之乱时他组织乡民守城，初露头角。曹操征陶谦时兖州叛乱，诸郡县皆叛，唯他与荀彧坚守鄄城、东阿、范县三城不失，为曹操保住了根基。官渡之战前刘备叛逃投袁绍，他力主追杀刘备以绝后患，未被采纳。
