  - key: hist_sljnbc_0148
    name: 陈群
    default_gender: male
    archetype: civil
    flavor: （？—237年2月）九品中正制创立者，魏晋选官制度奠基人。颍川许昌人，出身名门世族。其父陈纪、祖父陈寔皆为当世名士。他早年追随刘备，后归曹操。曹丕称帝时他任尚书令，创立九品中正制，以门第才德品评人物、选拔官员，此制度影响中国数百年之久。他历仕曹操、曹丕、曹叡三朝，官至司空，位列三公，是曹魏朝廷的中流砥柱。
