    flavor: （？—258年）淮南悍将，寿春枭雄。谯郡人，骁勇善战，以勇烈闻名于曹魏军中。他是曹爽亲信，高平陵之变后深感危机。司马师废黜曹芳时，他与毌丘俭在淮南起兵勤王，是为寿春三叛之二。兵败后他逃往东吴，东吴授予他官职兵权。诸葛诞起兵时他随吴军入援寿春，然而二人政见不合、猜忌日深。城中粮尽，诸葛诞欲杀东吴降卒以省粮，他坚决反对，矛盾激化。诸葛诞先下手为强，将他杀死。他的两个儿子文鸯、文虎闻父被杀，当即翻城投降司马昭。一代猛将竟死于自己人之手，令人唏嘘。
