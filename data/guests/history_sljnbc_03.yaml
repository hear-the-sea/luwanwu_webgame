  - key: hist_sljnbc_0103
    name: 曹真
    default_gender: male
    archetype: military
    flavor: （？—231年5月）曹魏宗室名将，字子丹，沛国谯县人，曹操养子。其父曹邵早年追随曹操，为救曹操被敌军所杀，曹操感念其恩，收养曹真为子，与诸子一同抚养。他自幼从军，骁勇善战，常为先锋。魏文帝时他镇守雍凉，多次击退羌胡侵扰，威震西陲。诸葛亮第一次北伐时他率军迎击，派张郃在街亭大破马谡，迫使诸葛亮退兵。
