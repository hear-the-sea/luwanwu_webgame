  - key: hist_sljnbc_0102
    name: 曹仁
    default_gender: male
    archetype: military
    flavor: （168年—223年5月6日）曹魏名将，字子孝，沛国谯县人，曹操从弟。他少年时便好武事，从军后随曹操南征北战，攻陶谦、破吕布、平张绣，屡立战功。赤壁之战后他镇守江陵，周瑜率数万吴军围攻经年，他以数千守军死守不退，城中粮尽人困仍坚持到最后撤退。此战奠定了他"守城无双"的威名。
