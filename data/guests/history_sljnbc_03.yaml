  - key: hist_sljnbc_0136
    name: 陶谦
    default_gender: male
    archetype: civil
    flavor: （132年—194年）三让徐州，仁德之主。出身丹阳，早年从军讨伐边章、韩遂之乱，后为徐州刺史。他治理徐州政绩卓著，百姓安居乐业。黄巾之乱时招募军队守土有功，使徐州成为乱世中的富庶之地。虽因部下杀害曹嵩而遭曹操兴兵报复，几致灭族之祸，然他临终将徐州托付刘备，不传子嗣而让贤于能。
    growth_range:
