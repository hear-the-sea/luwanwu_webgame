  - key: hist_sljnbc_0112
    name: 程普
    default_gender: male
    archetype: military
    flavor: （？—215年后）东吴名将，字德谋，右北平土垠人。他容貌英伟，善于应对，早年追随孙坚讨伐黄巾，是江东诸将中资历最老者。孙坚死后他辅佐孙策平定江东，每战必为先锋，所向披靡。孙策遇刺后他又辅佐年幼的孙权，稳定局势。他自恃资深，起初对年轻的周瑜颇为轻视，言语间多有不逊。然而赤壁之战共事后，他为周瑜的才略所折服，叹曰"与周公瑾交。
