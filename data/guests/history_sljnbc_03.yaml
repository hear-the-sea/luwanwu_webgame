  - key: hist_sljnbc_0115
    name: 顾雍
    default_gender: male
    archetype: civil
    flavor: （168年—243年1月28日）东吴丞相，字元叹，吴郡吴县人。他少年时师从蔡邕学琴，蔡邕赞其才华，以己名"邕"之谐音"雍"为其取名。他为人沉默寡言，喜怒不形于色，处事极为谨慎。孙权即位后他历任尚书令、丞相，主持东吴朝政十九年。他为相期间政通人和，百姓安乐，却从不居功自傲，每有建议皆私下密奏，不求人知。
