      agility: 10
  - key: hist_sljnbc_0137
    name: 陈宫
    default_gender: male
    archetype: civil
    flavor: （？—199年2月7日）捉放曹操，命途多舛。东郡人，年少时便以才学闻名于世。初为县吏时曾释放曹操，后因曹操杀害吕伯奢一家而与之决裂，愤而离去。他辅佐吕布对抗曹操，策划兖州之变，联络张邈等叛将，几乎让曹操无家可归、死于绝境。可惜吕布有勇无谋、刚愎自用，陈宫屡献良策皆不被采纳。
