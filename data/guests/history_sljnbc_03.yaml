    - 9
    attribute_weights:
      force: 14
      intellect: 54
      defense: 24
      agility: 8
  - key: hist_sljnbc_0138
    name: 张绣
    default_gender: male
    archetype: military
    flavor: （？—207年）宛城悍将，雪恨曹营。骠骑将军张济之侄，继承其军于宛城，骁勇善战。宛城之战采纳贾诩之计夜袭曹营，斩杀猛将典韦、曹操长子曹昂、侄子曹安民，令曹操终生难忘。后在贾诩劝说下再次归降曹操，曹操不计前嫌重用之，封侯拜将。官渡之战他奋勇当先立有功勋，深受曹操赏识。他是乱世中少有的能屈能伸之辈，既有血战沙场的勇武。
    growth_range:
    - 6
    - 9
    attribute_weights:
      force: 44
      intellect: 10
      defense: 22
      agility: 24
  - key: hist_sljnbc_0139
    name: 臧霸
    default_gender: male
    archetype: military
    flavor: （？—？）泰山豪杰，镇守青徐。泰山华县人，少年时便以勇武闻名，曾聚众劫法场救出父亲。黄巾之乱时聚众据泰山为盗，后归附陶谦，陶谦死后转投吕布。吕布败亡后归顺曹操，曹操令其镇守青徐二州。他深知地方民情，恩威并施，多次击退东吴孙权的进犯，稳定了曹魏的东部边疆数十年。曹魏立国后封良成侯，成为朝廷重臣。
