  - key: hist_sljnbc_0113
    name: 诸葛瑾
    default_gender: male
    archetype: civil
    flavor: （174年—241年）东吴重臣，字子瑜，琅琊阳都人，诸葛亮之兄。他早年避乱江东，为孙权所器重，历任长史、中司马等职。他为人谦恭持重，善于调和各方关系，孙权常派他出使蜀汉与弟弟诸葛亮会面，兄弟二人各为其主却不私相授受，传为佳话。他面相独特，脸长似驴，孙权曾以此戏弄，他皆从容应对，尽显名士风度。
