  - key: hist_sljnbc_0101
    name: 卫瓘
    default_gender: male
    archetype: civil
    flavor: （220年—291年）西晋名臣，字伯玉，河东安邑人。他出身名门，父亲卫觊是曹魏名臣。他少年时便有才名，历任曹魏尚书郎、散骑常侍等职。景元四年（263年）他以镇西军司身份随邓艾、钟会伐蜀，负责监军及后勤调度。邓艾灭蜀后钟会图谋叛乱，他在紧急关头巧妙周旋，成功策动将士哗变诛杀钟会，又逮捕邓艾父子，平定了这场未遂的叛乱。
