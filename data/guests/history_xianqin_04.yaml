  - key: hist_xianqin_0175
    name: 王贲
    archetype: military
    flavor: '（生卒年不详）王翦之子，灭国功臣。他继承父志，在秦统一战争中战功赫赫。他水淹大梁，灭亡魏国；挥军北上，荡平燕国残余；最后率军东进，灭亡齐国，完成统一大业的最后一击。秦灭六国，他独灭三国，与父亲王翦共灭四国，王氏父子功勋卓著，无人能及。他不仅善于野战，更精于攻城——水淹大梁的战术堪称经典。然而功高震主，王氏父子深谙自保之道，功成后急流勇退，得以善终。王翦王贲的故事，是秦将中难得的圆满结局，也是名将智慧的体现。'
    growth_range:
