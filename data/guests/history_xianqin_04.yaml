  - key: hist_xianqin_0184
    name: 冯谖
    archetype: civil
    flavor: '（生卒年不详）孟尝君门客，狡兔三窟。他初投孟尝君时一无所长，只会弹剑唱歌"长铗归来乎"，抱怨无鱼无车无家。孟尝君一一满足，他却始终无所作为，门客皆笑之。后孟尝君遣他往薛地收债，他竟矫命焚烧债券，空手而归，曰"为君市义"。孟尝君初时不解。及至失势归薛，百姓扶老携幼夹道欢迎，他方知"市义"之深意。冯谖又往魏国游说，造势迎请孟尝君，使齐王重新起用。他为孟尝君谋划的"狡兔三窟"——薛地民心、魏国后路、齐王信任——完美布局，使孟尝君安享晚年。大智若愚，冯谖是战国门客中最有远见者。'
