      agility: 16
  - key: hist_xianqin_0189
    name: 甘罗
    archetype: civil
    flavor: '（约前256年—?）十二拜相，少年奇才。他是秦国名臣甘茂之孙，年仅十二便显露惊人才华。秦欲联燕攻赵，派张唐出使，张唐惧祸推辞。他自请出面，先说服张唐，又亲使赵国。面见赵王，他以利害分析令赵王心服：与其被燕秦夹击，不如先下手为强。赵王当即出兵攻燕，夺城数十座，又割五城与秦。他不费一兵一卒，为秦国取得十余城池，秦始皇大悦，拜其为上卿，赐田宅，比肩丞相。少年智胜老臣，甘罗之名震动天下。可惜此后事迹湮没无闻，或早逝或隐退，千古留下一个神童的传奇与谜团。'
