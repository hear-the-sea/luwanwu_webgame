  - key: hist_xianqin_0195
    name: 陈轸
    archetype: civil
    flavor: '（生卒年不详）纵横策士，机智过人。他是战国时期著名纵横家，先后游说于秦、楚、齐等国，以机变灵活著称。"画蛇添足"的典故正出于他：楚王赐酒于群臣，酒少人多，约定画蛇最快者独饮。一人画完后意犹未尽，给蛇添上四足，结果被后画完者夺去美酒——"蛇固无足，子安能为之足"。陈轸以此劝谏楚将昭阳适可而止，不要贪功冒进。他还曾以"卞庄子刺虎"的故事劝张仪坐山观虎斗，不要过早介入韩魏之争。他虽不如苏秦张仪名震天下，却也是战国外交舞台上的重要角色，其机智灵活的游说风格为后世津津乐道。'
