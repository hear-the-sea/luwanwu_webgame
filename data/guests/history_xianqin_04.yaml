  - key: hist_xianqin_0199
    name: 田光
    archetype: military
    flavor: '（?—前227年）壮士断头，荐刺客。他是燕国名士，以侠义著称。燕太子丹求访贤才，鞠武荐田光，田光荐荆轲。他年已老迈，自觉不能担此重任，遂引荐了更年轻的荆轲。临别时太子丹嘱其保密，他深感受辱："太子疑我不能保密耶？"为表忠诚，也为激励荆轲，他当即自刎而死。荆轲闻讯，深受震撼，愈加坚定刺秦之志。田光的牺牲虽非必要，却展现了燕赵之士的侠烈风骨：宁死不负所托，以死明志、以死激励后人。他的故事是荆轲刺秦悲歌中不可或缺的前奏。'
