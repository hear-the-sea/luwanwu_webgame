  - key: hist_xianqin_0179
    name: 樗里疾
    archetype: civil
    flavor: '（?—前300年）秦惠王异母弟，智囊人物。他号"樗里子"，因居于渭南阴乡的樗里而得名。他既是秦国公室贵胄，又是杰出的将相之才，"智囊"的美誉名副其实。他在政治上斡旋游刃有余，在军事上攻城拔寨无往不利。他曾击败韩军于修鱼，攻占魏国曲沃，为秦国东出扫清障碍。更令人称奇的是，他精通堪舆风水之术，临终前预言："后百岁，是当有天子之宫夹我墓。"果然，百年后秦始皇修建阿房宫，长乐宫恰在其墓左右。这一预言令后人惊叹不已，樗里子的传奇也因此更添神秘色彩。'
