  - key: hist_xianqin_0177
    name: 蒙骜
    archetype: military
    flavor: '（?—前240年）蒙恬祖父，秦国名将。他本是齐国人，入秦后受到重用，成为秦国东出的主力战将。他攻韩略地，伐赵拔城，战魏夺邑，在三晋战场上纵横驰骋三十余年。攻占韩国成皋、荥阳，打通东进中原的通道；夺取魏国东郡，将秦国势力推进至齐国边境。他虽不如白起那般声名显赫，却是秦国统一战争中最勤恳的开路先锋。他开创的蒙氏家族，三代为秦效力，是秦国最忠诚的军功世家。'
