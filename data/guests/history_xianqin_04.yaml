      agility: 22
  - key: hist_xianqin_0159
    name: 聂政
    archetype: military
    flavor: '（?—前397年）击杀韩相，刺客传奇。他本是魏国轵邑深井里人，以屠狗为业，与寡母相依为命。严仲子与韩相侠累有隙，重金聘请聂政行刺。聂政以母在为由婉拒，待母亲去世、姐姐出嫁后，他独闯韩国都城。他手持利剑，直入相府，连杀数十人，将侠累斩杀于阶下。事成之后，他深知若被生擒，必连累姐姐，遂以剑自毁面目、剜出双眼、剖腹自尽，使人无法辨认。其姐聂嫈闻讯赶来，认出弟弟遗体，伏尸大哭曰："此吾弟聂政也！"言毕亦自尽于其侧。聂政的忠义与决绝、聂嫈的勇气与亲情，成为《刺客列传》中最动人的篇章，令后世击节叹赏。'
    growth_range:
    - 4
    - 7
    attribute_weights:
      force: 46
      intellect: 10
      defense: 22
      agility: 22
  - key: hist_xianqin_0160
    name: 豫让
    archetype: military
    flavor: '（?—前453年）士为知己者死。他本是智伯家臣，智伯死后欲为其报仇。先以漆涂身、吞炭变声，又伏于桥下欲刺赵襄子，皆未遂。临死前请求赵襄子脱衣，以剑击其衣袍象征报仇，然后自刎。豫让的故事，是忠诚与义气的极致演绎。'
