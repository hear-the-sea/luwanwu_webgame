  - key: hist_xianqin_0178
    name: 李信
    archetype: military
    flavor: '（生卒年不详）秦国少将，灭燕先锋。他年轻气盛，锐意进取，曾率轻骑数千追击燕太子丹于衍水之上，逼太子丹授首。因此功，秦始皇问他伐楚需多少兵力，他豪言"二十万足矣"。然而楚国老将项燕老辣难缠，他中伏大败，七都尉战死，秦军损失惨重。这是他人生中最大的耻辱。此后他收敛锋芒，随王翦以六十万大军再伐楚，终于雪耻。他的一生是年轻将领成长的缩影：锐气可嘉，经验不足；失败教训，换来成熟。少年得志须谨慎，老成持重方能成大事。'
