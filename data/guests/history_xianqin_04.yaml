  - key: hist_xianqin_0196
    name: 唐雎
    archetype: civil
    flavor: '（生卒年不详）布衣之怒，不辱使命。他是魏国安陵君的使臣，年逾八十仍有金刚之躯、虎狼之气。秦灭韩魏后，欲以五百里地换取安陵小国的五十里地，安陵君不从。秦王大怒，召唐雎当面威胁："公亦尝闻天子之怒乎？伏尸百万，流血千里！"唐雎坦然回答："大王尝闻布衣之怒乎？伏尸二人，流血五步，天下缟素！"言毕挺剑而起，逼近秦王。秦王色变，连声道歉，安陵得以保全。唐雎以八旬高龄，凭一腔浩然正气，在虎狼之秦面前威武不屈、大义凛然，成为不辱使命的千古典范。'
