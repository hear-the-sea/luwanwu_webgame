  - key: hist_xianqin_0180
    name: 魏冉
    archetype: civil
    flavor: '（?—约前264年）秦国权臣，穰侯。他是秦宣太后芈八子的异父弟弟，秦昭襄王的舅父。凭借外戚身份，他权倾朝野，四度出任丞相，执掌秦国军政大权三十余年。他最大的功绩是发现并重用了战神白起——正是他力荐白起为将，才有了伊阙之战斩首二十四万、长平之战坑杀四十万的赫赫战功。他主持伐楚攻魏，为秦国开疆拓土无数。然而功高震主，又好结党营私，最终被范雎进谗，秦昭襄王收回权柄，他被罢相遣归封地，在失意中郁郁而终。权臣的兴衰，警示后人。'
