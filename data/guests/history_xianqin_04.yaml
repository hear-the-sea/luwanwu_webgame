  - key: hist_xianqin_0187
    name: 鲁仲连
    archetype: civil
    flavor: '（约前305年—约前245年）义不帝秦，高士典范。秦军围攻邯郸，赵国危在旦夕，魏使辛垣衍劝赵尊秦为帝以解围。他挺身而出，慷慨陈词，痛斥秦国"弃礼义而上首功"，以雄辩令辛垣衍哑口无言，尊秦之议遂罢。后秦军撤退，平原君欲以千金相赠，又奏请赵王封其官爵，他一笑辞谢："所贵于天下之士者，为人排患释难解纷乱而无取也。"他不慕权位，不图财利，功成身退，飘然远去，"蹈东海而死，吾不忍为之民也"——宁死不做暴秦之民，这份风骨千古流芳。义不帝秦的故事，是中国古代高士精神的最高写照。'
