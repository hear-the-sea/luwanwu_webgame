  - key: hist_xianqin_0193
    name: 触龙
    archetype: civil
    flavor: '（生卒年不详）赵国老臣，说服太后。赵惠文王死后，赵太后临朝听政。秦国趁机攻赵，赵欲向齐国求救，齐国要求以太后幼子长安君为人质。太后溺爱幼子，断然拒绝，声称"有复言令长安君为质者，老妇必唾其面"。群臣皆噤声，唯触龙以年迈之躯求见。他不谈国事，先聊家常：问太后饮食起居，谈自己幼子前途，绕了好大一圈才切入正题。他说："父母之爱子，则为之计深远。"真正爱孩子就该让他建功立业，而非锦衣玉食。太后恍然大悟，同意送长安君入齐。触龙的游说艺术迂回曲折、以情动人，是说服学的经典案例。'
