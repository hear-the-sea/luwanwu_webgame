  - key: hist_xianqin_0182
    name: 赵括
    archetype: military
    flavor: '（?—前260年）纸上谈兵，长平败将。他是名将赵奢之子，自幼熟读兵书，谈起兵法滔滔不绝，连父亲赵奢都辩不过他。然而赵奢断言："括不可使将也，若必用之，破赵军者必括也。"他母亲临危向赵王进谏，亦未能阻止。长平之战，他代廉颇为将，急躁冒进，正中白起诡计。秦军佯败诱敌，他率军追击，陷入重围，粮道被断。坚守四十六日后突围失败被杀，四十万赵军投降后被坑杀。"纸上谈兵"的成语由此而来，成为理论脱离实践的千古警示。赵国因此元气大伤，再无力与秦争锋。'
