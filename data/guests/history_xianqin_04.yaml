  - key: hist_xianqin_0181
    name: 赵奢
    archetype: military
    flavor: '（生卒年不详）赵国名将，阏与之战英雄。他原是赵国田部吏，收税时不畏权贵，敢于依法惩治平原君赵胜的不法家臣，因此得到赵惠文王赏识。阏与之战是他的成名之作：秦军围攻阏与，诸将皆以为不可救，唯他力排众议，率军狂飙突进，以迅雷不及掩耳之势击溃秦军，这是战国后期赵国战胜秦国的少数战役之一。他治军严明，赏罚分明，是难得的名将之才。可惜其子赵括只学了父亲的理论，不得父亲的实战经验。赵奢曾预言赵括必败，果然应验于长平之役。知子莫若父，令人唏嘘。'
