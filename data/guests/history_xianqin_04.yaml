  - key: hist_xianqin_0185
    name: 朱亥
    archetype: military
    flavor: '（?—约前225年）信陵君门客，椎杀晋鄙。他本是大梁市井屠户，为人豪爽仗义，力能扛鼎。信陵君礼贤下士，多次登门拜访，他始终以礼相待却不肯追随左右。侯嬴临终献策："此人可用大事。"果然，窃符救赵之际，晋鄙持兵符犹豫不肯发兵，朱亥袖藏四十斤铁椎，一椎击碎其颅骨，夺其兵权。信陵君由此率军救赵，大破秦军。朱亥之勇，勇在关键时刻敢于担当；朱亥之义，义在为知己赴汤蹈火。后来信陵君留居赵国，他随侍左右。据说他后入秦地，壮烈而死。市井匹夫，却有万夫不当之勇。'
