  - key: hist_xianqin_0192
    name: 申不害
    archetype: civil
    flavor: '（?—前337年）法家代表，术治大师。他本是郑国贱臣，后入韩国，被韩昭侯拜为相国，推行变法十五年。他的核心主张是"术"——君主驾驭臣下的权术。"术"包括考核官吏政绩、隐藏君主意图、暗中观察臣下忠诚等手段。他说："明君如身，臣如手；君若号，臣如响。"君主发号施令，臣下应声而动，这就是"术治"的理想状态。在他的治理下，韩国内政修明，兵力充实，一度成为战国七雄之一。然而"术治"偏重权谋，缺乏制度根基，申不害死后韩国迅速衰落。他的思想与商鞅之"法"、慎到之"势"并称，共同被韩非整合为法家完整理论。'
