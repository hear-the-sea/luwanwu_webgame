  - key: hist_xianqin_0197
    name: 姬丹
    archetype: civil
    flavor: '（?—前226年）质秦归燕，图谋刺秦。他是燕王喜之子，年少时曾在赵国为质，与同为人质的嬴政相识。后嬴政继位秦王，他又被送入秦为质，受尽屈辱，多次请归不允。他偷逃回燕后，对秦国恨之入骨，日夜谋划复仇。他礼贤下士，招揽田光、荆轲等侠士，策划惊天刺杀。图穷匕见之际，荆轲功亏一篑，太子丹也因此暴露。秦始皇震怒发兵，燕王喜为求自保，斩子献首，太子丹死于父亲之手。他的复仇虽告失败，但易水悲歌的慷慨激昂、视死如归的豪情壮志，成为后世传颂的英雄篇章。'
