    flavor: '（?—前207年）指鹿为马，祸国巨奸。他是秦朝宦官，矫诏杀扶苏、害蒙恬、专权乱政。"指鹿为马"的典故即出自他。他是中国历史上最臭名昭著的奸臣之一。'
