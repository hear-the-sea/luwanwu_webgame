  - key: hist_xianqin_0190
    name: 徐福
    archetype: civil
    flavor: '（生卒年不详）东渡求仙，海上传奇。他是秦始皇时期的方士，自称能找到海外仙山蓬莱、方丈、瀛洲，获取长生不老之药。秦始皇深信不疑，两次资助他出海求仙。第一次他空手而归，谎称遭遇巨鱼阻挡；第二次他率童男童女三千人，携带五谷百工，驾船入海，从此一去不返。有人说他遭遇海难葬身大洋，有人说他到达日本列岛开创新天地——日本至今有徐福墓、徐福神社，奉其为农业与医药之神。无论真相如何，徐福东渡的故事是中国古代海洋探险的传奇篇章，也折射出秦始皇追求永生的执念与最终幻灭。'
