  - key: hist_xianqin_0161
    name: 申包胥
    archetype: civil
    flavor: '（生卒年不详）哭秦庭七日，救楚功臣。他与伍子胥本是好友，伍子胥出逃时曾言："我必覆楚！"申包胥答曰："子能覆之，我必复之！"后来伍子胥果然引吴兵攻破楚都郢城，楚昭王仓皇出逃，楚国几近亡国。申包胥千里跋涉赶赴秦国求援，秦哀公不允。他立于秦廷之外，日夜悲哭，水浆不入口，七日七夜不绝声。秦哀公终被感动，叹曰："楚虽无道，有臣如此，何患不复！"遂发兵救楚。秦楚联军击退吴兵，楚国得以复存。申包胥功成后拒不受赏，隐居山野。他的故事与伍子胥形成鲜明对照：一个为私仇而覆国，一个为忠诚而救国，孰是孰非，千古评说。'
    growth_range:
    - 4
    - 7
    attribute_weights:
      force: 12
      intellect: 52
      defense: 22
      agility: 14
  - key: hist_xianqin_0162
    name: 养由基
    archetype: military
    flavor: '（生卒年不详）百步穿杨，神射无双。他是楚国名将，以箭术冠绝天下。相传他能在百步之外射中杨柳叶片，箭箭正中，百发百中，"百步穿杨"的成语由此而来。有一次，他为楚庄王表演射术，百发百中；旁观者赞叹，唯有一老者摇头。老者说："善射者，不足道也；能教人射者，方为善射。"养由基虚心受教，不以神技自矜。在楚晋鄢陵之战中，他一箭射中晋将吕锜咽喉，使楚军士气大振。他还曾射杀叛将斗越椒，使楚国平定内乱。养由基不仅是神射手的代名词，更是古代将领中箭术最精湛者。后世形容射术高超，皆以养由基为标杆。'
    growth_range:
    - 4
    - 7
    attribute_weights:
      force: 38
      intellect: 10
      defense: 20
      agility: 32
  - key: hist_xianqin_0163
    name: 赵衰
    archetype: civil
    flavor: '（?—前622年）晋文公谋臣，冬日可爱。他字子余，是晋文公重耳流亡时期最忠诚的追随者之一。在十九年颠沛流离的日子里，他始终不离不弃，与主同甘共苦。他为人谦逊温和，从不争功邀宠，凡有赏赐，皆推让于他人。狐偃锋芒毕露，人比之为"夏日烈阳"；赵衰温润如玉，人比之为"冬日暖阳"——温暖而不灼人，亲切而不迫人。晋文公复国后，他举荐贤才、调和君臣，使晋国人才济济、政通人和。他不争不抢、不骄不躁的品格，成为后世谋臣的楷模。赵氏一族由他发端，数代之后成为晋国最强大的卿族，三家分晋后建立赵国，位列战国七雄。'
    growth_range:
    - 4
    - 7
    attribute_weights:
      force: 12
      intellect: 54
      defense: 20
      agility: 14
  - key: hist_xianqin_0164
    name: 庞涓
    archetype: military
    flavor: '（?—前341年）魏国大将，马陵惨死。他与孙膑同出鬼谷门下，论才学本在伯仲之间，却因嫉妒心起，设计陷害同门，致孙膑受膑刑、面刺黥字。他自以为除去心腹大患，却不料孙膑诈疯逃往齐国，成为他最可怕的对手。桂陵之战，他中围魏救赵之计；马陵之战，他中增兵减灶之计，率军追入绝地。万弩齐发之际，他在火光中看到树上刻字"庞涓死于此树之下"，仰天长叹"遂成竖子之名"后自刎而亡。嫉贤妒能者的悲剧结局，警示后人千古。'
    growth_range:
    - 4
    - 7
    attribute_weights:
      force: 40
      intellect: 16
      defense: 24
      agility: 20
  - key: hist_xianqin_0165
    name: 公孙龙
    archetype: civil
    flavor: '（前320年—前250年）白马非马，名辩大师。他是战国时期名家学派的代表人物，以"白马非马"的论题闻名于世——白马不等于马，因白马有白的属性而马只是概念。这看似诡辩的论证，实则蕴含着对概念与实体、共相与殊相的深刻思考。他游说诸侯，以辩才惊四座；与人辩论，鲜有不败者。他的思想虽被儒墨讥为"诡辩"，却是中国古代逻辑学与语言哲学的重要先驱。《公孙龙子》传世，其中"离坚白"、"指物论"等篇章，至今仍是哲学研究的重要素材。'
    growth_range:
    - 4
    - 7
    attribute_weights:
      force: 8
      intellect: 58
      defense: 18
      agility: 16
  - key: hist_xianqin_0166
    name: 惠施
    archetype: civil
    flavor: '（约前390年—前317年）庄子挚友，名家大师。他博学多才，"学富五车"的典故正是形容他的著作之丰。他与庄子亦敌亦友，濠梁之辩成为千古名篇："子非鱼，安知鱼之乐？""子非我，安知我不知鱼之乐？"两人唇枪舌剑，妙趣横生。庄子评他"逐万物而不反"，批评他过于追求外在知识而忽略内在修养；然庄子晚年过惠施墓，叹无人可语，可见二人情谊之深。他曾任魏国相国，在政治上也颇有建树。惠施是庄子精神上最好的对手，两人的辩论丰富了中国古代哲学的内涵。'
    growth_range:
    - 4
    - 7
    attribute_weights:
      force: 8
      intellect: 58
      defense: 18
      agility: 16
  - key: hist_xianqin_0167
    name: 邹衍
    archetype: civil
    flavor: '（约前324年—约前250年）阴阳家代表，五德终始创始人。他是稷下学宫的重要学者，以"谈天"著称，人称"谈天衍"。他创立阴阳五行学说，提出"五德终始"理论，认为朝代更替遵循金木水火土的相生相克规律——黄帝土德、夏禹木德、商汤金德、周文火德，秦据此自命水德。这套理论为政权更迭提供了天命依据，深刻影响了秦汉以后两千年的政治思想。他还开创了"大九州说"，认为中国只是天下八十一州之一，眼界之开阔令人惊叹。阴阳家虽在诸子百家中不算显学，却对中国传统思想影响深远。'
    growth_range:
    - 4
    - 7
    attribute_weights:
      force: 8
      intellect: 58
      defense: 20
      agility: 14
  - key: hist_xianqin_0168
    name: 列御寇
    archetype: civil
    flavor: '（约前450年—前375年）列子御风，道家传人。他是老庄之间承上启下的道家人物，相传修道有成，能御风而行，飘然若仙。他善养生之道，追求心灵的绝对自由。《列子》一书虽真伪有争议，却是道家经典之一，寓言丰富、想象瑰丽。愚公移山展现不屈不挠的精神；杞人忧天讽刺无谓的担忧；两小儿辩日启发独立思考。这些故事脍炙人口，流传至今。列子的逍遥境界，是道家"无为而治"精神的生动体现。他与黄老、庄周共同构成道家思想的主脉。'
    growth_range:
    - 4
    - 7
    attribute_weights:
      force: 8
      intellect: 58
      defense: 18
      agility: 16
  - key: hist_xianqin_0169
    name: 田忌
    archetype: military
    flavor: '（生卒年不详）赛马智胜，齐国名将。"田忌赛马"的故事家喻户晓：他与齐王赛马屡战屡败，孙膑献策以下等马对上等马、上等马对中等马、中等马对下等马，三局两胜反败为胜。这一策略成为博弈论的经典案例。他礼贤下士，重用孙膑，二人配合默契：桂陵之战围魏救赵，马陵之战减灶诱敌，两战皆大破魏军，庞涓身死，魏国霸业终结。然功高震主，他因与相国邹忌政争失败，出奔楚国流亡多年，晚年始得归齐。名将的沉浮，令人感慨。'
    growth_range:
    - 4
    - 7
    attribute_weights:
      force: 40
      intellect: 16
      defense: 24
      agility: 20
  - key: hist_xianqin_0170
    name: 邹忌
    archetype: civil
    flavor: '（约前385年—前319年）讽齐王纳谏，政治家典范。他身高八尺，容貌俊美，却深谙人心。一日晨起照镜，问妻、妾、客："我与城北徐公孰美？"三人皆答他更美。及见徐公，自知不如。他悟出"宫妇左右莫不私王，朝廷之臣莫不畏王，四境之内莫不有求于王"，遂以此讽谏齐威王。威王纳谏，下令广开言路，能当面批评者受上赏，上书劝谏者受中赏，街谈巷议者受下赏。门庭若市一年后，齐国政清人和，诸侯皆来朝。以己度人，寓理于事，讽谏之术无出其右。'
    growth_range:
    - 4
    - 7
    attribute_weights:
      force: 12
      intellect: 54
      defense: 20
      agility: 14
  - key: hist_xianqin_0171
    name: 淳于髡
    archetype: civil
    flavor: '（约前386年—前310年）齐国辩士，滑稽大师。他身材矮小不满七尺，却口才惊人，辩才无碍。他是稷下学宫的风云人物，以诙谐讽谏著称。一次齐威王问他能饮多少酒，他答："臣饮一斗亦醉，一石亦醉。"威王不解，他解释道：御前进酒战战兢兢，一斗即醉；与朋友痛饮，一石不醉。威王由此明白酒能乱性，遂罢长夜之饮。他出使不辱使命，辩论令人折服，既是稷下先生，又是齐国外交使者。司马迁将他列入《滑稽列传》之首，赞其"谈笑讽谏"的高超技艺。以幽默化解严肃，以笑谈传递箴言，淳于髡堪称古代脱口秀大师。'
