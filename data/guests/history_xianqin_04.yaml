  - key: hist_xianqin_0153
    name: 褒姒
    archetype: civil
    flavor: '（?—前771年）烽火戏诸侯，西周终结者。她出身褒国，据说生性冷淡，从不展颜欢笑。周幽王对她一见倾心，宠爱无度，千方百计只为博她一笑。有佞臣献策：点燃烽火，诸侯以为京畿有难，必率军来援；待他们发现是虚惊，慌张撤退的狼狈模样定能让王后开颜。果然，褒姒看到诸侯匆忙赶来又悻悻而去，终于莞尔一笑。此后幽王多次戏弄，诸侯不再响应。及至犬戎真正入侵，烽火狼烟却无人来救，西周灭亡。"烽火戏诸侯"的故事警示后人：失信于人，必自食其果。褒姒虽是祸首的替罪羊，却成为亡国红颜的代名词。'
    growth_range:
    - 5
    - 9
    attribute_weights:
      force: 8
      intellect: 54
      defense: 18
      agility: 20
  - key: hist_xianqin_0154
    name: 妲己
    archetype: civil
    flavor: '（生卒年不详）殷商祸水，狐媚之姿。她是有苏氏之女，因部族被殷商征伐而入宫为纣王妃。传说她妖媚惑主，教唆纣王行酒池肉林之欢、炮烙之刑之暴，使殷商政治日益腐败。比干剖心、梅伯醢杀，这些血腥故事都与她有关。武王伐纣，牧野一战，殷商覆灭，她被周武王所杀。后世小说《封神演义》将她塑造为狐狸精附身的妖女，更添几分传奇色彩。然而历史真相或许并非如此：帝王昏聩，总需美人背锅。妲己是否真如传说中那般妖邪，已不可考；但"红颜祸水"的骂名，她背负了三千年。'
    growth_range:
    - 5
    - 9
    attribute_weights:
      force: 8
      intellect: 54
      defense: 18
      agility: 20

  green:
  - key: hist_xianqin_0155
    name: 太颠
    archetype: civil
    flavor: '（生卒年不详）文王贤臣，西周开国功臣。他是周文王麾下最重要的谋士之一，与散宜生、闳夭、南宫括并称"文王四友"。在殷商末年的风云际会中，他辅佐文王韬光养晦、积德行义，暗中积蓄力量。文王被囚羑里时，他参与谋划营救大计；文王归周后，他协助整顿内政、发展国力。他的谋略与忠诚，为后来武王伐纣奠定了坚实基础。牧野之战后，周朝建立，太颠以开国元勋受封。他是西周建国进程中不可或缺的人物，虽名声不如姜尚显赫，却同样功勋卓著、青史留名。'
    growth_range:
    - 4
    - 7
    attribute_weights:
      force: 12
      intellect: 54
      defense: 20
      agility: 14
  - key: hist_xianqin_0156
    name: 师旷
    archetype: civil
    flavor: '（约前572年—前532年）盲乐师，乐坛至圣。他双目失明，却耳聪至极，能辨音知情、听声识政。相传他自幼酷爱音乐，为使听觉更加敏锐，竟以艾草熏瞎双目，从此全心沉浸于声音的世界。他精通五音六律，创作《阳春》《白雪》等名曲，曲高和寡，非凡俗所能领会。他以琴声论政，曾为晋平公演奏，听者闻之而知天下兴衰。他直言敢谏，以乐理比喻治国之道，使君主明白施政得失。后世尊他为乐圣，与伯牙并称。师旷的故事告诉后人：上天关闭一扇门，必然打开另一扇窗。残疾并不能阻挡天才的光芒，反而可能造就更纯粹的艺术追求。'
    growth_range:
    - 4
    - 7
    attribute_weights:
      force: 8
      intellect: 58
      defense: 18
      agility: 16
  - key: hist_xianqin_0157
    name: 文种
    archetype: civil
    flavor: '（?—前472年）越国谋臣，功高不退。他本是楚国人，与范蠡一同投奔越王勾践，成为越国复兴的两大支柱。会稽之败后，他随勾践忍辱负重，为越国谋划复仇大计。他献"伐吴七术"——美人计、贿赂计、空其粮仓等，条条直中要害，使吴国内外交困、日渐衰落。二十年卧薪尝胆，越国终灭强吴，勾践一跃成为霸主。然而功成之后，范蠡急流勇退，临行前警告文种："飞鸟尽，良弓藏；狡兔死，走狗烹。越王可与共患难，不可与共荣乐。"文种不以为意，留恋权位不肯离去。果然，勾践猜忌日重，赐剑令其自杀。文种临死方悔不听范蠡之言，一代谋臣，竟落得如此下场。'
    growth_range:
    - 4
    - 7
    attribute_weights:
      force: 12
      intellect: 54
      defense: 20
      agility: 14
  - key: hist_xianqin_0158
    name: 要离
    archetype: military
    flavor: '（生卒年不详）断臂事仇，刺杀庆忌。他为刺杀吴王僚之子庆忌，自断右臂、杀妻灭子，以取信于敌。最终趁庆忌不备，一剑刺入其胸。如此狠辣决绝，非常人所能。然事成后他拒不封赏，自刎而死，还妻子以清白。忠勇与惨烈，尽在要离。'
    growth_range:
    - 4
    - 7
    attribute_weights:
      force: 42
      intellect: 14
