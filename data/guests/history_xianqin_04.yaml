  - key: hist_xianqin_0172
    name: 尉缭
    archetype: civil
    flavor: '（生卒年不详）秦国军师，兵法大家。他是秦始皇统一天下的重要谋士，所著《尉缭子》与《孙子兵法》并称。他最初入秦时曾劝嬴政以重金贿赂各国权贵、离间君臣，"不过三十万金，则诸侯可尽"。嬴政纳其策，广施财贿，六国朝堂遍布秦之内应。他深谙用间之道，主张"不战而屈人之兵"；又精通军制改革，使秦军战斗力更上层楼。然而他识人入骨，曾评价嬴政"蜂准长目，挚鸟膺"，认为其人可共患难不可共富贵。功成后他悄然隐退，不知所踪，或是早已看透帝王心术。'
