  - key: hist_xianqin_0173
    name: 甘茂
    archetype: civil
    flavor: '（生卒年不详）秦国名臣，宜阳之战功臣。他本是下蔡人，学百家之术，入秦为相，以口才和智谋著称。秦武王欲伐韩取宜阳，他力主出兵，并立誓必下此城。然而宜阳城坚，久攻不克，武王欲退兵。他派人进言："息壤之盟在彼"，提醒武王曾在息壤许诺不退兵。武王惭愧，增兵继战，终于攻克宜阳，打通了秦国东出的通道。此战奠定了秦国称霸中原的战略基础。后因与权臣樗里疾、魏冉政争失败，他出奔齐国，终老异乡。能战善谋却不善自保，甘茂的结局令人唏嘘。'
    growth_range:
