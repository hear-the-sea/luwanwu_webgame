  - key: hist_xianqin_0186
    name: 侯嬴
    archetype: civil
    flavor: '（?—前257年）夷门监者，智计无双。他年逾七十，是大梁城夷门的看门人，穷困潦倒却有经天纬地之才。信陵君闻其名，亲自执辔为其驾车，请他上座，满城瞩目。他感念知遇之恩，终成信陵君最重要的谋士。窃符救赵的全盘计划出自他手：先以姬妾盗虎符，再以朱亥杀晋鄙夺兵权。他为信陵君规划好每一步，却以年迈为由不肯随行。临别时他说："公子当有成功日，嬴请从此辞矣。"信陵君至晋鄙军中时，他北向自刎，以死相送，报知遇之恩。布衣之士，却有宰相之才；守门老人，却有帝王师的谋略。'
