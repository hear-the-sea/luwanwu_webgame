  - key: hist_xianqin_0174
    name: 司马错
    archetype: military
    flavor: '（生卒年不详）秦国大将，伐蜀功臣。在秦惠文王时，他与张仪争论秦国战略方向。张仪主张先伐韩，攻取三川，挟天子以令诸侯；他则力主先灭蜀，"得蜀则得楚，楚亡则天下并矣"。秦王采纳他的建议，他率军入蜀，灭蜀定蜀，将天府之国纳入秦版图。巴蜀的粮食、木材、铜铁源源不断输往关中，秦国国力由此大增。他的战略眼光超越时代，不争一时之利，而谋百年之基。后世评价秦灭六国，得蜀为首功，而司马错正是这一战略的奠基者。沉稳持重，远见卓识，秦国真正的战略家。'
    growth_range:
