# 历史人物门客 - 先秦时期（第04批：蓝色5人 + 绿色45人）

heroes:
  blue:
  - key: hist_xianqin_0150
    name: 项燕
    archetype: military
    flavor: '（?—前223年）楚国名将，抗秦之魂。他是楚国末期最杰出的将领，也是西楚霸王项羽的祖父。秦将李信率二十万大军伐楚，年轻气盛，轻敌冒进。项燕老谋深算，诱敌深入，伏击秦军，大败李信，斩杀七都尉，这是战国后期楚军对秦军最辉煌的胜利。秦始皇震怒，起用老将王翦，发兵六十万再伐。项燕拼死抵抗，终因力量悬殊，兵败身死（一说自刎殉国）。楚国灭亡之际，民间流传"楚虽三户，亡秦必楚"的预言。十余年后，他的孙子项羽在巨鹿之战破釜沉舟，推翻暴秦，预言成真。项燕虽败，其精神不灭。'
    growth_range:
    - 6
    - 9
    attribute_weights:
      force: 42
      intellect: 16
      defense: 24
      agility: 18
