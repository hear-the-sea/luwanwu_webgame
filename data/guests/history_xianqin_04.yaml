  - key: hist_xianqin_0188
    name: 高渐离
    archetype: civil
    flavor: '（生卒年不详）荆轲挚友，击筑悲歌。他是燕国著名乐师，精于击筑。易水之畔，荆轲踏上刺秦不归路，他击筑相送，荆轲高歌"风萧萧兮易水寒，壮士一去兮不复还"，声调悲壮，闻者无不涕泣。荆轲死后，他隐姓埋名，以击筑为生，流落民间多年。后名声渐起，被秦始皇发现，念其技艺非凡，熏瞎双目后留于宫中演奏。他怀揣复仇之心，在筑中灌铅，趁演奏之机奋力击向秦始皇，可惜未中，当场被杀。他以生命践行对故友的承诺，用死亡完成对暴君的最后一击。击筑之声虽已消散，侠义之魂永存人间。'
