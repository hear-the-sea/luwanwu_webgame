  - key: hist_xianqin_0198
    name: 秦舞阳
    archetype: military
    flavor: '（生卒年不详）十三杀人，图穷色变。他是燕国勇士，据说十三岁就因斗殴杀人，凶悍之名远播。燕太子丹选他作为荆轲的副手，一同入秦行刺。然而真正站在咸阳宫殿、面对威严秦王的那一刻，他全身颤抖、面色惨白，几乎要露出破绽。荆轲见状，从容圆场："北蕃蛮夷之鄙人，未尝见天子，故振慑。"化解了危机。他的怯场与荆轲的镇定形成鲜明对比：杀人于市井是匹夫之勇，临大事而不惧是大丈夫之风。秦舞阳有前者而无后者，故功亏一篑。'
