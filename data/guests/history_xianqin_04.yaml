  - key: hist_xianqin_0194
    name: 公孙衍
    archetype: civil
    flavor: '（生卒年不详）五国相王，纵横家。他是战国时期著名纵横家，与张仪齐名，人称"公孙衍、张仪岂不诚大丈夫哉"。他曾在秦国任大良造，后因与张仪政见不合离秦入魏。他力主合纵抗秦，策划了"五国相王"——燕、赵、韩、魏、中山五国互相尊王，共同抵御秦楚两个大国。他还组织过多次合纵攻秦，虽屡战屡败，但始终不放弃联合抗秦的理想。他与张仪一合纵一连横，代表了战国外交的两条路线。孟子评价"一怒而诸侯惧，安居而天下熄"，正是形容他们这类纵横家的巨大影响力。'
