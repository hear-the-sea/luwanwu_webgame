  - key: hist_xianqin_0191
    name: 慎到
    archetype: civil
    flavor: '（约前395年—约前315年）法家先驱，势治理论。他是稷下学宫的重要学者，主张"势治"——君主权威来源于权势地位，而非个人德行才能。他提出"飞龙乘云，腾蛇游雾，云罢雾霁，而龙蛇与蚓蚁同矣"，说明权势如同龙蛇的云雾，失去权势的君主与凡人无异。他的思想突破了儒家"德治"的窠臼，为法家理论奠定基础。他还主张"法"应公开透明，让百姓有章可循。韩非将他的"势"与商鞅的"法"、申不害的"术"融合，创建法家完整体系。《慎子》传世，虽残缺不全，但其"重势"思想对中国古代政治理论影响深远。'
