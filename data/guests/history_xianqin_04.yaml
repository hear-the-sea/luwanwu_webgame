  - key: hist_xianqin_0183
    name: 毛遂
    archetype: civil
    flavor: '（前285年—前228年）毛遂自荐，勇气典范。他在平原君门下三年，默默无闻，不受重用。秦围邯郸之际，平原君欲往楚求援，挑选二十名随从，仅得十九人。他挺身自荐："臣愿处囊中颖脱而出。"平原君笑允。至楚国，日暮谈判无果，他拔剑而上，威胁楚王："今十步之内，王不得恃楚国之众！"楚王震恐，当即歃血为盟。平原君归而叹曰："毛先生一至楚，而使赵重于九鼎大吕。"此后他被奉为上客。"毛遂自荐"成为自我推荐的代名词。敢于自荐是勇气，临危不乱是才干，毛遂兼而有之。'
