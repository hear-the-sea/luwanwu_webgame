  - key: hist_xianqin_0176
    name: 蒙武
    archetype: military
    flavor: '（?—约前219年）蒙恬之父，秦国大将。他是蒙氏家族承上启下的关键人物，其父蒙骜开创基业，其子蒙恬光大门楣。他追随王翦伐楚，在那场动用六十万大军的灭楚之战中立下汗马功劳。他参与攻破楚都郢城，追杀项燕，为秦统一南方奠定基础。蒙氏三代忠于秦国：蒙骜从齐入秦开疆拓土，蒙武征战沙场功勋卓著，蒙恬北击匈奴威震边疆。三代人的忠诚与牺牲，最终却换来赵高的构陷、胡亥的屠刀。功臣世家的悲剧，令人扼腕。'
    growth_range:
