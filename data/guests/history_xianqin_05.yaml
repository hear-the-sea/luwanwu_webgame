  - key: hist_xianqin_0222
    name: 干将
    default_gender: male
    archetype: military
    flavor: （生卒年不详）铸剑大师，干将莫邪。他是春秋时期吴国著名铸剑师，受吴王之命铸造宝剑。传说他采五山之铁精、六合之金英，却久铸不成。其妻莫邪问："铁汁不下，何也？"干将答："须以人祭炉。"莫邪遂投身炉中，刹那间铁汁涌流，神剑铸成。他铸成雌雄双剑，以妻为名曰"莫邪"，自己则得名"干将"。他献莫邪于吴王而私藏干将，被吴王所杀。其子赤眉长大后取干将剑报仇。这段铸剑传奇融合了工匠技艺、夫妻深情与复仇悲歌，成为中国古代最动人的神话之一。
    growth_range:
    - 6
    - 11
    attribute_weights:
      force: 40
      intellect: 16
      defense: 26
      agility: 18
  - key: hist_xianqin_0223
    name: 莫邪
    default_gender: female
    archetype: civil
    flavor: （生卒年不详）投身炉中，成就神剑。她是铸剑师干将的妻子，美丽贤淑、深明大义。当丈夫为吴王铸剑屡铸不成时，她毅然投身熔炉，以血肉之躯祭炼神兵。传说她投炉之时，火焰由红转青，铁汁如泉涌出，神剑终于铸成。干将为纪念爱妻，将雌剑命名为"莫邪"。她的牺牲不仅成就了绝世神兵，更成为中国古代工匠精神与夫妻深情的象征。后世将"干将莫邪"并称，既指这对神剑，也颂扬这段可歌可泣的爱情。莫邪之名，因铸剑传奇而永垂不朽。
    growth_range:
    - 6
    - 11
    attribute_weights:
      force: 10
      intellect: 54
      defense: 18
      agility: 18
  blue:
  - key: hist_xianqin_0224
    name: 欧冶子
    default_gender: male
    archetype: military
    flavor: （约前550年—?）铸剑鼻祖，神兵之父。他是春秋时期越国著名铸剑大师，被尊为中国铸剑术的开创者。他为越王勾践铸造了湛卢、纯钧、胜邪、鱼肠、巨阙五把绝世名剑，每一把都有其独特品性：湛卢剑有灵性，能自择明主；纯钧剑锋利无双，价值连城；鱼肠剑即专诸刺王僚所用之剑。他还与干将共同铸造龙渊、泰阿等神兵。他善于选矿炼铁，精通淬火之术，将铸剑技艺推向登峰造极的境界。后世尊其为"铸剑之祖"，春秋时期的名剑传说，多与他有关。他是中国古代工匠精神的最高象征。
    growth_range:
    - 6
    - 9
    attribute_weights:
      force: 40
      intellect: 18
      defense: 24
      agility: 18
  - key: hist_xianqin_0226
    name: 庖丁
    default_gender: male
    archetype: civil
    flavor: （生卒年不详）解牛神技，道法自然。他是战国时期的一位普通厨师，却因庄子的一则寓言而名垂千古。《庄子·养生主》记载：庖丁为文惠君解牛，手之所触、肩之所倚、足之所履、膝之所踦，莫不中音。文惠君惊叹其技艺，庖丁答曰："臣之所好者道也，进乎技矣。"他的刀十九年不磨而锋利如新，因为他顺应牛体的天然结构，游刃于筋骨之间。"目无全牛"、"游刃有余"等成语由此而来。庖丁解牛的故事蕴含深刻哲理：技艺的最高境界是"道"，顺应自然规律，方能事半功倍。
    growth_range:
    - 6
    - 9
    attribute_weights:
      force: 12
      intellect: 54
      defense: 18
      agility: 16
  - key: hist_xianqin_0204
    name: 姬职
    default_gender: male
    archetype: military
    flavor: （约前335年—前279年）筑台招贤，复兴燕国。他是燕国中兴之主，继位于齐国乱燕、国破家亡之际。他立志复仇，卑身厚礼，广招天下贤才。郭隗献策"千金买马骨"：先厚待身边的普通人才，天下贤才自会闻风而来。他筑黄金台礼遇郭隗，果然乐毅从魏来、剧辛从赵来、邹衍从齐来，名士云集。他任用乐毅为上将军，苦心经营二十八年，终于发动五国伐齐。乐毅势如破竹，连下七十余城，齐国几乎亡国。他虽未亲眼看到灭齐，但毕生复仇大计已基本完成。"千金买骨"成为求贤若渴的千古典范，燕昭王的故事激励后世无数有志之士。
    growth_range:
    - 6
    - 9
    attribute_weights:
      force: 36
      intellect: 22
      defense: 24
      agility: 18
  - key: hist_xianqin_0212
    name: 嬴驷
    default_gender: male
    archetype: military
    flavor: （前356年—前311年）车裂商鞅，继承变法。他是秦孝公之子嬴驷，秦国第一位称"王"的国君。继位后他处死商鞅以平息旧贵族怨恨，却完整保留变法政策，展现出高超的政治手腕。他任用张仪推行连横之策，瓦解六国合纵；又用司马错伐蜀，将巴蜀纳入版图，为秦国获得了粮仓与战略后方。在他治下，秦国东出函谷、南取巴蜀，疆域大幅扩张。他是秦国从诸侯强国迈向统一天下道路上的关键君主，奠定了秦国霸业的战略基础。
    growth_range:
    - 6
    - 9
    attribute_weights:
      force: 38
      intellect: 20
      defense: 24
      agility: 18
  - key: hist_xianqin_0213
    name: 嬴稷
    default_gender: male
    archetype: military
    flavor: （前325年—前251年）长平坑卒，奠定统一。他是秦惠文王之子嬴稷，在位五十六年，是秦国历史上在位时间最长的君主。前期由母亲宣太后和舅父魏冉摄政，后来范雎入秦，他亲政掌权，实行"远交近攻"的战略。他用白起为将，伊阙斩韩魏二十四万、长平坑赵卒四十万，六国精锐几乎被屠戮殆尽。他完成了秦统一天下的奠基工作：当他去世时，六国已无力与秦抗衡，统一只是时间问题。他是秦国由强转霸的关键人物。
    growth_range:
    - 6
    - 9
    attribute_weights:
      force: 38
      intellect: 22
      defense: 24
      agility: 16
  - key: hist_xianqin_0214
    name: 嬴渠梁
    default_gender: male
    archetype: military
    flavor: （前381年—前338年）商鞅变法，秦国崛起。他是秦献公之子嬴渠梁，继位时秦国积贫积弱，被东方六国视为蛮夷之邦。他发布求贤令，言辞恳切："宾客群臣有能出奇计强秦者，吾且尊官，与之分土。"卫国人商鞅闻令而来，君臣相得。他顶住旧贵族的巨大压力，全力支持商鞅变法二十余年。废井田、开阡陌、奖军功、行县制——一系列改革将秦国从落后蛮荒改造成虎狼之邦。他死后商鞅被杀，但变法之策未废。秦孝公的魄力与远见，开启了秦国一百五十年的崛起之路。
    growth_range:
    - 6
    - 9
    attribute_weights:
      force: 38
      intellect: 22
      defense: 24
      agility: 16
  - key: hist_xianqin_0202
    name: 田因齐
    default_gender: male
    archetype: military
    flavor: （?—前320年）一鸣惊人，变法图强。他是田齐第四代国君田因齐，继位之初沉湎酒色，荒废国政，诸侯皆来伐齐。群臣多次进谏无果，淳于髡以隐语问曰："国中有大鸟，止王之庭，三年不蜚又不鸣，王知此鸟何也？"他答曰："此鸟不飞则已，一飞冲天；不鸣则已，一鸣惊人。"此后他幡然醒悟，一朝振作：诛杀贪官污吏、赏识忠臣良将、广开言路纳谏。邹忌讽谏的故事正发生在他在位期间。他任用邹忌为相、孙膑为军师，齐国由此强盛，击败魏国，威震天下。"一鸣惊人"成为后来者奋发图强的经典励志故事。
    growth_range:
    - 6
    - 9
    attribute_weights:
      force: 36
      intellect: 20
      defense: 26
      agility: 18
  - key: hist_xianqin_0207
    name: 魏罃
    default_gender: male
    archetype: military
    flavor: （约前400年—前319年）迁都大梁，由盛转衰。他是魏国第三任国君魏罃，在位五十年，见证了魏国从战国初期霸主跌落为二流国家的全过程。他迁都大梁（今开封），故又称梁惠王。他好大喜功却用人不明：放走商鞅使秦强，逼走孙膑使齐盛。桂陵之战被围魏救赵，马陵之战被减灶诱敌，两战皆惨败于孙膑之手，魏国精锐魏武卒损失殆尽。晚年他接待孟子，感慨"寡人愿安承教"，孟子以"五十步笑百步"讽刺他的仁政不彻底。他的一生是魏国由盛转衰的缩影：起点最高，结局最惨。
    growth_range:
    - 6
    - 9
    attribute_weights:
      force: 34
      intellect: 20
      defense: 26
      agility: 20
  - key: hist_xianqin_0208
    name: 赵何
    default_gender: male
    archetype: military
    flavor: （约前310年—前266年）完璧归赵之君。他是赵国中兴之主赵何，在位期间赵国达到极盛。完璧归赵、渑池之会、将相和等千古佳话都发生在他治下。他慧眼识人：起用廉颇为将，威震诸侯；任用蔺相如为相，不辱使命。廉颇负荆请罪的故事，正是他用人有方的体现。他还重用赵奢，在阏与之战大败秦军。他在位时，赵国与秦国东西对峙，成为阻挡秦国东进的最大障碍。可惜他的继任者赵孝成王不能继承父业，长平一战葬送赵国。若惠文王在世，或不至于有长平之败。
    growth_range:
    - 6
    - 9
    attribute_weights:
      force: 36
      intellect: 22
      defense: 24
      agility: 18
  - key: hist_xianqin_0210
    name: 熊槐
    default_gender: male
    archetype: military
    flavor: （?—前296年）客死秦国，可怜可悲。他是楚国君主熊槐，在位三十年，将楚国从霸主拖入衰落。他被张仪戏弄，以六百里地为诱饵断绝齐楚联盟，结果分文未得；他两次入秦，第一次被扣留三年，第二次竟被扣为人质，客死异乡。他亲小人、远贤臣：宠信奸臣靳尚，放逐忠臣屈原。屈原悲叹"众女嫉余之蛾眉兮，谣诼谓余以善淫"，正是痛斥楚怀王的昏聩。他死后，楚人怀念其悲惨遭遇，反而同情日增。他的一生是好心办坏事、昏庸误国的典型。
    growth_range:
    - 6
    - 9
    attribute_weights:
      force: 32
      intellect: 20
      defense: 26
      agility: 22
  - key: hist_xianqin_0200
    name: 樊于期
    default_gender: male
    archetype: military
    flavor: （?—前227年）献首助友，义薄云天。他原是秦国将领，因罪逃亡燕国，秦王悬赏万金购其首级。荆轲刺秦需要见面礼——樊於期的人头和燕国督亢地图。荆轲登门相告，坦陈利害。樊於期听罢，仰天长叹："吾日夜切齿拊心，乃今得闻教！"言毕拔剑自刎，将头颅献给荆轲。他用自己的生命换取接近秦王的机会，用自己的首级为复仇铺路。这等壮烈牺牲，非常人所能为。他的死与田光之死前后呼应，共同诠释了战国末年燕赵之士视死如归的侠义精神。
    growth_range:
    - 6
    - 9
    attribute_weights:
      force: 42
      intellect: 12
      defense: 26
      agility: 20
  - key: hist_xianqin_0201
    name: 田辟疆
    default_gender: male
    archetype: military
    flavor: （?—前301年）好大喜功，滥竽充数。他是齐国君主田辟疆，继承威王之业，延续稷下学宫的繁荣。他喜爱音乐，尤好吹竽，偏要三百人齐奏。南郭先生不会吹竽，却混迹其中，照样领取俸禄——这就是"滥竽充数"的典故。他好大喜功，曾问孟子"齐桓晋文之事"，孟子借机宣扬王道仁政。他征伐燕国，一度吞并，却不能治理，终被诸侯联军逐出。他虽非明君，却维持了齐国的强盛地位，稀下学宫在他治下达到鼎盛。他与孟子的对话，成为《孟子》的重要篇章。
    growth_range:
    - 6
    - 9
    attribute_weights:
      force: 36
      intellect: 18
      defense: 26
      agility: 20
  - key: hist_xianqin_0203
    name: 田地
    default_gender: male
    archetype: military
    flavor: （?—前284年）骄狂灭齐，身死乱邦。他是齐国君主田地，在位期间齐国达到极盛，灭宋国、败楚军，一时号称东帝，与西帝秦昭襄王并称。然而权势使他目空一切：他轻视诸侯，怠慢贤才，刚愎自用，独断专行。燕昭王隐忍多年，联合赵、魏、韩、秦发动五国伐齐，乐毅为帅，势如破竹，连下七十余城。他仓皇出逃，流亡途中被楚国淖齿所杀，死状凄惨。从东帝到亡国之君，不过转瞬之间。他的故事是"骄兵必败"的最佳注脚：即使强盛如齐，一朝骄狂，也难逃败亡。齐国虽后来复国，元气大伤，再难恢复往日荣光。
    growth_range:
    - 6
    - 9
    attribute_weights:
      force: 38
      intellect: 16
      defense: 26
      agility: 20
  - key: hist_xianqin_0206
    name: 韩昭侯
    default_gender: male
    archetype: military
    flavor: （?—前333年）任用申不害，韩国小康。他是韩国第六任国君，在位期间重用申不害为相，推行变法十五年。申不害主张"术治"，即君主驾驭臣下的权术。在申不害的治理下，韩国内修政教、外应诸侯，"国治兵强，无侵韩者"。他深谙用人之道，将权柄牢牢掌握在自己手中。韩国虽是战国七雄中最弱的一个，但在昭侯时期却能自保于强邻之间，这与申不害变法密不可分。然而"术治"偏重权谋而缺乏制度根基，申不害死后韩国迅速衰落。昭侯时期是韩国历史上难得的小康时代。
    growth_range:
    - 6
    - 9
    attribute_weights:
      force: 34
      intellect: 22
      defense: 26
      agility: 18
  - key: hist_xianqin_0209
    name: 赵丹
    default_gender: male
    archetype: military
    flavor: （?—前245年）长平用括，丧师四十万。他是赵惠文王之子赵丹，继位后赵国由盛转衰。长平之战是他一生最大的污点：他中秦国反间计，撤换老将廉颇，启用只会纸上谈兵的赵括。结果赵军被白起围困四十六天，四十万人投降后被坑杀，赵国元气大伤。此后邯郸之战虽勉强获胜，但赵国已再无争霸之力。长平之败，使赵国自此一蹶不振，为后来的亡国埋下伏笔。
    growth_range:
    - 6
    - 9
    attribute_weights:
      force: 34
      intellect: 18
      defense: 26
      agility: 22
  - key: hist_xianqin_0211
    name: 熊横
    default_gender: male
    archetype: military
    flavor: （?—前263年）父辱子继，国势日衰。他是楚怀王之子熊横，父亲客死秦国后继位。他在位期间，楚国遭遇最大劫难：秦将白起攻破楚都郢城，焚毁先王陵墓，楚王室被迫东迁至陈。屈原悲愤于国家衰亡，在此时投汨罗江自尽。他曾试图励精图治，任用庄辛等贤臣，但秦国势大，已非人力所能挽回。楚国虽未在他手中亡国，却从此一蹶不振，沦为待宰羔羊。他的一生，是在父辈留下的烂摊子上苦苦挣扎的悲剧。
    growth_range:
    - 6
    - 9
    attribute_weights:
      force: 34
      intellect: 20
      defense: 26
      agility: 20
  - key: hist_xianqin_0218
    name: 郑国
    default_gender: male
    archetype: civil
    flavor: （生卒年不详）疲秦水工，反成利秦。他是韩国派往秦国的间谍，肩负着一项特殊使命：以修建水渠为名，消耗秦国国力，延缓秦国东进的步伐。然而事与愿违，他主持修建的郑国渠工程浩大，引泾河水灌溉关中平原四万余顷良田。渠成之后，关中从此成为天府之国，秦国国力不减反增。他的"疲秦"之计，最终成为"强秦"之举。这一阴差阳错的历史，折射出小国在大国博弈中的无奈。他虽为间谍，却因工程之功，反被秦王赦免，其渠也以他的名字命名。
    growth_range:
    - 6
    - 9
    attribute_weights:
      force: 10
      intellect: 56
      defense: 20
      agility: 14
  - key: hist_xianqin_0228
    name: 郭隗
    default_gender: male
    archetype: civil
    flavor: （生卒年不详）千金买骨，招贤样板。他是战国时期燕国的谋士，在燕国最艰难的时刻发挥了关键作用。燕国被齐国攻破，燕昭王即位后立志复仇，问郭隗如何招揽人才。郭隗讲了一个故事：古有国君出千金买千里马，使者买回一匹死马的骨头。国君大怒，使者说：死马尚且出千金，何况活马？果然不久就有人送来三匹千里马。郭隗说："王欲致士，先从隗始。"昭王大悟，筑黄金台厚礼郭隗。消息传开，乐毅、剧辛、邹衍等名士纷纷投奔燕国，燕国终于强盛起来。"千金买骨"成为求贤若渴的千古典范。
    growth_range:
    - 6
    - 9
    attribute_weights:
