  - key: hist_suitang_0091_jiadao
    name: 贾岛
    default_gender: male
    archetype: civil
    flavor: （779年-843年）中唐诗人，早年为僧，后还俗应试，终身以"苦吟"闻名。"推敲"典故便出自其改诗琢句的执拗，显示他对语言精确度的近乎偏执。贾岛作品多写寒士处境、旅途寂寥与清冷景物，句法瘦硬，意境峭拔。与孟郊并称"郊寒岛瘦"，正是同一类审美：不追繁华，专写清苦。贾岛把诗当作工艺：一字一字磨出来的冷光，未必热烈，却极其耐看。读他，能感到中唐文人的孤独被压缩进短句里，像敲在石上的回声。
    growth_range:
    - 6
    - 9
    attribute_weights:
      force: 10
      intellect: 52
      defense: 20
      agility: 18
  - key: hist_suitang_0092_weizhuang
    name: 韦庄
    default_gender: male
    archetype: civil
    flavor: （约836年-910年）晚唐五代词人，经历唐末兵乱与政权更替。其诗词多写乱离、离乡与旧国回忆，情感沉痛而不失清婉，"未老莫还乡"道尽时代迁徙之伤。韦庄并非只会写愁，他后期入蜀并参与政务，见证地方政权如何在废墟上重建秩序。正因亲历动荡，他的文字像一份私人史：不讲宏大叙事，只写个体在乱世中的漂泊与无奈。韦庄把晚唐的凄惋带进五代，让词从宫廷绮靡转向对现实伤痛的记录。
    growth_range:
    - 6
    - 9
    attribute_weights:
      force: 14
      intellect: 48
      defense: 24
      agility: 14
  - key: hist_suitang_0093_luoyin
    name: 罗隐
    default_gender: male
    archetype: civil
    flavor: （833年-909年）晚唐诗人，以讽刺与议论见长。其科举屡败，十试不第的经历使其对官场弊病与社会不公更为敏感，诗文常带辛辣与冷笑。罗隐并不只"骂人"，他也能写世情与人生无奈，只是更愿用尖锐语气戳破虚伪。晚唐政治腐败、藩镇混战之际，他的笔像一把刻刀，把时人不敢直言的怨气刻在诗里。后来仕途有所着落，却已难改锋芒。读罗隐，会感到一种"笑里藏刀"的清醒：越是荒唐，越要把话说透。
    growth_range:
    - 6
    - 9
    attribute_weights:
      force: 14
      intellect: 50
      defense: 22
      agility: 14
  - key: hist_suitang_0094_lishi
    name: 李适
    default_gender: male
    archetype: civil
    flavor: （742年-805年）唐德宗，处在藩镇割据与财政紧张的时代，曾试图通过整饬财赋与用兵削藩重建中央权威。其改革与征讨引发多次兵乱，泾原兵变后不得不出奔，显示朝廷对军队控制已极为脆弱。德宗性格多疑而急切，政策时松时紧，既想恢复秩序，又常以苛急方式透支信任；后期在财政上更依赖盐铁与宦官体系，使问题更复杂。德宗一朝像拉扯不断的绳结：每一次用力都在改变结构，却未必朝向更好的方向。
    growth_range:
    - 6
    - 9
    attribute_weights:
      force: 18
      intellect: 46
      defense: 24
      agility: 12
  - key: hist_suitang_0095_lishu
    name: 李诵
    default_gender: male
    archetype: civil
    flavor: （761年-806年）唐顺宗，在位短暂却以"永贞革新"闻名。其即位后试图推动政治改革，依靠王叔文等整顿弊政、限制宦官与改善财政，但改革迅速遭既得利益反扑。顺宗又因疾病影响政务，终在压力下禅位。顺宗的历史意义不在治绩多少，而在揭示中唐体制的硬度：改革意愿存在，但政治结构对变动极不友好。永贞革新的失败让"变法"成为高风险行为，也使后世看到宦官、藩镇、士大夫之间的力量格局已难靠皇帝个人扭转。
    growth_range:
    - 6
    - 9
    attribute_weights:
      force: 14
      intellect: 48
      defense: 24
      agility: 14
  - key: hist_suitang_0096_liliheng
    name: 李恒
    default_gender: male
    archetype: civil
    flavor: （795年-824年）唐穆宗，承接宪宗削藩后的余势，却未能延续紧绷的治理节奏。史书多记其沉湎声色、政务松弛，朝廷对藩镇与宦官的制衡进一步削弱。穆宗朝并非没有人才与政策讨论，但皇帝个人意志不足使其难以形成持续推力，国家逐渐滑向"表面平静、结构松动"的状态。穆宗这一段更像一次提醒：短暂回升之后，若缺乏稳定的制度自律，权力很快会回到旧轨道——由近侍与派系主导。与其说穆宗败家，不如说他让体制惯性重新占上风。
    growth_range:
    - 6
    - 9
    attribute_weights:
      force: 16
      intellect: 44
      defense: 24
      agility: 16
  - key: hist_suitang_0097_lizhan
    name: 李湛
    default_gender: male
    archetype: civil
    flavor: （809年-827年）唐敬宗，在位时间不长，宫廷政治却更显危险。史载其喜游宴而疏政务，近臣与宦官势力趁机加深对禁军与机要的控制，最终导致其被弑。敬宗之死并非偶发刺杀，而是晚唐权力结构恶化的结果：皇帝离开政务中心，权力就会被更接近刀兵的人填补。敬宗的短暂统治像一盏骤灭的灯，提醒人们晚唐皇权已不再"天然安全"，宫廷内部的暴力逻辑开始吞噬君主本身。
    growth_range:
