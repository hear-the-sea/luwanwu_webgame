  - key: hist_suitang_0112_cenwenben
    name: 岑文本
    default_gender: male
    archetype: civil
    flavor: （595年-645年）唐初名臣，以文才与政务能力见长，参与机密与制诰，是贞观朝重要文臣之一。其擅长把皇帝意图转化为可执行的政令，又能以学识为政策提供论证，使文治不止是口号。制诰与文书在初唐不是装饰，而是国家组织能力的核心：写得准，才能传得开、行得下。岑文本性格谨慎，不喜夸张，却能在关键问题上提出清晰判断。他最出色的地方，是把复杂事务写成明确规则，让政令穿过层级真正到达地方。
