  - key: hist_suitang_0103_lizhu
    name: 李柷
    default_gender: male
    archetype: civil
    flavor: （892年-908年）唐哀帝，唐朝最后一位皇帝。其即位时大势已去，朝廷被权臣与军阀操控，皇帝只是合法性外衣。随着朱温势力完全控制中枢，李柷被迫禅位，唐朝正式终结，五代时代开启。哀帝在史书中常显得"无为"，但这恰是现实：当王朝机器已被拆散，个人努力几乎无从着力。李柷更像一个终点：从盛唐到末唐，制度光泽被慢慢磨尽，最终只剩一个名字来完成交接仪式；这不是一个人的失败，而是一个帝国的寿终正寝。
    growth_range:
    - 6
    - 9
    attribute_weights:
      force: 10
      intellect: 46
      defense: 24
      agility: 20
  - key: hist_suitang_0104_tangjian
    name: 唐俭
    default_gender: male
    archetype: civil
    flavor: （571年-640年）唐初重臣，以善于辞令与对外交涉著称。其多次奉命出使突厥等势力，在唐初边疆形势未稳时为朝廷争取时间与空间。外交在初唐并非宴饮礼仪，而是与军事实力相互配合的前线工作，唐俭常在刀尖上谈判。史书对其评价偏重谨慎与识大体，能把个人荣辱放在国家利益之后。相比名将，他更像幕后把关者：用一封信、一句话，减少一场仗的代价，让新王朝在强敌环伺中站稳脚跟。
