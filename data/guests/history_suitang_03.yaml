    default_gender: male
    archetype: military
    flavor: （？-622年）唐初开国将领之一，随李渊起兵并参与早期关键战事。其军功多见于开国诸将列传，虽不如名帅显赫，却属于新王朝最需要的那类人：在兵力、粮饷都紧张的阶段，能带兵、能守城、能执行。殷开山去世较早，使其名声不易被后世反复讲述，但早亡也意味着他未被卷入后续权力清洗。殷开山提醒：开国功臣并非都在画像里，更多人把血与时间投入战争后便被时代翻页。
