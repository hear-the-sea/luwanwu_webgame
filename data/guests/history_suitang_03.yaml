    flavor: （? - 785年）唐代宰相，德宗朝政局动荡中一度位居中枢。史书多以其善于权术、用人多疑而加以批评，并把君臣互不信任的气氛与其政风联系起来。需要谨慎的是，卢杞的"恶名"也与当时政治失败的整体背景相互强化：财政紧张、藩镇叛乱、皇帝急于集权，任何决策都可能被放大为罪责。无论个人品行如何，他在关键时段的作为确实反映了中唐中枢的困境——当制度不足以化解冲突时，政治往往滑向猜忌与清算，而宰相就成了风暴中心的靶标。
