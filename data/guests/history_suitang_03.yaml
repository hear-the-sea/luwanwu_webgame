  - key: hist_suitang_0110_gaoshilian
    name: 高士廉
    default_gender: male
    archetype: civil
    flavor: （？-647年）唐初重臣，出身关陇名门，与皇室姻亲关系密切，是贞观政治的重要支点之一。其在选任、礼制与政务协调中发挥作用，既代表贵族集团影响力，也体现唐初逐渐制度化的用人机制。高士廉善于在功臣、宗室与文臣之间维持平衡，不以锋芒取胜，而以持重与分寸见长。正因这种"稳"，他在贞观初年能久居中枢并参与塑造政治风气，说明治世不只靠名场面，也靠协调者把关系网络转成可运转秩序。
