    attribute_weights:
      force: 14
      intellect: 46
      defense: 22
      agility: 18
  - key: hist_suitang_0098_liang
    name: 李昂
    default_gender: male
    archetype: civil
    flavor: （809年-840年）唐文宗，曾有意限制宦官权势，企图重建皇权与官僚政治的边界。最著名的尝试是甘露之变：文宗与朝臣策划除宦，事败反遭大规模清洗，宦官势力更盛。文宗并非不勤政，他的问题在于手段与资源不足：没有稳固的禁军控制权，任何反击都可能变成自残。文宗的悲剧在于看清问题，却无法掌握解决问题的工具。其统治揭示晚唐核心矛盾：皇帝名义至高，但武力与信息常在宦官之手，改革因此近乎不可能。
    growth_range:
    - 6
    - 9
    attribute_weights:
      force: 14
      intellect: 48
      defense: 22
      agility: 16
  - key: hist_suitang_0099_liyan
    name: 李炎
    default_gender: male
    archetype: civil
    flavor: （814年-846年）唐武宗，性格强硬，崇尚节俭与武功，试图整顿财政与军政。其最具争议的政策是会昌灭佛，出于财政、户籍与政治控制等多重考虑，对寺院与僧尼群体进行严厉打击，影响深远。武宗亦在对外与对内事务中表现出一定决断，但其统治并未改变晚唐结构性困境。从武宗身上可以看到国家在危机中可能采取的强力收缩：当财政紧张与权力失衡叠加，宗教与社会组织便可能成为整顿对象；评价武宗既要看到整饬意图，也要看到粗暴代价与短期性。
    growth_range:
    - 6
    - 9
    attribute_weights:
      force: 18
      intellect: 46
      defense: 26
      agility: 10
  - key: hist_suitang_0100_lipi
    name: 李漼
    default_gender: male
    archetype: civil
    flavor: （833年-873年）唐懿宗，晚唐矛盾继续积累的阶段性君主。其时期宦官势力与藩镇结构未见根本改变，朝廷财政与社会压力加深，民间不满与地方动荡逐步增多。史书多批评其荒怠与奢侈，但更关键的是制度层面的疲惫：中央难以有效管理地方，军费与赋税机制不断扭曲，使基层承受更重负担。懿宗一朝并非突然崩坏，而是把崩坏条件继续堆高；理解李漼，不能只看个人品行，而要看到晚唐已进入系统性透支阶段。
    growth_range:
    - 6
    - 9
    attribute_weights:
      force: 14
      intellect: 44
      defense: 24
      agility: 18
  - key: hist_suitang_0101_lixi
    name: 李儇
    default_gender: male
    archetype: civil
    flavor: （862年-888年）唐僖宗，处在晚唐大乱的核心时期。黄巢起义爆发后，朝廷失去对关中与东南的有效控制，僖宗多次出奔，皇权威望急剧下滑。其统治中宦官专权加深，地方藩镇趁乱坐大，导致唐朝从"衰"转为"碎"。僖宗并非全无作为，但面对财政崩溃与军事失控，皇帝个人已难扭转局势。僖宗在历史叙事里更像一个转折标记：帝都不再是帝都，朝廷不再能调动全国资源；黄巢之乱之后，统一已难回。
    growth_range:
    - 6
    - 9
    attribute_weights:
      force: 12
      intellect: 44
      defense: 22
      agility: 22
  - key: hist_suitang_0102_liye
    name: 李晔
    default_gender: male
    archetype: civil
    flavor: （867年-904年）唐昭宗，身处军阀割据与宦官专权的双重夹击。其多次试图摆脱宦官控制、重建皇权，甚至出走以求借外力，但每一步都被更强武力反制。昭宗时期朝廷与各大军阀的关系近乎"挟天子以令诸侯"的典型场景，皇帝沦为政治筹码。其最终被杀，象征唐朝最后的尊严被彻底剥夺。昭宗的悲剧不是能力不足，而是权力资源早已不在皇帝手里：禁军、财赋、信息皆外移，皇帝再有意志也只能在他人棋盘上移动。
    growth_range:
