    flavor: （？-646年）唐初将领，早年从军立功，亦参与边防与平叛，名列功臣之中。唐初功臣政治风险极高：皇权强化、宗室争斗与功臣自危并存，许多人既要立功，也要学会收敛。张亮后因政治案件获罪被诛，显示开国功臣的安全边界并不牢固。其起落更像新王朝稳定过程中的一次切割：皇帝通过清洗与惩处重新划定权力边界。张亮的结局提醒：在从乱世到治世的过渡里，军功不是护身符。
