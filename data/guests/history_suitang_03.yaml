    default_gender: male
    archetype: military
    flavor: （557年-628年）隋末唐初名将，早年为隋守将，曾在关中与唐军对峙，展现顽强的守御能力。隋亡大势既定后，他转而归唐，并在新政治环境中继续从军效力，成为旧朝名将如何融入新朝的典型。屈突通的价值不只在战功，更在其立场转变背后的现实：在鼎革之际，忠于旧主与保全百姓、家族常难两全。史书对他有褒有贬，但其经历真实反映隋唐转折期将领的艰难选择——多数人只能在大势里寻找可活的路径。
