  - key: hist_suitang_0111_wenyanbo
    name: 温彦博
    default_gender: male
    archetype: civil
    flavor: （573年-640年）唐初宰辅之一，以稳健持重著称，参与贞观时期政务运作与制度推进。他更擅长在纷繁事务中保持条理：处理奏议、协调部门、平衡人事，使朝廷机器能按规则运行。贞观政治成形，既需要魏征那样的直谏，也需要温彦博这样把政策落地的人。史书评其谨慎持平，这类品质在开国后尤为稀缺——因为太多功臣习惯用战场逻辑处理朝堂。温彦博的价值就在于把朝廷从豪杰聚会转向官僚治理，让治世具备日常形态。
    growth_range:
