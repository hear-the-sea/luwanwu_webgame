  - key: hist_sljnbc_0351
    name: 王衍
    default_gender: male
    archetype: civil
    flavor: （256年—311年）西晋大臣，琅琊临沂人，字夷甫。他出身名门，容貌俊美，善于清谈玄理，是西晋清谈风气的代表人物。他口若悬河，随意改变自己的论点，时人称其"口中雌黄"。他历任尚书令、太尉等要职，位极人臣。然他以清谈为务，不理实际政务，对国家危机视而不见。永嘉五年（311年）洛阳陷落，他随晋怀帝被俘。
    growth_range:
    - 3
    - 6
    attribute_weights:
      force: 20
      intellect: 40
      defense: 20
      agility: 20
  - key: hist_sljnbc_0352
    name: 齐万年
    default_gender: male
    archetype: military
    flavor: （？—299年）氐族首领，西晋末年起义军领袖。元康六年（296年），关中地区发生严重饥荒，官府赈济不力，民众流离失所。他趁势纠集氐族和流民起兵反晋，自称皇帝，据守泾阳一带。西晋朝廷多次派兵征讨，却屡战屡败，叛乱持续数年之久。期间晋军伤亡惨重，国力大损。直至元康九年（299年），晋军以孟观为将，方才将其击败生擒，押送洛阳处死。
    growth_range:
    - 3
    - 7
    attribute_weights:
      force: 52
      intellect: 6
      defense: 30
      agility: 12
  - key: hist_sljnbc_0353
    name: 王济
    default_gender: male
    archetype: civil
    flavor: （？—291年）西晋权贵，太原晋阳人，字武子，晋武帝司马炎的女婿。他娶常山公主为妻，出入宫禁，宠冠一时。他好奢靡，生活极其豪华，与石崇、王恺等斗富成风。他家中以人乳喂养小猪，以此制作美食招待宾客，穷奢极欲。他善于骑射，有一匹爱马价值千金。他虽有才学，却沉溺于声色犬马，不务正业。他的生活作风成为后世描述西晋士族腐化堕落的典型事例。
    growth_range:
    - 3
    - 7
    attribute_weights:
      force: 20
      intellect: 40
      defense: 20
      agility: 20
  - key: hist_sljnbc_0354
    name: 司马伦
    default_gender: male
    archetype: civil
    flavor: （？—301年）西晋宗室，赵王，字子彝，晋宣帝司马懿第九子。他本是老迈昏聩的宗室藩王，永康元年（300年）他趁贾南风专权引起众怒之机，联合其他势力发动政变将贾南风废黜赐死。他随后独揽朝政，不久更废黜晋惠帝自立为帝。他登基后滥封赏赐，将官爵授予近侍亲信，以致"貂不足，狗尾续"，"狗尾续貂"典故由此而来。
    growth_range:
    - 3
    - 6
    attribute_weights:
      force: 20
      intellect: 40
      defense: 20
      agility: 20
  - key: hist_sljnbc_0355
    name: 王弥
    default_gender: male
    archetype: military
    flavor: （？—311年）西晋末年流民起义领袖，东莱人，字子玄。他少有才干，西晋末年天下大乱，他在家乡聚众起义，自称"飞豹将军"，转战青徐之间。后他归附刘渊建立的汉赵政权，被封为征东大将军、青州牧。永嘉五年（311年）他与刘曜、石勒联兵攻破洛阳，俘虏晋怀帝，洛阳城内公卿百官及军民被杀者三万余人，史称"永嘉之乱"。
    growth_range:
    - 3
    - 6
    attribute_weights:
      force: 40
      intellect: 15
      defense: 23
      agility: 22
  - key: hist_sljnbc_0356
    name: 刘聪
    default_gender: male
    archetype: military
    flavor: （？—318年）汉赵政权第二任皇帝，新兴匈奴人，字玄明，刘渊第四子。他自幼聪慧，精通汉学，兼习武艺。刘渊死后他夺得帝位，继续对西晋用兵。永嘉五年（311年）他遣大军攻破洛阳，俘虏晋怀帝，迫其为仆从斟酒，后将其杀害。建兴四年（316年）他再遣军攻入长安，俘虏晋愍帝，西晋灭亡。
    growth_range:
    - 3
    - 7
    attribute_weights:
      force: 40
      intellect: 15
      defense: 23
      agility: 22
  - key: hist_sljnbc_0357
    name: 乐广
    default_gender: male
    archetype: civil
    flavor: （？—304年）西晋名士，南阳淯阳人，字彦辅。他出身寒门，却以清雅俊逸的风度和高超的玄谈闻名于世。时人形容见他"如披云雾而睹青天"，称赞其人品高洁、气质超凡。"杯弓蛇影"典故与他有关：有客饮酒其室，见杯中有蛇影，归而疾病，他发现是墙上挂弓的倒影映入杯中，告知后客人心病顿愈。
    growth_range:
    - 3
    - 6
    attribute_weights:
      force: 20
      intellect: 40
      defense: 20
      agility: 20
  - key: hist_sljnbc_0358
    name: 王恺
    default_gender: male
    archetype: civil
    flavor: （？—？）西晋权贵，东海郯县人，晋武帝司马炎的舅父。他凭借外戚身份位居高位，生活穷奢极欲。他与石崇斗富是西晋奢靡之风的典型事例：他用麦芽糖涂抹锅底，石崇则用蜡烛当柴烧；他用紫丝布列步障四十里，石崇用锦缎列步障五十里；他用花椒涂墙，石崇则以赤石脂涂壁。晋武帝曾赐他一株珊瑚树，他拿去向石崇炫耀，石崇用铁如意将其击碎。
    growth_range:
    - 3
    - 7
    attribute_weights:
      force: 20
      intellect: 40
      defense: 20
      agility: 20
  - key: hist_sljnbc_0359
    name: 董卓
    default_gender: male
    archetype: military
    flavor: （？—192年5月22日）东汉末年权臣，字仲颖，陇西临洮人。他自幼在凉州长大，与羌人交往密切，后投身军旅，在平定羌乱的战争中屡立战功，逐渐成为拥兵自重的边将。中平六年（189年）大将军何进谋诛宦官，召他率军入京。他兵临洛阳时何进已死，他趁乱控制朝廷，废少帝刘辩，立陈留王刘协为帝（汉献帝），自任相国，独揽朝政。
    growth_range:
    - 3
    - 6
    attribute_weights:
      force: 40
      intellect: 15
      defense: 23
      agility: 22
  - key: hist_sljnbc_0360
    name: 赫连勃勃
    default_gender: male
    archetype: military
    flavor: （381年—425年）大夏开国皇帝，匈奴铁弗部人，原名刘勃勃，后改姓赫连。他自幼丧父，寄人篱下，后投奔后秦姚兴，因才干受到重用。义熙三年（407年）他趁后秦内乱之机自立为王，建立大夏政权。他在朔方修筑统万城，城墙以蒸土筑成，坚硬如铁。他命工匠铸造"大夏龙雀"刀，锋利无比。
    growth_range:
    - 3
    - 7
    attribute_weights:
      force: 34
      intellect: 12
      defense: 40
      agility: 14
  - key: hist_sljnbc_0361
    name: 吕光
    default_gender: male
    archetype: military
    flavor: （337年—399年）后凉开国君主，略阳氐族人。他早年追随前秦苻坚，骁勇善战，屡立功勋。太元八年（383年）苻坚命他率军远征西域，他一路势如破竹，平定龟兹等三十六国，威震西域。他在西域得到高僧鸠摩罗什，欲带回中原。淝水之战后前秦瓦解，他率军东归，发现凉州无主，遂据守姑臧自立。
    growth_range:
    - 3
    - 7
    attribute_weights:
      force: 40
      intellect: 15
      defense: 23
      agility: 22
  - key: hist_sljnbc_0362
    name: 李暠
    default_gender: male
    archetype: civil
    flavor: （351年—417年）西凉开国君主，陇西成纪人，字玄盛，自称汉代李广后裔。他博学多才，精通文史，早年在后凉、北凉任职。隆安四年（400年）他被推举为敦煌太守，随后建立西凉政权，定都敦煌，后迁都酒泉。他在位期间大力提倡儒学，广设学校，招揽人才，使西凉成为河西走廊的文化中心。
    growth_range:
    - 3
    - 7
    attribute_weights:
      force: 20
      intellect: 40
      defense: 20
      agility: 20
  - key: hist_sljnbc_0363
    name: 张轨
    default_gender: male
    archetype: civil
    flavor: （255年—314年）前凉奠基人，安定乌氏人，字士彦。西晋末年他出任凉州刺史，正值天下大乱、永嘉之祸爆发。当中原沦陷于胡族铁蹄之下时，他据守河西，保境安民，收容中原流亡士人和百姓。他整饬吏治、兴修水利、发展农业，使凉州成为乱世中的一片净土。他始终奉晋室正朔，名义上尊奉东晋为正统，实际独立治理凉州。
    growth_range:
    - 3
    - 6
    attribute_weights:
      force: 20
      intellect: 40
      defense: 20
      agility: 20
  - key: hist_sljnbc_0364
    name: 苻生
    default_gender: male
    archetype: military
    flavor: （335年—357年）前秦第三任皇帝，略阳临渭氐族人，苻健之子。他自幼便失去一只眼睛，性情暴戾。其父苻健临终前曾警告太子苻苌提防他，但苻苌早死，他得以继位。他在位期间嗜酒好杀，荒淫无度，朝会之上常以杀人为乐，大臣稍有失言便被处死。他不理政事，专务游猎，国政日益败坏。他在位仅两年，宗室和大臣不堪忍受其暴政。
    growth_range:
    - 3
    - 7
    attribute_weights:
      force: 40
      intellect: 15
      defense: 23
      agility: 22
  - key: hist_sljnbc_0365
    name: 张重华
    default_gender: male
    archetype: civil
    flavor: （327年—353年）前凉第四任君主，安定乌氏人，张骏之子。他年仅十六岁便继位为凉州刺史，正值后赵石虎势力鼎盛、屡次进犯之时。他知人善任，破格起用书生谢艾为将。谢艾以七千人大破后赵麻秋十万大军，三战三捷，使后赵再不敢西犯。他在位期间河西安定，政治清明，前凉国势达到鼎盛。
    growth_range:
    - 3
    - 6
    attribute_weights:
      force: 20
      intellect: 40
      defense: 20
      agility: 20
  - key: hist_sljnbc_0366
    name: 吕婆楼
    default_gender: male
    archetype: civil
    flavor: （？—？）前秦重臣，略阳氐族人，后凉开国君主吕光之父。他早年追随苻氏家族，在前秦建国过程中立有功勋。苻坚为东海王时他便已追随左右，是苻坚最信任的心腹重臣之一。苻坚密谋推翻暴君苻生时，他参与策划政变，是拥立苻坚即位的核心成员。苻坚执政后他受到重用，参与军国大事的决策。他教子有方，其子吕光后来成为前秦名将，远征西域威名赫赫。
    growth_range:
    - 3
    - 7
    attribute_weights:
      force: 12
      intellect: 58
      defense: 18
      agility: 12
  - key: hist_sljnbc_0367
    name: 秃发乌孤
    default_gender: male
    archetype: military
    flavor: （？—399年）南凉武王，河西鲜卑秃发部首领，十六国南凉建立者。趁后凉内乱自立，定都乐都，整军理政，广纳部众，使南凉迅速崛起于河西。其在后凉、北凉、西秦间合纵连横，既以武力震慑诸部，又以政治手腕维系盟敌，为南凉基业奠定格局。虽国祚短促，仍为后继者承续扩张打下根基。并能安集河西诸族，令南凉一时声望大振。
    growth_range:
    - 3
    - 6
    attribute_weights:
      force: 40
      intellect: 15
      defense: 23
      agility: 22
  - key: hist_sljnbc_0368
    name: 段业
    default_gender: male
    archetype: civil
    flavor: （？—401年）北凉开国君主，京兆人，字季阳。他本是儒生出身，博学多才，在后凉任建康太守。隆安元年（397年）沮渠蒙逊、沮渠男成兄弟起兵反叛后凉，推举他为凉州牧，建立北凉政权。他虽名为君主，实权却掌握在沮渠氏兄弟手中。他为人宽厚却优柔寡断，不善处理军国大事，且迷信方术、听信谗言。
    growth_range:
    - 3
    - 7
    attribute_weights:
      force: 20
      intellect: 40
      defense: 20
      agility: 20
  - key: hist_sljnbc_0369
    name: 沮渠蒙逊
    default_gender: male
    archetype: civil
    flavor: （368年—433年）北凉太祖，临松卢水胡人，字道丰。他出身豪族，博览群书，精通兵法韬略。隆安元年（397年）他与兄长沮渠男成起兵反叛后凉，推段业为主建立北凉。他实际掌控军政大权，段业不过是傀儡。隆安五年（401年）他杀段业自立为河西王。他在位三十余年，先后吞并南凉、西凉，统一河西走廊。
    growth_range:
    - 3
    - 7
    attribute_weights:
      force: 20
      intellect: 40
      defense: 20
      agility: 20
  - key: hist_sljnbc_0370
    name: 冯跋
    default_gender: male
    archetype: civil
    flavor: （？—430年）北燕文成帝，长乐信都人，字文起。他原为后燕将领，后燕末年政局动荡，慕容熙荒淫暴虐。义熙三年（407年）他与弟弟冯素弗等发动政变杀死慕容熙，拥立高云为帝建立北燕。两年后高云被部下所杀，他被推举为帝。他在位二十二年，励精图治，轻徭薄赋，鼓励农桑，使北燕百姓得以休养生息。
    growth_range:
    - 3
    - 6
    attribute_weights:
      force: 20
      intellect: 40
      defense: 20
      agility: 20
  - key: hist_sljnbc_0371
    name: 慕容暐
    default_gender: male
    archetype: civil
    flavor: （350年—384年）前燕末代皇帝，昌黎棘城人，慕容儁之子。他年幼即位，由叔父慕容恪辅政。慕容恪去世后大权落入庸碌的慕容评手中，前燕政治日趋腐败。建元六年（370年）前秦苻坚派王猛率军攻打前燕，他在邺城被围困后投降，前燕灭亡。他被苻坚封为新兴侯，在长安生活十余年。淝水之战后前秦瓦解，他趁乱与叔父慕容垂、弟弟慕容冲等图谋复国。
    growth_range:
    - 3
    - 7
    attribute_weights:
      force: 20
      intellect: 40
      defense: 20
      agility: 20
  - key: hist_sljnbc_0372
    name: 苻丕
    default_gender: male
    archetype: military
    flavor: （？—386年）前秦哀平帝，略阳临渭氐族人，苻坚长子。淝水之战后前秦瓦解，他率军镇守邺城抵御叛乱的慕容氏势力。太元十年（385年）苻坚被羌族姚苌所杀，他在晋阳继位为帝，年号太安。他在位期间内外交困，慕容氏在东、姚苌在西夹击前秦残余势力，他腹背受敌。他多次向东晋求援，东晋派兵相助却也趁火打劫。
    growth_range:
    - 3
    - 6
    attribute_weights:
      force: 40
      intellect: 15
      defense: 23
      agility: 22
  - key: hist_sljnbc_0373
    name: 乞伏炽磐
    default_gender: male
    archetype: military
    flavor: （？—428年）西秦文昭王，雄主英姿。陇西鲜卑乞伏部首领乞伏乾归之子，继位后励精图治，使西秦国力达到鼎盛。他知人善任，重用汉族士人，推行汉化政策，使西秦在众多十六国政权中独树一帜。他趁南凉内乱之机大举进攻，吞并南凉全境，一时威震河西。在军事上他勇猛果敢，多次击退北凉、北魏的进犯，保卫了西秦的疆土。
    growth_range:
    - 3
    - 6
    attribute_weights:
      force: 40
      intellect: 15
      defense: 23
      agility: 22
  - key: hist_sljnbc_0374
    name: 吕钻
    default_gender: male
    archetype: military
    flavor: （？—401年）后凉第二任君主，吕光长子。其父吕光去世后，他继承后凉王位，史称后凉灵帝。他在位期间不理政事，终日以游猎为乐，纵情声色。他性情暴躁猜忌，对宗室大臣多有杀戮。后凉此时内外交困，南凉、北凉、西凉等势力纷纷独立，国土日蹙。他对此不闻不问，依旧我行我素。隆安五年（401年），其从弟吕超发动政变将其杀死，自立为主。
    growth_range:
    - 3
    - 6
    attribute_weights:
      force: 40
      intellect: 15
      defense: 23
      agility: 22
  - key: hist_sljnbc_0375
    name: 李歆
    default_gender: male
    archetype: military
    flavor: （？—420年）西凉后主，刚愎自用。陇西成纪人，西凉武昭王李暠之子。他继位后面对北凉沮渠蒙逊的威胁，本应审时度势、谨慎应对，却刚愎自用、骄傲轻敌。其母尹太后多次劝谏他不可轻举妄动，他不但不听，反而出言顶撞。他主动出兵进攻北凉，中了沮渠蒙逊的诱敌之计，在蓼泉遭遇埋伏，兵败身死。
    growth_range:
    - 3
    - 6
    attribute_weights:
      force: 40
      intellect: 15
      defense: 23
      agility: 22
  - key: hist_sljnbc_0376
    name: 苏惠
