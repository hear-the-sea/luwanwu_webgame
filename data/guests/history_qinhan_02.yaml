heroes:
  purple:
  - key: hist_qinhan_0051
    name: 赵充国
    default_gender: male
    archetype: military
    flavor: （前137年—前52年）西汉名将。长期镇守西北，善于用兵亦重视安抚，处理羌人与边疆事务时主张稳健持重。赵充国的突出之处，是他能把"用兵"当作治理的一部分：能打则打，但更在意如何让战争不必反复发生。史载他在边地事务中强调屯守、经营与分化安置等思路，尽量降低大规模远征的消耗，把资源留给长期稳定。这样的将领往往不容易被写成传奇，因为他追求的是"不出大事"；可正是这种克制，让边疆冲突有机会从纯粹暴力转向可管理的秩序。赵充国因此被称为"知兵知民"，既知战术，也知人心与生计。
    growth_range:
    - 7
    - 10
    attribute_weights:
      force: 44
      intellect: 14
      defense: 28
      agility: 14
  - key: hist_qinhan_0052
    name: 金日磾
    default_gender: male
    archetype: civil
    flavor: （生年不详—前86年）西汉重臣，出身匈奴贵族后归汉，史书多强调其谨慎自守与忠诚可靠。金日磾能在汉廷站稳脚跟，靠的不是血缘背景，而是对规则与边界的敏感：在多疑的宫廷环境里，外来者若要自保，往往必须更克制、更守法、更少结党。武帝晚年与昭帝初年政局动荡，金日磾与霍光等人同列辅政，说明汉廷在用人上并非完全排斥"异族"，而是把忠诚与能力置于出身之上。金日磾的存在也让汉匈关系呈现另一面：除了战场对抗，边界地带与俘虏体系还会把人卷入对方制度之中，个人命运因此成为帝国互动的一条暗线。
    growth_range:
    - 7
    - 10
    attribute_weights:
      force: 14
      intellect: 50
      defense: 24
      agility: 12
  blue:
  - key: hist_qinhan_0053
    name: 刘嫖
    default_gender: female
    archetype: civil
    flavor: （生年不详—前116年）西汉公主，景帝之女，在武帝早期的宫廷人事与婚姻布局中影响甚大。她的能动性并不靠正式官职，而靠宗室身份、财富与门客网络：公主府既能举办宴饮、结交士人，也能通过联姻把家族与政治同盟绑在一起。与陈阿娇相关的传闻与戏剧化叙事多绕馆陶公主展开，虽有文学成分，却指向同一现实——后宫与外戚格局常由婚姻与亲属关系悄然改写。馆陶公主的故事凸显宗室女性并非永远被动：她们可以经营关系、制造机会、改变人事走向；但同样也要承担这种经营带来的反噬，因为一旦权力风向转向，曾经的网络会变成被追责的证据。
    growth_range:
    - 6
    - 9
    attribute_weights:
      force: 10
      intellect: 52
      defense: 22
      agility: 16
