      agility: 10
  - key: hist_sljnbc_0470
    name: 尔朱兆
    default_gender: male
    archetype: military
    flavor: （？—533年）北魏末年将领，秀容人，契胡族，尔朱荣之侄。他骁勇善战，性情暴躁，随叔父尔朱荣征战多年，屡立功勋。永安三年（530年）孝庄帝元子攸设计诱杀尔朱荣，他闻讯后率军攻入洛阳，俘杀孝庄帝于晋阳，为叔父复仇。此后他拥立北魏宗室为帝，把持朝政，行事更加骄横残暴，滥杀无辜，众叛亲离。
    growth_range:
    - 3
