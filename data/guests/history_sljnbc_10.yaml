  - key: hist_sljnbc_0451
    name: 薛道衡
    default_gender: male
    archetype: civil
    flavor: （540年—609年）空梁落燕泥，北朝诗坛巨匠。河东汾阴人，历仕北齐、北周、隋三朝。他少年时便以文才闻名，北齐时期即已名动朝野。入隋后更受隋文帝赏识，累官至内史侍郎，参与国家机要。他的诗作清新明丽，尤以"暗牖悬蛛网，空梁落燕泥"一联最为著名，此句化用旧典却出新意，成为千古名句。
    growth_range:
