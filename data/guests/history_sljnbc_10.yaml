    attribute_weights:
      force: 40
      intellect: 15
      defense: 23
      agility: 22
  - key: hist_sljnbc_0471
    name: 尔朱世隆
    default_gender: male
    archetype: civil
    flavor: （？—532年）无才窃位，尔朱余孽。秀容人，契胡族，尔朱荣族人。他原本只是尔朱家族中的普通成员，并无过人才干。尔朱荣被孝庄帝诱杀后，尔朱兆等起兵复仇攻入洛阳杀死孝庄帝，他趁机跻身权力核心。此后尔朱氏控制北魏朝政，他虽被推举为家族智囊，却既无政治远见也无军事才能。他贪婪成性，大肆搜刮民脂民膏，将国库挥霍一空。
    growth_range:
    - 3
    - 6
    attribute_weights:
      force: 20
      intellect: 40
      defense: 20
      agility: 20
  - key: hist_sljnbc_0472
    name: 高延宗
    default_gender: male
    archetype: military
    flavor: （？—577年）北齐宗室，渤海蓨县人，文宣帝高洋第五子，封安德王。他体态肥胖，性情豪爽，有勇力。北周武帝伐齐时，北齐后主高纬昏庸无能，节节败退。周军攻至晋阳城下，高纬弃城南逃，晋阳军民在绝望中推举他为帝，希望他能力挽狂澜。他临危受命，披甲上阵，亲自督战守城，与周军激战一昼夜，杀伤周军甚众，一度将周军逼退。
    growth_range:
    - 3
    - 7
    attribute_weights:
      force: 34
      intellect: 12
      defense: 40
      agility: 14
  - key: hist_sljnbc_0473
    name: 高阿那肱
    default_gender: male
    archetype: civil
    flavor: （？—580年）北齐末年权臣，渤海蓨县人。他出身鲜卑贵族，善于阿谀奉承，凭借谄媚之术取得后主高纬的宠信，官至右丞相，位极人臣。他把持朝政，排斥忠良，卖官鬻爵，贪污受贿，是北齐末年政治腐败的主要推手之一。北周伐齐时，他不思抵抗，反而与陆令萱、穆提婆等人一同祸乱朝纲，致使北齐军心涣散。
    growth_range:
    - 3
    - 6
    attribute_weights:
      force: 20
      intellect: 40
      defense: 20
      agility: 20
  - key: hist_sljnbc_0474
    name: 穆提婆
    default_gender: male
    archetype: civil
    flavor: （？—577年）北齐后主高纬的宠臣，本姓骆，因母亲陆令萱得宠而改姓穆提。陆令萱是后主乳母，把持后宫数十年，穆提婆借此权势飞黄腾达，官至尚书左仆射，与母亲内外勾结，卖官鬻爵，排斥异己。他与高阿那肱等人把持朝政，北齐国政日益腐败。北周武帝伐齐时，他随后主逃往邺城，后又随驾东逃。北齐灭亡后他投降北周，旋即被诛杀。
    growth_range:
    - 3
    - 7
    attribute_weights:
      force: 20
      intellect: 40
      defense: 20
      agility: 20
  - key: hist_sljnbc_0475
    name: 宇文觉
    default_gender: male
    archetype: civil
    flavor: （542年—557年）北周孝闵帝，开国皇帝。代郡武川人，宇文泰嫡长子。他年仅十五岁便在父亲去世后被拥立为帝，建立北周政权。然而实际权力却掌握在堂兄宇文护手中。他年少气盛，不甘做傀儡皇帝，密谋与大臣联络欲诛杀宇文护夺回权力。然而事机不密，宇文护先发制人将他废黜，随后秘密将他杀害，对外宣称其暴病而亡。
    growth_range:
    - 3
    - 7
    attribute_weights:
      force: 8
      intellect: 64
      defense: 18
      agility: 10
  - key: hist_sljnbc_0476
    name: 宇文毓
