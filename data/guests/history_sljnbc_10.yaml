    - 7
    attribute_weights:
      force: 8
      intellect: 64
      defense: 18
      agility: 10
  - key: hist_sljnbc_0452
    name: 邱建
    default_gender: male
    archetype: civil
    flavor: （？—264年后）曹魏将领，原为胡烈帐下司马。景元四年（263年）钟会率军伐蜀，他随军出征。钟会灭蜀后野心膨胀，欲据蜀自立，遂将魏将软禁起来，其中包括胡烈。钟会对邱建颇为信任，不知他与胡烈有旧。邱建暗中与胡烈保持联络，将钟会谋反的计划透露给胡烈。胡烈写信给儿子胡渊，告知军情危急。
    growth_range:
    - 3
    - 6
    attribute_weights:
      force: 20
      intellect: 40
      defense: 20
      agility: 20
  - key: hist_sljnbc_0453
    name: 温恢
    default_gender: male
    archetype: civil
    flavor: （178年—223年）曹魏大臣，太原祁县人，字曼基。他少年时便以才干闻名，被举为孝廉后入朝为官。他历任多郡太守，所到之处皆有政声。他治理扬州时正值曹魏与东吴对峙时期，他加强边防、安抚百姓，使扬州成为曹魏南方的坚固屏障。他善于识人，眼光独到。钟繇之子钟会年幼时他便预言此子日后必有大作为。
    growth_range:
    - 3
    - 6
    attribute_weights:
      force: 20
      intellect: 40
      defense: 20
      agility: 20
  - key: hist_sljnbc_0454
    name: 刘靖
    default_gender: male
    archetype: military
    flavor: （？—254年）曹魏大臣，沛国相县人，字文恭，扬州刺史刘馥之子。他继承父亲治政之才，历任多郡太守和刺史，政绩卓著。他出任镇北将军、假节都督河北诸军事时，负责防御北方边疆。他发现当地水利失修、农业荒废，遂主持兴修戾陵堰，开凿水渠数十里，引水灌溉良田数千顷。此项工程惠及百姓数十年，当地人感念其恩德，为他立碑纪念。
    growth_range:
    - 3
    - 7
    attribute_weights:
      force: 40
      intellect: 15
      defense: 23
      agility: 22
  - key: hist_sljnbc_0455
    name: 赵俨
    default_gender: male
    archetype: civil
    flavor: （171年—245年）曹魏重臣，颍川阳翟人，字伯然。他少有大志，为人精明干练，善于谋划。曹操平定荆州后他奉命负责协调于禁、张辽、张郃、朱灵、李典、路招、冯楷等七军，使诸将各司其职、互不掣肘，展现了卓越的组织才能。他历任多郡太守，所到之处皆能安抚百姓、平定叛乱。他深受曹操器重，多次参与军国大事的决策。
    growth_range:
    - 3
    - 6
    attribute_weights:
      force: 12
      intellect: 58
      defense: 18
      agility: 12
  - key: hist_sljnbc_0456
    name: 诸葛瞻
    default_gender: male
    archetype: civil
    flavor: （227年—263年）蜀汉将领，琅琊阳都人，字思远，诸葛亮之子。他自幒聪慧，颇有才名，娶后主刘禅之女为妻，官至卫将军、平尚书事，是蜀汉后期的核心大臣。然而他长于父亲光环之下，才干实不如父，且未能阻止宦官黄皓专权，政治作为有限。景耀六年（263年）魏将邓艾偷渡阴平直逼成都，他率军迎战于绵竹。
    growth_range:
    - 3
    - 6
    attribute_weights:
      force: 20
      intellect: 40
      defense: 20
      agility: 20
  - key: hist_sljnbc_0457
    name: 黄崇
    default_gender: male
    archetype: civil
    flavor: （？—263年）蜀汉将领，巴西阆中人，车骑将军黄权之子。他继承父亲的智谋和忠义，在蜀汉后期任尚书郎等职。景耀六年（263年）邓艾偷渡阴平，诸葛瞻率军迎战。黄崇随军出征担任参谋。他审时度势，认为应当抢占险要地形据守，以逸待劳等待敌军疲惫后再反击。他多次向诸葛瞻进谏，言辞恳切，泣涕横流，请求立即行动。
    growth_range:
    - 3
    - 6
    attribute_weights:
      force: 12
      intellect: 58
      defense: 18
      agility: 12
  - key: hist_sljnbc_0458
    name: 陆绩
    default_gender: male
    archetype: civil
    flavor: （187年—219年）东吴大臣，吴郡吴县人，字公纪，庐江太守陆康之子。他六岁时随父在袁术处做客，见案上有橘子便藏了三枚于怀中。临行时橘子滚落，袁术问其故，他答曰"欲归遗母"。袁术大为惊奇，"怀橘遗亲"遂成千古佳话，被列入"二十四孝"。他自幒聪颖好学，博通经史，尤精《周易》，著有《浑天图》等天文著作。
    growth_range:
    - 3
    - 6
    attribute_weights:
      force: 8
      intellect: 64
      defense: 18
      agility: 10
  - key: hist_sljnbc_0459
    name: 张承
    default_gender: male
    archetype: civil
    flavor: （178年—244年）张昭长子，吴郡吴县人。他自幼受父亲教导，博览群书，通晓政务。孙权对他颇为器重，常咨询军国大事。他有知人之明，善于识别人才，曾在诸葛恪年幼时便预言其日后必成大器。他历任多职，为政宽弘仁厚，深得属下爱戴。他与父亲张昭一同辅佐孙权，为东吴政权的稳定做出了贡献。其子张休亦仕于东吴，张氏一门三代皆为东吴重臣。
    growth_range:
    - 3
    - 6
    attribute_weights:
      force: 20
      intellect: 40
      defense: 20
      agility: 20
  - key: hist_sljnbc_0460
    name: 卫玠
    default_gender: male
    archetype: civil
    flavor: （286年—312年）西晋名士，河东安邑人，字叔宝。他是西晋书法家卫瓘之孙，容貌俊美绝伦，肤如凝脂，光彩照人，被誉为"璧人"。时人形容他"如玉人走入人间"，与潘安并称晋代美男。他自幼聪慧，精通玄学，善于清谈。然而他体质羸弱，不堪劳累。永嘉之乱后他随家人南渡避难，从豫章迁往建康。
    growth_range:
    - 3
    - 6
    attribute_weights:
      force: 8
      intellect: 64
      defense: 18
      agility: 10
  - key: hist_sljnbc_0461
    name: 苻登
    default_gender: male
    archetype: military
    flavor: （343年—394年）前秦宗室，略阳临渭氐族人，字文高，苻坚族孙。苻坚被姚苌所杀后，前秦势力分崩离析，他收拾残余在陇西地区与后秦军对抗，誓为苻坚复仇。他骁勇善战，转战十余年，屡败屡起，成为后秦的心腹之患。他在与姚苌、姚兴父子的战争中互有胜负，一度威胁后秦的统治。他的军队在困境中缺乏粮草，史载曾有食人之事，以维持战斗力。
    growth_range:
    - 3
    - 6
    attribute_weights:
      force: 40
      intellect: 15
      defense: 23
      agility: 22
  - key: hist_sljnbc_0462
    name: 姚弘
    default_gender: male
    archetype: civil
    flavor: （388年—417年）后秦末代皇帝，姚兴之子。他继位时后秦已因内乱和对外战争而元气大伤。他性情文弱仁厚，缺乏其父的政治手腕和军事才能。义熙十二年（416年），刘裕率大军北伐，水陆并进直逼长安。他派兵抵抗，却屡战屡败，各地守将纷纷投降。次年长安城破，他率文武百官出降，后秦灭亡。
    growth_range:
    - 3
    - 7
    attribute_weights:
      force: 20
      intellect: 40
      defense: 20
      agility: 20
  - key: hist_sljnbc_0463
    name: 沈田子
    default_gender: male
    archetype: military
    flavor: （383年—418年）东晋末年将领，吴兴武康人，沈林子之兄。他骁勇善战，是刘裕麾下最勇猛的战将之一。义熙十二年（416年）刘裕发动北伐后秦的战役，他率军为先锋，势如破竹。在攻取洛阳后，他继续西进，攻克潼关，直逼长安。义熙十三年（417年）晋军攻入长安，后秦末帝姚泓出降，他率部俘获姚泓，后秦灭亡。
    growth_range:
    - 3
    - 6
    attribute_weights:
      force: 40
      intellect: 15
      defense: 23
      agility: 22
  - key: hist_sljnbc_0464
    name: 沈林子
    default_gender: male
    archetype: military
    flavor: （387年—422年）东晋末年至刘宋初年将领，吴兴武康人，沈田子之弟。他随刘裕征战多年，参与了伐南燕、灭后秦等重大战役。与其兄沈田子性格刚烈不同，他为人恭顺谨慎，处事低调。刘裕北伐后秦时，他担任要职，在攻取洛阳、长安的战役中立下功勋。刘宋建国后他官至中领军，掌管禁军。他深得刘裕信任，是刘宋初年的军事支柱之一。
    growth_range:
    - 3
    - 6
    attribute_weights:
      force: 40
      intellect: 15
      defense: 23
      agility: 22
  - key: hist_sljnbc_0465
    name: 谢脁
    default_gender: male
    archetype: civil
    flavor: （464年—499年）南朝齐诗人，陈郡阳夏人，字玄晖，东晋名将谢安之后。他自幼聪慧，文才卓绝，以山水诗著称于世，与谢灵运并称"大谢小谢"，又称"二谢"。他的诗风清新自然，声律和谐，对唐代诗歌影响极大。李白对他推崇备至，赞曰"蓬莱文章建安骨，中间小谢又清发"，又言"一生低首谢宣城"。
    growth_range:
    - 3
    - 6
    attribute_weights:
      force: 8
      intellect: 64
      defense: 18
      agility: 10
  - key: hist_sljnbc_0466
    name: 何敬容
    default_gender: male
    archetype: civil
    flavor: （？—549年）南朝梁大臣，庐江灊县人。他出身士族，历任多职，官至尚书令、中书监，位列宰辅。他办事勤勉，精于处理政务文牍，日理万机而不知疲倦。然而他长于事务而短于谋略，缺乏宏观视野和政治远见，时人因此讥讽他为"俗吏"，认为他不具备宰相应有的格局与器量。侯景之乱时建康城被围，他留守台城。
    growth_range:
