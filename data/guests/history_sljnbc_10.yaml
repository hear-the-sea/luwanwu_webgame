      agility: 10
  - key: hist_sljnbc_0467
    name: 陈顼
    default_gender: male
    archetype: civil
    flavor: （530年—582年）陈朝第四任皇帝，吴兴长城人，字绍世，陈文帝陈蒨之弟。他早年跟随兄长征战，颇有战功。陈文帝去世后废黜侄子陈伯宗自立为帝，史称陈宣帝。他在位期间国力有所恢复，发动太建北伐，一度收复淮南大片领土，声威远振。然而北周武帝灭北齐后统一北方，实力大增，陈朝随即丧失了之前收复的土地。
    growth_range:
    - 3
    - 7
    attribute_weights:
      force: 24
      intellect: 44
      defense: 22
      agility: 10
  - key: hist_sljnbc_0468
    name: 孔范
    default_gender: male
    archetype: civil
    flavor: （？—？）陈朝大臣，会稽山阴人，字法言。他博学多才，擅长诗文，深受陈后主宠信，与江总等人同为后主身边的文学侍从。他们常陪后主饮宴赋诗，不理朝政，被时人称为"狎客"。他为人轻佻浮夸，好为大言，多次在朝堂上夸口陈朝军威强盛，无人敢犯。隋军南下时他仍然侈言无惧，毫无戒备。陈亡后他被押送长安，隋文帝以其佞幸误国，将其流放边远之地。
    growth_range:
    - 3
    - 7
    attribute_weights:
      force: 8
      intellect: 64
      defense: 18
      agility: 10
  - key: hist_sljnbc_0469
    name: 江总
    default_gender: male
    archetype: civil
    flavor: （519年—594年）陈朝大臣，济阳考城人，字总持。他出身名门，自幼聪颖，博涉经史，尤工诗赋，文才冠绝一时。他历仕梁、陈两朝，在陈朝官至尚书令、中书监等要职，是陈后主朝廷的首辅大臣。然而他沉溺于诗酒之中，与陈后主及后宫嫔妃日夜宴饮，创作艳诗，号为"宫体诗"。他虽名为宰相却不理政事，任由朝政荒废。
    growth_range:
