    flavor: （1612年—1678年）字长伯，号月所，明末清初著名的军事统帅。他在山海关防线的历史关头，因爱妾陈圆圆被俘及家族受威胁等复杂因素，毅然引清兵入关，这一决策彻底改写了中国历史的走向。吴三桂英勇善战，其麾下的“关宁铁骑”曾是十七世纪东亚最精锐的武装力量之一。他在清初被封为平西王，镇守云南十余年，势力膨胀。晚年他为了维护自身权势发动“三藩之乱”挑战康熙皇权，最终在衡州暴病身亡。吴三桂的一生是政治博弈、利益计算与权力野心的极致体现。他那种不仅关注战场胜负且时刻权衡个人家族地位的枭雄特质，使其成为了中国历史中最复杂且具破坏性的符号之一，其跌宕起伏的命运记录了封建武将在体制崩塌时的挣扎、反复与毁灭。
