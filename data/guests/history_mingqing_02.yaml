    flavor: （1642年—1707年）原名朱若极，明室后裔，清代最杰出的画家、书法家与艺术理论家。他在艺术上提出了震撼性的“搜尽奇峰打草稿”与“一画论”，极力反对盲目模拟古人的僵化风气，主张“笔墨当随时代”，强调随本心、随造化进行艺术创作。石涛的山水画笔墨苍劲、意境幽远，充满了强烈的动感与勃勃生机。他不仅在绘画实践上造诣惊人，其所著《苦瓜和尚画语录》更是中国绘画理论史上的里程碑，深刻影响了后世几百年的艺术走向。石涛的一生游历名山大川，对自然界的内在规律有着敏锐的洞察力。他那种追求绝对艺术自由、不肯受任何成法束缚的性格，使其成为了中国画史上最伟大的改革者之一，其艺术理念为中国艺术注入了无穷的生机。
