  - key: hist_mingqing_0025
    name: 俞大猷
    default_gender: male
    archetype: military
    flavor: （1503年—1579年）字志辅，明朝抗倭名将，与戚继光并称“俞龙戚虎”。他不仅精通经史与数学，更是一位深藏不露的武学宗师，其创编的“俞家棍”被视为中国棍法之祖。他的一生几乎都在征战中度过，从东南抗倭到西南平乱，战功赫赫。俞大猷长于练兵且深谙海战战术，主张“以大船重炮克敌”的前卫思想。然而他性格刚直不阿，不善官场钻营，一生屡遭权臣贬谪甚至蒙冤入狱，却始终忧国忧民。他是中国古代职业军人的典范，留下了珍贵的武学著作《剑经》。其不计较个人名利、唯求强兵卫国的人格魅力深受后世敬仰，代表了武臣群体中极高的人格高度。
    growth_range:
