  - key: hist_mingqing_0023
    name: 郑成功
    default_gender: male
    archetype: military
    flavor: （1624年—1662年）“国姓爷”，明末清初著名的民族英雄。他出身海商世家，在国家危急关头毅然起兵抗清，坚守东南沿海。面对陆上局势的逆转，他展现出卓越的战略眼光，亲率庞大舰队横渡海峡，历经数月艰苦围战，最终迫使荷兰殖民者签字投降，收复了离开祖国三十八年的宝岛台湾。他开辟荆榛，在台湾设县治、兴教育、推广屯田，将中华文化深深根植于宝岛。虽然他英年早逝，但他坚守民族气节、维护国家主权完整的崇高精神，早已成为连接海峡两岸的情感纽带。其“收复宝岛”的伟业在中华民族历史上具有极其神圣的地位，被尊为“开台圣王”。
    growth_range:
