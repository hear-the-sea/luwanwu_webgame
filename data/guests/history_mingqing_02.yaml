      agility: 16
  - key: hist_mingqing_0026
    name: 袁崇焕
    default_gender: male
    archetype: military
    flavor: （1584年—1630年）字元素，明末辽东战场的擎天一柱。他以文官之身毅然出关，镇守孤城宁远，凭借先进的红夷大炮战术与坚韧的防守意志，在宁远大战中重创后金汗努尔哈赤，取得了明军多年未有的辉煌胜利。此后他苦心经营关宁锦防线，使皇太极的八旗劲旅屡次受挫。然而，面对清朝的离间计和崇祯帝的多疑性格，这位赤胆忠心的统帅最终被以通敌罪名逮捕，并处以极其惨烈的凌迟极刑。直到乾隆年间真相大白，袁崇焕终被后世公认为力挽狂澜的民族悲情英雄。其忠义之魂永远守望着辽东的关隘，其悲剧命运也成了大明王朝灭亡史中最沉重的一声叹息。
    growth_range:
