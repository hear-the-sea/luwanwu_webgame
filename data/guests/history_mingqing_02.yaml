      agility: 16
  - key: hist_mingqing_0020
    name: 常遇春
    default_gender: male
    archetype: military
    flavor: （1330年—1369年）字伯仁，号“常十万”，明朝开国第一猛将。他曾豪言只需十万兵马便可横行天下，故此得名。在鄱阳湖大战中，他身先士卒，顶着漫天箭雨突击陈友谅水寨，立下头功。北伐元朝时，他作为先锋势如破竹，直取大都，其勇武令蒙元守军闻风丧胆。常遇春作战不仅骁勇无比，更兼具出色的战略眼光，是朱元璋最为倚重的进攻利剑。可惜天妒英才，他在柳河川归途中暴病而亡，年仅四十岁。朱元璋闻讯大恸，追封其为开平王。他以其短暂而辉煌的一生诠释了战神之名，其威名与勇武至今仍令后世神往，被誉为大明江山的开拓先锋。
    growth_range:
