  - key: hist_mingqing_0022
    name: 戚继光
    default_gender: male
    archetype: military
    flavor: （1528年—1588年）字元敬，号南塘，明代最杰出的军事天才。针对倭寇战法，他独创“鸳鸯阵”与特殊的兵器体系，编练出纪律严明、战斗力强悍的“戚家军”，在东南沿海百战百胜，基本肃清了困扰明朝数十年的倭患。晚年他北调蓟州，主持修建了宏伟的砖石长城防线，使北疆安宁。他所著《纪效新书》与《练兵实纪》是中国古代军事科学的瑰宝。戚继光不仅是战场上的常胜将军，更是推动中国军事变革的一代宗师，其保家卫国的功勋永垂不朽，被誉为中国近世战术之祖和伟大的民族英雄。他那种致力于实战效率而非虚荣的专业军事态度，彻底改写了明军的整体战斗力水平。
    growth_range:
