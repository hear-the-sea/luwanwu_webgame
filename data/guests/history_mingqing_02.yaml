  - key: hist_mingqing_0019
    name: 徐达
    default_gender: male
    archetype: military
    flavor: （1332年—1385年）明朝开国第一元勋，被朱元璋誉为“万里长城”。他出身农家，随朱元璋起兵于草莽，凭借卓越的军事统帅才能，身经百战而无一败绩。在北伐中原的过程中，他指挥若定，攻克元大都，彻底结束了蒙元在中原的统治，实现了“恢复中华”的夙愿。徐达为人谦逊严谨，即使功高盖世依然如履薄冰，深得皇帝信赖。他不仅在野战中百战百胜，亦在边疆筑城修塞，奠定了明朝北方漫长的防务基础。死后被追封为中山王，位列开国功臣之首，肖像升入功臣庙第一位。他那种“功高不震主、律己极严”的处世艺术与职业军人素养，为其家族赢得了数百年的荣显与后世的无限崇敬。
    growth_range:
