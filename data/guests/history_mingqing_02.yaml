  - key: hist_mingqing_0024
    name: 于谦
    default_gender: male
    archetype: civil
    flavor: （1398年—1457年）字廷益，大明社稷的救星，著名的忠臣良将。土木堡之变后，明英宗被俘，瓦剌大军直指北京。在满朝文武惶恐、朝廷计划南迁之际，于谦力排众议，抱着“社稷为重，君为轻”的信念，亲自披甲登上城头组织浴血奋战，最终击退也先，保住了大明江山与华夏文化。他为官廉洁，两袖清风，深得民心。然而在夺门之变后，他遭到徐有贞等人的陷害被冤杀。其在狱中写下的《石灰吟》：“粉身碎骨浑不怕，要留清白在人间”，正是他一生刚正不阿形象的真实写照。其浩然正气流传千古，他那种“独立于危难、不计个人荣辱”的境界，是中国文臣精神的最高标杆。
    growth_range:
