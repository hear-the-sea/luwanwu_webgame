    - 9
    attribute_weights:
      force: 12
      intellect: 58
      defense: 18
      agility: 12
  - key: hist_mingqing_0028
    name: 董其昌
    default_gender: male
    archetype: civil
    flavor: （1555年—1636年）字玄宰，号思翁，晚明书画艺术的领袖，官至礼部尚书。他在艺术理论上提出著名的“南北宗”论，推崇平淡天真的文人画风格，对后世中国画产生了决定性的影响。董其昌的书法综合了晋、唐、宋名家之长，风格高雅、清劲婉丽，其笔墨追求意境的空灵与气韵的自然，被誉为书法史上的集大成者。他在绘画上主张以古人为师而又不失个人灵性，其艺术趣味主宰了清代长达三百年的审美风潮。尽管他在乡间的家族行为在史书中颇具争议，但其作为中国艺术史上转型期的一代宗师地位不容置疑。他那种将儒家官员的儒雅风范与极高艺术自律完美结合的境界，确立了晚明士大夫的文化高度。
    growth_range:
    - 6
    - 9
    attribute_weights:
      force: 12
      intellect: 58
      defense: 18
      agility: 12
  - key: hist_mingqing_0029
    name: 徐渭
    default_gender: male
    archetype: civil
    flavor: （1521年—1593年）字文清，号青藤道士，明代杰出的文学家、书画家、戏曲家与军事谋略家。他的一生充满传奇与悲剧色彩，性格狂放不羁且由于仕途坎坷、精神受创而多次自杀未遂。他在绘画上具有极强的爆发力，开创了大写意花鸟画风，其笔墨奔放、意境凄冷且气势夺人，深刻影响了后来的八大山人、石涛及齐白石。徐渭在戏曲方面亦有开创之功，其作品《四声猿》被誉为明代杂剧的巅峰。他在协助胡宗宪抗倭期间，展现了卓越的军事眼光。他的一生是在穷困潦倒与精神折磨中，将个人强烈的情感倾注于笔端的艺术苦旅，成为了中国艺术史上最孤独且伟大的天才之一，其灵魂在法度之外寻求到了极致的真实。
    growth_range:
    - 6
    - 9
    attribute_weights:
      force: 12
      intellect: 58
      defense: 18
      agility: 12
  - key: hist_mingqing_0030
    name: 朱载堉
    default_gender: male
    archetype: civil
    flavor: （1536年—1611年）字伯勤，号句曲山人，明朝杰出的科学家、音律学家与历算家。他虽贵为郑王之子，却淡泊爵位，曾为抗议父亲蒙冤而潜心居住于简陋的土室中钻研学术长达十九年。他最大的成就即是发明了“十二平均律”，这一极其精密的物理声学成果彻底解决了自古以来音律转调的难题，其等分律思想在时间上早于欧洲等温体系的成熟与普及，被国际学术界誉为“东方文艺复兴时期的科学巨匠”。朱载堉在数学（如算盘开方）、历法、计量学等领域亦有极深造诣，其巨著《乐律全书》是中华科学文明的一座丰碑。他那种追求客观真理高于皇权富贵的姿态，展现了明代学者中极其难能可贵的人格光辉与理性实证精神。
    growth_range:
    - 6
    - 9
    attribute_weights:
      force: 12
      intellect: 58
      defense: 18
      agility: 12
  - key: hist_mingqing_0031
    name: 阎应元
    default_gender: male
    archetype: military
    flavor: （生年不详—1645年）明末抗清英雄，江阴保卫战的灵魂人物。他原为一名普通的典吏，在民族存亡的关头，被江阴百姓推举为统帅。他以卓越的防御指挥艺术与坚不可摧的志向，率领数万城中民众，凭借简陋武器抵挡了清朝多尔衮麾下二十万精锐大军长达八十一天的猛烈进攻，阵斩清军将士万余人。城破后他由于不肯降清，投水自尽未遂后慷慨就义。其绝命联“八十日带发效忠，表太祖十七代皇帝；十万人同心死义，留大明三百里江山”气贯长虹，是华夏民族气节的最高写照。他被后世尊为“忠义之身”，证明了在大厦将倾之际，区区一介小官亦能用鲜血和勇气为普通民众守住尊严。
    growth_range:
    - 6
    - 9
    attribute_weights:
      force: 42
      intellect: 18
      defense: 24
      agility: 16
  - key: hist_mingqing_0032
    name: 唐寅
    default_gender: male
    archetype: civil
    flavor: （1470年—1524年）字伯虎，号六如居士，明代“吴中四才子”之首。他自幼才华横溢、名震江南，却在赴京会试时无辜卷入舞弊案，仕途理想彻底破碎。从此他寄情于诗画，放浪形骸于姑苏烟雨之中，自嘲为“江南第一风流才子”。他的画作笔墨精妙，山水、仕女画臻至化境，既有文人的典雅脱俗，又不失世俗生活的灵动。桃花坞里桃花庵，他在诗歌中寻求心灵的绝对自由。虽然民间广为流传的“点秋香”多为虚构附会，但那个才华卓绝、一生坎坷而又傲骨嶙峋的艺术形象，早已成为江南文人文化的最佳精神代表。他那种在贫病交加中依然能保持浪漫情怀与艺术傲骨的姿态，使其成为了后世文人心中永恒的偶像。
    growth_range:
    - 6
    - 9
    attribute_weights:
      force: 12
      intellect: 58
      defense: 18
      agility: 12
  - key: hist_mingqing_0033
    name: 顾宪成
    default_gender: male
    archetype: civil
    flavor: （1550年—1612年）字叔时，号泾阳，明代著名政治家、思想家，“东林书院”的领袖。他主张学术应紧密关照现实政治，提倡“家事国事天下事，事事关心”，开创了明末文官集团大规模通过议政来干预政局的风气。顾宪成在官场中耿直敢言，多次因违背皇权意愿被削职，但他退隐无锡后在书院讲学，吸引了全国大批志士，形成了一股极其强大的政治与道德评议力量。他倡导的读书人应具备高度社会责任感与民族担当的精神，对明末清初的思想界产生了极其深远的影响。他的一生是知识分子试图通过重构儒家道德标准来挽救王朝危亡的壮丽尝试，展现了中国传统精英阶层最高尚的一面，其建立的东林精神，气节长存。
    growth_range:
    - 6
    - 9
    attribute_weights:
      force: 12
      intellect: 58
      defense: 18
      agility: 12
  - key: hist_mingqing_0034
    name: 申时行
    default_gender: male
    archetype: civil
    flavor: （1535年—1614年）字汝默，号瑶泉，万历朝内阁首辅，以温和平衡的政治艺术著称。他在张居正去世后的复杂局势下主持朝纲，面临着皇权、文官集团与激进言官之间日益剧烈的结构性冲突。申时行采取“和衷政策”，努力在各方势力间寻求平衡，试图通过调和矛盾维持大明政权的平稳运行。他为人圆融睿智、处事缜密，在“国本之争”中既试图维护立储的礼法原则，又尽量避免直接激怒万历皇帝，展现了极其高超的政治技巧。虽然他在后世曾被部分激进文人批评为软弱妥协，但他实际上是维持万历一朝大局不崩的关键人物。他那种在大厦将倾前夕努力保护国家体制不被撕裂的担当与政治智慧，代表了传统名相的深厚底蕴。
    growth_range:
