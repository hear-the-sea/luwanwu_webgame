      agility: 16
  - key: hist_mingqing_0027
    name: 李时珍
    default_gender: male
    archetype: civil
    flavor: （1518年—1593年）字东璧，晚号濒湖山人，大明伟大的医药学家，被后世尊为“药圣”。他出身医学世家，深感古代医书由于传抄与主观臆断而导致错误百出，立志重修本草。李时珍背起药篓，走遍名山大川，不顾严寒酷暑亲自采摘标本，甚至多次以身试药以求药效准确。历时二十七载，在参考了八百余部古籍的基础上，他终于写成了不朽巨著《本草纲目》。此书不仅系统记录了一千八百九十二种药物，更包含了他对生物、化学、地质的深刻见解，被西方科学界誉为“东方百科全书”。他那种求真务实、舍身求法的科学实证精神，跨越时空，至今仍是中医药界乃至世界医学界的最高楷模。
    growth_range:
