  - key: hist_mingqing_0021
    name: 李如松
    default_gender: male
    archetype: military
    flavor: （1549年—1598年）明朝辽东名将，名将李成梁之长子。他英勇善战，指挥了万历三大征中的平定宁夏哱拜叛乱。最令其名垂青史的是在“万历援朝战争”中，他率领明军精锐入朝，在平壤之战中运用极其高超的炮火与攻坚战术大破日军精锐，并于碧蹄馆之战中以少数精骑抗击日军主力，最终迫使丰臣秀吉撤军。李如松用兵泼辣果敢，身先士卒，是明朝后期极少数具有国际影响力的顶级统帅，被誉为“抗倭英雄”。他的一生在辽东、朝鲜的冰天雪地间留下了不可磨灭的战争传奇，展现了大明帝国最后的战略威慑力。他在抚顺遭遇蒙古部落伏击，力战殉国，英雄末路令人扼腕。
    growth_range:
