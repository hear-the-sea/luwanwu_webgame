heroes:
  blue:
  - key: hist_mingqing_0365
    name: 刘谨
    default_gender: male
    archetype: civil
    flavor: （1451年—1510年）刘谨为明代司礼监宦官，历掌内廷机要并深度介入朝政，曾权倾一时。其经历折射出晚明中枢权力结构的紧张与失衡；其政治操作虽争议极大，却在制度史层面揭示了宦官干政对国家治理的深远冲击。其职位处于内廷权力枢纽，经历了由近侍到操控政务的过程，历史贡献更多体现为反面镜鉴，促使后世重估内外朝分权与监察制度的重要性。
    growth_range:
    - 6
    - 9
    attribute_weights:
      force: 17
      intellect: 50
      defense: 19
      agility: 14
  - key: hist_mingqing_0412
    name: 邬思道
    default_gender: male
    archetype: civil
    flavor: （约1680年—约1745年）邬思道，清代幕僚与策士，长期在地方督抚与王府体系中任事，以筹划政务见长。其经历横跨地方治理与中枢政治，贡献在于以审势与谋略优化决策路径，对雍正时期政务风格形成影响深远。其职位属于清代幕府核心参议层，经历从地方实务到中枢咨询的连续锻炼，历史贡献在于推动决策更加重视成本、时机与可执行性，强化了政务运行的实际效能。
    growth_range:
    - 6
    - 9
    attribute_weights:
      force: 13
      intellect: 52
      defense: 19
      agility: 16
