    name: 仇英
    default_gender: male
    archetype: civil
    flavor: （约1494年—约1552年）仇英为明代画家，“吴门四家”之一。仇英出身工匠，却以极高的笔墨控制力与构图能力进入文人画核心谱系，尤精人物与青绿山水。其作品在设色、细节与叙事层次上兼具装饰性与历史感，对后世院体与民间绘画都产生过持续影响。
    growth_range:
