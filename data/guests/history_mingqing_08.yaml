    flavor: （1631年—1700年）字骏孙，号羡门，清初著名的文学家、官员，康熙朝“博学鸿词科”第一名。他才华横溢、著作等身，在诗、词、骈文等多个领域均具有极其深厚的造诣，被推为“词坛领袖”。彭孙遹治学极其严谨，主张文学应追求一种清丽脱俗、神韵自然的艺术风格。他在朝廷任职期间，办事缜密、为人正直，参与了多项重大国家编纂工程。他的一生是清初精英阶层在追求艺术完美的同时，如何通过深厚的学识来引导社会审美与行政决策的典型。他那种在名利旋涡中依然能够保持赤子之心与生活雅趣的态度受人景仰。他在整理古代文献与提携后辈人才方面的贡献，为清代学术的延续提供了重要的组织保障，其影响力跨越了清初至中叶。
