  - key: hist_mingqing_0308
    name: 吴嘉纪
    default_gender: male
    archetype: civil
    flavor: （1618年—1684年）字宾贤，号野人，清初著名的诗人。他出身贫寒，长期生活在泰州泰兴的盐场底层，以极其真挚、深沉的笔触记录了沿海盐民的悲惨生活与民族巨变下的社会疾苦。吴嘉纪的诗歌风格质朴苍劲、不事雕琢，充满了浓郁的人文关怀与悲悯意识，被推为“泰州学派”在文学上的传人。他的一生在贫困与隐居中度过，拒绝与当政者合作，坚守了儒家士大夫最底层的气节。他那种“关注细节、记录真实”的实证眼光，使其诗作具有了跨越时代的史料价值与审美魅力。吴嘉纪的存在证明了思想的力量可以超越物质的匮乏，他那种在草屋中依然忧心天下的精神，是中国文化中一个极其坚韧的人格符号。
    growth_range:
    - 4
    - 7
    attribute_weights:
      force: 12
      intellect: 58
      defense: 18
      agility: 12
  - key: hist_mingqing_0309
    name: 祝允明
    default_gender: male
    archetype: civil
    flavor: （1460年—1526年）字希哲，号枝山，明代著名的书法家、诗人，“吴中四才子”之一。他才华横溢、狂放不羁，在书法造诣上尤其是草书方面达到了明代的巅峰水准。祝允明的笔墨苍劲飞动、气势夺人，融合了晋唐名家之长而自成一家，被誉为“明代草书第一”。他在文学上也展现了极高天赋，诗文风格雄浑、充满了浪漫情怀。尽管他在仕途上郁郁不得志，长期担任地方小官，但他那追求绝对艺术自由、不肯受成法束缚的性格，使其成为了中国艺术史上的一位顶级天才。他的一生是关于“才情”与“独立人格”的动人叙事。他留下的作品不仅具有极高的审美价值，更是研究明代中叶文人文化的重要材料。
    growth_range:
    - 4
    - 7
    attribute_weights:
      force: 12
      intellect: 58
      defense: 18
      agility: 12
  - key: hist_mingqing_0310
    name: 徐祯卿
    default_gender: male
    archetype: civil
    flavor: （1479年—1511年）字昌谷，号迪功，明代著名诗人，“吴中四才子”之一，也是“前七子”的重要成员。他在文学上具有极其罕见的天赋，其诗歌造诣被誉为“吴中诗冠”。徐祯卿主张文学应追随秦汉古风，反对当时平庸的文风，其作品风格瑰丽典雅、气骨嶙峋。他在官场中为人正直，由于直言不讳而遭到贬谪。徐祯卿的一生虽然极其短暂，但他那追求艺术真实与真理一致的态度，使其在明代文学史上占有极其显赫的地位。他那种不仅关注修辞本身且关注修辞所承载的民族气节的视野，使其成为了士林公认的宗师。他在文字间构建的英雄气概，不仅是对古代传统的祭献，更是对读书人节操的捍卫。
    growth_range:
    - 4
    - 7
    attribute_weights:
      force: 12
      intellect: 58
      defense: 18
      agility: 12
  - key: hist_mingqing_0311
    name: 陈继儒
    default_gender: male
    archetype: civil
    flavor: （1558年—1639年）字仲醇，号眉公，明代著名的文学家、书画家与鉴赏家。他才华横溢、涉猎极其广泛，在青年时代即主动焚弃儒衫，选择终生隐居于山水之间，成为了晚明名士文化的代表人物。陈继儒在文学上博通经史，其散文与随笔充满了生活雅趣与处世智慧，其名著《小窗幽记》至今仍被奉为修身养性的经典。他在绘画艺术上精于墨梅、墨竹，笔法瘦硬、气韵清高。陈继儒在文化上的巨大贡献还在于他对古代文献的规模化整理与鉴赏，他那种追求精神纯粹、不为官场名利动摇的姿态，使其成为了那一时代最具魅力的文化符号。他在文化保存与人才奖掖方面的默默耕耘，为明代学术的繁荣积累了厚重的资产。
    growth_range:
    - 4
    - 7
    attribute_weights:
      force: 12
      intellect: 58
      defense: 18
      agility: 12
  - key: hist_mingqing_0312
    name: 袁中道
    default_gender: male
    archetype: civil
    flavor: （1570年—1623年）字小修，号石浦，明代著名的文学家，“公安派”代表人物之一，与兄长袁宗道、袁宏道合称“三袁”。他在文学上极力主张“性灵”说，强调文学应表现个体的真情实感与独特灵性，反对盲目拟古。袁中道的诗文风格清新自然、不拘格套，充满了对社会底层生活的同情与对自然山水的细腻观察。他的一生游历名山大川，将对人生的哲学思考与对艺术的执着追求完美融合。他在官场职期间为人正直，特别是在人才选拔与文化普及方面做出了重要贡献。他那种追求艺术真实、不向平庸低头的傲骨，使其成为了晚明文坛一个极具穿透力的精神符号，其作品《游居柿录》真实记录了那一时代的士人心态与社会变迁。
    growth_range:
    - 4
    - 7
    attribute_weights:
      force: 12
      intellect: 58
      defense: 18
      agility: 12
  - key: hist_mingqing_0313
    name: 袁宗道
    default_gender: male
    archetype: civil
    flavor: （1560年—1600年）字伯修，号无言居士，明代著名的文学家，“公安派”的发起者与领袖人物。他在学术上率先挑战了当时文坛死气沉沉的“复古”风气，主张文学应随时代而变革，提出了“平淡、本色、自然”的审美标准。袁宗道博通经史，尤精于禅理与儒学的会通，其文章风格质朴庄重而又不失灵动，深刻影响了其弟袁宏道与袁中道的创作方向。他在朝廷担任翰林院编修等职期间，为人谦和、学识渊博，致力于通过文学创新来引导社会道德的重建。他的一生是传统文人追求精神觉醒与文学革命的先驱历程。袁宗道那种能够在大背景下独立思考、只对真理负责的态度，使其成为了明代文学史上的一位重要建设者，其学术贡献深受后世推崇。
    growth_range:
    - 4
    - 7
    attribute_weights:
      force: 12
      intellect: 58
      defense: 18
      agility: 12
  - key: hist_mingqing_0314
    name: 谭元春
    default_gender: male
    archetype: civil
    flavor: （1586年—1637年）字友夏，明末著名的诗人、文学评论家，“竟陵派”的创始人之一。他在文学上主张追求“幽深孤峭”的意境，强调文学应深入挖掘人类内心深处极其隐秘、极其微妙的情感，反对公安派后期出现的过于平浅的倾向。谭元春的诗文风格古拙、气味凄冷，充满了对乱世命运的深刻洞察。他的一生在困顿中坚持学术探索，走遍天下搜集奇书与古迹。他那种追求精神纯粹、不为世俗动摇的姿态，使其作品中蕴含了一种极其高贵且具穿透力的力量。谭元春在文字间构建的这种艺术真实，反映了晚明知识分子在政治幻灭后的精神寄托，他是中国文学史上一位极具创造力的异数，其理论影响力跨越了明清易代。
    growth_range:
    - 4
    - 7
    attribute_weights:
      force: 12
      intellect: 58
      defense: 18
      agility: 12
  - key: hist_mingqing_0315
    name: 钟惺
    default_gender: male
    archetype: civil
    flavor: （1574年—1624年）字伯敬，号退谷，明末著名的文学家、诗人，“竟陵派”的首席领袖。他在文学理论上极力推崇“灵性”与“厚味”，主张文章应写出前人所未见的幽微之处，反对浮华与平庸。钟惺博通经史，尤精于史学评论与古籍鉴赏，其著作《隐秀轩集》在当时文坛引起了巨大震动。他在官场任职期间，为人耿直敢言，特别是在处理复杂的基层行政与司法案件中表现出高度的智慧与责任感。钟惺的一生体现了晚明文人在追求艺术极致的同时，如何通过深邃的笔墨来表达对民族前途的忧虑。他那种不仅关注文本本身且深度关注文字所承载的文化厚度的视野，使其成为了士林公认的宗师，其治学风范为后世学子确立了独特的审美标准。
    growth_range:
