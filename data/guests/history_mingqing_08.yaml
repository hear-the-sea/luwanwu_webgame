    name: 罗本
    default_gender: male
    archetype: civil
    flavor: （约1330年—约1400年）罗本，字贯中，元末明初文学家，常被视作《三国演义》编写与传播的重要人物。罗本在历史叙事与民间讲史之间建立了具有戏剧张力的叙述结构，使人物形象与政治伦理并行展开。其作品对后世戏曲、评书与通俗小说影响深远，许多典型历史记忆由此定型。
