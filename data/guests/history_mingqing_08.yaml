  - key: hist_mingqing_0316
    name: 龚鼎孳
    default_gender: male
    archetype: civil
    flavor: （1615年—1673年）字孝升，号芝麓，明末清初著名的诗人、官员，与钱谦益、吴伟业并称“江左三大家”。他出身名门，在明朝曾任给事中，明亡后由于极其复杂的现实博弈仕清，官至刑部尚书。这一政治抉择使其在历史上背负了极其沉重的政治争议。然而作为文坛领袖，龚鼎孳博学多才，其诗歌造诣极其深厚，特别是在保护遗民、奖掖后进（如资助傅山等）方面表现出极其高尚的侠义心肠。他的一生是在权势、才情与个人节操的裂缝中寻求平衡的过程。尽管人品受后世诟病，但他对于华夏文化的保存、对动荡局势下才子群体的保护在客观上起到了不可替代的作用。他那种将儒家的社会责任与个人的艺术世界在矛盾中统一的姿态，具有极其冷峻的现实色彩。
    growth_range:
    - 4
    - 7
    attribute_weights:
      force: 12
      intellect: 58
      defense: 18
      agility: 12
  - key: hist_mingqing_0317
    name: 汪师韩
    default_gender: male
    archetype: civil
    flavor: （1707年—1780年）字通甫，号退谷，清代著名的学者、经学家。他在学术研究中展现了极其严密的逻辑分析能力，尤其在对古代声韵、历法与名物制度的考证上表现出卓越才干。汪师韩治学极其严谨，主张“学问必建立在确凿证据之上，不可有半点附会”。他在担任地方高级官员期间，特别是在处理复杂的河道治理与粮食核算中，将数学逻辑转化为现实效能，造福了数省百姓。他的一生体现了清代精英知识分子追求“经世致用”理想的壮丽努力。他那种不仅关注文本表象且深度关注事物运行大逻辑的视野，使其成为了那一时代学术界的一位重镇。他在极其繁杂的文献海洋中独守孤灯的姿态，展现了华夏知识分子最高尚的研究人格与文化自尊。
    growth_range:
    - 4
    - 7
    attribute_weights:
      force: 12
      intellect: 58
      defense: 18
      agility: 12
  - key: hist_mingqing_0318
    name: 曹景植
    default_gender: male
    archetype: civil
    flavor: （1700年—1760年）清代著名的考据学家、藏书家。他在版本学与校勘学上具有崇高地位，一生搜集并精修了大量濒传的古代孤本。曹景植治学极其严谨，主张学问应“正本清源，实事求是”。他在官场任职期间，为人极其正直、不畏权势，致力于地方文教事业的振兴与经典文献的保护。他的一生是关于“家学传承与文化坚守”的动人故事。他那种追求学术纯粹性、不为任何世俗利益与学术风潮所动的定力，展现了中华精英阶层对儒家经典最深沉的祭献与守望。他这种致力于从历史的文献废墟中找回文明尊严的行为，是中国知识分子文化自尊的极致体现。他的一生证明了理性的力量可以穿越时光的尘埃，在寂静的时光中开出最绚烂的真理之花。
    growth_range:
    - 4
    - 7
    attribute_weights:
      force: 12
