    default_gender: male
    archetype: civil
    flavor: （1488年—1559年）杨慎，字用修，号升庵，明代学者、文学家，正德六年状元。因“大礼议”事件触怒朝廷而被长期谪戍云南，流放生涯反而使其学术视野更加广阔。杨慎著述宏富，涉经史、音韵、金石、地理等多个领域，并留下大量诗词文赋。
