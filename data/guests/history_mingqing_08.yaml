  - key: hist_mingqing_0334
    name: 沈周
    default_gender: male
    archetype: civil
    flavor: （1427年—1509年）沈周，字启南，号石田，明代书画家，“吴门画派”奠基人物之一。以山水、花鸟见长，强调文人笔墨中的人格修养与自然意趣，在明代中前期确立了“以诗书入画”的审美路径。沈周不以仕进为人生中心，长期活跃于江南士人网络，兼具艺术创造与文化组织能力。
    growth_range:
    - 6
    - 9
    attribute_weights:
      force: 10
      intellect: 60
      defense: 18
      agility: 12
