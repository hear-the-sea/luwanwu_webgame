    default_gender: male
    archetype: civil
    flavor: （1631年—1647年）夏完淳为南明少年诗人、抗清志士。夏完淳年少即参与军事行动，后被俘遇害，年仅十六。其诗文虽篇幅不多，却在明清易代记忆中地位极高，兼具青春意气与亡国悲怆，被后世反复征引。
