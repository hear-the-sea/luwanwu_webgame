    default_gender: male
    archetype: military
    flavor: （1601年—1645年）史可法，明末重臣，南明弘光朝兵部尚书，扬州守城主将。清军南下时，史可法坚守扬州并组织防务，城破后拒降殉国，成为南明抗清叙事中的核心象征。其政治角色兼具文臣与统帅双重属性，但在危局中所呈现的军事组织与守城决断尤为关键。
