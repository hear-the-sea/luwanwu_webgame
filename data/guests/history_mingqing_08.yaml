      agility: 12
  - key: hist_mingqing_0319
    name: 蒋溥
    default_gender: male
    archetype: civil
    flavor: （1708年—1761年）字质甫，号恒轩，清代著名的官员、画家，重臣蒋廷锡之子。他在政治上官至东阁大学士，历任吏部尚书等职，办事缜密、为人厚道，深受乾隆皇帝的绝对信赖。蒋溥在艺术造诣上发扬了家学，精于花鸟画，其画风气韵典雅、气格清高，特别是在处理大规模官方文化编纂项目的行政统筹中表现出卓越才干。他的一生体现了清代高级官员在学术钻研、行政管理与艺术审美领域的多重成功平衡。他那种将儒家的现实行政责任与个人的高雅文化修养高度统一的姿态，使其成为了那一时代士大夫阶层的理想样本。他在文化保存方面的默默耕耘，为乾隆朝早期的政局稳定与文化繁荣积累了厚重的资本，其人品与才情均得到了历史的公认。
    growth_range:
    - 4
    - 7
    attribute_weights:
      force: 12
      intellect: 58
      defense: 18
      agility: 12
  - key: hist_mingqing_0320
    name: 徐枋
    default_gender: male
    archetype: civil
    flavor: （1622年—1694年）字昭法，号俟斋，明末清初著名的文学家、画家。他出身名门，父徐汧在明亡时以身殉国。徐枋坚守民族志节，在明亡后拒绝仕清，终生隐居于苏南深山之中，不入城府近五十年。他在绘画上造诣极其深厚，擅长山水，画风苍古朴拙、意境极其幽远，完美实践了遗民画家追求灵魂绝对自由与气节完整的理想。徐枋的诗文风格淳厚、充满了对故国的哀思与对乱世的无奈。他的一生是在极度贫困与危险的环境下，将个人强烈的情感注入笔墨的过程，是中国艺术史上最令人敬畏的孤独天才之一。他那种完全打破功名利禄、直抵灵魂深处的生存方式，展现了人类理性能在极端痛苦环境下保持的高尚尊严与艺术张力。
    growth_range:
    - 4
    - 7
    attribute_weights:
      force: 12
      intellect: 58
      defense: 18
      agility: 12
  - key: hist_mingqing_0321
    name: 茅坤
    default_gender: male
    archetype: civil
    flavor: （1512年—1601年）字顺甫，号鹿门，明代著名的文学家、军事理论家。他在文学上极力推崇唐宋古文，编纂了影响深远的《唐宋八大家文钞》，这一成果正式确立了“唐宋八大家”的历史地位，主宰了明清以来的古文审美风向。茅坤不仅是文学大师，更精通兵法韬略，曾协助胡宗宪抗击倭寇，在战场上展现了卓越的战略眼光与行政才干。他的一生体现了明代士大夫追求“文武兼备、经世致用”理想的成功实践。他那种不仅关注文字修辞本身且高度关注现实社会治理与国防安全的视野，使其成为了那一时代最具感召力的文化与政治领袖。他在极其复杂的官场斗争中依然能保持作为高级知识分子的从容与尊严，展现了极其高尚的灵魂境界与家国情怀。
    growth_range:
    - 4
    - 7
    attribute_weights:
      force: 12
      intellect: 58
      defense: 18
      agility: 12
  - key: hist_mingqing_0322
    name: 唐顺之
    default_gender: male
    archetype: civil
    flavor: （1507年—1560年）字应德，号荆川，明代杰出的文学家、武术家与军事家。他博学多才，在文学上提出“本色”说，主张散文应质朴自然、揭示事物的本质，是“唐宋派”散文的重要领袖。唐顺之不仅文采斐然，更是一位具有极高实战能力的军事统帅，在东南沿海抗击倭寇的战斗中身先士卒，立下赫赫战功。他在武学造诣上亦极其深厚，撰写了《荆川短篇》等涵盖历算、地理、兵法的综合性著作。他的一生是传统文人追求“知行合一、经世致用”的杰出典范。他在极其危险的边疆战场与繁琐的行政事务间展现出的那种从容与果敢，使其成为了明代士大夫阶层中一位极其罕见的、能够将文化修养与武装实践完美融合的英雄人物。
    growth_range:
    - 4
    - 7
    attribute_weights:
      force: 12
