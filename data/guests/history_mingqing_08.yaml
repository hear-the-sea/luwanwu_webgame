    flavor: （约1500年—约1583年）吴承恩，字汝忠，号射阳山人，明代文学家，通常被认为是《西游记》的作者。其作品将神魔叙事、世俗讽谕与民间语言融合，构建出兼具想象力与社会批判性的长篇结构。吴承恩早年科举屡挫，晚年仕途亦不显，其创作却在后世形成了广泛文化影响。
