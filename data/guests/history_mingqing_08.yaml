      agility: 12
  - key: hist_mingqing_0323
    name: 吕坤
    default_gender: male
    archetype: civil
    flavor: （1536年—1618年）字叔简，号新吾，明代著名的哲学家、政治家与伦理学家。他官至刑部左侍郎，为官清廉正直，敢于就朝政弊端向皇权发出深刻的警示。吕坤在学术上主张实政与实心，其名著《呻吟语》深刻剖析了人性的幽微、官场的逻辑与社会的沉疴，被誉为“处世修身的圣书”。他极其关注基层的民生疾苦与妇女、儿童的教育问题，撰写了大量通俗易懂的教化著作。吕坤的一生是在专制高压下努力守护良知与良政的历程。他那种追求理性的极致、不为世俗偏见与官场潜规则所动的坚韧性格，使其成为了中国思想史上的一位重要重镇。他在文字间构建的严密道德体系，不仅是对社会风气的改良尝试，更是对读书人精神底线的有力捍卫。
    growth_range:
