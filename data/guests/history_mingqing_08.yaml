  - key: hist_mingqing_0324
    name: 曾燠
    default_gender: male
    archetype: civil
    flavor: （1760年—1831年）字庶蕃，号宾谷，清代著名的文学家、官员与学者。他在担任盐运使等职期间，积极扶持文化事业，资助了大量的学者进行著述，被誉为“两淮文化的守护者”。曾燠在文学造诣上极其深厚，尤擅长诗歌与散文，其风格典雅瑰丽、气韵悠长。他主持编纂了《江西诗征》等大型地方文献丛书，为保存乡邦文化立下了汗马功劳。他的一生体现了清代中后期高级文官在追求行政效能的同时，如何通过个人的财力与权力来回馈文化界、推动学术繁荣的理想。曾燠那种温润如玉的人格魅力与对才子的极力奖掖，使其在士林中享有极高的声望。他在文字间展现出的那种对文明薪火相传的责任感，使其成为了清代文化史上的一位重要建设者。
