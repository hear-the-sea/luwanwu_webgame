  - key: hist_mingqing_0343
    name: 刘宗周
    default_gender: male
    archetype: civil
    flavor: （1578年—1645年）刘宗周，明末思想家与政治人物，字起东，号念台。其学承阳明而重“慎独”工夫，强调士人应在极端政治压力下守住道德自律与行动责任。刘宗周在朝局混乱时多次直言，晚年以身殉明，形成强烈道义象征。
    growth_range:
