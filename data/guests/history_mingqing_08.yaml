  - key: hist_mingqing_0344
    name: 黄道周
    default_gender: male
    archetype: civil
    flavor: （1585年—1646年）黄道周，明末学者、书法家与政治家，字幼玄。其人以气节与学识并重著称，在南明政权中坚持抗清立场，后兵败被俘遇害。黄道周在经学、书法与政论方面均有深厚造诣，书风峭劲奇崛，影响清初书坛。
    growth_range:
