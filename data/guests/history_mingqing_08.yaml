    flavor: （1686年—1774年）字主敬，号香树，清代著名的重臣、诗人。他历事康雍乾三朝，深得乾隆皇帝的绝对信赖与终身敬重，被皇帝亲切称为“钱臣”。他在政治上官至刑部尚书，以行政干练、处事圆融且原则性强著称。钱陈群在文学上具有极高造诣，其诗作风格淳厚苍劲、充满了士大夫的忧国忧民情怀。他的一生是盛世体制下高级官僚“长青树”风格的典范。他那种将深厚的儒家学术修养融入日常行政管理的风格，极大地提升了政府的办事效率。他在维护行政体系平稳运行与中华古典文化保存方面的卓越贡献得到了历史的高度认可。钱陈群那种在权势巅峰依然能够保持谦逊低调与对艺术不断追求的姿态，使其成为了那一时代士子效法的榜样，其人品与才情均被尊为一代宗师。
