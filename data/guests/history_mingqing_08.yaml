      agility: 12
  - key: hist_mingqing_0309
    name: 祝允明
    default_gender: male
    archetype: civil
    flavor: （1460年—1526年）字希哲，号枝山，明代著名的书法家、诗人，“吴中四才子”之一。他才华横溢、狂放不羁，在书法造诣上尤其是草书方面达到了明代的巅峰水准。祝允明的笔墨苍劲飞动、气势夺人，融合了晋唐名家之长而自成一家，被誉为“明代草书第一”。他在文学上也展现了极高天赋，诗文风格雄浑、充满了浪漫情怀。尽管他在仕途上郁郁不得志，长期担任地方小官，但他那追求绝对艺术自由、不肯受成法束缚的性格，使其成为了中国艺术史上的一位顶级天才。他的一生是关于“才情”与“独立人格”的动人叙事。他留下的作品不仅具有极高的审美价值，更是研究明代中叶文人文化的重要材料。
    growth_range:
    - 6
    - 9
    attribute_weights:
      force: 12
      intellect: 58
      defense: 18
      agility: 12
  - key: hist_mingqing_0322
    name: 唐顺之
    default_gender: male
    archetype: civil
    flavor: （1507年—1560年）字应德，号荆川，明代杰出的文学家、武术家与军事家。他博学多才，在文学上提出“本色”说，主张散文应质朴自然、揭示事物的本质，是“唐宋派”散文的重要领袖。唐顺之不仅文采斐然，更是一位具有极高实战能力的军事统帅，在东南沿海抗击倭寇的战斗中身先士卒，立下赫赫战功。他在武学造诣上亦极其深厚，撰写了《荆川短篇》等涵盖历算、地理、兵法的综合性著作。他的一生是传统文人追求“知行合一、经世致用”的杰出典范。他在极其危险的边疆战场与繁琐的行政事务间展现出的那种从容与果敢，使其成为了明代士大夫阶层中一位极其罕见的、能够将文化修养与武装实践完美融合的英雄人物。
    growth_range:
    - 6
    - 9
    attribute_weights:
      force: 12
      intellect: 58
      defense: 18
      agility: 12
  - key: hist_mingqing_0332
    name: 李梦阳
    default_gender: male
    archetype: civil
    flavor: （1473年—1530年）李梦阳，字献吉，号空同子，明代文学家，“前七子”领袖之一。倡导“文必秦汉、诗必盛唐”，试图重建古典文体的气格与法度，对正德、嘉靖间文坛风向影响极大。李梦阳在政坛上亦多有直言，屡因言获罪，仕途并不顺遂。
    growth_range:
    - 6
    - 9
    attribute_weights:
      force: 12
      intellect: 58
      defense: 18
      agility: 12
  - key: hist_mingqing_0338
    name: 杨涟
    default_gender: male
    archetype: civil
    flavor: （1572年—1625年）杨涟，字文孺，号大洪，明末东林党代表人物，历任给事中、左副都御史。其人以弹劾魏忠贤著名，曾上疏“二十四大罪”，后遭诬陷下狱并被酷刑致死。杨涟在晚明政治中的象征意义超出个人官职，成为士大夫“以言责为本分”的典型。
    growth_range:
    - 6
    - 9
    attribute_weights:
      force: 14
      intellect: 56
      defense: 18
      agility: 12
  - key: hist_mingqing_0342
    name: 高启
    default_gender: male
    archetype: civil
    flavor: （1336年—1374年）高启为元末明初诗人，“吴中四杰”之首。高启诗风雄健清峭，兼有唐宋之长，题材涵盖山林隐逸与世局动荡，语言简劲而气象开阔。入明后曾短暂任职，后因政治风波被诛，结局悲剧。
    growth_range:
    - 6
    - 9
    attribute_weights:
      force: 12
      intellect: 58
