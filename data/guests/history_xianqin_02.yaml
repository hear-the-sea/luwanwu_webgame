    archetype: civil
    flavor: '（生卒年不详）治邺名臣，破除迷信。他治理邺地，以智破"河伯娶妇"的恶俗，惩治巫觋豪强。他开渠引漳水灌溉农田，使邺地大治。西门豹的故事，是古代开明官吏破除迷信的典范。'
