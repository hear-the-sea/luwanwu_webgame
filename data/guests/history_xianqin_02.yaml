    flavor: '（生卒年不详）魏将灭中山，食子表忠心。他率军攻打中山国，中山国君杀其子作羹送来，他为表忠心饮尽肉羹。灭中山后封于灵寿，后人乐毅即其后裔。乐羊的故事，令人感慨良多。'
