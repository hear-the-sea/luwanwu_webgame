    flavor: '（前455年—前395年）法家先驱，变法始祖。他在魏国推行变法，编纂《法经》，是中国第一部成文法典。"尽地力之教"发展农业，"食有劳而禄有功"打破世卿世禄。李悝变法开战国变法之先河，影响商鞅、申不害等后世法家。'
