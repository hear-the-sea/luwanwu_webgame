  - key: hist_xianqin_0045
    name: 许行
    archetype: civil
    flavor: '（约前390年—约前315年）农家代表，与民同耕。他主张"贤者与民并耕而食"，反对剥削，提倡人人劳动。他的思想带有原始平等色彩，虽被孟子所批驳，却也反映了战国时代底层民众的诉求。农家思想虽未成为主流，但其关注民生的理念，具有永恒价值。'
    growth_range:
    - 5
    - 9
    attribute_weights:
      force: 10
      intellect: 56
      defense: 20
      agility: 14
  - key: hist_xianqin_0046
    name: 杨朱
    archetype: civil
    flavor: '（约前440年—约前360年）为我之学，道家另支。他主张"拔一毛而利天下不为也"，看似自私，实则是对个体价值的肯定。他的思想与墨家"兼爱"针锋相对，与道家"贵生"一脉相承。杨朱学派一度盛行，"天下之言不归杨则归墨"。他的思想是中国古代个人主义的萌芽。'
    growth_range:
    - 5
    - 9
    attribute_weights:
      force: 8
      intellect: 58
      defense: 20
      agility: 14
  - key: hist_xianqin_0047
    name: 邓析
    archetype: civil
    flavor: '（前545年—前501年）刑名始祖，讼师之祖。他是郑国大夫，创立刑名之学，私造"竹刑"与国法抗衡。他教民诉讼，"以非为是，以是为非"，能使曲者直、直者曲。他被子产杀害，却"杀其人而用其刑"。邓析开名家之先河，是中国古代法学思想的先驱。'
    growth_range:
    - 5
    - 9
    attribute_weights:
      force: 10
      intellect: 56
      defense: 20
      agility: 14
  - key: hist_xianqin_0048
    name: 尹文
    archetype: civil
    flavor: '（约前360年—约前280年）名家大师，稷下名士。他与宋钘并称，主张"齐物"、"贵柔"，糅合名、道、法诸家思想。他参与稷下学宫的学术争鸣，是战国百家争鸣的重要参与者。《尹文子》传世，其辩证思想对后世有深远影响。'
    growth_range:
    - 5
    - 9
    attribute_weights:
      force: 8
      intellect: 58
      defense: 20
      agility: 14
  - key: hist_xianqin_0049
    name: 宋钘
    archetype: civil
    flavor: '（约前370年—约前291年）名家宗师，反战先驱。他主张"见侮不辱"，提倡寡欲、非斗。他曾试图劝阻秦楚之战，虽未成功，其反战精神令人钦佩。庄子称其"以禁攻寝兵为外，以情欲寡浅为内"。宋钘的思想融合了名、墨、道诸家，是战国思想界的独特存在。'
    growth_range:
    - 5
    - 9
    attribute_weights:
      force: 8
      intellect: 58
      defense: 20
      agility: 14
  - key: hist_xianqin_0050
    name: 甘德
    archetype: civil
    flavor: '（约前400年—约前340年）天文大家，星经作者。他与石申并称，著有《天文星占》。他观测五星运行，测定恒星位置，是中国古代天文学的奠基人之一。他的星表比西方希腊天文学家早了约两百年。甘氏星经传世，影响深远。'
    growth_range:
    - 5
    - 9
    attribute_weights:
      force: 6
      intellect: 62
      defense: 18
      agility: 14
  - key: hist_xianqin_0051
    name: 石申
    archetype: civil
    flavor: '（约前400年—约前340年）天文宗师，石氏星经。他是战国时期著名天文学家，著《天文》八卷，测定138颗恒星位置。他发现五星运行规律，预测日月食，是中国古代天文学的先驱。石申与甘德合称"甘石"，其星表是世界上最早的星表之一。'
    growth_range:
    - 5
    - 9
    attribute_weights:
      force: 6
      intellect: 62
      defense: 18
      agility: 14
  - key: hist_xianqin_0052
    name: 智瑶
    archetype: military
    flavor: '（?—前453年）三家分晋前夜，智氏霸主。他是晋国智氏家主，权倾晋国，图谋独吞赵魏韩三家。他水淹晋阳，眼看大功告成，却因傲慢自负被赵魏韩三家联合反杀。三家分晋由此而起，战国时代拉开序幕。智瑶之败，在于恃强凌弱，骄傲轻敌。他的故事是"骄兵必败"的最佳注脚。'
    growth_range:
    - 5
    - 9
    attribute_weights:
      force: 40
      intellect: 18
      defense: 24
      agility: 18
  - key: hist_xianqin_0053
    name: 田骈
    archetype: civil
    flavor: '（约前370年—约前290年）稷下学宫名士，道家大师。他主张"齐物"，认为万物平等无差别。他与慎到、宋钘等人并称稷下先生，是战国百家争鸣的重要参与者。其思想融合道、法，对后世有深远影响。'
    growth_range:
    - 5
    - 9
    attribute_weights:
      force: 8
      intellect: 58
      defense: 20
      agility: 14
  - key: hist_xianqin_0054
    name: 公羊高
    archetype: civil
    flavor: '（生卒年不详）《公羊传》作者，春秋学宗师。他传承孔子《春秋》大义，口耳相传数代后成书《公羊传》。公羊学以微言大义著称，强调"大一统"思想，对汉代政治产生深远影响。公羊学派是儒家经学的重要分支。'
    growth_range:
    - 5
    - 9
    attribute_weights:
      force: 8
      intellect: 58
      defense: 20
      agility: 14
  - key: hist_xianqin_0055
    name: 榖梁赤
    archetype: civil
    flavor: '（生卒年不详）《榖梁传》作者，春秋学大师。他与公羊高同传《春秋》，但解经风格不同。《榖梁传》偏重礼义，文辞简约，与《公羊传》《左传》并称春秋三传。榖梁学派虽不如公羊学盛行，但也是经学的重要组成部分。'
    growth_range:
    - 5
    - 9
    attribute_weights:
      force: 8
      intellect: 58
      defense: 20
      agility: 14
  - key: hist_xianqin_0056
    name: 乐毅
    archetype: military
    flavor: '（生卒年不详）燕国名将，攻齐破城。他辅佐燕昭王，率五国联军伐齐，连下七十余城，几乎灭亡齐国。然而功高震主，燕惠王继位后猜忌不用，乐毅出奔赵国。他留书燕王，言辞恳切，不卑不亢，成为后世忠臣自辩的典范。诸葛亮自比管仲乐毅，可见其在后世心目中的地位。虽功败垂成，未能灭齐，但其运筹帷幄的军事才能，忠而见疑的悲剧命运，令人唏嘘。'
    growth_range:
    - 6
    - 9
    attribute_weights:
      force: 42
      intellect: 18
      defense: 22
      agility: 18
  - key: hist_xianqin_0057
    name: 蒙恬
    archetype: military
    flavor: '（?—前210年）北击匈奴，修筑长城。他率秦军三十万北伐，收复河套，却匈奴七百余里，使胡人不敢南下牧马。他修筑的万里长城，成为华夏民族的精神象征；相传他还改良了毛笔，被尊为笔祖。蒙氏一族三代效忠秦国，蒙恬之死，实为秦国自毁长城。这位北疆战神，威名赫赫，却死于赵高李斯的阴谋，令人唏嘘。'
    growth_range:
    - 6
    - 9
    attribute_weights:
      force: 44
      intellect: 14
      defense: 26
      agility: 16
  - key: hist_xianqin_0058
    name: 晏婴
    archetype: civil
    flavor: '（?—前500年）晏子使楚，不辱使命。他身材矮小，却有巨人之志；出使楚国，以机智的言辞化解楚王的刁难，维护了齐国尊严。他辅佐齐国三代君主，节俭爱民，敢于直谏，被称为春秋贤相。一件狐裘穿三十年，却能使齐国政清人和。晏子之才，孔子亦赞之；晏子之廉，后世争相效仿。这位春秋名相，以智慧和品格，书写了士人的典范。'
    growth_range:
    - 6
    - 9
    attribute_weights:
      force: 10
      intellect: 58
      defense: 18
      agility: 14
  - key: hist_xianqin_0059
    name: 蔺相如
    archetype: civil
    flavor: '（生卒年不详）完璧归赵，渑池抗秦。他本是赵国宦者令门客，却因完璧归赵一事名震天下。渑池之会，他以死相逼，迫使秦王为赵王击缶，不辱使命。官拜上卿后，廉颇不服，他以"先国家之急而后私仇"的胸襟，令廉颇负荆请罪，成就将相和的佳话。他的勇气与智慧、胸襟与格局，都是士人的典范。虽为文臣，却有武将之勇。'
    growth_range:
    - 6
    - 9
    attribute_weights:
      force: 16
      intellect: 52
      defense: 18
      agility: 14
  - key: hist_xianqin_0060
    name: 苏秦
    archetype: civil
    flavor: '（?—前284年）身佩六国相印，纵横天下无双。他师从鬼谷子，以合纵之策游说六国，使六国结盟抗秦，自己则成为六国丞相。悬梁刺股的故事，正是他苦读时的写照。苏秦之才，在于审时度势、因势利导，以三寸不烂之舌胜过百万雄师。然而合纵终归瓦解，苏秦也死于间谍生涯中的阴谋。纵横家的传奇，至此落幕。'
    growth_range:
    - 6
    - 9
    attribute_weights:
      force: 10
      intellect: 58
      defense: 18
      agility: 14
  - key: hist_xianqin_0061
    name: 张仪
    archetype: civil
    flavor: '（?—前309年）连横破纵，巧舌如簧。他与苏秦同出鬼谷门下，却走上了相反的道路。以连横之策为秦国服务，瓦解六国合纵，为秦国东出扫清障碍。他戏弄楚怀王的故事，虽不光彩，却尽显其诡谲之术。一怒而诸侯惧，安居则天下熄——张仪之才，足以搅动天下风云。纵横家的另一面，由张仪书写。'
    growth_range:
    - 6
    - 9
    attribute_weights:
      force: 10
      intellect: 58
      defense: 18
      agility: 14
  - key: hist_xianqin_0062
    name: 吕不韦
    archetype: civil
    flavor: '（前292年—前235年）奇货可居，一字千金。他本是商人，却看中了落魄质子嬴异人，以商人的眼光投资帝王家业。辅佐异人登基，自己成为一人之下万人之上的相国。他组织门客编纂《吕氏春秋》，欲以杂家思想治国。然而与秦始皇的权力博弈中，他终究落败，饮鸩自尽。从商人到相国，从权臣到逆臣，吕不韦的一生，是一场惊心动魄的政治赌博。'
    growth_range:
    - 6
    - 9
    attribute_weights:
      force: 12
      intellect: 56
      defense: 18
      agility: 14
  - key: hist_xianqin_0063
    name: 李斯
    archetype: civil
    flavor: '（约前284年—前208年）小篆推广者，焚书坑儒罪臣。他师从荀子，却背离儒道，投身法家。辅佐嬴政统一天下，官至丞相，位极人臣。书同文、车同轨、统一度量衡，都有他的贡献。然而焚书坑儒之策，也是他的建议。秦始皇死后，他与赵高合谋矫诏，废太子扶苏，立胡亥。最终被赵高陷害，腰斩于市，三族皆灭。功过参半，李斯的一生，是法家功利主义的极致演绎。'
    growth_range:
    - 6
    - 9
    attribute_weights:
      force: 10
      intellect: 58
      defense: 18
      agility: 14
  - key: hist_xianqin_0064
    name: 田单
    archetype: military
    flavor: '（生卒年不详）火牛阵破敌，复国功臣。燕军攻齐，连下七十余城，唯即墨未下。田单以火牛阵大破燕军，收复齐国失地，立下不世之功。他不是将门出身，却能在绝境中逆转乾坤；他不以正兵取胜，却创造了军事史上的奇迹。火牛阵的故事，至今仍为后世津津乐道。田单之才，在于临危不乱、出奇制胜。'
    growth_range:
    - 6
    - 9
    attribute_weights:
      force: 42
      intellect: 18
      defense: 22
      agility: 18
  - key: hist_xianqin_0065
    name: 范雎
    archetype: civil
    flavor: '（?—前255年）远交近攻，布衣卿相。他本是魏国门客，遭主人迫害，差点死于厕中。后辗转入秦，向秦昭襄王献上"远交近攻"的战略，被拜为相国。他为人睚眦必报，有恩必还，有仇必报。范雎的崛起，是布衣跃居卿相的传奇；他的战略，则奠定了秦国统一天下的大方向。'
    growth_range:
    - 6
    - 9
    attribute_weights:
      force: 10
      intellect: 58
      defense: 18
      agility: 14
  - key: hist_xianqin_0066
    name: 赵雍
    archetype: military
    flavor: '（约前340年—前295年）胡服骑射，变革图强。他是赵武灵王，以非凡的魄力推行胡服骑射改革，使赵国军力大增。灭中山、击林胡、收河套，赵国一跃成为北方强国。然而他在继位问题上的摇摆，导致沙丘之变，自己被困饿死。雄主晚年的糊涂，令人唏嘘。胡服骑射的改革，是中原民族学习胡人的先河，影响深远。'
    growth_range:
    - 6
    - 9
    attribute_weights:
      force: 40
      intellect: 20
      defense: 24
      agility: 16
  - key: hist_xianqin_0067
    name: 孙膑
    archetype: military
    flavor: '（生卒年不详）围魏救赵，兵家亚圣。他与庞涓同出鬼谷门下，却遭庞涓嫉妒陷害，受膑刑失去双膝。后逃至齐国，以《孙膑兵法》扬名天下。围魏救赵、增兵减灶，都是他的经典战例。马陵之战，庞涓中伏身死，万箭穿心——这是孙膑对同门的复仇。兵法传世，与孙武并称孙吴。残疾之躯，成就了不朽的兵法传奇。'
    growth_range:
    - 6
    - 9
    attribute_weights:
      force: 36
      intellect: 24
      defense: 20
      agility: 20
  - key: hist_xianqin_0068
    name: 夫差
    archetype: military
    flavor: '（约前528年—前473年）先盛后衰，一代霸主。他继承父志灭越，迫使勾践称臣。此后北上争霸，黄池会盟一度称雄。然而他沉迷西施美色，骄傲自满，不听伍子胥忠言，终被卧薪尝胆的勾践反杀。吴国灭亡之际，他掩面自刎，羞见地下的伍子胥。夫差的悲剧，是一个霸主从巅峰坠落的警示。'
    growth_range:
    - 5
    - 9
    attribute_weights:
      force: 42
      intellect: 14
      defense: 26
      agility: 18
  - key: hist_xianqin_0069
    name: 阖闾
    archetype: military
    flavor: '（?—前496年）吴国霸主，刺客王位。他以专诸刺王僚登基，后任用伍子胥、孙武改革强吴。五战五捷攻入楚都郢，威震天下。然而在与越国的战争中，他被越军所伤，不久身亡。阖闾的崛起，是一场阴谋与权术的杰作；他的短暂霸业，为后来吴越争霸拉开序幕。干将莫邪铸剑，专诸鱼肠行刺，阖闾的故事充满传奇色彩。'
    growth_range:
    - 6
    - 9
    attribute_weights:
      force: 44
      intellect: 14
      defense: 24
      agility: 18
  - key: hist_xianqin_0070
    name: 荆轲
    archetype: military
    flavor: '（?—前227年）风萧萧兮易水寒，壮士一去兮不复还。他本是卫国游侠，好读书击剑，后被燕太子丹招揽，承担刺杀秦王的使命。图穷匕见的那一刻，他抓住秦王衣袖，却功亏一篑。秦王绕柱走，荆轲被剑击中，大事不成。他死前倚柱大笑，至死不屈。荆轲刺秦的故事，是侠义精神的极致演绎，虽败犹荣，名垂千古。'
    growth_range:
    - 6
    - 9
    attribute_weights:
      force: 44
      intellect: 14
      defense: 22
      agility: 20
  - key: hist_xianqin_0071
    name: 妇好
    archetype: military
    flavor: '（?—约前1200年）商朝女战神，巾帼英雄。她是武丁的王后，也是中国历史上有据可查的第一位女将军。她多次率军出征，讨伐羌方、土方等方国，战功赫赫。她的墓葬出土了大量精美青铜器和玉器，证明了她的崇高地位。在那个遥远的年代，她以女子之身，成就了男儿亦难企及的武功。巾帼不让须眉，妇好当之无愧。'
    growth_range:
    - 6
    - 9
    attribute_weights:
      force: 42
      intellect: 16
      defense: 24
      agility: 18
  - key: hist_xianqin_0072
    name: 蹇叔
    archetype: civil
    flavor: '（约前690年—约前610年）秦国老臣，谏阻崤之战。他与百里奚并称，辅佐秦穆公称霸西戎。崤之战前，他力谏穆公勿袭郑，泣送其子出征，预言必败——果然秦军大败于崤山。他的远见卓识，可惜未被采纳。年过九十仍心系国事，蹇叔的忠诚与智慧，令人敬佩。'
    growth_range:
    - 5
    - 9
    attribute_weights:
      force: 10
      intellect: 56
      defense: 22
      agility: 12
  - key: hist_xianqin_0073
    name: 由余
    archetype: civil
    flavor: '（生卒年不详）西戎谋士，入秦献策。他本是晋国人，流落西戎。秦穆公以女乐迷惑戎王，使由余来归。他献策伐戎，助秦国"益国十二，开地千里"，称霸西戎。由余的归秦，是秦国崛起的关键一步。'
    growth_range:
    - 5
    - 9
    attribute_weights:
      force: 12
      intellect: 54
      defense: 20
      agility: 14
  - key: hist_xianqin_0074
    name: 赵鞅
    archetype: military
