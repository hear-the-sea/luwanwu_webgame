      agility: 12
  - key: hist_mingqing_0152
    name: 索尼
    archetype: civil
    flavor: '（1601年—1667年）清初四辅政大臣之首。他历事三朝，对皇室绝对忠诚。在多尔衮专权时期，索尼因维护顺治帝地位而受迫害。康熙初年他受命辅佐幼主，利用极高声望牵制鳌拜。索尼不仅是杰出政治家，更是行政体制守护者。他的一生是满洲传统官僚忠诚、隐忍与权谋的完美结合，其地位在勋贵中尊崇无比，是清政权稳固的关键保障。他那种在极其险峻博弈中通过长远目光维护皇权稳固的才干，证明了他是草创时期不可替代的行政舵手，其功成身退展现了深厚智慧。他那种处理繁重任务中表现出的从容不迫，使其成为了封建文官中极其完美的典型。'
    growth_range:
    - 4
    - 7
    attribute_weights:
      force: 12
      intellect: 58
      defense: 18
      agility: 12
  - key: hist_mingqing_0153
    name: 苏麻喇姑
    archetype: civil
    flavor: '（1615年—1705年）清初皇室传奇女性，博尔济吉特氏。她原是孝庄文皇后的贴身侍女，随同入宫，深受清初三代帝王的信任与尊敬。苏麻喇姑不仅精通满汉蒙三种语言，更在康熙皇帝幼年时期担任其启蒙老师，亲自教授其满文并参与日常抚育，康熙帝对其视若长辈，终身敬重。她一生生活极其简朴，笃信佛学，以非凡的坚韧、智慧与忠诚在权力中心默默奉献。她亲历了清军入关到康乾盛世开启的历史全过程，成为了后宫忠诚与智慧的象征。她那种超越主仆关系的高尚奉献精神，在清代宫廷史中留下了一段温情佳话，其潜移默化的影响塑造了康熙朝早期的宫廷风气，展现了人本主义的光辉与女性的独立价值。'
    growth_range:
    - 4
    - 7
    attribute_weights:
      force: 12
      intellect: 58
      defense: 18
      agility: 12
  - key: hist_mingqing_0154
    name: 施世纶
    archetype: civil
    flavor: '（1659年—1722年）字文贤，号浔江，清初著名的清官，民间文学“施公断案”的历史原型。他在康熙年间历任知府、巡抚及仓场总督，为官期间刚正不阿、执法如山，因断案如神且从不畏惧权贵，被百姓尊称为“施青天”。施世纶特别关注民生疾苦，多次在灾荒年间毅然开仓赈济，并严惩贪墨官员，被康熙皇帝誉为“天下第一清官”。施世纶不仅行政干练，其人格魅力亦深受朝野敬重。他的一生是法律尊严与人文关怀在官场的完美体现，其形象已成为公正司法的文化符号。他在面对官场潜规则时那种不屑与妥协的态度，展现了中国传统士大夫阶层中极其稀缺的独立人格魅力，其治绩造福了数省百姓，功不可没。'
    growth_range:
    - 4
    - 7
    attribute_weights:
      force: 12
      intellect: 58
      defense: 18
      agility: 12
  - key: hist_mingqing_0155
    name: 李光地
    archetype: civil
    flavor: '（1642年—1718年）字晋卿，号厚庵，康熙朝著名的名臣、理学大师。他在收复台湾、平定三藩之乱以及治理黄河等国家大事的关键时刻，提出了多项极其深远的政治与军事建议，深受康熙皇帝器重，被誉为“一代真儒”。李光地坚持程朱理学，致力于宣扬正统道德，并主持编纂了《朱子全书》等重要典籍。作为康熙朝的思想支柱，他在文化复兴、官场风气整饬与边防巩固上的贡献是巨大的。他的一生展现了传统儒生在盛世局势中如何实现学术造诣与行政实务的完美平衡。他那种追求学问深度与现实效能统一的实践，极大地提升了清政府的行政专业化水准，他所确立的理学体系成为了清朝长达两百年意识形态的权威基石。'
    growth_range:
    - 4
    - 7
    attribute_weights:
      force: 12
      intellect: 58
      defense: 18
      agility: 12
  - key: hist_mingqing_0156
    name: 纳兰明珠
    archetype: civil
    flavor: '（1335年—1708年）叶赫那拉氏，康熙朝权臣。他在撤藩、收复台湾、抵御沙俄入侵等重大国策的制定与实施中提供了关键支持。明珠在政治上长于运筹帷幄，协助康熙帝削弱权臣、巩固皇权。然而由于他权欲太盛，结党营私，卷入了激烈的党争与贪腐丑闻，最终在博弈中被罢相。明珠的一生反映了清代高级官僚在权力巅峰与坠落间的复杂心态。虽然历史评价褒贬不一，但其在盛世开启过程中的行政功绩与提拔人才的眼光不容忽视。他那种通过极其细腻的权力操作来维持个人地位与体制运行的能力，展现了封建极权统治下官僚生存的极致法则。他的一生是理性的胜利，也是对清初政治变迁的深刻见证，其才干被皇帝高度评价。'
    growth_range:
    - 4
    - 7
    attribute_weights:
      force: 12
      intellect: 58
      defense: 18
      agility: 12
  - key: hist_mingqing_0157
    name: 赫舍里·索额图
    archetype: civil
    flavor: '（1636年—1703年）康熙朝权臣，首辅索尼之子。他在清除鳌拜、平定三藩、收复台湾及签订《尼布楚条约》等影响中国版图与主权的重大事件中均有显赫功勋。索额图为人极具权谋，在外交场合表现得极其强硬与干练，成功维护了大清帝国的东北边境。然而由于他深度卷入皇太子胤礽的储位之争，结党营私，最终下场凄凉，被幽禁而死。索额图的一生是中国封建时代“权贵政治”的缩影，他既是帝国的功臣，也是激烈权力斗争的牺牲品。他那种集顶级外交、军事才干与极端权力欲望于一身的复杂形象，使其成为了清代历史中一个极其鲜活且具破坏力的悲剧性样本，其兴衰史引发了后世对于继承制度的深刻反思。'
    growth_range:
    - 4
    - 7
    attribute_weights:
      force: 12
      intellect: 58
      defense: 18
      agility: 12
