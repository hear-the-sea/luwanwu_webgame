# 历史人物门客 - 明清时期（第04批：绿色50人；序号051-100）

heroes:
  green:
  - key: hist_mingqing_0108
    name: 吴有性
    archetype: civil
    flavor: '（1582年—1652年）字又可，明末杰出的医学家，温病学派的奠基人之一。在崇祯年间大瘟疫流行、传统医方失效的危急时刻，他通过深入临床观察，提出了大胆的“戾气”致病学说，认为传染病是由某种肉眼看不见的物质通过口鼻进入人体所致。其著作《温疫论》是中国第一部专门论述急性传染病的专著，其发现显著早于现代细菌学，是中国传统医学在生存危机中爆发出的理性光芒。吴有性在极度危险的环境下坚持行医实践，其舍身求法的精神是医学史上的高峰。他的学说拯救了无数生命，更为后来温病学派的形成提供了核心驱动力，他那种敢于挑战陈规、追求实证的精神使其成为了名医中的先驱。'
    growth_range:
    - 4
    - 7
    attribute_weights:
      force: 12
      intellect: 58
      defense: 18
      agility: 12
  - key: hist_mingqing_0109
    name: 缪希雍
    archetype: civil
    flavor: '（1546年—1627年）字仲醇，明代杰出的医学家、本草学家。他在中药学研究上具有极深造诣，所著《神农本草经疏》是对传统药物学的一次重大整理与提升。缪希雍主张药物运用应建立在严密的理论推演与广泛的临床验证之上，他强调了脾胃在生命活动中的核心地位，提出了许多独到的用药见解。他在行医过程中极具医德，多次在各地大疫期间研制有效方剂救人无数，深受百姓爱戴。缪希雍那种求真务实、勇于挑战传统医书教条的精神，使其成为了晚明医学界的一座高峰。他不仅提高了中医药理学的理论水平，其务实的临床作风也为后世温病学派的兴起奠定了坚实的基础，展现了人类理性在微观医疗领域的应用。'
    growth_range:
    - 4
    - 7
    attribute_weights:
      force: 12
      intellect: 58
      defense: 18
      agility: 12
  - key: hist_mingqing_0110
    name: 杨继洲
    archetype: civil
    flavor: '（1522年—1620年）明代著名的针灸学家。他出身三代名医世家，历时数十年广泛搜集、整理了古代针灸的各种流派与秘方，最终编纂成针灸学巨著《针灸大成》。这部书是中国针灸学史上的重要里程碑，详细记录了经络、穴位、刺法及其治疗方法，至今仍是针灸界的必读书目。杨继洲精通医理，尤其在利用针刺技术处理多种急症与顽疾上展现了惊人天赋。他的一生致力于针灸学的传承与科学普及，其著作被后世奉为金科玉律。杨继洲那种精益求精、旨在济世救人的专业主义精神，使其名声远播海内外，其影响直至今日依然是中国传统医学中最稳固的基石之一，展现了中华医术的独特魅力。'
    growth_range:
    - 4
    - 7
    attribute_weights:
      force: 12
      intellect: 58
      defense: 18
      agility: 12
  - key: hist_mingqing_0111
    name: 汪机
    archetype: civil
    flavor: '（1463年—1539年）字省之，明代著名的医学家，“新安医学”流派的领袖。他在学术上提出了“营卫气血”辨证理论，对调理人体阴阳平衡、治疗虚损疾病有独特贡献。汪机医术极其高超，其《石山医案》详细记录了其临床思维与技巧，具有极高的实用参考价值。他在新安地区（今安徽黄山一带）培养了大量优秀的医学人才，使得新安医派成为了明清两代中国最具影响力的区域医学流派之一。汪机的一生体现了儒医结合的优良传统，他那种严谨治学、注重实践的精神，显著提升了当时中医在内科与杂病领域的诊疗水平。他是中华医学史上的一位杰出奠基人，其医学道德与学术成就深受后世医家与学者的敬仰。'
    growth_range:
    - 4
    - 7
    attribute_weights:
      force: 12
      intellect: 58
      defense: 18
      agility: 12
  - key: hist_mingqing_0112
    name: 徐春甫
    archetype: civil
    flavor: '（1520年—1596年）字汝元，明代著名的医学家与医学教育家。他最大的成就是创办了中国历史上最早的医学学术团体——“一体堂宅仁医会”，旨在加强医生间的技术交流与职业自律。徐春甫博通经史医理，编纂了宏篇巨制《古今医统大全》，系统总结了自先秦至明代的医学成就，为后世保留了大量珍贵的医学资料。他在学术上主张博采众长，尤其在儿科与妇科领域有卓越建树。徐春甫的一生致力于医学知识的规模化整理与专业人才的培养，他那种追求行业整体进步的开阔胸襟，使其成为了中国古代医学发展史上伟大的组织者。他在人才选拔与医学规范制定方面发挥了核心作用，其影响力跨越时代。'
    growth_range:
    - 4
    - 7
    attribute_weights:
      force: 12
      intellect: 58
      defense: 18
      agility: 12
  - key: hist_mingqing_0113
    name: 武之望
    archetype: civil
    flavor: '（1552年—1629年）字叔卿，明代著名的官员与医学家。他在担任地方高级官员、行政才干卓著的同时，潜心钻研医术，尤其在妇产科领域取得了极具开创性的成果。所著《济阴纲目》是中国古代妇科医学的集大成之作，对后世产生了极其深远的影响。武之望不仅为官清廉正直，在医学研究上亦表现出严谨的科学态度。他主张为医者应具备深厚的文化底蕴，坚决反对庸医草菅人命。他在任职期间多次利用医学知识解决基层防疫问题，深受百姓拥戴。武之望的一生是典型的“学优而仕、仕而优医”的人生轨迹，展现了中国传统精英阶层高尚的社会责任感与全方位才干，其形象成为了儒医典范。'
    growth_range:
    - 4
    - 7
    attribute_weights:
      force: 12
      intellect: 58
      defense: 18
      agility: 12
  - key: hist_mingqing_0114
    name: 王肯堂
    archetype: civil
    flavor: '（1549年—1613年）明代杰出的医学家、科学家。他出身书香门第，官至南京吏部郎中，在繁忙的仕途之余，历时十余载广泛收集历代医籍并进行科学分类，最终编纂成了百科全书式的医学巨著《证治准绳》。这部书涵盖了内、外、妇、儿、幼、伤等全方位的诊疗规范，成为了明清两代医者必备的临床参考指南。王肯堂主张博学详考，不仅精通中医理论，对法律、数学、天文及佛教哲学亦有极深造诣，被誉为“全才”。他在处理行政事务中展现的严密逻辑与他在医学研究中的精密态度相辅相成。王肯堂的一生是中国全才型知识分子的典型，他在整理并提升民族科学遗产方面立下了丰功伟绩，其严谨的学术风格深受士林尊崇。'
    growth_range:
    - 4
    - 7
    attribute_weights:
      force: 12
      intellect: 58
      defense: 18
      agility: 12
  - key: hist_mingqing_0115
    name: 陈实功
    archetype: civil
    flavor: '（1555年—1636年）字毓仁，号若虚，明代著名的外科学家。他在中医外科领域具有极其显赫的地位，所著《外科正宗》被后世视为中国外科学史上的经典。陈实功不仅提出了许多创新的手术方法与药物外敷技术，更难能可贵地提出了系统的“外科医德”规范——“医家五戒十要”，强调医者应有一颗仁慈之心，不分贫富贵贱。他在处理痈疽、疮疡等疑难杂症上展现了极其精湛的手艺。陈实功的一生在基层行医多年，积德累功，深受百姓爱戴。他那种注重实证、精益求精的职业精神，显著提高了当时中医外科的治愈率，为中华医学在微观治疗领域的进步做出了重大贡献，其学说对后世外科医生影响深远。'
    growth_range:
    - 4
    - 7
    attribute_weights:
      force: 12
      intellect: 58
      defense: 18
      agility: 12
  - key: hist_mingqing_0116
    name: 李中梓
    archetype: civil
    flavor: '（1588年—1655年）字士材，号念莪，明末清初著名的医学家。他在继承传统医学精髓的基础上，极力强调“先天之本在肾，后天之本在脾”的核心观点，对中医脏腑学说的完善与深化做出了巨大贡献。李中梓的著作如《医宗必读》、《内经知要》等，不仅理论深厚且极具临床指导价值，至今仍是中医教学与研究的重要参考书。他在行医过程中主张辨证严密、用药精准，坚决反对庸医误人。李中梓不仅医术高超，其高尚的医德亦为同道所称道。他的一生见证了明清易代的剧烈动荡，他以精湛的医术在乱世中救死扶伤，为黎民百姓提供了一线生机，是连接明清医学传承的关键人物，展现了士大夫医生的担当。'
    growth_range:
    - 4
    - 7
    attribute_weights:
      force: 12
      intellect: 58
      defense: 18
      agility: 12
  - key: hist_mingqing_0117
    name: 张景岳
    archetype: civil
    flavor: '（1563年—1640年）字介宾，号景岳，明代杰出的医学家，温补学派的奠基人。他出身军门却精研医道，主张人体“阳常不足，阴常有余”，在治疗上强调温补肾阳的重要性，其《景岳全书》是中国医学史上的宏篇巨制，涵盖了极广的临床范畴。张景岳在《类经》中对《内经》进行了极其精密的分类、整理与注释，展现了严谨的学术态度。他的一生充满了探索精神，不仅深入研究医理，对兵法与哲学亦有广泛涉猎。虽然他在晚明乱世中度过余生，但他那套系统的医学理论极大地丰富了传统医学宝库，对后世慢性病与虚损病的诊治产生了深远影响，被尊为一代医学宗师，其追求知识极致的热忱功在千秋。'
    growth_range:
    - 4
    - 7
    attribute_weights:
      force: 12
      intellect: 58
      defense: 18
      agility: 12
  - key: hist_mingqing_0118
    name: 邢侗
    archetype: civil
    flavor: '（1551年—1612年）字子愿，号来禽济源山人，明代著名的书法家、学者。他官至太仆寺少卿，是晚明书坛的重要领军人物，与董其昌、米万钟、张瑞图并称“晚明四大家”。他尤精于临摹王羲之、王献之的笔墨，其书法风格秀逸俊美、神采飞扬，在当时享有极高的声誉。邢侗不仅艺术造诣深厚，且为人豪爽仗义、广交天下名士，其府邸成为了当时文人学子交流的重要中心。他的一生致力于艺术的传承与审美创新，对明代书法复归晋人风骨起到了关键的推动作用。他的这种文化担当与对美的极致追求，使其在晚明文坛留下了一段高洁的佳话，他那种不仅关注文本且关注艺术真实的视野，使其成为了深具影响力的名士。'
    growth_range:
    - 4
    - 7
    attribute_weights:
      force: 12
      intellect: 58
      defense: 18
      agility: 12
  - key: hist_mingqing_0119
    name: 米万钟
    archetype: civil
    flavor: '（1570年—1628年）字仲诏，号友石，明代著名书画家、奇石收藏家。他在书法上继承家学，与董其昌齐名，被誉为“南董北米”，其笔墨沉着痛快，颇具古意。米万钟更以痴迷、收藏奇石著称，其在北京修建的私家园林“勺园”成为了当时文人社交与文化活动的重要胜地。在政治上，他坚持儒家原则，不肯依附权臣魏忠贤的阉党势力，因此遭到打击与排挤。他的一生完美体现了晚明文官在艺术雅好与政治操守间的精密平衡。他在面对权势威逼时的那份淡然与坚韧，使其不仅在艺术上被尊为大师，在品德上也赢得了士林的广泛赞誉，其成就与人格均为后世所推崇，展现了精英阶层的精神高度。'
    growth_range:
    - 4
    - 7
    attribute_weights:
      force: 12
      intellect: 58
      defense: 18
      agility: 12
  - key: hist_mingqing_0120
    name: 莫是龙
    archetype: civil
    flavor: '（1537年—1587年）字云卿，号廷韩，明代著名的书画家、理论家。他在晚明画坛具有极高的理论地位，是“南北宗”画论的早期核心提出者之一，对后来董其昌理论体系的形成产生了直接启发。莫是龙的山水画笔墨苍秀、意境幽远，完美地实践了文人画追求平淡天真、回归自然的审美理想。他的一生游历广泛，对自然景观有着极其敏锐的观察力。莫是龙不仅是杰出的艺术大师，更是一位博学多才的学者，其在诗文上的造诣亦相当深厚。他的存在代表了晚明“松江画派”在理论探讨与艺术实践上的双重高峰，为中国画在清代的进一步发展奠定了重要的美学基础，其致力于文化传承的志向深受后世学子的敬仰。'
    growth_range:
    - 4
    - 7
    attribute_weights:
      force: 12
      intellect: 58
      defense: 18
      agility: 12
  - key: hist_mingqing_0121
    name: 孙承宗
    archetype: civil
    flavor: '（1563年—1638年）字稚绳，号恺阳，明末著名的战略大师、教育家与辽东经略。他出身文进士却深谙兵法韬略，曾任兵部尚书，并亲自构筑了关宁锦防线，通过稳扎稳打收复辽东疆土四百余里。孙承宗不仅是袁崇焕等名将的恩师，更是明末最具全局观的统帅。他在七十六岁高龄时，依然率领全家守卫家乡高阳县，在城破后拒绝向清军投降，最终全家四十余口惨遭屠杀，以身殉国。这种书生领兵、满门忠烈的人格魅力，使其成为了中华民族历史上最受尊敬的英雄。他的牺牲象征着大明王朝最后战略智慧的消失，他所播下的防御思想确保了明军在极端不利的情况下依然能坚守多年，其气节长存不朽。'
    growth_range:
    - 4
    - 7
    attribute_weights:
      force: 12
      intellect: 58
      defense: 18
      agility: 12
  - key: hist_mingqing_0122
    name: 陈洪绶
    archetype: civil
    flavor: '（1598年—1652年）字章侯，号老莲，明末著名画家。他的画风奇崛古朴、笔墨苍劲，特别是在人物画上开创了独特的古拙、夸张风格，被誉为“三百年来第一人”。陈洪绶在明亡后坚守遗民志节，隐居著书，其画作中充满了对故国的哀思与对乱世的无奈。他的艺术成就不仅在于技法的颠覆性创新，更在于他通过独特的艺术语言表达了那一时代知识分子深刻的精神痛苦与内心幻灭。他的作品对清代画坛及现代艺术产生了极其深远的影响。陈洪绶那带有装饰美感与深层忧郁的风格，使其成为了中国画史上的一位巅峰级大师，他的一生是通过笔墨进行灵魂救赎与自我确认的过程，在艺术中寻求到了永恒。'
    growth_range:
    - 4
    - 7
    attribute_weights:
      force: 12
      intellect: 58
      defense: 18
      agility: 12
  - key: hist_mingqing_0123
    name: 曾鲸
    archetype: civil
    flavor: '（1564年—1647年）字波臣，明末著名肖像画大师，开创了影响深远的“波臣派”。他融合了中国画的传统线条勾勒与西洋画的透视渲染技法，使所绘人物肖像栩栩如生，极具神韵，尤其在捕捉人物的内心气质方面展现了惊人天赋。曾鲸的画作深受当时士大夫阶层的喜爱，其技法极大地丰富了中国人物画的表现力，是中国肖像画向近代化演进的重要标志。他的一生致力于艺术创作，通过对那一时代众多名士神态的精准捕捉，为后世留下了极其宝贵的视觉历史记忆。曾鲸对个体个性的深度挖掘与写实技巧的探索，展现了极其高超的艺术造诣与职业精神，使其成为了时代面孔的杰出记录者。'
    growth_range:
    - 4
    - 7
    attribute_weights:
      force: 12
      intellect: 58
      defense: 18
      agility: 12
  - key: hist_mingqing_0124
    name: 魏良辅
    archetype: civil
    flavor: '（1489年—1566年）明代著名的戏曲音乐家，昆曲艺术的奠基人，被后世尊为“昆曲之祖”。他在广泛吸收海盐腔、余姚腔等地方戏曲优点的基础上，历经数十年潜心钻研，对原有的昆山腔进行了颠覆性的改革，创造出了婉转流畅、细腻传神、极具艺术感染力的“水磨腔”，使得昆曲从一种土生土长的地方小戏一跃成为受士大夫青睐的高雅艺术。魏良辅对昆曲的唱腔、伴奏乐器（如引入笛、笙、琵琶等）及表演程式都进行了精心的设计与规范，其成就功在千秋。他那种精益求精、穷尽毕生精力于一技的工匠精神，提升了中国戏曲的审美层次，使得昆曲在后来的数百年间成为了中华文化的精粹代表，影响深远。'
    growth_range:
    - 4
    - 7
    attribute_weights:
      force: 12
      intellect: 58
