  - key: hist_mingqing_0151
    name: 陈定生
    archetype: civil
    flavor: '（1604年—1656年）明末清初著名的政治家、学者，复社四公子之一。他出身名门，在明亡前夕积极投身救亡运动，挑战腐败势力。陈定生为人方正不畏强权，主张读书人应有强烈社会责任感。清初他坚守遗民节操绝不出仕，致力于学术传承。他的一生是传统文人“守正不阿”精神的写照。其散文豪宕俊逸，充满了对大明兴亡的反思。陈定生在江南文人圈中拥有极其高的领袖地位，他那种即便在绝望中依然努力守护民族魂魄的姿态，使其成为了清初士林的一面气节旗帜。他那种不仅关注文本本身且关注文本所承载的古代运行机制的视野，使其显赫。'
