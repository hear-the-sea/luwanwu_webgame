    - 7
    attribute_weights:
      force: 42
      intellect: 18
      defense: 24
      agility: 16
  - key: hist_mingqing_0142
    name: 屈大均
    archetype: civil
    flavor: '（1630年—1696年）字翁山，号华夫，明末清初著名的学者、诗人，被誉为“岭南三大家”之首。他在明亡后积极参加反清复明活动，曾出家为僧以避祸，一生游历大江南北，联络各地志士，具有极其强烈的民族气节。在学术上他博通经史，对岭南地区的地理环境、物产资源与民俗文化有极其详尽且科学的研究，所著《广东新语》被后世誉为岭南文化的百科全书。他的诗作风格豪迈悲凉、气势苍劲，充满了对故国的深沉思念与对乱世的独特思考。屈大均的一生是岭南地方文化与大民族精神高度结合的缩影，他那种在政权交替之际始终不忘大义、致力于乡土文化发掘的努力，使其成为了中国文化史上的一位重要英雄，其风骨影响了整整一代学子。'
    growth_range:
    - 4
    - 7
    attribute_weights:
      force: 12
      intellect: 58
      defense: 18
      agility: 12
  - key: hist_mingqing_0143
    name: 陈恭尹
    archetype: civil
    flavor: '（1631年—1700年）清初著名诗人、书法家，岭南三大家之一。他出身抗清名门，父陈邦彦殉国。陈恭尹在明亡后坚持不仕，以诗文寄托哀思。其诗作风格质朴挺拔，擅长描写岭南风光，名句“独有英雄留节义”传诵千古。他在书法上造诣亦深，行草书神韵不凡。他一生在隐居讲学中度过，崇高气节深受推崇。陈恭尹是岭南文化在清初得以延续的重要保障，他那种将家国情怀融入艺术追求的行为，使其成为了清代初期文坛一颗极其坚韧且璀璨的明星，其气节长存。他那种不仅关注文本本身且关注文本所承载的古代社会运行机制的视野，使其地位尊崇。'
    growth_range:
