  - key: hist_mingqing_0144
    name: 梁佩兰
    archetype: civil
    flavor: '（1629年—1705年）清初著名诗人，岭南三大家之一。他在康熙年间以才华闻名，被誉为词坛领袖。其诗歌风格典雅瑰丽，尤其在长篇叙事诗上展现了极高能力。他虽然在政府任职，但始终保持与遗民圈联系，作品常流流露故国哀思。他积极扶持岭南后进，对提升当地文学水平贡献巨大。梁佩兰那种在现实生存与文化理想间微妙平衡的文人心态，反映了清初汉族知识分子的普遍生存样态。其诗集展现了岭南文化博大精深，使其在清代文学史上占据了不可或缺的显赫位置。他那种致力于文化传承与复原的志向，使其成为了重要建设者。其影响力大。'
