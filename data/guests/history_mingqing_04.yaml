  - key: hist_mingqing_0146
    name: 李香君
    archetype: civil
    flavor: '（1624年—1654年）著名的秦淮名妓，也是具有强烈民族气节的女性代表。面对权奸阮大铖的威逼利诱，李香君以“血溅桃花扇”拒绝与之合作，展现了极其高尚的人格自尊。明亡后，她坚持民族立场，在乱世中守望故国。其形象在文学名著中得到了升华，成为了中国文化中“位卑未敢忘国忧”的象征。她的一生在动荡中追求真爱与正义，虽然结局凄凉，但她那份超越阶层的家国情怀，使其成为了秦淮风华中最具脊梁意义的女性符号，其名气跨越时代，深受后世感佩。她那种在绝境中依然能保持作为个体的从容与尊严，展现了极其高尚的灵魂境界。'
    growth_range:
