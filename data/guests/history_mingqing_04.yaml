      agility: 12
  - key: hist_mingqing_0147
    name: 顾横波
    archetype: civil
    flavor: '（1619年—1664年）秦淮八艳之一，著名的女诗人、画家。她在年轻时即以才气名震金陵，尤擅画兰，风格清劲。顾横波的一生展现了晚明女性在权势、才情与生存压力间的艰难抉择。明亡后随夫入清，并在保护遗民文化、奖掖后辈才子方面表现出不凡眼光。她的一生展现了在那场天崩地裂巨变中个体的复杂性。她那流传至今的优美诗画，不仅是艺术的珍品，更真实记录了一个繁华时代在崩塌前后的个体心态变迁。她是美的创造者，也是历史剧变的见证者，其才华在艺术史中占据独特地位。她那种追求艺术真实与自然高度统一的风格反映了其心态。'
    growth_range:
