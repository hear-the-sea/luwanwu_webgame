  - key: hist_mingqing_0145
    name: 柳如是
    archetype: civil
    flavor: '（1618年—1664年）秦淮八艳之首，著名的诗人、政治志士。她才情冠绝一时，更在民族大义面前展现了远超须眉的胆略。明亡后她积极参与反清活动，联络义军、筹措经费。其诗作风格苍凉豪迈，充满了抗争精神。柳如是的一生是追求人格独立与民族尊严的历程，成为了中国女性志士的代表。她在钱谦益降清后依然保持了独立的抗争立场，通过极其隐秘的渠道联络抗清力量。其形象是中国文化中坚韧与美学的结合，展现了在那场动荡剧变中女性非凡的精神风骨。她那种追求艺术真实与自然高度统一的风格反映了文人一种平淡天真的人生态度。'
    growth_range:
