  - key: hist_mingqing_0149
    name: 卞玉京
    archetype: civil
    flavor: '（约1623年—约1665年）秦淮名妓，明亡后遁入空门。她擅长鼓琴、绘画，诗风清苦孤绝。卞玉京经历了繁华落尽的巨大落差，选择以宗教寻求心灵宁静。这种转型反映了时代剧变对个体命运的重塑。她在青灯古佛中度过余生，作品充满了空灵之美。卞玉京那种追求精神解脱的过程，使其形象在文化中显出肃穆。她的一生是对“繁华梦碎”的深刻隐喻，展现了遗民群体内心深处复杂的挣扎。她的琴声与画作，成为了那个破碎时代心灵余音的听觉化呈现，令人深思。她那种追求艺术真实与自然高度统一的风格，反映了后期文人一种平淡天真的人生态度。'
