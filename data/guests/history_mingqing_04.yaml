  - key: hist_mingqing_0125
    name: 梁辰鱼
    archetype: civil
    flavor: '（1521年—1594年）字伯龙，号少白，明代著名的剧作家。他不仅在文学创作上展现了极高的天赋，更在戏曲艺术的推广上表现出非凡的胆略。梁辰鱼在魏良辅改革昆山腔的基础上，创作了著名的昆曲剧本《浣纱记》，这是历史上首次将“水磨腔”应用到长篇传奇之中，这一创举直接导致了昆曲在晚明社会的爆炸式流行，并确立了其在戏曲界的霸主地位。梁辰鱼的辞藻瑰丽典雅，且深谙剧场舞台效果与大众审美心理的博弈。他的一生是文学理想与艺术实践完美结合的典范。他那种能够敏锐捕捉艺术变革先机并将其转化为文化现实的能力，使其成为了中国戏曲史上划时代的人物，其努力为中国古代戏曲的繁荣提供了源源不断的动力。'
    growth_range:
    - 4
    - 7
    attribute_weights:
      force: 12
      intellect: 58
      defense: 18
      agility: 12
  - key: hist_mingqing_0126
    name: 阮大铖
    archetype: civil
    flavor: '（1587年—1646年）字集之，号圆海，明末著名的剧作家与诗人。他在艺术上具有极其罕见的才华，其作品如《燕子笺》、《春灯谜》等在音律、辞采与戏剧冲突的构建上均达到了晚明传奇的巅峰水准，被誉为一代词宗。然而，他在政治上由于依附阉党魏忠贤、投靠马士英并大搞党争报复而声名狼藉。阮大铖的一生是艺术天才与政治操守剧烈冲突的典型样本。他在南明弘光朝覆灭时的投机行径，使其在史书中被列入奸臣。然而，从文学史的角度看，他那种能够将极其复杂的人物情感与精妙的音律完美融合的才华，依然展现了极高的艺术造诣。他的一生在极度的繁华与极度的权欲中挣扎，其作品至今仍是研究明末戏曲不可或缺的文本。'
    growth_range:
    - 4
    - 7
    attribute_weights:
      force: 12
      intellect: 58
      defense: 18
      agility: 12
  - key: hist_mingqing_0127
    name: 李玉
    archetype: civil
    flavor: '（1591年—1671年）字玄玉，号苏门啸客，明末清初著名的剧作家，“苏州派”戏曲创作的领袖。他在戏曲创作上具有强烈的现实主义精神与平民立场，其代表作《清忠谱》、《一捧雪》等，极其敏锐且真实地记录了晚明东林党人与阉党斗争的壮烈场面，极大地激发了民众的正义感。李玉擅长通过紧凑的剧情、生动的苏州方言与鲜活的底层人物刻画来吸引社会各阶层，其作品在当时具有极强的社会舆论导向作用。他在明亡后坚守民族节操，通过戏剧创作表达对故国的深沉思念与对忠良的无尽祭奠。李玉那种将戏剧作为社会批判与精神寄托工具的勇气，使其脱离了传统才子的局限，展现了一位高级知识分子的家国情怀与人格魅力。'
    growth_range:
    - 4
    - 7
    attribute_weights:
      force: 12
      intellect: 58
      defense: 18
      agility: 12
  - key: hist_mingqing_0128
    name: 褚人获
    archetype: civil
    flavor: '（1635年—1719年）字学稼，号稼轩，清初著名的文学家、小说家与笔记家。他凭借一部宏大的英雄传奇小说《隋唐演义》，为中国古代历史演义小说确立了经典的叙事范式，深受历代读者喜爱。褚人获不仅是一位讲故事的高手，更是一位博古通今、学识渊博的笔记专家，其代表作《坚瓠集》卷帙浩繁，搜集了大量的社会风俗、历史轶闻与文坛轶事，是研究清初文化史与社会生活史的珍贵微观资料库。他为人谦逊、治学严谨，他的一生致力于通俗文学的雅化与历史知识的大众化传播。褚人获那种能够将零散的民间传说整理为结构严密、气势磅礴的宏大叙事的能力，展现了那一时代知识分子卓越的整合才干与艺术修养。'
    growth_range:
    - 4
    - 7
    attribute_weights:
      force: 12
      intellect: 58
      defense: 18
      agility: 12
  - key: hist_mingqing_0129
    name: 方苞
    archetype: civil
    flavor: '（1668年—1749年）字灵皋，号望溪，清初著名的文学家、思想家，桐城派散文流派的开山鼻祖。他主张古文创作应讲求“义法”，即内容须符合儒家正统义理，形式须简洁严谨、法度森严。方苞的文章风格质朴苍劲、雅洁庄重，极力反对明末以来浮华颓废、辞藻堆砌的文风。他在学术上严守古礼，对于维护清初社会的文化秩序与道德重建贡献巨大。虽然他的一生多次卷入政治旋涡并曾遭遇牢狱之灾，但他那严谨的治学态度与对文学传统的死守，使其成为了士林公认的宗师。方苞那种试图通过规范文学表达来实现社会教化与秩序稳定的理想，深刻影响了清代长达两百年的主流文风，其在文学史上的地位极其尊崇。'
    growth_range:
    - 4
    - 7
    attribute_weights:
      force: 12
      intellect: 58
      defense: 18
      agility: 12
  - key: hist_mingqing_0130
    name: 刘大櫆
    archetype: civil
    flavor: '（1698年—1779年）字才甫，号海峰，清代著名文学家，桐城派散文的中坚力量。他在方苞“义法”理论的基础上，进一步强调了文章创作中的“神气”与“音节”，主张好的文章不仅要有深刻的义理，还要有铿锵有力的节奏感、流动的气韵与神韵。刘大櫆的散文气势雄浑，擅长描写大山大水的宏阔意境，将理论与实践完美结合。他在教育后进、提携人才方面亦有巨大贡献，在书院讲学多年，培养了姚鼐等一大批顶尖名家。他的一生体现了清代文人在追求艺术完美的同时，如何通过理论创新赋予传统古文以新的生命力。刘大櫆在文学理论上的深度探索，为桐城派最终成为清代第一大文学流派奠定了坚实的美学基础。'
    growth_range:
    - 4
    - 7
    attribute_weights:
      force: 12
      intellect: 58
      defense: 18
      agility: 12
  - key: hist_mingqing_0131
    name: 姚鼐
    archetype: civil
    flavor: '（1731年—1815年）字姬传，号梦谷，清代著名的文学家、书法家，桐城派散文的集大成者。他总结并完善了流派理论，提出了著名的“义理、考据、辞章”三位一体论，使得散文创作在思想深度、学术精确与语言艺术上达到了高度的统一。姚鼐主持编纂的《古文辞类纂》，选录精当，成为了中国古典文学教育的权威范本，影响了数代士子。他的一生致力于在各大书院讲学，门生遍布大江南北，极大地提升了清代后期文人的整体学养。姚鼐的文章风格清淡雅洁、意境幽远，展现了传统文人深厚的文化底蕴与平和的人生态度。他不仅是一位文学大师，更是一位伟大的教育家，其功勋在于成功守护并弘扬了中华古典文化的精华。'
    growth_range:
    - 4
    - 7
    attribute_weights:
      force: 12
      intellect: 58
      defense: 18
      agility: 12
  - key: hist_mingqing_0132
    name: 阮葵生
    archetype: civil
    flavor: '（1727年—1789年）字宝台，号次山，清代著名的重臣与笔记文学家。他在政治上官至刑部右侍郎，办事精干老练。而他在文学史上的重要贡献在于其名著《茶余客话》，该书以极其细腻且具实证精神的视角，详尽记录了乾隆盛世时期江南社会的物价水平、商业伦理、风俗习惯、科举轶闻及各种社会现象，是研究清中叶社会史与经济史的微观百科全书。阮葵生在创作上追求质朴自然，其文字间充满了对普通民众生活的关怀与对时代变迁的敏锐观察。他的一生在繁忙的官场与清静的书斋间游刃有余，展现了清代优秀文官阶层一种极高的社会责任感与文化使命感，其作品具有极高的史料价值与文学魅力。'
    growth_range:
    - 4
    - 7
    attribute_weights:
      force: 12
      intellect: 58
      defense: 18
      agility: 12
  - key: hist_mingqing_0133
    name: 陆继辂
    archetype: civil
    flavor: '（1772年—1834年）字祁孙，号修源，清代著名的“阳湖派”文学家与学者。他在文学上主张打破门户之见，博采众长，追求文章的实效性与宏大气象。陆继辂特别关注水利建设、荒政救济等基层行政实务问题，撰写了多部具有极高实用价值的经世致用专著。他的文章风格雄浑苍劲、情感悲悯，展现了一位后期知识分子对国家局势的深刻忧虑。他的一生在教育与地方政务中度过，其严谨的治学风气深受同僚敬重。陆继辂那种将文学才华服务于社会公益的实践，反映了清代文人试图通过“实学”来挽回国运的壮丽努力，是实干型文人的典范。他在解决复杂的基层行政纠纷中表现出的那种清高且不乏智慧的姿态，展现了精英阶层的人格高度。'
    growth_range:
    - 4
    - 7
    attribute_weights:
      force: 12
      intellect: 58
      defense: 18
      agility: 12
  - key: hist_mingqing_0134
    name: 查继佐
    archetype: civil
    flavor: '（1601年—1676年）字伊璜，号东山，明末清初著名史学家、文学家。他曾卷入震惊全国的“庄廷鑨明史案”，死里逃生后致力于撰写反映明朝真实历史的编年体史书《罪惟录》。其著作讲求史德、不畏权势，在学术上主张客观求真，为后世保留了大量极具价值的明末清初第一手史料。查继佐为人性格孤傲、学识渊博，他在清初极度压抑的政治环境下依然坚持独立笔墨，不肯随波逐流。其作品不仅是历史的记录，更是遗民群体对故国的深情祭奠。他那种在文字狱阴影下依然守护历史真相的勇气，使其成为了史学界的楷模，其风骨为后世所推崇。他的一生致力于文化的传承与复原，通过极其敏密的考证使得许多历史细节重新回到了文明视野。'
    growth_range:
    - 4
    - 7
    attribute_weights:
      force: 12
      intellect: 58
      defense: 18
      agility: 12
  - key: hist_mingqing_0135
    name: 陈确
    archetype: civil
    flavor: '（1604年—1677年）字乾初，明末清初著名的思想家、哲学家。他在明清易代之际坚持民族气节，拒绝仕清，隐居著书。在学术上他表现出强烈的批判反叛精神，对传统的理学教条（尤其是《大学》）进行了尖锐的辨伪与批判。陈确主张实践与真知的紧密结合，强调道德修养应建立在现实的感官体验与劳动之上。他一生清苦而高洁，思想中蕴含的朴素唯物主义倾向在清初闪耀着独特的光芒。他不仅是守节遗民，更是中国哲学向近代转型过程中敢于独立思考的勇敢探索者。陈确那种敢于直面人性底层欲望、挑战圣人崇拜的胆略，使其成为了思想史上的一股清流，他那种追求理性的极致、不为世俗偏见所动的性格，展现了中华知识分子的天赋与韧性。'
    growth_range:
    - 4
    - 7
    attribute_weights:
      force: 12
      intellect: 58
      defense: 18
      agility: 12
  - key: hist_mingqing_0136
    name: 魏禧
    archetype: civil
    flavor: '（1624年—1681年）字冰叔，号勺庭，清初著名的文学家、思想家，与侯方域、汪琬并誉为“清初三大家”。在明亡后他坚持民族大义，拒绝与新政权合作，长期隐居于翠微峰著书立说。魏禧的文章风格雄奇瑰丽、气势磅礴，充满了对英雄气节的歌颂与对现实的深刻反思。他在学术上主张经世致用，极力反对空谈性理。魏禧的一生坚守民族节操，他的存在成为了当时遗民精神的一面旗帜。他在极度艰苦的环境下依然保持高昂的创作热情，作品中蕴含的民族志气激励了无数后继者。他那种在草屋中依然忧心天下、在劳作中依然坚持写作的精神，是清初江南文化中一个极其坚韧的人格符号，其影响力不仅限于文坛，更在于对民族灵魂的守护。'
    growth_range:
    - 4
    - 7
    attribute_weights:
      force: 12
      intellect: 58
      defense: 18
      agility: 12
  - key: hist_mingqing_0137
    name: 黄宗炎
    archetype: civil
    flavor: '（1616年—1686年）字晦木，号立斋，清初著名易学家，黄宗羲之弟。他在学术研究中展现了极其严密的数学分析能力，成功揭示了宋代以来易学图表背后的构造原理，并撰写了《易学象数论》等名著。他主张“去神圣化”，认为经典的解读应建立在逻辑与实证之上，而非玄学迷信。他在抗清失败后潜心学术，那种在琐碎的图表与文字中寻找理性真理的努力，代表了清初知识分子在政治幻灭后通过追求“真知”来重建精神世界的集体尝试。黄宗炎那种严谨冷峻的性格，是中国学术理性化进程中的重要一步。他在学术上对兄长黄宗羲的强力支撑与个人独立见解，共同铸就了家族文化的辉煌。他在文字间构建的历史公正感，展现了极高的人格境界。'
    growth_range:
    - 4
    - 7
    attribute_weights:
      force: 12
      intellect: 58
      defense: 18
      agility: 12
  - key: hist_mingqing_0138
    name: 万斯同
    archetype: civil
    flavor: '（1638年—1702年）字季野，号石园，清初著名的史学家。他出身书香门第，应邀进入明史馆但由于坚守遗民节操而拒绝受衔，以布衣身份主持编纂了《明史》初稿。万斯同凭借惊人的记忆力与对典章制度的深刻理解，理清了明代极其复杂的行政脉络与历史细节。他主张“史贵求真”，排除了大量的政治干扰与虚假修饰。他的一生清贫守节，其学术功勋为后世留下了一部高质量的断代史基石。万斯同那种以史为命、呕心沥血的精神，使其成为了中国史学史上最受尊敬的人物之一。他在文字间构建的历史公正感，不仅是对大明的深情祭奠，更是对史学尊严的最后捍卫。其无衔领袖的身份，象征着清初布衣学者极其高傲且独立的文化主体性。'
    growth_range:
    - 4
    - 7
    attribute_weights:
      force: 12
      intellect: 58
      defense: 18
      agility: 12
  - key: hist_mingqing_0139
    name: 沈宸荃
    archetype: military
    flavor: '（1606年—1652年）字伯荪，号彤庵，南明著名将领、大臣。他在明亡后致力于浙东地区的抗清斗争，协助鲁王朱以海建立监国政权，官至兵部尚书。沈宸荃为人忠诚勇敢、处事冷静果断，在极端艰苦的海上环境中，他统领义军坚持战斗多年，多次在石浦、舟山等地击退清军的进犯。他不仅是一位出色的军事统帅，在行政统筹与外交博弈上也表现出卓越干才。最终他在海上遭遇飓风遇难，死前依然心向故国，留下了壮烈的绝命词。沈宸荃的一生是南明历史上极其悲壮的一页，他以有限的力量在东南沿海筑起了一道坚实的身心防线。他那种在必败的局势下依然能保持钢铁意志、不肯随波逐流的态度，展现了中国精英阶层最坚实的人格底色。'
    growth_range:
    - 4
    - 7
    attribute_weights:
      force: 42
      intellect: 18
      defense: 24
      agility: 16
  - key: hist_mingqing_0140
    name: 张同敞
    archetype: civil
    flavor: '（1617年—1650年）字昭宣，南明著名烈士，大名鼎鼎的张居正之曾孙。他出身名门，在国家破亡之际毅然投笔从戎，协助瞿式耜守卫桂林，官至总督。张同敞为人豪迈、诗才横溢，他在战场上身先士卒，勇猛无比，在绝境中依然与广大将士同甘共苦。桂林城破后被俘，他面对清军的威逼利诱表现出极其蔑视与不屈的态度，临刑前在大笑中从容就义，留下了气贯长虹的绝命诗作。他以实际行动洗刷了其家族后期的平庸与争议，证明了名门之后不俗的英雄气概。张同敞的一生是家学渊源与民族大义完美结合的典型，是南明抗争史上最动人、最纯粹的一抹血色辉煌。他那种追求个人尊严与民族尊严高度统一的姿态，使其成为了那一时代最具感召力的军事领袖。'
    growth_range:
    - 4
    - 7
    attribute_weights:
      force: 12
      intellect: 58
      defense: 18
      agility: 12
  - key: hist_mingqing_0141
    name: 蔡复一
    archetype: military
    flavor: '（1576年—1625年）字敬夫，号去昏，明代著名名臣、军事统帅。他在万历、天启年间镇守西南边疆，面对极其复杂的民族矛盾与大规模武装叛乱，展现了卓越的战略眼光与行政才干。蔡复一为人性格刚烈、处事严明高效，他主张威德并施，通过兴办地方教育、推广先进农业技术与推行屯田来稳固疆土。他的一生几乎都在马背上度过，由于长期在瘴气弥漫、环境恶劣的边陲之地操劳过度，最终在任上因病殉职。蔡复一不仅武功显赫，其文学造诣亦极其深厚，其诗歌风格雄奇瑰丽、充满了忧国忧民的深沉情操。他那种不计个人安危、致力于国家领土完整与社会安宁的意志极其伟大，他在处理繁杂行政事务中展现出的清高与智慧，展现了儒者的人格。'
    growth_range:
