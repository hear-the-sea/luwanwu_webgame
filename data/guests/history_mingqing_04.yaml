  - key: hist_mingqing_0150
    name: 寇白门
    archetype: civil
    flavor: '（约1624年—约1670年）秦淮八艳之一，以豪爽侠气著称。在明末乱世中她曾多次挺身而出救助陷困人士。寇白门的命运多舛，但她始终保持了傲骨与义气。她在金陵名妓圈拥有极其高的声望，其事迹在吴伟业等文人笔下得到深刻记录。她的一生是秦淮河畔风云变幻的缩影，展现了底层女性在国破家亡之际的生命力与人格尊严。寇白门的这种侠女风范，打破了传统对风尘女子的偏见，成为了那个时代的一段英雄佳话。其生平记录了秦淮河畔从极盛到极衰的过程，意义显著。她那种在处理复杂的艺术遗产与社会纠纷中表现出的清高，展现了人格高度。'
