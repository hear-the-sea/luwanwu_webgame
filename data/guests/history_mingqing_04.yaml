      agility: 12
  - key: hist_mingqing_0148
    name: 董小宛
    archetype: civil
    flavor: '（1624年—1651年）秦淮名妓，以温婉贤淑与高雅生活美学著称。她在乱世中展现了极其坚韧的生存意志，其与名士冒襄的恋情传为佳话。董小宛不仅貌美才高，更将其生活琐事记录为感人至深的文学篇章。虽然她在清初因贫病早逝，但那个才貌双全、至情至性的形象已成为秦淮文化的一段温柔记忆。她那种在极其动荡时代依然能够经营出生活精致感的能力，展现了中华文明深处顽强的生活意志。她的一生是美的祭礼，为我们提供了一个具人性的角度去审视那个残酷时代。她那种追求艺术真实与自然高度统一的风格，展现了人类灵魂在动荡之后。'
