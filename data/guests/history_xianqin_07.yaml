  - key: hist_xianqin_0300
    name: 姬诡诸
    default_gender: male
    archetype: military
    flavor: （?—前651年）晋国雄主，奠定晋国霸业根基。他在位期间大刀阔斧改革：消灭晋国旧公族，打破世卿世禄，大胆任用外姓人才。他灭虞灭虢，"假途灭虢""唇亡齿寒"的典故皆由此而来。他使晋国从一个内乱不断的诸侯国，一跃成为强国。然而晚年他宠幸骊姬，酿成骊姬之乱：太子申生自杀，公子重耳、夷吾流亡，晋国陷入多年动荡。他是功过参半的君主：有开疆拓土之功，也有废嫡立庶之过。
    growth_range:
    - 4
    - 7
    attribute_weights:
      force: 38
      intellect: 20
      defense: 24
      agility: 18
  - key: hist_xianqin_0301
    name: 姬圉
    default_gender: male
    archetype: military
    flavor: （?—前636年）晋国短命之君。他是晋惠公之子，本名圉。他曾在秦国为质，后逃归晋国。惠公死后他继位，但在位不到一年。此时流亡十九年的伯父重耳在秦国支持下回国争位，他兵败出逃，在高梁被重耳派人杀死。他是晋国内乱的牺牲品：父亲失德在先，自己无力回天。他的死结束了惠公一系的统治，为晋文公开创霸业扫清了最后障碍。他的短暂一生，是政治斗争残酷性的写照。
    growth_range:
    - 3
    - 7
    attribute_weights:
      force: 36
      intellect: 16
      defense: 26
      agility: 22
  - key: hist_xianqin_0302
    name: 吕甥
    default_gender: male
    archetype: civil
    flavor: （生卒年不详）晋国大夫，危机中的外交能手。他又名阴饴甥，是晋惠公的重臣。韩原之战晋军惨败，惠公被秦军俘虏，生死悬于一线。他临危受命出使秦国，以高超的外交辞令与秦穆公周旋。他痛陈利害，晓以情理，最终促成秦晋议和，惠公得以归国。虽然惠公本人德行有亏，但吕甥在危难时刻展现的外交才能，确实挽救了晋国免于更大灾难。他是春秋时期杰出的外交家，在国家危难时临危不乱、力挽狂澜。
    growth_range:
    - 4
    - 7
    attribute_weights:
      force: 10
      intellect: 56
      defense: 20
      agility: 14
  - key: hist_xianqin_0303
    name: 郤芮
    default_gender: male
    archetype: military
    flavor: （?—前636年）晋惠公旧臣，死于政变失败。他是晋惠公、晋怀公时期的权臣，深受惠公信任。当流亡的重耳回国争位时，他是最坚定的反对者。晋怀公败亡后，他不甘失势，与吕甥密谋作乱，企图焚烧宫室杀死晋文公。不料事机败露，他被迫出逃秦国。秦穆公以大义名分将他诱杀，平息了这场未遂的政变。他的失败说明：逆历史潮流而动者，终究难逃覆灭。他是晋文公霸业道路上最后一个被清除的绊脚石。
    growth_range:
    - 3
    - 7
    attribute_weights:
      force: 40
      intellect: 14
      defense: 26
      agility: 20
  - key: hist_xianqin_0304
    name: 勃鞮
    default_gender: male
    archetype: military
    flavor: （即寺人披，生卒年不详）晋国宦官，改过自新的忠臣。他就是寺人披的另一个名字，当年奉惠公之命追杀流亡的重耳，刀光剑影中砍断重耳衣袖。十九年后重耳归国为君，他冒死求见，坦陈当年苦衷，并带来吕甥、郤芮密谋作乱的情报。晋文公以霸主胸襟赦免旧恶，他则以忠诚回报信任，成为文公的耳目。昔日的刺客变成今日的功臣，这段故事是晋文公知人善任、海纳百川的最好注脚。
    growth_range:
    - 3
    - 7
    attribute_weights:
      force: 38
      intellect: 14
      defense: 26
      agility: 22
  - key: hist_xianqin_0305
    name: 羊舌赤
    default_gender: male
    archetype: civil
    flavor: （?—前514年）晋国大夫，叔向之兄。他字伯华，与弟弟叔向（羊舌肸）同为晋国名臣，羊舌氏是晋国最有声望的家族之一。他为人正直，在晋国政坛有重要影响。然而晋国卿族政治日益残酷，强卿争权，弱族遭殃。晋顷公时期，羊舌氏卷入政治漩涡，满门被灭族，他也难逃劫难。羊舌氏的覆灭是晋国卿族政治走向极端的标志之一，从此晋国政治由六卿把持，公室更加式微。他的命运折射出春秋末期卿族斗争的残酷。
    growth_range:
    - 4
    - 7
    attribute_weights:
      force: 10
      intellect: 54
      defense: 22
      agility: 14
  - key: hist_xianqin_0306
    name: 羊舌虎
    default_gender: male
    archetype: military
    flavor: （?—前552年）晋国大夫，叔向之弟。他是羊舌氏家族成员，也是叔向的弟弟。他因卷入晋国内部的政治斗争而被杀，还连累了整个羊舌氏家族陷入危机。据说他与栾盈有牵连，栾氏作乱失败后，他也受到株连。他的死是羊舌氏由盛转衰的开端。虽然他个人并非罪大恶极，但在卿族政治的绞肉机中，一旦站错队伍，便是灭顶之灾。他的遭遇提醒后人：在权力斗争中，选择比能力更重要。
    growth_range:
    - 3
    - 7
    attribute_weights:
      force: 38
      intellect: 14
      defense: 26
      agility: 22
  - key: hist_xianqin_0307
    name: 州绰
    default_gender: male
    archetype: military
    flavor: （生卒年不详）齐国力士，权臣爪牙。他是齐国权臣崔杼的心腹打手，以勇力著称。崔杼因齐庄公与其妻棠姜私通而怀恨在心，设伏杀庄公时，州绰是执行弑君的主要打手之一。他手持利刃，亲手参与这场震惊诸侯的弑君大案。后来崔杼失势自杀，他的结局也好不到哪去。他是权臣手下暴力工具的典型：靠主子得势，主子倒台便一无所有。为虎作伥者，终将与虎同命。
    growth_range:
    - 3
    - 7
    attribute_weights:
      force: 44
      intellect: 10
      defense: 26
      agility: 20
  - key: hist_xianqin_0308
    name: 崔杼
    default_gender: male
    archetype: military
    flavor: （?—前546年）齐国权臣，弑君夺权。他是齐国大族崔氏的当家人，权倾朝野。他娶了美妇棠姜，不料齐庄公贪恋其美色，多次与棠姜私通。崔杼忍无可忍，趁庄公入其家私会时设伏弑杀。他立齐景公为君，自任右相，控制齐国政权。太史记"崔杼弑其君"，他连杀三位太史，第四位仍直书不改——"崔杼弑其君"遂成千古定论。然而他晚年家族内讧，被庆封所迫，全家自杀。弑君者不得善终，天道循环，报应不爽。
    growth_range:
    - 4
    - 7
    attribute_weights:
      force: 40
      intellect: 18
      defense: 24
      agility: 18
  - key: hist_xianqin_0309
    name: 庆封
    default_gender: male
    archetype: military
    flavor: （?—前538年）齐国权臣，与崔杼争权。他是齐国另一权臣，与崔杼联手弑杀齐庄公后，两人共掌朝政。然而权力只能独享不能分享，他趁崔氏内乱之机，出兵攻灭崔氏满门。崔杼自缢身亡，庆封独揽大权。他得志后骄奢淫逸，不理政事，将权力交给儿子庆舍。不久后他被齐国卿族联合驱逐，流亡吴国。后在吴国被楚军俘杀。弑君夺权、残害同僚，他的下场说明：天网恢恢，疏而不漏。
    growth_range:
    - 3
    - 7
    attribute_weights:
      force: 40
      intellect: 16
      defense: 24
      agility: 20
  - key: hist_xianqin_0310
    name: 田乞
    default_gender: male
    archetype: civil
    flavor: （?—前485年）齐国大夫，田氏代齐的奠基者。他是田氏家族的关键人物，创造了"大斗出贷、小斗收租"的笼络民心之术：借粮给百姓时用大斗，收回时用小斗，差额由田氏补贴。百姓感恩戴德，纷纷归附田氏。与此同时，姜氏公室日益衰落，民心尽失。他还在政治上排挤打压姜氏公室支持者，扶植亲田势力。他奠定的基础，使田氏在齐国的势力日益膨胀，最终由子孙完成代齐大业。他是"买人心"策略的祖师爷。
    growth_range:
    - 4
    - 7
    attribute_weights:
      force: 10
      intellect: 56
      defense: 20
      agility: 14
  - key: hist_xianqin_0311
    name: 田常
    default_gender: male
    archetype: military
    flavor: （?—前405年）齐国权臣，田氏代齐的推进者。他又名田成子，继承父亲田乞的事业，将田氏势力推向新高峰。他弑杀齐简公，拥立齐平公，自此田氏完全把持齐国政权。他继续施行"大斗出小斗入"的笼络之术，民心尽归田氏。他还大开美女之门，广纳姬妾，据说生有七十余子，将田氏血脉遍布齐国朝野。他的弑君之举虽遭诸侯谴责，却无人敢干涉。田氏代齐已是大势所趋，姜氏齐国名存实亡。
    growth_range:
    - 4
    - 7
    attribute_weights:
      force: 38
      intellect: 20
      defense: 24
      agility: 18
  - key: hist_xianqin_0312
    name: 鲍牧
    default_gender: male
    archetype: civil
    flavor: （生卒年不详）齐国大夫，鲍叔牙的后人。他是春秋名臣鲍叔牙的后裔，继承了鲍氏在齐国的地位。鲍氏自管鲍之交以来，一直是齐国的重要卿族。然而到了春秋末期，田氏势力日益膨胀，鲍氏逐渐式微。他在齐国政坛仍有一定影响力，但无法阻挡田氏的崛起。鲍氏的衰落与田氏的兴盛形成对照，折射出齐国政治格局的深刻变化。昔日管鲍之交的佳话犹在耳边，而鲍氏的荣光已成过眼云烟。
    growth_range:
    - 3
    - 7
    attribute_weights:
      force: 10
      intellect: 52
      defense: 22
      agility: 16
  - key: hist_xianqin_0313
    name: 国夏
    default_gender: male
    archetype: civil
    flavor: （生卒年不详）齐国大夫，国氏家族代表。他是齐国传统贵族国氏的代表人物。国氏是姜氏齐国的老牌卿族，世代效忠公室。然而面对田氏的强势崛起，他们无力回天。田氏以民心为依托，以阴谋为手段，一步步蚕食公室权力。国夏虽试图维护旧秩序，但在历史大势面前显得力不从心。他的存在提醒后人：任何政治势力如果失去民心支持，即使根基再深也难逃覆灭命运。
    growth_range:
    - 3
    - 7
    attribute_weights:
      force: 10
      intellect: 52
      defense: 22
      agility: 16
  - key: hist_xianqin_0314
    name: 高张
    default_gender: male
    archetype: civil
    flavor: （生卒年不详）齐国大夫，高氏家族代表。他是齐国老牌贵族高氏的代表人物。高氏与国氏一样，都是姜氏齐国的传统卿族，世代与公室休戚与共。然而田氏崛起后，高氏的地位日益边缘化。田氏用收买人心的手段，使齐国百姓心向田氏而非公室。高氏虽有意匡扶公室，却无力扭转乾坤。他的命运与国夏相似，都是旧贵族在新势力面前的无奈挣扎。田氏代齐，高氏、国氏等老牌贵族都成为历史的弃儿。
    growth_range:
    - 3
    - 7
    attribute_weights:
      force: 10
      intellect: 52
      defense: 22
      agility: 16
  - key: hist_xianqin_0315
    name: 灵辄
    default_gender: male
    archetype: military
    flavor: （生卒年不详）报恩刺客，一饭之恩的践行者。他年轻时曾饥饿倒毙路旁，被正直的赵盾所救，饱食一顿后离去。后来晋灵公派人刺杀赵盾，他竟是伏兵之一。认出赵盾后，他想起当年一饭之恩，临阵反戈，不仅放走赵盾，还为他阻挡追兵。他冒着灭族的风险报答了当年的救命之恩。"一饭之恩，没齿难忘"——灵辄的故事是古代知恩图报精神的最好注脚。小人物的义举，往往比达官贵人更令人动容。
    growth_range:
    - 4
    - 7
    attribute_weights:
      force: 40
      intellect: 14
      defense: 26
      agility: 20
  - key: hist_xianqin_0316
    name: 提弥明
    default_gender: male
    archetype: military
    flavor: （?—前607年）赵盾侍卫，舍身护主的忠仆。他是赵盾的贴身侍卫，忠心耿耿。晋灵公在宫中设下伏兵欲杀赵盾，刀光剑影中他挺身而出，以一己之力抵挡众多刺客，为赵盾争取逃跑时间。他与刺客殊死搏斗，最终寡不敌众，壮烈牺牲。他的死换来了主人的生，赵盾得以逃出生天。忠仆舍身护主的故事在春秋时代屡见不鲜，提弥明是其中最动人的一位。他的名字或许不够响亮，但他的忠诚永载史册。
    growth_range:
    - 4
    - 7
    attribute_weights:
      force: 44
      intellect: 10
      defense: 28
      agility: 18
  - key: hist_xianqin_0317
    name: 士会
    default_gender: male
    archetype: civil
    flavor: （约前620年—约前556年）晋国名臣，范氏家族的奠基者。他字季，又称范武子，是春秋时期最杰出的政治家、军事家之一。他的人生跌宕起伏：曾因政争流亡秦国，为秦穆公效力，展现出卓越才能；后被晋国召回，官至执政大夫。他文武兼备，既能运筹帷幄决胜千里，又能治国理政安民抚众。他开创的范氏家族，后来成为晋国六卿之一，延续数百年。他的处世智慧、政治手腕、军事才能，使他成为春秋时期士大夫的典范。
    growth_range:
    - 4
    - 7
    attribute_weights:
      force: 14
      intellect: 52
      defense: 20
      agility: 14
  - key: hist_xianqin_0318
    name: 士燮
    default_gender: male
    archetype: civil
    flavor: （?—前574年）晋国大夫，明哲保身的智者。他名燮，是范武子士会的儿子。他继承父业，成为范氏家族的第二代掌门人。他为人谨慎持重，深谙官场险恶。他曾劝父亲士会急流勇退，远离权力中心的漩涡。在晋国卿族政治日益激烈的时代，他以低调务实的作风保全了家族。他的政治智慧在于懂得进退之道：该进则进，该退则退，不争一时之长短。范氏在他手中平稳传承，为后来的壮大奠定了基础。
    growth_range:
    - 4
    - 7
    attribute_weights:
      force: 10
      intellect: 54
      defense: 22
      agility: 14
  - key: hist_xianqin_0319
    name: 士匄
    default_gender: male
    archetype: military
    flavor: （?—前548年）晋国执政，范氏势力的巅峰。他名匄，是范文子之子，晋国六卿之一。他执掌晋国权柄多年，是晋国政坛的核心人物。在他的主导下，范氏势力达到顶峰，成为晋国最有权势的卿族之一。他参与弭兵之会等重大外交活动，在诸侯间有相当影响力。然而晋国卿族政治的本质是零和博弈，强者恒强则弱者恒弱。他的强势虽使范氏一时显赫，却也埋下日后衰落的种子。六卿争权，此消彼长。
    growth_range:
    - 4
    - 7
    attribute_weights:
      force: 38
      intellect: 18
      defense: 26
      agility: 18
  - key: hist_xianqin_0320
    name: 荀吴
    default_gender: male
    archetype: military
    flavor: （?—前490年）晋国卿族，晋阳之战的失败者。他是中行氏后期的宗主，与范氏联合对抗日益强大的赵氏。他与范吉射共同发动对赵氏的战争，围攻晋阳。然而赵简子依托晋阳坚城，坚守三年不降。他们的联军久攻不下，反被赵氏联合韩、魏反击。战败后他与范吉射一同逃亡齐国，中行氏从此退出晋国政治舞台。他的失败标志着晋国政治格局的重大变化，为后来的三家分晋埋下伏笔。
    growth_range:
    - 3
    - 7
    attribute_weights:
      force: 38
      intellect: 16
      defense: 26
      agility: 20
  - key: hist_xianqin_0321
    name: 士吉射
    default_gender: male
    archetype: military
    flavor: （?—前490年）范氏末代宗主，流亡终老。他是范氏家族最后一位掌门人。范氏曾是晋国最强大的卿族之一，然而到他这一代，已是强弩之末。他与中行吴联手对抗赵氏，围攻晋阳，却功败垂成。赵简子联合韩、魏反击，他们兵败如山倒，被迫逃亡齐国。范氏从此退出晋国历史舞台，数代积累的基业毁于一旦。他的失败说明：卿族争霸如同赌博，一旦押错了筹码，便是满盘皆输。
    growth_range:
    - 3
    - 7
    attribute_weights:
      force: 38
      intellect: 16
      defense: 26
      agility: 20
  - key: hist_xianqin_0322
    name: 荀首
    default_gender: male
    archetype: civil
    flavor: （?—前583年）晋国大夫，智氏家族的开创者。他是荀林父的弟弟，以智慧著称，故其后代以"智"为氏。他在晋国政坛以谋略见长，善于审时度势。他开创的智氏家族，后来发展成为晋国最强大的卿族，势力一度超过赵、韩、魏三家之和。智瑶就是他的后裔。他奠定的基业，虽然最终在智瑶手中覆灭，但智氏的辉煌延续了一百多年。家族的兴衰成败，往往取决于后人能否守住先人的基业。
    growth_range:
    - 4
    - 7
    attribute_weights:
      force: 10
      intellect: 56
      defense: 20
      agility: 14
  - key: hist_xianqin_0323
    name: 荀罃
    default_gender: male
