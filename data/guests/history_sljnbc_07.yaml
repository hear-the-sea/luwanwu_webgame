      agility: 18
  - key: hist_sljnbc_0310
    name: 孙静
    default_gender: male
    archetype: civil
    flavor: （？—219年）孙坚之弟，留守江东。字幼台，吴郡富春人，孙坚最小的弟弟。孙坚起兵讨黄巾、伐董卓时，他留守家乡富春，保护宗族安全，免受战乱波及。他虽未随兄长征战沙场，却以默默的付出为孙氏保留了根基。孙策平定江东时，他出谋划策颇有功勋。攻打会稽王朗时久攻不下，他献计从小路迂回，孙策依计行事果然攻破会稽。
