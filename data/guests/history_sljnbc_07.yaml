      agility: 22
  - key: hist_sljnbc_0304
    name: 董袭
    default_gender: male
    archetype: military
    flavor: （？—213年）以身殉国，江东猛虎。会稽余姚人，身长八尺，武力过人。他早年追随孙策，每逢战斗必冲锋在前，孙策称赞他有"猛虎之勇"。孙权继位后他受到重用，负责平定山越叛乱，屡建功勋。他对孙权忠心耿耿，曾在危急关头挺身护主。讨伐黄祖时他率先登上敌船，一路斩杀敌将夺其旗帜，黄祖军望风披靡。
    growth_range:
    - 3
