    attribute_weights:
      force: 40
      intellect: 15
      defense: 23
      agility: 22
  - key: hist_sljnbc_0305
    name: 陈武
    default_gender: male
    archetype: military
    flavor: （？—215年）仁厚好施，死于合肥。庐江松滋人，少年时便以勇武闻名乡里。孙策平定江东时他率部投奔，以骁勇善战著称。他统领精锐部队"庐江上甲"，这支劲旅专挑强敌死战，是东吴军中最精锐的突击力量。他为人仁厚慷慨，常以俸禄赏赐部下，对待士卒如同家人，因此部下皆愿为他效死。合肥之战中张辽率八百死士突袭孙权大营，东吴军猝不及防阵脚大乱。
    growth_range:
