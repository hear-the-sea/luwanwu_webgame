  - key: hist_sljnbc_0312
    name: 严畯
    default_gender: male
    archetype: civil
    flavor: （？—？）敦厚长者，不愿为官。彭城人，少年时便以学问闻名，精通《诗》《书》《三礼》等经典，与诸葛瑾、步骘交好，并称"东吴三友"。他避乱江东后受到孙权礼遇，被征辟为官，却多次推辞不就。鲁肃去世后，孙权本欲让他接替鲁肃统领荆州军务，他坚决推辞道"我只是一介书生，不通军事，恐误国家大事"，坚持将这一重任让给吕蒙。
