  - key: hist_sljnbc_0315
    name: 步练师
    default_gender: female
    archetype: civil
    flavor: （？—238年）孙权皇后（步皇后）。临淮淮阴人，丞相步骘同族。她早年因战乱随母流落江东，后被选入宫中，因姿色秀丽、性情温婉而受孙权宠爱。孙权称帝后欲立她为皇后，群臣以其出身低微为由反对，孙权只得作罢，但始终以皇后之礼待之。她虽未正式称后却实掌后宫，统率嫔妃井井有条。她为人宽厚仁慈，从不嫉妒其他嫔妃，也不恃宠而骄。
    growth_range:
    - 4
    - 7
    attribute_weights:
      force: 20
      intellect: 40
      defense: 20
      agility: 20
  - key: hist_sljnbc_0316
    name: 诸葛靓
