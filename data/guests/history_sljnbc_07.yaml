  - key: hist_sljnbc_0311
    name: 孙瑜
    default_gender: male
    archetype: military
    flavor: （177年—215年）好学善战，济阳太守。吴郡富春人，孙静次子，是孙权的堂弟。他与其他孙氏宗族不同，自幼好学不倦，精通经史，颇有儒将风范。他长大后统兵征战，多次参与平定山越叛乱和对外作战，战功累累。他曾劝说济阳太守归降东吴，展现了文武兼备的才能。赤壁之战时他随周瑜出征，在大战中发挥了重要作用。
