      agility: 20
  green:
  - key: hist_sljnbc_0301
    name: 全琮
    default_gender: male
    archetype: military
    flavor: （198年—249年）东吴驸马，江东豪族。吴郡钱塘人，出身江东世家大族。他少年时便以才干闻名，曾建议父亲用家中余粮赈济灾民，由此收获了大量精壮流民充实部曲，展现了过人的眼光。孙权将女儿孙鲁班嫁给他，他由此成为驸马都尉，地位愈加显赫。他多次领兵与魏军交战，石亭之战中他担任断后重任，保护全军安全撤退，受到嘉奖。
