  - key: hist_sljnbc_0309
    name: 吴景
    default_gender: male
    archetype: military
    flavor: （？—203年）孙坚内弟，丹阳太守。丹阳故鄣人，孙坚之妻吴氏的弟弟，孙策、孙权的舅父。他早年追随姐夫孙坚南征北战，孙坚战死后他扶持外甥孙策东归创业。孙策起兵时兵微将寡，他以丹阳太守的身份提供兵源粮草，是孙策能够横扫江东的重要后援。丹阳郡民风彪悍，盛产精兵，东吴军队中大量丹阳兵正是由他源源不断输送。
    growth_range:
