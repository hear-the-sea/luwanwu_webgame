    attribute_weights:
      force: 8
      intellect: 64
      defense: 18
      agility: 10
  - key: hist_sljnbc_0340
    name: 刘伶
    default_gender: male
    archetype: civil
    flavor: （约221年—约300年）竹林七贤之一，沛国人，字伯伦。他身材矮小，容貌丑陋，却放达不羁，以嗜酒闻名于世。他常乘鹿车载酒出行，令人荷锸随后，说"死便埋我"。他曾任建威参军，因无所作为而罢官。他作《酒德颂》，以"惟酒是务，焉知其余"表达人生态度，文中塑造的"大人先生"形象成为后世酒徒自况的典故。
    growth_range:
    - 6
    - 9
    attribute_weights:
      force: 20
      intellect: 40
      defense: 20
      agility: 20
  - key: hist_sljnbc_0341
    name: 向秀
    default_gender: male
    archetype: civil
    flavor: （约227年—272年）竹林七贤之一，河内怀县人，字子期。他清悒有远志，少时即以文章知名。他为《庄子》作注，阐发义理，开创了义理派注庄的先河，其注解大部分被郭象采入己注。嵇康被杀后，他被迫入仕司马氏，然终日沉默寡言。一次经过嵇康、吕安旧居，闻邻人吹笛，悲从中来，作《思旧赋》悼念故友，情真意切，成为千古名篇。
    growth_range:
    - 6
    - 9
    attribute_weights:
      force: 8
      intellect: 64
      defense: 18
      agility: 10
  - key: hist_sljnbc_0342
    name: 左思
    default_gender: male
    archetype: civil
    flavor: （约250年—305年）西晋文学家，齐国临淄人，字太冲。他相貌丑陋，口讷不善言辞，却博学多才，文采斐然。他构思十年写成《三都赋》，初不为人重视，经皇甫谧作序、张载张华等名士推荐后名声大噪，豪贵之家争相传抄，洛阳纸价为之飞涨，"洛阳纸贵"典故由此而来。他的《咏史诗》八首借古讽今，抒发寒门士子的不平之气，对后世咏史诗影响深远。
    growth_range:
    - 6
    - 9
    attribute_weights:
      force: 8
      intellect: 64
      defense: 18
      agility: 10
  - key: hist_sljnbc_0343
    name: 贾南风
    default_gender: female
    archetype: civil
    flavor: （256年—300年4月）西晋惠帝皇后，平阳襄陵人，贾充之女。她貌丑而性妒，凶悍善谋。晋惠帝司马衷即位后，她逐渐掌握朝政大权。她先是联合楚王司马玮诛杀辅政大臣杨骏和汝南王司马亮，随后又杀司马玮灭口。她专权期间诛杀异己，废太子司马遹并将其杀害，引发诸王不满。赵王司马伦以为太子报仇为名起兵，将她废黜赐死。
    growth_range:
    - 6
    - 9
    attribute_weights:
      force: 20
      intellect: 40
      defense: 20
      agility: 20
  - key: hist_sljnbc_0344
    name: 王戎
    default_gender: male
    archetype: civil
    flavor: （234年—305年）竹林七贤之一，琅琊临沂人，字濬冲。他少有神童之名，年幼时见道边李树多子，众人争采，他独不动，言"树在道边而多子，此必苦李"，果如其言。他与阮籍、嵇康等为竹林之游，然入仕后善于谋身保位，历任吏部尚书、司徒等要职，是七贤中官位最高者。他为人吝啬，家有好李，恐人得种，每售必钻核，时人讥之。
    growth_range:
