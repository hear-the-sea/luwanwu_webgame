  - key: hist_sljnbc_0314
    name: 于吉
    default_gender: male
    archetype: civil
    flavor: （？—200年）东汉末方士，在江东传道，颇受民众信奉。琅琊人，自称已活数百岁，精通道术。他在吴郡、会稽一带设立道堂，以符水为人治病，信徒众多。孙策正当盛年却突然遇刺，时人多将此事与于吉之死联系起来，附会出种种神异传说。据说孙策认为于吉以妖术惑众，影响军心民心，将其斩杀。
    growth_range:
