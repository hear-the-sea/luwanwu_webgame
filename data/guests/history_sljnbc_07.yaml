      agility: 10
  - key: hist_sljnbc_0313
    name: 程秉
    default_gender: male
    archetype: civil
    flavor: （？—？）博通五经，太子太傅。汝南南顿人，早年师从大儒郑玄学习经学，学问渊博精深。他避乱交州，在士燮幕下讲学授业。孙权平定交州后将他征辟入朝，拜为太常，掌管朝廷礼仪制度。他精通《周易》《尚书》《论语》等经典，对古代礼制了如指掌，是东吴最权威的礼学专家。孙权立孙登为太子后，命他担任太子太傅，负责教导太子学问。
