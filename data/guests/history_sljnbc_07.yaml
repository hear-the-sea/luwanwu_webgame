      agility: 22
  - key: hist_sljnbc_0302
    name: 孙峻
    default_gender: male
    archetype: military
    flavor: （219年—256年）险恶权臣，祸乱东吴。吴郡富春人，孙坚弟孙静的曾孙。他年轻时便以精明强干著称，深受孙权信任，被任命为武卫都尉负责宫廷警卫。孙权临终托孤，命他与诸葛恪共同辅政。他与诸葛恪初期合作尚可，后因诸葛恪北伐失败、威望尽失，他趁机发动政变将诸葛恪诛杀，从此独揽朝政。
    growth_range:
