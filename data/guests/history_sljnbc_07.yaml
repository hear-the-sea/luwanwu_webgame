    attribute_weights:
      force: 40
      intellect: 15
      defense: 23
      agility: 22
  - key: hist_sljnbc_0303
    name: 孙綝
    default_gender: male
    archetype: military
    flavor: （231年—258年）嗜杀权臣，废立皇帝。吴郡富春人，孙峻的堂弟。孙峻死后将权力传给他，他继续把持东吴朝政，残暴程度更甚于孙峻。他杀害大将吕据、朱异等功臣，又诛灭滕胤全族，朝野上下人人自危。少帝孙亮年渐长成，不甘为傀儡，与全公主等密谋除掉他。他发觉后先发制人，废黜孙亮为会稽王，另立孙休为帝。
    growth_range:
