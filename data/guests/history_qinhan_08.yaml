      agility: 16
  - key: hist_qinhan_0351
    name: 刘炳
    default_gender: male
    archetype: civil
    flavor: （143年—145年）东汉皇帝，幼年即位，在位极短，政务多由外戚与大臣代行。冲帝的短暂存在并非无关紧要：它把东汉中后期的结构性问题暴露得很直白——幼主频出意味着权力必然外移，皇帝名号被“代理者”使用，诏命与人事在宫廷集团手中运转，皇权难以形成连续的政策节奏。冲帝的命运说明，王朝并不总是因为外敌而危，很多时候是内部接班机制失灵：继承无法稳定，就会反复制造权力真空；真空越多，集团越强，皇帝越弱。写汉冲帝，不是为了描绘一个孩子的性格，而是为了看到帝国权力如何在短寿与代理政治中被一层层抽走。
    growth_range:
    - 3
    - 7
    attribute_weights:
      force: 14
      intellect: 48
      defense: 22
      agility: 16
  - key: hist_qinhan_0352
    name: 刘缵
    default_gender: male
    archetype: civil
    flavor: （138年—146年）东汉皇帝，年幼即位，史书多将其死与宫廷权臣专断联系在一起。幼主政治的残酷在于：皇帝名义上至高无上，实际却常被外戚与权臣包围；一旦幼主表现出不满或触及权势者利益，反而更容易遭到迅速清除。质帝短促的在位时间，使他更像一个制度警报——当权力缺乏制衡、诏命与人事被少数人垄断时，皇位本身也不再安全，只剩“可被利用的名号”。质帝之死并非孤立事故，它让人看到东汉中期权力结构的危险趋势：朝廷仍在运转，但决定生死的按钮可能已不在皇帝手里。
    growth_range:
    - 3
    - 7
    attribute_weights:
      force: 14
      intellect: 48
      defense: 22
      agility: 16
  - key: hist_qinhan_0353
    name: 张敖
    default_gender: male
    archetype: civil
    flavor: （生年不详—前181年）西汉赵王，汉初诸侯王之一，与皇室联姻使其处境尤为敏感。史载其后牵连大案而被削夺王号，终以列侯终身，这段转折把汉初政治的“疑惧机制”展现得极为直白：诸侯王既是地方屏藩，也是中央必须时刻提防的潜在变量。张敖未必以个人野心闻名，但他的命运说明，在开国之后的权力整合阶段，君臣关系与同盟关系会迅速被重新定义，昨日的亲家也可能成为今日的风险点。张敖的遭际更像一套机制在运转：联姻带来亲近，也带来猜疑，封国最终要被纳入更严密的中央控制。
    growth_range:
    - 3
    - 7
    attribute_weights:
      force: 14
      intellect: 48
      defense: 22
      agility: 16
  - key: hist_qinhan_0354
    name: 吕媭
    default_gender: female
    archetype: civil
    flavor: （生年不详—前180年）吕后之妹，樊哙之妻，处在汉初最敏感的宗族与功臣交界处。吕氏势盛时，婚姻把她与开国功臣集团连接在一起，也把她推入宫廷权力的涡心；而吕氏败亡后，原本能护身的亲缘反而成为清算的理由。史书写吕媭，常带“家族政治”视角：女性并非只能被动承受，她们也可能通过婚姻、亲属与内廷网络影响局势，但这种影响往往建立在脆弱的权力平衡上，一旦翻盘便几乎无处可逃。吕媭的结局像一记回声，提醒人们汉初政局的残酷并不分男女，真正决定生死的是站位与结构。
    growth_range:
    - 3
    - 7
    attribute_weights:
      force: 14
      intellect: 48
      defense: 22
      agility: 16
  - key: hist_qinhan_0355
    name: 刘如意
    default_gender: male
    archetype: civil
    flavor: （生年不详—前194年）西汉赵王，戚夫人之子，汉初继承斗争的悲剧核心之一。储位之争把一个年幼宗室推上风口：对戚夫人而言，他是母子生存的依靠；对吕后集团而言，他又是对既定继承秩序的威胁。吕后掌权后将刘如意害死，继而发生戚夫人惨剧，使汉初宫廷斗争呈现赤裸的暴力逻辑。刘如意的命运提醒人们，早期帝国的继承并不稳固，名分背后是利益结构与安全焦虑；当缺乏可被普遍接受的程序时，解决冲突的手段就会滑向极端，甚至把孩童也当作政治问题处理。刘如意被害与戚夫人惨剧，让人看到制度未定型时的恐惧：它会吞噬亲情，也会把孩子变成必须被“解决”的政治障碍。
    growth_range:
    - 3
    - 7
    attribute_weights:
      force: 14
