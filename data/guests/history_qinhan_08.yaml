  - key: hist_qinhan_0363
    name: 王寻
    default_gender: male
    archetype: military
    flavor: （生年不详—23年）新莽将领，昆阳之战中代表王莽政权出征，战败身死。史书常以昆阳之败概括新莽军政的整体失灵：表面兵力占优，却难以形成有效的指挥协同与持续的士气支撑；而政治合法性的摇摇欲坠，又使军队的动员与补给更不稳固。王寻作为统帅层人物，既要对战场决策负责，也要承担政权衰败带来的“不可逆逆风”——越打越缺粮、越打越缺人心，最终胜负往往在开战之前就已倾斜。把王寻放回新莽末年的环境，他的败亡更像一种结构性结局：当政权失去民心与官僚体系的支撑，战场就会用最残酷的方式做出判决。
    growth_range:
    - 3
    - 7
    attribute_weights:
      force: 46
      intellect: 14
      defense: 28
      agility: 12
  - key: hist_qinhan_0364
    name: 王邑
    default_gender: male
    archetype: military
    flavor: （生年不详—23年）新莽将领。昆阳战役中与王寻同为主要统帅，面对义军以少胜多而败。王邑的经历常被用于说明新莽末年军队组织与士气问题：兵多未必能胜，指挥协调、士气与政治合法性都决定战场结果。王邑的失败之所以致命，是因为它发生在政权信任崩塌的临界点：地方不再愿意出粮出人，前线也难以形成同心协力的指挥体系，一场失利就足以引发连锁溃散。把王邑放回那一年天下的走向，更能理解“战败”并不只是军事问题，而是财政、民心与官僚系统同时失灵后的集中爆发。
    growth_range:
    - 3
    - 7
    attribute_weights:
      force: 46
      intellect: 14
      defense: 28
      agility: 12
  - key: hist_qinhan_0365
    name: 朱鲔
    default_gender: male
    archetype: military
    flavor: （生年不详—26年）新莽末至东汉初人物。早年在王莽体系或地方势力中任职，后在天下大乱与势力消长中转而归附刘秀。朱鲔这类人的选择常被简单贴上“反复”的标签，但从当时的现实看，更像一种自保逻辑：地方军政人物要对手下、城邑与家族负责，一旦上层政权失去控制力，站错队可能意味着全盘覆灭。东汉统一过程中，大量招抚与改编正是依靠这种“把旧人收进新制度”的方式完成的。朱鲔的经历因此提供一个角度：光武的胜利不只靠打赢，还靠把能用的人留下来、把敌对者变成可管理的官员或将领，减少持续内战的成本。
    growth_range:
    - 3
    - 7
    attribute_weights:
      force: 46
      intellect: 14
      defense: 28
      agility: 12
  - key: hist_qinhan_0366
    name: 王郎
    default_gender: male
    archetype: civil
    flavor: （生年不详—23年）新莽末年起事者之一，曾冒称宗室名号以聚众，势力一度影响河北局面，后为刘秀所平。王郎的兴起很能说明乱世动员的心理机制：当社会秩序崩裂、信息混乱、民心渴望“正统”时，假托血统与符命的表演便可能迅速获得响应。王郎并不需要证明自己“真”，只需要让足够多人愿意相信；但一旦要面对真实的军政组织与长期治理，他的虚弱便会暴露出来。王郎的败亡也提示东汉开国过程的一条现实：平定割据并不只靠战斗力，还靠谁能提供更可信的秩序与承诺。所谓“伪号”，其可怕之处不在骗局本身，而在它能动员多少人的焦虑与希望。
    growth_range:
    - 3
    - 7
    attribute_weights:
      force: 14
      intellect: 48
      defense: 22
      agility: 16
  - key: hist_qinhan_0367
    name: 刘永
    default_gender: male
    archetype: military
    flavor: （生年不详—27年）新莽末至东汉初关东割据者之一，借乱世名号自立，终为东汉平定。刘永的出现并不意外：王莽败亡并不等于地方立刻服从，郡县经历兵燹与税赋断裂后，最先冒出的往往是能拉起乡兵、能控制粮仓的人。刘永这样的割据者，既吃“汉室宗亲/旧号召”的红利，也背“地方秩序没人管”的现实压力；他们能撑住一段时间，但很难在中央恢复后继续维持。写刘永，应写那种尴尬的夹层：他既不是单纯叛贼，也不是合法君主，而是乱世给出来的一种临时答案——中央一旦能答题，这种答案就会被迅速抹掉。
    growth_range:
    - 3
    - 7
    attribute_weights:
      force: 46
      intellect: 14
      defense: 28
      agility: 12
  - key: hist_qinhan_0368
    name: 彭宠
    default_gender: male
    archetype: military
    flavor: （生年不详—29年）东汉初年地方势力。曾与刘秀合作，后因矛盾或形势变化而反叛，终被平定。彭宠的经历很典型：开国初期中央需要地方强人提供兵粮与地缘支点，地方强人也希望凭功劳获得长期保障；可当功赏、任命与控制边界谈不拢时，合作就会迅速变质。史载彭宠最终败亡，说明光武对地方势力的态度是明确的——可以结盟，但不允许形成半独立的军政中心。写彭宠，重点不在道德批评，而在“信任如何破裂”：一旦双方开始怀疑对方的意图，哪怕最初同盟再紧密，也可能在短时间内走向兵戎相见。
    growth_range:
    - 3
    - 7
    attribute_weights:
      force: 46
      intellect: 14
      defense: 28
      agility: 12
  - key: hist_qinhan_0369
    name: 张步
    default_gender: male
    archetype: military
