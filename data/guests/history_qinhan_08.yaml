  - key: hist_qinhan_0356
    name: 栾布
    default_gender: male
    archetype: military
    flavor: （生年不详—前154年）西汉将领。七国之乱时，他属于执行层的将领群：不一定站在最耀眼的位置，却承担推进、围攻、截断与清剿等“把叛乱磨死”的工作。平叛最怕的是战线拖长、叛军到处点火、地方豪强两头下注；因此栾布这类人要做的往往不是冲一阵，而是把局势压成可控的几条线，让叛军失去回旋空间。战后还要安置军民、恢复郡县，这才算真正结束。栾布留给人的印象更像一把钝刀：不华丽，但能割断叛乱的筋，直到它再也动不了。
    growth_range:
    - 3
    - 7
    attribute_weights:
      force: 46
      intellect: 14
      defense: 28
      agility: 12
  - key: hist_qinhan_0357
    name: 冯唐
    default_gender: male
    archetype: civil
    flavor: （生年不详—前110年）西汉官员。以直言敢谏著称，与边政与选将用人话题相关的故事流传甚广。史载冯唐曾因荐举与申理而使将领魏尚等人得以昭雪，体现文景时期朝廷仍重视“把话说到要害”的谏官传统。冯唐的可贵不在于语锋多锐，而在于他能把边防、军纪与人事任用连成一条链：将领是否可信，制度是否公正，直接决定边地能否稳定。他的故事也常被后世借来感叹人才与机遇——忠直之言未必立刻见用，但只要皇帝仍愿意听，官僚体系就还有自我纠错的可能。
    growth_range:
    - 3
    - 7
    attribute_weights:
      force: 14
      intellect: 48
      defense: 22
      agility: 16
  - key: hist_qinhan_0358
    name: 魏尚
    default_gender: male
    archetype: military
    flavor: （生卒年不详）西汉边将，守边有功，却因法令与人事纠葛一度被治罪，后经冯唐进言才得以平反重用（史载）。魏尚的故事耐读之处，在于它不讲“打赢了就有赏”的爽快逻辑，反而讲“边功如何被记账”：前线的判断常在风沙里完成，后方的裁决却在文书里落锤；一旦制度僵硬或有人借法条寻衅，守边的功劳就可能被写成过失。魏尚因此成了边政里的一个提醒——边将需要的不只是勇武，还需要朝廷在赏罚上理解边地的复杂；否则功劳无法转化为安全感，士气与忠诚就会被无声消耗。
    growth_range:
    - 3
    - 7
    attribute_weights:
      force: 46
      intellect: 14
      defense: 28
      agility: 12
  - key: hist_qinhan_0359
    name: 李敢
    default_gender: male
    archetype: military
    flavor: （生年不详—前119年）西汉将领，李广之子。以勇猛著称，曾随军出征，后因纠葛与冲突而死。李敢的悲剧常被置于汉武帝对匈奴战争的背景中观察：军功集团内部竞争激烈，名将之家既享荣耀也承受更强的审视与猜疑。李敢的死并非只因个人性情，而与当时的权力关系与军功体系有关——边战激烈时，恩怨更容易被放大，私人冲突也更容易被政治化处理。写李敢，最能提醒人们：武人的生死并不完全由敌人决定，朝廷的奖惩逻辑、同僚的竞争与名门的光环，往往会在战场之外提前写下结局。
    growth_range:
    - 3
    - 7
    attribute_weights:
      force: 46
      intellect: 14
      defense: 28
      agility: 12
  - key: hist_qinhan_0360
    name: 苏建
    default_gender: male
    archetype: military
    flavor: （生年不详—前80年）西汉将领。曾参与对匈奴作战并与卫霍集团同在一时代。汉武帝时期边战持续多年，史书往往聚焦卫青、霍去病等名将，但战场真正运转离不开苏建这类中层将领：他们要带队行军、守营、追击、护送辎重，很多时候决定的是“能不能按计划执行”。史载苏建亦曾在战局中遭遇挫折与风险，说明远征并非永远是胜利的叙事，失误、误判与意外同样构成战争常态。苏建的经历把军队的“日常战功”摊开：行军、守营、护粮、追击，环环扣着；远征能否打下去，往往就看这些环节能不能不出大错。
    growth_range:
    - 3
    - 7
    attribute_weights:
      force: 46
      intellect: 14
      defense: 28
      agility: 12
  - key: hist_qinhan_0361
    name: 江充
    default_gender: male
    archetype: civil
    flavor: （生年不详—前91年）西汉官员，武帝晚年巫蛊之祸的关键人物之一。史载江充以告发、搜捕等方式推动案件扩散，最终把风波引向太子与皇室核心，并在事后遭诛。江充之所以值得警惕，不在于他“会办案”，而在于他示范了恐惧政治的发动方式：把指控变成工具，把程序变成追杀，靠告密与连坐制造不可逆的自我放大。巫蛊之祸并非偶然误会，它暴露的是高压动员末期的制度失真——皇帝的疑惧、官员的邀功与派系的算计叠加在一起，案件就会像火一样烧穿继承秩序。江充最终被清算，说明这种玩法连操盘者也难以善终；当政治被恐惧统治，谁都可能成为下一个替罪羊。
    growth_range:
    - 3
    - 7
    attribute_weights:
      force: 14
      intellect: 48
      defense: 22
      agility: 16
  - key: hist_qinhan_0362
    name: 苏文
    default_gender: male
    archetype: civil
    flavor: （生年不详—前91年）西汉宦官。武帝晚年巫蛊案中与江充等纠葛甚深，事发后亦遭处置。苏文的处境很能说明“近侍”的两面性：他靠近皇帝，能最快参与机密与诏令流转；也因此最容易被卷入案件漩涡，成为权力斗争的执行环节。巫蛊之祸本身带有恐惧与猜疑的气氛，一旦局势反转，曾经推动搜捕与告发的人往往最先被追责。苏文的结局（史载被诛）提醒人们，宫廷政治的风险不只在外戚与大臣之间，也在近侍群体内部：他们看似得势，实则随时可能因一次风向变化而从“奉旨行事”变成“罪魁祸首”。
    growth_range:
