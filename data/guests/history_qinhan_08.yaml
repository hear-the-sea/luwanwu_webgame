    flavor: （生卒年不详）东汉官员。以执法与断狱见称，事迹散见史书。司法官的难处在于，他处理的不是纸面法条，而是活生生的矛盾：豪强与百姓的冲突、地方关系网的施压、证据的缺失与程序的取舍。郭躬之所以被史书提到，正因为他在这种环境下仍以断狱见名，说明其至少在当时被认为能守住“公”的底线。对东汉国家而言，边疆能否安定是一条线，郡县能否公正同样是一条线——一旦人们不再相信官府裁判，社会就会用私力解决问题，秩序反而更难收拾。郭躬的名声来自一次次扛住压力的判决：程序、证据与人情拉扯之中，能守住公正，官府的裁判才还会被人承认。
