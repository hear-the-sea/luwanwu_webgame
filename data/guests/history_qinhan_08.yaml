    flavor: （生年不详—86年）东汉名臣。以刚直敢言著称，曾在朝中任要职，对人事与政策多有建言。郑弘的力量来自两方面：一是职位带来的制度权力，二是名望带来的道德声量。东汉中期外戚与宦官势力时有起伏，朝廷并不缺“会办事”的人，缺的是敢在关键时刻把话说出口的人；郑弘的直谏因此更像一种公共服务——不一定能改变结局，但能让决策者知道有人在记录、有人在评判。写郑弘，也是在写东汉政治里“清议”的现实作用：它不是抽象的舆论，而是由一批有名节的官员在奏章、会议与人事任免中一点点施加影响。
