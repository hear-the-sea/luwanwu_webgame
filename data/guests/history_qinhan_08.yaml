  - key: hist_qinhan_0350
    name: 刘祜
    default_gender: male
    archetype: civil
    flavor: （94年—125年）东汉皇帝，其在位阶段常被用来观察“宫廷结构如何影响国家运转”。史书所见，一方面朝廷仍沿用前期制度，中央官僚体系并未立刻松散；另一方面，外戚与宦官围绕近侍、诏命与人事的影响力起伏，使决策更易被宫中关系牵引。地方层面又时有灾荒、骚动与边患压力，迫使中央在赈恤、用兵与财政之间反复权衡。安帝本人并非始终无所作为，但他的时代提示：当权力被多方分割时，皇帝的个人意志很难稳定地转化为政策执行。
    growth_range:
