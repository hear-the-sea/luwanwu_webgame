  - key: hist_qinhan_0297
    name: 王温舒
    archetype: civil
    flavor: '（生年不详—前104年）西汉酷吏。史载其执法峻急，善以酷刑震慑地方，名声因此极端：对朝廷而言，他像一把能迅速见效的刀；对地方社会而言，他又像一阵不可预测的风。王温舒的结局常被概括为“以酷终酷”，并不只是道德报应式的说法，而是揭示酷吏政治的内在消耗——当治理越来越依赖恐惧，官员也会被迫不断加码，直到触碰更高层的政治安全线。把王温舒放回武帝时期高压动员的背景里，他并非偶然的“恶人”，更像制度在压力下产生的一种极端工具，而工具随时可能被弃置。'
    growth_range:
