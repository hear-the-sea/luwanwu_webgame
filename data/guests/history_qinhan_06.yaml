  - key: hist_qinhan_0299
    name: 杜周
    archetype: civil
    flavor: '（生年不详—前95年）西汉酷吏与司法官员。以善断狱、严整法度著称，参与处理多起重大案件。杜周的形象常带着“冷”：他擅长在复杂案情里抓到可定罪的关键点，让审判成为高压政治的一部分。汉武帝后期对外战争与财政压力并存，朝廷内部的清洗与整肃也更频繁，法律因此既是治理工具，也是权力用来划线的利器。杜周能在这种体系中上升，说明他既懂法条，也懂风向；而他所代表的酷吏传统也提示，司法一旦过度服务于政治，所谓公正就可能退到次位，留下深刻的社会恐惧与信任裂缝。'
    growth_range:
    - 3
