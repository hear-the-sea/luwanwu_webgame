  - key: hist_qinhan_0290
    name: 刘遂
    archetype: military
    flavor: '（生年不详—前154年）西汉赵王。七国之乱中在北方战线起兵，以邯郸等城对抗汉军。北方诸侯本就难以像吴楚那样拥有丰厚财赋与水陆运输条件，一旦被围，粮草与士气都会迅速下滑；史载汉军围攻日久，赵国势孤，城破后刘遂自杀。刘遂的失败不只是军事层面的败北，更是地理与资源的失败：叛乱需要持续补给与稳定同盟，而赵地在战争初期就被切断了外援通道，守城越久越像在等一场必然到来的结局。写刘遂，可以把七国之乱看得更真实——许多诸侯并非不想赢，只是先天条件决定他们很难撑到最后。'
    growth_range:
