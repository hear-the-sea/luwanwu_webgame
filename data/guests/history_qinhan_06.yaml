  - key: hist_qinhan_0292
    name: 韩安国
    archetype: civil
    flavor: '（生年不详—前127年）西汉大臣。早年以辩才与政务能力著称，史载其曾遭困厄而不失气节，“死灰复燃”等典故常与其人生起伏相连。汉武帝时期对匈奴策略转向积极，边政与军政协调成为硬任务，韩安国这类文臣被推到前台：既要理解战场需求，又要处理朝廷内部的争论与资源分配。他的经历说明两汉对外政策并非单靠名将冲锋，更多时候还要靠能沟通各方、能把命令落实到人事与钱粮的官员。韩安国的价值，恰在这种“夹在中间”的能力与承压。'
    growth_range:
    - 3
    - 7
    attribute_weights:
      force: 14
      intellect: 48
      defense: 22
      agility: 16
  - key: hist_qinhan_0293
    name: 汲黯
    archetype: civil
    flavor: '（生年不详—前112年）西汉名臣，以敢言直谏著称。武帝朝政策强势、用兵频仍，朝廷气氛更偏向效率与动员，汲黯却常以道义与法度为标准提出逆耳之言，显示“强皇帝时代”也并非没有内部的刹车。汲黯的直并不等于鲁莽：史书写他，多强调其言辞峻切却抓住要害，敢指出政策可能造成的民力耗损、官吏苛扰与政治风险。对皇帝而言，这类人既讨厌又离不开——他们让统治者知道边界在哪里，也让官僚系统保留一点纠错能力。汲黯的存在提醒我们，帝国并不是一台只会加速的机器；在最易走向过度的时期，敢讲“不”的声音本身就是一种制度资源。'
    growth_range:
    - 3
    - 7
    attribute_weights:
      force: 14
      intellect: 48
      defense: 22
      agility: 16
  - key: hist_qinhan_0294
    name: 郅都
    archetype: civil
    flavor: '（生年不详—前148年）西汉以严峻执法著称的官员，常被归入“酷吏”谱系。郅都之“酷”，并不只是性情刻薄，更在于他把法律当作威慑工具来使用：在豪强坐大、地方秩序易被侵蚀的阶段，朝廷往往需要这种能快速见效的强硬手段。与此同时，强硬也意味着代价——案件处理容易走向过度，社会对官府的恐惧可能压过信任。郅都的形象因此很难被简单褒贬：他让人看到西汉国家在治理难题面前的“短兵相接”，也让人看到法治一旦与高压政治合流，会怎样把人命与秩序一起推到锋刃上。'
    growth_range:
    - 3
    - 7
    attribute_weights:
      force: 14
      intellect: 48
      defense: 22
      agility: 16
  - key: hist_qinhan_0295
    name: 宁成
    archetype: civil
    flavor: '（生卒年不详）西汉酷吏体系中的一员，史载其用法严峻、整肃治安，形象多与高压治理相连。宁成之所以值得注意，并非因为他有传奇功业，而是他反映汉武帝时期地方控制的“短效药”逻辑：豪强坐大、盗贼滋生、财政与征发压力上升时，朝廷往往愿意倚重严吏以求立竿见影。严吏确能迅速压住局面，但也会把基层矛盾推向更尖锐的对立，甚至让法律变成恐惧的同义词。宁成在史书中的角色像一面冷镜：照见国家权力如何在压力下变硬，也照见这种变硬会给社会带来怎样的长尾代价。'
    growth_range:
