# 历史人物门客 - 秦汉时期（第06批：绿色51-100人）

heroes:
  green:
  - key: hist_qinhan_0250
    name: 武臣
    archetype: military
    flavor: '（生年不详—前208年）秦末赵地起义领袖。陈胜起事后，赵地迅速响应，武臣据众自立为赵王，靠的是地方豪强与游军在“反秦”旗号下的临时合流；可王号一立，新的难题立刻压上来：封赏怎么分、军纪怎么立、与外部诸侯如何合作，稍有失衡就会引发内斗。史载武臣终为部下所杀，赵政权随之震荡，说明秦末的“起势”常常快过“建制”。写武臣，最能看到乱世政治的硬规则：王位能召人，却未必能管人；没有稳定的权力结构，刀兵很容易先转向内部。'
    growth_range:
    - 3
    - 7
    attribute_weights:
      force: 46
      intellect: 14
      defense: 28
      agility: 12
  - key: hist_qinhan_0251
    name: 赵歇
    archetype: civil
    flavor: '（生年不详—前204年）秦末赵王，赵地起义后被推立，随后在项羽与刘邦的力量拉扯中几经浮沉而败亡。赵歇的遭遇最能说明“王号”在乱世的双重性：它能迅速凝聚人心、唤起旧国认同，却也容易沦为强者博弈的筹码，被扶起或被废黜往往不取决于本人意志。赵歇所处的赵地既是军事要冲，也是旧贵族与地方势力的聚集区，内外压力叠加，使新立之王难以建立稳定的资源与军队。史载其最终覆亡，个人能力固然有限，但更难以抵挡的是帝国重组的潮水：旧国旗号可以重新挂起，却很难在新的兵粮体系与联盟格局里长期站稳。通过赵歇，可以更具体地理解秦末到楚汉的政治现实：名分很重要，但更重要的是谁能掌控兵粮与联盟。'
    growth_range:
    - 3
    - 7
    attribute_weights:
      force: 14
      intellect: 48
      defense: 22
      agility: 16
  - key: hist_qinhan_0252
    name: 田儋
    archetype: military
    flavor: '（生年不详—前208年）秦末齐地起义领袖。齐地响应反秦后，田儋拥立齐王并主政一方，其事迹虽不如楚汉主角详尽，却是齐地政治复起的关键节点。田儋与田荣、田横等同属田氏势力，体现齐地在秦末仍保有强烈的地方认同与宗族动员能力：旧国记忆与本地豪强网络可以迅速把反抗组织起来。田儋的难题在于“立国容易守国难”：号召力来自齐地传统，但要在项羽、刘邦等更大力量的夹击下维持独立，需要持续的兵员与粮赋，也需要更复杂的外交选边。田儋的短促结局使人更清楚地看到，秦末复国浪潮往往不是被打败，而是被更大规模的帝国重组所吞没。'
    growth_range:
    - 3
    - 7
    attribute_weights:
      force: 46
      intellect: 14
      defense: 28
      agility: 12
  - key: hist_qinhan_0253
    name: 田荣
    archetype: military
    flavor: '（生年不详—前205年）秦末齐地重要人物，田儋之弟。项羽分封后，齐地被反复拆分与干预，田荣不服强权安排而起兵反楚，试图把齐地重新攥回田氏势力之手，战局也因此被拉进更复杂的诸侯博弈。田荣最终败亡，留下的不是一段“勇不勇”的评语，而是一种地方政治的困境：齐地能迅速动员，但联盟并不牢固；在强者环伺之下，任何一次分封与改立都可能引发连锁反弹。田荣像一枚被反复点燃的火种——点燃得快，熄灭也快，却足以改变周边诸侯的站队与节奏。'
    growth_range:
    - 3
    - 7
    attribute_weights:
      force: 46
      intellect: 14
      defense: 28
      agility: 12
  - key: hist_qinhan_0254
    name: 田横
    archetype: military
    flavor: '（生年不详—前202年）秦末齐地重要人物，田氏宗族领袖之一。楚汉胜负已定后，田横仍坚持不降，史载其自刎以全节，部下亦多殉死。田横之所以被后世反复讲述，不在他掌过多少城池，而在他把“名节”当成最后的政治资源：当现实已无转圜，他选择用死亡保住齐地旧贵族的尊严叙事。这样的选择未必能改变局势，却能改变记忆——胜利者夺天下，失败者争名分。田横故事里那种沉重的坚持，折射出秦汉之际旧秩序崩解时，人们如何用忠义语言为自身定位、为群体留下一点可被追忆的体面。'
    growth_range:
    - 3
    - 7
    attribute_weights:
      force: 46
      intellect: 14
      defense: 28
      agility: 12
  - key: hist_qinhan_0255
    name: 臧荼
    archetype: military
    flavor: '（生年不详—前202年）秦末汉初将领。楚汉分封中受封为燕王，后与汉廷关系紧张并最终被平定。臧荼在乱世中一度据有北方重地，其覆灭说明汉初对异姓诸侯的强烈警惕：统一之后，中央势必削平潜在割据者以固社稷。臧荼的问题不只在于“能不能守一方”，更在于异姓王的合法性天然脆弱——封国兵权与地缘优势会被中央视作风险，稍有风声便会触发先发制人的打击。臧荼的结局因此像一条规则：在汉初的权力整合期，边地强藩若无法持续证明自己“可控且有用”，便很难逃过被收束的命运。'
    growth_range:
    - 3
    - 7
    attribute_weights:
      force: 46
      intellect: 14
      defense: 28
      agility: 12
  - key: hist_qinhan_0256
    name: 韩王成
    archetype: civil
    flavor: '（生年不详—前206年）秦末六国复国潮流中的韩王之一。旧国名分在秦末具有强号召力：只要打出“韩”“赵”“魏”等旗号，地方记忆与旧贵族网络便可能重新集结。但韩王成的经历也说明，名分本身并不能替代兵力与联盟——在项羽、刘邦等更强势的军事集团夹击下，弱小的复国政权往往只能随大势漂流，今日受立，明日可能被改封、被废黜甚至被处置。史书对韩王成着墨不多，恰恰提示他并非独特个案，而是秦末“名分迅速重建、又迅速瓦解”的普遍样本。通过他可以更具体地理解：帝国崩解时，旧国复活很快；帝国重组时，旧国消失也同样快。'
    growth_range:
    - 3
    - 7
    attribute_weights:
      force: 14
      intellect: 48
      defense: 22
      agility: 16
  - key: hist_qinhan_0257
    name: 韩王信
    archetype: military
    flavor: '（生年不详—前196年）西汉异姓王。刘邦分封时受封为韩王，后因边境压力与对匈奴关系的选择而叛汉北走，成为汉初政治中的重要警讯。韩王信事件之所以分量很重，在于它暴露了开国初年的双重焦虑：边境需要有人镇守，但镇守者若握有封国资源与对外联络，就可能在压力下选择自保而非效忠。韩王信的叛离并不只是个人背叛，也与边境治理的难题相连——和战策略、粮饷供给、部众安置都会逼迫藩王不断计算成本。其结局推动汉廷更谨慎地处理异姓王，说明中央集权的形成往往是通过一次次“边疆失控的代价”被迫推进的。'
    growth_range:
    - 3
    - 7
    attribute_weights:
      force: 46
      intellect: 14
      defense: 28
      agility: 12
  - key: hist_qinhan_0258
    name: 魏豹
    archetype: military
    flavor: '（生年不详—前204年）秦末魏地诸侯。楚汉相争中曾受封为魏王，后因政治选择与战局变化而败亡。魏豹的典型性在于“夹在强者之间”：他既要在魏地维持秩序与供给，又必须在项羽与刘邦之间不断衡量利害；对弱势诸侯而言，所谓忠诚往往被现实资源所定义，一旦站错队，代价就是亡国。魏豹的失败说明楚汉战争并非只有两强对决，更有大量中小势力在夹缝里被迫下注；他们缺乏重新来过的资本，任何一次判断误差都会被放大为不可逆的崩盘。通过魏豹，可以更具体地理解乱世政治的残酷：选择看似自由，实际上常被军队规模、地理位置与盟友可靠性提前限定。'
    growth_range:
    - 3
    - 7
    attribute_weights:
      force: 46
      intellect: 14
      defense: 28
      agility: 12
  - key: hist_qinhan_0259
    name: 田都
    archetype: military
    flavor: '（生年不详—前202年）秦末齐地诸侯之一。项羽分封时立田都为齐王，引发齐地田氏势力与地方豪强的强烈反弹；王号虽然到手，却缺乏可被广泛承认的基础。田都在齐地短暂立足后被逐，结局与齐地反楚运动相连，说明乱世分封并非一纸册命就能稳固：地方认同、宗族网络与资源控制才是真正的根基。田都的失败更像制度教训——当上位者试图用“封号”快速改造地方秩序，地方往往会用反抗来回答；而被放在中间的受封者，即使有王名，也可能没有真正能支撑王位的社会结构。'
    growth_range:
    - 3
    - 7
    attribute_weights:
      force: 46
      intellect: 14
      defense: 28
      agility: 12
  - key: hist_qinhan_0260
    name: 田安
    archetype: military
    flavor: '（生年不详—前205年）秦末济北王。项羽分封时受封于齐地周边，但齐地势力此起彼伏，王号与地盘在战局里像被潮水推来推去，田安很快就在更替中败亡。史书对他的细节并不铺陈，反而更贴近现实：分封能立名分，却不保证能立政权；没有稳定兵源、粮道与地方支持，王号只是挂在旗杆上的一块牌子。田安的短促命运说明楚汉之间的“诸侯层”往往最先被碾碎——他们既要向更强者表忠，又要在地方站稳，一旦两头失衡，就会被下一轮分配迅速抹去。'
    growth_range:
    - 3
    - 7
    attribute_weights:
      force: 46
      intellect: 14
      defense: 28
      agility: 12
  - key: hist_qinhan_0261
    name: 龙且
    archetype: military
    flavor: '（生年不详—前204年）楚军名将。楚汉相争中统兵东进，与韩信在潍水对战而败亡。龙且在史书中以骁勇著称，其败亡也提示楚军并非没有能战之将，而是在战略判断与战场信息上逐渐落入下风：韩信善用地形与工程手段，把水势与阵势合为陷阱，使勇猛难以抵消不利局面。龙且战死之后，楚军士气与东线形势受到冲击，这场失败因此不仅是一名将领的倒下，也是楚汉战争天平继续倾斜的一记重锤。写龙且，最能让人看到“勇”在大规模战争里有边界，胜负常常先由筹划与组织决定。'
    growth_range:
    - 3
    - 7
    attribute_weights:
      force: 46
      intellect: 14
      defense: 28
      agility: 12
  - key: hist_qinhan_0262
    name: 钟离昧
    archetype: military
    flavor: '（生年不详—前202年）楚军名将。项羽败亡后，钟离昧辗转依附，后与韩信命运交错，史载其死于矛盾与猜忌之中。钟离昧之所以常被后世提起，是因为他让“功臣难自保”不再是抽象感叹：战功越大，越容易被新秩序视为不确定因素；而在权力整合的阶段，疑惧往往比事实更有力量。钟离昧的结局提示楚汉之际政治的冷酷：战争结束并不意味着安全开始，反而意味着清算与重新划线的开始；名将不仅要赢得战场，也要在战后找到可被容纳的位置，否则胜利会迅速变成负担。'
    growth_range:
    - 3
    - 7
    attribute_weights:
      force: 46
      intellect: 14
      defense: 28
      agility: 12
  - key: hist_qinhan_0263
    name: 曹无伤
    archetype: civil
    flavor: '（生卒年不详）秦末楚汉之际人物，史载其与鸿门宴前后的情报流转有关，因告密与离间而遭刘邦处置。曹无伤之所以值得单列，不是因为他“地位显赫”，恰恰相反：他代表乱世里大量夹在大人物之间的小角色——他们看似只是传话、投机、押注，却可能把局势推向不可逆的方向。鸿门宴之所以惊心，不仅因项羽与刘邦的对峙，也因信息如何被制造与传播：一句话可以变成刀，一次泄密可以改变双方的信任阈值。曹无伤的结局说明这种职业的风险：你用消息换取生路，但当消息触到权力核心，最先被清理的往往也是你。'
    growth_range:
    - 3
    - 7
    attribute_weights:
      force: 14
      intellect: 48
      defense: 22
      agility: 16
  - key: hist_qinhan_0264
    name: 纪信
    archetype: military
    flavor: '（生年不详—前204年）汉初义士与将领。楚汉相争最凶险的阶段，纪信曾假扮刘邦出降，替主帅争得脱身时间，自己则死于楚军（史载多言被焚）。这段故事之所以震人，并不在“义”字本身，而在“替代”二字：集团要活下去，有时必须有人代替首领去死；而代替一旦发生，就把战争的残酷写成了具体的人。纪信留下的不是战役篇章，而是一种极端的责任分配——用个人生命去换取队伍与政治核心的延续，这种选择在乱世里既崇高也冷酷。'
    growth_range:
    - 3
    - 7
    attribute_weights:
      force: 46
      intellect: 14
      defense: 28
      agility: 12
  - key: hist_qinhan_0265
    name: 丁公
    archetype: military
    flavor: '（生年不详—前201年）楚汉之际人物。史载其曾在战局中放过刘邦，后被捕仍遭处死，刘邦以此立为示戒。丁公的故事之所以反复被讨论，在于它触碰乱世政治的一个核心矛盾：私人恩德与公共秩序能否兼容。对新王朝而言，统一之后最需要的是“规则可预期”，否则军功集团与地方势力会继续用私仇私恩来决定生死；因此统治者往往要用极端案例来划线。丁公的命运提醒读者，政治并不总奖励善意，有时反而惩罚“破坏可控性”的善意；而这种惩罚背后，是国家在废墟上重建秩序的急迫与冷酷。'
    growth_range:
    - 3
    - 7
    attribute_weights:
      force: 46
      intellect: 14
      defense: 28
      agility: 12
  - key: hist_qinhan_0266
    name: 雍齿
    archetype: military
    flavor: '（生年不详—前189年）汉初人物，最出名的不是战功，而是“曾叛而仍封”。他与刘邦同乡，却在乱世里反复易主，按道德叙事本该被清算；可汉朝建立后，雍齿仍得以受爵，反倒成了一个政治细节：刘邦需要的不只是报仇，更是把地方的不安、旧势力的摇摆与功臣的疑惧一并压住。封雍齿，等于告诉天下“连这种人都能被安置”，从而减少更多人走向反叛的理由。雍齿的名字因此很刺眼——它让人看到汉初的稳定并非靠洁癖，而是靠把风险买下来、把怨气关进制度里。'
    growth_range:
    - 3
    - 7
    attribute_weights:
      force: 46
      intellect: 14
      defense: 28
      agility: 12
  - key: hist_qinhan_0267
    name: 灌婴
    archetype: military
    flavor: '（生年不详—前176年）西汉开国将领。楚汉战争中他多次统军立功，但更值得写的是他在“天下已定”之后的表现：吕后去世、诸吕掌兵之际，灌婴等将领的站位直接决定政变能否收束在可控范围内，最终局势转向迎立文帝。与其把灌婴只写成“能打”，不如把他写成“能收”：能在关键时刻把兵权用来压住局面，而不是用来坐大；能在胜利之后接受重新分配，而不是再争一次天下。这样的将领在开国后往往更稀缺，因为战场勇气很多，战后克制很少。'
    growth_range:
    - 3
    - 7
    attribute_weights:
      force: 46
      intellect: 14
      defense: 28
      agility: 12
  - key: hist_qinhan_0268
    name: 靳歙
    archetype: military
    flavor: '（生年不详—前183年）西汉开国将领。随刘邦征战，屡有斩获，汉初论功受封。靳歙虽不如韩信、彭越等名声显赫，但在长期战争中承担大量攻城与野战任务，属于把胜利“做出来”的中坚层。靳歙这一类人最能说明楚汉战争的真实结构：名将负责定方向与抓关键节点，但真正把战线推过去、把城池守下来、把叛乱压下去的，往往是这些长期作战的执行者。理解靳歙，会更容易理解汉军何以能持续推进——不是每一仗都靠奇谋，而是靠中层将领把兵员、军纪与补给维持在可作战的状态。'
    growth_range:
    - 3
    - 7
    attribute_weights:
      force: 46
      intellect: 14
      defense: 28
      agility: 12
  - key: hist_qinhan_0269
    name: 王陵
    archetype: civil
    flavor: '（生年不详—前181年）西汉名臣，以刚直敢言著称。吕后临朝时期，功臣与宗室面对的难题并非“忠不忠”那么简单，而是如何在现实权力中心之外守住原则与底线；史载王陵不愿为吕氏集团所用，宁可退避，也不以妥协换取安全。王陵常被后世称为“守节之臣”，其典型性在于：汉初政治合法性仍在重建，功臣集团既要感念旧主，又要面对新权力结构的强制整合，任何站位都有风险。王陵的选择让人看到一种硬的生存策略——不抢权、不献媚，但也不交出底线；这种策略未必能带来功业，却能在乱局里留下清晰的道德坐标。'
    growth_range:
    - 3
    - 7
    attribute_weights:
      force: 14
      intellect: 48
      defense: 22
      agility: 16
  - key: hist_qinhan_0270
    name: 陈豨
    archetype: military
    flavor: '（生年不详—前196年）西汉将领，汉初受封后镇守要地，终因疑惧与形势起兵反叛而败亡，史称“陈豨之乱”。这场叛乱的刺点不在规模多大，而在它发生得太早：天下刚统一不久，军功集团仍握兵在外，功臣对皇权收束的恐惧与地方资源的诱惑交织，一旦风声不稳就可能先下手为强。陈豨把开国后的安全困境暴露得很直接——刘邦可以靠联盟打天下，却必须靠制度把联盟拆开；而拆开的过程，往往会逼出反抗者。陈豨的失败，是皇权开始“清点兵权”的一声闷响。'
    growth_range:
    - 3
    - 7
    attribute_weights:
      force: 46
      intellect: 14
      defense: 28
      agility: 12
  - key: hist_qinhan_0271
    name: 吕泽
    archetype: military
    flavor: '（生年不详—前195年）刘邦同乡与重要将领，吕后之兄。楚汉战争中有军功，刘邦建立后亦受封。吕泽在汉初政治中具有双重身份：他既属于战时功臣网络，又属于皇后家族的亲缘网络；这种叠加带来上升机会，也埋下日后宫廷政治的敏感点。吕泽的存在说明汉初权力基础并非单一来源，军功集团、宗室与外戚会在同一张关系网里彼此支撑也彼此牵制。理解吕泽，更像是在理解开国时期“关系如何变成权力”：战场上的盟友与家族里的亲属，会在统一之后被重新排列成制度与派系，而个人命运就被锁在这张重排的网里。'
    growth_range:
    - 3
    - 7
    attribute_weights:
      force: 46
      intellect: 14
      defense: 28
      agility: 12
  - key: hist_qinhan_0272
    name: 吕释之
    archetype: civil
    flavor: '（生年不详—前186年）西汉吕氏宗族成员，活动多见于吕后势力当权的阶段。对这类人物，史书往往只留下寥寥数笔：他因宗族关系进入权力圈层，能参与政局运作，却很难像功臣或名相那样留下可辨的政绩脉络。也正因为“凭血缘而起”，当政治回到刘氏宗室与旧功臣的平衡时，吕氏成员便容易整体被当作风险而处理。吕释之的记载提醒我们，汉初外戚政治并不只有显赫与荣耀，还伴随一种结构性的脆弱：权力来得快，清算也来得快。'
    growth_range:
    - 3
    - 7
    attribute_weights:
      force: 14
      intellect: 48
      defense: 22
      agility: 16
  - key: hist_qinhan_0273
    name: 吕禄
    archetype: military
    flavor: '（生年不详—前180年）西汉吕氏集团核心人物之一。吕后在世时，吕氏靠亲缘与威势把兵权攥在手里；吕后死后，这种“握兵”立刻从护身符变成证据，吕禄与吕产遂成为众矢之的，终在诛诸吕政变中败亡。吕禄的可写之处，不在于他有没有独立政略，而在于他把一个残酷规则摆出来：在汉初，兵权并不属于某个家族的“资产业权”，它只是一段被皇权暂借、又随时可收回的授权；一旦借的人不被认可，授权就会被视为篡夺。吕禄的覆亡，是兵权从外戚回流宗室与功臣集团的一次急刹车。'
    growth_range:
    - 3
    - 7
    attribute_weights:
      force: 46
      intellect: 14
      defense: 28
      agility: 12
  - key: hist_qinhan_0274
    name: 吕产
    archetype: military
    flavor: '（生年不详—前180年）西汉吕氏集团重要成员。吕后临朝时，吕氏势力以宗族任官与兵权为骨架扩张；吕后死后，吕产仍试图把这副骨架留在原位，却很快发现“名分”已变：功臣与宗室需要一个能让天下安心的继承秩序，而吕氏继续握兵恰恰让人不安。诛诸吕政变中，吕产被迅速清除（史载），速度之快像一次集体止血——不是针对他个人的道德判决，而是针对外戚集团的结构性切除。吕产的结局告诉人们，汉初权力能在短时间内堆到顶，也能在更短时间内塌掉；决定塌不塌的，不是家族的狠，而是有没有被承认的合法性与可持续的盟友。'
    growth_range:
    - 3
    - 7
    attribute_weights:
      force: 46
      intellect: 14
      defense: 28
      agility: 12
  - key: hist_qinhan_0275
    name: 刘交
    archetype: civil
    flavor: '（前198年—前154年）西汉宗室，楚元王，刘邦之弟。与开国功臣多以战功见长不同，刘交更常被记为好学善文、重视经术的一支宗室力量。楚国作为藩王封地，需要承担地方治理与安抚之责，同时又可能因地大势强而被中央警惕；刘交在这种位置上“以文化立名”，既能凝聚士人，也是一种自我定位——不与中央争兵权，而以学术与礼义展示藩王的正当性。刘交的意义在于让人看到汉初宗室并非只有强藩与叛乱的戏剧，也存在以学术、教化与地方经营来参与国家结构的另一种路径。'
    growth_range:
    - 3
    - 7
    attribute_weights:
      force: 14
      intellect: 48
      defense: 22
      agility: 16
  - key: hist_qinhan_0276
    name: 刘肥
    archetype: civil
    flavor: '（生年不详—前189年）西汉齐王，刘邦长子。齐地为汉初重要藩国，地广民众，财力与兵力都足以影响中央格局。史载刘肥在长安入朝时一度因礼制与宫廷权力而陷入危险，最终得以脱身，反映汉初宗室内部并不平静。齐王国后续又分封子弟甚众，齐系宗室在数代之间形成庞大网络，为后来的诸侯动荡埋下伏笔。刘肥的意义不在“他做了多少事”，而在他所代表的结构：开国之初用分封稳局，但强藩一旦坐大，就会把地方利益、宗室身份与中央安全感纠缠在一起，成为长期的制度隐患。'
    growth_range:
    - 3
    - 7
    attribute_weights:
      force: 14
      intellect: 48
      defense: 22
      agility: 16
  - key: hist_qinhan_0277
    name: 刘长
    archetype: civil
    flavor: '（生年不详—前174年）西汉淮南王，刘邦之子。史载其性情刚烈，与朝廷屡有龃龉，后因反叛嫌疑被废徙蜀，途中绝食而死。刘长的悲剧并不只是“王不守法”，也反映汉初分封体系的长期紧张：诸侯王既是宗室屏藩，又握有封国资源与地方人心，一旦与中央利益冲突，就容易被视作制度隐患。刘长事件之后，朝廷对宗室藩王的约束进一步加强，削藩与监控成为常态。把刘长放回这个过程看，他更像一枚信号弹——提醒中央集权的形成并不平滑，往往伴随对宗室权力的不断压缩，而这种压缩会以个人的流放与死亡作为代价。'
    growth_range:
    - 3
    - 7
    attribute_weights:
      force: 14
      intellect: 48
      defense: 22
      agility: 16
  - key: hist_qinhan_0278
    name: 戚夫人
    archetype: civil
    flavor: '（生年不详—前194年）汉高祖宠姬，因其子赵王如意的储位问题与吕后势力形成尖锐对立。吕后掌权后对戚夫人施以极残酷的报复，史称“人彘”惨剧成为汉初宫廷斗争最震撼、也最血腥的篇章之一。戚夫人的悲剧并非单纯“后妃争宠”，而是继承政治在早期帝国中的极端表现：当皇位传承缺乏稳定共识，后宫关系就会被放大为国家安全问题，个人的生死被当作威慑与清算的工具。戚夫人之死，既是吕后权力巩固的手段，也为后世留下一个关于制度与人性的警示——当恐惧统治宫廷，任何温情都可能被碾碎。'
    growth_range:
    - 3
    - 7
    attribute_weights:
      force: 14
      intellect: 48
      defense: 22
      agility: 16
  - key: hist_qinhan_0279
    name: 孺子婴
    archetype: civil
    flavor: '（5年—25年）西汉末皇族，曾被立为“孺子”，名义上承继汉统，实权为王莽所夺。新朝覆亡后，孺子婴又在更始政权的风向转换中遇害。孺子婴的一生几乎没有“自主政治”，却极能说明权力如何借用血统与名号：篡位者需要一个可被指称的继承链条来安抚人心，于是把幼主放到台前；等形势变化，这个象征又会变成累赘而被迅速抛弃。对普通人而言，帝王名号意味着荣耀；对孺子婴而言，却更像一件随时会要命的外衣——穿上它就成了风暴中心，脱下它也未必能回到安全处。'
    growth_range:
    - 3
    - 7
    attribute_weights:
      force: 14
      intellect: 48
      defense: 22
      agility: 16
  - key: hist_qinhan_0280
    name: 昌邑王刘贺
    archetype: civil
    flavor: '（生年不详—前59年）西汉宗室。昭帝去世后被迎立为帝，却在短短二十余日内被霍光废黜，史称昌邑王。刘贺的短命皇位之所以重要，不只因为“荒淫”评价，而因为它清楚地展示辅政权臣对继承秩序的实际掌控：皇位不再是单纯的宗室排序，而是权力集团对风险的筛选与处置。刘贺被废后改封海昏侯，后世因墓葬出土而更关注其生活与时代面貌。把刘贺放回当时的政治场景，更能理解废立背后的逻辑——在幼主政治与托孤体系中，“能否被控制、能否稳定局势”往往比个人名声更直接地决定命运。'
    growth_range:
    - 3
    - 7
    attribute_weights:
      force: 14
      intellect: 48
      defense: 22
      agility: 16
  - key: hist_qinhan_0281
    name: 上官皇后
    archetype: civil
    flavor: '（生年不详—前37年）西汉皇后，上官桀之孙女，幼年入宫为后。她的个人事迹在史书中并不丰满，但“幼后”这一身份本身就足够说明宫廷政治的冷硬：婚姻被用来结盟，皇后位被用来平衡辅政格局。上官氏与霍光之间的权力斗争最终以失败收场，使她在名义尊位与现实无力之间长期漂浮。与其追问上官皇后“做了什么”，更值得关注她如何被当作棋子：在托孤政治与外戚角力里，后宫人物常被推到风口，却未必拥有主动选择。她的处境提醒读者，西汉后期的宫廷不仅争在朝堂，也争在婚姻与身份安排上，而这些安排会在很长时间里锁住一个人的命运。'
    growth_range:
    - 3
    - 7
    attribute_weights:
      force: 14
      intellect: 48
      defense: 22
      agility: 16
  - key: hist_qinhan_0282
    name: 王政君
    archetype: civil
    flavor: '（前71年—13年）西汉皇后、皇太后，王莽之姑，经历成帝、哀帝、平帝等多朝，长时间处于权力中心。王政君的政治影响往往不是通过亲自理政，而是通过太后名义下的诏命体系与王氏家族的人事扩张实现：当皇帝软弱或年幼时，太后位置就会成为资源分配的枢纽。史书对王政君的评价常带两极：有人认为她宽厚无为，有人认为她纵容家族坐大；但从结构角度看，她更像一根连接旧朝与新局的轴——只要太后权威在，外戚集团就有合法外衣；而一旦外衣变成武器，王莽的上升便有了制度性的通道。理解王政君，不只是理解一个女人的选择，更是理解西汉末年权力如何在“家族化”中悄然改写。'
    growth_range:
    - 3
    - 7
    attribute_weights:
      force: 14
      intellect: 48
      defense: 22
      agility: 16
  - key: hist_qinhan_0283
    name: 傅昭仪
    archetype: civil
    flavor: '（生年不详—前2年）西汉后宫人物，西汉末年外戚政治的参与者之一。史书叙述她时，重点往往不在私德，而在她背后的亲属网络如何进入权力中心：当皇帝短寿、继承反复、人事频繁更替时，后宫亲属便可能借名分争取官位与资源，与既有外戚集团相互牵制。傅昭仪的故事让人看到西汉末年政治的一个常态：权力不只在公卿之间流动，也通过后宫关系与宗室血缘悄然分配；而一旦这种分配缺乏制度约束，宫廷就会变成各家族的角斗场。理解傅昭仪，实则是在理解西汉末“皇权弱化后权力如何外溢”的过程。'
    growth_range:
    - 3
    - 7
    attribute_weights:
      force: 14
      intellect: 48
      defense: 22
      agility: 16
  - key: hist_qinhan_0284
    name: 丁姬
    archetype: civil
    flavor: '（生年不详—前3年）西汉末后宫人物，史料对其着墨不多，却常被置于继承与外戚博弈的背景中理解。西汉末年的宫廷并不缺“名分”，缺的是稳定：皇嗣问题反复牵动朝局，太后集团、外戚与权臣围绕诏命与人事争夺主导权，使许多后宫女性的命运更像政治结构的附属品。丁姬在史书里之所以会被提起，往往正因为她所连接的亲属关系在某一刻具有政治意义，而非因为她拥有独立的施政作为。把丁姬放回末世宫廷的氛围里，可以更清楚地看到：当制度性制衡失灵时，女性的身份会被工具化，成了家族争权的接口；而个人处境的冷暖，也随政争的潮汐而起落。'
    growth_range:
    - 3
    - 7
    attribute_weights:
      force: 14
      intellect: 48
      defense: 22
      agility: 16
  - key: hist_qinhan_0285
    name: 班婕妤
    archetype: civil
    flavor: '（生卒年不详）西汉后宫文学人物，亦以才学与节操著称。史载其善辞赋，能以婉言自保，面对宫廷倾轧选择退居以免祸；“团扇”之类意象在后世文学里更被反复借用，用来写失宠与自伤。班婕妤的独特在于她既身处权力最密集的后宫，又保持某种清醒：她明白宠爱会变，祸福也会变，于是把自保寄托在谨言、退让与才情的表达上。班婕妤的处境说明汉代女性并不只有“哀怨”叙事：她们也会在礼制与权力夹缝里寻找自保方式，用才情与姿态争取一点主动。'
    growth_range:
    - 3
    - 7
    attribute_weights:
      force: 14
      intellect: 48
      defense: 22
      agility: 16
  - key: hist_qinhan_0286
    name: 霍成君
    archetype: civil
    flavor: '（生年不详—前54年）西汉皇后，霍光之女。她被立为后，本身就是霍氏权势与宣帝政治安排交织的结果：权臣之家需要通过后位巩固地位，皇帝也可能借婚姻暂时稳住朝局。史载霍成君后因涉及宫廷命案而被废并赐死，具体案情在史书中叙述明确，但也带有强烈的政治指向——一旦皇权决定重新划线，外戚的“功劳与亲近”会迅速转化为“威胁与罪证”。霍成君的结局让人看到后位并非安全的顶点，反而常是权力斗争的靶心：站得越高，越容易成为示威与清算的对象。她的故事不仅关乎个人品行，也在呈现霍氏家族从鼎盛到覆灭的制度轨迹：后位与外戚权势绑得越紧，摔下来就越难留余地。'
    growth_range:
    - 3
    - 7
    attribute_weights:
      force: 14
      intellect: 48
      defense: 22
      agility: 16
  - key: hist_qinhan_0287
    name: 邓通
    archetype: civil
    flavor: '（生年不详—前167年）西汉文帝时期的宠臣与富豪形象。史载他因亲近天子而获赐利权，涉足铸钱与经营，财富一度惊人，后世常以此说明“恩宠可以直接转化为经济优势”。但邓通的富并非市场竞争的结果，而是政治信用的外化：一旦皇帝更替、朝廷重新清点利权归属，他的财富就失去保护层。关于邓通晚景，史书与传说都强调“由盛而衰”的落差，这种落差本身比数字更重要——它让人看到两汉权力、财政与个人命运之间的紧密捆绑。'
    growth_range:
    - 3
    - 7
    attribute_weights:
      force: 14
      intellect: 48
      defense: 22
      agility: 16
  - key: hist_qinhan_0288
    name: 刘濞
    archetype: military
    flavor: '（前215年—前154年）西汉吴王。凭吴地盐铁之利积蓄实力，对朝廷削藩积怨已久，遂联合诸王发动七国之乱，号称“清君侧”。叛乱看似打着道义旗号，底层却是利益与安全感：诸侯既担心封国被一步步削弱，也想保住地方财赋与军权。汉廷以周亚夫等为主力，截断粮道、分割诸王，使吴楚联军难以持续动员，刘濞终至败亡。史载其败后出走遇害，结局颇为仓促。刘濞的故事让人看到，诸侯王的“富强”既是资本也是把柄——财富能养兵，也会让中央更早下决心收束。'
    growth_range:
    - 3
    - 7
    attribute_weights:
      force: 46
      intellect: 14
      defense: 28
      agility: 12
  - key: hist_qinhan_0289
    name: 刘昂
    archetype: military
    flavor: '（生年不详—前154年）西汉胶西王。七国之乱中响应吴王刘濞起兵，齐地诸王一度合力围攻临淄，终因力量不足与配合松散而败。刘昂的兴亡说明诸侯叛乱的成败不只看勇气，更看组织与纵深：各国各怀心思，难以形成统一指挥；而中央军一旦抓住要害、切断粮道，地方动员的声势便会迅速塌陷。刘昂的结局进一步削弱齐地诸侯体系，加速中央集权深化，也提醒人们七国之乱并非单纯的“地方反抗”，更是一场对分封制度承载力的清算——当叛乱失败，诸侯的政治空间就会被系统性收紧。'
    growth_range:
    - 3
    - 7
    attribute_weights:
