  - key: hist_qinhan_0298
    name: 尹齐
    archetype: civil
    flavor: '（生卒年不详）西汉官员，相关记载散见于史书，细节并不充分。正因为细节不足，尹齐反而适合作为“中层官吏”的样本来理解：两汉国家并不是靠少数名臣名将独自撑起，大量具体的执法、文书、征发与监督，都要靠这样的人把命令翻译成日常动作。中层官员既要对上负责，也要面对地方人情与利益缠绕，做得太软会被说无能，做得太硬又容易积怨招祸。尹齐留在史料里的碎片，让人看到官僚系统真正消耗人的地方，往往不是宏大决策，而是那些天天要做、但很难做得人人满意的细务。'
    growth_range:
