  - key: hist_qinhan_0296
    name: 义纵
    archetype: military
    flavor: '（生年不详—前114年）西汉酷吏。以严刑峻法治郡，善于打击豪强与盗贼，短期内往往见效，但史书亦记其残酷。义纵之所以典型，是因为他体现汉武帝时期治理的“硬面”：对外用兵与财政动员需要可控的地方秩序，于是朝廷更愿意使用能快速压服的官员，即便代价是官民关系恶化。酷吏并不是脱离制度的怪物，他们常是制度在压力下选择的工具；而工具的命运也很脆弱——一旦政治风向改变，曾经被允许的强硬会被重新定义为过度甚至罪责。义纵让人看到，高压治理可以制造短期安稳，却也会在社会内部累积更深的恐惧与怨恨。'
    growth_range:
    - 3
    - 7
