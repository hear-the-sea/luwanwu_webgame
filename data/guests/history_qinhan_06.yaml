  - key: hist_qinhan_0291
    name: 田叔
    archetype: military
    flavor: '（生年不详—前148年）西汉将领与大臣。七国之乱中参与平叛，后以稳重得用。田叔在史书中常以“能办事、知进退”的形象出现：既能在军事危机中承担责任，也能在战后转向行政治理，体现文景时期对“可用之才”的综合要求。田叔这类“军政兼通”的人物之所以重要，是因为平乱只是开始：叛乱之后要安置军民、恢复税赋、处理功臣奖惩，还要避免新的地方反弹。田叔能在危机与收尾两端都发挥作用，说明文景时代的稳定并不是凭空落下，而是靠一批能把战时动员转换成常态治理的人把后果收拾干净。'
    growth_range:
