  - key: hist_suitang_0149_yuwenkai
    name: 宇文恺
    archetype: civil
    flavor: （555年-612年）隋代工程与营建专家，参与大兴城（隋长安）规划与建设，城市格局影响唐长安及后世都城形制。其擅长宫殿、城郭与交通工程统筹，能把国家动员化为可见的土木成果。史载其多承朝命主持营造，既要满足皇权象征，又要顾及实际居住与防御需求。宇文恺代表了隋代国家能力的另一面：制度与军功之外，宏大工程同样是帝国整合手段，而工程师往往在政治压力与技术理性之间求平衡。
