# 历史人物门客 - 隋唐五代（第04批：蓝色剩余11人 + 绿色34人）

heroes:
  blue:
  - key: hist_suitang_0135_lijifu
    name: 李吉甫
    archetype: civil
    flavor: （758年-814年）唐代宰相兼学者，仕途主要在宪宗朝前后展开。其政治主张重在整饬吏治、加强中央对地方的掌控，同时关注地理、州县沿革等"硬信息"，相传编撰的地理著作与资料整理对后世研究郡县制度颇有助益。李吉甫的形象并非单纯的书斋学者：他把学术兴趣与行政需求结合起来，在藩镇割据、财政紧迫的现实里寻找可操作的治理工具。其家族与子李德裕后来卷入党争，也使他常被放入晚唐政治谱系中回望。
    growth_range:
