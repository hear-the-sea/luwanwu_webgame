  - key: hist_suitang_0151_zhangxutuo
    name: 张须陀
    archetype: military
    flavor: （565年-616年）隋末将领，长期在山东一带镇压群盗与起义。其治军以勇猛果断闻名，能在流民武装四起的局面中暂时稳住地方秩序。隋末国力衰耗、征役繁重，起义连绵不绝，张须陀的战功更多像是在崩塌堤岸上不断堵漏。最终在与瓦岗势力交战中兵败身亡，显示个人勇武难以逆转大势。张须陀的故事让人看到：末世名将往往不缺能力，缺的是可持续的政治与社会基础。
