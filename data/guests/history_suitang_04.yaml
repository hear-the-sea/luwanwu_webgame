  - key: hist_suitang_0156_xuedaoheng
    name: 薛道衡
    archetype: civil
    flavor: （540年-609年）隋代文臣与诗人，擅长骈文与五言诗，名重一时。其作品既延续六朝华丽声律，又带有隋代统一后的新气象，常被视为隋唐诗风过渡的一环。仕途上他亦参与政务，但在炀帝朝政治日趋猜忌的氛围中，文人言行稍有触忌便可能招祸，薛道衡晚年亦因此遭诛。其结局并非单因一两句诗，而是宫廷文化与权力恐惧交织下的产物。读薛道衡，可见隋代文坛的锋芒与脆弱。
