  - key: hist_suitang_0153_shiwansui
    name: 史万岁
    archetype: military
    flavor: （549年-600年）隋代名将，以勇武善战著称，曾在边防与平叛中立下战功。史书称其临阵敢决，善用奇兵，军中声望很高。然隋廷政治风向险峻，功臣之间亦多倾轧，史万岁终因权臣构陷而被诛，史传多以"冤死"论之。其悲剧并非单纯的个人失误，而是开国后期权力集中与功臣集团互相猜忌的结果。史万岁留下的不是败绩，而是一种乱世武人最难防的命运：战场能胜，朝堂难胜。
