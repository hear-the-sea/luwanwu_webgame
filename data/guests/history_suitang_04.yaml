  - key: hist_suitang_0144_wangji
    name: 王绩
    archetype: civil
    flavor: （590年-644年）隋唐之际诗人，号称"无功"，其人生姿态更接近淡泊的隐逸者而非功名之士。早年出仕而不耐拘束，屡有退居之举，嗜酒好谈玄理，留下《野望》等作品，语言平淡却自带旷远气息。王绩常被视为从六朝绮靡转向唐诗清朗的一座桥：他不靠雕琢堆砌取胜，而用简净句法写出田园与暮色里的苍茫。放在唐诗谱系里，他把"个人心境"重新放回诗的中心，为盛唐自然之美预先开了一条路。
