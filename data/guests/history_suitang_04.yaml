  - key: hist_suitang_0148_yangyong
    name: 杨勇
    archetype: civil
    flavor: （？-604年）隋文帝长子，曾为太子。其性格与生活作风屡遭诟病，与独孤伽罗关系紧张，储位之争中被弟弟杨广取代。史书对其被废原因多从"失德""失宠"解释，也反映隋初以家法约束皇族的政治特点。杨广即位后，杨勇被幽禁并最终赐死，结局凄惨。其人生像一面镜子：在高度集权的新王朝里，太子并非安全位置，宫廷舆论与权力联盟足以改写继承顺序。
