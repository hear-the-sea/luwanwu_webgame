  - key: hist_suitang_0142_choushiliang
    name: 仇士良
    archetype: civil
    flavor: （? - 843年）唐代宦官，掌握神策军等关键武力后权势极盛，深度介入皇位更替与朝政人事。其在甘露之变前后扮演的角色，使后世常以他来概括"宦官专权"的结构：宦官并非只是宫中近侍，而是凭军权与信息优势成为政治玩家。需要注意的是，仇士良能坐大也说明外廷与皇权自身的困境——皇帝借宦官牵制士大夫与藩镇，最终却被反噬。仇士良的结局与清算同样剧烈，显示这种权力结构缺乏稳定退出机制：一旦失势，便难以自保。他的生涯把晚唐政治的危险性写得非常具体。
