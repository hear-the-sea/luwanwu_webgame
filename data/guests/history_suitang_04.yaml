  - key: hist_suitang_0143_tianlingzi
    name: 田令孜
    archetype: civil
    flavor: （? - 893年）唐代宦官，懿宗、僖宗时期权势尤重，直接影响晚唐对黄巢之乱与藩镇局势的处置。黄巢攻陷长安后，朝廷西奔入蜀，田令孜在其中的决策与调度屡受指摘：一方面要组织逃难与重建，另一方面又在用兵、赏罚与地方关系上制造新的矛盾。与其说他个人决定了唐末命运，不如说他所处的位置把制度问题集中暴露出来——当皇帝离开都城、中央财政枯竭，宦官凭近侍身份反而更能左右资源与命令。田令孜晚年的失势与流亡，正对应晚唐权力中心的崩散过程。
