  - key: hist_suitang_0150_lichun
    name: 李春
    archetype: civil
    flavor: （生卒年不详）隋代匠师，相传主持建造赵州桥（安济桥）。这座敞肩石拱桥以结构轻巧、跨度宏大著称，历经千年风雨仍能通行，是中国古代桥梁技术的标志性成果。关于李春的生平细节史料不多，但其姓名与桥铭相连，使"工匠"也能在历史中留下可见的署名。赵州桥的意义不止是"早"，更在于它展示了成熟的力学经验与施工组织能力，说明隋代社会已具备支撑大型公共工程的技术与协作体系。
