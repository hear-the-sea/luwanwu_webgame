      agility: 14
  - key: hist_suitang_0141_wangxianzhi
    name: 王仙芝
    archetype: military
    flavor: （? - 878年）晚唐农民起义首领之一，起事于民生困顿与赋役失衡的背景之下。与黄巢同处一个大动荡浪潮，但两者并非始终同一行动体：王仙芝早期起兵的路线、招抚与战败过程，反映地方社会从抗税、流民到武装叛乱的逐级升级。史书记其屡战屡走，显示起义军往往依赖机动与民间支持，而一旦补给与联盟断裂，便容易被分割围剿。王仙芝这段经历提示：黄巢之乱并非突然而至，它前面有一连串地方危机的"预演"；而每一次被压下去的火苗，都会为更大的爆燃积蓄燃料。
    growth_range:
