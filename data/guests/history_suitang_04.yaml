  - key: hist_suitang_0146_songzhiwen
    name: 宋之问
    archetype: civil
    flavor: （656年-712年）唐代诗人，与沈佺期并称，常被提到对律诗声律、对偶的规范化有所贡献。宋之问在武周及其后政治中卷入派系，仕途起落极大，屡遭贬谪远方，文学名声与政治争议长期并存。他的诗多以工稳见长，善写山水行旅与宫廷应制，也能在被贬的境遇中写出凄清孤绝的情绪。理解宋之问，需要把他放回"文才可入权力中心"的时代：才华让他靠近机要，也让他更容易被风向裹挟。作品的精致与人生的不安互相映照，正是初唐到盛唐过渡期的复杂气质。
