  - key: hist_suitang_0152_laihuer
    name: 来护儿
    archetype: military
    flavor: （约550年-618年）隋代水军统帅，善于水陆协同，曾参与对高句丽的远征及隋末平叛。其出身行伍而能掌水师要柄，反映隋朝对军事专业化的依赖。对外战争中，水陆补给、舟船调度与沿海行动皆离不开此类将领的统筹；而当内乱爆发，水军亦被迫转为镇压与护卫。隋末大乱中来护儿为叛军所害，结局悲壮。其一生由对外扩张转向内乱自保，也折射隋帝国由强转弱的速度。
