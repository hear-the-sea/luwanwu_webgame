    flavor: （594年-632年）唐初将领与功臣，秦王府旧部之一。玄武门事变中他以行动果断著称，负责关键环节，使局势迅速定型；此后仍参与边防与军事事务，证明其不止是政变工具。张公谨的特点在"干净利落"：不以文辞取名，也不以夸功求赏，更多以执行力与忠诚被信任。其早逝使其名声不如诸大将响亮，却也因此少了后续政治纠葛。张公谨像一枚钉子：在关键时刻钉住门闩，随后便默默退场。
