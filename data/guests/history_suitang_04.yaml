  - key: hist_suitang_0145_dushenyan
    name: 杜审言
    archetype: civil
    flavor: （645年-708年）唐代诗人，杜甫祖父，身处初唐文体转型关键阶段。其在格律与对仗上用力甚深，既继承六朝修辞，又更重骨力与气势，被后人视为近体诗成熟的重要推动者之一。杜审言仕途并不顺遂，屡遭贬谪，晚年仍在政治风波中沉浮；正因经历坎坷，他的诗常在工整之外透出郁结与自重。把他放进文学史，更像看到一位"打地基"的人：他不必像李白那样耀眼，却把格律的尺度、语感的弹性都磨得更可靠，为后辈提供可继续攀登的台阶。
