      agility: 12
  - key: hist_qinhan_0192
    name: 陈胜
    archetype: military
    flavor: '（生年不详—前208年）秦末起义领袖，大泽乡起兵，号张楚，“王侯将相宁有种乎”成为动员时代情绪的标志性口号。陈胜的起事之所以震动天下，在于它打破了“只准上层争天下”的想象，使基层武装与流民迅速找到共同旗帜；但史载其政权扩张过快、内部控制不足，赏罚与用人失衡，最终遭部下所杀，也暴露“聚众易、建制难”的硬问题。陈胜的成败不只是战术优劣，更关乎组织能力：如何统一号令、如何管理粮饷、如何处理功臣与将领之间的猜疑。陈胜既掀起反秦浪潮，也暴露农民军的短板：缺乏制度经验与稳定资源时，聚众再快也可能迅速裂解。'
    growth_range:
