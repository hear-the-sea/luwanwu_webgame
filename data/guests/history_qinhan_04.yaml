  - key: hist_qinhan_0198
    name: 汉顺帝刘保
    archetype: civil
    flavor: '（115年—144年）东汉皇帝。幼年即位，政治多受宫廷势力影响。顺帝一朝并不以宏大战功著称，却是东汉政治结构逐步显露疲态的时期：边疆压力仍在，灾异与赋役问题反复出现，地方豪强的影响力也在郡县层面更难压制。史书谈顺帝时常提“积弊”，这并非指他个人一定昏庸，而是指矛盾已不是靠一两道诏令就能解决——选官、人事、财政与宫廷权力的纠缠长期化，越拖越重。理解顺帝，重要的是看“缓慢的下滑”：制度还在，但效率与公信力在一点点被消耗，最终让后来的政治震荡更难收拾。'
    growth_range:
