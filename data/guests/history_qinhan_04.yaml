  - key: hist_qinhan_0191
    name: 陈余
    archetype: military
    flavor: '（生年不详—前204年）秦末赵地将领，与张耳“并肩起事又反目成仇”的轨迹最能说明乱世联盟的易碎。反秦之初，赵地豪强、旧官僚与流亡士人需要共同旗帜；可当赵王之位、兵权归属与对楚汉两强的站队问题摆上桌，昔日同盟便会迅速裂开。史载陈余终为韩信所败而死，他的失败并非简单“不会打”，而是赵地势力在大国夹缝中的结构性困境：既要争名分，又要供军粮，还要防内部离心。陈余把乱世里最现实的一条规律写得很清楚——人可以因为共同敌人结盟，却很难因为共同胜利继续团结。'
    growth_range:
