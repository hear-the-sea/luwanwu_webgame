  - key: hist_qinhan_0197
    name: 汉和帝刘肇
    archetype: civil
    flavor: '（79年—105年）东汉皇帝。少年继位使他长期处在外戚与近侍力量的包围中，史载其后逐步摆脱掣肘而亲政，宫廷权力结构因此发生重新洗牌。和帝在位期间，边疆事务、军费与朝廷人事交织在一起：对外要维持边防与通使，对内要处理外戚、宦官与士大夫的张力。若把和帝简单评为“明主或庸主”，容易忽略他所处的夹层位置：他是在制度缝隙里争夺主导权的少年皇帝，面对的是东汉早期就已埋下的结构问题，而非个人勤惰所能完全决定。'
    growth_range:
