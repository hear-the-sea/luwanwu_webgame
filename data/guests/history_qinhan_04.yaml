  - key: hist_qinhan_0190
    name: 赵高
    archetype: civil
    flavor: '（生年不详—前207年）秦末权宦与权臣，以掌管宫廷与文书机要起家，最终左右皇位继承。史载其参与沙丘之变，矫诏立胡亥，并在随后政局中以恐惧与操控统御百官，“指鹿为马”遂成政治寓言。赵高的危险并不只在个人奸诈，而在他抓住了制度的薄弱处：诏令与印玺集中、宫廷信息不透明、继承缺乏稳定程序，使近侍得以把私意伪装成皇命。秦末起义四起后，赵高终被诛杀，但他留下的教训更长久——当权力过度依赖密室与文件时，操控文件的人就可能成为真正的统治者。赵高的故事，是秦帝国制度失守如何迅速转化为政治崩塌的缩影。'
