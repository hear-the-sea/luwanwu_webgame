  - key: hist_qinhan_0194
    name: 项梁
    archetype: military
    flavor: '（生年不详—前208年）楚汉之际重要领袖，项羽之叔。秦末起兵于会稽，迅速扩张势力，并拥立楚怀王以凝聚反秦名分，使地方武装得以在共同旗帜下协同。项梁战死后，项羽继其兵权并成为反秦联军核心之一。项梁的历史价值不只在“能打”，更在“能组织”：他把宗族武力、地方豪强与政治名分编织成可动员的联盟，为项羽的崛起提供基础。乱世领袖的关键不是一时胜负，而是能否把人心、粮道与号令统合起来；项梁正是在这一点上显示出超出一般武人的政治能力。'
