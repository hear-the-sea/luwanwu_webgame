  - key: hist_qinhan_0193
    name: 陈阿娇
    archetype: civil
    flavor: '（生年不详—前130年）西汉皇后，汉武帝刘彻的第一任皇后。她的经历最能体现后宫并非私人领域，而是一套与外戚、同盟与储位紧密相连的政治结构：出身显赫能带来起步优势，失宠则往往意味着家族话语权的快速缩水。关于“金屋藏娇”的故事多为后世传说，但它之所以流行，正因为它抓住了一个现实逻辑——童年的许诺抵不过成年后的权力计算。陈阿娇被废，不只是情感冷却，更是宫廷资源重新分配的结果；在她身上，荣宠与风险同时攀升，后宫女性的命运被牢牢系在帝王的选择与政治风向上。'
    growth_range:
