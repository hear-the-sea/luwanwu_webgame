  - key: hist_qinhan_0199
    name: 汉桓帝刘志
    archetype: civil
    flavor: '（132年—168年）东汉皇帝，其在位阶段常被视为东汉政治结构性矛盾加速暴露的时期。外戚与宦官围绕近侍、诏命与人事的角力此消彼长，使朝廷决策更容易被宫廷关系牵引；士人群体的名望与选官渠道也因此受到冲击，党争与清议问题逐渐尖锐。桓帝并非只是在“被动挨打”，史载他也曾试图摆脱权臣掣肘，但他所能依赖的力量往往又会制造新的后果。理解桓帝，重点不在给他贴“昏”“明”的标签，而在看见一种恶性循环如何形成：皇权想反制外戚，便倚重宦官；宦官势起又引发新的政治失衡，最终把朝廷推向更难自救的局面。'
    growth_range:
    - 5
    - 9
    attribute_weights:
