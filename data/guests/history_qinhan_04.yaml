  - key: hist_qinhan_0188
    name: 袁盎
    archetype: civil
    flavor: '（生年不详—前147年）西汉名臣，以敢言著称。文帝、景帝时期，朝廷与诸侯关系紧绷，袁盎多有建言，既要防诸侯坐大，也要避免激化对抗，体现“劝谏但不逞口舌”的政治技巧。史载其后来卷入梁国与中央的利益冲突而遇刺身亡，结局说明直言者往往站在矛盾交汇处：你说的是国家道理，却会触到具体集团的利益。袁盎的可贵不在于每条主张都绝对正确，而在他始终把“制度后果”放在首位，愿意为此冒险；这种官僚伦理，正是汉初政治能够逐步走向制度化的重要支撑。'
