# 历史人物门客 - 秦汉时期（第04批：蓝色第50-100人）

heroes:
  blue:
  - key: hist_qinhan_0149
    name: 路博德
    archetype: military
    flavor: '（生卒年不详）西汉将领，史载其在南越征讨中居重要位置，与楼船将军杨仆等分兵推进，最终促成岭南并入汉廷。南越战事并不只是打一场仗：海陆交通、粮运补给、地方豪强与旧官僚的去留，都决定能否在战后站稳脚跟。史书所写路博德“以招抚为主”等做法，提示他不仅靠武力，也靠对地方人心与利益结构的拿捏；能让对手放下抵抗，有时比杀伤更能节省成本。路博德的经历显出汉代对南方扩张是一套系统工程：军事只是开门，郡县化与行政接管才是长期胜负。'
    growth_range:
