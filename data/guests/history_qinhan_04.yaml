    attribute_weights:
      force: 16
      intellect: 46
      defense: 22
      agility: 16
  - key: hist_qinhan_0196
    name: 汉章帝刘炟
    archetype: civil
    flavor: '（57年—88年）东汉皇帝，在位时延续明帝以来的政治秩序，并以尊经崇儒、整饬典章为特色。章帝朝的“文治”并非只是一句口号：它意味着通过官学与礼制为官僚提供共同语言，借经典讨论来统一政策正当性，也意味着在相对安定的局面中重新强调司法与行政的规范化。与此同时，边疆事务、宫廷亲属与权力分配仍会不断冒出新的摩擦点。章帝的形象，正好展示东汉中期“靠制度维持和平”的努力：既要讲礼法，也要处理现实政治的硬问题。'
    growth_range:
