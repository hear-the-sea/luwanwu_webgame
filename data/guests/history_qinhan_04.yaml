  - key: hist_qinhan_0180
    name: 田蚡
    archetype: civil
    flavor: '（生年不详—前131年）西汉外戚与权臣，武帝生母王娡之弟，凭外戚身份迅速上升，位至丞相。田蚡的典型性在于“权力来得太快”：外戚与皇权结合能在短时间内聚拢资源、人脉与任免权，也会在朝廷内部制造强烈对立。史载田蚡与窦婴、灌夫等冲突激烈，最终演成大案，说明武帝初年权力重新分配并不温和，而是通过案件、诛戮与政治定性来完成。田蚡并非单纯“坏人”，他更像外戚政治的结构性产物——当皇帝需要亲属作为支点时，支点就会生长为势力；而势力一旦膨胀，便必然引来反弹与清算。通过田蚡，可以更清楚地看到西汉权力中心如何在家族化与官僚化之间不断摇摆。'
    growth_range:
    - 5
    - 9
    attribute_weights:
      force: 16
      intellect: 46
      defense: 22
      agility: 16
  - key: hist_qinhan_0181
    name: 申屠嘉
    archetype: civil
    flavor: '（生年不详—前155年）西汉丞相。为人刚正，重视法度，文帝、景帝时期居相位。申屠嘉在史书里的形象更像“看门人”：不靠奇谋取胜，而靠把规矩守住，把朝廷日常运转的底盘稳住。文景之治之所以能被称道，并不只是皇帝节俭，也需要宰相在细碎政务里坚持边界——哪些事可通融，哪些事必须按法度办。申屠嘉的故事让人看到守成政治的艰难：和平年代的功劳不显眼，却要承受来自权贵、外戚与关系网的不断试探；能守得住不出事，本身就是一种本领。'
    growth_range:
    - 5
    - 9
    attribute_weights:
      force: 16
      intellect: 46
      defense: 22
      agility: 16
  - key: hist_qinhan_0182
    name: 章邯
    archetype: military
    flavor: '（生年不详—前205年）秦末名将。陈胜吴广起事后，章邯奉命仓促出战，史载他征发骊山刑徒与戍卒成军，短时间内连破义军，一度把濒临崩裂的秦廷拉回到“还能打”的状态。可他越能打，越暴露秦制的悖论：中央不信任前线，将领得不到稳定的支援与授权；赵高专权、朝命反复，又把军功变成随时可翻案的风险。巨鹿失利后章邯降楚，被项羽封雍王，继而在汉军进关时败亡。写章邯，最该写的是他夹在两种崩坏之间——对外是天下反叛的洪流，对内是中枢失控的撕裂；他用兵再强，也救不了一个已经失去自我修复能力的帝国。'
    growth_range:
    - 5
    - 9
    attribute_weights:
      force: 48
      intellect: 14
      defense: 26
      agility: 12
  - key: hist_qinhan_0183
    name: 细君公主
    archetype: civil
    flavor: '（生年不详—前101年）西汉宗室女，江都王刘建之女。她是第一位和亲乌孙的公主。远嫁异域，语言不通，思乡心切，作《悲愁歌》：“居常土思兮心内伤，愿为黄鹄兮归故乡”。从外交角度看，她的婚姻被设计为联乌孙以制匈奴；从个人角度看，却是长期的文化错位与情感孤绝。细君的故事之所以打动人，不在“和亲”这个政策名词，而在她把陌生生活写成可感的哀音：风俗、饮食、礼仪乃至日常交流都可能成为折磨。她的忍耐与失落，是边疆政治背后最具体的一笔人间代价。'
    growth_range:
    - 5
    - 9
    attribute_weights:
      force: 16
      intellect: 46
      defense: 22
      agility: 16
  - key: hist_qinhan_0184
    name: 缇萦
    archetype: civil
    flavor: '（生卒年不详）西汉人物，因上书救父而被载入史册，淳于意之女。史载其父获罪将受肉刑，缇萦随父入京，向汉文帝陈述刑罚不可逆的残酷，提出“死者不可复生，刑者不可复属”等论辩，并愿以自身赎父罪。她的上书成为推动刑制改革的重要契机，文帝随后对肉刑作出调整与更易，使刑罚从“毁伤身体”转向更可控的惩处方式。缇萦之所以动人，不仅是孝，更是她敢把私人苦难转成公共论证：她用一个家庭的危机迫使朝廷直面制度的暴烈，并以语言与行动争取改变。她让人看到，两汉政治并非永远只由权贵推动，有时也会被普通人的一封奏书撬动。'
    growth_range:
    - 5
    - 9
    attribute_weights:
      force: 16
      intellect: 46
      defense: 22
      agility: 16
  - key: hist_qinhan_0185
    name: 范增
    archetype: civil
    flavor: '（生年不详—前204年）楚汉之际谋士，项羽重要智囊，号“亚父”。史载他在关键关口屡劝项羽果断处置对手、把握战机，尤其鸿门宴前后的判断常被后世反复咀嚼。范增的悲剧不在于“不会出主意”，而在于他与主帅的权力关系：谋臣能提出方案，却不能替主帅承担心理负担；当主帅在仁义名声、宗族情感与现实算计之间摇摆时，再高明的策略也可能被搁置。范增愤而离去、途中病亡的结局，使他成为“良谋不被用”的经典符号，但符号背后更值得看的，是乱世决策的真实成本：优柔寡断不是性格小毛病，而可能直接改写天下归属。'
    growth_range:
    - 5
    - 9
    attribute_weights:
      force: 16
      intellect: 46
      defense: 22
      agility: 16
  - key: hist_qinhan_0186
    name: 荀彘
    archetype: civil
    flavor: '（生卒年不详）西汉左将军。精通兵法，曾攻打朝鲜。因争功囚禁楼船将军杨仆，独掌兵权攻破王险城，平定卫氏朝鲜，设立汉四郡。虽然战功赫赫，但回朝后因擅自囚禁同僚、专断独行被汉武帝诛杀。荀彘的功过很难用一句话裁断：在远征体系里，主将若不能集中指挥就可能误大事；但一旦以“军功”为名压过制度与同僚，胜利就会被视为不受控的野心。武帝对他用重典，既是军纪的展示，也是皇帝对前线权力的警告——战场可以授权，但授权绝不意味着独立的政治空间。'
    growth_range:
    - 5
    - 9
    attribute_weights:
      force: 16
      intellect: 46
      defense: 22
      agility: 16
  - key: hist_qinhan_0187
    name: 蒙毅
    archetype: military
    flavor: '（生年不详—前210年）秦将蒙恬之弟，更多时候却是宫廷里的机密人物：史载他掌管近侍与诏令相关事务，陪侍秦始皇巡行，离权力核心极近。也正因为“近”，他在沙丘之变后几乎没有退路：继承被密室改写，赵高以文书与口谕为刃清理旧人，蒙毅与扶苏、蒙恬一起被指为障碍而遭杀。写蒙毅，不必把他当作战场传奇，他更像一枚被卷进继承机器的齿轮——平时越重要，出事时越先被拔掉。秦帝国的崩塌不仅发生在巨鹿的战场，也发生在这种近侍与诏命的黑箱里；蒙毅的死，正是黑箱运作最冷的注脚。'
    growth_range:
