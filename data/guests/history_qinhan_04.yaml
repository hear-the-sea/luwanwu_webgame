    - 9
    attribute_weights:
      force: 48
      intellect: 14
      defense: 26
      agility: 12
  - key: hist_qinhan_0150
    name: 郑吉
    archetype: military
    flavor: '（生年不详—前49年）西汉将领，史载为首任西域都护。郑吉的工作性质并不止于“打一仗”，更接近把远域纳入可治理空间：屯田、驻防、联络诸国、处理矛盾、保障通道，都需要长期投入与稳定的行政枢纽。设都护府与幕府的意义也不仅是名号，而是让汉廷在西域拥有持续发号施令与调度资源的抓手，从而把影响力从军事行动延伸到制度存在。郑吉并非只以武力取胜，他更像西域经营的“第一代管家”——既要懂军务，也要懂外交与地方政治，把复杂的多国网络纳入一个可运转的秩序框架。'
    growth_range:
    - 5
    - 9
    attribute_weights:
      force: 48
      intellect: 14
      defense: 26
      agility: 12
  - key: hist_qinhan_0151
    name: 马援
    archetype: military
    flavor: '（前14年—49年）伏波将军，马革裹尸。他半生戎马，南征交趾，立铜柱为界；北击匈奴，西破羌人。他六十二岁时仍请缨出征，在军中以豪言激励士气。他不仅战功赫赫，更以严谨的家风著称，《诫兄子严敦书》流传千古。史载其晚年因军中物议与诬告受牵连，死后一度被夺爵，这种身后翻案并不罕见：边将功劳再大，也可能在政争与流言里被重新解释。马援留下的，不只是战场记忆，还有一套对后辈的处世警戒——如何守节、如何慎交、如何在功名与风险之间自保。'
    growth_range:
    - 5
    - 9
    attribute_weights:
      force: 48
      intellect: 14
      defense: 26
      agility: 12
  - key: hist_qinhan_0152
    name: 马融
    archetype: civil
    flavor: '（79年—166年）东汉经学家，字季长，伏波将军马援的从孙。他才高博学，遍注群经，使古文经学达到高峰。他设帐讲学，门徒众多（卢植、郑玄等皆与其学统相关）。但他为人不拘礼法，常坐高堂，施绛纱帐，前授生徒，后列女乐，被时人非议；又曾依附外戚梁冀，使其声名蒙尘。马融的复杂之处正在这里：一面是训诂与章句的扎实积累，为后学提供可用的学术工具；一面是学术与权势的纠缠，让“名教”与现实利益相互撕扯。经学工具的沉淀让他成为师表，依附权势又让声名带伤，这两面并存，恰好把东汉士人在朝局与名节之间的进退之难写得更具体。'
    growth_range:
    - 5
    - 9
    attribute_weights:
      force: 16
      intellect: 46
      defense: 22
      agility: 16
  - key: hist_qinhan_0153
    name: 主父偃
    archetype: military
    flavor: '（生年不详—前126年）纵横策士，推恩令主。他出身贫寒，早年备受冷落，入朝后一年四迁。他向武帝提出“推恩令”，允许诸侯王将封地分给子弟，以分割方式持续削弱诸侯国的力量，兵不血刃地缓解长期隐患。他为人刻薄，行事锋利，甚至以“丈夫生不五鼎食，死即五鼎烹”自况，最终被齐王自杀案牵连而族诛。主父偃的悲剧感来自反差：他能提出极具制度穿透力的方案，却无法在权力网络中维持人缘与安全。对武帝而言，策士可以被使用，但绝不会被允许成为不可替代的中心；一旦政策完成、风险上升，主父偃很容易从“奇谋之臣”变成需要被清理的麻烦。'
    growth_range:
    - 5
    - 9
    attribute_weights:
      force: 48
      intellect: 14
      defense: 26
      agility: 12
  - key: hist_qinhan_0154
    name: 公孙弘
    archetype: civil
    flavor: '（前200年—前121年）西汉丞相，出身寒微而以经术入仕，是武帝朝“儒者入政府”的象征人物之一。史书写公孙弘，常把他放在两种期待之间：一方面他以儒学名义参与政务，使经术更贴近国家制度；另一方面他在权力中心必须讲求可行与折中，于是又容易被批评为圆滑、善顺时势。公孙弘的意义不在于把他当成纯粹的思想家，而在于看见儒学如何被转译为行政语言：如何进入奏章、如何进入官制、如何成为整合人心与官僚的工具。经术一旦入朝，就要面对利益与风险，公孙弘正是在这种现实里完成了上升，也在现实里留下争议。'
    growth_range:
    - 5
    - 9
    attribute_weights:
      force: 16
      intellect: 46
      defense: 22
      agility: 16
  - key: hist_qinhan_0155
    name: 公孙贺
    archetype: civil
    flavor: '（生年不详—前92年）西汉重臣，位至丞相，兼具军旅背景与外戚关系，其政治处境颇为微妙。史载他与卫氏家族联姻，使其在武帝朝权力网络中更靠近宫廷中心；但越靠近中心，越容易被风暴波及。巫蛊之祸前后，朝廷案件连坐广泛，公孙贺为子奔走求免，反而在告发与反告发的漩涡中失去回旋余地，终以父子俱败收场。公孙贺的悲剧不在个人道德，而在政治机制：当恐惧成为办案底色，重臣也难以依靠官位保全，外戚身份更可能被当作“可疑”的放大镜。通过公孙贺，可以更具体地理解武帝晚年政治的高压：它能把一个谨慎的官僚拖进无底的连坐链条。'
    growth_range:
    - 5
    - 9
    attribute_weights:
      force: 16
      intellect: 46
      defense: 22
      agility: 16
  - key: hist_qinhan_0156
    name: 冯劫
    archetype: civil
    flavor: '（生年不详—前207年）秦末重臣。二世时政局动荡，赵高专权，朝廷在内乱与起义压力下迅速失序；史载冯劫曾参与议论国事并与权势相抗，最终难逃被杀。冯劫的材料并不充分，却仍具有典型意义：当权力被近侍与少数人垄断，忠谏与专业判断不仅难以被采纳，甚至会被视为威胁而被清除。冯劫的结局把秦末政治的一个残酷现实写得很清楚——体制失去纠错能力时，最先被淘汰的往往是“还能说真话的人”。史料细节未必齐备，但这一处境已经足够刺眼：帝国临崩时，高层无法形成有效共识，自我修复也不再运转，敢把问题说出口的人反而更早被清除。'
    growth_range:
    - 5
    - 9
    attribute_weights:
      force: 16
      intellect: 46
      defense: 22
      agility: 16
  - key: hist_qinhan_0157
    name: 冯去疾
    archetype: civil
    flavor: '（生年不详—前210年）秦朝重臣，与李斯并列为丞相，处在帝国权力结构的最顶端。秦始皇晚年与继承之际政局骤变，近侍与重臣围绕诏命、继承与军政控制展开角力；冯去疾在史书中常被写作卷入其中并最终自尽（或被逼死，记载不一）。冯去疾的结局之所以具有典型性，是因为它揭示了秦制的一个脆弱点：制度可以把权力集中得极高，却未必为“最高权力消失”准备好稳定的过渡程序。当一切依赖密室决策与文件传达时，丞相也可能在一夜之间从支柱变成障碍。冯去疾让人看到，帝国的崩塌往往从高层失序开始，而高层失序又常源于继承与信息控制的真空。'
    growth_range:
    - 5
    - 9
    attribute_weights:
      force: 16
      intellect: 46
      defense: 22
      agility: 16
  - key: hist_qinhan_0158
    name: 刘奭
    archetype: civil
    flavor: '（前74年—前33年）汉元帝，宣帝太子。史书对他评价多有分歧：他喜好儒学与文治，愿意倚重经术之臣，但在复杂的人事与宫廷结构中，决断力与执行力常显不足。宣帝所谓“乱我家者，太子也”更像一种政治担忧——担心好名与宽纵会被权力圈层利用。元帝朝内外矛盾并非一日而成：既有官僚派别的角力，也有近侍与宦官对信息与诏命的影响；同时对外关系与边境政策仍需在和战之间拿捏。把刘奭放回西汉后期的治理语境，他更像一个被结构裹挟的君主：理想是柔和与教化，现实却逼他不断为妥协付出代价。'
    growth_range:
    - 5
    - 9
    attribute_weights:
      force: 16
      intellect: 46
      defense: 22
      agility: 16
  - key: hist_qinhan_0159
    name: 刘盈
    archetype: civil
    flavor: '（前210年—前188年）汉惠帝，刘邦次子。即位时国政多为吕后所握，他能施展的空间有限，因此史书常把他的形象写得温仁而无力。关于“人彘”惨剧，史载其见之震骇，这种震骇并非单纯的情感戏剧，而是对汉初宫廷权力运作的直观冲击：亲情、法度与威慑在同一瞬间被撕开。惠帝在位期间仍有一些制度调整被归到他名下，如对秦代严苛条文的松动与对丞相体系的倚重；这些措施未必都出自他个人意志，却确实推动汉初政治从战争动员转向休养生息。刘盈早逝，使他更像汉初“强力政治”阴影下的一位短命守成者。'
    growth_range:
    - 5
    - 9
    attribute_weights:
      force: 16
      intellect: 46
      defense: 22
      agility: 16
  - key: hist_qinhan_0160
    name: 司马谈
    archetype: civil
    flavor: '（生年不详—前110年）西汉太史令，司马迁之父，承担观天历法、掌记典籍等职责。史载他博通诸家，著《论六家要旨》评议学术门径，尤其强调道家“兼采诸长”的思路，体现西汉中期思想世界的开放与杂糅。司马谈更重要的一面，在于他把“修史”当作家学使命：临终嘱托司马迁续任并完成史书，等于把个人志业转成一项跨代工程。太史令既是学术职位，也是制度岗位，既要记录事实，也要面对宫廷政治与材料限制；司马谈在这种位置上积累的视野，最终通过司马迁之手结晶为《史记》。材料与视野来自制度岗位的日常积累，而真正把材料推成史书的，是那份不肯放下的执念。'
    growth_range:
    - 5
    - 9
    attribute_weights:
      force: 16
      intellect: 46
      defense: 22
      agility: 16
  - key: hist_qinhan_0161
    name: 吴广
    archetype: military
    flavor: '（生年不详—前208年）秦末起义领袖之一，与陈胜同起兵。史载其善于鼓动、能聚人心，在起义初期担任重要角色；而起义政权迅速扩张后，内部指挥与权力分配的矛盾也随之暴露，吴广最终在纷争中被杀。吴广的结局并不只是个人悲剧，更说明草创政权的脆弱：兵众来自四方，纪律与粮饷都不稳，领袖既要对外作战，又要对内压住猜疑。秦末起义的爆发往往被简化为“民变”，但吴广的遭遇提醒人们，革命同样需要组织能力；没有稳定的组织，胜利的窗口可能转瞬即逝。'
    growth_range:
    - 5
    - 9
    attribute_weights:
      force: 48
      intellect: 14
      defense: 26
      agility: 12
  - key: hist_qinhan_0162
    name: 周昌
    archetype: civil
    flavor: '（生年不详—前152年）西汉功臣，史载其性格刚直，且常以“口吃而敢言”被后世记住。汉初政治最大的难题之一，是把战时的同盟关系转化为可持续的朝廷秩序；在这个过程中，愿意当面指出储位、礼制与权力边界问题的人并不多。周昌的价值正在于“把难听的话说出来”：他不靠辞令取悦君上，而靠坚持让制度不至于被人情与一时喜怒冲垮。把周昌放回开国之初的氛围看，他更像一种政治肌肉——粗硬、直率，却能在关键处撑住骨架，让新王朝不至于只剩胜负逻辑。'
    growth_range:
    - 5
    - 9
    attribute_weights:
      force: 16
      intellect: 46
      defense: 22
      agility: 16
  - key: hist_qinhan_0163
    name: 审食其
    archetype: civil
    flavor: '（生年不详—前177年）西汉吕后时期的近臣与权力人物。史书将其置于后宫与外朝之间的灰色地带：他既不以开国战功成名，也非宗室大藩，却能在吕后临朝的格局里占据位置，说明“亲近权力中心”本身就是一种资源。吕氏集团既需要能办事、能传递信息的人，也需要可被牵连、可被清算的人；吕后去世、政局转向后，审食其随之被处置，正映照汉初政治尚在重新划线。审食其的起落更像一段宫廷政治的样本：靠近权力是资源，风向一变又会立刻变成罪名与清算理由。'
    growth_range:
    - 5
    - 9
    attribute_weights:
      force: 16
      intellect: 46
      defense: 22
      agility: 16
  - key: hist_qinhan_0164
    name: 张耳
    archetype: civil
    flavor: '（生年不详—前202年）秦末汉初赵地人物，早年与陈余并肩，后在楚汉之间多次转换立场，最终受刘邦册封为赵王。张耳的可读性在于他既有旧地豪强与士人网络，又必须在新兴军事集团的强压下求生：地方认同、军事现实与个人信誉不断拉扯，使他很难做出“道德上完美”的选择。史书写张耳，常把他放在赵地势力的起伏中观察——王号能带来名分与号召力，但能否稳住封国，还取决于能否安抚地方、处理盟友矛盾并向中央提供可见的忠诚。张耳的沉浮因此像一堂乱世政治课：旧贵族的资源仍在，但想在新秩序里活下去，必须学会用新的规则下注。'
    growth_range:
    - 5
    - 9
    attribute_weights:
      force: 16
      intellect: 46
      defense: 22
      agility: 16
  - key: hist_qinhan_0165
    name: 张苍
    archetype: civil
    flavor: '（生年不详—前152年）西汉名臣，精于律历与制度。早年从军，后历任要职，参与历法制定与制度建设。张苍这类人往往不以战功显名，却在国家“怎么运转”上拥有决定性影响：度量衡、历法、章程与统计方式，一旦统一，郡县的税赋、征发与司法就能按同一把尺来执行。他的工作更像把散乱的现实翻译成可管理的规则，这种规则未必让人热血，却能让天下在长期里更少混乱。理解张苍，也是在理解汉初从战争动员转向行政治理的关键转折——刀兵夺得天下之后，最终靠的是这些看似枯燥的制度细节把天下留住。'
    growth_range:
    - 5
    - 9
    attribute_weights:
      force: 16
      intellect: 46
      defense: 22
      agility: 16
  - key: hist_qinhan_0166
    name: 扶苏
    archetype: civil
    flavor: '（生年不详—前210年）秦始皇长子。史载他性情较为宽厚，曾因进谏而被遣往北方随军，其处境本就显示秦廷继承问题并不安稳。始皇死后，扶苏与蒙恬遭矫诏赐死，未能继承帝位，成为秦帝国迅速崩塌的关键转折之一。扶苏之死常与赵高操控政局并提，后世据此反思秦制的薄弱点：皇位继承缺乏公开可检验的程序，诏命与印玺集中在少数人手里，便给密室操作留下巨大空间。扶苏并非单纯的“可惜太子”，他更像一面镜子，照见帝国在最高权力交接时的脆弱——当制度无法保障继承，个人再贤也可能被一纸伪诏终结。'
    growth_range:
    - 5
    - 9
    attribute_weights:
      force: 16
      intellect: 46
      defense: 22
      agility: 16
  - key: hist_qinhan_0167
    name: 李夫人
    archetype: civil
    flavor: '（生年不详—前88年）西汉武帝宠妃，史书多以“色艺双绝”概括其受宠缘由，也因此把她放入外戚政治的长链条里观察。对李夫人而言，得宠不仅是个人际遇，更会牵动家族的仕途与军事任用；她的存在让我们看到，后宫并非只关乎私情，还可能改变国家的用人结构与政治风险。关于她病重后的态度，史籍记载与后世演绎都很丰富，无论细节取舍如何，这些叙事都围绕同一主题：在皇帝情感与权力现实之间，女子与其家族往往难以自保，而荣华与危险常是同一枚硬币的两面。'
    growth_range:
    - 5
    - 9
    attribute_weights:
      force: 16
      intellect: 46
      defense: 22
      agility: 16
  - key: hist_qinhan_0168
    name: 李广利
    archetype: military
    flavor: '（生年不详—前88年）西汉将领，因外戚关系得武帝倚用。史载他两征大宛求“汗血马”，前期兵疲粮绝、死伤甚重，后以重兵与严酷手段迫成其事，终把名马与西域威望带回长安；可这份战功本身就像一张高息债券——消耗巨大，且把边地与财政拖入长期负担。更讽刺的是，李广利的结局并不由“大宛之功”决定：武帝晚年政局惊惧，家族祸败，李广利在对匈奴用兵受挫后被迫降虏，终遭杀害（史载）。写李广利，最能看见武帝后期的两条暗线如何纠缠：远征扩张与宫廷清算同时推进，军功与政治风险在同一个人身上交叉爆炸。'
    growth_range:
    - 5
    - 9
    attribute_weights:
      force: 48
      intellect: 14
      defense: 26
      agility: 12
  - key: hist_qinhan_0169
    name: 杨仆
    archetype: civil
    flavor: '（生卒年不详）西汉将领，曾以楼船将军名号参与南方战事，事迹多与南越、东越等征讨相关。对汉武帝时期的将领而言，战场并不是唯一的考场：功劳如何记、责任由谁担、同僚之间如何竞争，都直接影响荣辱生死。史载杨仆后来遭遇贬黜与囚系，既与军事行动的成败有关，也与朝廷对军权的收束与内部倾轧相连。把杨仆的沉浮放进帝国扩张的背景里，更能看见“开疆”背后的代价：将领在前线承受风险，在后方还要承受政治的再裁决，而这种再裁决往往比刀兵更难预料。'
    growth_range:
    - 5
    - 9
    attribute_weights:
      force: 16
      intellect: 46
      defense: 22
      agility: 16
  - key: hist_qinhan_0170
    name: 段会宗
    archetype: civil
    flavor: '（前83年—前9年）西汉外交与边政人物，字子松，事迹多与西域事务相关。西域经营不是一次远征就能解决的事，更像长期的协商与危机管理：要处理盟友内斗、部族迁徙、贸易通道与军需补给，还要在中央政策变化时调整姿态。史传中关于段会宗的记述带有一定传奇化色彩，但可以确定的是，他所代表的正是这类“能在边地长期做事”的官员：既要懂礼仪与谈判，也要懂军事威慑与行政落地。段会宗的可读性不在某一次惊险行动的细节，而在他让人看到两汉边疆治理的真实面——那是耐心、情报、信誉与反复交涉堆出来的结果。'
    growth_range:
    - 5
    - 9
    attribute_weights:
      force: 16
      intellect: 46
      defense: 22
      agility: 16
  - key: hist_qinhan_0171
    name: 汉哀帝刘欣
    archetype: civil
    flavor: '（前25年—前1年）西汉皇帝，在位短促却处于王朝末端的关键节点。史书多写他有意调整人事、抑制旧外戚势力，但末世政治的难处在于：你削弱一个集团，往往又不得不倚重另一个集团来填补权力真空，结果只是在“换一批人掌握门槛”。哀帝时期的权力更替与派系冲突因此尤为激烈，改革既缺财政与制度支撑，也缺足够稳定的执行环境。理解哀帝，重点不在给他贴“明”“昏”标签，而在看见西汉末年的改革悖论——不是没人看见问题，而是问题已经深到任何动作都会触发更大的震荡。哀帝的身影提醒我们，王朝衰亡往往不是某一次决策造成，而是长期结构疲态把每一次决策都变成赌博。'
    growth_range:
    - 5
    - 9
    attribute_weights:
      force: 16
      intellect: 46
      defense: 22
      agility: 16
  - key: hist_qinhan_0172
    name: 汉平帝刘衎
    archetype: civil
    flavor: '（前9年—6年）西汉末代幼主之一，年少即位，朝政实际长期被外戚集团操控，王莽的权势亦在这一阶段迅速膨胀。平帝的处境很难用个人性格解释：幼主意味着权力天然外移，诏命、人事与军政被“代理者”接管，而代理者一旦形成稳定班底，就可能把临时权力变成永久权力。史书对平帝之死的细节亦多有议论，但无论细节如何，平帝短促的一生都折射出西汉末年的结构性困境——皇权衰弱、外戚坐大、制度无法有效制衡。把平帝放回这一脉络中，他更像一枚被推着走的棋子：他不决定局势，却被局势决定，最终成为新旧秩序交替的牺牲品。'
    growth_range:
    - 5
    - 9
    attribute_weights:
      force: 16
      intellect: 46
      defense: 22
      agility: 16
  - key: hist_qinhan_0173
    name: 汉成帝刘骜
    archetype: civil
    flavor: '（前51年—前7年）西汉皇帝，在位时期宫廷结构变化明显。史书常写成帝优柔而好逸，外戚与近侍更易介入人事与决策；后宫宠爱与皇嗣问题也被反复放大，成为后世评价的焦点。需要注意的是，成帝并非一无所为，但他所处的西汉后期积弊已深：财政与官僚系统的疲态、地方豪强与权力集团的自我膨胀，使皇帝个人的选择越来越难转化为有效治理。成帝时代的意义正在于提供一个转折点——表面仍是“太平日常”，底层却在悄悄改变权力的流向，为后续更剧烈的动荡预先铺路。'
    growth_range:
    - 5
    - 9
    attribute_weights:
      force: 16
      intellect: 46
      defense: 22
      agility: 16
  - key: hist_qinhan_0174
    name: 灌夫
    archetype: military
    flavor: '（生年不详—前131年）西汉将领，以勇悍与刚直著称，常被写成“说话不留余地”的军人。灌夫与窦婴交好，在武帝初年外戚势力抬头、人事重新分配的节点上，他的性格反而成了致命弱点：宴饮失礼、当众冲突这些看似“私德”问题，很快被转译成政治罪名，最终演成“窦婴、灌夫之狱”，以诛杀收场。灌夫的故事并不适合写成简单的“刚直受害”，它更像一则宫廷规则的冷说明：在权力密集处，情绪、口舌与人际羞辱会被迅速政治化；将领带着战场习气进入朝堂，若不懂分寸与退路，往往死得比上阵还快。'
    growth_range:
    - 5
    - 9
    attribute_weights:
      force: 48
      intellect: 14
      defense: 26
      agility: 12
  - key: hist_qinhan_0175
    name: 王娡
    archetype: civil
    flavor: '（生年不详—前126年）汉景帝第二任皇后，汉武帝之母。原嫁金王孙，生有一女，后被母亲送入宫。她善于经营宫廷关系，与馆陶长公主等势力合流，最终使刘彻成为太子。武帝即位后，她被尊为皇太后，外戚田蚡等人亦因此进入权力核心。王娡的关键并不在“逆袭”的传奇，而在她对权力规则的敏感：后宫并非只靠恩宠，还是一个不断结盟、拆盟、押注继承人的政治场。她既能顺势把家族送上台，也必须在皇权日渐强硬时控制外戚的锋芒，否则母后之位同样会变成风险源。'
    growth_range:
    - 5
    - 9
    attribute_weights:
      force: 16
      intellect: 46
      defense: 22
      agility: 16
  - key: hist_qinhan_0176
    name: 王离
    archetype: military
    flavor: '（生年不详—前207年）秦将王翦之孙，出身名将世家，却赶上秦帝国最坏的尾声。秦末对赵用兵时，他与章邯等围困巨鹿，面对的是各路反秦联军的合流；当楚军破釜沉舟突入战局，秦军不仅战术受挫，更遭遇“天下已不信秦”的合法性雪崩。史载王离在巨鹿一役后或被俘、或败亡，细节不一，但结局所揭示的东西很清楚：再精良的军队，一旦后方政令失序、补给断裂、援军迟疑，前线名将也会被迫吞下时代的崩塌。王离的名字因此带着一种反差——祖辈凭攻城略地立国，他却在同样的战场上目睹帝国不可逆的坠落。'
    growth_range:
    - 5
    - 9
    attribute_weights:
      force: 48
      intellect: 14
      defense: 26
      agility: 12
  - key: hist_qinhan_0177
    name: 王绾
    archetype: civil
    flavor: '（生卒年不详）秦初重臣，常出现在“分封与郡县”之争的关键段落里。秦统一六国后，如何安置功臣宗室、如何让新并入的地区服从中央，是一个现实而尖锐的问题；王绾被认为倾向分封，强调以封国安人心、稳边地，而另一种思路则坚持郡县，强调法令一统与行政直达。无论王绾个人主张细节为何，这场讨论本身说明：秦帝国并非天生“只有一种治理方案”，统一后的第一代统治者也在试错与权衡。王绾留下的价值，更多在于让我们看到制度选择背后的恐惧与盘算：怕离心，也怕割据，于是才会在两条路之间反复拉扯。'
    growth_range:
    - 5
    - 9
    attribute_weights:
      force: 16
      intellect: 46
      defense: 22
      agility: 16
  - key: hist_qinhan_0178
    name: 班彪
    archetype: civil
    flavor: '（3年—54年）东汉史学家，班固之父。史载其撰写史学著述，为班氏家族后续修《汉书》奠定材料与体例基础。班彪所处的东汉初年，政治统一刚恢复不久，如何重新整理前朝文献、确立“该如何记汉”的叙事框架，本身就是文化工程。班彪既承继司马迁以来的纪传体传统，又需要在新的政治语境里处理材料取舍与评价尺度：哪些值得写、写到什么程度、如何避免触犯当代禁忌。班彪的价值因此不仅在“写了什么”，也在“如何把修史变成家学与制度合作的项目”。通过他可以更清楚地看到，宏大史书往往不是一人之功，而是几代人、多个机构与长时间校理积累的结果。'
    growth_range:
    - 5
    - 9
    attribute_weights:
      force: 16
      intellect: 46
      defense: 22
      agility: 16
  - key: hist_qinhan_0179
    name: 班游
    archetype: civil
    flavor: '（生卒年不详）东汉学者，班固之子，活动多与宫廷藏书与学术整理相关。班氏家族以修史与治学著称，班游处在“名门之后”的双重压力之下：一方面拥有进入学术机构的便利，另一方面又很难在父祖光环下树立独立声名。史传对其记载不甚铺陈，反而更能体现这类人物的日常形态——不是以一篇惊世之作立名，而是以校勘、抄录、订正等细致工作维护知识的连续性。对帝国而言，典籍传承需要的正是这种“慢功夫”；班游虽不耀眼，却让人看到学术传统的生命力往往来自无数默默无闻的整理者，而非只有舞台中央的天才。'
    growth_range:
