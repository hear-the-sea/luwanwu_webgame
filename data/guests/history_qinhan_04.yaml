  - key: hist_qinhan_0189
    name: 赵佗
    archetype: military
    flavor: '（生年不详—前137年）秦末南海龙川人，秦将。秦亡后据岭南自立，建立南越政权，长期与汉廷在“称臣—称王—互市”之间周旋。赵佗的强处不只是能打，更在能“把南方管起来”：一方面沿用秦的郡县与军政框架，保持行政效率；一方面又必须面对百越族群与岭南环境的差异，通过安抚、联姻与贸易等方式稳住地方。对汉廷而言，南越既是边疆安全问题，也是海上与南方资源的门户；而赵佗则在中央力量暂时难以深入的年代，把自己经营成不可忽视的地方王者。理解赵佗，等于理解早期帝国如何在远方建立弹性的统治边界。'
    growth_range:
    - 5
    - 9
    attribute_weights:
      force: 48
