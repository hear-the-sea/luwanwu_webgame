  - key: hist_qinhan_0195
    name: 汉明帝刘庄
    archetype: civil
    flavor: '（28年—75年）东汉第二位皇帝，在位时期延续光武中兴的制度建设，使战后秩序进一步走向常态化。明帝重视吏治与行政效率，强调法度与考课，使中央对郡县的控制更稳定；同时文化生活也更趋成熟，史书所载佛教在汉地的传播在这一时期受到更多关注（细节多有后世叙述色彩，宜谨慎看待）。明帝的可读性在于“如何把开国成果变成制度惯性”：统一完成后，真正决定王朝寿命的是能否让税赋、司法、选官与边防都按规程运转。明帝时代的相对稳定并非偶然，它来自对官僚系统的持续整顿，也来自对“胜利之后别再折腾”的节制。'
    growth_range:
    - 5
