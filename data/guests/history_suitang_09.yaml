- key: hist_suitang_0278_duyou
  name: 杜佑
  archetype: civil
  flavor: （735年-812年）唐代政治家、史学家，仕途历任要职，重视制度与行政运作。其所著《通典》以典章制度为纲，综合历代政治、经济、礼乐、兵制等资料，是中国制度史的重要著作。杜佑写史并非单纯好古，而是带着治理需求：面对安史乱后财政、军政重建的难题，他需要一套可供参照的制度经验。正因如此，《通典》既是学术工程，也像一份面向现实的政策备忘录。杜佑把"史学"与"治道"重新连起来，让后世看到唐代知识人的另一种能力：不仅能写诗文，也能用整理与比较构建国家记忆。
  growth_range: [4, 7]
  attribute_weights:
    force: 13
    intellect: 43
    defense: 19
    agility: 17

- key: hist_suitang_0279_duguangting
  name: 杜光庭
  archetype: civil
  flavor: （850年-933年）唐末五代道士、文献整理者，道教史上影响深远。杜光庭长期在蜀地活动，参与道教仪式、撰写斋醮文书并编纂整理道教典籍，在战乱与政权更替中为道教保存大量文本与制度实践。需要注意的是，道教文献常有托名与再编辑传统，但杜光庭确实是唐末道教知识体系化的重要推动者。他凸显乱世宗教的双重角色：一方面提供精神安顿与仪式服务，另一方面承担文化档案的保存。通过杜光庭，可以理解五代十国并非文化真空，许多经典与仪轨正是在地方政权的庇护与需求中得以延续与整理。
  growth_range: [4, 7]
  attribute_weights:
    force: 11
    intellect: 42
    defense: 17
    agility: 16

- key: hist_suitang_0280_duxunhe
  name: 杜荀鹤
  archetype: civil
  flavor: （846年-904年）晚唐诗人，作品多直面社会基层压力，常写饥馑、徭役与士人困顿。杜荀鹤的语言不追求华丽，更多像"把话说清楚"：他把百姓的辛劳与官场的冷漠写得直接而刺痛，使读者难以把乱世当作远景观看。其自身科举不顺、漂泊奔走的经历，也让他对底层处境更敏感。杜荀鹤在诗史中的意义，是把晚唐的社会问题从宏观叙事拉回到具体生活，让诗不只是风花雪月，也是一种公共记忆的存档。当一个时代的制度失灵，能留下真实感受的文字，往往比漂亮辞藻更珍贵。
  growth_range: [4, 7]
  attribute_weights:
    force: 12
    intellect: 38
    defense: 17
    agility: 16

- key: hist_suitang_0281_duanchengshi
  name: 段成式
  archetype: civil
  flavor: （803年-863年）唐代文人，出身士族，学识广博，著有《酉阳杂俎》。该书兼收轶闻、志怪、风俗与异域材料，真假并陈，既有想象也有记录价值，是理解晚唐社会文化心态的重要窗口。段成式的写作趣味很"晚唐"：对世界充满好奇，又对现实失序有所逃离，于是把目光投向奇异与边缘。需要谨慎的是，书中许多条目未必可当作严格史实使用，但它保存了当时知识结构的样貌：人们如何理解自然、如何讲述异国、如何消费传奇。段成式让唐代散文与小说传统更成熟，也让后世看到一个时代的想象力如何与不安并生。
  growth_range: [4, 7]
  attribute_weights:
    force: 11
    intellect: 42
    defense: 17
    agility: 16

- key: hist_suitang_0282_shenqianqi
  name: 沈佺期
  archetype: civil
  flavor: （656年-715年）唐代诗人，长期在宫廷文苑与政治风波之间辗转。其以声律精严、对仗工稳著称，与宋之问并列为近体诗发展史中的关键人物。沈佺期亦曾因政治牵连被贬，后又复起，人生的沉浮使他的诗在华丽之外时有冷峻之色，尤其擅写羁旅、离思与自省。后世常把他当作"技术型诗人"来记忆，但他并非只剩技巧：当一个人把每个字都放在秤上称过，往往也意味着他在现实里无处安放，只能把秩序感寄托在诗的格律里。这种把人生焦虑压入音律的写法，成为唐诗成熟的另一种路径。
  growth_range: [4, 7]
  attribute_weights:
    force: 12
    intellect: 39
    defense: 17
    agility: 16

- key: hist_suitang_0283_shenjiji
  name: 沈既济
  archetype: civil
  flavor: （生卒年不详）唐代文人，参与政务，亦与传奇《枕中记》相关，后世"黄粱梦"典故多由此而来。作品以一场梦写尽仕途荣辱与人生幻灭，在叙事上节奏紧凑、层次分明，体现唐传奇对结构与主题的自觉经营。关于作者归属与文本细节，学界亦有讨论，不能把所有传说都当作可考事实，但《枕中记》作为文学作品的影响极其确定：它把人生无常写成可视化的情节，让读者在娱乐中获得哲理冲击。沈既济展示唐代文人如何用叙事处理现实焦虑：当政治前途难测、社会变动频繁，"梦"成为最合适的隐喻载体。
  growth_range: [4, 7]
  attribute_weights:
    force: 10
    intellect: 40
    defense: 15
    agility: 16

- key: hist_suitang_0284_fazang
  name: 法藏
  archetype: civil
  flavor: （643年-712年）唐代高僧，华严宗体系化的重要代表，长于讲经与理论阐释。法藏以融会经论、构建哲学框架见称，其思想强调世界圆融互摄，对唐代佛教哲学的成熟影响深远。其活动与武周及唐廷的宗教政策亦有关联，说明高僧在唐代不仅是宗教人物，也可能参与国家礼仪与思想资源的供给。理解法藏要保持两点：一是华严思想的抽象性使其影响多通过讲学与门人传播；二是史料叙述常带宗派尊崇色彩，具体事迹需谨慎对待。尽管如此，法藏仍是理解唐代佛教为何能发展出高复杂度理论体系的关键人物。
  growth_range: [4, 7]
  attribute_weights:
    force: 10
    intellect: 45
    defense: 16
    agility: 16

- key: hist_suitang_0285_lingche
  name: 灵澈
  archetype: civil
  flavor: （生卒年不详）唐代僧诗人，作品多写山林清寂与行脚见闻。灵澈不像大诗家那样以宏篇立名，但其诗保存了僧侣文学的日常质地：晨钟暮鼓、松风泉声、旅途饥寒，都被他用克制笔法写成可以安放的句子。由于史料有限，他的具体师承与行迹难以详考，但这并不妨碍读者从作品里感知一种朴素的修行观——不在玄谈高论，而在对每一步路的自觉。灵澈的存在提醒我们，唐代文学并非只有名家巨擘，也有大量在边缘写作的僧人，他们用诗把宗教经验与时代风尘悄悄留下。
  growth_range: [4, 7]
  attribute_weights:
    force: 10
    intellect: 40
    defense: 15
    agility: 16

- key: hist_suitang_0286_wangbing
  name: 王冰
  archetype: civil
  flavor: （生卒年不详）唐代医家，以注释整理《黄帝内经》体系中的《素问》而著名。王冰的注释工作不仅是解释字句，更是把医学经典重新组织成更易学习与应用的知识框架，使后世医家能够在统一文本基础上讨论理论与临床。需要注意的是，古代医学注释往往夹杂个人理论取向与时代认知，不能简单等同于"原典意思"，但正因如此，王冰的注本也成为研究中唐医学思想的重要材料。王冰让人更清楚地看到知识传承的关键环节：很多经典能流传并发挥作用，靠的不只是原作者，更靠后来的整理者与解释者。通过他，可以理解唐代医学如何逐步制度化、教育化。
  growth_range: [4, 7]
  attribute_weights:
    force: 10
    intellect: 43
    defense: 16
    agility: 16

- key: hist_suitang_0287_wangxiaotong
  name: 王孝通
  archetype: civil
  flavor: （生卒年不详）隋唐之际数学家，《缉古算经》通常归于其名下。该书以算题形式讨论工程与测量相关问题，涉及开方、勾股、比例等算法，反映当时国家工程、赋役与历算对数学技能的现实需求。对古代数学史而言，王孝通的重要性不在个人传记（其生平多难详考），而在文本所呈现的知识形态：数学作为"可教可学的技术"，与国家治理与工程实践紧密相连。需要注意的是，古代著作的作者归属有时会有争议或后代整理痕迹，但无论具体署名如何，《缉古算经》确实代表隋唐时期数学传统的延续与发展。
  growth_range: [4, 7]
  attribute_weights:
    force: 10
    intellect: 44
    defense: 15
    agility: 16

- key: hist_suitang_0288_wangwan
  name: 王湾
  archetype: civil
  flavor: （生卒年不详）唐代诗人，史料记载较少，却因《次北固山下》中的"海日生残夜，江春入旧年"而名留千载。王湾的价值在于以极凝练的景象写出时间感：残夜与新春在一句里交替，既是旅途见闻，也是人生感慨。关于其官职与行迹，后世难以复原得十分清楚，因此更宜把他当作"作品大于传记"的诗人来理解。那两句名联之所以被反复引用，是因为它不靠典故堆砌，而以自然现象呈现历史更替的节奏，既有盛唐前期的明朗，也含旅人心中的微凉。
  growth_range: [4, 7]
