  flavor: （720年-799年）唐代僧诗人，活跃于盛中唐之际，与士大夫交游密切，亦与陆羽等文化人物有联系。皎然的诗多写山水清境与禅心体悟，语言清润，善于把寺院生活与自然景物融为一体，使"清"成为一种可感的气味。他的价值不只是写了多少好句，更在于作为僧侣参与当时文学网络：诗歌、茶事、禅学交织在一起，构成中唐文化的一个侧面。皎然让人看到佛门并非文化边缘，相反，它在某些地区与阶层中正是精神与审美的中心之一。
  growth_range: [4, 7]
