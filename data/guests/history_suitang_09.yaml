    agility: 16

- key: hist_suitang_0297_langshiyuan
  name: 郎士元
  archetype: civil
  flavor: （生卒年不详）唐代诗人，与大历诗风关系密切，作品以清雅和平著称。郎士元不太追求宏大叙事，更常写山水、宴游与人情往来，句法舒缓，情绪不急不躁，却在字里行间透出时代的收敛。其生平细节不甚明确，但从诗看，他对自然景物与季节变化极敏感，能用简短的描写带出心境的转折。郎士元在文学史上的意义，类似一块"温润的石头"：它不耀眼，却让整体诗风更完整。大历时期需要这种温润，因为战乱后的社会并不适合持续的高亢，更多人需要一种能够安放心绪的轻声细语。
  growth_range: [4, 7]
  attribute_weights:
    force: 11
    intellect: 38
    defense: 16
    agility: 16

- key: hist_suitang_0298_zhenggu
  name: 郑谷
  flavor: （849年-911年）晚唐诗人，经历唐末动乱与藩镇割据的长期震荡。郑谷诗多写漂泊与时世感伤，语言清峭，既有对个人命运的无奈，也有对旧秩序崩塌的叹息。他的作品跨越唐末与五代之交，因而常被视为时代转折的文学见证：诗里出现的不是盛唐的自信，而是"明天不确定"的阴影。郑谷并非只写悲凉，他也能写风物与生活细节，把乱世中的日常保留下来。正是这种兼具历史感与生活感的笔触，使郑谷在晚唐诗坛占有稳固位置，成为后来人理解唐末心态的重要入口。
  growth_range: [4, 7]
  attribute_weights:
