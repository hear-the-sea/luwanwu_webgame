- key: hist_suitang_0289_wanghan
  name: 王翰
  archetype: civil
  flavor: （生卒年不详）唐代诗人，以边塞名篇《凉州词》等广为人知。其诗常用豪迈的口吻写军旅饮宴与沙场险苦，"葡萄美酒夜光杯"一类句子易被当作单纯的快意，但细读会发现其中也暗含人生无常：今朝把酒，未必有明日归期。王翰的生平资料较少，这恰好让作品本身更突出——他把盛唐边塞的昂扬与危险揉在同一首诗里，既有勇气的宣言，也有对牺牲的预感。后世喜欢用他的诗表达壮行与豪情，而他诗里那层若隐若现的凄凉，使其不止是战歌，更像对"英雄易逝"的提醒。
  growth_range: [4, 7]
  attribute_weights:
    force: 13
    intellect: 38
    defense: 17
    agility: 18

- key: hist_suitang_0290_huangfuran
  name: 皇甫冉
  archetype: civil
  flavor: （生卒年不详）唐代诗人，兄皇甫曾亦以诗名，二人常被并举。皇甫冉的作品多涉及送别、旅途与交游，风格含蓄而不失清丽，善于在短章里写出人情的回旋。由于史料有限，他的具体仕途难以详考，但从诗可见其与当时文士圈子联系紧密，常以应酬唱和的方式留下作品。皇甫冉的可读之处，在于把"礼节性的送别"写出真情：既符合时代文人社交的规范，又能在规范之中露出个人的柔软与惆怅。这样的诗既是文学，也是社会关系的记录。
  growth_range: [4, 7]
  attribute_weights:
    force: 11
    intellect: 38
    defense: 16
    agility: 16

- key: hist_suitang_0291_jiaoran
