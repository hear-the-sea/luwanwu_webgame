- key: hist_suitang_0292_pirixiu
  name: 皮日休
  archetype: civil
  flavor: （834年-883年）唐代文人，诗文兼长，与陆龟蒙唱和尤著。皮日休作品富议论与讽刺精神，常借题发挥批评时弊，也能写江湖风物与隐逸生活，显示晚唐知识人既要关心现实又向往退避的矛盾。关于他是否直接参与某些政治与军事事件，史料并非处处可靠，后世也多有附会，因此较稳妥的理解是：他用文学方式参与公共议题，而未必等同于亲自上阵。皮日休的价值在于保留一种"敢说"的笔锋，在晚唐语境里，直言往往带来危险，而他仍试图把社会的不合理写到纸上，让诗文成为一把可见的尺子。
  growth_range: [4, 7]
  attribute_weights:
    force: 12
    intellect: 41
    defense: 17
    agility: 16

- key: hist_suitang_0293_shenxiu
  name: 神秀
  archetype: civil
  flavor: （684年-912年）晚唐五代僧诗人，作品数量极多，流传甚广。齐己长期在江南一带行脚与交游，既与僧侣圈保持距离，也与士大夫往来唱和，使其诗兼具佛门清寂与世间忧思。乱世中寺院并非绝对安全，齐己的作品常带现实的风尘味：写山水也写兵荒，谈禅亦谈饥寒。他的价值在于用稳定的语调穿过时代动荡，不把诗写成口号，而把困顿写成可被理解的日常。齐己证明僧人诗并非只能超脱，也能成为社会经验的记录者；而"清净"有时恰是面对混乱的一种坚硬回应。
  growth_range: [4, 7]
  attribute_weights:
    force: 10
    intellect: 40
    defense: 16
    agility: 16

- key: hist_suitang_0294_jiada
  name: 贾耽
  archetype: civil
  flavor: （730年-805年）唐代地理学家与官员，对边疆、交通与对外信息尤为关注。中唐时期战争与贸易并存，朝廷需要更可靠的地理知识来支撑军政决策与行政管理，贾耽的著述与资料整理正符合这种需求。相传其绘制或主持整理的地图与地理志，对后世认识唐代道路、州县与海外路线有参考价值。贾耽把"地理"从游记式见闻推进为治理工具：疆域、交通、物产与民族分布，都会影响税赋与军务。通过他，可以看到唐代知识体系并非抽象学问，而是在国家管理与对外交流压力下逐步专业化的结果。
  growth_range: [4, 7]
  attribute_weights:
    force: 11
    intellect: 43
    defense: 17
    agility: 16

- key: hist_suitang_0295_zhaoxu
  name: 赵嘏
  archetype: civil
  flavor: （生卒年不详）唐代诗人，以《长安晚秋》等作品著名，善写旅思与都市暮色。赵嘏笔下的长安不总是盛世的辉煌，而常是秋声、落叶与行人：热闹背后有难以排遣的孤独，这正契合晚唐士人进退失据的心境。关于赵嘏的官场经历，史料不完备，但从其诗多写漂泊可见他与"奔走求仕"的生活相连。赵嘏的特点在于把宏都写得像一处临时驿站：人来人往，却没有归宿。这样的写法使晚唐城市诗不止是景物描摹，更成为对个人命运的隐喻。
  growth_range: [4, 7]
  attribute_weights:
    force: 12
    intellect: 38
    defense: 17
    agility: 16

- key: hist_suitang_0296_daoda
  name: 道宣
  archetype: civil
  flavor: （596年-667年）唐代高僧，律学与僧团制度建设的重要人物之一。道宣重视戒律实践与僧团规范，著述与讲学使佛教在唐代更制度化，寺院生活不再只是个人修行，也成为有规则可循的共同体。其传记与著作中包含大量关于僧制、仪轨与修行实践的材料，对理解唐代宗教生活极有价值。道宣把"修行"落在组织层面：当佛教进入国家视野，僧团需要明确身份边界与行为规范，以回应社会期待与政治管理。通过道宣，可以看到宗教如何在帝国体系内自我调整，从而获得更稳定的生存空间。
  growth_range: [4, 7]
  attribute_weights:
