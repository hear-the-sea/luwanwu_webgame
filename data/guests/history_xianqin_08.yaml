    flavor: （?—约前996年）周康王，周朝第三代天子。他是成王之子，继承父王遗志，继续推行周公制定的礼乐制度。在他治下，周朝达到鼎盛，与父亲成王时代合称"成康之治"。史载这一时期天下太平，"刑措不用"，四十余年间几乎无人犯法受刑，这在中国历史上堪称奇迹。他为政宽仁，重用贤臣，使诸侯宾服、百姓安居。然而盛世之下也埋下隐患：他晚年赏赐过度，国库空虚，为后来周朝衰落埋下伏笔。成康之治是周朝的黄金时代，也是后世帝王向往的治世典范。
