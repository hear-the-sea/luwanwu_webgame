  - key: hist_xianqin_0351
    name: 子特
    default_gender: male
    archetype: military
    flavor: （?—前469年）宋国君主，死于内乱。他是春秋末期宋国的君主，在位期间宋国政治动荡不安。宋国虽是殷商后裔建立的公国，却在春秋乱世中日益衰落。他在位时，宋国卿族势力膨胀，公室权威旁落。最终他被卿族弑杀，死于内乱。宋国的悲剧在于：它既无力与大国争霸，又无法压制国内的卿族势力。他的死是宋国衰落的一个缩影。春秋末期，公室衰微、卿族坐大已成普遍现象，宋国也未能幸免。
    growth_range:
    - 3
    - 7
    attribute_weights:
      force: 36
      intellect: 18
      defense: 26
      agility: 20
  - key: hist_xianqin_0352
    name: 子田
    default_gender: male
    archetype: military
    flavor: （?—前396年）宋国君主，战国初期的守成者。他是宋国由春秋过渡到战国时期的君主，在位期间宋国相对稳定。他既无力复兴宋国往日的荣光，也没有让宋国陷入更大的动乱。在战国七雄的夹缝中，他勉强维持着宋国的存在。他为政守成持盈，不冒进、不激进，使宋国得以苟延残喘。然而小国终究难以在大国的夹缝中长久生存，宋国最终被齐国吞并。他的一生，是小国在乱世中艰难求存的写照。
    growth_range:
    - 3
    - 7
    attribute_weights:
      force: 36
      intellect: 18
      defense: 26
      agility: 20
  - key: hist_xianqin_0353
    name: 子偃
    default_gender: male
    archetype: military
    flavor: （?—前286年）宋国末代君主，骄横灭国。他本名偃，是宋国最后一位君主。他野心勃勃，自称"天子"，四处征伐，攻打周边小国。他残暴无道，杀害臣民，国内怨声载道。他的狂妄引起了邻国的恐惧和敌意，最终齐国联合楚国、魏国共同讨伐宋国。三国联军攻破宋都，他仓皇出逃，死于途中。宋国就此灭亡。他是"骄兵必败"的典型：一个小国的君主，竟妄想称霸天下，结果自取灭亡。
    growth_range:
    - 3
    - 7
    attribute_weights:
      force: 38
      intellect: 14
      defense: 26
      agility: 22
  - key: hist_xianqin_0354
    name: 唐成公
    default_gender: male
    archetype: military
    flavor: （生卒年不详）唐国君主，春秋小国之君。唐国是周武王弟唐叔虞后裔所建的诸侯国，地处南方，在楚国与中原诸侯的夹缝中艰难求存。春秋时期小国的命运往往身不由己，唐国虽有悠久的宗周血统，却无力抵御大国的吞并。他在位期间勉力维持国家独立，与邻国周旋，但最终唐国还是难逃被楚国灭亡的命运。小国寡民的悲歌，在他身上体现得淋漓尽致。
    growth_range:
    - 3
    - 7
    attribute_weights:
      force: 36
      intellect: 16
      defense: 28
      agility: 20
  - key: hist_xianqin_0355
    name: 姬捷
    default_gender: male
    archetype: military
    flavor: （?—前628年）郑国君主，守成之君。他是郑厉公之子，在位四十五年，是郑国历史上在位时间最长的君主之一。他在位期间，郑国已从郑庄公时代的小霸沦为晋楚争霸的棋子。他在晋楚之间摇摆不定，时而附晋，时而从楚，勉强维持国家存续。他虽无祖父郑庄公的雄才大略，却也在大国夹缝中保全了郑国。晋公子重耳流亡途经郑国时，他未能礼遇，后来成为城濮之战郑国遭攻的原因之一。
    growth_range:
    - 3
