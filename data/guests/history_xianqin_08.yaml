    flavor: （生卒年不详）周文王第八子，三监之乱参与者。武王灭商后，他被封于霍地，与管叔、蔡叔共同承担监视殷商遗民的任务。武王死后，他随管叔、蔡叔一同反对周公摄政，参与三监之乱。然而在这场叛乱中，他的角色相对较轻，可能是被兄长裹挟而非主动谋反。叛乱失败后，周公对他的处置也相对宽容，仅是废黜为庶人，未予极刑。他的故事说明：在政治漩涡中，即使被动卷入，也难逃责罚。霍国后来由他的后人恢复，延续了周室血脉。
