    attribute_weights:
      force: 34
      intellect: 20
      defense: 26
      agility: 20
  - key: hist_xianqin_0356
    name: 姬兰
    default_gender: male
    archetype: military
    flavor: （?—前606年）郑国君主，穆族始祖。他是郑文公之子，在位二十二年，政治相对平稳。他有众多儿子，这些公子的后代形成所谓"七穆"——郑国最有权势的七大卿族，包括驷氏、罕氏、国氏、良氏、印氏、游氏、丰氏。七穆之间既有合作也有竞争，共同把持郑国政坛数百年。子产就是七穆中的一员。穆公时代是郑国卿族政治形成的关键时期，此后郑国政治由七穆轮流执政，公室权力日渐旁落。
    growth_range:
    - 3
    - 7
    attribute_weights:
      force: 36
      intellect: 18
      defense: 26
      agility: 20
  - key: hist_xianqin_0357
    name: 姬赤
    default_gender: male
    archetype: military
    flavor: （?—前660年）卫国君主，好鹤亡国的荒唐之君。他酷爱仙鹤，爱之成痴，不仅在宫中豢养大量仙鹤，还给仙鹤封官拜爵，让鹤乘坐大夫专用的轩车。国库的钱财用来喂鹤，百姓却在饥寒交迫中挣扎。北方狄人入侵时，士兵们拒绝作战，讥讽道："让鹤去打仗吧，鹤有俸禄有爵位，我们凭什么卖命？"他带着残兵迎战，战死沙场，卫国几乎灭亡。"好鹤亡国"成为玩物丧志的千古警示。
    growth_range:
    - 3
    - 7
    attribute_weights:
      force: 34
      intellect: 16
      defense: 26
      agility: 24
  - key: hist_xianqin_0358
    name: 姬衎
    default_gender: male
    archetype: military
    flavor: （?—前544年）卫国君主，两度为君的波折人生。他即位后骄奢淫逸，多次羞辱大臣孙林父、宁殖等人。忍无可忍的卿族发动政变，将他驱逐出境。他流亡在外十二年，尝尽人间冷暖。后来他暗中联络卫国内部势力，趁机复辟成功，重登君位。复辟后他痛定思痛，有所收敛，但卫国的政治格局已经改变。他的经历说明：君主若不尊重臣下，终将自食其果。流亡十二年的教训，是他用青春换来的惨痛代价。
    growth_range:
    - 3
    - 7
    attribute_weights:
      force: 36
      intellect: 18
      defense: 26
      agility: 20
  - key: hist_xianqin_0359
    name: 姬元
    default_gender: male
    archetype: military
    flavor: （?—前493年）卫国君主，毁誉参半的一代之君。他在位四十二年，是卫国历史上在位较长的君主。他虽有昏庸之处，却能知人善任，重用蘧伯玉、史鱼等贤臣，使卫国在他治下维持了相对稳定。孔子周游列国时多次到访卫国，与他有过多次交谈。然而他宠信夫人南子，纵容她与宋国公子朝私通，引发太子蒯聩弑母未遂的家庭悲剧。他的家庭问题最终演变成卫国的政治危机，父子争位的内乱由此埋下伏笔。
    growth_range:
    - 3
    - 7
    attribute_weights:
      force: 34
      intellect: 20
      defense: 26
      agility: 20
  - key: hist_xianqin_0360
    name: 姬辄
    default_gender: male
    archetype: military
    flavor: （?—前456年）卫国君主，父子争位的悲剧主角。他是蒯聩之子，因父亲出逃而被立为国君。然而蒯聩不甘心失去继承权，回国与儿子争夺君位。父子相残，卫国大乱。孔子弟子子路在这场动乱中战死，临终前还不忘整理冠缨，从容就义。卫出公在位期间多次被驱逐又复位，卫国政局动荡不安。他的一生都在与父亲的争斗中度过，是春秋时代家国悲剧的缩影。父子反目，骨肉相残，令人唏嘘。
    growth_range:
    - 3
    - 7
    attribute_weights:
      force: 34
      intellect: 18
      defense: 26
      agility: 22
  - key: hist_xianqin_0361
    name: 蒯聩
    default_gender: male
    archetype: military
    flavor: （?—前478年）卫国太子，弑母未遂的叛逆者。他是卫灵公之子，因母亲南子与人私通而蒙羞。他密谋刺杀南子，不料事败，被迫流亡晋国。灵公死后，他的儿子被立为卫出公。他不甘心失去继承权，在晋国的支持下回国争位，与亲生儿子展开了残酷的权力斗争。父子相争，卫国大乱，他虽一度得逞，却落得众叛亲离的下场。他的故事是春秋时代宫廷伦理悲剧的典型：私通丑闻引发弑母阴谋，最终演变为父子相残的惨剧。
    growth_range:
    - 3
    - 7
    attribute_weights:
      force: 38
      intellect: 16
      defense: 26
      agility: 20
  - key: hist_xianqin_0362
    name: 南子
    default_gender: female
