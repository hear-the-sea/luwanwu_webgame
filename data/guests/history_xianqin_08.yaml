  - key: hist_xianqin_0366
    name: 曹刿
    default_gender: male
    archetype: military
    flavor: （生卒年不详）鲁国谋士，长勺之战的关键人物。他本是鲁国平民，却心系国家安危。齐军伐鲁时，他主动求见鲁庄公，献上破敌之策。战场上他观察敌情，冷静分析：齐军三鼓而气竭，此时反击必胜。他建议庄公按兵不动，待齐军"一鼓作气，再而衰，三而竭"之后，方才下令进攻。鲁军势如破竹，大败齐军。战后他解释战机：彼竭我盈，故克之；下视其辙，望其旗靡，故逐之。"曹刿论战"成为千古名篇，展现了平民智者的战略眼光与临阵应变能力。
    growth_range:
    - 5
    - 9
    attribute_weights:
      force: 36
      intellect: 28
      defense: 20
      agility: 16
  - key: hist_xianqin_0390
    name: 姬诵
    default_gender: male
    archetype: military
    flavor: （?—约前1021年）周成王，周朝第二代天子。他是武王之子，年幼即位，由叔父周公旦摄政辅佐。周公尽心辅政，平定三监之乱、东征殷商余孽、制礼作乐，为周朝奠定了数百年的制度根基。成王成年后，周公还政于他，成王亲政后继承周公的政策，励精图治，与子康王共同开创了"成康之治"——这是周朝最为太平富庶的时期，史载"刑措四十余年不用"，天下安定，百姓乐业。他的成功，既得益于周公的悉心辅佐，也源于自己的谦逊与勤政。
    growth_range:
    - 6
    - 9
    attribute_weights:
      force: 36
      intellect: 22
      defense: 24
      agility: 18
  - key: hist_xianqin_0397
    name: 姬静
    default_gender: male
    archetype: military
    flavor: （?—前782年）周宣王，周朝中兴之主。他在共和行政结束后继位，接手的是一个满目疮痍的王朝。他励精图治，任用贤臣仲山甫、尹吉甫等人，整顿内政，恢复诸侯朝觐制度。对外他多次出征，讨伐猃狁、征服淮夷，一度恢复周室威望。史称这一时期为"宣王中兴"，是西周晚期难得的振兴时期。然而他晚年骄傲自满，干涉鲁国内政、穷兵黩武，千亩之战惨败于姜氏之戎，丧失大量兵力。他的晚年失误为西周灭亡埋下伏笔，但他前期的政绩仍值得肯定。
    growth_range:
    - 6
    - 9
    attribute_weights:
      force: 40
      intellect: 18
      defense: 24
      agility: 18
  - key: hist_xianqin_0398
    name: 姬宫涅
    default_gender: female
    archetype: military
    flavor: （?—前771年）周幽王，西周末代天子。他宠爱褒姒，却苦于褒姒从不展颜一笑。佞臣献计点燃烽火戏弄诸侯，诸侯闻警匆忙赶来，发现并无敌情，狼狈撤回。褒姒见此情景终于笑了，幽王大悦，此后屡次戏弄。为立褒姒之子伯服为太子，他废黜申后与太子宜臼。申侯联合犬戎攻周，幽王点燃烽火求援，诸侯以为又是戏言，无人来救。犬戎攻入镐京，幽王死于骊山之下，西周灭亡。"烽火戏诸侯"成为失信于人必自食其果的千古警示。
    growth_range:
    - 6
    - 9
    attribute_weights:
      force: 34
      intellect: 18
      defense: 26
      agility: 22
  - key: hist_xianqin_0399
    name: 姬宜臼
    default_gender: male
    archetype: military
    flavor: （?—前720年）周平王，东周第一代天子。他原是周幽王的太子，因母亲申后被废而遭牵连。幽王死后，他在申侯、郑武公、晋文侯等诸侯的拥立下继位。为避犬戎之祸，他放弃已被战火焚毁的镐京，东迁至洛邑，史称"平王东迁"。这一迁徙标志着西周的结束和东周的开始。然而东迁之后，王室控制的地盘大幅缩小，诸侯势力日渐坐大，周天子渐渐沦为名义上的共主。诸侯争霸的春秋时代由此拉开序幕，他虽贵为天子，却无力挽回王室衰落的命运。
    growth_range:
    - 6
    - 9
    attribute_weights:
      force: 32
      intellect: 22
      defense: 26
      agility: 20
  - key: hist_xianqin_0370
    name: 叔孙豹
    default_gender: male
    archetype: civil
    flavor: （?—前538年）鲁国大夫，三不朽理论的提出者。他是鲁国三桓之一叔孙氏的宗主，在政治上有重要地位。他最著名的贡献是提出"三不朽"理论：范宣子问他何为不朽，他答曰"太上有立德，其次有立功，其次有立言"。这一理论成为中国传统价值观的核心，影响后世两千余年。立德、立功、立言，成为无数士人毕生追求的目标。他以一番言论留名青史，正是"立言"的最好注脚。他本人也以德行、事功著称于当世。
    growth_range:
    - 6
    - 9
    attribute_weights:
      force: 10
      intellect: 56
      defense: 20
      agility: 14
  - key: hist_xianqin_0381
    name: 孟姜
    default_gender: female
    archetype: civil
    flavor: （生卒年不详）孟姜女传说的原型，忠贞烈女。她是齐国大夫杞梁的妻子，丈夫战死莒城后，她悲痛欲绝，在城下痛哭十日，城墙为之崩塌。齐庄公欲在郊外吊唁，她以礼法拒绝，维护丈夫的尊严。她的故事在战国时期已广为流传，淳于髡、孟子都曾提及。后世不断演绎添加，她变成了哭倒秦长城的孟姜女。无论故事如何变化，她的忠贞与坚强始终是核心。她是中国古代女性忠贞形象的最早代表之一。
    growth_range:
    - 6
    - 9
    attribute_weights:
      force: 8
      intellect: 54
      defense: 22
      agility: 16
  - key: hist_xianqin_0383
    name: 展获
    default_gender: male
    archetype: civil
    flavor: （前720年—前621年）鲁国大夫，坐怀不乱的和圣。他本名展获，字禽，因封地在柳下，谥号惠，故称柳下惠。他最著名的故事是"坐怀不乱"：寒冬之夜，有女子无处栖身，他将她抱在怀中取暖，整夜未动邪念。他为人正直，三次被罢官却不肯离开鲁国，说"直道而事人，焉往而不三黜？枉道而事人，何必去父母之邦？"孔子称他为"被遗落的贤人"，孟子尊他为"和圣"——以和待人、和而不流的圣人。他的品格成为中国古代士人修身的楷模。
    growth_range:
    - 6
    - 9
    attribute_weights:
      force: 10
      intellect: 56
      defense: 20
      agility: 14
  - key: hist_xianqin_0386
    name: 武庚
    default_gender: male
    archetype: military
    flavor: （?—约前1039年）商纣王之子，叛周被杀。周灭商后，武王为安抚殷商遗民，将他封于殷地旧都，使他继续祭祀殷商祖先。然而他心怀故国，不甘居于藩属地位，暗中联络对周公摄政不满的管叔、蔡叔、霍叔，发动了震动周初的"三监之乱"。他纠集殷商旧部与东夷诸族，声势浩大，一度威胁到新生的周王朝。周公亲率大军东征，历时三年平定叛乱，武庚兵败被杀，殷商最后的复国梦想也随之破灭。他的叛乱虽然失败，却说明殷商遗民对故国的怀念之深。
    growth_range:
    - 6
    - 9
    attribute_weights:
      force: 40
      intellect: 16
      defense: 26
      agility: 18
  - key: hist_xianqin_0395
    name: 共伯和
    default_gender: male
    archetype: civil
    flavor: （生卒年不详）共和行政的执政者。周厉王被国人暴动驱逐后，太子静年幼不能理政，由共伯和与召穆公共同执掌朝政，史称"共和行政"。这一年（公元前841年）是中国历史上确切纪年的开始，此后每一年都有明确的历史记录，故称"共和元年"。共和行政持续十四年，直到厉王死于流亡地，太子静继位为宣王，共伯和才还政于王。关于他的身份，史书记载不一，有说是共国国君，有说是周室宗族。无论如何，他在周室危难之际稳定了局势，功不可没。
    growth_range:
    - 6
    - 9
    attribute_weights:
      force: 10
      intellect: 56
      defense: 20
      agility: 14
  green:
  - key: hist_xianqin_0350
    name: 薳启强
    default_gender: male
    archetype: civil
    flavor: （生卒年不详）楚国大夫，出使诸侯的外交家。他是楚国的外交人才，多次代表楚国出使晋国、齐国等大国。在晋楚争霸的时代，外交斡旋至关重要。他能言善辩，熟悉各国情势，在复杂的国际关系中为楚国争取利益。春秋时期的外交活动，不仅是国家实力的较量，更是辞令智慧的比拼。他以出色的外交才能为楚国服务，虽然史书对他的记载不多，但他是楚国外交团队中不可或缺的一员。
    growth_range:
