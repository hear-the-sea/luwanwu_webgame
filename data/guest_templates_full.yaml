# 门客模板配置
# avatar 字段（可选）：指定门客头像相对路径，相对于 data/images/guests/ 目录
# 例如在 heroes 或 templates 中添加：avatar: zhao_yun.png
# 将会加载 data/images/guests/zhao_yun.png 文件

# 门客技能配置已拆分到 data/guest_skills.yaml

# ========== 自定义成长配置（可选） ==========
# growth_range: [最小值, 最大值]  # 每级成长点数区间，不配置则使用稀有度默认值
# attribute_weights:               # 属性分配权重，不配置则使用职业默认值
#   force: 40                       # 武力权重
#   intellect: 15                   # 智力权重
#   defense: 23                     # 防御权重
#   agility: 22                     # 敏捷权重
# 示例：
#   - key: hero_luo_cheng
#     name: 罗成
#     archetype: military
#     growth_range: [7, 12]         # 高于蓝色默认5-9
#     attribute_weights:
#       force: 30
#       intellect: 10
#       defense: 20
#       agility: 40                 # 银枪白马，敏捷型武将
# ================================================
    # "black": (1, 3),    # 黑色：1-3点基础成长
    # "gray": (2, 5),     # 灰色：2-5点基础成长
    # "green": (3, 7),    # 绿色：3-7点基础成长
    # "red": (4, 7),      # 红色：4-7点基础成长（调整：避免与绿色下限重叠，期望5.5）
    # "blue": (5, 9),     # 蓝色：5-9点基础成长
    # "purple": (6, 10),  # 紫色：6-10点基础成长
    # "orange": (6, 12),  # 橙色：6-12点基础成长
    # 主角/重要配角可在对应颜色中适当上调属性点成长区间，但是最高成长点数不要超过下一稀有度的最高点数。隐士较为特殊，可随机发挥，但强度不应超过橙色。
    # growth_range 多样化，比如高手稳定型 [8, 10]，天才型 [6, 12]，均衡型 [7, 9] 等
# ========== 属性配置（基准：蓝色文门客四维总点137） ==========
# 文门客比例：敏捷30.7% > 智力29.2% > 武力26.3% > 防御13.9%
# 武门客比例：武力35% > 防御30% > 敏捷25% > 智力10%
# 武门客总点 = 文门客 × 1.07
# 成长梯度：黑→灰(+20%)→绿(+20%)→红(+12%)→蓝(基准)→紫(+15%)→橙(+8%)
