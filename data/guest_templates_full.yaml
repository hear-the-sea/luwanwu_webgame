      flavor: 天机老人的孙女，一个活泼开朗、聪明美丽的少女。她不顾一切地爱上了李寻欢，并在他身边默默支持他。她的笑容如同阳光，温暖了李寻欢孤独的心。最终，她的执着与真情打动了“小李探花”，两人终成眷属，携手归隐。出自古龙小说《多情剑客无情剑》
      default_gender: female
      default_morality: 85
      recruitable: false
      growth_range: [4, 7]
      attribute_weights:
        force: 20
        intellect: 30
        defense: 20
        agility: 30
    - key: hero_lin_xianer
      name: 林仙儿
      archetype: civil
      flavor: 江湖公认的“第一美人”，生得一副欺霜赛雪的绝世皮囊。她外表柔弱无依，眼眸清澈如鹿，实则心机深沉，手段狠绝。她以美貌为利刃，视男人为玩物，曾令少年阿飞深陷泥沼，更于幕后操纵风云。她是欲望的化身，一生在征服与背叛中周旋，最终红颜凋零，沦落尘泥，只留下一段关于美与恶的苍凉叹息。出自古龙小说《多情剑客无情剑》
      default_gender: female
