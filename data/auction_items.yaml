# 拍卖行配置 - 维克里拍卖（Vickrey Auction）
#
# ┌─────────────────────────────────────────────────────────────────────────────┐
# │ 维克里拍卖规则说明                                                          │
# ├─────────────────────────────────────────────────────────────────────────────┤
# │ 1. 每个拍卖位有 N 个中标名额（quantity_per_slot = N）                       │
# │ 2. 出价最高的前 N 名玩家各获得 1 个物品                                     │
# │ 3. 所有中标者支付统一价格（第 N 名的出价，即最低中标价）                    │
# │ 4. 只有被挤出前 N 名时才退还冻结的金条                                      │
# │ 5. 玩家只能看到：最低中标价、中标名额数、出价人数、自己是否安全              │
# │ 6. 玩家看不到：具体排名、其他人的出价金额                                    │
# └─────────────────────────────────────────────────────────────────────────────┘
#
# 每3天自动刷新一轮拍卖，系统上架珍稀道具供全服玩家竞拍
# 交易货币为金条，出价时冻结金条，被挤出中标范围时立即退还

# 全局配置
settings:
  cycle_days: 3                  # 拍卖周期（天）
  min_increment_ratio: 0.1       # 最小加价幅度比例（起拍价的10%）- 暂未使用
  default_min_increment: 1       # 默认最小加价幅度（金条）- 暂未使用

# 拍卖商品列表
# ┌─────────────────────────────────────────────────────────────────────────────┐
# │ 字段说明：                                                                  │
# │   slots: 拆分成多少个独立拍卖位（同种物品可拆成多个拍卖位独立竞拍）         │
# │   quantity_per_slot: 每个拍卖位的中标名额数（前N名各获得1个物品）           │
# │   starting_price: 起拍价（金条）                                            │
# │   min_increment: 最小加价幅度（金条）- 暂未强制使用                         │
# │   enabled: 是否启用                                                         │
# └─────────────────────────────────────────────────────────────────────────────┘
#
# 示例：quantity_per_slot: 3 表示前3名出价者各中标获得1个物品，
#       所有中标者支付第3名的出价（最低中标价）

